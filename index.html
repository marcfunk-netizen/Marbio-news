var articlesData={
"african-cdc":[
{"title":"Africa CDC Weekly Brief 8-14 juin 2026 : l'épidémie de Bundibugyo atteint 837 cas, le financement reste critique","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-8-14-june-2026/","content":"Le Weekly Brief de l'Africa CDC couvrant la période du 8 au 14 juin 2026 dresse un bilan alarmant de l'épidémie de maladie à virus Bundibugyo en RDC : 837 cas confirmés et 196 décès ont été enregistrés, faisant de cette crise une menace potentiellement pire que l'épidémie ouest-africaine de 2014-2016 qui avait tué plus de 11 000 personnes. Le Directeur général de l'Africa CDC, Dr Jean Kaseya, a averti que la situation pourrait dépasser ce seuil historique si la communauté internationale n'apporte pas rapidement un soutien décisif. Le plan de riposte continental de 518 millions de dollars, lancé conjointement avec l'OMS, n'a reçu que moins de 100 millions de dollars en ressources effectives — un écart de financement critique qui fragilise la cohérence de la réponse. L'Africa CDC appelle d'urgence les partenaires internationaux à mobiliser les ressources manquantes et à renforcer la coordination sous le cadre unifié One Response.","date":"2026-06-14"},
{"title":"Africa CDC urges all AU Member States to strengthen exit screening at points of entry amid Ebola escalation","url":"https://www.globalsecurity.org/security/library/news/2026/06/sec-260610-africacdc02.htm","content":"Africa CDC Director-General Dr. Jean Kaseya formally wrote to Ministers of Health across all 55 African Union member states, calling for the immediate reinforcement of exit screening protocols and public health measures at airports, seaports, and major land border crossings in response to the rapidly escalating Bundibugyo Ebola outbreak. The directive emphasizes coordinated, science-based action to detect potential cases early while ensuring that travel, trade, and humanitarian operations continue without unnecessary disruption. With confirmed cases surpassing 837 and 196 deaths recorded in the DRC as of mid-June 2026, the risk of cross-border transmission has become a continent-wide concern. Africa CDC stressed the importance of proportionate, non-discriminatory measures that avoid stigmatizing travelers from affected regions while protecting continental public health security.","date":"2026-06-10"},
{"title":"Ebola outbreak in DR Congo could become worst in history, Africa CDC warns","url":"https://www.aljazeera.com/news/2026/6/16/ebola-outbreak-in-dr-congo-could-become-worst-in-history-africa-cdc-warns","content":"Africa CDC Director-General Dr. Jean Kaseya issued an urgent warning on June 16, 2026, that the Bundibugyo Ebola outbreak in the DRC risks surpassing the catastrophic 2014-2016 West African epidemic — the deadliest in recorded history, which killed over 11,000 people. With 837 confirmed cases and 196 deaths registered by mid-June, and with the 518 million dollar continental response plan receiving less than 100 million dollars in committed funding, the Africa CDC chief described the resource gap as an existential threat to containment efforts. African Union chair, Burundi President Evariste Ndayishimiye, publicly noted the stark disparity between donor pledges and resources actually transferred on the ground. Al Jazeera reported that Africa CDC is calling for emergency mobilization of international financing to prevent the outbreak from entering an uncontrollable phase.","date":"2026-06-16"},
{"title":"Africa CDC publie son rapport de situation sur l'épidémie de maladie à virus Bundibugyo au 11 juin 2026","url":"https://khub.africacdc.org/health-topics/30?page=4","content":"L'Africa CDC a publié son dernier rapport de situation sur l'épidémie de maladie à virus Bundibugyo (BVD) en date du 11 juin 2026, faisant état de 708 cas confirmés au total dans la République Démocratique du Congo (RDC) et en Ouganda. Le rapport documente les nouvelles évolutions épidémiologiques, les mesures d'intervention en cours, les défis opérationnels et les recommandations stratégiques pour contenir l'épidémie. La province d'Ituri en RDC reste l'épicentre de la transmission, tandis que la situation en Ouganda demeure stable, sans nouveaux cas ni décès enregistrés au cours des 24 dernières heures précédant le rapport. L'Africa CDC souligne l'importance de l'engagement communautaire, du renforcement des capacités de traçage des contacts et de la coordination transfrontalière pour freiner la propagation du virus.","date":"2026-06-17"},
{"title":"Egypt opens Africa Health ExCon 2026: Africa CDC Chief Warns of Ebola Threat and Calls for Unified Procurement","url":"https://www.dailynewsegypt.com/2026/06/15/egypt-opens-africa-health-excon-2026-as-africa-cdc-chief-warns-of-ebola-threat","content":"Le Premier ministre égyptien Mostafa Madbouly a inauguré lundi la cinquième édition de l'Africa Health Exhibition and Conference (Africa Health ExCon 2026), où le Directeur général de l'Africa CDC, Jean Kaseya, a lancé un avertissement sévère concernant les risques que fait peser le virus Ebola sur le continent. Il a notamment appelé à la mise en place d'un mécanisme unifié d'approvisionnement médical africain. L'événement, qui se déroule du 15 au 18 juin, rassemble plus de 400 entreprises locales, régionales et internationales, avec une participation attendue de plus de 45 000 experts et décideurs. En marge de la conférence, Le Caire a été désigné pour accueillir le siège opérationnel du mécanisme africain de mise en commun des achats, un accord conclu sous l'égide de l'Africa CDC, renforçant ainsi le rôle stratégique de l'Égypte dans l'architecture sanitaire continentale.","date":"2026-06-17"},
{"title":"Africa CDC Secures Over $250 Million at Lyon One Health Summit to Advance Africa's Health Security Agenda","url":"https://reliefweb.int/report/world/africa-cdc-secures-over-us250-million-advance-africas-global-health-security-agenda-lyon-one-health-summit-lyon-france","content":"Lyon / Addis Ababa / Brussels, 8 avril 2026 – L'Africa CDC a annoncé avoir sécurisé plus de 250 millions de dollars américains lors du Sommet One Health de Lyon, en France, marquant un tournant décisif dans le positionnement du continent africain sur la scène de la santé mondiale. Cette mobilisation financière vise à renforcer la sécurité sanitaire continentale et à affirmer la souveraineté de l'Afrique dans l'architecture mondiale de la santé. L'Africa CDC a réaffirmé un principe fondamental : les partenariats doivent s'aligner sur les priorités, les systèmes et le leadership africains, afin de passer de la fragmentation à la coordination. Ces engagements seront discutés avec les dirigeants africains lors de plusieurs réunions de haut niveau prévues en 2026, notamment le Sommet régional de l'OMS en avril à Nairobi, l'Africa Forward en mai, et le Sommet sur la résistance aux antimicrobiens à Abuja en juin.","date":"2026-06-17"},
{"title":"WHO and Africa CDC Declare the 2026 Ebola Outbreak a Public Health Emergency of International Concern","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"The World Health Organization and Africa CDC have jointly declared the 2026 Bundibugyo Virus Disease (BVD) outbreak a Public Health Emergency, as the situation in the Democratic Republic of Congo and Uganda continues to deteriorate. The declaration underscores the severity of the ongoing transmission dynamics, particularly in the DRC's Ituri Province, which accounts for the vast majority of confirmed cases and deaths. Both organizations have called for accelerated international support, enhanced cross-border coordination, and rapid deployment of medical countermeasures to contain the epidemic. Africa CDC emphasized the critical importance of community engagement and the strengthening of Public Health Emergency Operations Centres (PHEOCs) across member states to mount an effective and coordinated continental response.","date":"2026-06-15"},
{"title":"Épidémie de maladie à virus Bundibugyo : Africa CDC publie son rapport situationnel du 9 juin 2026","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-may-9-2026","content":"L'Africa CDC a publié son dernier rapport situationnel sur l'épidémie de maladie à virus Bundibugyo (BVD), détaillant la situation au 9 juin 2026. Au total, 645 cas confirmés et 114 décès ont été enregistrés en République Démocratique du Congo (RDC) et en Ouganda, soit un taux de létalité d'environ 17,7 %. La Province de l'Ituri en RDC reste l'épicentre de l'épidémie, représentant 93 % des cas dans 18 des 36 zones de santé. En Ouganda, la situation est stable avec 19 cas confirmés et 2 décès, sans nouveau cas signalé dans les dernières 24 heures. La surveillance active comprend le traçage quotidien des contacts, les investigations de cas, la surveillance de la mortalité et le contrôle sanitaire aux points d'entrée. Plus de 956 échantillons ont été testés avec un taux de positivité de 1,9 % en Ouganda. Deux laboratoires mobiles opèrent aux postes-frontières de Bwera et Arua, garantissant un délai de rendu de résultats inférieur à 24 heures.","date":"2026-06-15"},
{"title":"Africa CDC et l'OMS annoncent un plan conjoint de réponse à l'épidémie d'Ebola en RDC et en Ouganda","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'Africa Centers for Disease Control and Prevention (Africa CDC) et l'Organisation Mondiale de la Santé (OMS) ont annoncé le 5 juin 2026 un plan conjoint de lutte contre l'épidémie d'Ebola qui se propage actuellement en République Démocratique du Congo et en Ouganda. Ce plan coordonné vise à renforcer la surveillance, la détection des cas, le traçage des contacts et les mesures de prévention et de contrôle des infections aux points d'entrée et de sortie des pays touchés. Les deux institutions mobilisent une équipe de gestion des incidents (IMST) au niveau continental pour coordonner la réponse sur le terrain.","date":"2026-06-13"},
],
"african-medical-agency":[
{"title":"WHO and African Medicines Agency sign landmark regulatory cooperation framework at WHA79","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"The World Health Organization and the African Medicines Agency (AMA) signed a landmark Framework Agreement for Collaboration at the 79th World Health Assembly in May 2026, establishing a structured partnership to advance regulatory harmonization, strengthen pharmacovigilance, and improve access to quality-assured health products across Africa. The signing, held during a high-level ministerial side event at WHA79 in Geneva, marks the beginning of a phased AMA implementation roadmap: Foundation (2024-2025), Expansion (2026-2030), and Maturity (2031 onward). Under the agreement, WHO and AMA will jointly accelerate approval processes for safe and effective medicines, combat substandard and falsified products, and support innovation, local production, and regulatory preparedness during public health emergencies. The framework is a critical enabler of Africa's pharmaceutical sovereignty, expected to reduce drug approval timelines and strengthen regulatory capacity across all 55 AU member states.","date":"2026-05-21"},
{"title":"Frontiers in Medicine : analyse historique et perspectives d'avenir de l'Agence Africaine des Médicaments","url":"https://www.frontiersin.org/journals/medicine/articles/10.3389/fmed.2026.1763261/full","content":"Une étude approfondie publiée en 2026 dans Frontiers in Medicine retrace l'histoire de l'Agence Africaine des Médicaments (AMA) depuis le Plan de fabrication pharmaceutique pour l'Afrique de 2009 jusqu'à l'adoption du Traité instituant l'AMA en 2019 et son opérationnalisation progressive. Les auteurs analysent la structure institutionnelle de l'agence, ses mécanismes de gouvernance et son mandat d'harmonisation réglementaire au sein des 55 États membres de l'Union Africaine. L'étude identifie les leviers et obstacles majeurs : financement pérenne, renforcement des capacités techniques nationales et engagement politique des États membres. Elle note qu'une harmonisation réglementaire continentale effective pourrait réduire les délais d'approbation des médicaments jusqu'à 60 % et générer des économies substantielles dans la chaîne d'approvisionnement pharmaceutique. Les auteurs appellent à l'accélération de la ratification du Traité AMA par tous les États membres pour consolider le mandat continental de l'agence.","date":"2026-06-01"},
{"title":"EMA Emergency Task Force engages with AMA on Ebola medical countermeasures at June 2026 board meeting","url":"https://www.ema.europa.eu/en/news/ema-management-board-highlights-june-2026-meeting","content":"At its June 2026 Management Board meeting, the European Medicines Agency (EMA) highlighted the engagement of its Emergency Task Force with the newly established African Medicines Agency (AMA) and participating African national regulatory authorities in discussions on clinical trial designs and medical countermeasures targeting the Bundibugyo Ebola virus. This collaboration builds on the first formal joint scientific engagement between EMA and AMA initiated in June 2026, representing a milestone in regulatory capacity-building for Africa during public health emergencies. The joint discussions aim to establish coordinated and efficient regulatory pathways for the evaluation and emergency authorization of experimental vaccines and therapeutics against the Bundibugyo strain. The initiative significantly reduces Africa's dependency on external regulators and strengthens the continent's ability to respond to future health emergencies with greater speed and regulatory sovereignty.","date":"2026-06-15"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
{"title":"L'Agence Africaine du Médicament : un pilier en construction pour la souveraineté sanitaire du continent","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Alors que l'Afrique renforce ses institutions de santé publique face aux épidémies récurrentes, l'Agence Africaine du Médicament (AMA) demeure un chantier stratégique prioritaire de l'Union Africaine. En parallèle des efforts déployés par Africa CDC pour contenir l'épidémie d'Ebola en RDC et en Ouganda, l'AMA travaille à l'harmonisation des cadres réglementaires du médicament à l'échelle continentale. Son rôle est crucial pour garantir l'accès à des médicaments et vaccins de qualité, en particulier lors des situations d'urgence sanitaire. Les experts appellent à une accélération de l'opérationnalisation complète de l'AMA, afin que l'Afrique puisse disposer d'un organe de régulation pharmaceutique indépendant et pleinement fonctionnel avant la prochaine grande crise sanitaire.","date":"2026-06-07"},
],
"manufacture-vaccins":[
{"title":"Landmark deal establishes Africa's first end-to-end mRNA vaccine production platform in Egypt","url":"https://healthpolicy-watch.news/landmark-vaccine-deals-signal-africas-shift-toward-local-manufacturing/","content":"A landmark agreement signed in Cairo between EVA Pharma (Egypt) and European biotech partners will establish Africa's first digital-to-biologics end-to-end mRNA vaccine production platform, with an annual capacity of up to 100 million doses, backed by a 1.2 billion dollar investment package from Gavi through the African Vaccine Manufacturing Accelerator (AVMA). This deal represents a transformative step in Africa's drive toward vaccine self-sufficiency, positioning Egypt as a continental hub for advanced biopharmaceutical manufacturing. Currently, less than 1% of vaccines used across Africa are locally produced, with South Africa, Egypt, Ethiopia, Algeria, and Senegal as the only countries with autonomous drug substance manufacturing capabilities. Industry experts noted that the initiative provides a replicable model for technology transfer and scale-up across the continent, particularly critical for pandemic preparedness and future outbreak responses.","date":"2026-06-10"},
{"title":"Africa CDC establishes regional networks to strengthen Africa's vaccine manufacturing workforce","url":"https://africacdc.org/news-item/regional-networks-to-strengthen-africas-vaccine-and-health-products-manufacturing-workforce/","content":"Africa CDC has launched regional workforce development networks across West, East, Central, and Southern Africa to address the critical human capital gap in the continent's vaccine and health products manufacturing sector. A 2026 industry review revealed that Africa's current workforce of approximately 3,000 vaccine manufacturing and R&D employees needs to be quadrupled to reach the continental target of producing 60% of vaccines locally by 2040 — compared to less than 1% today. The regional networks will coordinate training programs, technology transfer partnerships, and mentorship schemes to develop specialized skills in bioprocessing, quality assurance, and regulatory affairs. Between 2025 and 2030, three African manufacturers are targeted to achieve WHO Prequalification for eight different vaccine products, representing a landmark milestone in continental manufacturing credibility and market access.","date":"2026-04-20"},
{"title":"Next batch of AU-IBAR locally produced FMD vaccines signals rise in African veterinary vaccine production","url":"https://www.africanfarming.com/2026/04/14/fmd-next-batch-of-arcs-locally-produced-vaccines-signal-rise-in-production/","content":"The African Union Inter-African Bureau for Animal Resources (AU-IBAR) released the next batch of locally produced foot-and-mouth disease (FMD) vaccines in April 2026, marking a milestone in the continent's growing capacity for veterinary biologics manufacturing. This development aligns with Africa's broader One Health strategy and demonstrates that vaccine production capabilities are expanding beyond human health, with important implications for food security across the continent where FMD outbreaks devastate livestock economies. Regional manufacturing of FMD vaccines reduces logistical costs and dependency on imports from Europe and Asia, while enabling faster supply chain responses during outbreaks. The initiative is supported by regional vaccine manufacturing networks and serves as an early proof of concept for scaling up African-led production of biological products across multiple sectors.","date":"2026-04-14"},
{"title":"Medical Countermeasures for Bundibugyo Virus Disease: Africa CDC Mobilizes Manufacturing and Diagnostic Capacity","url":"https://khub.africacdc.org/records/sub-theme/medical-countermeasures","content":"As the Bundibugyo Virus Disease (BVD) outbreak intensifies across the Democratic Republic of Congo and Uganda, Africa CDC has highlighted the urgent need to scale up the production and deployment of medical countermeasures. The organization's Medical Countermeasures hub is coordinating the provision of diagnostic tools, therapeutics, and personal protective equipment to affected regions. Mobile laboratories have been deployed at key border crossings including Bwera and Arua, enabling rapid sample testing with turnaround times of under 24 hours. Africa CDC is also working with partners to accelerate the development and manufacturing of potential vaccine candidates against the Bundibugyo Ebola virus strain, drawing lessons from previous Ebola vaccine development cycles. Strengthening local African manufacturing capacity for vaccines and diagnostics remains a core priority in the continent's health security strategy.","date":"2026-06-15"},
{"title":"Face à l'épidémie Ebola Bundibugyo, l'absence de vaccins homologués met en lumière les lacunes de la production africaine","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"Le rapport de situation du 31 mai 2026 sur l'épidémie de maladie à virus Bundibugyo (BVD) en RDC et en Ouganda soulève une problématique cruciale : l'absence de vaccins ou de thérapeutiques homologués contre ce variant d'Ebola. Dans ce contexte, Africa CDC insiste sur l'importance des fondamentaux de santé publique — traçage des contacts, isolement des cas, équipements de protection — en l'absence d'outils biologiques disponibles. Cette situation met en évidence l'urgence d'investir dans la fabrication locale de vaccins sur le continent africain, afin que l'Afrique ne soit plus tributaire de solutions développées en dehors de ses frontières lors de futures crises sanitaires.","date":"2026-06-12"},
{"title":"Production de vaccins contre Ebola : l'Afrique face à l'urgence de renforcer ses capacités manufacturières","url":"https://khub.africacdc.org/events/3","content":"Face à la flambée épidémique de la maladie à virus Ebola de type Bundibugyo en Afrique centrale, l'absence de vaccins et de thérapeutiques spécifiquement homologués contre ce sous-type viral met en lumière les lacunes critiques dans les capacités de fabrication de vaccins sur le continent africain. Africa CDC a publié une correspondance soulignant que, sans vaccins ni traitements disponibles contre le virus Bundibugyo, les mesures fondamentales de santé publique restent le seul rempart disponible. Cette situation renforce l'urgence d'investir dans la production locale de vaccins en Afrique, afin de réduire la dépendance aux chaînes d'approvisionnement mondiales et de garantir une réponse rapide lors des futures épidémies.","date":"2026-06-10"},
],
"unicef-gavi":[
{"title":"Gavi launches Phase 6 strategy (2026-2030): vaccinate 500 million more children, save 8-9 million lives","url":"https://www.gavi.org/our-alliance/strategy/phase-6-2026-2030","content":"Gavi, the Vaccine Alliance, officially launched its Phase 6 strategic plan (2026-2030), setting ambitious goals to support countries in vaccinating over 500 million additional children and adolescents, with the aim of saving 8 to 9 million more lives compared to the previous strategic period. HPV vaccine coverage is a central priority, with a target of protecting 1.5 million more girls and women against cervical cancer — a disease that disproportionately affects low- and middle-income countries. Phase 6 also includes 189 million dollars earmarked for the AVMA+ package to support African vaccine manufacturing ecosystems and guarantee demand for locally produced doses. The strategy reflects an evolving Gavi model that goes beyond procurement support to encompass systemic strengthening of routine immunization infrastructure, supply chain resilience, and market shaping for health equity in Africa and beyond.","date":"2026-06-01"},
{"title":"The Big Catch-Up delivers over 100 million childhood vaccinations to 18.3 million children in 36 countries","url":"https://www.unicef.org/esa/press-releases/largest-catch-initiative-delivers-over-100-million-childhood-vaccinations","content":"UNICEF announced the successful conclusion of the Big Catch-Up (BCU) immunization campaign, which delivered over 100 million doses of life-saving vaccines to 18.3 million children aged 1 to 5 across 36 countries — primarily in Africa and Asia — with the programme concluding on 31 March 2026. Designed to address immunization gaps caused by COVID-19-related health system disruptions, the BCU is on track to meet its final target of reaching 21 million children who missed routine vaccines between 2020 and 2022. In Africa, the programme played a crucial role in countries such as Nigeria, Ethiopia, and the DRC, where vaccination coverage had fallen sharply during the pandemic. UNICEF credited the success to intensive community engagement, deployment of mobile vaccination teams, and strong governmental commitment, and called for sustained investment in routine immunization beyond emergency catch-up campaigns.","date":"2026-04-24"},
{"title":"Gavi seeks board approval for $189 million AVMA+ package to guarantee market for African-made vaccines","url":"https://www.devex.com/news/inside-gavi-s-189-million-plan-to-boost-africa-s-vaccine-ecosystem-112721","content":"Gavi, the Vaccine Alliance is seeking board approval for AVMA+, a 189 million dollar funding package designed to de-risk investment in African vaccine manufacturing by guaranteeing direct procurement commitments for up to 70 million vaccine doses produced on the continent annually. The package builds on the existing African Vaccine Manufacturing Accelerator (AVMA), which has already unlocked over 1.2 billion dollars in financing commitments over the coming decade. AVMA+ addresses a critical market barrier that has historically deterred manufacturers from scaling up production in Africa: the absence of guaranteed demand for locally made vaccines. Devex reports that the initiative is expected to catalyze additional investment from development finance institutions and private sector partners, and is seen as a critical tool in Africa's broader ambition to manufacture 60% of its vaccines locally by 2040.","date":"2026-05-15"},
{"title":"Mental Health Leadership Course in Africa: Africa CDC Opens Applications with Scholarship Support","url":"https://www.instagram.com/p/DShzmNwgpF4","content":"Africa CDC has launched a call for applications for its Mental Health Leadership and Advocacy Course, scheduled for 3-14 August 2026 at the Ibadan Business School in Bodija, Ibadan, Nigeria. Scholarships are available to support participants, reflecting Africa CDC's commitment to building human capital across the continent's health sector. The initiative is part of broader efforts by Africa CDC and its partners, including UNICEF, to strengthen mental health systems and leadership capacity across African Union member states. Applications are open until 26 June 2026.","date":"2026-06-13"},
{"title":"Gavi et UNICEF mobilisés face à l'urgence sanitaire Ebola en Afrique centrale et orientale","url":"https://www.npr.org/2026/06/05/nx-s1-5848082/ebola-virus-cdc-outbreak-democratic-republic-congo-uganda","content":"Alors que l'épidémie d'Ebola Bundibugyo continue de s'étendre en République Démocratique du Congo et en Ouganda, avec plus de 300 cas confirmés et des projections alarmantes pouvant rivaliser avec l'épidémie ouest-africaine de 2014-2016 (20 000 cas, 4 000 morts), Gavi et l'UNICEF intensifient leurs efforts de coordination humanitaire et de soutien logistique. Les deux organisations jouent un rôle clé dans l'approvisionnement en équipements médicaux, le soutien aux systèmes de santé locaux et la mobilisation communautaire pour freiner la progression du virus dans les zones les plus affectées, notamment la province de l'Ituri au Congo.","date":"2026-06-12"},
{"title":"UNICEF and Gavi mobilize support as Ebola emergency threatens to overwhelm East and Central Africa","url":"https://www.facebook.com/NewsContent.CCTVPLUS/videos/africa-cdc-who-launch-response-plan-to-contain-ebolathe-africa-centers-for-disea/1758110012018147","content":"As the Ebola outbreak in the Democratic Republic of Congo and Uganda continues to escalate, international partners including UNICEF and Gavi, the Vaccine Alliance, are being called upon to scale up their support. The continental preparedness and response plan launched on June 5, 2026 by Africa CDC and WHO requires $518 million in international backing, with multilateral agencies expected to play a key role in logistics, supply chain management, and immunization support. UNICEF, which maintains one of the world's largest humanitarian supply chains, is positioned to assist in the delivery of medical equipment, personal protective equipment, and community engagement campaigns. Gavi, meanwhile, is exploring options to support the expedited development and potential emergency use authorization of candidate vaccines targeting the Bundibugyo Ebola strain, in line with its mandate to expand vaccine access in low-income countries.","date":"2026-06-09"},
],
"sante-maroc":[
{"title":"Le Maroc alloue 42,4 milliards de dirhams à la santé en 2026, avec 8 000 nouveaux postes budgétaires","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le budget du ministère marocain de la Santé et de la Protection sociale atteint en 2026 un niveau historique de 42,4 milliards de dirhams, en hausse de 30 % par rapport à l'exercice précédent, dont 16,4 milliards de dirhams consacrés aux dépenses de personnel. Cette enveloppe record s'accompagne de la création de 8 000 nouveaux postes budgétaires destinés à résorber la pénurie chronique de professionnels de santé, notamment dans les zones rurales et montagneuses du Royaume. Les ressources financeront la construction de nouveaux centres hospitaliers universitaires, la mise à niveau et rénovation de 90 hôpitaux existants, la généralisation progressive des groupements sanitaires territoriaux (GST) et le déploiement de la feuille de soins électronique. Ces investissements s'inscrivent dans la réforme globale du système de santé engagée par le gouvernement marocain pour accélérer la couverture sanitaire universelle et réduire les inégalités d'accès aux soins.","date":"2026-01-15"},
{"title":"Maroc : les groupements sanitaires territoriaux entrent en phase de généralisation comme pivot de la régionalisation sanitaire","url":"https://medias24.com/2025/11/05/rehabilitation-dhopitaux-nouveaux-chu-et-generalisation-des-gst-les-principaux-projets-du-ministere-de-la-sante-en-2026/","content":"Le ministère de la Santé et de la Protection sociale a annoncé la généralisation des groupements sanitaires territoriaux (GST) en 2026, une réforme présentée comme le principal levier de la régionalisation du système de soins au Maroc. Ces nouvelles entités régionales intègrent les établissements de soins de santé primaire et les hôpitaux au sein d'une même structure de pilotage territorial, visant à améliorer la coordination des soins et l'allocation des ressources humaines. L'année 2026 verra également la finalisation du CHU d'Agadir, portant à cinq le nombre de centres hospitaliers universitaires opérationnels — aux côtés de ceux de Rabat, Casablanca, Marrakech et Fès. La généralisation de la feuille de soins électronique figure parmi les autres priorités du ministère, visant à améliorer l'expérience patient et la traçabilité médicale dans l'ensemble du système de soins.","date":"2026-05-15"},
{"title":"Réforme de l'état social marocain : la santé change d'échelle entre ambition budgétaire et résistances structurelles","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"Le Maroc accélère en 2026 la mise en œuvre d'une réforme sanitaire ambitieuse, marquée par une hausse de 30 % du budget de la santé à 42,4 milliards de dirhams et la création de 8 000 nouveaux postes, mais qui se heurte à des résistances de terrain de la part de syndicats et de professionnels du secteur public. La pénurie de médecins, infirmiers et techniciens dans les zones rurales et montagneuses demeure un défi structurel accumulé sur plusieurs décennies, que le gouvernement espère atténuer grâce à de nouvelles incitations financières et des mécanismes d'affectation prioritaire dans les zones sous-dotées. Les experts soulignent que la réussite de cette réforme — généralisation de la couverture sanitaire universelle, des GST et numérisation des soins — dépendra d'une mobilisation politique soutenue bien au-delà des seules mesures budgétaires annuelles. Le Maroc ambitionne ainsi de moderniser en profondeur un système de santé longtemps marqué par les inégalités d'accès territoriales.","date":"2026-06-10"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},
{"title":"Le Maroc renforce sa veille sanitaire face à la propagation de l'épidémie d'Ebola en Afrique centrale","url":"https://www.ecdc.europa.eu/sites/default/files/documents/Communicable-disease-threa","content":"Alors que l'épidémie d'Ebola continue de s'étendre en République démocratique du Congo et en Ouganda, le Royaume du Maroc a activé ses mécanismes de surveillance épidémiologique renforcée aux points d'entrée du territoire, notamment dans les aéroports internationaux de Casablanca, Rabat et Marrakech. Le ministère de la Santé et de la Protection sociale suit de près l'évolution de la situation en coordination avec l'Organisation mondiale de la Santé et Africa CDC. Le Maroc, dont le système de santé a été considérablement renforcé depuis la pandémie de Covid-19, dispose de protocoles de détection et d'isolement adaptés aux fièvres hémorragiques virales. Les autorités sanitaires rappellent qu'aucun cas n'a été détecté sur le territoire national à ce jour, tout en appelant à la vigilance, notamment parmi les voyageurs en provenance des zones affectées.","date":"2026-06-09"},
],
"vaccins-monde":[
{"title":"WHO announces resumption of preventive cholera vaccination as global supply reaches critical milestone","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"The World Health Organization announced in February 2026 the resumption of preventive oral cholera vaccination campaigns after a prolonged period of critical global supply shortages that had forced suspension of pre-exposure vaccination in endemic countries. The restoration of adequate cholera vaccine supply marks a significant public health milestone, enabling WHO and partners to resume both reactive emergency and preventive campaigns in countries facing chronic cholera transmission, including several in sub-Saharan Africa and South Asia where over 700,000 cases were reported in 2025 across more than 40 countries. WHO emphasized that preventive vaccination must be combined with water, sanitation, and hygiene (WASH) investments to sustainably reduce cholera burden, noting that reactive campaigns alone cannot break endemic transmission chains. The announcement was welcomed by Gavi and UNICEF, both of which play key roles in procuring and distributing oral cholera vaccines for low-income countries.","date":"2026-02-04"},
{"title":"Global childhood vaccination holds steady but over 14 million infants remain completely unvaccinated, WHO and UNICEF warn","url":"https://www.unicef.org/press-releases/global-childhood-vaccination-holds-steady-yet-over-14-million-infants-remain","content":"A joint WHO and UNICEF report released in 2026 reveals that global childhood vaccination coverage has remained broadly stable, but over 14 million infants worldwide are still completely unvaccinated — representing a persistent and critical gap threatening decades of public health progress. The report warns of a surge in vaccine-preventable disease outbreaks, driven by declining political will in some high-income countries, rising vaccine hesitancy, and severely disrupted health systems in conflict-affected and fragile states. Measles outbreaks are resurging in countries that had previously achieved elimination status, illustrating the fragility of hard-won immunization gains. In sub-Saharan Africa, coverage progress has been uneven, with the DRC and several other conflict-affected nations remaining well below WHO targets. WHO and UNICEF called for urgent reinvestment in routine immunization systems and stepped-up advocacy to counter misinformation and restore public trust in vaccines.","date":"2026-06-01"},
{"title":"WHO recommends LP.8.1 as latest COVID-19 vaccine antigen while RSV immunization for pregnant women gains priority","url":"https://polygonhealthanalytics.com/vaccine-news-may-27-june-03-2026-2026-06-03-13-40-31/","content":"The World Health Organization issued updated technical guidance in May 2026 recommending the monovalent LP.8.1 variant as the preferred antigen composition for updated COVID-19 vaccines, reflecting the continued evolution of SARS-CoV-2. WHO specified that vaccination should not be delayed pending access to LP.8.1 formulations, as JN.1 lineage antigens remain suitable alternatives. RSV vaccination for pregnant women was simultaneously highlighted as a 2026 global health priority, noting that the pre-fusion protein vaccine safely transfers protective antibodies to newborns before birth, providing critical protection during the first months of life. A parallel concern raised in the guidance is vaccine supply delays affecting children in nearly 100 countries as of early June 2026, underscoring the fragility of global immunization supply chains and the need for more resilient regional production capacities.","date":"2026-06-03"},
{"title":"Briefing OMS Afrique : la riposte vaccinale contre Ebola Bundibugyo au centre des discussions","url":"https://www.youtube.com/watch?v=Gp9tFTr5a9Y","content":"Lors du briefing presse virtuel de l'OMS Afrique du 4 juin 2026, les experts ont fait le point sur la stratégie de riposte à l'épidémie de maladie à virus Ebola de type Bundibugyo en RDC et en Ouganda. Les discussions ont notamment porté sur les outils de prévention disponibles, les protocoles de vaccination d'urgence et les défis du traçage des contacts dans les zones affectées. L'OMS a souligné l'importance du déploiement rapide des équipes de réponse et la nécessité de renforcer les capacités locales de gestion des épidémies. Les intervenants ont également évoqué les cas importés en Ouganda et les mesures de quarantaine mises en place, saluant la capacité des autorités ougandaises à détecter et isoler rapidement les cas suspects grâce aux protocoles de surveillance renforcés.","date":"2026-06-17"},
{"title":"Third Reaffirmation of Mpox Emergency: Africa CDC and WHO Call for Accelerated Global Immunization Efforts","url":"https://khub.africacdc.org/records/resource?id=405","content":"Africa CDC and the World Health Organization have jointly issued a third reaffirmation of the mpox public health emergency, underscoring the persistent threat posed by the virus across the African continent and beyond. The declaration highlights a continued increase in mpox cases, including in Cameroon, and points to the emergence of the novel clade Ib strain in Central Africa as a particular cause for global concern. Researchers have conducted comprehensive phylogenetic and mutational analyses of the Monkeypox virus (MPXV) across sub-Saharan Africa between 2022 and 2024, revealing significant genomic diversity. Community health workers have been identified as a key resource in halting outbreaks at the local level. Both organizations are calling on the international community to accelerate vaccine research and deployment, scale up immunization campaigns in high-risk areas, and invest in surveillance infrastructure to monitor the evolving epidemiology of mpox across the continent.","date":"2026-06-15"},
{"title":"Africa CDC lance sa promotion 2026 de Jeunes Champions de la Santé Numérique pour transformer l'avenir sanitaire du continent","url":"https://youth.africacdc.org/2026-cohort-of-young-digital-health-champions-to-transform-africas-health-future-announced","content":"Africa CDC a annoncé sa promotion 2026 de Jeunes Champions de la Santé Numérique (Y-DHC), une initiative visant à identifier et connecter de jeunes leaders qui façonnent activement le paysage de la santé numérique en Afrique. Dans le cadre de la stratégie YES!Health 2025-2028, ces champions joueront un rôle clé dans l'innovation en matière de vaccination et de santé publique numérique, contribuant à accélérer l'adoption des technologies de santé, notamment les registres de vaccination électroniques et les systèmes de suivi immunologique. Des cohortes régionales ont été sélectionnées pour l'Afrique centrale, orientale, septentrionale, australe et occidentale.","date":"2026-06-13"},
{"title":"L'OMS déclare l'urgence sanitaire internationale : la riposte mondiale à Ebola Bundibugyo s'organise","url":"https://www.instagram.com/reel/DZSK8Doilyr","content":"L'Organisation Mondiale de la Santé, conjointement avec Africa CDC, a lancé le 5 juin 2026 un plan continental de préparation et de réponse à l'épidémie de maladie à virus Ebola Bundibugyo, couvrant la période juin-novembre 2026. Ce plan, présenté lors d'une conférence de presse conjointe, mobilise des ressources internationales pour soutenir la surveillance épidémiologique, la vaccination expérimentale et la recherche clinique en contexte d'urgence. La campagne mondiale de riposte vise à contenir la progression du virus dans les pays affectés — principalement la RDC et l'Ouganda — tout en alertant la communauté internationale sur la nécessité d'investir dans des vaccins efficaces contre les variants d'Ebola moins connus.","date":"2026-06-12"},
],

function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent="18 juin 2026";
renderCategories();
renderArticles();
</script>
</body>
</html>
