var articlesData={
"african-cdc":[
{"title":"Africa CDC Weekly Brief | 8-14 June 2026: Ebola Response, Exit Screening and High-Level Summit","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-8-14-june-2026/","content":"Africa CDC's weekly brief for 8-14 June 2026 documents the intensifying Bundibugyo Virus Disease outbreak in DRC and Uganda, with 896 confirmed cases and 232 deaths as of 17 June. The brief calls on all 55 AU Member States to immediately strengthen exit screening at airports, seaports, and land borders, deploying trained health personnel with thermal scanners and rapid diagnostic tools. It previews the High-Level Meeting of African Heads of State and Partners convened on 16 June 2026 to mobilize political will and funding for the joint Africa CDC-WHO $518 million continental response plan. Africa CDC Director-General Jean Kaseya urged a unified approach emphasizing speed and continental solidarity to contain the outbreak before it becomes the deadliest in history.","date":"2026-06-14"},
{"title":"Africa CDC Urges All 55 AU Member States to Reinforce Exit Screening at International Points of Entry","url":"https://www.globalsecurity.org/security/library/news/2026/06/sec-260610-africacdc02.htm","content":"Africa CDC has formally called on all 55 African Union Member States to immediately reinforce exit screening and public health protocols at international points of entry — airports, seaports, and major land borders — to prevent cross-border spread of the Bundibugyo Ebola outbreak affecting DRC and Uganda. The directive recommends deploying health personnel equipped with thermal imaging systems and rapid antigen diagnostic tools at all major crossings, following confirmed transmission from DRC's epicenter in Ituri Province into Uganda. This call preceded the High-Level Summit of African Heads of State on 16 June 2026, where political mobilization and resource allocation for the joint $518 million response plan were central agenda items. Africa CDC stressed that coordinated border-health protocols are critical to preventing further regional and continental spread.","date":"2026-06-10"},
{"title":"Africa CDC Epidemic Intelligence Weekly Report — June 2026: 15 Active Outbreaks Under Continental Surveillance","url":"https://africacdc.org/download/africa-cdc-epidemic-intelligence-weekly-report-june-2026/","content":"Africa CDC's Epidemic Intelligence Weekly Report for June 2026 documents 15 simultaneous disease outbreaks under active surveillance across the continent. The Bundibugyo Virus Disease outbreak in DRC and Uganda remains the most critical with 896 confirmed cases and 232 deaths, but the report also tracks cholera in Sudan and DRC, mpox across Central and West Africa, and meningitis outbreaks in the Sahel region. Africa CDC epidemiology teams are coordinating with national health authorities, WHO, and regional partners to ensure rapid detection and containment across multiple simultaneous disease threats. The report underscores the urgent need for sustained investment in continental surveillance infrastructure and interoperable laboratory networks to address Africa's compounding multi-disease burden.","date":"2026-06-20"},
{"title":"Africa CDC Weekly Briefing: Live Update on Ebola Outbreak Response – June 11, 2026","url":"https://www.facebook.com/africacdc/videos/livespecial-briefing-on-ebola-outbreak-response-june-11-2026/27939040969031174","content":"Africa CDC held its weekly live briefing on June 11, 2026, providing the latest updates on the Ebola outbreak response in the Democratic Republic of Congo and Uganda. Aligned with the Africa Health Security and Sovereignty (AHSS) Agenda, the briefing highlighted coordinated response actions undertaken by African Union Member States and partners to strengthen prevention, preparedness, detection, and response systems across the continent. The session also underscored Africa CDC's broader mission to advance health security on the continent, including the upcoming Africa Health ExCon 2026 conference co-hosted with Egypt, which will bring together healthcare leaders, innovators, policymakers, and investors.","date":"2026-06-24"},
{"title":"Africa CDC Warns Ebola Outbreak in DRC Could Become Worst on Record","url":"https://www.democracynow.org/2026/6/17/headlines/africa_cdc_warns_ebola_outbreak_in_drc_could_become_worst_on_record","content":"The Africa Centres for Disease Control and Prevention (Africa CDC) has issued a stark warning: the Ebola outbreak currently ravaging the Democratic Republic of Congo risks becoming the deadliest in history. As of June 17, 2026, confirmed cases have risen to 837, with an official death toll approaching 200. Africa CDC officials stressed that additional funding is urgently needed to trace potential infections and halt further spread of the Bundibugyo Virus Disease (BVD), which has been spreading primarily in the Ituri province and extending into North Kivu, South Kivu, and Uganda.","date":"2026-06-24"},
{"title":"South Africa Pledges $2.5 Million to Africa CDC's Africa Epidemics Fund for Ebola Response","url":"https://dirco.gov.za/africa-cdc-strengthens-the-capacity-and-capability-of-africas-public-health-institutions-as-well-as-partnerships-to-detect-and-respond-quickly-and-effectively-to-disease-threats-and-outbreaks","content":"The Africa Centres for Disease Control and Prevention (Africa CDC) has welcomed a US$2.5 million pledge from the Government of South Africa to support the ongoing Ebola response in the Democratic Republic of the Congo (DRC) and Uganda through the Africa CDC Africa Epidemics Fund. Announced on May 20, 2026, from Addis Ababa, this contribution reinforces Africa CDC's mission to strengthen the capacity and capability of Africa's public health institutions and partnerships to detect and respond quickly and effectively to disease threats and outbreaks. The pledge comes amid growing calls for African nations to support the continent's own health security infrastructure, with Africa CDC urging other countries with resources to follow South Africa's lead in funding regional coordinating centers and laboratory capacities.","date":"2026-06-23"},
{"title":"Africa CDC Bundibugyo Virus Disease Outbreak: Situational Report of June 12, 2026","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-june-12-2026","content":"The Bundibugyo Virus Disease (BVD) outbreak across the Democratic Republic of Congo (DRC) and Uganda as of June 12, 2026, presents a serious public health challenge with active community transmission. The outbreak epicenter remains mainly in Ituri Province of the DRC, accounting for the majority of cases, while Uganda has reported a smaller but significant number of confirmed cases. Africa CDC, alongside national health authorities, is closely monitoring and responding with multi-layered interventions encompassing surveillance, infection prevention, case management, risk communication, and coordination. Over 956 samples have been tested with rapid turnaround times supported by mobile laboratories at key border points. Cross-border coordination between DRC and Uganda includes temporary border closures restricting non-essential travel. Africa CDC underscores that continued vigilance and strengthened health systems remain paramount to controlling the outbreak.","date":"2026-06-23"},
{"title":"Africa CDC and WHO Launch Continental Ebola Preparedness and Response Plan Worth $518 Million","url":"https://english.news.cn/20260605/c7bb31dfb3b9471ca8687fef2a52789d/c.html","content":"The Africa Centers for Disease Control and Prevention (Africa CDC) and the World Health Organization (WHO) launched on Friday a continental Ebola outbreak preparedness and response plan, aiming to coordinate efforts to contain the ongoing outbreak. The plan seeks to raise 518 million U.S. dollars to support African countries in preparing for, rapidly detecting, and responding to the outbreak between June and November 2026. Africa CDC Director-General Jean Kaseya stated that the joint plan 'gives the continent a clear path to act with speed and unity to save lives, support the affected countries, and protect neighboring communities.' WHO Director-General Tedros Adhanom Ghebreyesus underscored the urgent need for enhanced collaboration among affected and at-risk countries as well as continental and international partners.","date":"2026-06-23"},
],
"african-medical-agency":[
{"title":"WHO and African Medicines Agency Launch Landmark Collaboration Framework to Strengthen Health Product Access in Africa","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"On 21 May 2026, WHO and the African Medicines Agency (AMA) signed a landmark Framework Agreement for Collaboration, marking a pivotal milestone in harmonizing pharmaceutical regulation across Africa. The agreement encompasses five strategic pillars: accelerating access to safe and effective health products, promoting regulatory harmonization and reliance, strengthening pharmacovigilance, building regulatory workforce capacity, and supporting local production during health emergencies. This collaboration is particularly timely given the Bundibugyo Ebola outbreak affecting DRC and Uganda, where rapid regulatory pathways for emergency-use vaccines and therapeutics are urgently needed. WHO Director-General Tedros Adhanom Ghebreyesus described the framework as a cornerstone for Africa's pharmaceutical sovereignty and continental health security.","date":"2026-05-21"},
{"title":"African Medicines Agency and US Pharmacopeia Sign MoU to Strengthen Medicines Regulation Across the Continent","url":"https://www.cleanroomtechnology.com/african-medicines-agency-and-usp-sign-agreement-to","content":"The African Medicines Agency (AMA) and the US Pharmacopeia (USP) signed a Memorandum of Understanding in Johannesburg on 29 April 2026, formalizing a strategic partnership to strengthen medicines regulation, quality assurance, and pharmaceutical manufacturing systems across Africa. The agreement aims to harmonize quality standards for medicines and health products, train regulatory scientists, and support the development of African pharmacopeial standards aligned with international benchmarks. This partnership aligns with AMA's Expansion Phase (2026-2030) and provides African regulators access to scientific and technical expertise from USP, whose standards are referenced in more than 140 countries worldwide. The collaboration is expected to accelerate the path to market for African-manufactured vaccines and essential medicines.","date":"2026-04-29"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
{"title":"L'Agence Africaine du Médicament : un pilier en construction pour la souveraineté sanitaire du continent","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Alors que l'Afrique renforce ses institutions de santé publique face aux épidémies récurrentes, l'Agence Africaine du Médicament (AMA) demeure un chantier stratégique prioritaire de l'Union Africaine. En parallèle des efforts déployés par Africa CDC pour contenir l'épidémie d'Ebola en RDC et en Ouganda, l'AMA travaille à l'harmonisation des cadres réglementaires du médicament à l'échelle continentale. Son rôle est crucial pour garantir l'accès à des médicaments et vaccins de qualité, en particulier lors des situations d'urgence sanitaire. Les experts appellent à une accélération de l'opérationnalisation complète de l'AMA, afin que l'Afrique puisse disposer d'un organe de régulation pharmaceutique indépendant et pleinement fonctionnel avant la prochaine grande crise sanitaire.","date":"2026-06-07"},
],
"manufacture-vaccins":[
{"title":"Landmark Vaccine Deals Signal Africa's Decisive Shift Toward Local Pharmaceutical Manufacturing","url":"https://healthpolicy-watch.news/landmark-vaccine-deals-signal-africas-shift-toward-local-manufacturing/","content":"A series of landmark vaccine manufacturing agreements reached in 2026 is signaling a decisive structural shift in Africa's pharmaceutical production landscape. Six African manufacturers have built facilities with active technology transfers underway, including Atlantic Lifesciences in Ghana. Egypt's EVA Pharma and European biotech partners have established Africa's first end-to-end mRNA vaccine production platform capable of producing up to 100 million doses annually. Eleven African-made vaccines covering eight antigens — including measles-rubella, rotavirus, and yellow fever — are expected to reach the continental market within five years. These milestones represent measurable progress toward the African Union's target of producing 60% of vaccines used on the continent by 2040.","date":"2026-06-10"},
{"title":"CHAI 2026 Report: African Vaccine Manufacturing Supply Landscape — Progress and Persistent Structural Challenges","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"The Clinton Health Access Initiative (CHAI) has released its comprehensive 2026 report on the African vaccine manufacturing supply landscape, documenting both significant progress and persistent barriers. Five cross-cutting challenges have pushed timelines back for near-to-market manufacturers: regulatory delays, uncertain market demand, slow financing disbursement, delays from technology transfer partners, and critical workforce gaps. Three manufacturers are projected to achieve WHO prequalification for nine vaccine products between 2026 and 2030, while eight vaccine antigens are expected to enter the continental market between 2025 and 2030. CHAI urges coordinated action from governments, international partners, and Gavi's African Vaccine Manufacturing Accelerator to urgently address financing and demand-side gaps before local manufacturers can reach commercial viability.","date":"2026-06-05"},
{"title":"Egypt Launches Africa's First Digital-to-Biologics mRNA Vaccine Platform — Up to 100 Million Annual Doses","url":"https://onlinelibrary.wiley.com/doi/full/10.1002/hsr2.71926","content":"Egypt's EVA Pharma, in collaboration with European biotech partners, has established Africa's first end-to-end mRNA vaccine manufacturing platform using a groundbreaking digital-to-biologics approach that integrates computational design with biological production. The facility has capacity to produce up to 100 million vaccine doses annually and represents a historic milestone for African pharmaceutical sovereignty. The development is particularly significant in the context of the 2026 Bundibugyo Ebola outbreak, where the absence of an approved vaccine has exposed Africa's critical dependence on external suppliers. mRNA technology platforms offer rapid adaptability to new pathogens, making this Egyptian facility a strategic asset for pandemic preparedness across North Africa and the wider continent.","date":"2026-06-01"},
{"title":"2026 Ebola Outbreak Highlights Urgent Need for Vaccine Manufacturing Against Bundibugyo Strain","url":"https://www.infectioncontroltoday.com/view/2026-ebola-outbreak-spreads-central-africa-who-warns-growing-crisis-amid-cdc-usaid-cuts","content":"The 2026 Ebola outbreak, caused by the Bundibugyo strain currently affecting the Democratic Republic of Congo and Uganda, has exposed a critical gap in the global vaccine manufacturing landscape: there is currently no approved vaccine or treatment specifically targeting this strain. With over 513 cases and more than 130 suspected deaths reported, health experts are urgently calling for accelerated research and manufacturing investment dedicated to Bundibugyo virus disease. The drastic reduction of USAID funding — by 90% — and the US withdrawal from WHO have further hampered the mobilization of resources needed to fast-track vaccine development. Global health stakeholders warn that without dedicated manufacturing pipelines for neglected hemorrhagic fever strains, the world will continue to be caught unprepared when novel or rare Ebola variants emerge.","date":"2026-06-23"},
{"title":"Africa CDC mobilise des ressources pour renforcer la fabrication locale de vaccins et de médicaments en Afrique","url":"https://www.devex.com/organizations/centres-for-disease-control-and-prevention-africa-cdc-120577","content":"Dans le cadre de sa stratégie d'approvisionnement groupé, l'Africa CDC poursuit ses efforts pour développer une plateforme continentale de procurement et soutenir la fabrication locale de vaccins et de médicaments essentiels. Un vétéran du Fonds Mondial a été recruté pour piloter cette initiative, qui vise à doter l'Afrique d'une chaîne de production pharmaceutique autonome, réduisant ainsi sa vulnérabilité aux ruptures d'approvisionnement mondiales.","date":"2026-06-22"},
{"title":"Epidemic Intelligence Report: Africa CDC Tracks Medical Countermeasures in the Pipeline","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"Africa CDC's latest Epidemic Intelligence Weekly Report highlights ongoing efforts to track medical countermeasures (MCMs) in the pipeline for the Bundibugyo Virus Disease (BVD) outbreak affecting DRC and Uganda. The report emphasizes the need for visibility over commodities and medical countermeasures expected to arrive at regional warehouses for subsequent distribution to affected areas. Africa CDC is actively backing evidence-based approaches to ensure that MCMs, including potential therapeutic and vaccine candidates, are efficiently sourced, stored, and deployed. The institution also references its broader strategy for pandemic preparedness, drawing lessons from COVID-19 to build African manufacturing and supply chain resilience for future health emergencies.","date":"2026-06-21"},
],
"unicef-gavi":[
{"title":"UNICEF and Gavi Launch Global Call to Manufacturers for Accelerated Bundibugyo Ebolavirus Vaccine Access","url":"https://www.unicef.org/press-releases/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"On 24 June 2026, UNICEF and Gavi jointly launched a Request for Expression of Interest addressed to vaccine developers and manufacturers worldwide to accelerate development and production of a vaccine against Bundibugyo Ebolavirus disease. Gavi committed US$40 million to support manufacturing scale-up and ensure rapid dose access once a viable candidate is identified, with special consideration given to proposals where production is based in Africa. This initiative directly responds to the ongoing DRC outbreak which has reached 896 confirmed cases and 232 deaths with no approved vaccine against the Bundibugyo strain currently available. UNICEF will provide logistical support for procurement and distribution, leveraging its cold chain and supply chain infrastructure across 190 countries.","date":"2026-06-24"},
{"title":"Gavi 6.0 Strategy 2026-2030: Vaccinating 500 Million More Children and Saving 8-9 Million Lives","url":"https://www.gavi.org/our-alliance/strategy/phase-6-2026-2030","content":"Gavi has launched its Phase 6 strategy (2026-2030), setting an ambitious target to help countries vaccinate more than 500 million additional children and adolescents, with the potential to save 8 to 9 million lives over the period. Central to Gavi 6.0 is a substantial focus on enhancing regional vaccine supply security in Africa, backed by the launch of the African Vaccine Manufacturing Accelerator to stimulate local production capacity. The strategy prioritizes reaching zero-dose children in the world's most fragile and conflict-affected settings through mobile outreach and community health worker networks. Since its founding in 2000, Gavi has helped immunize more than 1 billion children and contributed to a more than 70% reduction in vaccine-preventable disease deaths across supported countries.","date":"2026-06-01"},
{"title":"Largest Global Childhood Vaccination Catch-Up Initiative Delivers Over 100 Million Doses to Missed Children","url":"https://www.unicef.org/esa/press-releases/largest-catch-initiative-delivers-over-100-million-childhood-vaccinations","content":"UNICEF has announced the completion of the largest childhood vaccination catch-up initiative in history, delivering over 100 million doses to children who missed routine immunizations during the COVID-19 pandemic disruptions. The initiative, carried out across Africa and Asia with Gavi and WHO support, targeted priority antigens including measles, polio, and DTP vaccines for the most vulnerable populations. In Africa alone, millions of children in DRC, Nigeria, Ethiopia, and Tanzania received overdue vaccinations through mobile outreach teams operating in remote and conflict-affected areas. The campaign underscores UNICEF's critical role as the world's largest vaccine procurer — handling over 2 billion doses annually — and its unique logistical capacity to reach populations in settings where health infrastructure remains severely fragile.","date":"2026-05-20"},
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
{"title":"Gavi et UNICEF Mobilisés face à la Crise Ebola en Afrique Centrale : Enjeux de Vaccination et d'Accès aux Soins","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-con","content":"Face à la propagation de l'épidémie de maladie à virus Bundibugyo en République Démocratique du Congo et en Ouganda, Gavi (l'Alliance du Vaccin) et l'UNICEF sont appelés à intensifier leur soutien logistique et financier pour garantir l'accès aux outils de santé publique dans les zones affectées. Bien qu'aucun vaccin homologué ne soit disponible contre la souche Bundibugyo, les deux organisations jouent un rôle clé dans la chaîne d'approvisionnement en matériels de protection, en soutien aux campagnes de sensibilisation communautaire et en renforcement des systèmes de santé locaux. L'UNICEF assure également la protection des enfants et des familles vulnérables dans les foyers épidémiques, en coordination avec les autorités nationales et Africa CDC. Ces interventions s'inscrivent dans le cadre du plan continental de préparation et de réponse doté de 518 millions de dollars lancé conjointement par Africa CDC et l'OMS.","date":"2026-06-23"},
{"title":"Gavi et UNICEF intensifient leur soutien à la vaccination en zones de conflit face aux crises sanitaires émergentes","url":"https://cphia.africacdc.org","content":"À l'occasion de la 5e Conférence Internationale sur la Santé Publique en Afrique (CPHIA 2026) prévue à Addis-Abeba, Gavi et l'UNICEF figurent parmi les partenaires clés appelés à présenter leurs stratégies de vaccination dans les zones de fragilité. L'événement, qui réunit chefs d'État, ministres et chercheurs, offre une plateforme pour renforcer les synergies entre agences onusiennes et institutions africaines dans la lutte contre les maladies évitables par la vaccination.","date":"2026-06-22"},
{"title":"Gavi and UNICEF: Partners in Vaccine Access Amid the BVD Outbreak Response","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-may-9-2026","content":"As the Bundibugyo Virus Disease outbreak continues to challenge health systems in DRC and Uganda, international partners including UNICEF and Gavi play a critical role in supporting immunization logistics and health commodity supply chains. The situational report of June 9, 2026, underscores the importance of coordinated multilateral efforts in outbreak response, with community engagement, risk communication, and medical countermeasure distribution at the forefront. UNICEF's longstanding presence in both DRC and Uganda positions it as a key actor in ensuring vulnerable populations receive timely health interventions, while Gavi's vaccine financing mechanisms remain essential for sustaining immunization coverage in fragile, outbreak-affected settings.","date":"2026-06-21"},
],
"sante-maroc":[
{"title":"Maroc : Budget santé 2026 en hausse de 30 % — 42,4 milliards de dirhams et 8 000 nouveaux postes","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le Maroc franchit un cap historique dans le financement de la santé publique avec un budget du ministère de la Santé et de la Protection sociale atteignant 42,4 milliards de dirhams en 2026, en hausse de 30 % par rapport à l'exercice précédent. Cette enveloppe sans précédent finance la création de 8 000 nouveaux postes budgétaires et alloue 16,4 milliards de dirhams aux dépenses de personnel afin de rendre le secteur hospitalier plus attractif. Par ailleurs, 5,3 milliards de dirhams sont mobilisés pour la construction hospitalière, permettant l'ajout de plus de 3 800 lits dans le parc hospitalier public. Cette progression budgétaire marque l'accélération de la réforme de l'état social impulsée par Sa Majesté le Roi Mohammed VI, concrétisant les engagements pris dans le cadre du nouveau modèle de développement marocain.","date":"2026-06-15"},
{"title":"Réforme de l'État Social au Maroc : Groupements Territoriaux de Santé et Généralisation de la Couverture Médicale","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"La réforme de l'état social au Maroc prend de l'ampleur en 2026 avec le déploiement des groupements territoriaux de santé (GTS), présentés comme le pivot de la régionalisation du système de soins. Le ministère de la Santé prévoit la construction de nouveaux centres hospitaliers universitaires, la rénovation de 90 hôpitaux et la généralisation du dossier médical électronique sur l'ensemble du territoire national. Si les indicateurs préliminaires sont jugés positifs par les autorités, des résistances persistent au sein du corps médical face à la réorganisation des compétences et aux nouvelles conditions d'exercice. L'enjeu central est de rendre le service public de santé plus équitable et accessible, capable de répondre aux défis des maladies chroniques et des urgences épidémiques dans un contexte de pression démographique croissante.","date":"2026-06-10"},
{"title":"Harm Reduction : The Manifesto 2026 — Le Maroc affirme son leadership africain sur les nouvelles politiques de santé publique","url":"https://aujourdhui.ma/societe/harm-reduction-the-manifesto-2026-lemergence-dun-leadership-africain-sur-les-grandes-politiques-de-sante-publique","content":"Le Maroc a accueilli le lancement officiel de Harm Reduction : The Manifesto 2026 — International New Public Health Policies, une initiative internationale réunissant des personnalités politiques, scientifiques et académiques autour d'une vision renouvelée des politiques de santé publique mondiales. L'événement positionne le Royaume comme hub régional du débat sur la réduction des risques, une approche fondée sur la minimisation des dommages liés aux comportements à risque tels que l'usage de drogues, le tabac et l'alcool. Le manifeste plaide pour une rupture avec les politiques prohibitionnistes au profit d'approches pragmatiques basées sur l'évidence scientifique et les droits humains. Le Maroc, engagé dans une réforme profonde de sa protection sociale et de sa santé publique, consolide ainsi son rayonnement sur les politiques sanitaires à l'échelle du continent africain.","date":"2026-06-08"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},

"vaccins-monde":[
{"title":"WHO GACVS 50th Meeting in Geneva — Bundibugyo Ebola and mpox Vaccine Safety on the Agenda","url":"https://www.who.int/publications/i/item/who-wer1019-10-37-42","content":"The WHO Global Advisory Committee on Vaccine Safety (GACVS) convened its 50th meeting in Geneva from 23 to 26 June 2026, reviewing the latest evidence on vaccine safety signals worldwide. Key agenda items included evaluation of candidate vaccines in emergency development for Bundibugyo Ebolavirus disease, updated safety data from ongoing mpox vaccination campaigns across Africa, and guidance on mRNA vaccine administration in special populations. GACVS provides independent scientific assessments that are critical to maintaining global public trust in immunization programs and inform national vaccination policies in more than 150 countries. The committee's conclusions will shape WHO emergency use authorization decisions for new Ebola vaccines and update global immunization safety guidance.","date":"2026-06-26"},
{"title":"Global Childhood Vaccination Holds Steady, but 14 Million Infants Remain Unvaccinated — WHO and UNICEF Warning","url":"https://www.unicef.org/press-releases/global-childhood-vaccination-holds-steady-yet-over-14-million-infants-remain","content":"A joint WHO-UNICEF report reveals that global childhood vaccination coverage has stabilized after COVID-19-era disruptions, but more than 14 million infants worldwide still received zero vaccines, placing them among the most vulnerable to preventable diseases. Sub-Saharan Africa accounts for the largest share of these zero-dose children, concentrated in fragile and conflict-affected states with severely weakened health systems. The report highlights that national and global funding shortfalls, growing geopolitical instability, and rising vaccine hesitancy fueled by misinformation are threatening to stall or reverse hard-won immunization gains. WHO and UNICEF jointly call on governments and donors to urgently close the annual immunization funding gap estimated at several billion dollars to protect decades of public health progress.","date":"2026-06-15"},
{"title":"Preventive Cholera Vaccination Resumes Globally After OCV Supply Doubles to Nearly 70 Million Annual Doses","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"The World Health Organization announced in February 2026 the resumption of large-scale preventive oral cholera vaccination campaigns, suspended for over three years due to a critical global vaccine shortage. The global oral cholera vaccine (OCV) supply has doubled from approximately 35 million doses in 2022 to nearly 70 million doses in 2025, enabling a return to prophylactic campaigns in cholera-endemic countries across Africa, Asia, and Latin America. Countries including DRC, Yemen, and Haiti — previously limited to reactive vaccination only during active outbreaks — can now receive preventive doses before cholera seasons begin. WHO estimates that preventive vaccination is 3 to 4 times more cost-effective than reactive campaigns and can significantly reduce cholera incidence and mortality in endemic regions when deployed systematically at scale.","date":"2026-02-04"},
{"title":"Africa CDC Weekly Briefing : surveillance épidémique et immunisation au cœur de l'agenda de sécurité sanitaire africaine","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors de son briefing spécial du 30 avril 2026 consacré à l'avancement de l'agenda de Sécurité et Souveraineté Sanitaire de l'Afrique (AHSS), Africa CDC a mis en lumière les efforts de renforcement des capacités de laboratoire régionaux, essentiels pour la surveillance des maladies infectieuses et la réponse vaccinale rapide. Le Directeur Général d'Africa CDC a notamment annoncé la signature d'un accord historique avec le gouvernement kenyan, qui alloue 10 acres de terrain et 2 millions de dollars pour le Centre de Coordination Régional de l'Afrique de l'Est à Nairobi. Ces infrastructures régionales sont cruciales pour coordonner les campagnes de vaccination d'urgence et le suivi épidémiologique à l'échelle continentale.","date":"2026-06-24"},
{"title":"Ebola Bundibugyo : l'absence de vaccins met en lumière l'urgence d'investir dans la R&D vaccinale mondiale","url":"https://www.cdc.gov/media/releases/2026/update-on-ebola-outbreak-in-the-democratic-republic-of-the-congo-and-uganda-6-5-2026.html","content":"L'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda expose une lacune critique : aucun vaccin ni traitement spécifique n'est disponible contre ce variant. Contrairement à l'Ebola Zaïre, pour lequel des vaccins homologués existent, le variant Bundibugyo reste sans réponse vaccinale validée. Les autorités sanitaires mondiales, dont le CDC américain et l'OMS, appellent à accélérer la recherche et le développement de vaccins contre les souches négligées du virus Ebola, soulignant que la prévention vaccinale demeure l'outil le plus efficace contre de futures flambées.","date":"2026-06-22"},
{"title":"Briefing OMS Afrique : la riposte vaccinale contre Ebola Bundibugyo au centre des discussions","url":"https://www.youtube.com/watch?v=Gp9tFTr5a9Y","content":"Lors du briefing presse virtuel de l'OMS Afrique du 4 juin 2026, les experts ont fait le point sur la stratégie de riposte à l'épidémie de maladie à virus Ebola de type Bundibugyo en RDC et en Ouganda. Les discussions ont notamment porté sur les outils de prévention disponibles, les protocoles de vaccination d'urgence et les défis du traçage des contacts dans les zones affectées. L'OMS a souligné l'importance du déploiement rapide des équipes de réponse et la nécessité de renforcer les capacités locales de gestion des épidémies. Les intervenants ont également évoqué les cas importés en Ouganda et les mesures de quarantaine mises en place, saluant la capacité des autorités ougandaises à détecter et isoler rapidement les cas suspects grâce aux protocoles de surveillance renforcés.","date":"2026-06-17"},
{"title":"Third Reaffirmation of Mpox Emergency: Africa CDC and WHO Call for Accelerated Global Immunization Efforts","url":"https://khub.africacdc.org/records/resource?id=405","content":"Africa CDC and the World Health Organization have jointly issued a third reaffirmation of the mpox public health emergency, underscoring the persistent threat posed by the virus across the African continent and beyond. The declaration highlights a continued increase in mpox cases, including in Cameroon, and points to the emergence of the novel clade Ib strain in Central Africa as a particular cause for global concern. Researchers have conducted comprehensive phylogenetic and mutational analyses of the Monkeypox virus (MPXV) across sub-Saharan Africa between 2022 and 2024, revealing significant genomic diversity. Community health workers have been identified as a key resource in halting outbreaks at the local level. Both organizations are calling on the international community to accelerate vaccine research and deployment, scale up immunization campaigns in high-risk areas, and invest in surveillance infrastructure to monitor the evolving epidemiology of mpox across the continent.","date":"2026-06-15"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent="25 juin 2026";
renderCategories();
renderArticles();
