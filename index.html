var articlesData={
"african-cdc":[
{"title":"Africa CDC et Aspen Pharmacare en discussions avancées pour un cadre d'alignement offre-demande en fabrication vaccinale","url":"https://africacdc.org/news/","content":"Africa CDC et Aspen Pharmacare, géant pharmaceutique sud-africain, sont engagés dans des discussions avancées pour établir un cadre stratégique d'alignement à long terme entre l'offre et la demande de vaccins fabriqués localement en Afrique. L'initiative vise à sécuriser des marchés stables pour les producteurs africains de vaccins et à réduire la dépendance structurelle du continent aux importations extérieures, une vulnérabilité mise en lumière lors de la pandémie de COVID-19 et de l'épidémie de Bundibugyo. L'accord s'inscrit dans l'Agenda de Santé et de Souveraineté Sanitaire de l'Afrique (AHSS) porté par Africa CDC, qui fixe l'objectif que 60 % des vaccins utilisés sur le continent soient produits localement d'ici 2040. Ce partenariat public-privé constitue un modèle de coopération entre institutions panafricaines et industriels pharmaceutiques pour construire une autonomie sanitaire continentale durable.","date":"2026-06-20"},
{"title":"Africa CDC et Africa Frontline First signent un accord pour déployer 200 000 agents de santé communautaires à travers l'Afrique","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-8-14-june-2026/","content":"Africa CDC et Africa Frontline First (AFF) ont conclu un Mémorandum d'Entente visant à coordonner le déploiement de 200 000 agents de santé communautaires (ASC) à travers le continent africain, reconnaissant leur rôle central dans la couverture vaccinale, la surveillance épidémiologique de proximité et la réponse rapide aux épidémies. Ce partenariat est particulièrement stratégique face à l'épidémie de maladie à virus Bundibugyo en RDC, où les défis d'accès communautaire ont entravé le traçage des contacts et les campagnes de sensibilisation. Les ASC représentent le lien essentiel entre les systèmes de santé formels et les populations rurales et enclavées, souvent hors de portée des structures hospitalières et des équipes de riposte mobiles. Africa CDC confirme ainsi sa stratégie de renforcement du maillage sanitaire de proximité comme pilier d'une architecture de santé publique africaine résiliente et inclusive.","date":"2026-06-14"},
{"title":"Africa CDC appelle à renforcer les contrôles sanitaires aux frontières africaines face à l'épidémie d'Ebola Bundibugyo","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-1-7-june-2026/","content":"Le Directeur Général d'Africa CDC, le Dr Jean Kaseya, a lancé un appel urgent aux États membres de l'Union Africaine pour qu'ils intensifient les mesures de dépistage aux points d'entrée internationaux — aéroports, ports maritimes et postes frontières terrestres — afin de prévenir l'exportation de l'épidémie de maladie à virus Ebola Bundibugyo hors de la RDC et de l'Ouganda. Africa CDC recommande notamment des dispositifs de contrôle thermique, des procédures de déclaration pour les voyageurs en provenance des zones affectées et la formation du personnel de santé aux protocoles de détection précoce des fièvres hémorragiques virales. Ces mesures font suite au bulletin hebdomadaire du 1er au 7 juin 2026, qui documente la progression continue de l'épidémie et les défis opérationnels rencontrés sur le terrain en RDC. L'appel s'appuie sur les orientations du Règlement Sanitaire International (RSI 2005) et vise à prévenir la propagation transfrontalière dans les pays voisins fortement connectés aux zones touchées.","date":"2026-06-07"},
{"title":"Africa CDC et l'OMS lancent un plan continental conjoint de préparation et de riposte à Ebola pour juin-novembre 2026","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Le 5 juin 2026, les Centres africains de contrôle et de prévention des maladies (Africa CDC) et l'Organisation mondiale de la Santé (OMS) ont officiellement lancé un plan continental conjoint de préparation et de riposte à la maladie à virus Ebola Bundibugyo, couvrant la période de juin à novembre 2026. Ce plan vise à coordonner les interventions à l'échelle du continent africain face à une flambée qui touche déjà la RDC et l'Ouganda. Par ailleurs, Africa CDC a salué l'appui financier d'urgence de 220,6 millions de dollars américains accordé par le Fonds pandémique pour soutenir la réponse à l'épidémie. La réunion présidentielle de haut niveau tenue le 16 juin 2026, sous la présidence du Président du Burundi S.E. Évariste Ndayishimiye, a réuni chefs d'État et partenaires pour renforcer la mobilisation politique et financière face à cette crise sanitaire majeure.","date":"2026-06-27"},
{"title":"Plus de 910 millions de dollars pledgés pour la riposte à Ebola Bundibugyo, mais moins de 90 millions déboursés","url":"https://x.com/AfricaCDC/status/2067940466104926516","content":"Lors du briefing médiatique hebdomadaire du 18 juin 2026, Africa CDC a révélé qu'au cours de la Réunion de Haut Niveau Présidentiel des Chefs d'État et de Gouvernement africains dédiée à la flambée de la maladie à virus Ebola Bundibugyo, plus de 910 millions de dollars américains ont été annoncés en termes de promesses de financement. Cependant, moins de 90 millions de dollars ont été effectivement déboursés à ce jour, soulignant l'urgence d'accélérer le flux de fonds pour soutenir les efforts de réponse sur le terrain en RDC et en Ouganda. Africa CDC appelle les partenaires internationaux à honorer leurs engagements rapidement afin de ne pas compromettre les opérations de riposte en cours.","date":"2026-06-27"},
{"title":"Bundibugyo Virus Disease Outbreak: 332 Confirmed Cases and 49 Deaths as of June 1, 2026","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-june-1-2026","content":"As of June 1, 2026, the Bundibugyo Virus Disease (BVD) outbreak affecting the Democratic Republic of Congo (DRC) and Uganda has resulted in 332 confirmed cases and 49 confirmed deaths, representing a case fatality ratio (CFR) of approximately 14.8%. The outbreak now spans 23 health zones within the DRC and one district in Uganda, with 321 suspected cases including 101 individuals currently in isolation. Africa CDC continues to coordinate multi-sectoral response efforts despite significant challenges including community resistance, logistical constraints, and health system weaknesses. Infection Prevention and Control (IPC) measures include trainings on injection safety, safe and dignified burials, and decontamination of health facilities. Community sensitization campaigns are targeting church congregations, students, and taxi drivers to address misinformation and reluctance to cooperate with health interventions.","date":"2026-06-27"},
{"title":"Maladie à virus Bundibugyo : 1 068 cas confirmés selon le dernier rapport de l'Africa CDC","url":"https://khub.africacdc.org/health-topics/surveillance","content":"Selon le rapport de situation n°35 publié le 22 juin 2026, l'épidémie de Maladie à Virus Bundibugyo (MVB) en RDC et en Ouganda continue de présenter des défis majeurs pour la santé publique africaine. Le bilan combiné s'élève désormais à 1 068 cas confirmés, 269 décès confirmés et 126 guérisons, avec 8 433 contacts actuellement sous suivi. Le taux de létalité provisoire est estimé à 25,2 %. L'Africa CDC souligne la persistance de la transmission communautaire en RDC, notamment dans la province de l'Ituri qui concentre plus de 91 % des cas, tandis que la situation en Ouganda montre des signes de stabilisation relative. Des défis opérationnels et socioculturels — dont la désinformation, les fuites de cas et les pénuries de ressources — continuent d'entraver la réponse.","date":"2026-06-26"},
{"title":"Africa CDC : l'Afrique du Sud engage 2,5 millions USD pour la riposte Ebola en RDC et en Ouganda","url":"https://dirco.gov.za/africa-cdc-strengthens-the-capacity-and-capability-of-africas-public-health-institutions-as-well-as-partnerships-to-detect-and-respond-quickly-and-effectively-to-disease-threats-and-outbreaks","content":"Addis-Abeba, 20 mai 2026 – L'Africa CDC a salué l'engagement du gouvernement sud-africain de contribuer 2,5 millions USD au Fonds africain contre les épidémies (Africa Epidemics Fund), destiné à soutenir la réponse à l'épidémie d'Ebola en cours en RDC et en Ouganda. Cette annonce illustre la volonté de l'institution panafricaine de renforcer les capacités des systèmes de santé publique du continent, notamment en matière de surveillance épidémiologique, de détection précoce et de riposte rapide aux menaces sanitaires. L'Africa CDC réaffirme ainsi son rôle central dans la coordination des interventions basées sur des données probantes pour protéger la santé des populations africaines.","date":"2026-06-26"},
{"title":"Africa CDC : l'épidémie d'Ebola en RDC pourrait devenir la pire de l'histoire","url":"https://www.democracynow.org/2026/6/17/headlines/africa_cdc_warns_ebola_outbreak_in_drc_could_become_worst_on_record","content":"L'Africa Centres for Disease Control and Prevention (Africa CDC) tire la sonnette d'alarme : l'épidémie d'Ebola en République Démocratique du Congo (RDC) pourrait devenir la plus meurtrière jamais enregistrée dans l'histoire. Le nombre de cas confirmés a atteint 837, tandis que le bilan officiel des décès avoisine les 200. Face à cette progression alarmante, l'Africa CDC appelle à une mobilisation financière urgente afin d'intensifier le traçage des contacts et de stopper la propagation du virus. Sans ressources supplémentaires, les autorités sanitaires craignent une extension incontrôlable de l'épidémie au-delà des zones déjà touchées.","date":"2026-06-26"},
],
"african-medical-agency":[
{"title":"OMS et Agence Africaine des Médicaments : accord-cadre historique signé à Genève pour harmoniser la régulation pharmaceutique continentale","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"En marge de la 79e Assemblée Mondiale de la Santé (AMS79) à Genève, l'OMS et l'Agence Africaine des Médicaments (AMA) ont signé le 21 mai 2026 un accord-cadre de coopération qualifié d'historique, établissant un partenariat structuré pour harmoniser les systèmes réglementaires des 55 États membres de l'Union Africaine et accélérer l'accès aux produits de santé sûrs et de qualité garantie à travers le continent. Les deux organisations s'engagent à renforcer la surveillance post-commercialisation contre les médicaments falsifiés et sous-standard, à soutenir la production pharmaceutique locale et à coordonner les réponses réglementaires lors d'urgences sanitaires. Cet accord marque l'entrée de l'AMA dans sa phase d'Expansion (2026-2030) avec un mandat élargi pour réguler médicaments, vaccins et produits biologiques à l'échelle continentale. Il consacre la souveraineté réglementaire africaine et la capacité du continent à contrôler la qualité des produits de santé qui y circulent.","date":"2026-05-21"},
{"title":"AMA et Pharmacopée des États-Unis signent un accord à Johannesburg pour renforcer les standards pharmaceutiques en Afrique","url":"https://www.cleanroomtechnology.com/african-medicines-agency-and-usp-sign-agreement-to","content":"L'Agence Africaine des Médicaments (AMA) et la Pharmacopée des États-Unis (United States Pharmacopeia, USP) ont signé le 29 avril 2026 à Johannesburg un mémorandum d'accord établissant une coopération en matière de science réglementaire, de standards pharmacopéiques, de surveillance post-commercialisation et de renforcement des capacités des régulateurs africains. Ce partenariat permet à l'AMA de bénéficier de l'expertise de l'USP — fondée en 1820 — pour améliorer la qualité des médicaments distribués sur le continent et identifier plus efficacement les produits falsifiés ou non conformes aux normes de sécurité. La collaboration porte également sur la formation des inspecteurs pharmaceutiques africains et le développement d'outils harmonisés de contrôle qualité adaptés aux contextes des pays à revenus faibles et intermédiaires. Cette initiative renforce les fondations réglementaires indispensables pour que l'AMA exerce pleinement sa mission de protection de la santé publique africaine.","date":"2026-04-29"},
{"title":"Frontiers in Medicine : analyse historique complète de la création et des perspectives de l'Agence Africaine des Médicaments","url":"https://www.frontiersin.org/journals/medicine/articles/10.3389/fmed.2026.1763261/full","content":"Une étude publiée en 2026 dans la revue Frontiers in Medicine retrace l'histoire, l'évolution institutionnelle et les perspectives de l'Agence Africaine des Médicaments (AMA), depuis les premières initiatives d'harmonisation réglementaire africaine jusqu'à l'opérationnalisation récente de l'Agence sous l'égide de l'Union Africaine. L'article analyse les défis structurels — financement durable, diversité réglementaire des États membres, pénurie d'experts qualifiés — tout en soulignant le potentiel transformateur d'une régulation pharmaceutique continentale unifiée pour réduire le fardeau des médicaments falsifiés et faciliter l'accès aux thérapies essentielles. Les auteurs estiment que le succès de l'AMA dépendra de la capacité des États membres à aligner leurs législations nationales et à contribuer de manière pérenne au financement de l'institution. Cette publication constitue une référence incontournable pour les décideurs de santé publique, les régulateurs et les industriels pharmaceutiques actifs sur le continent africain.","date":"2026-06-15"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
],
"manufacture-vaccins":[
{"title":"Rapport CHAI 2026 : 11 vaccins africains attendus sur le marché continental d'ici cinq ans, mais cinq défis menacent les délais","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"La Clinton Health Access Initiative (CHAI) a publié son rapport 2026 sur le paysage de la fabrication de vaccins en Afrique, révélant que onze vaccins couvrant huit antigènes — dont la rougeole-rubéole, le rotavirus et la fièvre jaune — sont attendus sur le marché continental dans les cinq prochaines années, portés par onze fabricants dont dix disposent de capacités opérationnelles de remplissage et finition. L'Éthiopie, l'Algérie, l'Égypte, l'Afrique du Sud et le Sénégal constituent les principaux pôles de biofabrication continentale, avec six fabricants en cours de transferts de technologie actifs, dont Atlantic Lifesciences au Ghana. Cependant, cinq obstacles transversaux ont déjà repoussé les calendriers de plusieurs producteurs : retards réglementaires, demande du marché incertaine, lenteur du décaissement des financements, délais imposés par les partenaires de transfert technologique et pénuries de personnel qualifié. La CHAI appelle à des actions concertées entre gouvernements africains, financeurs et régulateurs pour lever ces blocages et transformer le potentiel manufacturier en capacité de production vaccinale effective.","date":"2026-06-10"},
{"title":"Égypte : EVA Pharma et des biotech européens lancent la première plateforme africaine ARNm digital-to-biologics pour 100 millions de doses annuelles","url":"https://onlinelibrary.wiley.com/doi/full/10.1002/hsr2.71926","content":"Un accord signé au Caire entre EVA Pharma, groupe pharmaceutique égyptien de premier plan, et des sociétés de biotechnologie européennes a posé les bases de la première plateforme africaine de production de vaccins ARNm de type digital-to-biologics, intégrant la conception numérique des séquences ARNm directement à la fabrication de produits biologiques à grande échelle. Cette plateforme est dimensionnée pour produire jusqu'à 100 millions de doses de vaccins par an, positionnant l'Égypte comme hub stratégique de la biofabrication vaccinale ARNm sur le continent. L'initiative capitalise sur les leçons de la pandémie COVID-19 qui a démontré la nécessité de disposer de capacités de production locales pour répondre rapidement aux urgences sanitaires sans dépendre de chaînes d'approvisionnement mondiales fragilisées. Le projet devra satisfaire aux exigences réglementaires de l'Agence Africaine des Médicaments (AMA) et des autorités nationales pour une commercialisation à l'échelle continentale.","date":"2026-06-05"},
{"title":"Gavi soumet AVMA+ à son conseil : 189 millions de dollars pour renforcer l'écosystème de fabrication vaccinale africain et garantir 70 millions de doses","url":"https://www.devex.com/news/inside-gavi-s-189-million-plan-to-boost-africa-s-vaccine-ecosystem-112721","content":"Gavi, l'Alliance du Vaccin, a soumis pour approbation à son conseil d'administration le programme AVMA+ (African Vaccine Manufacturing Accelerator Plus), un plan de 189 millions de dollars visant à renforcer l'ensemble de l'écosystème de fabrication vaccinale africain en agissant sur la régulation, la garantie de marché et le financement de la production locale. Le programme prévoit des garanties directes d'achat couvrant jusqu'à 70 millions de doses de vaccins fabriqués sur le continent, offrant aux producteurs africains la visibilité sur la demande nécessaire pour justifier leurs investissements en capacité de production. L'AVMA+ entend résoudre le cercle vicieux du sous-investissement : sans demande garantie, pas de production locale ; sans production locale, pas de souveraineté vaccinale africaine. Ce mécanisme vise à faire de l'Afrique un acteur autonome dans la fabrication des vaccins utilisés dans ses propres programmes d'immunisation, réduisant structurellement sa dépendance aux importations extérieures.","date":"2026-06-20"},
{"title":"Africa CDC Knowledge Hub Highlights Manufacturing Readiness Amid Ebola Bundibugyo Outbreak","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"As the Bundibugyo Virus Disease outbreak intensifies across the DRC and Uganda, the Africa CDC and WHO continental preparedness and response plan for June-November 2026 places renewed emphasis on the urgent need for local vaccine and medical countermeasure manufacturing capacity on the African continent. The plan underscores that reliance on external supply chains for vaccines and therapeutics has hampered rapid response in the early weeks of the outbreak. Strengthening African-based manufacturing infrastructure is identified as a strategic priority to ensure faster deployment of investigational vaccines and treatments in future outbreaks. Ongoing procurement efforts and partnerships with international manufacturers are being coordinated to fast-track the availability of candidate vaccines being evaluated for use against the Bundibugyo Ebola strain.","date":"2026-06-27"},
{"title":"Plan de réponse Ebola 2026 : un appel à investir dans la fabrication locale de contre-mesures médicales en Afrique","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"La déclaration de l'épidémie de maladie à virus Ebola Bundibugyo comme urgence de santé publique par l'OMS et l'Africa CDC en 2026 met en exergue les insuffisances persistantes dans la chaîne de fabrication et d'approvisionnement en produits médicaux sur le continent. Avec 332 cas confirmés et un taux de létalité de 14,8 % au début du mois de juin, l'absence de vaccin et la pénurie de traitements spécifiques soulignent l'urgence d'investir dans des capacités de fabrication pharmaceutique locales. Les experts appellent à une mobilisation accrue des industriels africains et internationaux pour développer, produire et distribuer des vaccins candidats contre les souches d'Ebola non couvertes, et pour renforcer les plateformes de biofabrication continentales afin de réduire la dépendance aux importations en période de crise.","date":"2026-06-25"},
{"title":"Urgence Ebola Bundibugyo : l'absence de vaccin homologué relance le débat sur la production vaccinale africaine","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'épidémie de maladie à virus Bundibugyo qui frappe la République Démocratique du Congo et l'Ouganda depuis plusieurs semaines met en lumière une réalité critique : il n'existe à ce jour aucun vaccin homologué contre cette souche spécifique du virus Ebola. Contrairement à la souche Zaïre, pour laquelle des vaccins ont été développés et déployés avec succès, la souche Bundibugyo demeure sans solution vaccinale disponible à grande échelle. Cette situation relance avec acuité le débat sur la nécessité d'accélérer les capacités de recherche, développement et fabrication de vaccins sur le continent africain. Le plan conjoint Africa CDC-OMS, doté de 518 millions de dollars, inclut des volets dédiés au développement de contre-mesures médicales, pressant les fabricants et les bailleurs de fonds à investir dans la production locale de vaccins adaptés aux pathogènes prioritaires africains.","date":"2026-06-25"},
{"title":"2026 Ebola Outbreak Highlights Urgent Need for Vaccine Manufacturing Against Bundibugyo Strain","url":"https://www.infectioncontroltoday.com/view/2026-ebola-outbreak-spreads-central-africa-who-warns-growing-crisis-amid-cdc-usaid-cuts","content":"The 2026 Ebola outbreak, caused by the Bundibugyo strain currently affecting the Democratic Republic of Congo and Uganda, has exposed a critical gap in the global vaccine manufacturing landscape: there is currently no approved vaccine or treatment specifically targeting this strain. With over 513 cases and more than 130 suspected deaths reported, health experts are urgently calling for accelerated research and manufacturing investment dedicated to Bundibugyo virus disease. The drastic reduction of USAID funding — by 90% — and the US withdrawal from WHO have further hampered the mobilization of resources needed to fast-track vaccine development. Global health stakeholders warn that without dedicated manufacturing pipelines for neglected hemorrhagic fever strains, the world will continue to be caught unprepared when novel or rare Ebola variants emerge.","date":"2026-06-23"},
],
"unicef-gavi":[
{"title":"UNICEF et Gavi lancent un appel à manifestation d'intérêt auprès des fabricants pour accélérer l'accès aux vaccins contre Ebola Bundibugyo","url":"https://www.gavi.org/news/media-room/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"Le 24 juin 2026, UNICEF et Gavi ont conjointement lancé une demande de manifestation d'intérêt (EOI) auprès des développeurs et fabricants de vaccins pour recenser les capacités disponibles et les projets de développement d'un vaccin contre la maladie à virus Ebola Bundibugyo, responsable de l'épidémie en cours en RDC et en Ouganda ayant déjà causé plus de 1 000 cas confirmés et plusieurs centaines de décès. Cette initiative s'appuie sur l'engagement de Gavi d'allouer jusqu'à 40 millions de dollars comme financement incitatif (pull financing) pour accélérer la mise à l'échelle de la production et garantir un accès rapide aux doses dès leur disponibilité. Une attention particulière sera accordée aux propositions prévoyant une production basée en Afrique, conformément à l'objectif continental de souveraineté vaccinale. UNICEF assurera la coordination logistique de la chaîne d'approvisionnement en doses une fois les vaccins candidats développés, approuvés et disponibles pour déploiement dans les zones affectées.","date":"2026-06-24"},
{"title":"Gavi mobilise 50 millions de dollars pour les vaccins contre Ebola Bundibugyo et la protection des programmes de vaccination de routine","url":"https://www.gavi.org/news/media-room/gavi-commits-us-50-million-bundibugyo-ebolavirus-vaccines-and-outbreak-response","content":"Gavi, l'Alliance du Vaccin, a annoncé un engagement financier total de 50 millions de dollars via son Fonds de Première Réponse (First Response Fund) pour soutenir la riposte à l'épidémie de maladie à virus Ebola Bundibugyo en RDC et en Ouganda, dont 10 millions destinés à protéger les programmes de vaccination de routine, la sécurité des agents de santé et les opérations d'urgence sur le terrain. Les 40 millions restants constituent un financement incitatif pour accélérer le développement et l'accès aux vaccins candidats contre la souche Bundibugyo, pour laquelle aucun vaccin homologué n'existe à ce jour. La protection des programmes de vaccination de routine est une priorité de Gavi, car les crises épidémiques peuvent provoquer des interruptions des calendriers vaccinaux habituels qui entraînent des reculs dans la couverture contre d'autres maladies évitables. Cet engagement s'inscrit dans le plan de riposte continental conjoint Africa CDC-OMS doté de 518 millions de dollars pour juin-novembre 2026.","date":"2026-06-20"},
{"title":"Africa's routine vaccine systems deliver gains against cancer and malaria, but international funding cuts threaten to reverse progress","url":"https://www.gavi.org/news/media-room/africas-routine-vaccine-systems-deliver-gains-against-cancer-and-malaria-funding","content":"A Gavi 2026 report highlights significant advances in routine immunization programs across Africa: as of January 2026, 25 countries have introduced malaria vaccines into their national immunization schedules as part of the goal to reach 50 million children with full malaria vaccine courses by end of decade, while HPV vaccination programs continue expanding to protect millions of adolescent girls against cervical cancer. However, the report warns of mounting funding pressures stemming from cuts to global health budgets by several major donor countries in 2025-2026, creating resource gaps that risk stalling new vaccine introductions and reversing hard-won immunization coverage gains. Gavi estimates that without additional resources, millions of children in Africa could lose access to vaccines they would otherwise have received through Gavi-supported programs. The Alliance is calling on governments, international financial institutions, and the private sector to maintain and scale up their commitments to ensure Africa's routine immunization systems can sustain their momentum.","date":"2026-06-15"},
{"title":"UNICEF and Gavi Mobilize Support for Ebola Bundibugyo Vaccine Response in DRC and Uganda","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"As the Bundibugyo Virus Disease outbreak continues to escalate in the DRC and Uganda, UNICEF and Gavi are mobilizing resources and logistical support to facilitate the deployment of investigational vaccines and to strengthen immunization infrastructure in affected regions. UNICEF is coordinating cold chain logistics and community engagement efforts, particularly targeting vulnerable populations including children and women. Gavi, the Vaccine Alliance, is working with partners to ensure equitable access to any approved or emergency-use vaccines as they become available. Both organizations are also supporting surveillance and risk communication campaigns to improve uptake of health interventions in communities affected by the outbreak, where vaccine hesitancy and misinformation remain significant barriers.","date":"2026-06-27"},
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
{"title":"Gavi et UNICEF Mobilisés face à la Crise Ebola en Afrique Centrale : Enjeux de Vaccination et d'Accès aux Soins","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-con","content":"Face à la propagation de l'épidémie de maladie à virus Bundibugyo en République Démocratique du Congo et en Ouganda, Gavi (l'Alliance du Vaccin) et l'UNICEF sont appelés à intensifier leur soutien logistique et financier pour garantir l'accès aux outils de santé publique dans les zones affectées. Bien qu'aucun vaccin homologué ne soit disponible contre la souche Bundibugyo, les deux organisations jouent un rôle clé dans la chaîne d'approvisionnement en matériels de protection, en soutien aux campagnes de sensibilisation communautaire et en renforcement des systèmes de santé locaux. L'UNICEF assure également la protection des enfants et des familles vulnérables dans les foyers épidémiques, en coordination avec les autorités nationales et Africa CDC. Ces interventions s'inscrivent dans le cadre du plan continental de préparation et de réponse doté de 518 millions de dollars lancé conjointement par Africa CDC et l'OMS.","date":"2026-06-23"},
{"title":"Gavi et UNICEF intensifient leur soutien à la vaccination en zones de conflit face aux crises sanitaires émergentes","url":"https://cphia.africacdc.org","content":"À l'occasion de la 5e Conférence Internationale sur la Santé Publique en Afrique (CPHIA 2026) prévue à Addis-Abeba, Gavi et l'UNICEF figurent parmi les partenaires clés appelés à présenter leurs stratégies de vaccination dans les zones de fragilité. L'événement, qui réunit chefs d'État, ministres et chercheurs, offre une plateforme pour renforcer les synergies entre agences onusiennes et institutions africaines dans la lutte contre les maladies évitables par la vaccination.","date":"2026-06-22"},
],
"sante-maroc":[
{"title":"Maroc : budget de la santé en hausse de 30 % à 42,4 milliards de dirhams en 2026, avec 8 000 nouveaux postes et 90 hôpitaux rénovés","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le budget du ministère de la Santé et de la Protection sociale du Maroc a atteint 42,4 milliards de dirhams en 2026, en hausse historique de 30 % par rapport à l'exercice précédent, dont 16,4 milliards de dirhams alloués aux dépenses de personnel avec la création de 8 000 nouveaux postes budgétaires destinés à rendre le secteur hospitalier public plus attractif et à réduire le déficit chronique en ressources humaines médicales et paramédicales. Cette enveloppe financera la rénovation de 90 hôpitaux, la construction de nouveaux Centres Hospitaliers Universitaires (CHU) dans des régions sous-dotées, et l'opérationnalisation progressive des Groupements sanitaires territoriaux (GST). La généralisation de la feuille de soins électronique et le déploiement de la télémédecine figurent parmi les priorités numériques du plan d'action ministériel pour 2026. Ces investissements s'inscrivent dans la mise en oeuvre de la loi-cadre n°06-22 relative au système de santé national, qui ambitionne de garantir un accès universel et équitable aux soins pour l'ensemble des citoyens marocains.","date":"2026-06-10"},
{"title":"Maroc : lancement de Tarkhiss, la plateforme à intelligence artificielle pour accélérer l'homologation des médicaments et lutter contre les faux médicaments","url":"https://www.sante.gov.ma/Pages/Accueil.aspx","content":"Le ministère marocain de la Santé a lancé la plateforme numérique Tarkhiss, dotée d'algorithmes d'intelligence artificielle capables d'analyser des dossiers complexes d'homologation de médicaments en quelques secondes, positionnant le Maroc parmi les rares nations à utiliser l'IA pour sécuriser et accélérer le processus d'enregistrement des produits de santé. Développée dans le cadre des missions de l'Agence marocaine des médicaments et des innovations technologiques (AMMI), cette plateforme vise à réduire les délais d'homologation pour accélérer l'accès des patients aux thérapies essentielles tout en renforçant la lutte contre les médicaments falsifiés et sous-standard grâce à des outils de traçabilité numérique. Tarkhiss intègre des capacités d'analyse documentaire automatisée permettant de détecter les anomalies dans les dossiers de demande d'autorisation de mise sur le marché, améliorant la rigueur et la rapidité des évaluations réglementaires. Cette innovation place le Maroc à l'avant-garde de la régulation pharmaceutique en Afrique et renforce son attractivité comme hub réglementaire régional pour le continent africain et le monde arabe.","date":"2026-06-08"},
{"title":"Construction de CHU, opérationnalisation des GST et généralisation de l'AMO : la réforme du système de santé au Maroc s'accélère en 2026","url":"https://medias24.com/2025/11/05/rehabilitation-dhopitaux-nouveaux-chu-et-generalisation-des-gst-les-principaux-projets-du-ministere-de-la-sante-en-2026/","content":"Le ministère de la Santé du Maroc a dévoilé ses principaux chantiers pour 2026, parmi lesquels la construction de nouveaux Centres Hospitaliers Universitaires (CHU) dans les régions sous-dotées, la réhabilitation de 90 hôpitaux et l'opérationnalisation des Groupements sanitaires territoriaux (GST), nouvelles entités de gouvernance décentralisée pour mieux coordonner les ressources sanitaires au niveau provincial et régional. La généralisation de l'Assurance Maladie Obligatoire (AMO) se poursuit en parallèle, avec l'objectif d'élargir la couverture médicale à l'ensemble de la population y compris les travailleurs du secteur informel. La mise en place d'une gouvernance hospitalière modernisée intégrant des outils numériques de gestion et de suivi de la qualité des soins figure parmi les priorités du programme d'action 2026. Ces transformations structurelles s'inscrivent dans la vision d'un Maroc social où l'accès universel aux soins de qualité constitue un droit fondamental pour chaque citoyen.","date":"2026-06-05"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},
],
"vaccins-monde":[
{"title":"L'OMS annonce : l'initiative Big Catch-Up a permis d'administrer plus de 100 millions de doses vaccinales à 18 millions d'enfants dans 36 pays","url":"https://www.who.int/news/item/24-04-2026-largest-catch-up-initiative-delivers-over-100-million-childhood-vaccinations","content":"L'Organisation mondiale de la Santé (OMS), l'UNICEF et Gavi ont annoncé le 24 avril 2026 que le programme mondial de rattrapage vaccinal Big Catch-Up, lancé en 2023 pour combler les lacunes d'immunisation causées par la pandémie COVID-19, a permis d'administrer plus de 100 millions de doses de vaccins à environ 18,3 millions d'enfants dans 36 pays à revenu faible et intermédiaire. Conclu en mars 2026, le programme est en passe d'atteindre son objectif global de protection de 21 millions d'enfants supplémentaires contre des maladies évitables par la vaccination telles que la rougeole, la polio et la diphtérie. Cette opération représente l'une des plus vastes campagnes de rattrapage vaccinal de l'histoire récente de la santé publique mondiale, mobilisant gouvernements, organisations internationales et partenaires privés autour d'un objectif commun. L'OMS souligne que des défis persistent dans les zones de conflit, les régions enclavées et les communautés réticentes à la vaccination, où des efforts ciblés restent nécessaires pour atteindre les enfants les plus vulnérables.","date":"2026-04-24"},
{"title":"L'OMS annonce la reprise mondiale des campagnes préventives de vaccination anti-cholérique après le doublement de l'approvisionnement mondial en OCV","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'Organisation mondiale de la Santé (OMS) a annoncé le 4 février 2026 la reprise des campagnes de vaccination préventive contre le choléra à l'échelle mondiale, après que l'approvisionnement annuel en vaccins oraux anti-cholériques (OCV) a doublé de 35 millions de doses en 2022 à près de 70 millions de doses en 2025, atteignant un niveau suffisant pour la première fois depuis plus de trois ans. Le Mozambique est le premier pays à redémarrer ses campagnes préventives, après l'interruption de 2022 lorsque la flambée mondiale de choléra avait épuisé les stocks et conduit à un rationnement strict réservé aux seules urgences. Ce seuil marque un tournant dans la stratégie mondiale de lutte contre le choléra, permettant de passer d'une approche réactive à une logique de prévention proactive des épidémies dans les zones endémiques. Le choléra touche encore des millions de personnes chaque année, principalement en Afrique subsaharienne et en Asie du Sud, dans les communautés où l'accès à l'eau potable et à l'assainissement reste insuffisant.","date":"2026-02-04"},
{"title":"L'OMS recommande l'antigène monovalent LP.8.1 pour la mise à jour 2026 des vaccins COVID-19 : implications pour fabricants et programmes nationaux","url":"https://www.who.int/news/item/16-05-2026-statement-on-the-antigen-composition-of-covid-19-vaccines","content":"Le Groupe Consultatif Technique de l'OMS sur la composition des vaccins COVID-19 (TAG-CO-VAC) a publié le 16 mai 2026 sa recommandation officielle pour la mise à jour des vaccins anti-COVID, conseillant aux fabricants d'adopter l'antigène monovalent LP.8.1 correspondant à la variante actuellement dominante du SARS-CoV-2 à l'échelle mondiale. Cette recommandation fait suite à un examen semestriel de l'évolution génomique du virus, de l'efficacité des vaccins homologués et des données sérologiques des populations dans différentes régions du monde. La mise à jour annuelle de la composition antigénique des vaccins COVID-19 est désormais comparable à l'adaptation des vaccins antigrippaux saisonniers, maintenant la protection vaccinale face à l'évolution continue du virus. Les régulateurs nationaux et les programmes de vaccination sont invités à intégrer cette recommandation dans leurs campagnes pour la seconde moitié de 2026, en particulier pour les populations à risque élevé de forme grave.","date":"2026-05-16"},
{"title":"Africa CDC Weekly Briefing : surveillance épidémique et immunisation au cœur de l'agenda de sécurité sanitaire africaine","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors de son briefing spécial du 30 avril 2026 consacré à l'avancement de l'agenda de Sécurité et Souveraineté Sanitaire de l'Afrique (AHSS), Africa CDC a mis en lumière les efforts de renforcement des capacités de laboratoire régionaux, essentiels pour la surveillance des maladies infectieuses et la réponse vaccinale rapide. Le Directeur Général d'Africa CDC a notamment annoncé la signature d'un accord historique avec le gouvernement kenyan, qui alloue 10 acres de terrain et 2 millions de dollars pour le Centre de Coordination Régional de l'Afrique de l'Est à Nairobi. Ces infrastructures régionales sont cruciales pour coordonner les campagnes de vaccination d'urgence et le suivi épidémiologique à l'échelle continentale.","date":"2026-06-24"},
{"title":"Ebola Bundibugyo : l'absence de vaccins met en lumière l'urgence d'investir dans la R&D vaccinale mondiale","url":"https://www.cdc.gov/media/releases/2026/update-on-ebola-outbreak-in-the-democratic-republic-of-the-congo-and-uganda-6-5-2026.html","content":"L'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda expose une lacune critique : aucun vaccin ni traitement spécifique n'est disponible contre ce variant. Contrairement à l'Ebola Zaïre, pour lequel des vaccins homologués existent, le variant Bundibugyo reste sans réponse vaccinale validée. Les autorités sanitaires mondiales, dont le CDC américain et l'OMS, appellent à accélérer la recherche et le développement de vaccins contre les souches négligées du virus Ebola, soulignant que la prévention vaccinale demeure l'outil le plus efficace contre de futures flambées.","date":"2026-06-22"},
{"title":"Briefing OMS Afrique : la riposte vaccinale contre Ebola Bundibugyo au centre des discussions","url":"https://www.youtube.com/watch?v=Gp9tFTr5a9Y","content":"Lors du briefing presse virtuel de l'OMS Afrique du 4 juin 2026, les experts ont fait le point sur la stratégie de riposte à l'épidémie de maladie à virus Ebola de type Bundibugyo en RDC et en Ouganda. Les discussions ont notamment porté sur les outils de prévention disponibles, les protocoles de vaccination d'urgence et les défis du traçage des contacts dans les zones affectées. L'OMS a souligné l'importance du déploiement rapide des équipes de réponse et la nécessité de renforcer les capacités locales de gestion des épidémies. Les intervenants ont également évoqué les cas importés en Ouganda et les mesures de quarantaine mises en place, saluant la capacité des autorités ougandaises à détecter et isoler rapidement les cas suspects grâce aux protocoles de surveillance renforcés.","date":"2026-06-17"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
