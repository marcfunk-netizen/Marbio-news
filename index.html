var articlesData={
"african-cdc":[
{"title":"Africa CDC nomme le Pr Placide Mbala Kingebeni à la direction de la Recherche, des Essais Cliniques et de l'Innovation","url":"https://www.healthcaremea.com/2026/07/08/africa-cdc-strengthens-scientific-leadership-with-appointment-of-prof-placide-mbala/","content":"Africa CDC a nommé le Professeur Placide Mbala Kingebeni, MD, MSc, PhD, au poste de Directeur de la Recherche, des Essais Cliniques et de l'Innovation, une prise de fonction prévue au 15 juillet 2026. Virologue de renommée internationale originaire de la RDC, le Pr Mbala rejoint Africa CDC depuis l'Institut National de Recherche Biomédicale (INRB) de Kinshasa, où il dirigeait des programmes d'épidémiologie, de génomique des pathogènes et de lutte contre les fièvres hémorragiques virales. Simultanément, le Professeur Mosoka Papa Fallah a été nommé Directeur adjoint du même département. Cette double nomination intervient alors qu'Africa CDC a lancé un appel urgent à 18 millions USD pour financer trois essais cliniques testant des traitements expérimentaux contre le virus Bundibugyo en RDC. La création d'un département R&D dédié reflète la volonté d'Africa CDC de piloter sa propre innovation biomédicale face aux épidémies émergentes.","date":"2026-07-09"},
{"title":"Ebola Bundibugyo : Africa CDC et l'OMS lancent trois essais cliniques, 18 millions USD requis d'urgence pour sauver des vies","url":"https://www.npr.org/2026/07/07/g-s1-132218/theres-no-treatment-designed-for-the-ebola-strain-ravaging-drc-but-now-theres-hope","content":"Alors qu'aucun traitement homologué n'existe contre le virus Bundibugyo, Africa CDC et l'OMS ont lancé conjointement trois essais cliniques testant des médicaments existants repurposés pour traiter cette forme rare d'Ebola. Africa CDC a formulé un appel urgent à 18 millions USD pour financer ces études, avertissant que les délais de mobilisation des fonds pourraient coûter des vies humaines. Ces essais, conduits en collaboration avec des universités, des hôpitaux de référence et des organisations à but non lucratif en RDC, représentent la première offensive clinique structurée contre le virus Bundibugyo depuis sa découverte en 2007. NPR rapporte que cette initiative suscite un espoir tangible dans les communautés affectées, où les traitements actuels restent limités aux soins de support. Le succès de ces essais pourrait déboucher sur les premiers protocoles thérapeutiques spécifiques à ce sérotype rare.","date":"2026-07-07"},
{"title":"Épidémie d'Ebola Bundibugyo : ce que l'on sait sur l'une des flambées les plus rares de l'histoire africaine","url":"https://www.cfr.org/articles/africa-has-faced-a-rare-ebola-outbreak-for-months-heres-what-to-know","content":"Le Council on Foreign Relations (CFR) publie en juillet 2026 une analyse approfondie de l'épidémie d'Ebola causée par le virus Bundibugyo, l'un des sérotypes les plus rares du genre Ebolavirus — la première flambée documentée remontant à 2007 en Ouganda. L'épidémie actuelle, sévissant en RDC et en Ouganda depuis mai 2026, a mobilisé un plan continental conjoint Africa CDC-OMS de 518 millions USD sur six mois. En l'absence de vaccin ou de traitement approuvé spécifiquement contre ce sérotype viral, la réponse repose entièrement sur les fondamentaux de santé publique : surveillance, isolement, traçage des contacts et prévention des infections. Le CFR souligne que la collaboration internationale et les essais cliniques en cours constituent les seules voies pour briser la chaîne de transmission et réduire la létalité élevée de cette épidémie hors normes.","date":"2026-07-08"},
{"title":"Africa CDC et l'OMS lancent un plan continental conjoint de réponse à Ebola, doté de 518 millions USD","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"Africa CDC et l'Organisation mondiale de la Santé ont lancé le 5 juin 2026 un plan continental conjoint de préparation et de réponse à la flambée d'Ebola due au virus Bundibugyo, sévissant en République Démocratique du Congo et en Ouganda. Ce plan de six mois (juin à novembre 2026) vise à mobiliser 518 millions USD pour renforcer la surveillance, les laboratoires, la coordination d'urgence et les soins cliniques. Le Dr Jean Kaseya, Directeur général d'Africa CDC, a déclaré : « Ebola se propage vite. L'Afrique doit aller encore plus vite. »","date":"2026-07-08"},
{"title":"Africa CDC reporte son briefing presse hebdomadaire en soutien à la mission en RDC contre Ebola","url":"https://www.facebook.com/africacdc/posts/-postponement-notice-weekly-press-briefingthis-weeks-briefing-has-been-postponed/1428976145927422","content":"Africa CDC a annoncé le report de son briefing presse hebdomadaire, en raison de la mobilisation de sa direction autour de la mission du Président Cyril Ramaphosa, Champion de l'Union africaine pour la Prévention et la Réponse aux Pandémies (PPPR), en République Démocratique du Congo. Cette mission s'inscrit dans un élan de solidarité avec la RDC face à la flambée épidémique d'Ebola en cours. Le prochain briefing est reprogrammé au jeudi 9 juillet 2026.","date":"2026-07-08"},
{"title":"Africa CDC lance un appel à candidatures pour le Conseil consultatif continental sur la vaccination","url":"https://www.facebook.com/africacdc/posts/call-for-expressions-of-interest-africa-cdc-is-inviting-distinguished-african-le/1429030222588681","content":"Africa CDC invite les leaders africains, experts et défenseurs de la santé publique à rejoindre le Conseil consultatif continental sur la vaccination (CIAC). Cette plateforme de haut niveau a pour mission de façonner l'avenir de la vaccination sur le continent et d'accélérer la mise en œuvre de la Stratégie continentale de vaccination 2026–2030. Les candidats intéressés ont jusqu'au 21 juillet 2026 pour soumettre leur dossier. Le mandat est de deux ans, renouvelable une fois.","date":"2026-07-08"},
{"title":"Épidémie de MVB : pourquoi les fondamentaux de santé publique priment sur les fermetures de frontières","url":"https://khub.africacdc.org/records/resource/africa-cdc-ebola-outbreaks-in-drc-and-uganda-weekly-brief-28th-may-2026","content":"Dans un nouveau rapport publié en juillet 2026, l'Africa CDC souligne que la récente flambée du virus Ebola Bundibugyo en RDC et en Ouganda met en lumière des défis critiques liés à l'absence de vaccins et de traitements homologués contre ce sous-type viral. Face à cette réalité, l'institution africaine insiste sur la primauté des fondamentaux de santé publique : surveillance active, traçage des contacts, isolement des cas et communication communautaire. Le rapport hebdomadaire du 28 mai 2026 documente la progression de l'épidémie et rappelle que les fermetures de frontières constituent une réponse contre-productive, susceptible d'entraver l'acheminement de l'aide et de pousser les cas vers la clandestinité.","date":"2026-07-07"},
{"title":"Africa CDC réunit 13 pays à Kampala pour renforcer la préparation régionale face à la maladie à virus Bundibugyo","url":"https://khub.africacdc.org/records/resource/bundibugyo-ebola-virus-disease-bvd-interim-guidance-on-blanket-travel-restrictions-and-public-gatherings","content":"Kampala, Ouganda, 26 juin 2026 – L'Africa CDC, en collaboration avec l'OMS AFRO et des partenaires internationaux dont le Royaume-Uni, a réuni des représentants de 13 pays africains pour un atelier de préparation régionale face à la maladie à virus Bundibugyo (MVB). En parallèle, l'Africa CDC a publié une orientation intérimaire contre les restrictions générales de voyage, soulignant que les interdictions de voyager à grande échelle ne sont pas étayées par les données épidémiologiques et pourraient compromettre les efforts humanitaires et commerciaux essentiels. L'institution préconise des mesures de santé publique fondées sur les risques pour contenir l'épidémie tout en préservant la connectivité régionale.","date":"2026-07-07"},
{"title":"Africa CDC et WHO AFRO lancent une équipe continentale de gestion des incidents pour renforcer la réponse à l'épidémie de MVB","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Kampala, Ouganda, 27 juin 2026 – Les Centres africains de contrôle et de prévention des maladies (Africa CDC) et le Bureau régional de l'OMS pour l'Afrique (WHO AFRO) ont officiellement lancé une Équipe continentale de soutien à la gestion des incidents (IMST) afin de renforcer le leadership de l'Afrique dans la réponse aux urgences de santé publique. Cette initiative intervient dans le contexte de la flambée en cours de la maladie à virus Bundibugyo (MVB) en RDC et en Ouganda. Le gouvernement ougandais, représenté par son ministre de la Santé, le Dr Chris Baryomunsi, a salué cette collaboration comme un signal fort de la capacité africaine à prendre en main sa propre sécurité sanitaire.","date":"2026-07-07"},
],
"african-medical-agency":[
{"title":"OMS et AMA signent un accord-cadre historique pour renforcer l'accès aux produits de santé de qualité en Afrique","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"Le 21 mai 2026, l'Organisation mondiale de la Santé (OMS) et l'Agence Africaine des Médicaments (AMA) ont signé un Accord-cadre de collaboration à Genève, marquant une étape clé dans l'harmonisation réglementaire pharmaceutique continentale. L'accord définit cinq axes prioritaires : accélérer l'accès aux médicaments sûrs et efficaces, promouvoir la convergence réglementaire entre États membres, renforcer la surveillance des produits sous-standards et falsifiés, développer les capacités réglementaires africaines, et soutenir l'innovation et la production locale en situation d'urgence sanitaire. Ce partenariat vise à réduire les délais moyens d'approbation des médicaments en Afrique subsaharienne, qui atteignent en moyenne 6 à 7 ans, et à ouvrir la voie à un accès plus équitable aux thérapeutiques innovantes pour 1,4 milliard d'Africains. L'accord s'inscrit directement dans la phase d'Expansion de l'AMA (2026-2030).","date":"2026-05-21"},
{"title":"L'AMA entre dans sa phase d'Expansion (2026-2030) : bilan institutionnel, comités techniques et défis réglementaires","url":"https://www.frontiersin.org/journals/medicine/articles/10.3389/fmed.2026.1763261/full","content":"Une analyse publiée dans Frontiers in Medicine retrace la trajectoire de l'Agence Africaine des Médicaments (AMA), basée à Dar es Salaam en Tanzanie, de ses origines jusqu'à sa phase d'Expansion (2026-2030), qui succède à la phase de Fondation (2024-2025). Les défis persistants identifiés incluent : ressources humaines spécialisées insuffisantes, disparités entre les 55 systèmes réglementaires nationaux des États membres de l'Union africaine, et nécessité d'un financement pérenne. L'AMA vise à harmoniser les normes pharmaceutiques à l'échelle continentale, réduire les délais d'approbation des médicaments et créer un environnement propice aux investissements industriels locaux. Les experts soulignent que l'opérationnalisation des comités techniques et des mécanismes d'évaluation conjointe constitue l'enjeu central de 2026 pour consolider la crédibilité de l'agence auprès des fabricants et des régulateurs nationaux.","date":"2026-07-02"},
{"title":"AMA-EMA : premier engagement scientifique conjoint pour accélérer les contre-mesures médicales face à l'épidémie d'Ebola Bundibugyo","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"Dans le contexte de l'épidémie d'Ebola Bundibugyo qui frappe la RDC et l'Ouganda, l'Agence Africaine des Médicaments (AMA) et l'Agence Européenne des Médicaments (EMA) ont tenu en juin 2026 leur premier engagement scientifique conjoint consacré à l'accélération de l'accès aux contre-mesures médicales. Cette réunion inédite fait suite à la visite de la délégation AMA au siège de l'EMA à Amsterdam du 22 au 26 juin 2026 et illustre la montée en puissance du partenariat réglementaire euro-africain. Les échanges ont porté sur les voies d'approbation accélérée pour les vaccins et thérapeutiques expérimentaux contre le virus Bundibugyo, ainsi que sur les mécanismes de partage de données cliniques entre régulateurs. Ce partenariat stratégique Nord-Sud est appelé à devenir un modèle pour la coopération réglementaire internationale face aux urgences sanitaires émergentes.","date":"2026-06-30"},
{"title":"Le lancement de l'Agence Africaine des Médicaments : une révolution pour la régulation pharmaceutique continentale","url":"https://www.nature.com/articles/d44148-025-00350-8","content":"La mise en opération de l'Agence Africaine des Médicaments (AMA) représente une étape décisive pour la régulation pharmaceutique sur le continent africain. L'Agence Européenne des Médicaments (EMA), par la voix de son responsable des affaires internationales Martin Harvey Allchurch, confirme que des financements sont directement orientés vers des projets collaboratifs spécifiques avec l'AMA. Parmi ceux-ci figure un effort conjoint avec l'OMS visant à soutenir le projet pilote de l'AUDA-NEPAD pour la première évaluation et inscription continentale conjointe de médicaments à usage humain — une étape clé dans l'opérationnalisation de l'AMA. Ce mécanisme régional devrait permettre de réduire les délais d'approbation des médicaments en Afrique, d'harmoniser les standards de sécurité et d'ouvrir la voie à un accès plus équitable aux thérapeutiques innovantes pour les populations africaines.","date":"2026-07-05"},
{"title":"EMA renforce sa coopération avec l'AMA : visite de haut niveau à Amsterdam pour consolider le partenariat réglementaire euro-africain","url":"https://techreviewafrica.com/news/6104/african-medicines-agency-enhances-regulatory-cooperation-with-european-medicines-agency","content":"Une délégation de l'Agence Africaine des Médicaments (AMA) a effectué une visite officielle au siège de l'Agence Européenne des Médicaments (EMA) à Amsterdam du 22 au 26 juin 2026 pour approfondir la coopération réglementaire entre les deux institutions. Les échanges ont porté sur le partage de connaissances, l'apprentissage mutuel et les projets pilotes d'évaluation conjointe de médicaments à usage humain menés avec l'AUDA-NEPAD et l'OMS. Cette coopération est d'autant plus stratégique dans le contexte de l'épidémie d'Ebola Bundibugyo, où AMA et EMA ont tenu leur premier engagement scientifique conjoint en juin 2026 pour accélérer l'accès aux contre-mesures médicales. Le partenariat EMA-AMA constitue un modèle de coopération réglementaire Nord-Sud susceptible d'être étendu à d'autres agences du médicament dans le monde.","date":"2026-06-26"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
],
"manufacture-vaccins":[
{"title":"L'Afrique avance dans ses ambitions de fabrication vaccinale : Gavi s'apprête à effectuer ses premiers décaissements à un producteur africain","url":"https://www.semafor.com/article/07/02/2026/africa-moves-ahead-with-vaccine-manufacturing-ambitions","content":"Selon Semafor, Gavi, l'Alliance du vaccin, s'apprête à effectuer ses premiers décaissements directs à un fabricant africain dans le cadre de l'African Vaccine Manufacturing Accelerator (AVMA), doté de 1,2 milliard USD sur dix ans — un tournant historique pour l'industrie pharmaceutique africaine. Ces paiements, attendus au second semestre 2026, s'inscrivent dans un programme d'incitations liées à la demande visant à rendre la production locale économiquement viable. Six fabricants disposent déjà d'installations construites avec des transferts de technologie actifs, dont Atlantic Lifesciences au Ghana. D'ici cinq ans, onze vaccins africains couvrant huit antigènes — rougeole-rubéole, rotavirus et fièvre jaune notamment — devraient atteindre le marché continental. L'Union africaine ambitionne de produire 60 % des vaccins utilisés sur le continent d'ici 2040, contre moins de 1 % actuellement, un objectif qui repose sur des marchés garantis et des financements prévisibles à long terme.","date":"2026-07-02"},
{"title":"Fabrication de vaccins en Afrique : cinq défis critiques ralentissent les producteurs proches de la mise sur le marché","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"Le rapport 2026 de la Clinton Health Access Initiative (CHAI) sur le paysage de la fabrication de vaccins en Afrique identifie cinq obstacles transversaux qui freinent les producteurs proches de la commercialisation : délais réglementaires, incertitude de la demande, lenteur des décaissements financiers, retards des partenaires de transfert de technologie et lacunes en ressources humaines qualifiées. Ces défis ont déjà poussé les calendriers de mise sur le marché de certains fabricants africains. La CHAI recommande une approche intégrée : garantir une demande prévisible, renforcer les accords de transfert de technologie, accélérer la formation de la main-d'œuvre, moderniser les procédures d'approbation réglementaire et diversifier le financement via des subventions, prêts concessionnels et garanties commerciales. Le rapport couvre en particulier les fabricants d'Afrique du Sud, du Sénégal, du Ghana et du Nigeria, les plus avancés dans leur trajectoire vers la commercialisation.","date":"2026-07-01"},
{"title":"Revue 2026 : panorama, innovations et opportunités pour la fabrication de vaccins en Afrique","url":"https://onlinelibrary.wiley.com/doi/full/10.1002/hsr2.71926","content":"Une revue narrative publiée dans Health Science Reports (Wiley, 2026) offre un panorama complet du paysage actuel et des perspectives futures de la fabrication vaccinale sur le continent africain. Les auteurs rappellent que l'Afrique importe encore plus de 99 % de ses vaccins, une dépendance stratégique mise en lumière par la pandémie de COVID-19. La revue analyse les plateformes technologiques prometteuses — ARNm, vaccins recombinants, vaccins vivants atténués — et identifie les niches d'antigènes pour lesquelles la production locale est économiquement viable à court terme. Les fabricants africains les plus avancés incluent Afrigen et BioVac en Afrique du Sud et Biovaccines Nigeria. L'article formule des recommandations politiques pour accélérer la transition vers une fabrication africaine durable, incluant des incitations fiscales, des partenariats public-privé et un soutien réglementaire adapté aux réalités continentales.","date":"2026-06-28"},
{"title":"Kenya : Africa CDC signe un accord historique pour son centre régional de coordination en Afrique de l'Est","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Africa CDC a signé un accord de partenariat stratégique avec le gouvernement du Kenya, qui met à disposition 10 acres de terrain et une contribution financière de 2 millions USD pour le Centre régional de coordination de l'Afrique de l'Est, basé à Nairobi. Ce centre, l'un des cinq que compte Africa CDC sur le continent, sera doté prochainement d'un laboratoire régional de référence dont le financement est activement recherché. Le Dr Jean Kaseya a appelé les pays africains à suivre l'exemple du Kenya pour soutenir la production et la surveillance sanitaire continentales.","date":"2026-07-08"},
{"title":"CPHIA 2026 : l'Afrique réunit ses leaders de santé publique à Addis-Abeba pour accélérer l'innovation","url":"https://cphia.africacdc.org","content":"La 5e Conférence internationale sur la santé publique en Afrique (CPHIA 2026) se tiendra à Addis-Abeba, avec comme thématiques phares l'innovation en santé, la fabrication locale de produits médicaux et les technologies de santé africaines. Plus de 30 000 délégués sont attendus pour explorer les solutions de fabrication continentale de vaccins et de médicaments, dans le cadre de la souveraineté sanitaire africaine. Les soumissions d'abstracts et de candidatures aux bourses sont ouvertes jusqu'au 15 août 2026.","date":"2026-07-08"},
{"title":"Fabrication de vaccins contre l'Ebola Bundibugyo : un défi urgent pour l'industrie pharmaceutique africaine","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"L'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda met en lumière un vide industriel criant : il n'existe à ce jour aucun vaccin ni traitement thérapeutique homologué spécifiquement contre ce sérotype viral. Africa CDC souligne dans ses rapports de situation que l'absence de contre-mesures médicales oblige les équipes de terrain à s'appuyer exclusivement sur les fondamentaux de la santé publique — surveillance, isolement, traçage des contacts et prévention des infections — plutôt que sur des outils biomédicaux. Cette situation relance le débat sur la nécessité d'accélérer les investissements en R&D et en capacités de fabrication locales pour des vaccins contre les filovirus négligés. Des appels ont été lancés auprès des partenaires industriels et des gouvernements africains pour financer le développement et la production à l'échelle continentale.","date":"2026-07-06"},
{"title":"Africa CDC publie une feuille de route pour l'autosuffisance africaine en matière de fabrication de vaccins","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"Dans le cadre de sa réponse à la crise sanitaire provoquée par le virus Bundibugyo, l'Africa CDC a mis en avant l'urgence de développer des capacités locales de fabrication vaccinale sur le continent. Un document stratégique récemment publié, intitulé « Operationalizing African self-reliance in vaccine manufacturing », souligne la nécessité pour l'Afrique de réduire sa dépendance vis-à-vis des producteurs extérieurs, en particulier face aux nouvelles menaces épidémiques comme la maladie à virus Ebola Bundibugyo. Parmi les leviers identifiés figurent l'accélération des transferts de technologie, le renforcement des infrastructures de production locale, et le soutien institutionnel aux fabricants africains émergents. Cette ambition s'inscrit dans le plan continental de réponse à l'épidémie, doté de 518 millions de dollars, qui intègre explicitement la recherche et le développement de vaccins candidats comme priorité opérationnelle.","date":"2026-07-05"},
{"title":"Projections de scénarios modélisés pour la flambée d'Ebola à virus Bundibugyo 2026 : quelles implications pour la production de contre-mesures médicales ?","url":"https://www.cdc.gov/mmwr/volumes/75/wr/mm7522e1.htm","content":"Une étude publiée dans le MMWR présente des projections de scénarios modélisés pour la flambée de maladie à virus Bundibugyo (BVD) en 2026, adaptée d'un modèle utilisé lors de précédentes épidémies de fièvres hémorragiques virales, dont la flambée de Marburg en Éthiopie en 2025. Les simulations, initialisées à partir d'un seul cas index, évaluent le nombre cumulatif de cas et de décès sur une période de 90 jours suivant le début des interventions. Ces modélisations sont cruciales pour les décideurs de santé publique et les fabricants de vaccins et de thérapeutiques, car elles permettent d'anticiper les besoins en doses, d'optimiser les chaînes d'approvisionnement et de prioriser la production de contre-mesures médicales adaptées au virus Bundibugyo, pour lequel les stocks de vaccins expérimentaux demeurent extrêmement limités.","date":"2026-07-04"},
],
"unicef-gavi":[
{"title":"Gavi Phase 6 (2026-2030) : vacciner plus de 500 millions d'enfants et sauver 8 à 9 millions de vies supplémentaires","url":"https://www.gavi.org/our-alliance/strategy/phase-6-2026-2030","content":"Gavi, l'Alliance du vaccin, a officiellement lancé sa stratégie pour la Phase 6 (2026-2030), qui ambitionne de vacciner plus de 500 millions d'enfants et adolescents supplémentaires dans les pays à revenus faibles et intermédiaires, sauvant ainsi 8 à 9 millions de vies, dont 1,5 million grâce au seul vaccin anti-HPV. La Phase 6 marque un élargissement du mandat de Gavi avec un accent sur les vaccins contre le paludisme, l'HPV et d'autres maladies à fort impact sur l'espérance de vie. La sécurité de l'approvisionnement régional en Afrique constitue l'un des piliers de cette phase, directement liée à l'African Vaccine Manufacturing Accelerator (AVMA) doté de 1,2 milliard USD. Gavi cherche à lever les financements nécessaires lors d'un Sommet mondial sur la santé et la prospérité par l'immunisation, mobilisant gouvernements, fondations et secteur privé autour de ces objectifs.","date":"2026-01-01"},
{"title":"Les systèmes de vaccination en Afrique progressent contre le cancer et le paludisme, mais des pressions financières menacent les acquis","url":"https://www.gavi.org/news/media-room/africas-routine-vaccine-systems-deliver-gains-against-cancer-and-malaria-funding","content":"Les systèmes africains de vaccination de routine enregistrent des gains tangibles : le nombre de maladies couvertes par les calendriers nationaux est passé de 8 en 2000 à 13 aujourd'hui, et plus de 52 millions de doses de vaccin antipaludéen (RTS,S/R21) ont été administrées depuis 2023 dans des contextes à haute charge de morbidité. Le vaccin HPV progresse également avec des résultats significatifs sur la réduction des infections à papillomavirus liées au cancer du col de l'utérus. Cependant, des pressions financières croissantes — liées aux incertitudes du financement international et aux chocs économiques mondiaux — menacent la pérennité de ces progrès. Gavi et l'UNICEF appellent les gouvernements et donateurs à maintenir leurs engagements et à renforcer les systèmes nationaux d'immunisation pour que les gains bénéficient durablement aux populations africaines les plus vulnérables.","date":"2026-07-01"},
{"title":"Big Catch-Up : plus de 100 millions de doses livrées à 18,3 millions d'enfants dans 36 pays — la plus grande initiative de rattrapage vaccinal de l'histoire","url":"https://www.who.int/news/item/24-04-2026-largest-catch-up-initiative-delivers-over-100-million-childhood-vaccinations","content":"L'OMS, l'UNICEF et Gavi ont annoncé le 24 avril 2026 les résultats de la plus grande initiative de rattrapage vaccinal jamais conduite : plus de 100 millions de doses ont été délivrées à 18,3 millions d'enfants dans 36 pays, dont 12,3 millions étaient des enfants zéro-dose n'ayant auparavant reçu aucun vaccin de routine. Cette initiative, The Big Catch-Up, a été lancée pour combler les lacunes de couverture vaccinale creusées par la pandémie de COVID-19. Les pays d'Afrique subsaharienne figurent parmi les principaux bénéficiaires, dans des contextes sécuritaires et logistiques complexes. Ce succès démontre la capacité du système mondial de vaccination à mobiliser des ressources exceptionnelles et à atteindre les populations les plus vulnérables, y compris dans les zones de conflit et les régions enclavées, posant ainsi un modèle opérationnel pour les futures urgences vaccinales.","date":"2026-04-24"},
{"title":"Mpox en Afrique de l'Est : UNICEF et partenaires intensifient la réponse vaccinale régionale","url":"https://pmc.ncbi.nlm.nih.gov/articles/PMC12887430","content":"Alors que l'épidémie de mpox continue de toucher plusieurs pays d'Afrique de l'Est, dont la RDC et le Rwanda, UNICEF et ses partenaires renforcent leurs interventions pour soutenir la vaccination et la surveillance épidémiologique. Au Rwanda, les premiers cas liés à des voyages en provenance de la RDC ont été détectés dès juillet 2024, avec identification du clade Ib MPXV. Le Centre biomédical du Rwanda (RBC) coordonne la réponse nationale, en lien avec les agences onusiennes pour l'approvisionnement en vaccins et la prise en charge communautaire.","date":"2026-07-08"},
{"title":"Gavi et UNICEF face à l'épidémie Ebola Bundibugyo : mobilisation pour accélérer l'accès aux contre-mesures médicales","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"Dans le contexte de l'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda, Gavi et l'UNICEF sont activement sollicités pour soutenir les efforts de réponse continentale coordonnés par Africa CDC et l'OMS. Le rapport hebdomadaire de renseignement épidémiologique d'Africa CDC (juin 2026) souligne l'urgence d'une mobilisation des partenaires internationaux, dont Gavi et l'UNICEF, pour faciliter l'accès aux produits de santé essentiels, financer la surveillance et renforcer l'engagement communautaire dans les zones touchées. Ces organisations jouent un rôle clé dans la coordination logistique et le financement des interventions vaccinales d'urgence en Afrique subsaharienne.","date":"2026-07-06"},
{"title":"Ebola Bundibugyo : UNICEF et Gavi mobilisés pour soutenir la réponse vaccinale en RDC et en Ouganda","url":"https://khub.africacdc.org/health-topics/surveillance","content":"Face à la progression de l'épidémie de maladie à virus Ebola Bundibugyo en République Démocratique du Congo et en Ouganda, les partenaires internationaux dont l'UNICEF et Gavi sont appelés à jouer un rôle crucial dans la chaîne d'approvisionnement en vaccins candidats et dans le soutien logistique aux systèmes de santé affectés. Les rapports situationnels de l'Africa CDC font état de défis persistants en matière de surveillance, de gestion des cas et de prévention des infections, notamment dans la province de l'Ituri, épicentre de l'épidémie. La mobilisation de ressources pour la vaccination de riposte, la formation des agents de santé communautaire et la communication sur les risques constituent des axes prioritaires d'intervention pour ces organisations, dans un contexte où les taux de létalité varient significativement selon les provinces et zones de santé touchées.","date":"2026-07-05"},
{"title":"UNICEF et Gavi lancent un appel aux fabricants pour accélérer l'accès aux vaccins contre l'Ebola Bundibugyo","url":"https://www.unicef.org/press-releases/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"UNICEF et Gavi, l'Alliance du vaccin, ont lancé conjointement un appel urgent aux fabricants pharmaceutiques mondiaux pour accélérer l'accès à des vaccins contre le virus Bundibugyo Ebolavirus, en réponse à l'épidémie dévastatrice qui frappe la RDC et l'Ouganda depuis mai 2026. Cet appel vise à identifier des candidats-vaccins en développement susceptibles de bénéficier d'un financement accéléré et d'un soutien réglementaire pour atteindre rapidement les populations à risque. UNICEF assurera la coordination logistique et la chaîne du froid pour le déploiement des vaccins candidats, tandis que Gavi mobilisera les financements nécessaires à l'acquisition et à la distribution équitable. Cette initiative illustre le rôle central des deux organisations dans la préparation et la réponse aux épidémies émergentes en Afrique.","date":"2026-07-01"},
],
"sante-maroc":[
{"title":"Santé au Maroc en 2026 : CHU, hôpitaux rénovés et feuille de soins électronique — les grands chantiers de l'année","url":"https://www.leconomiste.com/sante-les-chantiers-2026/","content":"L'Economiste dresse en juillet 2026 le panorama des grands chantiers sanitaires qui transforment le système de santé marocain. La construction de nouveaux Centres hospitaliers universitaires (CHU) dans les régions encore dépourvues est prioritaire, avec l'objectif d'une couverture nationale quasi-complète d'ici fin 2027 — toutes les régions disposant d'un CHU, à l'exception de Dakhla-Oued Eddahab. Quatre-vingt-dix hôpitaux existants bénéficient simultanément d'un programme de rénovation et de mise à niveau technique. Sur le front numérique, la généralisation de la feuille de soins électronique constitue le principal chantier digital de 2026, visant à simplifier les démarches des patients assurés et améliorer la traçabilité des actes médicaux. Les Groupements sanitaires territoriaux (GST), nouvelles entités de gouvernance régionale intégrant tous les établissements d'une région, sont progressivement opérationnalisés pour améliorer la coordination et réduire les ruptures dans les parcours de soins.","date":"2026-07-05"},
{"title":"PLF 2026 au Maroc : une impulsion historique pour un système de santé plus équitable, entre ambitions et défis de mise en œuvre","url":"https://fnh.ma/article/actualite-financiere-maroc/plf-2026-sante-systeme","content":"Le Projet de loi de finances 2026 du Maroc consacre une hausse historique du budget de la santé à 42,4 milliards de dirhams — soit +30 % par rapport à 2025 — traduisant la priorité accordée à la réforme structurelle du système de soins dans le cadre de la Vision royale de l'État social. Sur cette enveloppe, 16,4 milliards de dirhams couvrent les dépenses de personnel avec la création de 8 000 nouveaux postes budgétaires pour attirer les professionnels de santé vers le secteur public. La Financière de l'Habitat (FNH) souligne que le défi central réside dans la capacité d'exécution de ces crédits : les exercices précédents ont enregistré des taux de sous-consommation budgétaire atteignant 20 à 30 % dans le secteur de la santé. La rationalisation de la commande publique, la fluidification des procédures de recrutement médical et l'accélération des appels d'offres pour les infrastructures hospitalières constituent les impératifs opérationnels de 2026.","date":"2026-07-01"},
{"title":"La modernisation du secteur de la santé au Maroc : pilier central de la Vision royale pour le développement socio-économique","url":"https://maroc.ma/en/news/upgrading-health-sector-essential-lever-implementing-royal-vision-achieve-socio-economic-growth","content":"Le portail officiel Maroc.ma met en lumière comment la réforme du secteur de la santé s'inscrit comme levier central de la Vision royale pour le développement socio-économique du Royaume. La réforme repose sur quatre piliers fondamentaux : la refonte de l'organisation des soins via les Groupements sanitaires territoriaux (GST), la généralisation de la couverture médicale de base (AMO) à l'ensemble de la population, la valorisation des ressources humaines en santé par des programmes massifs de recrutement et de formation, et la digitalisation des services médicaux. Ces transformations visent à réduire les inégalités territoriales persistantes en accès aux soins, à renforcer la résilience du système sanitaire face aux crises, et à positionner le Maroc comme pôle régional d'excellence médicale et pharmaceutique en Afrique du Nord, avec des indicateurs de santé ciblés au niveau des pays à revenu intermédiaire supérieur d'ici 2030.","date":"2026-07-05"},
{"title":"Le Maroc consolide son système de santé publique à l'aune des défis épidémiques continentaux","url":"https://microbiotics.com.ng/africa-cdc-strategic-plan-2022-2026?pdf=4936","content":"Dans un contexte de flambées épidémiques récurrentes sur le continent africain, le Maroc renforce ses dispositifs de veille sanitaire et de réponse aux urgences de santé publique. Le Royaume s'appuie sur son réseau de laboratoires de référence et sur ses partenariats avec des institutions internationales telles qu'Africa CDC et l'OMS pour détecter précocement toute menace épidémique. Le Plan stratégique 2022-2026 d'Africa CDC, qui prévoit un Centre de coordination régional pour l'Afrique du Nord basé au Caire, constitue une opportunité pour le Maroc de renforcer son intégration dans l'architecture continentale de sécurité sanitaire. Les autorités marocaines veillent par ailleurs à maintenir des capacités de prise en charge des maladies à potentiel épidémique importées, dans le respect des Règlements sanitaires internationaux.","date":"2026-07-04"},
{"title":"Budget santé 2026 au Maroc : 42,4 milliards de dirhams, une hausse de 30 % et 8 000 nouveaux postes budgétaires","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le ministère marocain de la Santé et de la Protection sociale dispose en 2026 d'un budget record de 42,4 milliards de dirhams, en hausse de 30 % par rapport à l'exercice précédent, dans le cadre de la réforme structurelle du système national de santé portée par la Vision royale de l'État social. Sur cette enveloppe, 16,4 milliards de dirhams sont dédiés aux dépenses de personnel, avec la création de 8 000 nouveaux postes budgétaires pour renforcer les ressources humaines à tous les niveaux du système de soins. Les investissements prioritaires de 2026 incluent la construction de nouveaux Centres hospitaliers universitaires (CHU), la mise à niveau de 90 hôpitaux existants et le déploiement progressif des Groupements sanitaires territoriaux (GST). D'ici fin 2027, toutes les régions du Maroc, à l'exception de Dakhla-Oued Eddahab, disposeront de leur propre CHU.","date":"2026-07-03"},
{"title":"Réforme de l'état social au Maroc : la santé change d'échelle avec les Groupements sanitaires territoriaux","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"La réforme du secteur de la santé au Maroc entre en 2026 dans une phase décisive avec l'opérationnalisation progressive des Groupements sanitaires territoriaux (GST), nouvelles entités de gouvernance régionale chargées d'intégrer et de coordonner l'ensemble des établissements de santé d'une même région. Cette restructuration vise à mettre fin à la fragmentation du système de soins, à améliorer l'accès aux soins en milieu rural et semi-urbain, et à renforcer la complémentarité entre les secteurs public et privé. Si l'ambition réformatrice est globalement saluée, des résistances subsistent parmi les professionnels de santé face aux changements organisationnels, notamment concernant la mobilité des personnels et la redistribution des compétences entre niveaux de soins. La généralisation de la feuille de soins électronique constitue un autre chantier prioritaire de 2026, visant à simplifier les démarches administratives et améliorer la traçabilité des soins.","date":"2026-07-01"},
],
"vaccins-monde":[
{"title":"La vaccination préventive contre le choléra reprend dans le monde : le Mozambique ouvre la voie après trois ans d'interruption","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'OMS a annoncé le 4 février 2026 la reprise des campagnes de vaccination préventive contre le choléra après plus de trois ans d'interruption due à une pénurie mondiale critique de vaccins oraux (OCV). Le Mozambique est le premier pays à avoir relancé une campagne préventive — distincte des vaccinations curatives en contexte épidémique. Cette reprise est rendue possible par une augmentation significative de la production mondiale d'OCV, atteignant un niveau suffisant pour alimenter à la fois les réponses d'urgence et les vaccinations préventives dans les zones à haut risque. L'OMS rappelle que le choléra touche encore 1 à 4 millions de personnes par an, causant entre 21 000 et 143 000 décès annuels, avec une surreprésentation massive des populations africaines et des communautés déplacées. La levée de cette pénurie vaccinale marque un tournant décisif dans la lutte mondiale contre cette maladie pourtant évitable.","date":"2026-02-04"},
{"title":"Vaccination infantile mondiale en 2024 : 85 % de couverture DTP3 maintenue, mais 14 millions de nourrissons sans aucun vaccin de routine","url":"https://www.unicef.org/press-releases/global-childhood-vaccination-holds-steady-yet-over-14-million-infants-remain","content":"L'OMS et l'UNICEF ont publié leurs statistiques mondiales de couverture vaccinale pour 2024 : le taux de vaccination par le DTP3 se maintient à 85 %, permettant à 1 million d'enfants supplémentaires d'être protégés par rapport à 2023. Malgré ce progrès, plus de 14 millions de nourrissons demeurent sans aucun vaccin de routine — un chiffre préoccupant concentré principalement en Afrique subsaharienne et en Asie du Sud. Ces enfants zéro-dose, souvent issus des communautés les plus marginalisées, en situation de déplacement ou en zones de conflit, représentent la cible prioritaire des programmes d'immunisation mondiaux. L'UNICEF appelle à un doublement des efforts pour atteindre ces populations, notamment en intégrant la vaccination dans les services de santé communautaires et en renforçant les systèmes d'information sanitaire dans les zones reculées.","date":"2026-06-01"},
{"title":"Les grandes avancées vaccinales attendues en 2026 : ARNm, vaccins combinés et nouvelles cibles — cinq experts partagent leur vision","url":"https://www.gavi.org/vaccineswork/what-are-biggest-vaccine-breakthroughs-coming-2026-we-asked-six-experts","content":"La plateforme VaccinesWork de Gavi a interrogé cinq experts mondiaux de la vaccination sur les percées majeures attendues en 2026. Les spécialistes s'accordent sur plusieurs tendances fortes : l'expansion des vaccins à ARNm au-delà du COVID-19, avec des candidats avancés contre la grippe, la tuberculose et le VIH ; le développement de vaccins combinés de nouvelle génération réduisant le nombre d'injections tout en élargissant la couverture immunitaire ; et des avancées significatives contre des maladies négligées comme la leishmaniose et la trypanosomiase. Les experts soulignent également le rôle croissant de l'intelligence artificielle dans la conception des antigènes vaccinaux. En contexte africain, la disponibilité élargie du vaccin antipaludéen R21 et l'extension des programmes HPV constituent les priorités les plus immédiates pour réduire la mortalité évitable sur le continent.","date":"2025-12-15"},
{"title":"OMS : le Comité PDVAC se réunit le 6 juillet 2026 pour définir les priorités mondiales de développement vaccinal","url":"https://www.who.int/news-room/events/detail/2026/07/06/default-calendar/2026-who-product-development-for-vaccines-advisory-committee-meeting-(pdvac)","content":"Le Comité consultatif pour le développement de produits vaccinaux (PDVAC) de l'OMS tient sa réunion annuelle le 6 juillet 2026 pour examiner les priorités mondiales en matière de R&D vaccinale, notamment les candidats-vaccins contre le virus Bundibugyo, la dengue, le paludisme et d'autres pathogènes prioritaires. Ce comité d'experts indépendants — virologues, immunologistes et spécialistes de santé publique — formule des recommandations sur les technologies vaccinales à prioriser, les essais cliniques à soutenir et les mécanismes d'accès équitable. Dans le contexte de la crise Ebola Bundibugyo, le PDVAC joue un rôle critique pour guider les investissements en R&D et accélérer le développement de contre-mesures médicales adaptées à ce virus pour lequel aucun vaccin homologué n'existe à ce jour. Ses recommandations orienteront les stratégies d'investissement des grandes institutions mondiales de santé pour les années à venir.","date":"2026-07-06"},
{"title":"Africa CDC lance la 5e Conférence internationale sur la santé publique en Afrique (CPHA 2026)","url":"https://www.youtube.com/watch?v=0m1yPcfq680","content":"L'Africa CDC et le gouvernement éthiopien s'apprêtent à lancer officiellement la 5e Conférence internationale sur la santé publique en Afrique (CPHA 2026), décrite comme le plus grand événement de santé publique du continent. Lors d'un briefing spécial diffusé le 7 mai 2026, les responsables de l'Africa CDC ont annoncé que la vaccination contre le mpox et d'autres activités de surveillance figurent parmi les priorités opérationnelles de l'organisation. Par ailleurs, 13 pays africains se sont réunis à Brazzaville, au siège du bureau régional de l'OMS pour l'Afrique, pour signer un mémorandum d'entente visant à renforcer la surveillance transfrontalière et la préparation aux épidémies, une initiative susceptible de transformer la réponse vaccinale et épidémiologique dans les régions d'Afrique centrale, orientale, septentrionale, méridionale et occidentale.","date":"2026-07-03"},
{"title":"Maladies fongiques : Africa CDC et GAFFI appellent à une stratégie vaccinale et diagnostique renforcée sur le continent","url":"https://www.instagram.com/reel/DV8ENATglhc","content":"Lors du premier Sommet africain sur les maladies fongiques, co-organisé par Africa CDC et la Global Action For Fungal Infections (GAFFI), les participants ont appelé à élever ces pathologies souvent négligées au rang de priorité mondiale en matière de santé publique. Les experts ont plaidé pour le renforcement de la surveillance, l'amélioration des diagnostics et l'expansion des traitements, tout en pointant l'urgence de soutenir la recherche et le développement de nouveaux outils thérapeutiques et préventifs, y compris des pistes vaccinales. La résistance aux antifongiques, phénomène croissant sur le continent africain, a été identifiée comme une menace émergente nécessitant une réponse coordonnée à l'échelle mondiale, à l'image des stratégies développées contre la résistance aux antimicrobiens.","date":"2026-07-01"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
