var articlesData={
"african-cdc":[
{"title":"Africa CDC calls for stronger protection of health workers as Ebola outbreak intensifies","url":"https://africacdc.org/news-item/africa-cdc-calls-for-stronger-protection-of-responders/","content":"On July 13, 2026, Africa CDC issued an urgent call for stronger protection of health responders on the front lines of the Bundibugyo Ebola outbreak in DRC and Uganda. By mid-July, 112 health workers had been infected with the Bundibugyo virus across the DRC since the outbreak began, including 35 who died — a stark indicator of the extreme occupational risks on the ground. The confirmed infection of a U.S. humanitarian worker supporting operations in Bunia further underscored the urgency. Africa CDC called on all organisations operating in affected areas to strengthen occupational safety protocols, report suspected exposures and symptoms rapidly, and provide continuous psychosocial support to their personnel. Through the Continental Incident Management Support Team (IMST), Africa CDC continues to coordinate with DRC, Uganda and international partners to contain the outbreak and protect frontline responders.","date":"17-07-2026"},
{"title":"Africa CDC welcomes 2025 WUENIC data: DTP3 coverage reaches 77% in Africa — still below pre-pandemic levels","url":"https://africacdc.org/news-item/statement-by-africa-cdc-on-the-release-of-the-2025-who-unicef-estimates-of-national-immunization-coverage-wuenic/","content":"On July 15, 2026, Africa CDC joined WHO, UNICEF, Gavi and other partners in welcoming the release of the 2025 WHO/UNICEF Estimates of National Immunization Coverage (WUENIC). In the African continent, DTP3 (diphtheria, tetanus and pertussis) coverage has steadily recovered from a low of 73% in 2021 — a direct consequence of COVID-19 pandemic disruptions — reaching 77% in 2025. While this marks important progress, coverage remains below the pre-pandemic level of 79% recorded in 2019, reflecting lasting structural damage to routine immunisation services. Africa CDC called for sustained investment in health systems to close the remaining gap, particularly in conflict-affected and hard-to-reach communities. The WUENIC data will guide Gavi, UNICEF and member states' vaccination strategies for the coming period.","date":"15-07-2026"},
{"title":"CPHIA 2026 : l'Afrique se prépare à accueillir 30 000 délégués à Addis-Abeba","url":"https://cphia.africacdc.org","content":"La 5e Conférence internationale sur la santé publique en Afrique (CPHIA 2026) se tiendra à Addis-Abeba, capitale diplomatique du continent africain et siège de l'Union africaine. Organisée par Africa CDC, la conférence réunira plus de 30 000 délégués — chefs d'État, ministres, chercheurs et innovateurs — autour des défis de santé publique les plus pressants du continent. Les travaux s'articuleront notamment autour de la refonte de l'architecture mondiale de la santé sous leadership africain, de l'institutionnalisation de la prévention et de la préparation aux pandémies, ainsi que d'un salon d'innovation dédié aux technologies de santé africaines. La date limite de soumission des résumés et des candidatures aux bourses de voyage est fixée au 15 août 2026. Le Dr Jean Kaseya, Directeur général d'Africa CDC, figurera parmi les conférenciers principaux.","date":"2026-07-12"},
{"title":"Africa CDC and WHO unveil $518 million joint continental Ebola response plan","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"Africa CDC and WHO officially launched a joint continental preparedness and response plan for the Bundibugyo Ebola outbreak on June 5, 2026. The six-month strategy, running from June to November 2026, is costed at $518 million and operates under a 'One Plan, One Budget, One Team' framework led by the affected nations — the Democratic Republic of the Congo and Uganda — supported by regional and international partners. Key operational pillars include emergency coordination, laboratory testing, disease surveillance, infection prevention and control, clinical care, community engagement, and logistics. Dr. Jean Kaseya, Director-General of Africa CDC, underscored the urgency: \"Ebola moves fast. Africa must move faster. This joint plan gives the continent a clear path to act with speed and unity.\" A joint financial tracking mechanism has been put in place to ensure full transparency in fund utilisation.","date":"2026-07-12"},
{"title":"Ebola moves faster than the response: Africa CDC chief sounds the alarm","url":"https://www.thenewhumanitarian.org/interview/2026/07/09/ebola-moving-faster-than-response-head-africa-cdc-warns","content":"Africa CDC Director General Dr. Jean Kaseya issued an urgent warning on July 9, 2026: the Ebola outbreak driven by the Bundibugyo virus in eastern DRC has yet to reach its peak, yet treatment centres are already at saturation point. In an interview with The New Humanitarian, Kaseya called on the international community to \"act now or pay a much higher price later,\" stressing that the pace of the outbreak is outstripping the pace of the response. Uganda has closed its borders with DRC in a bid to contain cross-border spread, but the move has crippled regional trade and raised humanitarian concerns. Africa CDC continues to coordinate with Member States and partners to accelerate detection, care, and community engagement in conflict-affected Ituri province.","date":"2026-07-12"},
{"title":"Africa CDC déploie une stratégie d'engagement des jeunes dans la santé mondiale : la YES!Health 2025-2028","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"L'Africa CDC a publié sa stratégie d'engagement et de participation des jeunes dans la santé mondiale, baptisée YES!Health (Youth Engagement and Participation in Global Health), couvrant la période 2025-2028. Portée par le Dr Chrys Promesse Kaniki, cette initiative reconnaît le rôle crucial des jeunes africains âgés de 15 à 35 ans — qui représentent plus de 65 % de la population du continent — dans la résolution des défis sanitaires persistants. La stratégie vise à intégrer les jeunes comme acteurs à part entière des systèmes de santé publique, en leur offrant des plateformes de participation active dans les politiques de santé, la surveillance épidémique et la réponse aux urgences. Cette démarche s'inscrit dans la vision plus large de l'Africa CDC de bâtir une Afrique résiliente, capable de prendre en charge sa propre sécurité sanitaire, notamment dans un contexte marqué par la recrudescence des maladies à virus Ebola et les séquelles de la pandémie de COVID-19 sur les systèmes de surveillance des maladies non transmissibles.","date":"2026-07-11"},
{"title":"Africa CDC et WHO AFRO lancent une équipe continentale de gestion des incidents pour renforcer la réponse aux urgences de santé publique","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Kampala, Ouganda, 27 juin 2026 — L'Africa CDC et le Bureau régional de l'OMS pour l'Afrique (WHO AFRO) ont officiellement lancé une Équipe continentale de gestion des incidents (IMST), en présence du ministre ougandais de la Santé, le Dr Chris Baryomunsi. Cette initiative vise à renforcer le leadership de l'Afrique dans la gestion des urgences de santé publique, en particulier dans le contexte de l'épidémie de maladie à virus Ebola Bundibugyo qui sévit en RDC et en Ouganda. Par ailleurs, l'Africa CDC a réuni 13 pays à Kampala pour un atelier de préparation régionale face à cette menace épidémique. Lors d'une réunion de haut niveau présidentielle tenue le 16 juin 2026 sous la présidence du Président du Burundi, S.E. Évariste Ndayishimiye, les chefs d'État et de gouvernement africains ont exprimé leur engagement collectif à intensifier la réponse continentale. Le Président de la RDC, Félix Antoine Tshisekedi, a également accueilli le Président ougandais le 2 juillet 2026, soulignant la dimension diplomatique et régionale de cette crise sanitaire sans précédent.","date":"2026-07-11"},
{"title":"Épidémie de maladie à virus Bundibugyo : 1 581 cas confirmés et 508 morts en RDC et en Ouganda","url":"https://khub.africacdc.org/health-topics/surveillance","content":"L'épidémie de maladie à virus Bundibugyo (BVD) en République démocratique du Congo (RDC) et en Ouganda atteint un niveau alarmant en ce début juillet 2026. Selon les dernières données publiées par l'Africa CDC, le cumul des cas confirmés dans les deux pays s'élève à 1 581, avec 508 décès recensés, portant le taux de létalité global à 32,1 %. La province de l'Ituri en RDC demeure l'épicentre de la crise, concentrant plus de 90 % des cas confirmés et près de 84 % des décès. Le Nord-Kivu, autre province affectée, enregistre quant à lui le taux de létalité provincial le plus élevé, atteignant 57,4 %, témoignant de la gravité de la situation clinique et des difficultés de prise en charge sur le terrain. En Ouganda, la situation reste relativement stable avec 20 cas confirmés et 2 décès. L'Africa CDC maintient une surveillance renforcée aux points d'entrée et de sortie, et appelle à une vigilance soutenue face au risque persistant de transmission transfrontalière.","date":"2026-07-11"},
],
"african-medical-agency":[
{"title":"WHO and African Medicines Agency sign landmark framework agreement to improve access to quality health products in Africa","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"On May 21, 2026, the World Health Organization (WHO) and the African Medicines Agency (AMA) launched and signed a Framework Agreement for Collaboration — a historic milestone for pharmaceutical regulation across Africa. Under the agreement, WHO and AMA committed to jointly accelerate access to safe, effective and quality-assured health products; promote regulatory harmonization and convergence across member states; strengthen pharmacovigilance and combat substandard and falsified medicines; build regulatory capacity and workforce; and support local production and regulatory preparedness during public health emergencies such as the ongoing Bundibugyo Ebola outbreak. The framework positions the AMA — now operational in Kigali, Rwanda — as the continent's central regulatory authority and a key partner in WHO's global health security architecture. This agreement is expected to significantly reduce approval timelines for vaccines and therapeutics destined for African markets.","date":"21-05-2026"},
{"title":"AMA and Medicines for Africa join forces to protect patients from substandard and falsified drugs across Africa","url":"https://www.cnbcafrica.com/2026/medicines-for-africa-and-the-african-medicines-agency-join-forces-to-protect-patients-from-unsafe-medicines-across-africa","content":"The African Medicines Agency (AMA) and Medicines for Africa (MFA) have signed a landmark partnership agreement to enhance continental regulatory coordination and harmonization in the fight against substandard and falsified medical products — a public health crisis estimated to cause tens of thousands of deaths across Africa every year. As the first joint initiative, AMA and MFA will co-convene the Africa Patient Safety Summit in Kigali, Rwanda, on September 16–17, 2026, bringing together regulators, manufacturers, health professionals and patient advocates. Falsified and substandard medicines are estimated to account for up to 30% of drugs in circulation in parts of Sub-Saharan Africa. This partnership reinforces the AMA's growing continental regulatory authority since becoming operational in Kigali in early 2026, and complements its framework agreement with WHO signed in May 2026.","date":"10-07-2026"},
{"title":"L'Agence africaine des médicaments officiellement opérationnelle à Kigali","url":"https://www.instagram.com/reel/DXKBkARCACi","content":"L'Agence africaine des médicaments (AMA) a officiellement ouvert ses portes à Kigali, au Rwanda, marquant une étape historique pour la santé publique continentale. Cette ouverture représente une avancée majeure vers une meilleure collaboration entre les États membres de l'Union africaine et un accès renforcé à des produits médicaux sûrs, efficaces et de qualité à travers le continent. L'initiative OneHealth EU, partenaire clé du processus, salue ce jalon et partage les coulisses des premières semaines d'activité de l'agence, avec des témoignages directs des leaders qui ont porté ce projet. L'AMA a vocation à harmoniser la réglementation pharmaceutique africaine, à réduire la dépendance aux agences extérieures et à accélérer l'approbation de médicaments et vaccins essentiels pour les populations africaines.","date":"2026-07-12"},
{"title":"Le lancement de l'Agence Africaine des Médicaments : une révolution pour la régulation pharmaceutique continentale","url":"https://www.nature.com/articles/d44148-025-00350-8","content":"La mise en opération de l'Agence Africaine des Médicaments (AMA) représente une étape décisive pour la régulation pharmaceutique sur le continent africain. L'Agence Européenne des Médicaments (EMA), par la voix de son responsable des affaires internationales Martin Harvey Allchurch, confirme que des financements sont directement orientés vers des projets collaboratifs spécifiques avec l'AMA. Parmi ceux-ci figure un effort conjoint avec l'OMS visant à soutenir le projet pilote de l'AUDA-NEPAD pour la première évaluation et inscription continentale conjointe de médicaments à usage humain — une étape clé dans l'opérationnalisation de l'AMA. Ce mécanisme régional devrait permettre de réduire les délais d'approbation des médicaments en Afrique, d'harmoniser les standards de sécurité et d'ouvrir la voie à un accès plus équitable aux thérapeutiques innovantes pour les populations africaines.","date":"2026-07-05"},
{"title":"EMA renforce sa coopération avec l'AMA : visite de haut niveau à Amsterdam pour consolider le partenariat réglementaire euro-africain","url":"https://techreviewafrica.com/news/6104/african-medicines-agency-enhances-regulatory-cooperation-with-european-medicines-agency","content":"Une délégation de l'Agence Africaine des Médicaments (AMA) a effectué une visite officielle au siège de l'Agence Européenne des Médicaments (EMA) à Amsterdam du 22 au 26 juin 2026 pour approfondir la coopération réglementaire entre les deux institutions. Les échanges ont porté sur le partage de connaissances, l'apprentissage mutuel et les projets pilotes d'évaluation conjointe de médicaments à usage humain menés avec l'AUDA-NEPAD et l'OMS. Cette coopération est d'autant plus stratégique dans le contexte de l'épidémie d'Ebola Bundibugyo, où AMA et EMA ont tenu leur premier engagement scientifique conjoint en juin 2026 pour accélérer l'accès aux contre-mesures médicales. Le partenariat EMA-AMA constitue un modèle de coopération réglementaire Nord-Sud susceptible d'être étendu à d'autres agences du médicament dans le monde.","date":"2026-06-26"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
],
"manufacture-vaccins":[
{"title":"Africa's first end-to-end mRNA vaccine platform: $1.2 billion Gavi deal to produce 100 million doses annually in Egypt","url":"https://www.semafor.com/article/07/02/2026/africa-moves-ahead-with-vaccine-manufacturing-ambitions","content":"In a landmark deal backed by Gavi's $1.2 billion African Vaccine Manufacturing Accelerator (AVMA), EVA Pharma in Egypt and European biotech partners will establish Africa's first end-to-end mRNA vaccine production platform — capable of producing 100 million doses annually. This 'digital-to-biologics' platform represents a qualitative leap beyond fill-finish manufacturing, enabling Africa to control the full vaccine production chain from antigen development to final product. Gavi will make its first cash disbursements to an African manufacturer in 2026 as part of the 10-year AVMA initiative, which provides demand-linked incentives to spur sustainable production. The African Union and Africa CDC have set a target of producing 60% of Africa's required vaccines locally by 2040, up from barely 1% today. Six other manufacturers across the continent — including Atlantic Lifesciences in Ghana — have built facilities with active technology transfers underway, and eleven African-made vaccines covering eight antigens are expected to reach the continental market within five years.","date":"02-07-2026"},
{"title":"CHAI 2026 report: African vaccine manufacturing advances but five critical challenges are pushing timelines back","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"A major landscape report from the Clinton Health Access Initiative (CHAI) published in 2026 reveals that while African vaccine manufacturing has made significant strides, five cross-cutting challenges are slowing near-to-market manufacturers: regulatory delays, uncertain market demand, slow financing disbursement, delays from technology transfer partners, and workforce gaps. The report documents eleven African-made vaccines covering eight antigens — including measles-rubella, rotavirus, and yellow fever — expected to reach the continental market within five years, but notes that timelines have already slipped for several producers. To succeed, manufacturers need predictable demand signals, solid technology transfer agreements, trained scientific workforces, regulatory approvals, and the right combination of grants, concessional loans, commercial debt and guarantees. The CHAI report calls for proactive risk mitigation by Gavi, the African Union, and bilateral donors to avoid a repeat of the COVID-19 manufacturing shortfall.","date":"02-07-2026"},
{"title":"Fabrication de vaccins en Afrique : Africa CDC appelle à une gouvernance renforcée de la R&D sanitaire","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"Dans le cadre de la réponse continentale à l'épidémie d'Ebola, Africa CDC réaffirme l'importance de prioriser la recherche et le développement (R&D) sanitaire sur le continent africain. Un document récemment publié par l'institution intitulé « A call for health R&D prioritisation and governance mechanisms in Africa » plaide pour la mise en place de mécanismes de gouvernance clairs permettant d'orienter les investissements vers la fabrication locale de vaccins et de produits médicaux essentiels. Cette démarche s'inscrit dans l'Agenda de Sécurité et de Souveraineté Sanitaire de l'Afrique (AHSS), qui vise à réduire la dépendance du continent aux chaînes d'approvisionnement mondiales et à renforcer les capacités industrielles africaines dans le domaine biopharmaceutique. Le plan de réponse Ebola évalué à 518 millions de dollars intègre également un volet dédié à la recherche et à la production d'outils diagnostiques et thérapeutiques adaptés au contexte africain.","date":"2026-07-12"},
{"title":"Surveillance moléculaire de l'influenza en Namibie : un modèle pour orienter la production de vaccins adaptés à l'Afrique","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"Une étude publiée dans le cadre du hub de connaissances sanitaires de l'Africa CDC met en lumière les résultats d'une surveillance moléculaire approfondie des virus de la grippe A et B en Namibie, couvrant la période 2021-2023. Cette recherche, menée à Windhoek, documente les patterns saisonniers de circulation des souches grippales et leurs corrélats cliniques, fournissant des données précieuses pour adapter la composition des vaccins antigrippaux aux réalités épidémiologiques africaines. Les auteurs soulignent que les données de surveillance génomique locale sont indispensables pour permettre aux fabricants de vaccins de produire des formulations mieux adaptées aux souches circulant en Afrique subsaharienne, souvent différentes de celles prédominantes dans l'hémisphère nord. Cette étude plaide pour le renforcement des infrastructures de séquençage génomique et de surveillance virale sur le continent, condition sine qua non pour soutenir une fabrication de vaccins africaine véritablement souveraine et pertinente.","date":"2026-07-11"},
{"title":"Ebola Bundibugyo sans vaccins ni traitements : l'urgence de la fabrication locale de vaccins en Afrique","url":"https://khub.africacdc.org/records/resource/africa-cdc-ebola-outbreaks-in-drc-and-uganda-weekly-brief-28th-may-2026","content":"Le rapport hebdomadaire d'Africa CDC sur l'épidémie Ebola Bundibugyo en RDC et en Ouganda met en lumière une réalité alarmante : aucun vaccin ni traitement approuvé n'est disponible contre cette souche. Un article associé, publié en juillet 2026 sous le titre « Bundibugyo Ebola Without Vaccines or Therapeutics: Why Public Health Fundamentals Matter More Than Border Closures », souligne que l'absence d'outils biomédicaux spécifiques place les équipes de santé publique dans une position de vulnérabilité extrême. Cette situation relance le débat sur la nécessité d'accélérer la fabrication locale de vaccins en Afrique, et d'intégrer les pathogènes prioritaires du continent dans les agendas industriels pharmaceutiques régionaux.","date":"2026-07-09"},
{"title":"Kenya : Africa CDC signe un accord historique pour son centre régional de coordination en Afrique de l'Est","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Africa CDC a signé un accord de partenariat stratégique avec le gouvernement du Kenya, qui met à disposition 10 acres de terrain et une contribution financière de 2 millions USD pour le Centre régional de coordination de l'Afrique de l'Est, basé à Nairobi. Ce centre, l'un des cinq que compte Africa CDC sur le continent, sera doté prochainement d'un laboratoire régional de référence dont le financement est activement recherché. Le Dr Jean Kaseya a appelé les pays africains à suivre l'exemple du Kenya pour soutenir la production et la surveillance sanitaire continentales.","date":"2026-07-08"},
],
"unicef-gavi":[
{"title":"UNICEF and Gavi launch call to manufacturers for Bundibugyo Ebolavirus vaccine — $40 million commitment","url":"https://www.unicef.org/press-releases/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"On June 24, 2026, UNICEF and Gavi, the Vaccine Alliance, jointly launched a Request for Expression of Interest (REOI) calling on vaccine developers and manufacturers to present plans to develop a vaccine against Bundibugyo Ebolavirus disease — the strain driving the ongoing outbreak in DRC and Uganda, for which no approved vaccine currently exists. Gavi committed US$40 million to support accelerated vaccine access, with special consideration given to proposals where production will be based in Africa — a meaningful signal in favour of continental manufacturing sovereignty. The outbreak has infected over 1,500 people and killed more than 500. UNICEF will play a key logistical and procurement role in ensuring any future vaccine can be rapidly deployed across affected communities, leveraging its cold-chain infrastructure across 190 countries. The REOI marks the first concrete international financial commitment specifically targeting a Bundibugyo vaccine candidate.","date":"24-06-2026"},
{"title":"Record year for Gavi: 73 million children immunised in 2025, but funding gaps threaten historic gains","url":"https://www.topafricanews.com/2026/07/15/record-immunisation-success-in-lower-income-countries-threatened-by-funding-gaps/","content":"Gavi, the Vaccine Alliance, reported in July 2026 that 73 million children were protected by Gavi-supported vaccines in 2025 — the highest number in the alliance's 26-year history. Malaria vaccines have now been rolled out across 25 African nations, with countries like Ghana and Burkina Faso already reporting significant reductions in malaria-related child deaths and hospitalisations. However, Gavi issued a stark warning: these hard-won gains face significant risks due to a funding gap in its next five-year strategic period (2026–2030). Deep cuts to USAID — historically one of Gavi's largest donors — have created a multi-billion dollar shortfall. Without full replenishment, Gavi warns that millions of children in the world's poorest countries could lose access to life-saving vaccines, potentially reversing two decades of progress on child mortality.","date":"15-07-2026"},
{"title":"Face à Ebola Bundibugyo, UNICEF et Gavi au cœur de la stratégie de préparation épidémique en Afrique","url":"https://www.facebook.com/africacdc/posts/-postponement-notice-weekly-press-briefingthis-weeks-briefing-has-been-postponed/1428976145927422","content":"Alors que l'Africa CDC reorganise sa réponse à l'épidémie d'Ebola Bundibugyo sous l'impulsion de la mission du Président Cyril Ramaphosa, Champion de l'Union africaine pour la prévention, la préparation et la réponse aux pandémies (PPPR), en RDC, des partenaires clés comme l'UNICEF et Gavi intensifient leur soutien opérationnel sur le terrain. Ces organisations contribuent au renforcement des systèmes de santé communautaires, à la chaîne du froid pour les produits médicaux disponibles, à l'éducation sanitaire des populations et à la coordination logistique des interventions d'urgence. La solidarité internationale, rappelée lors du briefing de l'Africa CDC, demeure essentielle face à une épidémie qui ne dispose pas encore de vaccin approuvé.","date":"2026-07-10"},
{"title":"Gavi et UNICEF mobilisés pour soutenir la riposte à l'épidémie d'Ebola en Afrique centrale","url":"https://www.facebook.com/africacdc/videos/special-briefing-on-ebola-outbreak-response-july-9-2026/1574351157729456","content":"Dans le cadre de la réponse à l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, les partenaires internationaux dont Gavi, l'Alliance pour les vaccins, et l'UNICEF sont étroitement associés aux efforts de coordination continentale. Ces organisations apportent leur expertise logistique, leur soutien financier et leurs capacités de déploiement rapide pour appuyer les gouvernements affectés. Le briefing spécial de l'Africa CDC du 9 juillet 2026 a réaffirmé l'importance de la solidarité internationale et des partenariats solides dans la lutte contre les épidémies, soulignant que la coordination entre l'Union africaine, l'OMS, Gavi et l'UNICEF constitue la pierre angulaire d'une riposte efficace et équitable pour les communautés à risque.","date":"2026-07-10"},
{"title":"Gavi et UNICEF mobilisés face à la crise vaccinale en Afrique : l'épidémie Ebola révèle les lacunes du système","url":"https://www.infectioncontroltoday.com/view/2026-ebola-outbreak-spreads-central-africa-who-warns-growing-crisis-amid-cdc-usaid-cuts","content":"Alors que l'épidémie d'Ebola Bundibugyo continue de se propager en RDC et en Ouganda avec plus de 513 cas et 130 décès suspects, les organisations internationales dont Gavi et l'UNICEF font face à une pression croissante pour combler le vide laissé par les coupes budgétaires américaines. La réduction de 90 % du financement de l'USAID et le retrait des États-Unis de l'OMS ont sévèrement compromis les efforts de réponse. Dans ce contexte, les partenaires onusiens sont appelés à redoubler d'efforts pour maintenir les programmes de vaccination et de préparation aux épidémies sur le continent africain, en particulier dans les zones de conflit et les corridors commerciaux à haut risque.","date":"2026-07-09"},
],
"sante-maroc":[
{"title":"Maroc 2026 : revalorisation des salaires des professionnels de santé — objectif 10 100 DH de salaire public moyen","url":"https://www.sihajobs.ma/blog/revalorisation-salaires-sante-maroc-2026-ce-qui-change","content":"En 2026, les professionnels de santé du secteur public marocain bénéficient d'une série de revalorisations salariales cumulées dans le cadre de la réforme de l'État social. Parmi les mesures phares : une hausse statutaire pour les infirmiers, une nouvelle indemnité de risque professionnel et des grilles indiciaires révisées à la hausse pour l'ensemble du personnel soignant. L'objectif affiché par le gouvernement est d'atteindre un salaire public moyen de 10 100 dirhams. Ces revalorisations visent à améliorer l'attractivité du service public de santé, réduire l'exode des professionnels vers le secteur privé ou vers l'étranger, et renforcer la fidélisation des ressources humaines dans les zones rurales et éloignées où les déficits de personnel soignant restent les plus criants. La création de 8 000 nouveaux postes budgétaires en 2026 complète ce dispositif et s'inscrit dans l'enveloppe record de 42,4 milliards de dirhams dédiée à la santé.","date":"10-07-2026"},
{"title":"Santé numérique au Maroc : la feuille de soins électronique, pilier central de la réforme sanitaire 2026","url":"https://www.leconomiste.com/sante-les-chantiers-2026/","content":"La généralisation de la feuille de soins électronique constitue l'un des chantiers prioritaires du ministère marocain de la Santé et de la Protection sociale pour 2026. Cet outil numérique vise à dématérialiser les démarches administratives liées aux soins, à améliorer la traçabilité des actes médicaux et à réduire les délais de remboursement pour les assurés de l'Assurance Maladie Obligatoire (AMO). Dans le cadre de la réforme plus large du système de santé, la numérisation des parcours de soins permettra également de mieux orienter les patients, de désengorger les urgences hospitalières et de renforcer le rôle du médecin de premier recours. Cette initiative s'inscrit dans la stratégie nationale de santé numérique et accompagne les autres grands chantiers de 2026 : construction de nouveaux CHU régionaux, opérationnalisation des Groupements sanitaires territoriaux (GST) et mise à niveau de 90 hôpitaux existants.","date":"01-07-2026"},
{"title":"Le Maroc consolide son système de santé publique à l'aune des défis épidémiques continentaux","url":"https://microbiotics.com.ng/africa-cdc-strategic-plan-2022-2026?pdf=4936","content":"Dans un contexte de flambées épidémiques récurrentes sur le continent africain, le Maroc renforce ses dispositifs de veille sanitaire et de réponse aux urgences de santé publique. Le Royaume s'appuie sur son réseau de laboratoires de référence et sur ses partenariats avec des institutions internationales telles qu'Africa CDC et l'OMS pour détecter précocement toute menace épidémique. Le Plan stratégique 2022-2026 d'Africa CDC, qui prévoit un Centre de coordination régional pour l'Afrique du Nord basé au Caire, constitue une opportunité pour le Maroc de renforcer son intégration dans l'architecture continentale de sécurité sanitaire. Les autorités marocaines veillent par ailleurs à maintenir des capacités de prise en charge des maladies à potentiel épidémique importées, dans le respect des Règlements sanitaires internationaux.","date":"2026-07-04"},
{"title":"Budget santé 2026 au Maroc : 42,4 milliards de dirhams, une hausse de 30 % et 8 000 nouveaux postes budgétaires","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le ministère marocain de la Santé et de la Protection sociale dispose en 2026 d'un budget record de 42,4 milliards de dirhams, en hausse de 30 % par rapport à l'exercice précédent, dans le cadre de la réforme structurelle du système national de santé portée par la Vision royale de l'État social. Sur cette enveloppe, 16,4 milliards de dirhams sont dédiés aux dépenses de personnel, avec la création de 8 000 nouveaux postes budgétaires pour renforcer les ressources humaines à tous les niveaux du système de soins. Les investissements prioritaires de 2026 incluent la construction de nouveaux Centres hospitaliers universitaires (CHU), la mise à niveau de 90 hôpitaux existants et le déploiement progressif des Groupements sanitaires territoriaux (GST). D'ici fin 2027, toutes les régions du Maroc, à l'exception de Dakhla-Oued Eddahab, disposeront de leur propre CHU.","date":"2026-07-03"},
{"title":"Réforme de l'état social au Maroc : la santé change d'échelle avec les Groupements sanitaires territoriaux","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"La réforme du secteur de la santé au Maroc entre en 2026 dans une phase décisive avec l'opérationnalisation progressive des Groupements sanitaires territoriaux (GST), nouvelles entités de gouvernance régionale chargées d'intégrer et de coordonner l'ensemble des établissements de santé d'une même région. Cette restructuration vise à mettre fin à la fragmentation du système de soins, à améliorer l'accès aux soins en milieu rural et semi-urbain, et à renforcer la complémentarité entre les secteurs public et privé. Si l'ambition réformatrice est globalement saluée, des résistances subsistent parmi les professionnels de santé face aux changements organisationnels, notamment concernant la mobilité des personnels et la redistribution des compétences entre niveaux de soins. La généralisation de la feuille de soins électronique constitue un autre chantier prioritaire de 2026, visant à simplifier les démarches administratives et améliorer la traçabilité des soins.","date":"2026-07-01"},
],
"vaccins-monde":[
{"title":"Global childhood immunization 2025: 85% DTP3 coverage but 13.5 million children still zero-dose","url":"https://www.who.int/news/item/15-07-2026-global-childhood-immunization-coverage-inches-forward-despite-conflict-and-hesitancy---unicef--who","content":"A landmark WHO-UNICEF joint report released on July 15, 2026 reveals that global childhood immunisation programmes continued to recover in 2025, with 90% of infants worldwide receiving at least one DTP vaccine dose and 85% completing the recommended three-dose series — a modest improvement on 2024. However, an estimated 13.5 million children received no vaccines at all during their first year of life in 2025, leaving them exposed to preventable diseases. Of the countries below 90% DTP3 coverage in 2019, 65 are stagnating or falling behind, driven by conflict, poverty, and growing vaccine hesitancy. WHO and UNICEF called for renewed efforts to reach every child and warned that recent cuts to international health financing — including deep USAID reductions — risk reversing years of progress. Fewer countries carried out national immunization surveys in 2025, further limiting the ability to identify and reach unvaccinated children.","date":"15-07-2026"},
{"title":"WHO-UNICEF measles alert: global second-dose coverage at 77%, far below the 95% threshold needed to prevent outbreaks","url":"https://news.un.org/en/story/2026/07/1167942","content":"In their July 15, 2026 joint report on global immunisation coverage, WHO and UNICEF issued a stark warning about accelerating measles risk worldwide. First-dose measles vaccine coverage stood at only 84% globally in 2025, while just 77% of children received the critical second dose — both well below the 95% threshold epidemiologists consider necessary to prevent outbreaks. In Sub-Saharan Africa and South Asia, health system fragility, conflict and vaccine hesitancy are creating dangerous pockets of susceptibility. WHO warned that further reductions in international health financing could rapidly translate into new measles epidemics across vulnerable populations. The agencies called on governments, donors and civil society to urgently close measles immunity gaps, noting that the virus moves swiftly to exploit any coverage deficit and that measles outbreaks are a leading indicator of broader immunisation system failure.","date":"15-07-2026"},
{"title":"Ebola Bundibugyo : l'absence de vaccins approuvés met en alerte la communauté scientifique internationale","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Alors que l'épidémie de maladie à virus Bundibugyo continue de s'étendre en RDC et en Ouganda, les autorités sanitaires mondiales tirent la sonnette d'alarme sur l'absence de vaccins ou de traitements spécifiquement approuvés contre cette souche. Le CDC américain a publié le 1er juillet 2026 des recommandations pour les voyageurs en provenance des zones affectées, incluant une surveillance des symptômes pendant 21 jours et un renforcement des contrôles sanitaires aux points d'entrée. La communauté scientifique internationale appelle à une accélération des essais cliniques et du développement de candidats vaccins contre le virus Bundibugyo, soulignant que les vaccins disponibles actuellement ont été développés pour d'autres souches du genre Ebolavirus et n'offrent pas de protection croisée confirmée.","date":"2026-07-10"},
{"title":"OMS et UNICEF : publication des estimations actualisées de couverture vaccinale nationale WUENIC 2025","url":"https://immunizationdata.who.int/","content":"L'OMS et l'UNICEF publient en juillet 2026 les estimations actualisées de couverture vaccinale nationale (WUENIC 2025), données de référence annuelles sur l'état de l'immunisation dans le monde entier, avec un webinaire de présentation des résultats programmé le 15 juillet 2026. Ces statistiques par pays et par antigène orientent les stratégies d'investissement de Gavi, de l'UNICEF et des gouvernements partenaires pour identifier les populations prioritaires en matière de rattrapage vaccinal. Elles constituent le principal outil de suivi des progrès vers les objectifs mondiaux de vaccination et d'élimination des maladies évitables. Dans un contexte de réduction des financements internationaux, ces données sont plus que jamais cruciales pour cibler les ressources disponibles vers les pays et populations les plus vulnérables.","date":"2026-07-07"},
{"title":"OMS : le Comité PDVAC se réunit le 6 juillet 2026 pour définir les priorités mondiales de développement vaccinal","url":"https://www.who.int/news-room/events/detail/2026/07/06/default-calendar/2026-who-product-development-for-vaccines-advisory-committee-meeting-(pdvac)","content":"Le Comité consultatif pour le développement de produits vaccinaux (PDVAC) de l'OMS tient sa réunion annuelle le 6 juillet 2026 pour examiner les priorités mondiales en matière de R&D vaccinale, notamment les candidats-vaccins contre le virus Bundibugyo, la dengue, le paludisme et d'autres pathogènes prioritaires. Ce comité d'experts indépendants — virologues, immunologistes et spécialistes de santé publique — formule des recommandations sur les technologies vaccinales à prioriser, les essais cliniques à soutenir et les mécanismes d'accès équitable. Dans le contexte de la crise Ebola Bundibugyo, le PDVAC joue un rôle critique pour guider les investissements en R&D et accélérer le développement de contre-mesures médicales adaptées à ce virus pour lequel aucun vaccin homologué n'existe à ce jour. Ses recommandations orienteront les stratégies d'investissement des grandes institutions mondiales de santé pour les années à venir.","date":"2026-07-06"},
