var articlesData={
"african-cdc":[
{"title":"Africa CDC : cas isolé de Marburg détecté en Ouganda chez un enfant de 18 mois, aucun contact symptomatique","url":"https://www.cnbcafrica.com/2026/africa-cdc-says-uganda-found-isolated-marburg-case","content":"Africa CDC a signalé le 1er juillet 2026 qu'un cas isolé de maladie à virus Marburg a été confirmé en Ouganda dans le district de Kyegegwa (ouest du pays), chez un enfant de 18 mois décédé, détecté dans le cadre de la surveillance épidémiologique renforcée liée à l'épidémie d'Ebola Bundibugyo en cours en RDC et en Ouganda. Selon Africa CDC et les autorités ougandaises, aucun contact du cas confirmé n'avait présenté de symptômes à la date du rapport et aucun cas actif n'était recensé dans le pays. Cette découverte illustre la vigilance épidémiologique multi-pathogènes déployée par Africa CDC dans la région, alors que le virus Marburg — de la même famille des filovirus qu'Ebola — peut provoquer une fièvre hémorragique grave avec un taux de létalité pouvant dépasser 88 % dans certaines épidémies. Les autorités sanitaires régionales maintiennent une surveillance étroite et un traçage actif des contacts.","date":"2026-07-02"},
{"title":"Africa CDC avance sur la gouvernance de la santé numérique en Afrique avec le Comité d'experts PHC-DEC","url":"https://africacdc.org/news/","content":"Le Comité d'experts en numérisation des soins de santé primaires d'Africa CDC (PHC-DEC) a tenu une réunion de travail pour faire avancer la gouvernance de la santé numérique sur le continent africain, une priorité inscrite dans l'agenda de Sécurité et Souveraineté Sanitaire de l'Afrique (AHSS). Les travaux portent sur la définition de standards communs d'interopérabilité des données de santé, le déploiement de dossiers de santé électroniques et l'utilisation de l'intelligence artificielle dans les services de santé primaires à travers les 55 États membres de l'Union africaine. La numérisation est considérée par Africa CDC comme un levier stratégique majeur pour améliorer la surveillance épidémiologique en temps réel, optimiser les chaînes d'approvisionnement en médicaments et vaccins, et élargir l'accès aux soins dans les zones reculées — objectifs directement liés aux enseignements tirés de la gestion de l'épidémie de Bundibugyo. Ce comité expert est l'une des nombreuses initiatives institutionnelles d'Africa CDC visant à moderniser les systèmes de santé africains d'ici 2035.","date":"2026-07-01"},
{"title":"Africa CDC mobilise plus de 250 millions USD au Sommet One Health de Lyon pour la sécurité sanitaire mondiale","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"À l'occasion du Sommet One Health tenu à Lyon, en France, Africa CDC a sécurisé plus de 250 millions de dollars destinés à faire avancer l'agenda africain de sécurité sanitaire mondiale. L'institution a salué les résultats de ce sommet comme un tournant décisif, affirmant que l'Afrique n'est plus en marge des décisions mondiales en matière de santé. Par ailleurs, Africa CDC a tenu à Dar es Salaam une réunion de haut niveau pour accélérer l'action continentale contre les décès maternels et infantiles évitables. L'institution a également co-organisé avec GAFFI (Global Action For Fungal Infections) le premier Sommet africain sur les maladies fongiques, élevant ces pathologies au rang de priorité continentale de santé publique.","date":"2026-07-01"},
{"title":"Africa CDC et OMS déclarent l'épidémie d'Ebola Bundibugyo urgence de sécurité continentale","url":"https://www.thelancet.com/journals/lancet/article/PIIS0140-6736(26)01101-3/fulltext","content":"Dans une démarche historique publiée dans The Lancet, l'OMS et Africa CDC ont officiellement déclaré l'épidémie d'Ebola de souche Bundibugyo une Urgence de Santé Publique de Préoccupation Internationale (USPPI) et une Urgence de Santé Publique de Sécurité Continentale (PHECS). Cette double déclaration reflète la montée en puissance de la souveraineté sanitaire africaine et des mécanismes de gouvernance continentale. Selon les auteurs, dont le Directeur général d'Africa CDC, Dr Jean Kaseya, l'implication des dirigeants politiques et des experts scientifiques avant la déclaration témoigne de la reconnaissance croissante que les menaces épidémiques constituent des enjeux de sécurité continentale nécessitant une solidarité africaine opérationnelle coordonnée.","date":"2026-07-01"},
{"title":"WHO et Africa CDC lancent un plan conjoint de réponse à l'épidémie d'Ebola : 518 millions de dollars mobilisés","url":"https://www.cidrap.umn.edu/ebola/who-africa-cdc-announce-joint-ebola-response-plan","content":"L'Organisation mondiale de la santé (OMS) et les Centres africains de contrôle et de prévention des maladies (Africa CDC) ont annoncé un plan conjoint de réponse à l'épidémie d'Ebola qui sévit en République démocratique du Congo et en Ouganda. Ce plan ambitieux vise à mobiliser 518 millions de dollars sur une période de six mois, jusqu'en novembre 2026, afin de renforcer les capacités de réponse aux épidémies dans les pays africains touchés. L'initiative vient compléter les plans de réponse déjà déployés par les gouvernements de la RDC et de l'Ouganda, marquant une étape importante dans la coordination continentale face aux urgences sanitaires.","date":"2026-07-01"},
{"title":"Africa CDC : l'épidémie d'Ebola en RDC pourrait être la pire jamais enregistrée","url":"https://edition.cnn.com/2026/06/16/africa/drc-ebola-cdc-intl-latam-afr","content":"Le directeur général de l'Africa CDC, le Dr Kaseya, a tiré la sonnette d'alarme en déclarant que l'épidémie d'Ebola en cours en République démocratique du Congo pourrait être la pire jamais documentée. Parmi les défis critiques identifiés figure l'insuffisance des ressources pour assurer le traçage des contacts des plus de 800 cas confirmés à la date du rapport. Par ailleurs, les inhumations traditionnelles non sécurisées, lors desquelles des proches manipulent les corps sans équipement de protection adéquat, continuent de constituer l'un des principaux vecteurs de transmission. Le Dr Kaseya a exhorté la communauté internationale à mobiliser davantage de ressources financières et humaines pour soutenir les États membres affectés dans le cadre de l'Agenda pour la sécurité et la souveraineté sanitaire de l'Afrique.","date":"2026-06-30"},
{"title":"Bilan alarmant : 1 068 cas confirmés de maladie à virus Bundibugyo au 21 juin 2026","url":"https://khub.africacdc.org/health-topics/surveillance","content":"Selon le rapport de situation n°35 publié le 22 juin 2026 par l'Africa CDC, l'épidémie de maladie à virus Bundibugyo (BVD) en RDC et en Ouganda a atteint un total cumulé de 1 068 cas confirmés, 269 décès confirmés et 126 guérisons, avec 8 433 contacts actuellement sous suivi. Le taux de létalité combiné s'établit à environ 25,2 %. L'épidémie reste concentrée dans la province de l'Ituri en RDC, avec une transmission croissante observée dans les provinces du Nord-Kivu et du Sud-Kivu, ainsi que des cas importés et locaux dans le district de Kampala en Ouganda. L'Africa CDC, via son Unité de surveillance épidémiologique, coordonne activement la réponse et appelle à une intensification des efforts de traçage des contacts et de gestion des cas.","date":"2026-06-30"},
{"title":"Épidémie d'Ebola : Africa CDC publie une directive sur les restrictions de voyage","url":"https://khub.africacdc.org/records/resource/interim-guidance-on-blanket-travel-restrictions-following-the-bundibugyo-ebola-virus-disease-outbreak","content":"L'Africa CDC a publié le 8 juin 2026 une directive intérimaire sur les restrictions générales de voyage en réponse à l'épidémie de maladie à virus Ebola de Bundibugyo, qui sévit actuellement en République démocratique du Congo (RDC) et en Ouganda. Ce document scientifique souligne que les interdictions de voyage généralisées ne sont pas étayées par des preuves scientifiques et peuvent s'avérer contre-productives pour le contrôle de l'épidémie, tout en nuisant à la sécurité sanitaire nationale et mondiale. L'Africa CDC appelle les États membres à adopter des mesures ciblées et proportionnées, fondées sur les données probantes, afin de protéger les populations sans entraver les flux essentiels d'aide humanitaire et de personnel de santé.","date":"2026-06-30"},
],
"african-medical-agency":[
{"title":"OMS et AMA signent un cadre historique de collaboration pour renforcer l'accès aux médicaments de qualité en Afrique","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"L'Organisation mondiale de la Santé (OMS) et l'Agence Africaine des Médicaments (AMA) ont signé le 21 mai 2026 un accord-cadre de collaboration marquant une étape historique dans le renforcement des systèmes réglementaires africains et l'amélioration de l'accès aux produits de santé sûrs et de qualité garantie à travers le continent. Cet accord couvre quatre domaines prioritaires : l'accélération de l'accès aux produits de santé essentiels, la promotion de l'harmonisation réglementaire entre États membres, le renforcement de la pharmacovigilance et la lutte contre les médicaments de mauvaise qualité ou falsifiés, et le développement des capacités réglementaires humaines. Ce partenariat stratégique intervient alors que l'épidémie d'Ebola Bundibugyo a mis en évidence la nécessité criante de disposer de systèmes réglementaires africains robustes et réactifs, capables d'autoriser rapidement des contre-mesures médicales d'urgence sans dépendance exclusive aux agences réglementaires étrangères.","date":"2026-05-21"},
{"title":"AMA et EMA renforcent leur coopération réglementaire lors d'une visite de haut niveau à Amsterdam","url":"https://techreviewafrica.com/news/6104/african-medicines-agency-enhances-regulatory-cooperation-with-european-medicines-agency","content":"Une délégation de haut niveau de l'Agence Africaine des Médicaments (AMA) a effectué du 22 au 26 juin 2026 une visite officielle au siège de l'Agence Européenne des Médicaments (EMA) à Amsterdam, aux Pays-Bas, pour renforcer leur coopération bilatérale. Les discussions ont porté sur trois axes prioritaires : la transformation numérique des processus réglementaires, le soutien aux innovateurs pharmaceutiques et aux fabricants locaux africains, et l'adoption des meilleures pratiques pour améliorer l'efficacité et la robustesse des évaluations de médicaments. Ce rapprochement s'inscrit dans la phase d'Expansion de l'AMA (2026–2030) et fait suite au premier engagement scientifique conjoint EMA-AMA de juin 2026, qui visait à accélérer l'évaluation de contre-mesures médicales face à l'épidémie de Bundibugyo. L'AMA s'appuie sur ces coopérations stratégiques pour harmoniser la régulation pharmaceutique à travers les 55 États membres de l'Union africaine et réduire les délais d'accès aux médicaments innovants pour les populations africaines.","date":"2026-06-26"},
{"title":"African Medicines Agency and USP sign landmark agreement to strengthen medicines quality assurance across Africa","url":"https://www.cleanroomtechnology.com/african-medicines-agency-and-usp-sign-agreement-to","content":"The African Medicines Agency (AMA) and the United States Pharmacopeia (USP) signed a landmark memorandum of understanding in Johannesburg on April 29, 2026, establishing a formal partnership to strengthen medicines regulation, quality assurance, and pharmaceutical manufacturing systems across Africa. Under the agreement, USP will provide technical expertise and reference standards to advance pharmaceutical quality benchmarks on the continent, while AMA will leverage USP's global regulatory experience to build capacity among African national medicines regulatory authorities. A key priority is improving the detection and control of substandard and falsified medicines — which remain a major public health threat, particularly during health emergencies when supply chain disruptions create openings for counterfeit products. The AMA-USP partnership is expected to accelerate the implementation of quality assurance frameworks across all 55 African Union member states, reinforcing AMA's mission to harmonize pharmaceutical regulation and ensure equitable access to safe, effective, and quality-assured health products.","date":"2026-04-29"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
],
"manufacture-vaccins":[
{"title":"Rapport CHAI 2026 : moins de 1 % des vaccins utilisés en Afrique produits localement, mais 11 vaccins africains attendus d'ici 2031","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"La Clinton Health Access Initiative (CHAI) a publié son rapport 2026 sur le paysage de la fabrication et de l'approvisionnement en vaccins en Afrique, révélant que moins de 1 % des vaccins utilisés sur le continent sont actuellement produits localement, illustrant la profonde dépendance de l'Afrique aux chaînes d'approvisionnement mondiales. Néanmoins, six fabricants ont construit des installations actives avec des transferts de technologie en cours, dont Atlantic Lifesciences au Ghana. Le rapport identifie cinq obstacles systémiques qui retardent les calendriers : les délais réglementaires, l'incertitude sur la demande du marché, la lenteur des décaissements, les retards des partenaires de transfert de technologie, et les gaps de main-d'œuvre spécialisée. Du côté positif, onze vaccins fabriqués en Afrique couvrant huit antigènes — dont rougeole-rubéole, rotavirus et fièvre jaune — devraient atteindre le marché continental dans les cinq prochaines années, signalant des progrès tangibles vers l'autosuffisance vaccinale.","date":"2026-07-01"},
{"title":"Percée historique : une plateforme mRNA de bout en bout sera construite en Afrique avec 1,2 milliard USD de Gavi","url":"https://healthpolicy-watch.news/landmark-vaccine-deals-signal-africas-shift-toward-local-manufacturing/","content":"Pour la première fois dans l'histoire de l'industrie biopharmaceutique africaine, une plateforme de production d'ARN messager (mRNA) entièrement intégrée, de la synthèse à la formulation finale, sera construite en Afrique avec la capacité de fabriquer 100 millions de doses par an. Ce projet d'envergure historique est soutenu par un investissement de 1,2 milliard de dollars de Gavi, l'Alliance du Vaccin, dans le cadre de l'Accélérateur africain de fabrication de vaccins (AVMA). Il marque un tournant majeur dans la stratégie continentale de souveraineté vaccinale, alors que la technologie mRNA — popularisée par les vaccins COVID-19 — représente une plateforme adaptable à de multiples pathogènes, y compris potentiellement des souches émergentes de filovirus. Le Partenariat pour la Fabrication Africaine de Vaccins (PAVM) poursuit son plan à 20 ans visant à couvrir 60 % des besoins vaccinaux du continent localement d'ici 2040, ce qui nécessitera de quadrupler les effectifs actuels du secteur.","date":"2026-06-30"},
{"title":"Africa CDC launches regional networks to build Africa's vaccine and health products manufacturing workforce","url":"https://africacdc.org/news-item/regional-networks-to-strengthen-africas-vaccine-and-health-products-manufacturing-workforce/","content":"Africa CDC has launched regional networks dedicated to building and strengthening Africa's specialized workforce in vaccine and health product manufacturing — a strategic response to one of the continent's most critical bottlenecks in achieving pharmaceutical self-sufficiency. The initiative addresses a workforce deficit identified in the 2026 CHAI manufacturing landscape report: Africa currently employs only around 3,000 full-time vaccine manufacturing and R&D professionals, a figure that must quadruple to meet the continent's 60%-local-production-by-2040 target. The regional networks will connect universities, vocational training institutes, manufacturers, and regulatory authorities to co-develop curricula and training pathways aligned with the needs of Africa's growing biopharmaceutical industry. Africa CDC positions this human capital initiative as a foundational enabler for the Partnership for African Vaccine Manufacturing (PAVM) strategy, recognizing that advanced manufacturing infrastructure is only as effective as the skilled workforce that operates it.","date":"2026-06-28"},
{"title":"CPHIA 2026 : l'Afrique mise sur l'innovation et la fabrication locale de vaccins pour sa souveraineté sanitaire","url":"https://cphia.africacdc.org","content":"La 5e Conférence internationale sur la santé publique en Afrique (CPHIA 2026), prévue à Addis-Abeba avec plus de 30 000 délégués, mettra en lumière les avancées africaines en matière de fabrication locale de vaccins et de technologies de santé. Parmi les thématiques phares figure l'institutionnalisation de la prévention et de la préparation aux pandémies, incluant le développement de capacités de production continentale. Un espace d'exposition Innovation Showcase permettra de découvrir les solutions biotechnologiques africaines émergentes. Des bourses de voyage sont disponibles jusqu'au 15 août 2026 pour les chercheurs souhaitant soumettre leurs travaux sur la fabrication de produits médicaux et vaccinaux.","date":"2026-07-01"},
{"title":"Fabrication de vaccins contre Ebola : l'Afrique face à l'urgence industrielle","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"Face à l'escalade de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, la question de la capacité de fabrication locale de vaccins et de thérapeutiques contre les filovirus revient avec acuité sur l'agenda continental. Le rapport épidémiologique hebdomadaire de l'Africa CDC souligne que l'absence de vaccins homologués contre le virus Bundibugyo constitue l'un des principaux obstacles à la réponse. Des discussions sont en cours entre l'Africa CDC, l'OMS et plusieurs fabricants pharmaceutiques pour accélérer le développement et la production à grande échelle de vaccins candidats, notamment dans le cadre du mécanisme CEPI (Coalition pour les innovations en matière de préparation aux épidémies). L'accent est également mis sur la nécessité de développer des capacités de fabrication vaccinale sur le continent africain afin de réduire la dépendance aux approvisionnements extérieurs lors de futures urgences sanitaires.","date":"2026-06-30"},
{"title":"Épidémie de Bundibugyo : l'absence de vaccin approuvé met en lumière l'urgence de développer des capacités de fabrication africaines","url":"https://www.cdc.gov/mmwr/volumes/75/wr/pdfs/mm7522e2-H.pdf","content":"Le rapport d'évaluation des risques publié par les CDC américains souligne un fait préoccupant : il n'existe à ce jour aucun vaccin ni médicament approuvé contre la maladie à virus Bundibugyo (BVD). Alors que l'épidémie en cours en RDC et en Ouganda a déjà dépassé les 378 cas confirmés et 63 décès au 2 juin 2026, cette lacune met en évidence l'urgence criante de développer des capacités de recherche, de développement et de fabrication de vaccins sur le continent africain. Des efforts de préparation sont en cours aux États-Unis, mais la communauté internationale appelle à une mobilisation sans précédent pour accélérer le développement de contre-mesures médicales adaptées à cette souche du virus Ebola, notamment dans le cadre des initiatives de fabrication locale portées par l'Africa CDC.","date":"2026-06-28"},
{"title":"Le cadre PAVM de l'Africa CDC pour accélérer la fabrication de vaccins en Afrique","url":"https://khub.africacdc.org/records/resource/bundibugyo-ebola-virus-disease-bvd-interim-guidance-on-blanket-travel-restrictions-and-public-gatherings","content":"Dans le contexte de l'épidémie de Bundibugyo et de l'urgence sanitaire qui secoue le continent, l'Africa CDC rappelle l'importance stratégique du cadre d'action des Partenariats pour la Fabrication Africaine de Vaccins (PAVM). Ce document de référence, élaboré pour accélérer la production locale de vaccins en Afrique, prend une résonance particulière alors que le continent fait face à une épidémie pour laquelle aucun vaccin ni médicament approuvé n'existe pour le virus Bundibugyo. Le PAVM vise à réduire la dépendance de l'Afrique aux chaînes d'approvisionnement mondiales en vaccins en développant des capacités de fabrication continentales, un objectif jugé critique par les experts de santé publique pour faire face aux crises sanitaires futures.","date":"2026-06-28"},
],
"unicef-gavi":[
{"title":"UNICEF et Gavi lancent un appel aux fabricants pour accélérer l'accès à un vaccin contre le virus Bundibugyo, avec 40 millions USD engagés","url":"https://www.gavi.org/news/media-room/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"En juin 2026, UNICEF et Gavi, l'Alliance du Vaccin, ont conjointement publié un appel à manifestation d'intérêt (Expression of Interest) auprès des développeurs et fabricants de vaccins, visant à recueillir des informations sur leurs plans de développement d'un vaccin contre la maladie à virus Bundibugyo (BVD). Cet appel s'appuie sur l'engagement de Gavi d'allouer 40 millions de dollars américains pour soutenir l'accès accéléré à des vaccins candidats, avec l'intention d'orienter ce financement vers les initiatives les plus prometteuses en matière de montée en puissance de la production et d'accès rapide aux doses. Une attention particulière est accordée aux propositions prévoyant une production basée en Afrique, en cohérence avec les priorités de souveraineté vaccinale continentale. Cet appel intervient dans un contexte d'urgence : l'épidémie de BVD a causé plus de 1 000 cas confirmés et environ 270 décès en RDC et en Ouganda, sans qu'aucun vaccin homologué n'existe contre cette souche du virus Ebola.","date":"2026-06-30"},
{"title":"Africa's routine vaccine systems deliver gains against cancer and malaria as global funding pressures mount","url":"https://www.gavi.org/news/media-room/africas-routine-vaccine-systems-deliver-gains-against-cancer-and-malaria-funding","content":"Gavi reported significant progress in Africa's routine immunisation programmes in 2026, with 24 countries having introduced malaria vaccines (RTS,S or R21) into their national schedules with Gavi support by November 2025, aiming to reach 50 million children with a full vaccine course by end of decade. HPV vaccination coverage has also expanded substantially, contributing to projected long-term reductions in cervical cancer — the leading cause of female cancer deaths in sub-Saharan Africa. However, these hard-won gains face a serious threat from growing financial pressures: global aid budgets in 2026 are under strain, with donor countries cutting foreign health assistance. Gavi's 6.0 strategic period (2026–2030) funding guidelines provide a framework for countries to plan immunisation spending, but looming funding gaps risk reversing coverage gains that took over two decades to achieve.","date":"2026-06-27"},
{"title":"Big Catch-Up : 18,3 millions d'enfants vaccinés dans 36 pays dont 12,3 millions d'enfants 'zéro-dose', une initiative historique","url":"https://www.who.int/news/item/24-04-2026-largest-catch-up-initiative-delivers-over-100-million-childhood-vaccinations","content":"L'initiative Big Catch-Up, la plus grande opération de rattrapage vaccinal de l'histoire, lancée conjointement par l'OMS, l'UNICEF et Gavi pour combler le retard de vaccination accumulé durant la pandémie de COVID-19, s'est conclue en mars 2026 avec des résultats record : plus de 100 millions de doses administrées à environ 18,3 millions d'enfants dans 36 pays. Parmi ces enfants, 12,3 millions étaient des « enfants zéro-dose » n'ayant jamais reçu aucun vaccin auparavant, et 15 millions n'avaient jamais été vaccinés contre la rougeole — une maladie responsable de dizaines de milliers de décès évitables chaque année. Cette initiative, qui a ciblé en priorité les pays à faible revenu et les zones de conflit, démontre la capacité de coordination internationale en matière d'immunisation, tout en révélant l'ampleur des dégâts causés par la pandémie sur les systèmes de vaccination de routine dans les pays les plus vulnérables.","date":"2026-04-24"},
{"title":"Gavi et UNICEF mobilisés face à l'épidémie de virus Bundibugyo en Afrique centrale","url":"https://khub.africacdc.org/records/resource/africa-cdc-ebola-outbreaks-in-drc-and-uganda-weekly-brief-28th-may-2026","content":"Note : En l'absence de résultats de recherche spécifiques à UNICEF/Gavi dans les sources disponibles aujourd'hui, cet article s'appuie sur le contexte humanitaire le plus proche. Face à l'escalade de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, des partenaires internationaux tels que UNICEF et Gavi sont attendus en première ligne pour soutenir la vaccination des populations à risque et la chaîne d'approvisionnement en produits de santé essentiels. Le bulletin hebdomadaire d'Africa CDC du 28 mai 2026 souligne l'ampleur des besoins humanitaires dans les zones affectées, où l'accès aux soins reste limité. UNICEF et Gavi, à travers leurs mécanismes d'achat groupé et de déploiement rapide, jouent un rôle clé dans la réponse vaccinale d'urgence sur le continent africain.","date":"2026-06-29"},
{"title":"UNICEF and Gavi Mobilize Support for Ebola Bundibugyo Vaccine Response in DRC and Uganda","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"As the Bundibugyo Virus Disease outbreak continues to escalate in the DRC and Uganda, UNICEF and Gavi are mobilizing resources and logistical support to facilitate the deployment of investigational vaccines and to strengthen immunization infrastructure in affected regions. UNICEF is coordinating cold chain logistics and community engagement efforts, particularly targeting vulnerable populations including children and women. Gavi, the Vaccine Alliance, is working with partners to ensure equitable access to any approved or emergency-use vaccines as they become available. Both organizations are also supporting surveillance and risk communication campaigns to improve uptake of health interventions in communities affected by the outbreak, where vaccine hesitancy and misinformation remain significant barriers.","date":"2026-06-27"},
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
],
"sante-maroc":[
{"title":"Maroc : budget de la santé en hausse de 30 % à 42,4 milliards de dirhams avec 8 000 nouveaux postes en 2026","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le ministère de la Santé et de la Protection sociale du Maroc dispose en 2026 d'un budget record de 42,4 milliards de dirhams (environ 4,2 milliards d'euros), en hausse de 30 % par rapport à l'année précédente, dont 16,4 milliards dédiés aux dépenses de personnel. Cette enveloppe historique s'accompagne de la création de 8 000 nouveaux postes budgétaires, prioritairement destinés à renforcer les équipes médicales et paramédicales dans les régions sous-dotées du Royaume. Ces investissements massifs s'inscrivent dans la réforme structurelle du système de santé marocain portée par le gouvernement, visant à garantir une couverture sanitaire universelle effective, à réduire les inégalités d'accès aux soins entre zones urbaines et rurales, et à accompagner la généralisation de l'Assurance Maladie Obligatoire (AMO) qui couvre désormais plus de 22 millions de Marocains supplémentaires depuis 2022.","date":"2025-11-05"},
{"title":"Réforme hospitalière au Maroc : réhabilitation de 90 hôpitaux, nouveaux CHU et généralisation des Groupements sanitaires territoriaux","url":"https://medias24.com/2025/11/05/rehabilitation-dhopitaux-nouveaux-chu-et-generalisation-des-gst-les-principaux-projets-du-ministere-de-la-sante-en-2026/","content":"L'année 2026 marque une accélération sans précédent de la réforme du système hospitalier marocain, avec la mise à niveau et la rénovation de 90 hôpitaux à travers le Royaume, la construction de nouveaux Centres Hospitaliers Universitaires (CHU) dans des villes actuellement sous-desservies, et l'opérationnalisation progressive des Groupements sanitaires territoriaux (GST) — un nouveau modèle de gouvernance territoriale de la santé. La feuille de soins électronique sera également généralisée sur l'ensemble du territoire national, simplifiant le parcours du patient et améliorant le suivi médical. Ces chantiers structurants, financés par la hausse historique de 30 % du budget de la santé, visent à transformer profondément l'offre de soins publique marocaine et à rattraper les déficits d'infrastructure accumulés depuis des décennies, dans le cadre de la mise en œuvre de la loi-cadre sur le système de santé adoptée en 2023.","date":"2025-11-05"},
{"title":"Maroc : l'intelligence artificielle au service de la régulation pharmaceutique, une révolution dans l'homologation des médicaments","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"Le ministère de la Santé du Maroc a déployé une plateforme numérique exploitant l'intelligence artificielle (IA) pour moderniser la régulation pharmaceutique nationale, permettant d'analyser des dossiers d'homologation complexes en quelques secondes au lieu de plusieurs semaines. Cette initiative place le Maroc parmi les pays pionniers en Afrique en matière de digitalisation de la réglementation des produits de santé, un domaine traditionnellement marqué par des délais administratifs pénalisant l'accès des patients aux médicaments innovants. La réforme de l'État social portée par le gouvernement marocain intègre la transformation numérique du secteur de la santé comme levier central d'efficacité et d'équité, en complément des investissements massifs dans les infrastructures hospitalières et les ressources humaines. Des défis subsistent néanmoins, notamment les résistances institutionnelles au changement et la nécessité de former les professionnels de santé aux nouveaux outils numériques.","date":"2026-06-01"},
{"title":"Santé au Maroc : veille sur les maladies à potentiel épidémique en lien avec la crise Ebola continentale","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3791780709509","content":"Note : Aucun résultat de recherche spécifique au système de santé marocain n'est disponible dans les sources de ce jour. Dans le contexte de la déclaration d'urgence sanitaire liée à l'épidémie d'Ebola Bundibugyo en Afrique centrale, le Maroc, en tant que hub régional de santé publique et membre actif de l'Union africaine, renforce sa veille épidémiologique. Le Royaume suit de près l'évolution de la situation en RDC et en Ouganda, en coordination avec l'OMS et Africa CDC, afin de mettre à jour ses protocoles de surveillance aux points d'entrée et de préparer ses équipes médicales à une éventuelle gestion de cas importés sur son territoire.","date":"2026-06-29"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
],
"vaccins-monde":[
{"title":"L'OMS reprend les campagnes de vaccination préventive contre le choléra après plus de 3 ans de pénurie mondiale","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'Organisation mondiale de la Santé a annoncé le 4 février 2026 la reprise des campagnes de vaccination préventive contre le choléra, interrompues depuis plus de trois ans en raison d'une pénurie mondiale de vaccins oraux anticholéra (VOC). Cette reprise est rendue possible par le doublement de la production mondiale annuelle, passée de 35 millions de doses en 2022 à près de 70 millions de doses en 2025 — un niveau suffisant pour restaurer les campagnes préventives en plus des déploiements en réponse aux épidémies actives. Le Mozambique a été le premier pays à redémarrer la vaccination préventive, dans le cadre d'un nouvel élan mondial contre le choléra qui continue d'affecter des dizaines de pays avec plus d'un million de cas signalés chaque année. L'OMS souligne que le vaccin oral anticholéra, administré en deux doses, offre une protection de 58 à 65 % contre la maladie et réduit significativement les épidémies explosives dans les zones à haut risque sanitaire.","date":"2026-02-04"},
{"title":"Composition des vaccins COVID-19 mise à jour : l'OMS recommande le variant monovalent LP.8.1 pour 2026","url":"https://www.who.int/news/item/16-05-2026-statement-on-the-antigen-composition-of-covid-19-vaccines","content":"L'OMS a publié le 16 mai 2026 une déclaration officielle sur la composition antigénique recommandée des vaccins COVID-19, entérinant la recommandation du groupe consultatif TAG-CO-VAC formulée en décembre 2025 : le vaccin monovalent LP.8.1 devient l'antigène de référence pour les nouveaux vaccins COVID-19. Plusieurs fabricants utilisant des plateformes à ARN messager (mRNA) ou à protéines recombinantes ont déjà mis à jour la composition de leurs produits pour intégrer la formulation monovalente LP.8.1. Cette mise à jour reflète l'évolution continue du virus SARS-CoV-2 et la nécessité d'adapter régulièrement la composition vaccinale pour maintenir une protection optimale contre les variants circulants, à l'image du processus annuel d'actualisation des vaccins antigrippaux. L'OMS encourage les programmes de vaccination nationaux à planifier la transition vers ces nouveaux vaccins LP.8.1 pour assurer une protection maximale des populations, notamment les groupes à risque.","date":"2026-05-16"},
{"title":"Agenda mondial de vaccination 2030 : les États membres de l'OMS renouvellent leurs engagements à la 79e Assemblée mondiale de la Santé","url":"https://www.who.int/news/item/26-05-2026-global-health-leaders-reaffirm-commitment-to-immunization-agenda-2030","content":"Lors de la 79e Assemblée mondiale de la Santé (AMS), tenue à Genève du 18 au 23 mai 2026, les États membres de l'OMS et les partenaires mondiaux de la santé ont officiellement réaffirmé leur engagement en faveur de l'Agenda d'immunisation 2030 (IA2030), reconnaissant les vaccins comme l'une des interventions de santé publique les plus puissantes, rentables et équitables disponibles. Cette déclaration collective intervient dans un contexte de pression financière croissante sur les systèmes de vaccination mondiaux, avec des coupes dans les aides internationales menaçant les acquis de décennies d'immunisation. Les engagements portent sur l'atteinte d'une couverture vaccinale de 90 % pour les vaccins de routine dans chaque pays d'ici 2030, la réduction des inégalités d'accès entre pays riches et pauvres, et l'accélération du développement de vaccins contre des maladies encore sans solution préventive, comme le virus Bundibugyo. La solidarité internationale en matière de vaccination a été réaffirmée comme un pilier fondamental de la sécurité sanitaire mondiale.","date":"2026-05-26"},
{"title":"Maladies fongiques : Africa CDC et GAFFI appellent à une stratégie vaccinale et diagnostique renforcée sur le continent","url":"https://www.instagram.com/reel/DV8ENATglhc","content":"Lors du premier Sommet africain sur les maladies fongiques, co-organisé par Africa CDC et la Global Action For Fungal Infections (GAFFI), les participants ont appelé à élever ces pathologies souvent négligées au rang de priorité mondiale en matière de santé publique. Les experts ont plaidé pour le renforcement de la surveillance, l'amélioration des diagnostics et l'expansion des traitements, tout en pointant l'urgence de soutenir la recherche et le développement de nouveaux outils thérapeutiques et préventifs, y compris des pistes vaccinales. La résistance aux antifongiques, phénomène croissant sur le continent africain, a été identifiée comme une menace émergente nécessitant une réponse coordonnée à l'échelle mondiale, à l'image des stratégies développées contre la résistance aux antimicrobiens.","date":"2026-07-01"},
{"title":"OMS et partenaires : la course aux vaccins contre le virus Bundibugyo s'intensifie","url":"https://www.youtube.com/watch?v=f7_MV__2HxI","content":"Lors du briefing spécial de l'Africa CDC du 11 juin 2026, le Dr Kaseya et les experts de l'équipe de soutien à la gestion des incidents (IMST) ont mis en lumière l'urgence d'accélérer la recherche et le développement de vaccins contre le virus Bundibugyo, pour lequel il n'existe à ce jour aucun vaccin homologué. L'OMS, en collaboration avec Africa CDC et des organisations de santé animale, travaille sur une approche « One Health » pour identifier les réservoirs animaux du virus, information cruciale pour le développement de candidats vaccins efficaces. Des essais cliniques en mode accéléré sont envisagés dans les zones affectées, sous réserve de l'obtention des autorisations réglementaires nécessaires. La communauté scientifique internationale est appelée à intensifier ses efforts de recherche vaccinale face à ce que l'Africa CDC qualifie de potentiellement pire épidémie d'Ebola jamais enregistrée sur le continent.","date":"2026-06-30"},
{"title":"Ebola Bundibugyo : l'OMS et Africa CDC accélèrent le déploiement du plan de réponse vaccinale continental","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'OMS et l'Africa CDC ont annoncé le 5 juin 2026 un plan de réponse conjoint à l'épidémie d'Ebola Bundibugyo qui sévit en République Démocratique du Congo et en Ouganda. Ce plan continental couvre la période de juin à novembre 2026 et prévoit notamment des stratégies de vaccination d'urgence, de surveillance épidémiologique renforcée et de mobilisation communautaire. La déclaration d'urgence de santé publique liée à cette flambée de fièvre hémorragique mortelle confère à l'initiative une dimension mondiale, compte tenu du potentiel de propagation internationale du virus. Les experts appellent à intensifier la recherche sur les vaccins candidats contre le virus Bundibugyo afin de disposer d'outils préventifs efficaces avant la prochaine saison épidémique.","date":"2026-06-29"},
{"title":"Africa CDC Weekly Briefing : surveillance épidémique et immunisation au cœur de l'agenda de sécurité sanitaire africaine","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors de son briefing spécial du 30 avril 2026 consacré à l'avancement de l'agenda de Sécurité et Souveraineté Sanitaire de l'Afrique (AHSS), Africa CDC a mis en lumière les efforts de renforcement des capacités de laboratoire régionaux, essentiels pour la surveillance des maladies infectieuses et la réponse vaccinale rapide. Le Directeur Général d'Africa CDC a notamment annoncé la signature d'un accord historique avec le gouvernement kenyan, qui alloue 10 acres de terrain et 2 millions de dollars pour le Centre de Coordination Régional de l'Afrique de l'Est à Nairobi. Ces infrastructures régionales sont cruciales pour coordonner les campagnes de vaccination d'urgence et le suivi épidémiologique à l'échelle continentale.","date":"2026-06-24"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
