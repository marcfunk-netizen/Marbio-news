var articlesData={
"african-cdc":[
{"title":"Africa CDC's Youth Programme invests in the next generation of public health leaders","url":"https://youth.africacdc.org","content":"Africa CDC's Youth Programme continues to expand its efforts to build a new generation of public health leaders across the African continent. In March 2026, the institution announced its 2026 cohort of Young Digital Health Champions through the Youth Digital Health Network (YiDHN), a strategic initiative of Africa CDC's Youth Division. The programme, which runs flagship initiatives such as AU Bingwa and the Youth Policy Council (YPC), aims to bring young professionals into meaningful roles in health governance, emergency response, and digital health. A recent testimonial series titled 'From Classroom to Continent' highlights how participants are translating academic training into continent-wide impact. The YES! Health Strategy, endorsed in December 2025, further cements Africa CDC's commitment to ensuring African youth are no longer excluded from health services and leadership at all levels.","date":"2026-06-09"},
{"title":"Ebola outbreak could rival worst on record, CDC warns — Africa CDC mobilizes continental response","url":"https://www.npr.org/2026/06/05/nx-s1-5848082/ebola-virus-cdc-outbreak-democratic-republic-congo-uganda","content":"New analyses from the U.S. Centers for Disease Control and Prevention warn that the current Ebola outbreak ravaging the Democratic Republic of Congo and Uganda could rival the catastrophic West Africa outbreak of a decade ago, potentially resulting in over 20,000 cases and 4,000 deaths within just three months. The outbreak, centered in DRC's Ituri Province, involves the Bundibugyo strain and has already prompted the WHO to declare an international health emergency. Africa CDC is at the forefront of the continental response, coordinating with WHO and regional health authorities. Experts warn that weakened international response capacity — including funding cuts to key agencies — has hampered early containment efforts, leaving the continent in a more vulnerable position than in previous outbreaks.","date":"2026-06-09"},
{"title":"Africa CDC and WHO announce joint $518M plan to fight Ebola outbreak in DRC and Uganda","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"The Africa Centers for Disease Control and Prevention (Africa CDC) and the World Health Organization (WHO) have announced a joint continental response plan to combat the ongoing Ebola outbreak spreading through the Democratic Republic of Congo and Uganda. The plan, unveiled on June 5, 2026, aims to raise $518 million to strengthen health systems, disease surveillance, laboratory testing, infection prevention, and clinical care across affected and neighboring countries. Since May 15, the WHO has confirmed 381 cases and 64 deaths in the DRC and 16 cases and 1 death in Uganda. The outbreak involves the Bundibugyo species of the Ebola virus, for which no approved vaccine currently exists. Africa CDC Director General Jean Kaseya stated: \"This joint plan gives the continent a clear path to act with speed and unity: to save lives, support the affected countries and protect neighboring communities.\"","date":"2026-06-09"},
{"title":"Africa CDC lève plus de 250 millions de dollars au Sommet One Health de Lyon pour renforcer la sécurité sanitaire africaine","url":"https://reliefweb.int/report/world/africa-cdc-secures-over-us250-million-advance-africas-global-health-security-agenda-lyon-one-health-summit-lyon-france","content":"Le 8 avril 2026, lors du Sommet One Health de Lyon (France), l'Africa CDC a annoncé avoir sécurisé plus de 250 millions de dollars pour faire avancer l'agenda africain de sécurité sanitaire mondiale. Cette mobilisation de fonds marque un tournant stratégique : l'Afrique n'est plus en marge de la santé mondiale, elle en façonne désormais l'avenir. L'Africa CDC a réaffirmé un principe fondamental : les partenariats, notamment avec Gavi, le Fonds mondial et Unitaid, doivent s'aligner sur les priorités, les systèmes et le leadership africains pour passer de la fragmentation à la coordination. Ces engagements seront discutés avec les dirigeants africains lors du Comité ministériel de haut niveau sur la réforme de l'architecture mondiale de la santé, en marge du Sommet régional de la santé mondiale à Nairobi.","date":"2026-06-08"},
{"title":"Africa CDC et OMS lancent un plan continental de préparation à la maladie à virus Bundibugyo","url":"https://www.facebook.com/africacdc/videos/live-africa-cdc-who-press-briefing-bundibugyo-virus-disease-continental-prepared/1255649539979975","content":"Le 5 juin 2026, l'Africa CDC et l'OMS ont tenu une conférence de presse conjointe pour présenter le Plan continental de préparation et de réponse à la maladie à virus Bundibugyo (BVD). Ce cadre de référence, développé pour coordonner la préparation et la réponse à travers tous les États membres de l'Union africaine, répond à une menace sérieuse : la maladie à virus Bundibugyo est une fièvre hémorragique mortelle dont le potentiel de propagation transfrontalière en fait une préoccupation majeure pour la sécurité sanitaire mondiale. Ce briefing, destiné aux professionnels de santé, décideurs politiques, journalistes et chercheurs, marque une étape décisive dans la stratégie africaine de préparation aux pandémies.","date":"2026-06-08"},
{"title":"WHO et Africa CDC dévoilent un plan à 518 millions de dollars contre l'Ebola en RDC et en Ouganda","url":"https://www.aljazeera.com/news/2026/6/5/who-africa-cdc-unveil-518m-ebola-plan-as-uganda-death-toll-rises","content":"L'Organisation mondiale de la santé (OMS) et l'Africa CDC ont annoncé le 5 juin 2026 un plan conjoint de 518 millions de dollars pour combattre l'épidémie d'Ebola sévissant en République démocratique du Congo (RDC) et en Ouganda voisin. Ce plan, qui s'étend de juin à novembre 2026, couvre la coordination d'urgence, la surveillance épidémiologique, les tests diagnostiques, la prévention des infections, les soins cliniques et l'engagement communautaire. Le directeur général de l'OMS, Tedros Adhanom Ghebreyesus, a confirmé que l'épidémie, déclarée en RDC le 15 mai, a déjà infecté au moins 381 personnes et causé 64 décès dans ce pays. En Ouganda, trois nouveaux cas ont été signalés vendredi, portant le total à 19 cas avec deux décès.","date":"2026-06-08"},
],
"african-medical-agency":[
{"title":"L'Agence Africaine du Médicament : un pilier en construction pour la souveraineté sanitaire du continent","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Alors que l'Afrique renforce ses institutions de santé publique face aux épidémies récurrentes, l'Agence Africaine du Médicament (AMA) demeure un chantier stratégique prioritaire de l'Union Africaine. En parallèle des efforts déployés par Africa CDC pour contenir l'épidémie d'Ebola en RDC et en Ouganda, l'AMA travaille à l'harmonisation des cadres réglementaires du médicament à l'échelle continentale. Son rôle est crucial pour garantir l'accès à des médicaments et vaccins de qualité, en particulier lors des situations d'urgence sanitaire. Les experts appellent à une accélération de l'opérationnalisation complète de l'AMA, afin que l'Afrique puisse disposer d'un organe de régulation pharmaceutique indépendant et pleinement fonctionnel avant la prochaine grande crise sanitaire.","date":"2026-06-07"},
{"title":"Africa CDC and African Medicines Agency strengthen continental regulatory cooperation","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"Africa CDC and the newly operationalised African Medicines Agency (AMA) have reaffirmed deepening collaboration aimed at advancing pharmaceutical regulatory harmonisation across the continent, as highlighted in Africa CDC's weekly briefing of 16-22 February 2026. The partnership is framed as foundational to Africa's ambition to engage as an equal partner in global pharmaceutical markets and to ensure that regulatory frameworks keep pace with scientific and technological innovation. Regulatory harmonisation is seen not merely as an administrative task but as a strategic lever for health sovereignty, reducing dependency on external pharmaceutical supply chains. Sustained political commitment and predictable financing are identified as essential to achieving equitable access and continental pharmaceutical autonomy.","date":"2026-04-11"},
{"title":"Africa CDC and African Medicines Agency deepen regulatory cooperation to advance health sovereignty","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"In the week of February 16-22, 2026, Africa CDC reaffirmed its collaboration with the newly operationalized African Medicines Agency (AMA), marking a significant step in continental regulatory harmonization. The partnership aims to ensure that Africa's regulatory frameworks keep pace with scientific and technological innovation, enabling the continent to engage as an equal partner in global pharmaceutical markets. Africa CDC Director-General H.E. Dr Jean Kaseya emphasized that regulatory harmonization is foundational to Africa's ability to exert influence over global health policy norms. The alliance forms part of a broader AU-backed continental strategy to build resilient, sovereign health systems with predictable financing and harmonized regulatory standards.","date":"2026-04-10"},
],
"manufacture-vaccins":[
{"title":"No approved vaccine for Bundibugyo Ebola strain highlights urgency of African vaccine manufacturing capacity","url":"https://www.wuot.org/2026-06-05/cdc-report-ebola-outbreak-could-rival-the-worst-on-record-unless-world-acts","content":"The rapid spread of the Bundibugyo species of the Ebola virus across the Democratic Republic of Congo and Uganda has cast a stark spotlight on a critical gap in global vaccine manufacturing: there is currently no approved vaccine for this strain. While vaccines exist for the more common Zaire strain of Ebola, the Bundibugyo variant has largely been neglected in vaccine research and production pipelines. Health experts are now calling for urgent investment in the development and local manufacturing of vaccines targeting this strain. The crisis reinforces broader calls for Africa to accelerate domestic vaccine production capacity so the continent is not dependent on external supply chains during emergencies. The joint Africa CDC-WHO response plan, which seeks $518 million in funding, includes provisions for research and development support that could help bridge this manufacturing gap.","date":"2026-06-09"},
{"title":"Face à Ebola Bundibugyo : l'absence de vaccin relance l'urgence de la production vaccinale africaine","url":"https://www.cdc.gov/media/releases/2026/update-on-ebola-outbreak-in-the-democratic-republic-of-the-congo-and-uganda-6-5-2026.html","content":"L'épidémie d'Ebola causée par la souche Bundibugyo, qui frappe actuellement la République Démocratique du Congo et l'Ouganda, met en lumière une lacune critique dans le paysage vaccinal mondial : il n'existe à ce jour aucun vaccin homologué contre cette souche spécifique du virus Ebola. Avec 381 cas confirmés et 64 décès en RDC depuis le 15 mai 2026, et des projections indiquant un dépassement imminent du seuil des mille cas, la pression sur les fabricants de vaccins et les centres de recherche est plus forte que jamais. Les experts appellent à accélérer les investissements dans la recherche et la production de vaccins contre les souches négligées de filovirus, et soulignent la nécessité pour l'Afrique de développer ses propres capacités manufacturières afin de ne pas dépendre exclusivement de l'approvisionnement extérieur en situation d'urgence sanitaire.","date":"2026-06-07"},
{"title":"Fabrication de vaccins contre Ebola : un enjeu stratégique pour l'Afrique face à l'épidémie en cours","url":"https://en.wikipedia.org/wiki/2026_Central_Africa_Ebola_epidemic","content":"Alors que l'épidémie d'Ebola frappe la République Démocratique du Congo et l'Ouganda depuis mai 2026, la question de la production locale de vaccins et de contre-mesures médicales se pose avec une urgence renouvelée. Le plan conjoint OMS–Africa CDC de 518 millions de dollars, lancé le 5 juin 2026, prévoit notamment le renforcement de l'accès aux vaccins anti-Ebola approuvés. La dépendance du continent africain vis-à-vis des fabricants étrangers pour l'approvisionnement en vaccins contre les fièvres hémorragiques illustre les lacunes persistantes en matière de capacités de production locale. Des voix s'élèvent pour accélérer les investissements dans les infrastructures de fabrication vaccinale sur le sol africain, afin de garantir un accès rapide et souverain aux outils biologiques lors des prochaines urgences sanitaires.","date":"2026-06-07"},
{"title":"ACHIEVE Africa launched to advance vaccine and biologics manufacturing sovereignty","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Africa CDC has launched the ACHIEVE Africa initiative as a cornerstone program under its Health Security and Sovereignty Agenda, targeting the development of indigenous vaccine and biologics manufacturing capacity across the continent. The initiative responds to Africa's near-total dependence on imported vaccines, which was starkly exposed during the COVID-19 pandemic when African nations received doses last. ACHIEVE Africa is designed to catalyze investment in local production infrastructure, workforce training, and technology transfer partnerships with established global manufacturers. The program aligns with the AU's target of producing 60% of Africa's health products locally by 2040.","date":"2026-04-10"},
],
"unicef-gavi":[
{"title":"UNICEF and Gavi mobilize support as Ebola emergency threatens to overwhelm East and Central Africa","url":"https://www.facebook.com/NewsContent.CCTVPLUS/videos/africa-cdc-who-launch-response-plan-to-contain-ebolathe-africa-centers-for-disea/1758110012018147","content":"As the Ebola outbreak in the Democratic Republic of Congo and Uganda continues to escalate, international partners including UNICEF and Gavi, the Vaccine Alliance, are being called upon to scale up their support. The continental preparedness and response plan launched on June 5, 2026 by Africa CDC and WHO requires $518 million in international backing, with multilateral agencies expected to play a key role in logistics, supply chain management, and immunization support. UNICEF, which maintains one of the world's largest humanitarian supply chains, is positioned to assist in the delivery of medical equipment, personal protective equipment, and community engagement campaigns. Gavi, meanwhile, is exploring options to support the expedited development and potential emergency use authorization of candidate vaccines targeting the Bundibugyo Ebola strain, in line with its mandate to expand vaccine access in low-income countries.","date":"2026-06-09"},
{"title":"Gavi and UNICEF secure malaria vaccine supply from Serum Institute at $2.99 per dose","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Gavi and UNICEF have finalized an agreement with the Serum Institute of India to supply the R21/Matrix-M malaria vaccine at $2.99 per dose, a price point hailed as a breakthrough for low-income country access. The deal is expected to significantly expand coverage of malaria vaccination programs across sub-Saharan Africa, where the disease remains one of the leading causes of child mortality. Negotiating an affordable price from a large-scale manufacturer was seen as a critical test of multilateral procurement power in the post-COVID global health funding environment. The agreement is expected to facilitate integration of malaria vaccination into routine immunization schedules in eligible countries supported by Gavi.","date":"2026-04-10"},
{"title":"Letter urges Gavi and UNICEF to negotiate fair price for mpox vaccines amid equity concerns","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"A coalition of global health advocates has written to Gavi and UNICEF urging the organizations to use their collective purchasing leverage to negotiate fair and transparent pricing for mpox vaccines, warning that current price structures risk excluding the most affected African nations. The letter comes as mpox continues to circulate in multiple African countries and as demand for the Bavarian Nordic JYNNEOS vaccine outstrips available supply at accessible price points. Advocates argue that the precedent set by the malaria vaccine deal with Serum Institute should be applied systematically across priority vaccines for Africa. They called for full price transparency and advance market commitment mechanisms to incentivize manufacturers to scale up affordable production.","date":"2026-04-10"},
{"title":"Bangladesh launches emergency measles vaccination campaign after 98 children die in outbreak","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Bangladesh has launched an emergency measles vaccination campaign following an outbreak that has claimed the lives of at least 98 children, according to health authorities. The outbreak exposed significant gaps in routine immunization coverage that had widened during and after the COVID-19 pandemic, when vaccination campaigns were disrupted across the region. UNICEF and WHO are supporting the emergency response by providing vaccines, cold chain equipment, and technical personnel to accelerate coverage in affected districts. The crisis has renewed calls for sustained investment in routine immunization infrastructure to prevent similar outbreaks, particularly in densely populated low-income settings.","date":"2026-04-10"},
],
"sante-maroc":[
{"title":"Le Maroc renforce sa veille sanitaire face à la propagation de l'épidémie d'Ebola en Afrique centrale","url":"https://www.ecdc.europa.eu/sites/default/files/documents/Communicable-disease-threa","content":"Alors que l'épidémie d'Ebola continue de s'étendre en République démocratique du Congo et en Ouganda, le Royaume du Maroc a activé ses mécanismes de surveillance épidémiologique renforcée aux points d'entrée du territoire, notamment dans les aéroports internationaux de Casablanca, Rabat et Marrakech. Le ministère de la Santé et de la Protection sociale suit de près l'évolution de la situation en coordination avec l'Organisation mondiale de la Santé et Africa CDC. Le Maroc, dont le système de santé a été considérablement renforcé depuis la pandémie de Covid-19, dispose de protocoles de détection et d'isolement adaptés aux fièvres hémorragiques virales. Les autorités sanitaires rappellent qu'aucun cas n'a été détecté sur le territoire national à ce jour, tout en appelant à la vigilance, notamment parmi les voyageurs en provenance des zones affectées.","date":"2026-06-09"},
{"title":"Le Maroc renforce sa coopération en matière de santé publique dans le contexte des épidémies africaines","url":"https://www.facebook.com/africacdc/posts/-press-briefing-update-friday-5-june-2026-time-1600-eat-gmt3-1500-sast-gmt2-1400/1404687231689647","content":"Dans le contexte de l'épidémie d'Ebola qui sévit en Afrique centrale et orientale, le Royaume du Maroc suit de près l'évolution de la situation sanitaire continentale. Les autorités sanitaires marocaines maintiennent une veille épidémiologique active, en lien avec les mécanismes de surveillance de l'Africa CDC et de l'OMS. Le Maroc, qui participe activement aux instances de l'Union africaine, est partie prenante des dispositifs continentaux de préparation aux urgences sanitaires, et ses équipes de santé publique participent aux briefings hebdomadaires de l'Africa CDC sur l'état de l'épidémie d'Ebola en RDC et en Ouganda.","date":"2026-06-08"},
{"title":"Le Maroc, hôte de la finale de la CAN 2026 : santé publique et diplomatie sportive au cœur des priorités continentales","url":"https://africacdc.org/wp-content/uploads/2026/01/Weekly-Bulletin-25-Jan-2026-ENG.pdf","content":"Le Maroc a accueilli la finale de la Coupe d'Afrique des Nations 2026, un événement majeur qui a mis en lumière le rôle du Royaume comme acteur incontournable de la diplomatie sanitaire africaine. Le Dr Jean Kaseya, Directeur Général de l'Africa CDC, a participé à la finale sur invitation du gouvernement marocain, soulignant l'importance du sport et de la santé dans la promotion de l'unité et du bien-être à travers le continent. Il a exprimé sa reconnaissance au Maroc et au Président de la Confédération Africaine de Football (CAF), Patrice Motsepe, pour la réussite de l'organisation de cet événement. Cette présence de l'Africa CDC à la CAN illustre la volonté du Maroc de positionner ses grandes manifestations sportives comme des plateformes de promotion de la santé publique et de la résilience collective en Afrique.","date":"2026-06-07"},
{"title":"Le Maroc acheve la rehabilitation de 1 400 centres de sante pour renforcer l'acces aux soins primaires","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Le gouvernement marocain a annonce l'achevement de la rehabilitation de 1 400 centres de sante primaires a travers le Royaume, dans le cadre du vaste chantier de reforme du systeme de sante national. Cette initiative s'inscrit dans la mise en oeuvre de la loi-cadre 06-22 relative au systeme de sante et vise a garantir une offre de soins de proximite de qualite pour l'ensemble de la population, y compris dans les zones rurales et enclavees. La rehabilitation a porte sur la mise aux normes des infrastructures, l'equipement medical et l'amelioration des conditions d'accueil des patients. Le ministre de la Sante a souligne que ce chantier constitue un jalon essentiel vers la couverture sante universelle au Maroc.","date":"2026-04-10"},
],
"vaccins-monde":[
{"title":"OMS et Africa CDC lancent un plan d'urgence pour déployer les vaccins contre Ebola en RDC et en Ouganda","url":"https://www.facebook.com/NewsContent.CCTVPLUS/posts/africa-cdc-who-launch-response-plan-to-contain-ebolathe-africa-centers-for-disea/1424561453041957","content":"Le 5 juin 2026, l'Africa CDC et l'Organisation mondiale de la santé (OMS) ont officiellement lancé un plan continental de préparation et de réponse à l'épidémie d'Ebola, avec pour objectif de coordonner le déploiement des vaccins et des ressources médicales dans les zones touchées. Ce plan intègre des mesures de vaccination d'urgence, de surveillance épidémiologique et d'engagement communautaire pour freiner la propagation du virus, qui a déjà infecté des centaines de personnes en République démocratique du Congo et en Ouganda. L'initiative marque une étape majeure dans la stratégie mondiale d'immunisation contre les fièvres hémorragiques virales, en mobilisant des partenaires internationaux autour d'une réponse africaine coordonnée.","date":"2026-06-08"},
{"title":"IAVI begins Phase 1 first-in-human trial of Marburg virus vaccine","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"The International AIDS Vaccine Initiative (IAVI) has initiated a Phase 1 clinical trial for a novel Marburg virus vaccine candidate, marking the first time this vaccine has been tested in humans. The trial follows a renewed global urgency around Marburg preparedness after outbreaks in East Africa, including Ethiopia's first-ever Marburg event declared over in January 2026. The vaccine candidate uses an established viral vector platform and will be evaluated for safety and immunogenicity in a small cohort of healthy adult volunteers. Results from this Phase 1 trial are expected to inform decisions on accelerated development pathways, particularly given Marburg's high case fatality rate and its status as a priority pathogen for the WHO R&D Blueprint.","date":"2026-04-10"},
{"title":"WHO World Immunization Week 2026 highlights urgent need for global vaccine equity","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"WHO's World Immunization Week 2026 has spotlighted deepening inequities in vaccine access between high-income and low-income countries, calling on governments and global health institutions to redouble efforts to close immunization gaps. The campaign theme emphasizes collective action and scientific solidarity at a time when political headwinds and funding cuts are threatening routine immunization programs in multiple regions. WHO data indicate that millions of children remain unvaccinated or under-vaccinated against preventable diseases including measles, polio, and pneumococcal disease, with coverage stagnating or declining in fragile states. The agency urged donors to maintain funding commitments and called on countries to integrate vaccination into primary health care reform agendas.","date":"2026-04-10"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
