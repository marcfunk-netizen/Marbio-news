{title:"Africa CDC warns of health crisis over costs, disruptions",url:"https://guardian.ng/news/africa-cdc-warns-of-health-crisis-over-costs-disruptions/",content:"Africa CDC has raised the alarm over shortages of essential medical supplies due to freight delays and supply chain disruptions threatening timely delivery of medicines, vaccines and health products. Africa's heavy reliance on imports from China and India increases the continent's vulnerability. The AHSS Agenda promotes stronger leadership, coordinated pandemic preparedness, sustainable domestic health financing, digital transformation, and local manufacturing of health products.",date:"2026-04-03"},

{title:"Africa CDC Rolls Out Continental SPARK-NCDs Programme",url:"https://africacdc.org/news-item/africa-cdc-rolls-out-continental-spark-ncds-programme-as-noncommunicable-diseases-rise-across-africa/",content:"Nearly 2 million Africans die prematurely each year from complications related to hypertension and diabetes alone, and only 10–20% of those living with these conditions receive regular care. Africa CDC has launched SPARK-NCDs, a major continental initiative to strengthen surveillance, improve integrated care, and transform the response to non-communicable diseases across the continent. The programme signals a decisive step toward more resilient, data-driven health systems.",date:"2026-03-30"},

  if(d.includes("nature.com"))return"#B5232D";
  if(d.includes("sciencedirect"))return"#F58220";
  if(d.includes("path.org"))return"#6B2D8B";
  if(d.includes("cdc.gov"))return"#075290";
  if(d.includes("pharmaboardroom"))return"#1A6B4F";
  if(d.includes("anrs.fr"))return"#8B1A4A";
  return"#0069B4";
}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch{return""}}
function timeAgo(d){
  if(!d)return"";const date=new Date(d),now=new Date();
  if(isNaN(date))return"";
  const s=Math.floor((now-date)/1000);
  const formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  if(s>=0&&s<86400)return formatted+" · aujourd'hui";
  if(s>=86400&&s<172800)return formatted+" · hier";
  if(s>=172800&&s<604800)return formatted+" · il y a "+Math.floor(s/86400)+"j";
  return formatted;
}
function isToday(d){
  if(!d)return false;
  const date=new Date(d),now=new Date();
  return date.getFullYear()===now.getFullYear()&&date.getMonth()===now.getMonth()&&date.getDate()===now.getDate();
}
function isRecent(d){
  if(!d)return false;
  const date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);
  return diff<=1.5;
}

function renderCategories(){
  const el=document.getElementById("categories");
  el.innerHTML=CATEGORIES.map(c=>{
    const articles=articlesData[c.id]||[];
    const newCount=articles.filter(a=>isRecent(a.date)).length;
    const badge=newCount>0?`<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">${newCount} NEW</span>`:'';
    return`<button class="cat-btn ${activeCategory===c.id&&!isCustomSearch?'active':''}" data-id="${c.id}">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-label">${c.label}${badge}</div>
      <div class="cat-desc">${c.desc}</div>
    </button>`;
  }).join("");
  el.querySelectorAll(".cat-btn").forEach(b=>{
    b.addEventListener("click",()=>{isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles()});
  });
}

function renderArticles(){
  const container=document.getElementById("articles");
  const articles=articlesData[activeCategory]||[];
  const info=document.getElementById("toolbarInfo");
  const newArticles=articles.filter(a=>isRecent(a.date));
  const newCountEl=document.getElementById("newCount");
  
  info.textContent=`${articles.length} articles`;
  if(newArticles.length>0){
    newCountEl.style.display="inline";
    newCountEl.textContent=`✨ ${newArticles.length} nouveau${newArticles.length>1?'x':''}`;
  }else{
    newCountEl.style.display="none";
  }

  if(isLoading){
    container.innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-text">Recherche en cours…</div></div>`;
    return;
  }
  if(!articles.length){
    container.innerHTML=`<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article trouvé</div></div>`;
    return;
  }
  container.innerHTML=articles.map((a,i)=>{
    const domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);
    const isNew=isRecent(a.date);
    return`<div class="article-card${isNew?' is-new':''}" style="animation-delay:${i*.06}s">
      <div class="article-inner">
        <div class="article-bar" style="background:${color}"></div>
        <div class="article-body">
          <a href="${a.url}" target="_blank" rel="noopener" class="article-title">${isNew?'<span class="badge-new">NOUVEAU</span> ':''}${a.title}</a>
          <div class="article-content collapsed" id="c-${i}">${a.content}</div>
          <div class="article-meta">
            <span class="source-tag" style="background:${color}14;color:${color}">${domain}</span>
            ${dateStr?`<span class="date-tag">${dateStr}</span>`:''}
            <button class="expand-btn" data-i="${i}">Lire plus ▼</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
  container.querySelectorAll(".expand-btn").forEach(b=>{
    b.addEventListener("click",()=>{const el=document.getElementById("c-"+b.dataset.i);const c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus ▼":"Réduire ▲"});
  });
}

// Search functionality (local filter)
function doSearch(){
  const val=document.getElementById("searchInput").value.trim().toLowerCase();
  if(!val){isCustomSearch=false;renderCategories();renderArticles();return}
  isCustomSearch=true;
  const allArticles=[];
  Object.values(articlesData).forEach(arr=>arr.forEach(a=>allArticles.push(a)));
  const filtered=allArticles.filter(a=>(a.title+a.content).toLowerCase().includes(val));
  activeCategory="search-custom";
  articlesData["search-custom"]=filtered;
  renderCategories();renderArticles();
}

document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch()});

renderCategories();
renderArticles();
</script>
</body>
</html>
