var articlesData={
"african-cdc":[
{"title":"Africa CDC et Aspen Pharmacare lancent un partenariat vaccinal à long terme pour mettre fin à la dépendance importatrice de l'Afrique","url":"https://africacdc.org/news-item/africa-cdc-and-aspen-advance-long-term-vaccine-supply-partnership-for-africa/","content":"Annoncé le 12 mai 2026 lors de l'Africa Forward Summit de Nairobi, l'Africa CDC et le géant pharmaceutique sud-africain Aspen Pharmacare ont engagé des pourparlers avancés sur un cadre d'alignement offre-demande à long terme visant à renforcer la fabrication durable de vaccins en Afrique. Aspen a investi près de 10 milliards de rands (environ 540 millions USD) dans des infrastructures de fabrication stérile de classe mondiale en Afrique du Sud et en France, capables à terme de produire plusieurs centaines de millions de doses par an. Le cadre envisagé explorera des mécanismes de mutualisation de la demande via la Plateforme africaine de procurement groupé (APPM) ainsi que des dispositifs de partage des risques financiers pour garantir la viabilité économique de la production locale. Africa CDC voit dans ce partenariat une étape clé de son Agenda pour la Sécurité et la Souveraineté Sanitaire de l'Afrique, qui ambitionne de produire 60% des vaccins utilisés sur le continent d'ici 2040.","date":"2026-05-12"},
{"title":"Africa CDC presse les États membres de renforcer le contrôle sanitaire aux frontières face à l'épidémie d'Ebola Bundibugyo","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-8-14-june-2026/","content":"Dans son bulletin hebdomadaire du 8 au 14 juin 2026, l'Africa CDC a exhorté tous les États membres de l'Union africaine à renforcer immédiatement le contrôle sanitaire à la sortie de leurs points d'entrée — aéroports, ports maritimes et principaux postes-frontières terrestres — afin de réduire le risque de transmission transfrontalière de la maladie à virus Bundibugyo. L'Africa CDC recommande notamment la mise en place de systèmes de détection thermique, de questionnaires de santé systématiques pour les voyageurs en provenance des zones affectées (RDC et Ouganda), et une formation d'urgence des personnels de contrôle sanitaire aux frontières. Ce bulletin intervient alors que l'épidémie avait déjà dépassé plusieurs centaines de cas confirmés, avec une transmission active dans plusieurs provinces de la RDC et des cas importés signalés en Ouganda. Africa CDC rappelle que la coopération transfrontalière et le partage rapide des données épidémiologiques entre les États membres sont essentiels pour contenir la propagation internationale du virus.","date":"2026-06-14"},
{"title":"Africa CDC Weekly Brief 1-7 juin 2026 : mobilisation accélérée contre l'épidémie et lancement du plan continental de riposte","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-1-7-june-2026/","content":"Le bulletin hebdomadaire de l'Africa CDC couvrant la période du 1er au 7 juin 2026 fait état de la mobilisation accélérée de la communauté internationale face à l'épidémie de maladie à virus Bundibugyo en République Démocratique du Congo et en Ouganda. L'Africa CDC y détaille les premières mesures du plan continental de préparation et de riposte lancé conjointement avec l'OMS, chiffré à 518 millions de dollars et couvrant la période juin–novembre 2026. Le bulletin souligne les difficultés d'accès humanitaire dans certaines zones affectées, l'importance des approches communautaires pour lutter contre la méfiance envers les équipes de réponse, et l'urgence de développer des vaccins candidats contre le virus Bundibugyo, pour lequel aucun vaccin ni traitement approuvé n'existe. Le bulletin décrit également les premières opérations de traçage des contacts déployées par les équipes de réponse rapide d'Africa CDC dans les provinces les plus affectées.","date":"2026-06-07"},
{"title":"Africa CDC : l'épidémie d'Ebola en RDC pourrait être la pire jamais enregistrée","url":"https://edition.cnn.com/2026/06/16/africa/drc-ebola-cdc-intl-latam-afr","content":"Le directeur général de l'Africa CDC, le Dr Kaseya, a tiré la sonnette d'alarme en déclarant que l'épidémie d'Ebola en cours en République démocratique du Congo pourrait être la pire jamais documentée. Parmi les défis critiques identifiés figure l'insuffisance des ressources pour assurer le traçage des contacts des plus de 800 cas confirmés à la date du rapport. Par ailleurs, les inhumations traditionnelles non sécurisées, lors desquelles des proches manipulent les corps sans équipement de protection adéquat, continuent de constituer l'un des principaux vecteurs de transmission. Le Dr Kaseya a exhorté la communauté internationale à mobiliser davantage de ressources financières et humaines pour soutenir les États membres affectés dans le cadre de l'Agenda pour la sécurité et la souveraineté sanitaire de l'Afrique.","date":"2026-06-30"},
{"title":"Bilan alarmant : 1 068 cas confirmés de maladie à virus Bundibugyo au 21 juin 2026","url":"https://khub.africacdc.org/health-topics/surveillance","content":"Selon le rapport de situation n°35 publié le 22 juin 2026 par l'Africa CDC, l'épidémie de maladie à virus Bundibugyo (BVD) en RDC et en Ouganda a atteint un total cumulé de 1 068 cas confirmés, 269 décès confirmés et 126 guérisons, avec 8 433 contacts actuellement sous suivi. Le taux de létalité combiné s'établit à environ 25,2 %. L'épidémie reste concentrée dans la province de l'Ituri en RDC, avec une transmission croissante observée dans les provinces du Nord-Kivu et du Sud-Kivu, ainsi que des cas importés et locaux dans le district de Kampala en Ouganda. L'Africa CDC, via son Unité de surveillance épidémiologique, coordonne activement la réponse et appelle à une intensification des efforts de traçage des contacts et de gestion des cas.","date":"2026-06-30"},
{"title":"Épidémie d'Ebola : Africa CDC publie une directive sur les restrictions de voyage","url":"https://khub.africacdc.org/records/resource/interim-guidance-on-blanket-travel-restrictions-following-the-bundibugyo-ebola-virus-disease-outbreak","content":"L'Africa CDC a publié le 8 juin 2026 une directive intérimaire sur les restrictions générales de voyage en réponse à l'épidémie de maladie à virus Ebola de Bundibugyo, qui sévit actuellement en République démocratique du Congo (RDC) et en Ouganda. Ce document scientifique souligne que les interdictions de voyage généralisées ne sont pas étayées par des preuves scientifiques et peuvent s'avérer contre-productives pour le contrôle de l'épidémie, tout en nuisant à la sécurité sanitaire nationale et mondiale. L'Africa CDC appelle les États membres à adopter des mesures ciblées et proportionnées, fondées sur les données probantes, afin de protéger les populations sans entraver les flux essentiels d'aide humanitaire et de personnel de santé.","date":"2026-06-30"},
{"title":"WHO and Africa CDC Declare the 2026 Ebola Outbreak a Public Health Emergency","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"The Africa Centres for Disease Control and Prevention (Africa CDC) and the World Health Organization have officially declared the 2026 Bundibugyo Virus Disease (BVD) outbreak a Public Health Emergency. The declaration follows a series of situation reports documenting the rapid spread of the haemorrhagic fever across the Democratic Republic of Congo and Uganda. As of June 21, 2026, the outbreak continues to pose significant public health challenges, with multiple provinces affected. Africa CDC has been issuing regular situational reports — including reports dated June 16, 18, and 21, 2026 — to keep health authorities and the international community informed. The declaration underscores the critical need for accelerated containment measures, community engagement, and cross-border coordination among affected and at-risk countries.","date":"2026-06-29"},
{"title":"Africa CDC : Le Pandemic Fund débloque 220 millions de dollars pour la riposte au virus Bundibugyo","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"L'Africa CDC a salué l'annonce d'un financement d'urgence de 220,6 millions de dollars accordé par le Pandemic Fund pour soutenir la réponse à l'épidémie de maladie à virus Bundibugyo (MVB) en République Démocratique du Congo et en Ouganda. Ce soutien financier majeur intervient dans un contexte d'aggravation de la situation épidémique, comme en témoignent les rapports de situation successifs publiés tout au long du mois de juin 2026. Par ailleurs, une Réunion de Haut Niveau Présidentiel des Chefs d'État africains s'est tenue le 16 juin 2026, présidée par S.E. Évariste Ndayishimiye, Président du Burundi, pour coordonner la réponse collective à cette crise sanitaire continentale.","date":"2026-06-29"},
{"title":"Africa CDC & WHO : Conférence de presse en direct sur la maladie à virus Bundibugyo","url":"https://www.linkedin.com/posts/africacdc_live-press-briefing-africa-cdc-who-activity-7468634707191177216-KA8i","content":"Le 5 juin 2026, l'Africa CDC et l'Organisation mondiale de la santé (OMS) ont organisé une conférence de presse en direct pour présenter le Plan continental de préparation et de riposte à la maladie à virus Bundibugyo (MVB). Ce cadre de référence vise à coordonner la préparation et la réponse à cette fièvre hémorragique mortelle dans tous les États membres de l'Union africaine. Face au potentiel de propagation transfrontalière et internationale du virus Bundibugyo, les deux institutions ont appelé les professionnels de santé, les décideurs politiques et les chercheurs à renforcer la surveillance communautaire, à pratiquer une bonne hygiène et à signaler rapidement tout cas suspect. Ce briefing illustre l'engagement d'Africa CDC à placer les communautés au cœur de la gestion épidémique.","date":"2026-06-29"},
],
"african-medical-agency":[
{"title":"OMS et AMA signent un accord-cadre historique pour renforcer l'accès aux médicaments de qualité en Afrique","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"Le 21 mai 2026, l'Organisation mondiale de la Santé (OMS) et l'Agence Africaine des Médicaments (AMA) ont signé un Accord-cadre de coopération majeur destiné à renforcer les systèmes réglementaires africains et à améliorer l'accès aux médicaments sûrs et de qualité sur l'ensemble du continent. Ce partenariat structuré cible quatre axes prioritaires : l'harmonisation et la convergence réglementaires entre les États membres, la lutte contre les médicaments sous-standard et falsifiés, le renforcement des capacités réglementaires et de la main-d'œuvre pharmaceutique, et le soutien à l'innovation et à la production locale lors des urgences de santé publique. Cet accord positionne l'AMA, opérationnelle depuis 2023, comme un interlocuteur continental de premier plan auprès des grandes agences réglementaires mondiales et marque une avancée décisive dans la souveraineté sanitaire de l'Afrique. La signature a eu lieu en marge de l'Assemblée mondiale de la Santé, soulignant la reconnaissance internationale de l'AMA comme institution clé de l'architecture sanitaire africaine.","date":"2026-05-21"},
{"title":"AMA et EMA renforcent leur coopération réglementaire lors d'une visite de haut niveau à Amsterdam","url":"https://techreviewafrica.com/news/6104/african-medicines-agency-enhances-regulatory-cooperation-with-european-medicines-agency","content":"Du 22 au 26 juin 2026, une délégation de haut niveau de l'Agence Africaine des Médicaments (AMA) s'est rendue au siège de l'Agence Européenne des Médicaments (EMA) à Amsterdam, dans le cadre du renforcement en cours des partenariats entre les deux agences continentales de régulation pharmaceutique. Cette visite fait suite à l'engagement scientifique conjoint AMA-EMA de juin 2026 pour soutenir les essais cliniques et les contre-mesures médicales face à l'épidémie d'Ebola Bundibugyo. Les échanges ont porté sur la coopération technique, le partage de connaissances et l'apprentissage mutuel, avec un accent particulier sur l'harmonisation des procédures d'évaluation et d'homologation des médicaments pour réduire les délais d'accès aux nouvelles thérapies sur le continent africain. Cette collaboration illustre la reconnaissance croissante de l'AMA comme partenaire institutionnel majeur dans l'architecture réglementaire pharmaceutique mondiale.","date":"2026-06-26"},
{"title":"L'AMA et la Pharmacopée américaine (USP) formalisent un accord pour renforcer la qualité pharmaceutique à travers l'Afrique","url":"https://www.cleanroomtechnology.com/african-medicines-agency-and-usp-sign-agreement-to","content":"Le 29 avril 2026 à Johannesburg, l'Agence Africaine des Médicaments (AMA) et la Pharmacopée des États-Unis (USP) ont signé un mémorandum d'entente visant à renforcer la réglementation des médicaments, les systèmes d'assurance qualité et les infrastructures de fabrication pharmaceutique à travers le continent africain. Le partenariat prévoit une coopération dans les domaines des normes de qualité, de la formation des inspecteurs pharmaceutiques et du développement de laboratoires de contrôle conformes aux standards internationaux. Cette collaboration revêt une importance particulière dans le contexte des ambitions africaines de production locale de vaccins et de médicaments essentiels, où le respect de normes de qualité rigoureuses est un prérequis indispensable pour obtenir la préqualification de l'OMS et accéder aux marchés internationaux. L'accord AMA-USP s'inscrit dans la dynamique de partenariats multiples que l'AMA tisse rapidement depuis son opérationnalisation, incluant aussi des accords avec l'EMA et l'OMS.","date":"2026-04-29"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
],
"manufacture-vaccins":[
{"title":"EVA Pharma et ses partenaires européens lancent la première plateforme mRNA 'digital-to-biologics' d'Afrique pour 100 millions de doses par an","url":"https://onlinelibrary.wiley.com/doi/full/10.1002/hsr2.71926","content":"Un consortium formé par EVA Pharma (Égypte) et trois biotechs européennes — DNA Script (France), Quantoom Biosciences (Belgique) et Unizima (Belgique) — a lancé la première plateforme africaine de production d'ARNm de bout en bout dite 'digital-to-biologics', une technologie capable de produire jusqu'à 100 millions de doses de vaccins mRNA par an. Ce système intègre la conception numérique des séquences génétiques jusqu'à la fabrication physique du vaccin final, réduisant drastiquement les délais de production en cas d'urgence sanitaire et permettant une adaptation rapide aux nouveaux agents pathogènes. Cette initiative représente un saut technologique majeur pour l'industrie pharmaceutique africaine, qui cherche à s'affranchir de sa dépendance aux importations de vaccins — lesquelles représentaient plus de 90% des doses utilisées sur le continent avant la pandémie de COVID-19. La plateforme pourrait jouer un rôle clé dans la réponse aux futures épidémies, notamment en permettant le développement accéléré de vaccins contre des pathogènes émergents comme le virus Bundibugyo.","date":"2026-06-01"},
{"title":"Africa CDC et Aspen Pharmacare en pourparlers avancés pour mettre fin à la dépendance vaccinale de l'Afrique","url":"https://africacdc.org/news-item/africa-cdc-and-aspen-advance-long-term-vaccine-supply-partnership-for-africa/","content":"Annoncé le 12 mai 2026 lors du sommet Africa Forward à Nairobi, le partenariat entre l'Africa CDC et Aspen Pharmacare — le plus grand fabricant de médicaments génériques du continent africain — représente un tournant stratégique dans la fabrication de vaccins en Afrique. Aspen dispose d'infrastructures de fabrication stérile de classe mondiale en Afrique du Sud (Port Elizabeth) ayant nécessité un investissement de près de 10 milliards de rands (540 millions USD). Le cadre d'alignement offre-demande envisagé explorera des mécanismes de mutualisation de la demande via la Plateforme africaine de procurement groupé (APPM) et des dispositifs de partage des risques financiers pour garantir la viabilité économique de la production locale. Africa CDC et Aspen prévoient d'étendre progressivement la collaboration à une gamme élargie d'antigènes prioritaires, notamment pour les vaccins contre la méningite, la fièvre jaune et les maladies tropicales négligées.","date":"2026-05-12"},
{"title":"African Vaccine Manufacturing Accelerator (AVMA) : 1,2 milliard de dollars engagés sur 10 ans pour transformer la production continentale de vaccins","url":"https://healthpolicy-watch.news/landmark-vaccine-deals-signal-africas-shift-toward-local-manufacturing/","content":"L'African Vaccine Manufacturing Accelerator (AVMA), mécanisme de financement innovant soutenu par des donateurs mondiaux et des institutions de financement du développement, prévoit de mobiliser jusqu'à 1,2 milliard de dollars sur une décennie pour transformer le paysage de la fabrication vaccinale en Afrique. Le continent a enregistré plus de 3,5 milliards de dollars d'engagements combinés de donateurs internationaux, qui soutiennent notamment les six fabricants africains ayant achevé la construction de leurs installations et en cours de transfert de technologie actif, parmi lesquels Atlantic Lifesciences au Ghana. L'AVMA cible la viabilité économique des producteurs africains en comblant l'écart de compétitivité par rapport aux fournisseurs asiatiques établis, via des mécanismes de garanties de marché et de primes à la fabrication locale. Onze vaccins africains couvrant huit antigènes — rougeole-rubéole, rotavirus, fièvre jaune notamment — sont attendus sur le marché continental dans les cinq prochaines années.","date":"2026-06-15"},
{"title":"Fabrication de vaccins contre Ebola : l'Afrique face à l'urgence industrielle","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"Face à l'escalade de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, la question de la capacité de fabrication locale de vaccins et de thérapeutiques contre les filovirus revient avec acuité sur l'agenda continental. Le rapport épidémiologique hebdomadaire de l'Africa CDC souligne que l'absence de vaccins homologués contre le virus Bundibugyo constitue l'un des principaux obstacles à la réponse. Des discussions sont en cours entre l'Africa CDC, l'OMS et plusieurs fabricants pharmaceutiques pour accélérer le développement et la production à grande échelle de vaccins candidats, notamment dans le cadre du mécanisme CEPI (Coalition pour les innovations en matière de préparation aux épidémies). L'accent est également mis sur la nécessité de développer des capacités de fabrication vaccinale sur le continent africain afin de réduire la dépendance aux approvisionnements extérieurs lors de futures urgences sanitaires.","date":"2026-06-30"},
{"title":"Épidémie de Bundibugyo : l'absence de vaccin approuvé met en lumière l'urgence de développer des capacités de fabrication africaines","url":"https://www.cdc.gov/mmwr/volumes/75/wr/pdfs/mm7522e2-H.pdf","content":"Le rapport d'évaluation des risques publié par les CDC américains souligne un fait préoccupant : il n'existe à ce jour aucun vaccin ni médicament approuvé contre la maladie à virus Bundibugyo (BVD). Alors que l'épidémie en cours en RDC et en Ouganda a déjà dépassé les 378 cas confirmés et 63 décès au 2 juin 2026, cette lacune met en évidence l'urgence criante de développer des capacités de recherche, de développement et de fabrication de vaccins sur le continent africain. Des efforts de préparation sont en cours aux États-Unis, mais la communauté internationale appelle à une mobilisation sans précédent pour accélérer le développement de contre-mesures médicales adaptées à cette souche du virus Ebola, notamment dans le cadre des initiatives de fabrication locale portées par l'Africa CDC.","date":"2026-06-28"},
{"title":"Le cadre PAVM de l'Africa CDC pour accélérer la fabrication de vaccins en Afrique","url":"https://khub.africacdc.org/records/resource/bundibugyo-ebola-virus-disease-bvd-interim-guidance-on-blanket-travel-restrictions-and-public-gatherings","content":"Dans le contexte de l'épidémie de Bundibugyo et de l'urgence sanitaire qui secoue le continent, l'Africa CDC rappelle l'importance stratégique du cadre d'action des Partenariats pour la Fabrication Africaine de Vaccins (PAVM). Ce document de référence, élaboré pour accélérer la production locale de vaccins en Afrique, prend une résonance particulière alors que le continent fait face à une épidémie pour laquelle aucun vaccin ni médicament approuvé n'existe pour le virus Bundibugyo. Le PAVM vise à réduire la dépendance de l'Afrique aux chaînes d'approvisionnement mondiales en vaccins en développant des capacités de fabrication continentales, un objectif jugé critique par les experts de santé publique pour faire face aux crises sanitaires futures.","date":"2026-06-28"},
{"title":"Africa CDC Knowledge Hub Highlights Manufacturing Readiness Amid Ebola Bundibugyo Outbreak","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"As the Bundibugyo Virus Disease outbreak intensifies across the DRC and Uganda, the Africa CDC and WHO continental preparedness and response plan for June-November 2026 places renewed emphasis on the urgent need for local vaccine and medical countermeasure manufacturing capacity on the African continent. The plan underscores that reliance on external supply chains for vaccines and therapeutics has hampered rapid response in the early weeks of the outbreak. Strengthening African-based manufacturing infrastructure is identified as a strategic priority to ensure faster deployment of investigational vaccines and treatments in future outbreaks. Ongoing procurement efforts and partnerships with international manufacturers are being coordinated to fast-track the availability of candidate vaccines being evaluated for use against the Bundibugyo Ebola strain.","date":"2026-06-27"},
],
"unicef-gavi":[
{"title":"UNICEF et Gavi lancent un appel mondial aux fabricants pour accélérer l'accès aux vaccins contre le virus Bundibugyo Ebola","url":"https://www.gavi.org/news/media-room/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"En juin 2026, UNICEF et Gavi ont lancé conjointement un Appel à Manifestation d'Intérêt (AMI) auprès des fabricants pharmaceutiques mondiaux pour accélérer le développement et l'accès à un vaccin contre la maladie à virus Bundibugyo Ebola, dans le contexte de l'épidémie dévastatrice qui frappe la République Démocratique du Congo et l'Ouganda. Gavi a annoncé un engagement de 40 millions USD pour soutenir cet accès vaccinal accéléré, en s'appuyant sur ses mécanismes existants de garanties de marché et de financement anticipé destinés à inciter les fabricants à investir dans des vaccins pour des maladies à impact africain. UNICEF mobilise en parallèle sa chaîne logistique mondiale pour préparer le déploiement rapide des doses dès qu'un candidat vaccin aura obtenu une autorisation d'utilisation d'urgence de l'OMS. Cet appel conjoint constitue la première initiative formelle des deux organisations pour structurer la demande et le financement d'un vaccin contre ce variant spécifique du virus Ebola, qui ne dispose d'aucun vaccin homologué à ce jour.","date":"2026-06-20"},
{"title":"Gavi 6.0 (2026–2030) : vacciner 500 millions d'enfants supplémentaires et sauver 8 à 9 millions de vies dans les cinq prochaines années","url":"https://www.gavi.org/our-alliance/strategy/phase-6-2026-2030","content":"Gavi, l'Alliance du Vaccin, a officiellement lancé sa sixième période stratégique (Gavi 6.0) couvrant 2026 à 2030, avec l'ambition de vacciner plus de 500 millions d'enfants et d'adolescents supplémentaires et de sauver 8 à 9 millions de vies, dont 1,5 million grâce au seul vaccin contre les papillomavirus humains (HPV). La stratégie Gavi 6.0 met un accent particulier sur le renforcement de la sécurité de l'approvisionnement en vaccins pour l'Afrique, avec une contribution substantielle à l'African Vaccine Manufacturing Accelerator (AVMA) pour soutenir la production vaccinale locale. Face aux pressions budgétaires mondiales, Gavi alerte toutefois sur un déficit de financement de près de 30% pour le programme de vaccin antipaludique, qui vise à atteindre 50 millions d'enfants en Afrique subsaharienne d'ici 2030. Par rapport aux périodes précédentes, Gavi 6.0 élargit son soutien à la vaccination des adolescents, en particulier les jeunes filles pour la vaccination HPV dans les pays à faible revenu.","date":"2026-06-01"},
{"title":"Plus de 100 millions d'enfants rattrapés : la plus grande initiative mondiale de rattrapage vaccinal de l'histoire enregistre un succès historique","url":"https://www.unicef.org/esa/press-releases/largest-catch-initiative-delivers-over-100-million-childhood-vaccinations","content":"L'OMS, l'UNICEF et leurs partenaires ont annoncé le 24 avril 2026 que la plus grande initiative de rattrapage vaccinal de l'histoire avait permis d'administrer plus de 100 millions de vaccinations pédiatriques à des enfants préalablement non ou sous-vaccinés dans les pays à revenu faible et intermédiaire. Cette campagne mondiale sans précédent cible prioritairement les enfants dont la vaccination a été interrompue par la pandémie de COVID-19, les conflits armés et les crises humanitaires, et couvre notamment les vaccins contre la rougeole, la poliomyélite, le tétanos, la diphtérie et la coqueluche. Malgré ce succès historique, l'OMS et l'UNICEF rappellent que plus de 14 millions d'enfants à travers le monde n'ont toujours reçu aucun vaccin au cours de leur première année de vie, soulignant la nécessité de poursuivre et d'intensifier les efforts d'immunisation. La couverture mondiale pour la première dose du vaccin antirougeoleux stagne à environ 83%, bien en deçà du seuil de 95% nécessaire pour prévenir les épidémies.","date":"2026-04-24"},
{"title":"Gavi et UNICEF mobilisés face à l'épidémie de virus Bundibugyo en Afrique centrale","url":"https://khub.africacdc.org/records/resource/africa-cdc-ebola-outbreaks-in-drc-and-uganda-weekly-brief-28th-may-2026","content":"Note : En l'absence de résultats de recherche spécifiques à UNICEF/Gavi dans les sources disponibles aujourd'hui, cet article s'appuie sur le contexte humanitaire le plus proche. Face à l'escalade de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, des partenaires internationaux tels que UNICEF et Gavi sont attendus en première ligne pour soutenir la vaccination des populations à risque et la chaîne d'approvisionnement en produits de santé essentiels. Le bulletin hebdomadaire d'Africa CDC du 28 mai 2026 souligne l'ampleur des besoins humanitaires dans les zones affectées, où l'accès aux soins reste limité. UNICEF et Gavi, à travers leurs mécanismes d'achat groupé et de déploiement rapide, jouent un rôle clé dans la réponse vaccinale d'urgence sur le continent africain.","date":"2026-06-29"},
{"title":"UNICEF and Gavi Mobilize Support for Ebola Bundibugyo Vaccine Response in DRC and Uganda","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"As the Bundibugyo Virus Disease outbreak continues to escalate in the DRC and Uganda, UNICEF and Gavi are mobilizing resources and logistical support to facilitate the deployment of investigational vaccines and to strengthen immunization infrastructure in affected regions. UNICEF is coordinating cold chain logistics and community engagement efforts, particularly targeting vulnerable populations including children and women. Gavi, the Vaccine Alliance, is working with partners to ensure equitable access to any approved or emergency-use vaccines as they become available. Both organizations are also supporting surveillance and risk communication campaigns to improve uptake of health interventions in communities affected by the outbreak, where vaccine hesitancy and misinformation remain significant barriers.","date":"2026-06-27"},
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
],
"sante-maroc":[
{"title":"Maroc : le budget santé 2026 atteint un record de 42,4 milliards de dirhams, en hausse de 30% par rapport à 2025","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le budget du ministère de la Santé et de la Protection sociale du Maroc a atteint un niveau record de 42,4 milliards de dirhams en 2026, soit une augmentation historique de 9,8 milliards de dirhams (+30%) par rapport à l'exercice 2025. Cette enveloppe consacre 16,4 milliards de dirhams aux dépenses de personnel, avec la création de 8 000 nouveaux postes budgétaires dans le secteur de la santé publique, mesure destinée à combler le déficit chronique en ressources humaines médicales et paramédicales particulièrement criant dans les zones rurales et montagneuses. Le budget finance également la construction de nouveaux centres hospitaliers universitaires (CHU) — toutes les régions du Maroc, à l'exception de Dakhla-Oued Eddahab, disposeront de leur propre CHU d'ici fin 2027 — ainsi que la mise à niveau et rénovation de 90 hôpitaux existants. Cette augmentation traduit l'ambition royale de faire du secteur de la santé un levier central du développement socio-économique du Royaume, dans le cadre de la généralisation de la protection sociale voulue par Sa Majesté le Roi Mohammed VI.","date":"2026-01-15"},
{"title":"Groupements Sanitaires Territoriaux (GST) : le Maroc accélère le déploiement de la nouvelle architecture de son système de santé en 2026","url":"https://vitavox.ma/2026/01/28/les-groupements-sanitaires-territoriaux-gst-la-nouvelle-architecture-de-la-sante-marocaine-decryptee/","content":"Les Groupements Sanitaires Territoriaux (GST), pierre angulaire de la réforme du système de santé marocain portée par la loi-cadre 06-22, entrent en 2026 dans une phase d'accélération du déploiement à l'échelle nationale, après l'opérationnalisation pilote réussie du GST de la région Tanger-Tétouan-Al Hoceima en octobre 2025. Ces nouvelles entités de gouvernance sanitaire décentralisées intègrent les différents niveaux de soins — primaires, secondaires et tertiaires — sous une direction régionale unifiée, afin de réduire les disparités territoriales et d'améliorer l'accès aux soins dans les zones rurales et montagneuses. Au Parlement, le ministre de la Santé a défendu les GST comme un pivot de la régionalisation du système de soins, soulignant leur capacité à optimiser la gestion des ressources humaines, des infrastructures et des équipements médicaux à l'échelle régionale. La généralisation progressive des GST à toutes les régions du Royaume constitue l'un des chantiers structurants de la réforme sociale engagée sous la Vision Royale pour l'horizon 2030.","date":"2026-01-28"},
{"title":"Maroc : 20 nouveaux établissements de santé et plus de 3 000 lits hospitaliers supplémentaires attendus d'ici fin 2026","url":"https://www.yabiladi.com/articles/details/185348/maroc-nouveaux-etablissements-sante-soit","content":"Le gouvernement marocain a annoncé la mise en service de 20 nouveaux établissements de santé représentant plus de 3 000 lits hospitaliers supplémentaires d'ici la fin de l'année 2026, dans le cadre de l'effort d'investissement massif consenti pour moderniser l'infrastructure sanitaire nationale. Ces nouvelles infrastructures s'inscrivent dans le programme de mise à niveau de 90 hôpitaux existants et de construction de CHU dans les régions qui en sont encore dépourvues, parallèlement à l'opérationnalisation des Groupements Sanitaires Territoriaux (GST) dans l'ensemble du Royaume. La pénurie de ressources humaines médicales demeure le défi structurel le plus pressant, particulièrement dans les zones éloignées et montagneuses, où les 8 000 nouveaux postes créés en 2026 devront être prioritairement affectés. La généralisation de la feuille de soins électronique et la digitalisation des dossiers médicaux patients figurent également parmi les priorités de la modernisation du système de santé marocain en 2026.","date":"2026-03-01"},
{"title":"Santé au Maroc : veille sur les maladies à potentiel épidémique en lien avec la crise Ebola continentale","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3791780709509","content":"Note : Aucun résultat de recherche spécifique au système de santé marocain n'est disponible dans les sources de ce jour. Dans le contexte de la déclaration d'urgence sanitaire liée à l'épidémie d'Ebola Bundibugyo en Afrique centrale, le Maroc, en tant que hub régional de santé publique et membre actif de l'Union africaine, renforce sa veille épidémiologique. Le Royaume suit de près l'évolution de la situation en RDC et en Ouganda, en coordination avec l'OMS et Africa CDC, afin de mettre à jour ses protocoles de surveillance aux points d'entrée et de préparer ses équipes médicales à une éventuelle gestion de cas importés sur son territoire.","date":"2026-06-29"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
],
"vaccins-monde":[
{"title":"WHO PDVAC 2026 : le comité consultatif mondial de développement vaccinal se réunit à Genève les 7-9 juillet pour prioriser les pathogènes émergents","url":"https://www.who.int/news-room/events/detail/2026/07/06/default-calendar/2026-who-product-development-for-vaccines-advisory-committee-meeting-(pdvac)","content":"L'OMS organise les 7, 8 et 9 juillet 2026 à Genève la réunion annuelle du Comité consultatif pour le Développement de Produits Vaccinaux (PDVAC), instance d'expertise scientifique indépendante chargée de conseiller l'OMS sur les stratégies de développement de vaccins contre les pathogènes prioritaires à l'échelle mondiale. La réunion publique des 7 et 8 juillet réunira des experts internationaux pour examiner les avancées en matière de vaccins candidats contre des maladies négligées et émergentes, tandis que la session fermée du 9 juillet permettra de délibérer sur les priorités de financement et d'orientation de la recherche. Dans le contexte de l'épidémie de virus Bundibugyo en Afrique centrale — pour lequel aucun vaccin homologué n'existe — la question du développement accéléré de vaccins contre les souches négligées de fièvres hémorragiques virales devrait occuper une place centrale dans les discussions. Le PDVAC joue un rôle déterminant dans l'orientation des investissements mondiaux en R&D vaccinale et dans la définition des préférences de produits (Target Product Profiles) pour les vaccins de demain.","date":"2026-07-01"},
{"title":"L'OMS relance la vaccination préventive contre le choléra après le rétablissement de stocks mondiaux à un niveau critique","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'Organisation mondiale de la Santé a annoncé le 4 février 2026 la reprise des campagnes de vaccination préventive contre le choléra, après une période de suspension liée à une pénurie critique du vaccin oral contre le choléra (VOC) qui avait contraint les autorités sanitaires mondiales à rationner les doses disponibles aux seules situations d'épidémie active depuis 2022. Le retour à la vaccination préventive représente une avancée majeure dans la lutte contre cette maladie diarrhéique mortelle qui touche chaque année des millions de personnes, en particulier en Afrique subsaharienne, en Asie du Sud et dans des zones affectées par des crises humanitaires. L'augmentation des stocks mondiaux résulte d'investissements dans l'extension des capacités de production du vaccin oral bivalent, notamment par EuBiologics (Corée du Sud) et d'autres fabricants partenaires. La reprise de la vaccination préventive permettra désormais de protéger les populations vivant dans des zones à risque endémique avant que des flambées épidémiques ne surviennent, réduisant ainsi la charge mondiale de morbidité et de mortalité due au choléra.","date":"2026-02-04"},
{"title":"14 millions d'enfants sans aucun vaccin : la couverture vaccinale mondiale stagne à 83% pour la rougeole, loin du seuil de protection collective","url":"https://www.unicef.org/press-releases/global-childhood-vaccination-holds-steady-yet-over-14-million-infants-remain","content":"Selon les dernières estimations conjointes OMS-UNICEF publiées en 2026, plus de 14 millions d'enfants dans le monde n'ont reçu aucun vaccin au cours de leur première année de vie, malgré les progrès de la couverture vaccinale mondiale depuis la pandémie de COVID-19. La couverture mondiale pour la première dose du vaccin antirougeoleux reste bloquée à environ 83%, bien en deçà du seuil de 95% nécessaire pour prévenir les épidémies, laissant quelque 35 millions d'enfants sans protection complète contre cette maladie évitable et potentiellement mortelle. Ces chiffres soulignent l'importance critique des programmes de rattrapage vaccinal et des investissements durables dans les systèmes de santé de base, notamment pour rejoindre les enfants des communautés les plus marginalisées ou vivant dans des zones de conflits armés. L'OMS et l'UNICEF appellent à une mobilisation renforcée des gouvernements et des donateurs pour maintenir les acquis de l'immunisation mondiale et combler les lacunes persistantes dans les pays à revenu faible et intermédiaire, où se concentrent l'essentiel des enfants zéro dose.","date":"2026-06-15"},
{"title":"OMS et partenaires : la course aux vaccins contre le virus Bundibugyo s'intensifie","url":"https://www.youtube.com/watch?v=f7_MV__2HxI","content":"Lors du briefing spécial de l'Africa CDC du 11 juin 2026, le Dr Kaseya et les experts de l'équipe de soutien à la gestion des incidents (IMST) ont mis en lumière l'urgence d'accélérer la recherche et le développement de vaccins contre le virus Bundibugyo, pour lequel il n'existe à ce jour aucun vaccin homologué. L'OMS, en collaboration avec Africa CDC et des organisations de santé animale, travaille sur une approche « One Health » pour identifier les réservoirs animaux du virus, information cruciale pour le développement de candidats vaccins efficaces. Des essais cliniques en mode accéléré sont envisagés dans les zones affectées, sous réserve de l'obtention des autorisations réglementaires nécessaires. La communauté scientifique internationale est appelée à intensifier ses efforts de recherche vaccinale face à ce que l'Africa CDC qualifie de potentiellement pire épidémie d'Ebola jamais enregistrée sur le continent.","date":"2026-06-30"},
{"title":"Ebola Bundibugyo : l'OMS et Africa CDC accélèrent le déploiement du plan de réponse vaccinale continental","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'OMS et l'Africa CDC ont annoncé le 5 juin 2026 un plan de réponse conjoint à l'épidémie d'Ebola Bundibugyo qui sévit en République Démocratique du Congo et en Ouganda. Ce plan continental couvre la période de juin à novembre 2026 et prévoit notamment des stratégies de vaccination d'urgence, de surveillance épidémiologique renforcée et de mobilisation communautaire. La déclaration d'urgence de santé publique liée à cette flambée de fièvre hémorragique mortelle confère à l'initiative une dimension mondiale, compte tenu du potentiel de propagation internationale du virus. Les experts appellent à intensifier la recherche sur les vaccins candidats contre le virus Bundibugyo afin de disposer d'outils préventifs efficaces avant la prochaine saison épidémique.","date":"2026-06-29"},
{"title":"Africa CDC Weekly Briefing : surveillance épidémique et immunisation au cœur de l'agenda de sécurité sanitaire africaine","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors de son briefing spécial du 30 avril 2026 consacré à l'avancement de l'agenda de Sécurité et Souveraineté Sanitaire de l'Afrique (AHSS), Africa CDC a mis en lumière les efforts de renforcement des capacités de laboratoire régionaux, essentiels pour la surveillance des maladies infectieuses et la réponse vaccinale rapide. Le Directeur Général d'Africa CDC a notamment annoncé la signature d'un accord historique avec le gouvernement kenyan, qui alloue 10 acres de terrain et 2 millions de dollars pour le Centre de Coordination Régional de l'Afrique de l'Est à Nairobi. Ces infrastructures régionales sont cruciales pour coordonner les campagnes de vaccination d'urgence et le suivi épidémiologique à l'échelle continentale.","date":"2026-06-24"},
{"title":"Ebola Bundibugyo : l'absence de vaccins met en lumière l'urgence d'investir dans la R&D vaccinale mondiale","url":"https://www.cdc.gov/media/releases/2026/update-on-ebola-outbreak-in-the-democratic-republic-of-the-congo-and-uganda-6-5-2026.html","content":"L'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda expose une lacune critique : aucun vaccin ni traitement spécifique n'est disponible contre ce variant. Contrairement à l'Ebola Zaïre, pour lequel des vaccins homologués existent, le variant Bundibugyo reste sans réponse vaccinale validée. Les autorités sanitaires mondiales, dont le CDC américain et l'OMS, appellent à accélérer la recherche et le développement de vaccins contre les souches négligées du virus Ebola, soulignant que la prévention vaccinale demeure l'outil le plus efficace contre de futures flambées.","date":"2026-06-22"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
