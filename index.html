var articlesData={
"african-cdc":[
{"title":"Africa CDC renforce le contrôle sanitaire aux points d'entrée : appel urgent aux États membres de l'UA","url":"https://www.globalsecurity.org/security/library/news/2026/06/sec-260610-africacdc02.htm","content":"Face à la progression de l'épidémie de maladie à virus Bundibugyo (MVB) en RDC et en Ouganda, l'Africa CDC a exhorté les États membres de l'Union africaine à renforcer immédiatement les mesures de dépistage à la sortie et les dispositifs de santé publique dans les aéroports, ports maritimes et principaux postes frontières terrestres. Le Directeur général de l'Africa CDC, le Dr Jean Kaseya, a appelé à une action coordonnée et fondée sur des données scientifiques pour détecter les cas potentiels le plus tôt possible, tout en maintenant la fluidité des voyages, du commerce et des opérations humanitaires. Cette mesure vise à prévenir toute diffusion internationale du virus, dont le taux de létalité provisoire dépasse 25 %. L'Africa CDC rappelle que la surveillance aux points d'entrée constitue un pilier essentiel du Règlement Sanitaire International et un outil clé pour protéger les populations des pays non encore touchés.","date":"2026-06-10"},
{"title":"Africa CDC Weekly Brief 8-14 juin 2026 : coordination régionale et surveillance épidémique renforcées","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-8-14-june-2026/","content":"Le bulletin hebdomadaire de l'Africa CDC pour la période du 8 au 14 juin 2026 dresse un bilan complet des activités de surveillance, de coordination et d'intervention menées à l'échelle du continent. Ce rapport couvre les développements de la réponse à l'épidémie de maladie à virus Bundibugyo (BVD) — qui comptait alors plus de 500 cas confirmés —, les activités de renforcement des capacités de laboratoire dans les pays voisins et les réunions de coordination avec les partenaires opérationnels, dont l'OMS, l'UNICEF et les CDC nationaux. L'Africa CDC fait également le point sur le déploiement des équipes d'intervention rapide et les formations dispensées aux agents de santé de première ligne dans les zones affectées. Ce bulletin hebdomadaire illustre l'engagement de l'institution en faveur de la transparence et de la communication régulière avec les États membres dans la gestion des crises sanitaires.","date":"2026-06-14"},
{"title":"Africa CDC Epidemic Intelligence Weekly Report Juin 2026 : veille multi-maladies sur le continent","url":"https://africacdc.org/download/africa-cdc-epidemic-intelligence-weekly-report-june-2026/","content":"L'Africa CDC a publié son rapport de renseignement épidémiologique pour juin 2026, offrant une vue d'ensemble de l'activité des maladies prioritaires à travers le continent africain. Au-delà de la crise d'Ebola Bundibugyo qui domine l'actualité, le rapport suit l'évolution d'autres menaces, notamment la méningite, la fièvre de Lassa, la dengue et la variole du singe dans différentes sous-régions. Ce suivi systématique illustre le rôle central de l'Africa CDC dans la détection précoce des flambées et la coordination des alertes sanitaires à l'échelle continentale. Le rapport s'appuie sur les données des systèmes de surveillance nationaux des États membres et intègre les signaux des partenaires opérationnels, dont l'OMS et les réseaux de laboratoires régionaux.","date":"2026-06-20"},
{"title":"Maladie à virus Bundibugyo : 1 068 cas confirmés selon le dernier rapport de l'Africa CDC","url":"https://khub.africacdc.org/health-topics/surveillance","content":"Selon le rapport de situation n°35 publié le 22 juin 2026, l'épidémie de Maladie à Virus Bundibugyo (MVB) en RDC et en Ouganda continue de présenter des défis majeurs pour la santé publique africaine. Le bilan combiné s'élève désormais à 1 068 cas confirmés, 269 décès confirmés et 126 guérisons, avec 8 433 contacts actuellement sous suivi. Le taux de létalité provisoire est estimé à 25,2 %. L'Africa CDC souligne la persistance de la transmission communautaire en RDC, notamment dans la province de l'Ituri qui concentre plus de 91 % des cas, tandis que la situation en Ouganda montre des signes de stabilisation relative. Des défis opérationnels et socioculturels — dont la désinformation, les fuites de cas et les pénuries de ressources — continuent d'entraver la réponse.","date":"2026-06-26"},
{"title":"Africa CDC : l'Afrique du Sud engage 2,5 millions USD pour la riposte Ebola en RDC et en Ouganda","url":"https://dirco.gov.za/africa-cdc-strengthens-the-capacity-and-capability-of-africas-public-health-institutions-as-well-as-partnerships-to-detect-and-respond-quickly-and-effectively-to-disease-threats-and-outbreaks","content":"Addis-Abeba, 20 mai 2026 – L'Africa CDC a salué l'engagement du gouvernement sud-africain de contribuer 2,5 millions USD au Fonds africain contre les épidémies (Africa Epidemics Fund), destiné à soutenir la réponse à l'épidémie d'Ebola en cours en RDC et en Ouganda. Cette annonce illustre la volonté de l'institution panafricaine de renforcer les capacités des systèmes de santé publique du continent, notamment en matière de surveillance épidémiologique, de détection précoce et de riposte rapide aux menaces sanitaires. L'Africa CDC réaffirme ainsi son rôle central dans la coordination des interventions basées sur des données probantes pour protéger la santé des populations africaines.","date":"2026-06-26"},
{"title":"Africa CDC : l'épidémie d'Ebola en RDC pourrait devenir la pire de l'histoire","url":"https://www.democracynow.org/2026/6/17/headlines/africa_cdc_warns_ebola_outbreak_in_drc_could_become_worst_on_record","content":"L'Africa Centres for Disease Control and Prevention (Africa CDC) tire la sonnette d'alarme : l'épidémie d'Ebola en République Démocratique du Congo (RDC) pourrait devenir la plus meurtrière jamais enregistrée dans l'histoire. Le nombre de cas confirmés a atteint 837, tandis que le bilan officiel des décès avoisine les 200. Face à cette progression alarmante, l'Africa CDC appelle à une mobilisation financière urgente afin d'intensifier le traçage des contacts et de stopper la propagation du virus. Sans ressources supplémentaires, les autorités sanitaires craignent une extension incontrôlable de l'épidémie au-delà des zones déjà touchées.","date":"2026-06-26"},
{"title":"Rapport de situation BVD du 1er juin 2026 : 332 cas confirmés, 14,8 % de létalité en RDC et Ouganda","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-june-1-2026","content":"Au 1er juin 2026, l'épidémie de maladie à virus Bundibugyo (BVD) avait engendré 332 cas confirmés et 49 décès confirmés, soit un taux de létalité de 14,8 %. On dénombrait par ailleurs 321 cas suspects, dont 101 personnes en isolement, et 259 décès parmi les cas suspects. L'épidémie touchait 23 zones de santé en République Démocratique du Congo ainsi qu'un district en Ouganda. Le rapport de l'Africa CDC met en évidence plusieurs défis majeurs : une faible capacité de suivi des contacts, une résistance communautaire sur le terrain, des contraintes logistiques dans le transport des échantillons vers les laboratoires de référence, et le retard dans le déploiement des équipes de réponse rapide multidisciplinaires dans certaines zones à haut risque comme Mongbwalu et Aru.","date":"2026-06-25"},
{"title":"Africa CDC & OMS lancent le Plan Continental de Préparation et de Réponse à Ebola : 518 millions de dollars mobilisés","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"Le 5 juin 2026, l'Africa CDC et l'Organisation mondiale de la Santé (OMS) ont officiellement lancé le Plan Continental de Préparation et de Réponse à la maladie à virus Bundibugyo (BVD). Articulé autour du principe « Un Plan, Un Budget, Une Équipe », ce plan couvre la période de juin à novembre 2026 et est chiffré à 518 millions de dollars, assorti d'un mécanisme conjoint de suivi financier pour garantir la transparence. Ses piliers opérationnels comprennent la coordination des urgences, les tests de laboratoire, la surveillance épidémiologique, la prévention des infections, les soins cliniques et l'engagement communautaire. Le Directeur général de l'Africa CDC a souligné que ce plan offre au continent une feuille de route claire pour agir avec rapidité et unité, protéger les communautés affectées et soutenir les pays voisins.","date":"2026-06-25"},
{"title":"Ebola Bundibugyo : plus de 910 millions de dollars pledgés, mais moins de 90 millions décaissés","url":"https://x.com/AfricaCDC/status/2067940466104926516","content":"Lors de son briefing médiatique hebdomadaire du 18 juin 2026, l'Africa CDC a révélé une réalité alarmante : si plus de 910 millions de dollars ont été annoncés lors de la réunion des chefs d'État et de gouvernement africains consacrée à l'épidémie de maladie à virus Ebola Bundibugyo, moins de 90 millions ont effectivement été décaissés à ce jour. Ce gouffre entre les engagements et les fonds réellement disponibles soulève de vives inquiétudes quant à la capacité des équipes de riposte à maintenir leurs opérations sur le terrain en RDC et en Ouganda. L'Africa CDC appelle à une accélération urgente des transferts financiers pour soutenir la surveillance épidémiologique, la prise en charge clinique et l'engagement communautaire.","date":"2026-06-25"},
],
"african-medical-agency":[
{"title":"OMS et Agence Africaine des Médicaments : cadre de collaboration historique pour renforcer l'accès aux produits de santé","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"Le 21 mai 2026, l'OMS et l'Agence Africaine des Médicaments (AMA) ont signé un accord-cadre de collaboration qui marque une étape décisive dans le renforcement des systèmes réglementaires et l'amélioration de l'accès aux produits de santé sûrs, efficaces et de qualité garantie sur l'ensemble du continent africain. L'accord définit des priorités sur les 3 à 5 prochaines années avec des délais et résultats mesurables pour renforcer les capacités réglementaires aux niveaux national, régional et continental. Il vise notamment à harmoniser les procédures d'autorisation de mise sur le marché, à développer des formations pour les régulateurs africains et à renforcer les contrôles qualité des médicaments. Ce partenariat stratégique s'inscrit dans l'objectif de réduire la dépendance de l'Afrique envers les importations de médicaments et de positionner l'AMA comme acteur réglementaire crédible à l'échelle mondiale.","date":"2026-05-21"},
{"title":"L'AMA et la FDA américaine signent un accord de coopération réglementaire pour améliorer la sécurité des médicaments en Afrique","url":"https://techreviewafrica.com/news/5987/african-medicines-agency-and-us-fda-sign-cooperation-agreement","content":"L'Agence Africaine des Médicaments (AMA) et la Food and Drug Administration (FDA) des États-Unis ont signé une Déclaration de coopération établissant un cadre formel de collaboration réglementaire entre les deux institutions. Cet accord vise à renforcer les échanges d'informations et l'harmonisation de la supervision des produits médicaux entre l'Afrique et les États-Unis, en s'appuyant sur des approches scientifiques pour améliorer la sécurité, la qualité et l'efficacité des médicaments sur le marché africain. Il ouvre la voie à des programmes conjoints d'inspection, d'évaluation et de surveillance post-commercialisation qui bénéficieront directement aux patients africains. Pour l'AMA, encore en phase d'opérationnalisation, cet accord avec la FDA renforce sa crédibilité internationale et facilite l'accès aux médicaments de qualité sur le continent.","date":"2026-06-15"},
{"title":"L'AMA et l'USP formalisent un partenariat pour renforcer les normes de qualité pharmaceutique en Afrique","url":"https://www.cleanroomtechnology.com/african-medicines-agency-and-usp-sign-agreement-to","content":"L'Agence Africaine des Médicaments (AMA) et la Pharmacopée des États-Unis (USP) ont signé un mémorandum d'entente le 29 avril 2026 à Johannesburg, visant à renforcer la réglementation des médicaments, l'assurance qualité et les systèmes de fabrication pharmaceutique à travers l'Afrique. L'USP, organisation de référence mondiale en matière de normes qualité, apportera son expertise technique pour développer des standards harmonisés de contrôle qualité applicables aux fabricants pharmaceutiques africains. Ce partenariat s'inscrit dans la phase d'expansion (2026-2030) de l'AMA et vise à doter le continent des outils pour garantir que les médicaments produits localement répondent aux normes internationales de sécurité et d'efficacité. À terme, cette collaboration facilitera la préqualification OMS des médicaments africains et réduira la présence de produits de qualité inférieure ou falsifiés sur les marchés du continent.","date":"2026-04-29"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
{"title":"L'Agence Africaine du Médicament : un pilier en construction pour la souveraineté sanitaire du continent","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Alors que l'Afrique renforce ses institutions de santé publique face aux épidémies récurrentes, l'Agence Africaine du Médicament (AMA) demeure un chantier stratégique prioritaire de l'Union Africaine. En parallèle des efforts déployés par Africa CDC pour contenir l'épidémie d'Ebola en RDC et en Ouganda, l'AMA travaille à l'harmonisation des cadres réglementaires du médicament à l'échelle continentale. Son rôle est crucial pour garantir l'accès à des médicaments et vaccins de qualité, en particulier lors des situations d'urgence sanitaire. Les experts appellent à une accélération de l'opérationnalisation complète de l'AMA, afin que l'Afrique puisse disposer d'un organe de régulation pharmaceutique indépendant et pleinement fonctionnel avant la prochaine grande crise sanitaire.","date":"2026-06-07"},
],
"manufacture-vaccins":[
{"title":"Two Landmark Vaccine Deals Signal Africa's Shift Toward Local mRNA Manufacturing With $1.2 Billion Investment","url":"https://healthpolicy-watch.news/landmark-vaccine-deals-signal-africas-shift-toward-local-manufacturing/","content":"Two landmark agreements backed by a combined US$1.2 billion investment from Gavi mark a turning point in Africa's move toward sovereign vaccine manufacturing. The deals involve EVA Pharma in Egypt and leading European biotech firms, aiming to establish Africa's first end-to-end mRNA vaccine production platform capable of producing up to 100 million doses annually. Analysts highlight five recurring challenges that must be overcome: regulatory delays, uncertain market demand, slow financing disbursement, technology transfer bottlenecks, and persistent workforce gaps. If realised, these platforms could transform Africa — which currently produces less than 1% of the vaccines it consumes — into a meaningful contributor to global vaccine supply. International experts stress that success requires sustained political commitment, regulatory harmonisation, and advance purchase commitments to give manufacturers the confidence to scale up production.","date":"2026-06-20"},
{"title":"Gavi lance AVMA+ : 189 millions de dollars pour renforcer l'écosystème de fabrication vaccinale africain","url":"https://www.devex.com/news/inside-gavi-s-189-million-plan-to-boost-africa-s-vaccine-ecosystem-112721","content":"Gavi, l'Alliance du Vaccin, soumet à son Conseil d'administration l'approbation d'AVMA+, un programme doté de 189 millions de dollars destiné à stimuler l'écosystème de fabrication vaccinale africain. Ce plan vise à renforcer le réseau réglementaire pharmaceutique du continent, à simplifier les achats gouvernementaux de vaccins fabriqués localement et à garantir des ventes directes pour jusqu'à 70 millions de doses produites en Afrique. Huit vaccins des fabricants Biovac et Aspen Pharmacare (Afrique du Sud) et de l'Institut Pasteur de Dakar (Sénégal) sont attendus à la préqualification OMS d'ici 2030, couvrant la fièvre jaune, la rougeole, le choléra, le rotavirus et la poliomyélite. Ce plan est jugé essentiel pour atteindre l'objectif de l'Union africaine de produire 60 % des vaccins nécessaires au continent à l'horizon 2040.","date":"2026-06-18"},
{"title":"African Vaccine Manufacturing Supply Landscape 2026: Progress Made, Structural Challenges Remain","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"A new report by the Clinton Health Access Initiative (CHAI) maps Africa's vaccine manufacturing landscape in 2026, identifying both significant advances and persistent bottlenecks. Eleven African-made vaccines covering eight antigens — including measles-rubella, rotavirus, and yellow fever — are expected to reach the continental market within five years, primarily from South Africa, Senegal, Algeria, Egypt, and Ethiopia. However, Africa's drug substance manufacturing capacity remains critically limited and well below the targets set by the Partnership for African Vaccine Manufacturing (PAVM). Five structural challenges — regulatory delays, uncertain demand signals, slow financing, technology transfer delays, and workforce shortages — have already pushed back timelines for several near-to-market manufacturers. CHAI recommends coordinated action by Gavi, AVMA, and national governments to establish advance purchase commitments that give manufacturers the confidence to scale up production.","date":"2026-06-12"},
{"title":"Plan de réponse Ebola 2026 : un appel à investir dans la fabrication locale de contre-mesures médicales en Afrique","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"La déclaration de l'épidémie de maladie à virus Ebola Bundibugyo comme urgence de santé publique par l'OMS et l'Africa CDC en 2026 met en exergue les insuffisances persistantes dans la chaîne de fabrication et d'approvisionnement en produits médicaux sur le continent. Avec 332 cas confirmés et un taux de létalité de 14,8 % au début du mois de juin, l'absence de vaccin et la pénurie de traitements spécifiques soulignent l'urgence d'investir dans des capacités de fabrication pharmaceutique locales. Les experts appellent à une mobilisation accrue des industriels africains et internationaux pour développer, produire et distribuer des vaccins candidats contre les souches d'Ebola non couvertes, et pour renforcer les plateformes de biofabrication continentales afin de réduire la dépendance aux importations en période de crise.","date":"2026-06-25"},
{"title":"Urgence Ebola Bundibugyo : l'absence de vaccin homologué relance le débat sur la production vaccinale africaine","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'épidémie de maladie à virus Bundibugyo qui frappe la République Démocratique du Congo et l'Ouganda depuis plusieurs semaines met en lumière une réalité critique : il n'existe à ce jour aucun vaccin homologué contre cette souche spécifique du virus Ebola. Contrairement à la souche Zaïre, pour laquelle des vaccins ont été développés et déployés avec succès, la souche Bundibugyo demeure sans solution vaccinale disponible à grande échelle. Cette situation relance avec acuité le débat sur la nécessité d'accélérer les capacités de recherche, développement et fabrication de vaccins sur le continent africain. Le plan conjoint Africa CDC-OMS, doté de 518 millions de dollars, inclut des volets dédiés au développement de contre-mesures médicales, pressant les fabricants et les bailleurs de fonds à investir dans la production locale de vaccins adaptés aux pathogènes prioritaires africains.","date":"2026-06-25"},
{"title":"2026 Ebola Outbreak Highlights Urgent Need for Vaccine Manufacturing Against Bundibugyo Strain","url":"https://www.infectioncontroltoday.com/view/2026-ebola-outbreak-spreads-central-africa-who-warns-growing-crisis-amid-cdc-usaid-cuts","content":"The 2026 Ebola outbreak, caused by the Bundibugyo strain currently affecting the Democratic Republic of Congo and Uganda, has exposed a critical gap in the global vaccine manufacturing landscape: there is currently no approved vaccine or treatment specifically targeting this strain. With over 513 cases and more than 130 suspected deaths reported, health experts are urgently calling for accelerated research and manufacturing investment dedicated to Bundibugyo virus disease. The drastic reduction of USAID funding — by 90% — and the US withdrawal from WHO have further hampered the mobilization of resources needed to fast-track vaccine development. Global health stakeholders warn that without dedicated manufacturing pipelines for neglected hemorrhagic fever strains, the world will continue to be caught unprepared when novel or rare Ebola variants emerge.","date":"2026-06-23"},
],
"unicef-gavi":[
{"title":"UNICEF et Gavi lancent un appel aux fabricants pour accélérer l'accès aux vaccins contre le virus Ebola Bundibugyo","url":"https://www.unicef.org/press-releases/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"Le 24 juin 2026, l'UNICEF et Gavi, l'Alliance du Vaccin, ont lancé conjointement un Appel à Manifestation d'Intérêt (AMI) pour recenser les fabricants et développeurs disposant de plans pour produire un vaccin contre la maladie à virus Ebola Bundibugyo, qui frappe la RDC et l'Ouganda avec plus de 1 000 cas confirmés. Cette démarche s'appuie sur l'engagement de Gavi de 40 millions de dollars pour soutenir un accès accéléré aux vaccins et vise à orienter ce financement vers la mise à l'échelle industrielle et la livraison rapide de doses. Une attention particulière sera accordée aux propositions prévoyant une production basée en Afrique, en cohérence avec les objectifs de souveraineté vaccinale du continent. Il s'agit de la première initiative formelle de cette ampleur pour mobiliser l'industrie pharmaceutique mondiale face à une souche d'Ebola jusque-là dépourvue de vaccin homologué.","date":"2026-06-24"},
{"title":"Gavi s'engage à hauteur de 50 millions USD pour les vaccins contre le virus Ebola Bundibugyo et la riposte à l'épidémie","url":"https://www.gavi.org/news/media-room/gavi-commits-us-50-million-bundibugyo-ebolavirus-vaccines-and-outbreak-response","content":"Gavi, l'Alliance du Vaccin, a annoncé un engagement financier de 50 millions de dollars pour soutenir à la fois le développement de vaccins contre le virus Ebola Bundibugyo et la réponse opérationnelle à l'épidémie en RDC et en Ouganda. Sur cette enveloppe, 40 millions de dollars ciblent spécifiquement l'accélération de l'accès aux vaccins candidats, tandis que les fonds restants renforcent les activités de riposte sur le terrain : traçage des contacts, équipements de protection individuelle et soutien aux systèmes de santé locaux. Gavi, grâce à sa capacité à mobiliser des mécanismes d'achat groupé et d'avance sur commande, joue un rôle clé pour inciter les fabricants à investir dans la production d'un vaccin contre une souche jusque-là jugée peu rentable commercialement. Cet engagement illustre le rôle croissant de Gavi comme levier financier pour accélérer la réponse vaccinale aux maladies émergentes dans les pays à revenus faibles et intermédiaires.","date":"2026-06-22"},
{"title":"Les systèmes vaccinaux africains progressent contre le cancer et le paludisme, mais les pressions budgétaires s'intensifient","url":"https://www.gavi.org/news/media-room/africas-routine-vaccine-systems-deliver-gains-against-cancer-and-malaria-funding","content":"Un bilan publié par Gavi signale des avancées significatives des programmes de vaccination de routine africains dans deux domaines : la lutte contre le cancer du col de l'utérus grâce aux vaccins HPV, et la prévention du paludisme, avec plus de 52 millions de doses de vaccin antipaludéen administrées depuis 2023 dans des zones parmi les plus difficiles du monde. Ces résultats témoignent de la résilience des programmes d'immunisation africains, même dans les contextes de fragilité. Cependant, Gavi avertit que les pressions budgétaires s'intensifient : la réduction drastique du financement américain, notamment de l'USAID, pourrait compromettre la pérennité de ces programmes dans les années à venir. L'Alliance appelle les gouvernements donateurs à combler le déficit de financement pour protéger les acquis en matière d'immunisation et prévenir une recrudescence des maladies évitables par la vaccination.","date":"2026-06-20"},
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
{"title":"Gavi et UNICEF Mobilisés face à la Crise Ebola en Afrique Centrale : Enjeux de Vaccination et d'Accès aux Soins","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-con","content":"Face à la propagation de l'épidémie de maladie à virus Bundibugyo en République Démocratique du Congo et en Ouganda, Gavi (l'Alliance du Vaccin) et l'UNICEF sont appelés à intensifier leur soutien logistique et financier pour garantir l'accès aux outils de santé publique dans les zones affectées. Bien qu'aucun vaccin homologué ne soit disponible contre la souche Bundibugyo, les deux organisations jouent un rôle clé dans la chaîne d'approvisionnement en matériels de protection, en soutien aux campagnes de sensibilisation communautaire et en renforcement des systèmes de santé locaux. L'UNICEF assure également la protection des enfants et des familles vulnérables dans les foyers épidémiques, en coordination avec les autorités nationales et Africa CDC. Ces interventions s'inscrivent dans le cadre du plan continental de préparation et de réponse doté de 518 millions de dollars lancé conjointement par Africa CDC et l'OMS.","date":"2026-06-23"},
{"title":"Gavi et UNICEF intensifient leur soutien à la vaccination en zones de conflit face aux crises sanitaires émergentes","url":"https://cphia.africacdc.org","content":"À l'occasion de la 5e Conférence Internationale sur la Santé Publique en Afrique (CPHIA 2026) prévue à Addis-Abeba, Gavi et l'UNICEF figurent parmi les partenaires clés appelés à présenter leurs stratégies de vaccination dans les zones de fragilité. L'événement, qui réunit chefs d'État, ministres et chercheurs, offre une plateforme pour renforcer les synergies entre agences onusiennes et institutions africaines dans la lutte contre les maladies évitables par la vaccination.","date":"2026-06-22"},
],
"sante-maroc":[
{"title":"Maroc : budget santé 2026 en hausse de 30 % à 42,4 milliards de dirhams et création de 8 000 nouveaux postes","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le projet de loi de finances 2026 prévoit une augmentation historique du budget du ministère de la Santé et de la Protection sociale du Maroc, qui atteint 42,4 milliards de dirhams, soit une hausse de 30 % par rapport à l'exercice précédent. Cette progression s'accompagne de la création de 8 000 nouveaux postes budgétaires au sein du ministère, mesure destinée à rendre le secteur hospitalier plus attractif et à réduire la pénurie de ressources humaines médicales et paramédicales. Sur ce budget, 16,4 milliards de dirhams sont alloués aux dépenses de personnel, reflétant la priorité accordée à la revalorisation des conditions de travail dans le secteur public. Cette enveloppe record s'inscrit dans la vision royale de réforme du système de santé national, dont l'objectif est de garantir un accès universel et équitable aux soins pour l'ensemble de la population marocaine.","date":"2026-06-10"},
{"title":"Réforme du système de santé marocain 2026 : nouveaux CHU, modernisation de 90 hôpitaux et déploiement de la feuille de soins électronique","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"L'année 2026 marque une accélération décisive de la réforme du système national de santé au Maroc, avec plusieurs chantiers lancés simultanément : construction de nouveaux centres hospitaliers universitaires (CHU), mise à niveau de 90 hôpitaux existants, opérationnalisation progressive des groupements sanitaires territoriaux (GST) et généralisation de la feuille de soins électronique. Ces réformes visent à améliorer l'accessibilité et la qualité des soins, tout en renforçant l'efficience du système hospitalier public. Les experts soulignent cependant des résistances internes de certains corps médicaux et syndicats, ainsi que des défis opérationnels considérables liés à la gestion du changement et au financement des infrastructures. Le succès de ces transformations est conditionné par une mobilisation cohérente des ressources humaines, budgétaires et technologiques dans un contexte de forte pression démographique.","date":"2026-06-08"},
{"title":"PLF 2026 au Maroc : la santé change d'échelle avec une impulsion budgétaire pour un système plus équitable","url":"https://fnh.ma/article/actualite-financiere-maroc/plf-2026-sante-systeme","content":"Le projet de loi de finances (PLF) 2026 du Maroc consacre la santé comme priorité nationale, avec une allocation budgétaire record destinée à accélérer la mise en œuvre de la réforme du système de santé. Les principales mesures incluent l'extension de la couverture médicale de base (AMO), le renforcement du réseau de soins primaires dans les zones rurales et l'accélération du déploiement des groupements sanitaires territoriaux pour rationaliser l'offre de soins au niveau régional. Le gouvernement mise sur ces investissements pour réduire les inégalités d'accès entre milieux urbains et ruraux, défi structurel persistant du système de santé marocain. Les associations de patients et les professionnels de santé saluent l'effort budgétaire, tout en insistant sur la nécessité d'une mise en œuvre rapide et transparente pour que les citoyens en ressentent concrètement les effets.","date":"2026-05-15"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},
],
"vaccins-monde":[
{"title":"La plus grande initiative mondiale de rattrapage vaccinal administre plus de 100 millions de vaccinations infantiles","url":"https://www.who.int/news/item/24-04-2026-largest-catch-up-initiative-delivers-over-100-million-childhood-vaccinations","content":"L'OMS a annoncé en avril 2026 que la plus grande initiative de rattrapage vaccinal jamais lancée a permis d'administrer plus de 100 millions de vaccinations infantiles, ciblant les enfants qui avaient manqué leurs vaccins de routine pendant et après la pandémie de COVID-19. Coordonnée par l'OMS, l'UNICEF et Gavi, cette campagne a mobilisé des ressources sans précédent dans des pays à revenus faibles d'Afrique, d'Asie du Sud et d'Amérique latine, couvrant des maladies comme la rougeole, la diphtérie, la coqueluche, le tétanos et la poliomyélite. Malgré ce succès historique, l'OMS avertit que des millions d'enfants restent non vaccinés dans les zones de conflit et de fragilité, et que le maintien du financement international est indispensable pour éviter un retour en arrière. La réduction des contributions américaines à la santé mondiale est présentée comme l'une des principales menaces pesant sur la pérennité de ces efforts.","date":"2026-04-24"},
{"title":"L'OMS met à jour ses recommandations COVID-19 et alerte sur des retards vaccinaux dans près de 100 pays","url":"https://polygonhealthanalytics.com/vaccine-news-may-27-june-03-2026-2026-06-03-13-40-31/","content":"En mai-juin 2026, l'OMS a recommandé l'antigène monovalent LP.8.1 comme composition la plus récente pour les vaccins COVID-19, précisant que la vaccination ne doit pas être retardée dans l'attente de cette composition — les anciens antigènes de la lignée JN.1 restant des alternatives valables. En mars 2026, le Groupe consultatif stratégique d'experts (SAGE) de l'OMS avait mis à jour ses recommandations pour intégrer la vaccination de routine contre le COVID-19 pour les populations à haut risque, notamment les personnes âgées et les immunodéprimés. Simultanément, l'OMS tire la sonnette d'alarme sur des retards de vaccination des enfants dans près de 100 pays, résultant des perturbations des chaînes d'approvisionnement, des coupes budgétaires et des conflits armés. Cette double actualité illustre un paradoxe de la santé mondiale en 2026 : des avancées technologiques majeures coexistent avec des inégalités d'accès persistantes qui menacent des décennies de progrès en immunisation.","date":"2026-06-03"},
{"title":"La vaccination préventive contre le choléra reprend après une pénurie mondiale historique de vaccins oraux","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'OMS a annoncé en février 2026 la reprise de la vaccination préventive contre le choléra, après une période de pénurie mondiale critique qui avait contraint les autorités à rationner les doses uniquement pour les zones en situation d'urgence active. L'approvisionnement en vaccin anticholérique oral a atteint un seuil permettant de rétablir les campagnes préventives dans les pays endémiques d'Afrique, d'Asie et d'Haïti — qui concentrent l'essentiel des 400 000 à 4 millions de cas annuels estimés. Le choléra cause entre 21 000 et 143 000 décès chaque année selon l'OMS. Cette reprise représente une victoire pour la santé publique mondiale, les partenaires — dont Gavi, l'UNICEF et les gouvernements donateurs — ayant investi massivement pour augmenter les capacités de production du vaccin Shanchol, principal vaccin oral anticholérique préqualifié par l'OMS.","date":"2026-02-04"},
{"title":"Africa CDC Weekly Briefing : surveillance épidémique et immunisation au cœur de l'agenda de sécurité sanitaire africaine","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors de son briefing spécial du 30 avril 2026 consacré à l'avancement de l'agenda de Sécurité et Souveraineté Sanitaire de l'Afrique (AHSS), Africa CDC a mis en lumière les efforts de renforcement des capacités de laboratoire régionaux, essentiels pour la surveillance des maladies infectieuses et la réponse vaccinale rapide. Le Directeur Général d'Africa CDC a notamment annoncé la signature d'un accord historique avec le gouvernement kenyan, qui alloue 10 acres de terrain et 2 millions de dollars pour le Centre de Coordination Régional de l'Afrique de l'Est à Nairobi. Ces infrastructures régionales sont cruciales pour coordonner les campagnes de vaccination d'urgence et le suivi épidémiologique à l'échelle continentale.","date":"2026-06-24"},
{"title":"Ebola Bundibugyo : l'absence de vaccins met en lumière l'urgence d'investir dans la R&D vaccinale mondiale","url":"https://www.cdc.gov/media/releases/2026/update-on-ebola-outbreak-in-the-democratic-republic-of-the-congo-and-uganda-6-5-2026.html","content":"L'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda expose une lacune critique : aucun vaccin ni traitement spécifique n'est disponible contre ce variant. Contrairement à l'Ebola Zaïre, pour lequel des vaccins homologués existent, le variant Bundibugyo reste sans réponse vaccinale validée. Les autorités sanitaires mondiales, dont le CDC américain et l'OMS, appellent à accélérer la recherche et le développement de vaccins contre les souches négligées du virus Ebola, soulignant que la prévention vaccinale demeure l'outil le plus efficace contre de futures flambées.","date":"2026-06-22"},
{"title":"Briefing OMS Afrique : la riposte vaccinale contre Ebola Bundibugyo au centre des discussions","url":"https://www.youtube.com/watch?v=Gp9tFTr5a9Y","content":"Lors du briefing presse virtuel de l'OMS Afrique du 4 juin 2026, les experts ont fait le point sur la stratégie de riposte à l'épidémie de maladie à virus Ebola de type Bundibugyo en RDC et en Ouganda. Les discussions ont notamment porté sur les outils de prévention disponibles, les protocoles de vaccination d'urgence et les défis du traçage des contacts dans les zones affectées. L'OMS a souligné l'importance du déploiement rapide des équipes de réponse et la nécessité de renforcer les capacités locales de gestion des épidémies. Les intervenants ont également évoqué les cas importés en Ouganda et les mesures de quarantaine mises en place, saluant la capacité des autorités ougandaises à détecter et isoler rapidement les cas suspects grâce aux protocoles de surveillance renforcés.","date":"2026-06-17"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
