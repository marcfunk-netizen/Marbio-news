var articlesData={
"african-cdc":[
{"title":"Africa CDC et OMS lancent le plan continental « One Response » : 518 millions $ pour contenir l'épidémie Ebola Bundibugyo","url":"https://www.who.int/news/item/05-06-2026-africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"Le 5 juin 2026, Africa CDC et l'OMS ont officiellement lancé le plan conjoint continental de préparation et de riposte à l'épidémie d'Ebola Bundibugyo, intitulé « One Response ». Ce plan de six mois (juin à novembre 2026) vise à mobiliser 518 millions de dollars pour soutenir 47 pays africains dans la détection rapide et la riposte à l'épidémie. Réunissant gouvernements, partenaires internationaux et communautés locales sous une approche unifiée, il couvre le renforcement de la surveillance épidémiologique, l'acheminement de contre-mesures médicales et la mobilisation communautaire. L'initiative intervient alors que l'épidémie comptait déjà plus de 837 cas confirmés et 196 décès, faisant craindre un scénario comparable à la crise ouest-africaine de 2014-2016 qui avait causé plus de 11 000 morts.","date":"2026-06-05"},
{"title":"Africa CDC renforce les contrôles sanitaires aux frontières : appel urgent aux 55 États membres de l'UA","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-8-14-june-2026/","content":"Dans son bulletin hebdomadaire du 8 au 14 juin 2026, Africa CDC a officiellement demandé à l'ensemble des 55 États membres de l'Union Africaine de renforcer immédiatement leurs procédures de contrôle sanitaire aux aéroports, ports maritimes et principaux postes-frontières terrestres, afin de réduire le risque de propagation transfrontalière du virus Ebola Bundibugyo. Le bulletin fait état du déploiement de laboratoires mobiles aux points d'entrée stratégiques, du renforcement du traçage des contacts et de la distribution de matériels de protection individuelle aux soignants. Avec près de 95 % des voyageurs désormais contrôlés aux points de sortie de la RDC, Africa CDC salue les progrès accomplis tout en maintenant le plus haut niveau de vigilance aux frontières continentales.","date":"2026-06-14"},
{"title":"Africa CDC Epidemic Intelligence Weekly Report juin 2026 : 46 pays en surveillance génomique active","url":"https://africacdc.org/download/africa-cdc-epidemic-intelligence-weekly-report-june-2026/","content":"Le rapport hebdomadaire de renseignement épidémiologique d'Africa CDC de juin 2026 témoigne des progrès remarquables réalisés dans le renforcement des capacités de surveillance continentale. Pas moins de 46 pays africains sont désormais dotés de capacités de génomique des pathogènes — contre seulement 7 en 2020 —, permettant une détection précoce des agents pathogènes émergents. Outre l'épidémie d'Ebola Bundibugyo en RDC et en Ouganda, le rapport fait état de la surveillance active de flambées de mpox, de méningite et d'autres maladies à potentiel épidémique dans plusieurs États membres. Africa CDC appelle l'ensemble des pays à partager leurs données épidémiologiques en temps réel pour alimenter une riposte continentale coordonnée.","date":"2026-06-21"},
{"title":"Africa CDC Youth Programme: Forming the Next Generation of Public Health Leaders","url":"https://youth.africacdc.org","content":"Africa CDC's Youth Programme continues to invest in young public health leaders across the African continent. In March 2026, the institution announced its 2026 cohort of Young Digital Health Champions through the Youth Digital Health Network (YiDHN), a strategic initiative of Africa CDC's Youth Division. The programme, guided by the YES! Health Strategy (2025–2028), aims to meaningfully include African youth aged 15–35 — who represent over 65% of the continent's population — in health governance, emergency response, and digital health innovation. Testimonials from participants highlight transformative journeys from academic training to continental impact. Africa CDC reaffirms that empowering youth is central to achieving long-term health security and sovereignty across Africa.","date":"2026-06-21"},
{"title":"Bundibugyo Virus Disease : Africa CDC publie son rapport de situation du 12 juin 2026","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-june-12-2026","content":"Le rapport de situation publié par Africa CDC en date du 12 juin 2026 dresse un tableau préoccupant de l'épidémie de la maladie à virus Bundibugyo (BVD) qui frappe principalement la province de l'Ituri en République Démocratique du Congo, avec des cas confirmés également signalés en Ouganda. La transmission communautaire active persiste et la situation évolue quotidiennement. Africa CDC, en collaboration avec les autorités sanitaires nationales, a activé des mécanismes de réponse multi-niveaux incluant des centres opérationnels d'urgence, des laboratoires mobiles déployés aux points frontaliers clés, ainsi qu'un suivi renforcé des contacts. Plus de 956 échantillons ont été testés, avec un taux de positivité de 1,9 % en Ouganda. Des fermetures temporaires de frontières ont été instaurées pour limiter les voyages non essentiels, tandis que la coordination transfrontalière entre la RDC et l'Ouganda demeure une priorité absolue.","date":"2026-06-21"},
{"title":"Ebola Outbreak: Africa CDC Holds Special Briefing on DRC and Uganda Response","url":"https://www.youtube.com/watch?v=-bq8j4R2NyU","content":"Africa CDC held a special live briefing on June 18, 2026, providing the latest updates on the Ebola (Bundibugyo Virus Disease) outbreak response across the Democratic Republic of Congo and Uganda. During the briefing, officials highlighted key measures including exit and entry screening at border points, with nearly 95% of travelers screened at DRC ports of exit. Africa CDC also announced the launch of a fellowship program targeting around 40 fellows from member states, who will receive hands-on training in public health emergency management embedded within Africa CDC's Emergency Operation Center. The briefing underscored the institution's commitment to the Africa Health Security and Sovereignty (AHSS) Agenda, strengthening prevention, preparedness, detection, and response systems across the continent.","date":"2026-06-21"},
{"title":"Rapport de situation du 2 juin 2026 : l'Africa CDC détaille les défis de la riposte à l'épidémie de virus Bundibugyo","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-june-22026","content":"Dans son 16e rapport de situation daté du 2 juin 2026, l'Africa CDC dresse un bilan détaillé de l'épidémie de maladie à virus Bundibugyo (BVD) en cours en RDC et en Ouganda. Le rapport met en lumière plusieurs obstacles majeurs : la résistance des communautés au traçage des contacts, notamment dans les zones de santé de Nizi et Bunia, ainsi que des pénuries de réactifs et un manque de machines de diagnostic qui ralentissent les analyses de laboratoire. Le 1er juin 2026, 76 échantillons ont été testés avec un taux de positivité de 30,3 %. Sur le plan international, l'Africa CDC coordonne la réponse avec l'OMS et d'autres partenaires, en déployant des équipes sur le terrain et en facilitant la distribution de contre-mesures médicales essentielles, notamment un don significatif du gouvernement indien.","date":"2026-06-20"},
{"title":"Flambée épidémique en Afrique centrale : l'Africa CDC face à une crise sans précédent malgré des ressources insuffisantes","url":"https://www.infectioncontroltoday.com/view/2026-ebola-outbreak-spreads-central-africa-who-warns-growing-crisis-amid-cdc-usaid-cuts","content":"L'épidémie d'Ebola de 2026 s'est étendue à deux pays d'Afrique centrale — la République démocratique du Congo et l'Ouganda — poussant l'OMS à déclarer une urgence sanitaire mondiale. L'Africa CDC et l'OMS ont conjointement mobilisé 2,5 millions de dollars pour coordonner la réponse, mais les experts s'accordent à dire que ces fonds restent très insuffisants face à l'ampleur de la crise. La situation est aggravée par la réduction de 90 % des financements de l'USAID américain et le retrait des États-Unis de l'OMS, ce qui fragilise considérablement les capacités de riposte mondiale. Plus de 513 cas et 130 décès suspects liés à la souche Bundibugyo, pour laquelle il n'existe à ce jour ni vaccin ni traitement approuvé, ont été recensés.","date":"2026-06-20"},
{"title":"Africa CDC : l'épidémie d'Ebola en RDC pourrait devenir la pire de l'histoire","url":"https://www.democracynow.org/2026/6/17/headlines/africa_cdc_warns_ebola_outbreak_in_drc_could_become_worst_on_record","content":"L'Africa Centres for Disease Control and Prevention (Africa CDC) tire la sonnette d'alarme : l'épidémie d'Ebola qui sévit en République démocratique du Congo (RDC) pourrait devenir la plus meurtrière jamais enregistrée. Le nombre de cas confirmés a atteint 837, tandis que le bilan officiel des décès avoisine les 200. Face à cette progression alarmante, l'Africa CDC souligne l'urgence de mobiliser davantage de ressources financières pour renforcer le traçage des contacts et endiguer la propagation du virus. L'institution continentale appelle la communauté internationale à une réponse solidaire et immédiate.","date":"2026-06-20"},
],
"african-medical-agency":[
{"title":"OMS et AMA signent un accord-cadre historique pour renforcer l'accès aux médicaments de qualité en Afrique","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"Le 21 mai 2026, l'OMS et l'Agence Africaine du Médicament (AMA) ont signé un accord-cadre de collaboration qualifié d'historique, visant à accélérer l'accès à des produits de santé sûrs, efficaces et de qualité garantie sur l'ensemble du continent africain. Cet accord couvre cinq axes stratégiques : l'harmonisation réglementaire entre États membres, la lutte contre les médicaments falsifiés et sous-standard, le renforcement des capacités réglementaires nationales, le soutien à la production locale, et la préparation aux urgences sanitaires. Signé en marge de la 79e Assemblée mondiale de la Santé, il représente un tournant dans la coopération réglementaire mondiale et renforce la crédibilité internationale de l'AMA, qui entre dans sa phase d'Expansion (2026-2030).","date":"2026-05-21"},
{"title":"AMA et FDA américaine signent un accord de coopération réglementaire depuis le bureau de liaison AMALO à Kigali","url":"https://techreviewafrica.com/news/5987/african-medicines-agency-and-us-fda-sign-cooperation-agreement","content":"L'Agence Africaine du Médicament (AMA) et la Food and Drug Administration (FDA) américaine ont signé en juin 2026 un accord de coopération formel, adossé à la création du FDA African Medicines Agency Liaison Office (AMALO) à l'ambassade américaine de Kigali, au Rwanda. Cet accord vise à améliorer la sécurité, la qualité et l'efficacité des produits médicaux distribués en Afrique, grâce à des approches réglementaires fondées sur la science et au partage d'expertise entre les deux institutions. Il facilitera l'évaluation accélérée des dossiers de médicaments et vaccins prioritaires pour les populations africaines, en capitalisant sur les ressources techniques de la FDA et sur le réseau croissant de régulateurs nationaux africains coordonnés par l'AMA.","date":"2026-06-09"},
{"title":"L'AMA entre dans sa phase d'Expansion 2026-2030 avec une multiplication des coopérations réglementaires internationales","url":"https://www.frontiersin.org/journals/medicine/articles/10.3389/fmed.2026.1763261/full","content":"Selon une analyse publiée dans Frontiers in Medicine en 2026, l'Agence Africaine du Médicament (AMA) est pleinement engagée dans sa phase d'Expansion (2026-2030), après une phase fondatrice de deux ans (2024-2025). Cette nouvelle phase se caractérise par la signature d'accords de coopération avec des partenaires majeurs — OMS, FDA américaine, USP, EMA — et par l'accélération du processus d'harmonisation réglementaire entre les 55 États membres de l'Union Africaine. L'AMA ambitionne de devenir le pilier central de la régulation pharmaceutique continentale, réduisant la dépendance de l'Afrique vis-à-vis des agences étrangères et facilitant l'accès rapide à des médicaments et vaccins de qualité. La pleine maturité de l'agence est prévue à l'horizon 2031.","date":"2026-05-15"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
{"title":"L'Agence Africaine du Médicament : un pilier en construction pour la souveraineté sanitaire du continent","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Alors que l'Afrique renforce ses institutions de santé publique face aux épidémies récurrentes, l'Agence Africaine du Médicament (AMA) demeure un chantier stratégique prioritaire de l'Union Africaine. En parallèle des efforts déployés par Africa CDC pour contenir l'épidémie d'Ebola en RDC et en Ouganda, l'AMA travaille à l'harmonisation des cadres réglementaires du médicament à l'échelle continentale. Son rôle est crucial pour garantir l'accès à des médicaments et vaccins de qualité, en particulier lors des situations d'urgence sanitaire. Les experts appellent à une accélération de l'opérationnalisation complète de l'AMA, afin que l'Afrique puisse disposer d'un organe de régulation pharmaceutique indépendant et pleinement fonctionnel avant la prochaine grande crise sanitaire.","date":"2026-06-07"},
],
"manufacture-vaccins":[
{"title":"Gavi lance AVMA+ : 189 millions $ pour garantir des débouchés commerciaux aux vaccins fabriqués en Afrique","url":"https://www.devex.com/news/inside-gavi-s-189-million-plan-to-boost-africa-s-vaccine-ecosystem-112721","content":"Gavi, l'Alliance du Vaccin, soumet à l'approbation de son conseil d'administration AVMA+ (African Vaccine Manufacturing Accelerator Plus), un programme de 189 millions de dollars visant à consolider l'écosystème africain de fabrication de vaccins. Ce package innovant garantit des débouchés commerciaux directs pour jusqu'à 70 millions de doses produites sur le continent et renforce le réseau réglementaire africain. AVMA, lancé en 2024 avec un engagement global dépassant 1,2 milliard de dollars sur dix ans, récompense les fabricants africains atteignant des jalons clés comme la préqualification OMS ou la signature d'un contrat d'approvisionnement UNICEF. L'initiative contribue directement à l'objectif continental de produire 60 % des vaccins utilisés en Afrique localement d'ici 2040.","date":"2026-06-10"},
{"title":"Africa CDC et Aspen Pharmacare en discussions avancées pour un cadre de long terme de fabrication durable de vaccins","url":"https://africacdc.org/news/","content":"Lors de l'Africa Forward Summit tenu à Nairobi le 12 mai 2026, Africa CDC et Aspen Pharmacare, premier fabricant pharmaceutique africain, ont annoncé être en discussions avancées pour la mise en place d'un cadre de long terme d'alignement entre la demande et l'offre en matière de vaccins. Cet accord-cadre potentiel vise à renforcer la fabrication durable de vaccins sur le continent, en sécurisant une demande prévisible pour les producteurs locaux. Il s'inscrit dans la trajectoire fixée par l'Union Africaine, qui entend porter la production locale de vaccins de moins de 1 % actuellement à 60 % d'ici 2040. La conclusion de cet accord représenterait un tournant décisif pour la structuration d'une industrie vaccinale africaine viable sur le long terme.","date":"2026-05-12"},
{"title":"Africa CDC renforce les réseaux régionaux de formation pour quadrupler la main-d'œuvre africaine en fabrication de vaccins","url":"https://africacdc.org/news-item/regional-networks-to-strengthen-africas-vaccine-and-health-products-manufacturing-workforce/","content":"Africa CDC a lancé des réseaux régionaux de formation dédiés au renforcement des compétences de la main-d'œuvre africaine dans la fabrication de vaccins et de produits de santé. Le continent devra quadrupler ses effectifs — actuellement estimés à 3 000 employés en fabrication de vaccins et R&D à plein temps — pour atteindre l'objectif de 60 % de vaccins produits localement d'ici 2040. Ces réseaux faciliteront les échanges de bonnes pratiques, les formations spécialisées et le transfert de technologie entre les 574 fabricants de produits de santé recensés en Afrique, dont 25 producteurs de vaccins actifs. L'initiative s'attaque à l'un des principaux obstacles à l'essor industriel pharmaceutique du continent : le déficit critique de ressources humaines qualifiées.","date":"2026-06-01"},
{"title":"Epidemic Intelligence Report: Africa CDC Tracks Medical Countermeasures in the Pipeline","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"Africa CDC's latest Epidemic Intelligence Weekly Report highlights ongoing efforts to track medical countermeasures (MCMs) in the pipeline for the Bundibugyo Virus Disease (BVD) outbreak affecting DRC and Uganda. The report emphasizes the need for visibility over commodities and medical countermeasures expected to arrive at regional warehouses for subsequent distribution to affected areas. Africa CDC is actively backing evidence-based approaches to ensure that MCMs, including potential therapeutic and vaccine candidates, are efficiently sourced, stored, and deployed. The institution also references its broader strategy for pandemic preparedness, drawing lessons from COVID-19 to build African manufacturing and supply chain resilience for future health emergencies.","date":"2026-06-21"},
{"title":"Souveraineté sanitaire africaine : l'Africa CDC plaide pour un renforcement de la production locale de vaccins et médicaments","url":"https://www.youtube.com/watch?v=2lJgSGpOWJ0","content":"Lors du briefing spécial du 16 avril 2026 consacré à l'agenda de sécurité et de souveraineté sanitaires de l'Afrique, les responsables de l'Africa CDC ont mis en avant les progrès remarquables réalisés ces dernières années dans le renforcement des capacités continentales. Le portefeuille géré directement par l'Africa CDC est passé de 52 à 463 millions de dollars, et le nombre de pays dotés de capacités de génomique des agents pathogènes est passé de 7 à 46. L'institution a également souligné l'importance du mécanisme de mise en commun des achats pour garantir un accès équitable aux vaccins et aux médicaments essentiels, en particulier dans les situations de crise. Le renforcement de la fabrication locale demeure un pilier central de la nouvelle architecture de santé publique que l'Africa CDC entend bâtir pour l'Afrique.","date":"2026-06-20"},
{"title":"Africa CDC : cap sur 60 % de vaccins fabriqués en Afrique d'ici 2040","url":"https://www.youtube.com/watch?v=FOdB0cd-wQg","content":"Lors d'un briefing spécial tenu le 19 mars 2026, l'Africa CDC a réaffirmé son ambition de faire produire au moins 60 % des vaccins utilisés sur le continent africain localement d'ici 2040. Pour atteindtre cet objectif, l'institution s'appuie sur un réseau de 574 fabricants de produits de santé, dont 25 producteurs de vaccins déjà actifs sur le continent. L'Africa CDC entend également renforcer les mécanismes continentaux de mise en commun des achats pour protéger les États membres contre les ruptures d'approvisionnement, comme l'ont récemment illustré les crises au Botswana et en Namibie. Un sommet extraordinaire devait se tenir à Nairobi pour concrétiser cette feuille de route ambitieuse en matière de fabrication locale.","date":"2026-06-20"},
{"title":"Medical Countermeasures for Bundibugyo Virus Disease: Africa CDC Mobilizes Manufacturing and Diagnostic Capacity","url":"https://khub.africacdc.org/records/sub-theme/medical-countermeasures","content":"As the Bundibugyo Virus Disease (BVD) outbreak intensifies across the Democratic Republic of Congo and Uganda, Africa CDC has highlighted the urgent need to scale up the production and deployment of medical countermeasures. The organization's Medical Countermeasures hub is coordinating the provision of diagnostic tools, therapeutics, and personal protective equipment to affected regions. Mobile laboratories have been deployed at key border crossings including Bwera and Arua, enabling rapid sample testing with turnaround times of under 24 hours. Africa CDC is also working with partners to accelerate the development and manufacturing of potential vaccine candidates against the Bundibugyo Ebola virus strain, drawing lessons from previous Ebola vaccine development cycles. Strengthening local African manufacturing capacity for vaccines and diagnostics remains a core priority in the continent's health security strategy.","date":"2026-06-15"},
],
"unicef-gavi":[
{"title":"Gavi engage 50 millions $ pour accélérer le développement de vaccins contre le virus Ebola Bundibugyo","url":"https://www.gavi.org/news/media-room/gavi-commits-us-50-million-bundibugyo-ebolavirus-vaccines-and-outbreak-response","content":"Face à l'absence de vaccin approuvé contre la souche Bundibugyo du virus Ebola — contrairement aux vaccins existants contre la souche Zaïre —, Gavi, l'Alliance du Vaccin, a annoncé un engagement de 50 millions de dollars pour accélérer la recherche, les essais cliniques et les mécanismes d'accès équitable aux futurs vaccins. Cet investissement d'urgence intervient alors que l'épidémie de BVD en RDC et en Ouganda a causé plus de 200 décès et pourrait devenir la pire épidémie d'Ebola de l'histoire si elle n'est pas contenue. Gavi contribue également à l'acheminement immédiat de contre-mesures médicales dans les zones les plus touchées, en étroite coordination avec Africa CDC, l'OMS et l'UNICEF.","date":"2026-06-10"},
{"title":"Big Catch-Up : 100 millions de doses administrées à 18,3 millions d'enfants dans 36 pays","url":"https://www.unicef.org/esa/press-releases/largest-catch-initiative-delivers-over-100-million-childhood-vaccinations","content":"L'initiative Big Catch-Up, la plus grande campagne mondiale de rattrapage vaccinal jamais organisée, a franchi en avril 2026 un jalon historique : plus de 100 millions de doses ont été administrées à environ 18,3 millions d'enfants de 1 à 5 ans dans 36 pays, dont une large majorité en Afrique subsaharienne. Lancée conjointement par l'UNICEF, Gavi et l'OMS pour combler les déficits de vaccination causés par la pandémie de COVID-19, la campagne est en bonne voie pour atteindre son objectif de 21 millions d'enfants couverts. Le succès de cette initiative démontre la capacité des systèmes de santé africains à organiser des campagnes de vaccination d'envergure lorsque les ressources financières et la coordination internationale sont au rendez-vous.","date":"2026-04-24"},
{"title":"Gavi et UNICEF : accord de prix équitable pour le vaccin antipaludique, 7 millions d'enfants supplémentaires protégés","url":"https://www.unicef.org/press-releases/gavi-and-unicef-announce-equitable-pricing-deal-malaria-vaccine-protect-7-million","content":"Gavi, l'Alliance du Vaccin, et l'UNICEF ont annoncé la signature d'un accord sur les prix équitables pour le vaccin contre le paludisme, permettant de protéger 7 millions d'enfants supplémentaires d'ici la fin de la décennie. Depuis le lancement du programme en 2023, plus de 52 millions de doses antipaludiques ont été administrées et 24 pays africains ont intégré ce vaccin dans leur calendrier de vaccination de routine avec l'appui de Gavi. Le paludisme demeure l'une des principales causes de mortalité infantile en Afrique, avec plus de 600 000 décès annuels sur le continent. Cet accord tarifaire renforce l'équité d'accès à un outil de santé publique essentiel pour les populations les plus vulnérables d'Afrique subsaharienne.","date":"2026-05-15"},
{"title":"Gavi and UNICEF: Partners in Vaccine Access Amid the BVD Outbreak Response","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-may-9-2026","content":"As the Bundibugyo Virus Disease outbreak continues to challenge health systems in DRC and Uganda, international partners including UNICEF and Gavi play a critical role in supporting immunization logistics and health commodity supply chains. The situational report of June 9, 2026, underscores the importance of coordinated multilateral efforts in outbreak response, with community engagement, risk communication, and medical countermeasure distribution at the forefront. UNICEF's longstanding presence in both DRC and Uganda positions it as a key actor in ensuring vulnerable populations receive timely health interventions, while Gavi's vaccine financing mechanisms remain essential for sustaining immunization coverage in fragile, outbreak-affected settings.","date":"2026-06-21"},
{"title":"Gavi et l'UNICEF mobilisent des ressources pour accélérer la vaccination dans les zones affectées par l'épidémie de BVD en Afrique centrale","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"Dans le contexte de l'épidémie de maladie à virus Bundibugyo (BVD) qui frappe la RDC et l'Ouganda, Gavi, l'Alliance du vaccin, et l'UNICEF intensifient leurs efforts pour soutenir les campagnes de vaccination d'urgence et l'acheminement de fournitures médicales dans les zones les plus touchées. Les deux organisations travaillent en étroite coordination avec l'Africa CDC et l'OMS pour garantir l'accès aux contre-mesures médicales, notamment les vaccins expérimentaux contre les fièvres hémorragiques virales, tout en renforçant les systèmes de chaîne du froid dans les régions reculées de l'Ituri. L'UNICEF assure également la sensibilisation des communautés locales pour favoriser l'acceptation des interventions sanitaires.","date":"2026-06-18"},
{"title":"Mental Health Leadership Course in Africa: Africa CDC Opens Applications with Scholarship Support","url":"https://www.instagram.com/p/DShzmNwgpF4","content":"Africa CDC has launched a call for applications for its Mental Health Leadership and Advocacy Course, scheduled for 3-14 August 2026 at the Ibadan Business School in Bodija, Ibadan, Nigeria. Scholarships are available to support participants, reflecting Africa CDC's commitment to building human capital across the continent's health sector. The initiative is part of broader efforts by Africa CDC and its partners, including UNICEF, to strengthen mental health systems and leadership capacity across African Union member states. Applications are open until 26 June 2026.","date":"2026-06-13"},
{"title":"Gavi et UNICEF mobilisés face à l'urgence sanitaire Ebola en Afrique centrale et orientale","url":"https://www.npr.org/2026/06/05/nx-s1-5848082/ebola-virus-cdc-outbreak-democratic-republic-congo-uganda","content":"Alors que l'épidémie d'Ebola Bundibugyo continue de s'étendre en République Démocratique du Congo et en Ouganda, avec plus de 300 cas confirmés et des projections alarmantes pouvant rivaliser avec l'épidémie ouest-africaine de 2014-2016 (20 000 cas, 4 000 morts), Gavi et l'UNICEF intensifient leurs efforts de coordination humanitaire et de soutien logistique. Les deux organisations jouent un rôle clé dans l'approvisionnement en équipements médicaux, le soutien aux systèmes de santé locaux et la mobilisation communautaire pour freiner la progression du virus dans les zones les plus affectées, notamment la province de l'Ituri au Congo.","date":"2026-06-12"},
],
"sante-maroc":[
{"title":"Maroc 2026 : budget santé en hausse de 30 % à 42,4 milliards de dirhams et création de 8 000 postes","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Dans le cadre du Projet de Loi de Finances 2026, le Maroc a alloué 42,4 milliards de dirhams au ministère de la Santé et de la Protection sociale, soit une hausse historique de 30 % par rapport à l'exercice précédent. Cette enveloppe budgétaire sans précédent comprend 16,4 milliards de dirhams dédiés aux dépenses de personnel, avec la création de 8 000 nouveaux postes budgétaires dans le secteur de la santé publique. Cet effort massif vise à accélérer la réforme du système national de santé : modernisation des infrastructures hospitalières, renforcement des Groupements Sanitaires Territoriaux (GST) et amélioration de l'accès aux soins dans les zones rurales et défavorisées. Ce budget place le Maroc parmi les pays africains les plus ambitieux en matière d'investissement public dans la santé.","date":"2026-01-15"},
{"title":"Maroc : réhabilitation de 90 hôpitaux, création de nouveaux CHU et généralisation des GST au programme 2026","url":"https://medias24.com/2025/11/05/rehabilitation-dhopitaux-nouveaux-chu-et-generalisation-des-gst-les-principaux-projets-du-ministere-de-la-sante-en-2026/","content":"Le ministère de la Santé marocain a dévoilé ses grands chantiers pour 2026 : réhabilitation et mise à niveau de 90 hôpitaux à travers le Royaume, construction de nouveaux Centres Hospitaliers Universitaires (CHU) pour renforcer l'offre de soins spécialisés, et opérationnalisation progressive des Groupements Sanitaires Territoriaux (GST). La généralisation de la feuille de soins électronique figure également parmi les priorités, dans le cadre de la numérisation du système de santé. Ces projets s'inscrivent dans la réforme structurelle impulsée par la Vision Royale pour un accès équitable aux soins à l'ensemble des Marocaines et Marocains, quelles que soient leur situation géographique ou leur condition socioéconomique.","date":"2025-11-05"},
{"title":"Réforme de l'État social au Maroc : la santé change d'échelle, entre ambitions et résistances institutionnelles","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"La réforme de l'État social au Maroc porte ses premiers fruits dans le secteur de la santé, avec une extension significative de la couverture médicale de base et une augmentation sans précédent des dépenses publiques. Toutefois, la transformation du système se heurte à des résistances institutionnelles persistantes : déficit de médecins dans les zones rurales, lenteur de l'opérationnalisation des GST et tensions sur les ressources humaines. Le chantier de la souveraineté pharmaceutique, porté par l'Agence Marocaine des Médicaments et Produits de Santé (AMMPS), est présenté comme un levier essentiel pour réduire la dépendance aux importations et favoriser la production locale de génériques et de vaccins. Le succès de cette réforme structurelle conditionne la capacité du Maroc à répondre aux futures urgences sanitaires.","date":"2026-04-10"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},
],
"vaccins-monde":[
{"title":"Reprise de la vaccination préventive contre le choléra : l'OMS annonce un doublement de l'offre mondiale de vaccins","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"Le 4 février 2026, l'OMS a annoncé la reprise des campagnes de vaccination préventive contre le choléra, interrompues depuis plus de trois ans en raison d'une pénurie mondiale critique. L'approvisionnement annuel en vaccins anticholériques oraux (OCV) a doublé, passant de 35 millions de doses en 2022 à près de 70 millions en 2025, franchissant enfin le seuil nécessaire pour rouvrir les campagnes préventives. Le Mozambique est le premier pays à bénéficier de cette reprise, illustrant la priorité accordée à l'Afrique subsaharienne. Cette avancée majeure intervient alors que le choléra tue encore des dizaines de milliers de personnes chaque année dans les pays à faibles revenus et que la maladie avait connu une recrudescence alarmante entre 2022 et 2025.","date":"2026-02-04"},
{"title":"79e Assemblée mondiale de la Santé : 70 États réaffirment leur engagement pour l'Agenda Immunisation 2030","url":"https://www.who.int/news/item/26-05-2026-global-health-leaders-reaffirm-commitment-to-immunization-agenda-2030","content":"Lors de la 79e Assemblée mondiale de la Santé (18-23 mai 2026, Genève), plus de 70 États membres et groupes régionaux ont réaffirmé leur engagement en faveur de l'Agenda d'immunisation 2030 (IA2030), le cadre mondial de référence pour l'extension de la couverture vaccinale mondiale. Les délégués ont appelé à renforcer les systèmes nationaux d'immunisation, à intensifier la lutte contre la désinformation vaccinale et à assurer un financement durable pour atteindre l'objectif d'une couverture vaccinale mondiale d'au moins 90 % d'ici 2030. La réaffirmation intervient dans un contexte difficile marqué par le recul de la vaccination post-COVID-19, les émergences épidémiques (Ebola, mpox), le désengagement de certains donateurs et des tensions géopolitiques croissantes.","date":"2026-05-26"},
{"title":"OMS : mise à jour de la composition des vaccins COVID-19 — adoption de la souche monovalente LP.8.1","url":"https://www.who.int/news/item/16-05-2026-statement-on-the-antigen-composition-of-covid-19-vaccines","content":"En mai 2026, l'OMS a publié une déclaration actualisée sur la composition antigénique des vaccins COVID-19, recommandant l'adoption d'une formulation monovalente basée sur la souche LP.8.1, identifiée comme le variant dominant en circulation mondiale. Cette recommandation du Groupe consultatif technique TAG-CO-VAC, émise en décembre 2025, a conduit plusieurs fabricants à mettre à jour leur formulation vaccinale. En 2026, tous les taux de positivité au SARS-CoV-2 sont inférieurs aux périodes correspondantes des années précédentes dans l'ensemble des régions OMS, reflétant une bonne couverture immunitaire globale. La mise à jour régulière de la composition des vaccins COVID-19 reste un outil clé pour maintenir leur efficacité face à l'évolution continue du virus.","date":"2026-05-16"},
{"title":"Briefing OMS Afrique : la riposte vaccinale contre Ebola Bundibugyo au centre des discussions","url":"https://www.youtube.com/watch?v=Gp9tFTr5a9Y","content":"Lors du briefing presse virtuel de l'OMS Afrique du 4 juin 2026, les experts ont fait le point sur la stratégie de riposte à l'épidémie de maladie à virus Ebola de type Bundibugyo en RDC et en Ouganda. Les discussions ont notamment porté sur les outils de prévention disponibles, les protocoles de vaccination d'urgence et les défis du traçage des contacts dans les zones affectées. L'OMS a souligné l'importance du déploiement rapide des équipes de réponse et la nécessité de renforcer les capacités locales de gestion des épidémies. Les intervenants ont également évoqué les cas importés en Ouganda et les mesures de quarantaine mises en place, saluant la capacité des autorités ougandaises à détecter et isoler rapidement les cas suspects grâce aux protocoles de surveillance renforcés.","date":"2026-06-17"},
{"title":"Third Reaffirmation of Mpox Emergency: Africa CDC and WHO Call for Accelerated Global Immunization Efforts","url":"https://khub.africacdc.org/records/resource?id=405","content":"Africa CDC and the World Health Organization have jointly issued a third reaffirmation of the mpox public health emergency, underscoring the persistent threat posed by the virus across the African continent and beyond. The declaration highlights a continued increase in mpox cases, including in Cameroon, and points to the emergence of the novel clade Ib strain in Central Africa as a particular cause for global concern. Researchers have conducted comprehensive phylogenetic and mutational analyses of the Monkeypox virus (MPXV) across sub-Saharan Africa between 2022 and 2024, revealing significant genomic diversity. Community health workers have been identified as a key resource in halting outbreaks at the local level. Both organizations are calling on the international community to accelerate vaccine research and deployment, scale up immunization campaigns in high-risk areas, and invest in surveillance infrastructure to monitor the evolving epidemiology of mpox across the continent.","date":"2026-06-15"},
{"title":"Africa CDC lance sa promotion 2026 de Jeunes Champions de la Santé Numérique pour transformer l'avenir sanitaire du continent","url":"https://youth.africacdc.org/2026-cohort-of-young-digital-health-champions-to-transform-africas-health-future-announced","content":"Africa CDC a annoncé sa promotion 2026 de Jeunes Champions de la Santé Numérique (Y-DHC), une initiative visant à identifier et connecter de jeunes leaders qui façonnent activement le paysage de la santé numérique en Afrique. Dans le cadre de la stratégie YES!Health 2025-2028, ces champions joueront un rôle clé dans l'innovation en matière de vaccination et de santé publique numérique, contribuant à accélérer l'adoption des technologies de santé, notamment les registres de vaccination électroniques et les systèmes de suivi immunologique. Des cohortes régionales ont été sélectionnées pour l'Afrique centrale, orientale, septentrionale, australe et occidentale.","date":"2026-06-13"},

function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
</body>
</html>
