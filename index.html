var articlesData={
"african-cdc":[
{"title":"L'épidémie Ebola Bundibugyo en RDC dépasse le seuil de 1 000 cas confirmés : deuxième pire épidémie d'Ebola de l'histoire","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-8-14-june-2026/","content":"Au 22 juin 2026, la République Démocratique du Congo a franchi le cap des 1 000 cas confirmés d'Ebola causé par le virus Bundibugyo, faisant de cette épidémie la deuxième plus grave de l'histoire, derrière l'épidémie ouest-africaine de 2014-2016 qui avait fait plus de 11 000 morts. L'Africa CDC recense également 20 cas confirmés et 2 décès en Ouganda voisin, alertant sur le risque d'extension régionale. Avec un taux de létalité avoisinant 25 %, cette épidémie concentrée dans la province de l'Ituri et les provinces du Kivu dépasse en ampleur toutes les précédentes épidémies dues à ce variant. L'Africa CDC et l'OMS intensifient leur appel à la communauté internationale pour accélérer les transferts financiers, alors que seulement 90 millions des 910 millions de dollars pledgés par les chefs d'État africains avaient été effectivement décaissés à la mi-juin 2026.","date":"2026-06-22"},
{"title":"Africa CDC appelle à renforcer les contrôles sanitaires aux points d'entrée pour enrayer la propagation transfrontalière d'Ebola","url":"https://www.globalsecurity.org/security/library/news/2026/06/sec-260610-africacdc02.htm","content":"Face à la progression de l'épidémie de Maladie à Virus Bundibugyo au-delà des frontières congolaises, l'Africa CDC a exhorté les États membres de l'Union Africaine à renforcer immédiatement les mesures de dépistage à la sortie dans les aéroports, ports maritimes et principaux postes frontières terrestres. Cette directive s'inscrit dans la stratégie de prévention de la transmission transfrontalière, alors que l'Ouganda avait déjà confirmé des cas importés en juin 2026. L'appel coïncide avec la préparation de la Réunion de haut niveau des chefs d'État africains du 16 juin 2026, visant à mobiliser leadership politique et ressources pour accélérer la riposte continentale. L'Africa CDC rappelle que la détection précoce aux points d'entrée est l'un des outils les plus efficaces pour prévenir l'exportation des épidémies vers de nouveaux territoires.","date":"2026-06-10"},
{"title":"Africa CDC Weekly Brief 1–7 juin 2026 : surveillance renforcée et coordination continentale face à l'épidémie Ebola","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-1-7-june-2026/","content":"Le rapport hebdomadaire de l'Africa CDC couvrant la période du 1er au 7 juin 2026 dresse un état des lieux de la situation épidémiologique africaine, avec un focus sur la Maladie à Virus Bundibugyo en RDC et en Ouganda. Le document souligne l'activation de mécanismes de surveillance renforcée dans les pays frontaliers et le déploiement d'équipes multidisciplinaires de réponse rapide dans les zones à haut risque. Il détaille les avancées dans la coordination continentale, notamment la préparation du Plan Conjoint Africa CDC-OMS chiffré à 518 millions de dollars sur six mois. L'Africa CDC y rappelle son rôle central au sein de l'Agenda de Sécurité Sanitaire et de Souveraineté de l'Afrique (AHSS) et appelle à une mobilisation accrue des partenaires techniques et financiers.","date":"2026-06-07"},
{"title":"Rapport de situation BVD du 1er juin 2026 : 332 cas confirmés, 14,8 % de létalité en RDC et Ouganda","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-june-1-2026","content":"Au 1er juin 2026, l'épidémie de maladie à virus Bundibugyo (BVD) avait engendré 332 cas confirmés et 49 décès confirmés, soit un taux de létalité de 14,8 %. On dénombrait par ailleurs 321 cas suspects, dont 101 personnes en isolement, et 259 décès parmi les cas suspects. L'épidémie touchait 23 zones de santé en République Démocratique du Congo ainsi qu'un district en Ouganda. Le rapport de l'Africa CDC met en évidence plusieurs défis majeurs : une faible capacité de suivi des contacts, une résistance communautaire sur le terrain, des contraintes logistiques dans le transport des échantillons vers les laboratoires de référence, et le retard dans le déploiement des équipes de réponse rapide multidisciplinaires dans certaines zones à haut risque comme Mongbwalu et Aru.","date":"2026-06-25"},
{"title":"Africa CDC & OMS lancent le Plan Continental de Préparation et de Réponse à Ebola : 518 millions de dollars mobilisés","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"Le 5 juin 2026, l'Africa CDC et l'Organisation mondiale de la Santé (OMS) ont officiellement lancé le Plan Continental de Préparation et de Réponse à la maladie à virus Bundibugyo (BVD). Articulé autour du principe « Un Plan, Un Budget, Une Équipe », ce plan couvre la période de juin à novembre 2026 et est chiffré à 518 millions de dollars, assorti d'un mécanisme conjoint de suivi financier pour garantir la transparence. Ses piliers opérationnels comprennent la coordination des urgences, les tests de laboratoire, la surveillance épidémiologique, la prévention des infections, les soins cliniques et l'engagement communautaire. Le Directeur général de l'Africa CDC a souligné que ce plan offre au continent une feuille de route claire pour agir avec rapidité et unité, protéger les communautés affectées et soutenir les pays voisins.","date":"2026-06-25"},
{"title":"Ebola Bundibugyo : plus de 910 millions de dollars pledgés, mais moins de 90 millions décaissés","url":"https://x.com/AfricaCDC/status/2067940466104926516","content":"Lors de son briefing médiatique hebdomadaire du 18 juin 2026, l'Africa CDC a révélé une réalité alarmante : si plus de 910 millions de dollars ont été annoncés lors de la réunion des chefs d'État et de gouvernement africains consacrée à l'épidémie de maladie à virus Ebola Bundibugyo, moins de 90 millions ont effectivement été décaissés à ce jour. Ce gouffre entre les engagements et les fonds réellement disponibles soulève de vives inquiétudes quant à la capacité des équipes de riposte à maintenir leurs opérations sur le terrain en RDC et en Ouganda. L'Africa CDC appelle à une accélération urgente des transferts financiers pour soutenir la surveillance épidémiologique, la prise en charge clinique et l'engagement communautaire.","date":"2026-06-25"},
{"title":"Africa CDC Weekly Briefing: Live Update on Ebola Outbreak Response – June 11, 2026","url":"https://www.facebook.com/africacdc/videos/livespecial-briefing-on-ebola-outbreak-response-june-11-2026/27939040969031174","content":"Africa CDC held its weekly live briefing on June 11, 2026, providing the latest updates on the Ebola outbreak response in the Democratic Republic of Congo and Uganda. Aligned with the Africa Health Security and Sovereignty (AHSS) Agenda, the briefing highlighted coordinated response actions undertaken by African Union Member States and partners to strengthen prevention, preparedness, detection, and response systems across the continent. The session also underscored Africa CDC's broader mission to advance health security on the continent, including the upcoming Africa Health ExCon 2026 conference co-hosted with Egypt, which will bring together healthcare leaders, innovators, policymakers, and investors.","date":"2026-06-24"},
{"title":"Africa CDC Warns Ebola Outbreak in DRC Could Become Worst on Record","url":"https://www.democracynow.org/2026/6/17/headlines/africa_cdc_warns_ebola_outbreak_in_drc_could_become_worst_on_record","content":"The Africa Centres for Disease Control and Prevention (Africa CDC) has issued a stark warning: the Ebola outbreak currently ravaging the Democratic Republic of Congo risks becoming the deadliest in history. As of June 17, 2026, confirmed cases have risen to 837, with an official death toll approaching 200. Africa CDC officials stressed that additional funding is urgently needed to trace potential infections and halt further spread of the Bundibugyo Virus Disease (BVD), which has been spreading primarily in the Ituri province and extending into North Kivu, South Kivu, and Uganda.","date":"2026-06-24"},
{"title":"South Africa Pledges $2.5 Million to Africa CDC's Africa Epidemics Fund for Ebola Response","url":"https://dirco.gov.za/africa-cdc-strengthens-the-capacity-and-capability-of-africas-public-health-institutions-as-well-as-partnerships-to-detect-and-respond-quickly-and-effectively-to-disease-threats-and-outbreaks","content":"The Africa Centres for Disease Control and Prevention (Africa CDC) has welcomed a US$2.5 million pledge from the Government of South Africa to support the ongoing Ebola response in the Democratic Republic of the Congo (DRC) and Uganda through the Africa CDC Africa Epidemics Fund. Announced on May 20, 2026, from Addis Ababa, this contribution reinforces Africa CDC's mission to strengthen the capacity and capability of Africa's public health institutions and partnerships to detect and respond quickly and effectively to disease threats and outbreaks. The pledge comes amid growing calls for African nations to support the continent's own health security infrastructure, with Africa CDC urging other countries with resources to follow South Africa's lead in funding regional coordinating centers and laboratory capacities.","date":"2026-06-23"},
],
"african-medical-agency":[
{"title":"OMS et Agence Africaine des Médicaments signent un accord-cadre historique pour harmoniser la réglementation pharmaceutique sur le continent","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"Le 21 mai 2026, l'Organisation mondiale de la Santé (OMS) et l'Agence Africaine des Médicaments (AMA) ont signé un accord-cadre de collaboration visant à renforcer les systèmes réglementaires et à améliorer l'accès à des produits de santé de qualité, sûrs et efficaces à travers l'Afrique. Cet accord établit un partenariat structuré pour accélérer l'harmonisation réglementaire, la convergence et la reliance entre les autorités nationales, tout en appuyant l'opérationnalisation de l'AMA comme institution continentale clé. Il prévoit des plans opérationnels conjoints sur 3 à 5 ans, centrés sur la promotion de standards réglementaires communs, le renforcement de la surveillance de la sécurité des médicaments et la lutte contre les produits sous-standards et falsifiés. Cet accord intervient dans une période critique, alors que l'Afrique fait face à l'épidémie d'Ebola Bundibugyo, soulignant l'urgence de disposer de cadres réglementaires robustes pour évaluer et autoriser des vaccins et traitements en urgence.","date":"2026-05-21"},
{"title":"AMA et US Pharmacopeia concluent un accord de coopération pour renforcer les normes pharmaceutiques et la surveillance post-commercialisation en Afrique","url":"https://www.cleanroomtechnology.com/african-medicines-agency-and-usp-sign-agreement-to","content":"En avril 2026, l'Agence Africaine des Médicaments (AMA) et l'US Pharmacopeia (USP) ont signé à Johannesburg un mémorandum d'accord établissant un cadre de collaboration en matière de science réglementaire, de standards pharmacopéiques, de surveillance post-commercialisation et de renforcement des capacités techniques. Cette coopération permettra à l'AMA de s'appuyer sur l'expertise et les normes de référence de l'USP pour harmoniser les exigences de qualité des médicaments commercialisés sur le continent africain. Le partenariat contribue à l'objectif central de l'AMA d'améliorer l'accès à des médicaments de qualité garantie pour les 1,4 milliard de personnes vivant sur le continent. Il s'inscrit dans la phase d'Expansion (2026-2030) de l'AMA, qui vise à consolider ses structures institutionnelles et à étendre son périmètre d'action réglementaire à de nouvelles catégories de produits de santé.","date":"2026-04-15"},
{"title":"Revue historique de l'AMA dans Frontiers in Medicine : origines, structure institutionnelle et perspectives pour la souveraineté pharmaceutique africaine","url":"https://www.frontiersin.org/journals/medicine/articles/10.3389/fmed.2026.1763261/full","content":"Une revue scientifique publiée en 2026 dans la revue Frontiers in Medicine retrace l'histoire de l'Agence Africaine des Médicaments (AMA) depuis ses origines dans les travaux de l'Union Africaine jusqu'à son architecture institutionnelle actuelle et ses perspectives futures. Les auteurs analysent le rôle de l'AMA dans l'harmonisation réglementaire pharmaceutique continentale, en soulignant les défis liés à la diversité des systèmes réglementaires nationaux, au financement et à la gouvernance. La revue met en lumière les synergies entre l'AMA, l'EMA, l'OMS et l'AUDA-NEPAD, qui contribuent collectivement à renforcer les capacités réglementaires africaines. Les auteurs concluent que l'AMA constitue un levier stratégique pour garantir l'accès équitable à des médicaments et vaccins de qualité, et appellent à une accélération de son opérationnalisation complète pour faire face aux urgences sanitaires futures.","date":"2026-06-10"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
{"title":"L'Agence Africaine du Médicament : un pilier en construction pour la souveraineté sanitaire du continent","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Alors que l'Afrique renforce ses institutions de santé publique face aux épidémies récurrentes, l'Agence Africaine du Médicament (AMA) demeure un chantier stratégique prioritaire de l'Union Africaine. En parallèle des efforts déployés par Africa CDC pour contenir l'épidémie d'Ebola en RDC et en Ouganda, l'AMA travaille à l'harmonisation des cadres réglementaires du médicament à l'échelle continentale. Son rôle est crucial pour garantir l'accès à des médicaments et vaccins de qualité, en particulier lors des situations d'urgence sanitaire. Les experts appellent à une accélération de l'opérationnalisation complète de l'AMA, afin que l'Afrique puisse disposer d'un organe de régulation pharmaceutique indépendant et pleinement fonctionnel avant la prochaine grande crise sanitaire.","date":"2026-06-07"},
],
"manufacture-vaccins":[
{"title":"Rapport CHAI 2026 : moins de 1 % des vaccins utilisés en Afrique produits localement, mais 9 antigènes visent la préqualification OMS d'ici 2030","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"Le rapport 2026 de la Clinton Health Access Initiative (CHAI) sur le paysage de la fabrication vaccinale en Afrique révèle qu'en dépit des progrès enregistrés, moins de 1 % des vaccins utilisés sur le continent sont actuellement produits localement. Sur les 11 fabricants africains recensés, 10 disposent de capacités opérationnelles de remplissage et finissage, 5 maîtrisent la production de substance active et 3 ont des capacités de R&D. Le rapport identifie 5 défis transversaux ayant retardé les projets : délais réglementaires, demande marchée incertaine, déblocage lent des financements, retards des partenaires de transfert technologique et manque de main-d'œuvre qualifiée. Toutefois, 9 antigènes devraient obtenir la préqualification OMS et accéder au marché continental entre 2025 et 2030, dont des vaccins contre la fièvre jaune et la rougeole-rubéole du Sénégal, et plusieurs vaccins combinés d'Afrique du Sud.","date":"2026-06-20"},
{"title":"Égypte : EVA Pharma crée la première plateforme ARNm d'Afrique avec une capacité de 100 millions de doses vaccinales annuelles","url":"https://onlinelibrary.wiley.com/doi/full/10.1002/hsr2.71926","content":"EVA Pharma, société pharmaceutique égyptienne, a conclu un partenariat avec des firmes biotechnologiques européennes pour établir la première plateforme de production d'ARNm de bout en bout sur le continent africain, qualifiée de plateforme numérique-biologiques. Cette infrastructure technologique innovante est dimensionnée pour produire jusqu'à 100 millions de doses de vaccins ARNm par an, positionnant l'Égypte comme un hub majeur de biofabrication continental. Ce projet constitue une réponse directe aux lacunes révélées par la pandémie de COVID-19 et l'épidémie d'Ebola Bundibugyo, pour lesquelles l'absence de capacité vaccinale locale avait exposé l'Afrique à une dépendance critique vis-à-vis des importations mondiales. Cette initiative s'inscrit dans la stratégie continentale Vaccins africains pour l'Afrique, soutenue par l'Union Africaine, qui vise à atteindre 60 % d'autosuffisance vaccinale pour le continent à l'horizon 2040.","date":"2026-06-15"},
{"title":"Gavi soumet l'AVMA+ à son Conseil d'administration : 189 millions de dollars pour renforcer la fabrication vaccinale africaine face à la contraction des budgets mondiaux","url":"https://www.devex.com/news/inside-gavi-s-189-million-plan-to-boost-africa-s-vaccine-ecosystem-112721","content":"Gavi, l'Alliance du Vaccin, a soumis à l'approbation de son Conseil d'administration l'AVMA+, un package de financement de 189 millions de dollars conçu pour consolider l'écosystème de fabrication vaccinale africain dans un contexte de réduction des budgets mondiaux de santé. La proposition vise à renforcer le réseau réglementaire africain et à garantir des ventes directes pouvant couvrir jusqu'à 70 millions de vaccins produits sur le continent, créant ainsi une demande prévisible pour les fabricants locaux. L'AVMA+ est conçu comme une extension de l'African Vaccine Manufacturing Accelerator (AVMA), doté initialement d'un milliard de dollars sur dix ans, qui vise à créer un marché viable et durable pour les vaccins fabriqués en Afrique. La proposition intervient alors que la réduction du financement américain de la santé mondiale (USAID coupé de 90 %) rend encore plus urgente la construction d'une base industrielle autonome sur le continent.","date":"2026-06-18"},
{"title":"Plan de réponse Ebola 2026 : un appel à investir dans la fabrication locale de contre-mesures médicales en Afrique","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"La déclaration de l'épidémie de maladie à virus Ebola Bundibugyo comme urgence de santé publique par l'OMS et l'Africa CDC en 2026 met en exergue les insuffisances persistantes dans la chaîne de fabrication et d'approvisionnement en produits médicaux sur le continent. Avec 332 cas confirmés et un taux de létalité de 14,8 % au début du mois de juin, l'absence de vaccin et la pénurie de traitements spécifiques soulignent l'urgence d'investir dans des capacités de fabrication pharmaceutique locales. Les experts appellent à une mobilisation accrue des industriels africains et internationaux pour développer, produire et distribuer des vaccins candidats contre les souches d'Ebola non couvertes, et pour renforcer les plateformes de biofabrication continentales afin de réduire la dépendance aux importations en période de crise.","date":"2026-06-25"},
{"title":"Urgence Ebola Bundibugyo : l'absence de vaccin homologué relance le débat sur la production vaccinale africaine","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'épidémie de maladie à virus Bundibugyo qui frappe la République Démocratique du Congo et l'Ouganda depuis plusieurs semaines met en lumière une réalité critique : il n'existe à ce jour aucun vaccin homologué contre cette souche spécifique du virus Ebola. Contrairement à la souche Zaïre, pour laquelle des vaccins ont été développés et déployés avec succès, la souche Bundibugyo demeure sans solution vaccinale disponible à grande échelle. Cette situation relance avec acuité le débat sur la nécessité d'accélérer les capacités de recherche, développement et fabrication de vaccins sur le continent africain. Le plan conjoint Africa CDC-OMS, doté de 518 millions de dollars, inclut des volets dédiés au développement de contre-mesures médicales, pressant les fabricants et les bailleurs de fonds à investir dans la production locale de vaccins adaptés aux pathogènes prioritaires africains.","date":"2026-06-25"},
{"title":"2026 Ebola Outbreak Highlights Urgent Need for Vaccine Manufacturing Against Bundibugyo Strain","url":"https://www.infectioncontroltoday.com/view/2026-ebola-outbreak-spreads-central-africa-who-warns-growing-crisis-amid-cdc-usaid-cuts","content":"The 2026 Ebola outbreak, caused by the Bundibugyo strain currently affecting the Democratic Republic of Congo and Uganda, has exposed a critical gap in the global vaccine manufacturing landscape: there is currently no approved vaccine or treatment specifically targeting this strain. With over 513 cases and more than 130 suspected deaths reported, health experts are urgently calling for accelerated research and manufacturing investment dedicated to Bundibugyo virus disease. The drastic reduction of USAID funding — by 90% — and the US withdrawal from WHO have further hampered the mobilization of resources needed to fast-track vaccine development. Global health stakeholders warn that without dedicated manufacturing pipelines for neglected hemorrhagic fever strains, the world will continue to be caught unprepared when novel or rare Ebola variants emerge.","date":"2026-06-23"},
{"title":"Africa CDC mobilise des ressources pour renforcer la fabrication locale de vaccins et de médicaments en Afrique","url":"https://www.devex.com/organizations/centres-for-disease-control-and-prevention-africa-cdc-120577","content":"Dans le cadre de sa stratégie d'approvisionnement groupé, l'Africa CDC poursuit ses efforts pour développer une plateforme continentale de procurement et soutenir la fabrication locale de vaccins et de médicaments essentiels. Un vétéran du Fonds Mondial a été recruté pour piloter cette initiative, qui vise à doter l'Afrique d'une chaîne de production pharmaceutique autonome, réduisant ainsi sa vulnérabilité aux ruptures d'approvisionnement mondiales.","date":"2026-06-22"},
{"title":"Epidemic Intelligence Report: Africa CDC Tracks Medical Countermeasures in the Pipeline","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"Africa CDC's latest Epidemic Intelligence Weekly Report highlights ongoing efforts to track medical countermeasures (MCMs) in the pipeline for the Bundibugyo Virus Disease (BVD) outbreak affecting DRC and Uganda. The report emphasizes the need for visibility over commodities and medical countermeasures expected to arrive at regional warehouses for subsequent distribution to affected areas. Africa CDC is actively backing evidence-based approaches to ensure that MCMs, including potential therapeutic and vaccine candidates, are efficiently sourced, stored, and deployed. The institution also references its broader strategy for pandemic preparedness, drawing lessons from COVID-19 to build African manufacturing and supply chain resilience for future health emergencies.","date":"2026-06-21"},
],
"unicef-gavi":[
{"title":"UNICEF et Gavi lancent un appel d'intérêt auprès des fabricants pour accélérer le développement d'un vaccin contre l'Ebola Bundibugyo","url":"https://www.gavi.org/news/media-room/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"Le 24 juin 2026, UNICEF et Gavi ont publié conjointement un appel à manifestation d'intérêt (AMI) auprès des développeurs et fabricants de vaccins, afin de recenser les projets en cours pour mettre au point un vaccin contre la Maladie à Virus Ebola Bundibugyo, qui a causé 1 094 cas confirmés et 277 décès en RDC ainsi que 20 cas et 2 décès en Ouganda. Cet AMI vise à informer le déploiement du financement de 40 millions de dollars déjà engagé par Gavi pour soutenir la montée en puissance industrielle et un accès rapide aux doses. Une attention particulière est accordée aux propositions prévoyant une production basée sur le continent africain, dans l'esprit de la stratégie Vaccins africains pour l'Afrique. UNICEF, en tant qu'agente d'approvisionnement mondiale, jouera un rôle central dans la logistique de distribution des doses dès qu'un vaccin candidat sera disponible, garantissant l'accès équitable aux populations les plus vulnérables dans les zones affectées.","date":"2026-06-24"},
{"title":"Gavi engage 50 millions de dollars pour accélérer le développement de vaccins contre l'Ebola Bundibugyo et soutenir la riposte d'urgence","url":"https://www.gavi.org/news/media-room/gavi-commits-us-50-million-bundibugyo-ebolavirus-vaccines-and-outbreak-response","content":"Gavi, l'Alliance du Vaccin, a annoncé un engagement financier de 50 millions de dollars pour accélérer le développement de vaccins contre le virus Ebola Bundibugyo et soutenir la réponse d'urgence à l'épidémie en cours en République Démocratique du Congo et en Ouganda. Ce financement, qui s'ajoute aux 40 millions déjà mobilisés pour l'appel d'intérêt aux fabricants, reflète l'urgence de la situation : avec plus de 1 000 cas confirmés et un taux de létalité d'environ 25 %, l'épidémie risque de dépasser les pires précédents historiques. Gavi souligne qu'aucun vaccin homologué n'existe contre ce variant, ce qui contraste avec la situation pour la souche Zaïre pour laquelle des vaccins efficaces ont été déployés lors des précédentes épidémies en RDC. Cet engagement illustre le rôle central de Gavi non seulement dans la vaccination de routine, mais également dans la réponse aux urgences sanitaires mondiales via ses mécanismes de financement d'accélération d'accès.","date":"2026-06-23"},
{"title":"Rapport OMS-UNICEF 2026 : la couverture vaccinale infantile mondiale stable, mais 14 millions d'enfants restent non vaccinés et requièrent une action urgente","url":"https://www.unicef.org/press-releases/global-childhood-vaccination-holds-steady-yet-over-14-million-infants-remain","content":"Le rapport annuel conjoint de l'OMS et de l'UNICEF sur la couverture vaccinale mondiale indique que la vaccination infantile reste globalement stable en 2025, mais que plus de 14 millions d'enfants n'ont reçu aucune dose de vaccin au cours de leur première année de vie. Ce chiffre souligne la fragilité persistante des systèmes de vaccination dans les pays à faibles revenus, notamment en Afrique subsaharienne, malgré les perturbations liées aux crises humanitaires et aux épidémies. L'UNICEF rappelle que les progrès de l'initiative Big Catch-Up — plus de 100 millions de doses administrées à 18,3 millions d'enfants dans 36 pays — ont contribué à stabiliser la couverture, mais que des investissements soutenus restent indispensables pour atteindre les objectifs de l'Agenda Immunization 2030. Les deux organisations appellent les gouvernements et donateurs à maintenir leurs engagements financiers dans un contexte de contraction des budgets d'aide internationale.","date":"2026-06-18"},
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
{"title":"Gavi et UNICEF Mobilisés face à la Crise Ebola en Afrique Centrale : Enjeux de Vaccination et d'Accès aux Soins","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-con","content":"Face à la propagation de l'épidémie de maladie à virus Bundibugyo en République Démocratique du Congo et en Ouganda, Gavi (l'Alliance du Vaccin) et l'UNICEF sont appelés à intensifier leur soutien logistique et financier pour garantir l'accès aux outils de santé publique dans les zones affectées. Bien qu'aucun vaccin homologué ne soit disponible contre la souche Bundibugyo, les deux organisations jouent un rôle clé dans la chaîne d'approvisionnement en matériels de protection, en soutien aux campagnes de sensibilisation communautaire et en renforcement des systèmes de santé locaux. L'UNICEF assure également la protection des enfants et des familles vulnérables dans les foyers épidémiques, en coordination avec les autorités nationales et Africa CDC. Ces interventions s'inscrivent dans le cadre du plan continental de préparation et de réponse doté de 518 millions de dollars lancé conjointement par Africa CDC et l'OMS.","date":"2026-06-23"},
{"title":"Gavi et UNICEF intensifient leur soutien à la vaccination en zones de conflit face aux crises sanitaires émergentes","url":"https://cphia.africacdc.org","content":"À l'occasion de la 5e Conférence Internationale sur la Santé Publique en Afrique (CPHIA 2026) prévue à Addis-Abeba, Gavi et l'UNICEF figurent parmi les partenaires clés appelés à présenter leurs stratégies de vaccination dans les zones de fragilité. L'événement, qui réunit chefs d'État, ministres et chercheurs, offre une plateforme pour renforcer les synergies entre agences onusiennes et institutions africaines dans la lutte contre les maladies évitables par la vaccination.","date":"2026-06-22"},
],
"sante-maroc":[
{"title":"Maroc 2026 : budget santé en hausse de 30 % à 42,4 milliards de dirhams et création de 8 000 nouveaux postes dans le secteur","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Dans le cadre du Projet de Loi de Finances 2026, le Maroc a alloué 42,4 milliards de dirhams au ministère de la Santé et de la Protection Sociale, soit une augmentation de 30 % par rapport à l'année précédente, faisant de la santé l'une des priorités budgétaires majeures du gouvernement. Cette enveloppe prévoit la création de 8 000 nouveaux postes budgétaires dans le secteur de la santé, dont 16,4 milliards de dirhams dédiés aux dépenses de personnel, pour répondre au manque de ressources humaines dans les établissements publics. L'investissement cible la modernisation des infrastructures hospitalières, le renforcement des Centres Hospitaliers Universitaires (CHU) et la mise en place progressive des Groupements Sanitaires Territoriaux (GST), nouveaux outils de gouvernance territoriale de l'offre de soins. Cette hausse budgétaire s'inscrit dans la Vision Royale de réforme du système de santé national, visant à généraliser la couverture médicale de base et à améliorer l'accès aux soins pour tous les Marocains.","date":"2026-06-15"},
{"title":"Maroc : Dr Imane Kendili porte le leadership africain lors du lancement du Manifeste Harm Reduction 2026 au Caire","url":"https://aujourdhui.ma/societe/harm-reduction-the-manifesto-2026-lemergence-dun-leadership-africain-sur-les-grandes-politiques-de-sante-publique","content":"Le Caire a accueilli le lancement officiel du Manifeste international Harm Reduction 2026 sur les nouvelles politiques internationales de santé publique, un événement réunissant des experts, décideurs politiques et acteurs de santé du monde entier avec une forte représentation africaine. La Dr Imane Kendili, PDG de Morocco Newspaper et présidente de l'ONG African Global Health, a participé en tant que figure centrale de cette initiative qui prône une approche de réduction des risques dans les politiques sanitaires mondiales. Le Pr Nicaise Ndembi, Directeur Général de l'International Vaccine Institute (IVI) Africa, était également présent, soulignant la dimension vaccinale et préventive des nouvelles orientations de santé publique défendues. Cet événement confirme la montée en puissance du Maroc et de ses experts en santé dans les débats internationaux sur les politiques de santé publique africaines.","date":"2026-06-10"},
{"title":"Réforme du système de santé marocain : les Groupements Sanitaires Territoriaux (GST) entrent en phase d'opérationnalisation progressive en 2026","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"La réforme de l'État social au Maroc franchit une étape décisive en 2026 avec l'opérationnalisation progressive des Groupements Sanitaires Territoriaux (GST), nouveaux outils de gouvernance visant à rationaliser l'offre de soins à l'échelle des régions. Parallèlement, le programme prévoit la rénovation et la modernisation de 90 hôpitaux existants et la construction de nouveaux Centres Hospitaliers Universitaires (CHU), dans le but de réduire les inégalités d'accès aux soins entre zones urbaines et rurales. La réforme s'accompagne de la généralisation des dossiers médicaux électroniques, levier numérique essentiel pour améliorer la continuité des soins et le suivi des patients à travers le système de santé national. Les experts soulignent que si l'ambition de la réforme est saluée, sa mise en œuvre se heurte à des résistances institutionnelles et à des défis structurels — notamment le manque de médecins spécialistes dans les régions éloignées — qui nécessiteront un accompagnement soutenu.","date":"2026-06-12"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},
],
"vaccins-monde":[
{"title":"Initiative Big Catch-Up de l'OMS : plus de 100 millions de vaccins administrés à 18,3 millions d'enfants dans 36 pays","url":"https://www.who.int/news/item/24-04-2026-largest-catch-up-initiative-delivers-over-100-million-childhood-vaccinations","content":"L'OMS a annoncé que l'initiative Big Catch-Up — la plus grande initiative mondiale de rattrapage vaccinal jamais lancée — avait permis d'administrer plus de 100 millions de doses de vaccins à environ 18,3 millions d'enfants dans 36 pays à travers le monde avant de conclure son programme en mars 2026. Lancée pour combler les retards de vaccination accumulés pendant et après la pandémie de COVID-19, cette initiative est en bonne voie pour atteindre son objectif final de 21 millions d'enfants rattrapés. Les pays d'Afrique subsaharienne figurent parmi les principaux bénéficiaires, ayant accueilli une part importante des équipes de vaccination mobiles déployées dans des zones rurales ou difficiles d'accès. L'OMS souligne que ce succès illustre la capacité des systèmes de santé à se mobiliser rapidement lorsque la volonté politique et les financements sont réunis, et appelle à capitaliser sur ces acquis pour renforcer durablement les systèmes de vaccination de routine.","date":"2026-04-24"},
{"title":"L'OMS reprend les campagnes préventives de vaccination anticholérique après trois ans d'interruption : le Mozambique premier bénéficiaire","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'OMS a annoncé le 4 février 2026 la reprise des campagnes de vaccination préventive contre le choléra, interrompues depuis plus de trois ans en raison d'une pénurie mondiale de vaccins anticholériques oraux (VCO). Le Mozambique a été le premier pays à bénéficier de la reprise des distributions, après avoir longtemps attendu cette possibilité dans un contexte de demande mondiale excédentaire. Cette décision fait suite à une augmentation significative de la production mondiale de VCO, qui a permis de reconstituer les stocks du Stockpile mondial géré conjointement par l'OMS et l'UNICEF. L'OMS rappelle que le choléra reste une menace de santé publique majeure dans de nombreux pays d'Afrique et d'Asie du Sud, et que la vaccination préventive — combinée à l'amélioration de l'accès à l'eau potable et à l'assainissement — demeure l'un des outils les plus efficaces pour contrôler les épidémies.","date":"2026-02-04"},
{"title":"OMS : le Comité consultatif mondial sur la sécurité des vaccins se réunit à Genève du 23 au 26 juin 2026","url":"https://polygonhealthanalytics.com/vaccine-news-may-27-june-03-2026-2026-06-03-13-40-31/","content":"Le Comité consultatif mondial de l'OMS sur la sécurité des vaccins (GACVS) tient sa réunion semestrielle à Genève du 23 au 26 juin 2026, réunissant des experts indépendants du monde entier pour évaluer les données de pharmacovigilance post-commercialisation des vaccins utilisés à l'échelle mondiale. Parmi les sujets à l'ordre du jour figurent l'évaluation des boosters COVID-19 mis à jour — des données publiées le 23 juin 2026 confirmant une protection additionnelle significative contre les hospitalisations —, ainsi que la surveillance des effets indésirables des nouveaux vaccins contre la dengue et le virus respiratoire syncytial (VRS). Le GACVS joue un rôle central dans le maintien de la confiance du public dans les vaccins en assurant une évaluation indépendante, rigoureuse et transparente des signaux de sécurité émergents. Ses recommandations guident les décisions de politique vaccinale des États membres de l'OMS et contribuent à la révision des étiquetages et des stratégies de vaccination à l'échelle mondiale.","date":"2026-06-23"},
{"title":"Africa CDC Weekly Briefing : surveillance épidémique et immunisation au cœur de l'agenda de sécurité sanitaire africaine","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors de son briefing spécial du 30 avril 2026 consacré à l'avancement de l'agenda de Sécurité et Souveraineté Sanitaire de l'Afrique (AHSS), Africa CDC a mis en lumière les efforts de renforcement des capacités de laboratoire régionaux, essentiels pour la surveillance des maladies infectieuses et la réponse vaccinale rapide. Le Directeur Général d'Africa CDC a notamment annoncé la signature d'un accord historique avec le gouvernement kenyan, qui alloue 10 acres de terrain et 2 millions de dollars pour le Centre de Coordination Régional de l'Afrique de l'Est à Nairobi. Ces infrastructures régionales sont cruciales pour coordonner les campagnes de vaccination d'urgence et le suivi épidémiologique à l'échelle continentale.","date":"2026-06-24"},
{"title":"Ebola Bundibugyo : l'absence de vaccins met en lumière l'urgence d'investir dans la R&D vaccinale mondiale","url":"https://www.cdc.gov/media/releases/2026/update-on-ebola-outbreak-in-the-democratic-republic-of-the-congo-and-uganda-6-5-2026.html","content":"L'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda expose une lacune critique : aucun vaccin ni traitement spécifique n'est disponible contre ce variant. Contrairement à l'Ebola Zaïre, pour lequel des vaccins homologués existent, le variant Bundibugyo reste sans réponse vaccinale validée. Les autorités sanitaires mondiales, dont le CDC américain et l'OMS, appellent à accélérer la recherche et le développement de vaccins contre les souches négligées du virus Ebola, soulignant que la prévention vaccinale demeure l'outil le plus efficace contre de futures flambées.","date":"2026-06-22"},
{"title":"Briefing OMS Afrique : la riposte vaccinale contre Ebola Bundibugyo au centre des discussions","url":"https://www.youtube.com/watch?v=Gp9tFTr5a9Y","content":"Lors du briefing presse virtuel de l'OMS Afrique du 4 juin 2026, les experts ont fait le point sur la stratégie de riposte à l'épidémie de maladie à virus Ebola de type Bundibugyo en RDC et en Ouganda. Les discussions ont notamment porté sur les outils de prévention disponibles, les protocoles de vaccination d'urgence et les défis du traçage des contacts dans les zones affectées. L'OMS a souligné l'importance du déploiement rapide des équipes de réponse et la nécessité de renforcer les capacités locales de gestion des épidémies. Les intervenants ont également évoqué les cas importés en Ouganda et les mesures de quarantaine mises en place, saluant la capacité des autorités ougandaises à détecter et isoler rapidement les cas suspects grâce aux protocoles de surveillance renforcés.","date":"2026-06-17"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
