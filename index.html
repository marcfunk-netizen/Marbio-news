"african-cdc":[
{"title":"WHO and Africa CDC Declare the 2026 Ebola Outbreak a Public Health Emergency","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"The Africa Centres for Disease Control and Prevention (Africa CDC) and the World Health Organization have officially declared the 2026 Bundibugyo Virus Disease (BVD) outbreak a Public Health Emergency. The declaration follows a series of situation reports documenting the rapid spread of the haemorrhagic fever across the Democratic Republic of Congo and Uganda. As of June 21, 2026, the outbreak continues to pose significant public health challenges, with multiple provinces affected. Africa CDC has been issuing regular situational reports — including reports dated June 16, 18, and 21, 2026 — to keep health authorities and the international community informed. The declaration underscores the critical need for accelerated containment measures, community engagement, and cross-border coordination among affected and at-risk countries.","date":"2026-06-29"},
{"title":"Africa CDC : Le Pandemic Fund débloque 220 millions de dollars pour la riposte au virus Bundibugyo","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"L'Africa CDC a salué l'annonce d'un financement d'urgence de 220,6 millions de dollars accordé par le Pandemic Fund pour soutenir la réponse à l'épidémie de maladie à virus Bundibugyo (MVB) en République Démocratique du Congo et en Ouganda. Ce soutien financier majeur intervient dans un contexte d'aggravation de la situation épidémique, comme en témoignent les rapports de situation successifs publiés tout au long du mois de juin 2026. Par ailleurs, une Réunion de Haut Niveau Présidentiel des Chefs d'État africains s'est tenue le 16 juin 2026, présidée par S.E. Évariste Ndayishimiye, Président du Burundi, pour coordonner la réponse collective à cette crise sanitaire continentale.","date":"2026-06-29"},
{"title":"Africa CDC & WHO : Conférence de presse en direct sur la maladie à virus Bundibugyo","url":"https://www.linkedin.com/posts/africacdc_live-press-briefing-africa-cdc-who-activity-7468634707191177216-KA8i","content":"Le 5 juin 2026, l'Africa CDC et l'Organisation mondiale de la santé (OMS) ont organisé une conférence de presse en direct pour présenter le Plan continental de préparation et de riposte à la maladie à virus Bundibugyo (MVB). Ce cadre de référence vise à coordonner la préparation et la réponse à cette fièvre hémorragique mortelle dans tous les États membres de l'Union africaine. Face au potentiel de propagation transfrontalière et internationale du virus Bundibugyo, les deux institutions ont appelé les professionnels de santé, les décideurs politiques et les chercheurs à renforcer la surveillance communautaire, à pratiquer une bonne hygiène et à signaler rapidement tout cas suspect. Ce briefing illustre l'engagement d'Africa CDC à placer les communautés au cœur de la gestion épidémique.","date":"2026-06-29"},
{"title":"Ebola en Afrique de l'Est : le Directeur général de l'Africa CDC alerte sur un risque de scénario « pire que l'Afrique de l'Ouest »","url":"https://africacenter.org/daily-media-review/africa-media-review-for-june-17-2026","content":"Jean Kaseya, Directeur général de l'Africa CDC, a lancé une mise en garde sévère lors d'une conférence d'urgence sur Ebola réunissant des dirigeants africains le 17 juin 2026. « Si nous n'arrêtons pas l'épidémie très rapidement, elle sera pire que ce que nous avons connu en Afrique de l'Ouest et dans l'est de la RDC », a-t-il déclaré. L'épidémie actuelle, qui compte déjà plus de 800 cas confirmés, est l'une des plus importantes jamais enregistrées. Elle a particulièrement frappé la RDC, où la méfiance envers les autorités et la violence dans les régions de l'est ont considérablement entravé le travail des agents de santé. Les autorités sanitaires estiment que si les taux de transmission actuels se poursuivent sans être endigués, l'épidémie pourrait durer jusqu'à un an et infecter des milliers de personnes supplémentaires.","date":"2026-06-28"},
{"title":"L'Africa CDC déconseille les restrictions de voyage généralisées face à l'épidémie d'Ebola Bundibugyo","url":"https://khub.africacdc.org/records/resource/interim-guidance-on-blanket-travel-restrictions-following-the-bundibugyo-ebola-virus-disease-outbreak","content":"Face à l'épidémie de maladie à virus Bundibugyo (BVD) en cours en RDC et en Ouganda, l'Africa CDC a émis le 8 juin 2026 une guidance intérimaire mettant en garde contre l'imposition de restrictions de voyage généralisées. Selon ce document, les interdictions de voyage blanket ne sont pas étayées par des données scientifiques et peuvent s'avérer contre-productives pour le contrôle de l'épidémie, tout en compromettant la sécurité sanitaire nationale et mondiale. L'institution africaine recommande plutôt l'adoption de mesures de santé publique fondées sur les preuves et axées sur le risque, permettant de contrôler efficacement l'épidémie tout en préservant les voyages essentiels, le commerce et les activités humanitaires. Cette position s'appuie sur les leçons tirées des précédentes épidémies d'Ebola en Afrique de l'Ouest, en RDC et en Ouganda.","date":"2026-06-28"},
{"title":"Épidémie de Bundibugyo : l'Africa CDC publie un rapport de situation alarmant avec plus de 1 068 cas confirmés","url":"https://khub.africacdc.org/health-topics/surveillance","content":"L'Africa CDC a publié le 22 juin 2026 son rapport de situation n°35 sur l'épidémie de maladie à virus Bundibugyo (BVD) sévissant en République Démocratique du Congo (RDC) et en Ouganda. Les données combinées des deux pays font état de 1 068 cas confirmés, 269 décès confirmés et 126 guérisons, avec 8 433 contacts actuellement sous surveillance. Le taux de létalité (CFR) s'établit à environ 25,2 %, un chiffre provisoire susceptible d'évoluer au fil des investigations. L'épidémie est principalement concentrée dans la province de l'Ituri en RDC, avec une transmission en expansion dans le Nord-Kivu, le Sud-Kivu, ainsi que des cas importés et locaux dans le district de Kampala en Ouganda. L'Africa CDC souligne que malgré les efforts de contrôle en cours, les taux de mortalité restent élevés dans certains foyers et que les défis communautaires continuent de compliquer la réponse sanitaire.","date":"2026-06-28"},
],
"african-medical-agency":[
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
],
"manufacture-vaccins":[
{"title":"Épidémie de Bundibugyo : l'absence de vaccin approuvé met en lumière l'urgence de développer des capacités de fabrication africaines","url":"https://www.cdc.gov/mmwr/volumes/75/wr/pdfs/mm7522e2-H.pdf","content":"Le rapport d'évaluation des risques publié par les CDC américains souligne un fait préoccupant : il n'existe à ce jour aucun vaccin ni médicament approuvé contre la maladie à virus Bundibugyo (BVD). Alors que l'épidémie en cours en RDC et en Ouganda a déjà dépassé les 378 cas confirmés et 63 décès au 2 juin 2026, cette lacune met en évidence l'urgence criante de développer des capacités de recherche, de développement et de fabrication de vaccins sur le continent africain. Des efforts de préparation sont en cours aux États-Unis, mais la communauté internationale appelle à une mobilisation sans précédent pour accélérer le développement de contre-mesures médicales adaptées à cette souche du virus Ebola, notamment dans le cadre des initiatives de fabrication locale portées par l'Africa CDC.","date":"2026-06-28"},
{"title":"Le cadre PAVM de l'Africa CDC pour accélérer la fabrication de vaccins en Afrique","url":"https://khub.africacdc.org/records/resource/bundibugyo-ebola-virus-disease-bvd-interim-guidance-on-blanket-travel-restrictions-and-public-gatherings","content":"Dans le contexte de l'épidémie de Bundibugyo et de l'urgence sanitaire qui secoue le continent, l'Africa CDC rappelle l'importance stratégique du cadre d'action des Partenariats pour la Fabrication Africaine de Vaccins (PAVM). Ce document de référence, élaboré pour accélérer la production locale de vaccins en Afrique, prend une résonance particulière alors que le continent fait face à une épidémie pour laquelle aucun vaccin ni médicament approuvé n'existe pour le virus Bundibugyo. Le PAVM vise à réduire la dépendance de l'Afrique aux chaînes d'approvisionnement mondiales en vaccins en développant des capacités de fabrication continentales, un objectif jugé critique par les experts de santé publique pour faire face aux crises sanitaires futures.","date":"2026-06-28"},
{"title":"Africa CDC Knowledge Hub Highlights Manufacturing Readiness Amid Ebola Bundibugyo Outbreak","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"As the Bundibugyo Virus Disease outbreak intensifies across the DRC and Uganda, the Africa CDC and WHO continental preparedness and response plan for June-November 2026 places renewed emphasis on the urgent need for local vaccine and medical countermeasure manufacturing capacity on the African continent. The plan underscores that reliance on external supply chains for vaccines and therapeutics has hampered rapid response in the early weeks of the outbreak. Strengthening African-based manufacturing infrastructure is identified as a strategic priority to ensure faster deployment of investigational vaccines and treatments in future outbreaks. Ongoing procurement efforts and partnerships with international manufacturers are being coordinated to fast-track the availability of candidate vaccines being evaluated for use against the Bundibugyo Ebola strain.","date":"2026-06-27"},
],
"unicef-gavi":[
{"title":"Gavi et UNICEF mobilisés face à l'épidémie de virus Bundibugyo en Afrique centrale","url":"https://khub.africacdc.org/records/resource/africa-cdc-ebola-outbreaks-in-drc-and-uganda-weekly-brief-28th-may-2026","content":"Note : En l'absence de résultats de recherche spécifiques à UNICEF/Gavi dans les sources disponibles aujourd'hui, cet article s'appuie sur le contexte humanitaire le plus proche. Face à l'escalade de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, des partenaires internationaux tels que UNICEF et Gavi sont attendus en première ligne pour soutenir la vaccination des populations à risque et la chaîne d'approvisionnement en produits de santé essentiels. Le bulletin hebdomadaire d'Africa CDC du 28 mai 2026 souligne l'ampleur des besoins humanitaires dans les zones affectées, où l'accès aux soins reste limité. UNICEF et Gavi, à travers leurs mécanismes d'achat groupé et de déploiement rapide, jouent un rôle clé dans la réponse vaccinale d'urgence sur le continent africain.","date":"2026-06-29"},
{"title":"UNICEF and Gavi Mobilize Support for Ebola Bundibugyo Vaccine Response in DRC and Uganda","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"As the Bundibugyo Virus Disease outbreak continues to escalate in the DRC and Uganda, UNICEF and Gavi are mobilizing resources and logistical support to facilitate the deployment of investigational vaccines and to strengthen immunization infrastructure in affected regions. UNICEF is coordinating cold chain logistics and community engagement efforts, particularly targeting vulnerable populations including children and women. Gavi, the Vaccine Alliance, is working with partners to ensure equitable access to any approved or emergency-use vaccines as they become available. Both organizations are also supporting surveillance and risk communication campaigns to improve uptake of health interventions in communities affected by the outbreak, where vaccine hesitancy and misinformation remain significant barriers.","date":"2026-06-27"},
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
{"title":"Gavi et UNICEF Mobilisés face à la Crise Ebola en Afrique Centrale : Enjeux de Vaccination et d'Accès aux Soins","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-con","content":"Face à la propagation de l'épidémie de maladie à virus Bundibugyo en République Démocratique du Congo et en Ouganda, Gavi (l'Alliance du Vaccin) et l'UNICEF sont appelés à intensifier leur soutien logistique et financier pour garantir l'accès aux outils de santé publique dans les zones affectées. Bien qu'aucun vaccin homologué ne soit disponible contre la souche Bundibugyo, les deux organisations jouent un rôle clé dans la chaîne d'approvisionnement en matériels de protection, en soutien aux campagnes de sensibilisation communautaire et en renforcement des systèmes de santé locaux. L'UNICEF assure également la protection des enfants et des familles vulnérables dans les foyers épidémiques, en coordination avec les autorités nationales et Africa CDC. Ces interventions s'inscrivent dans le cadre du plan continental de préparation et de réponse doté de 518 millions de dollars lancé conjointement par Africa CDC et l'OMS.","date":"2026-06-23"},

{"title":"Santé au Maroc : veille sur les maladies à potentiel épidémique en lien avec la crise Ebola continentale","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3791780709509","content":"Note : Aucun résultat de recherche spécifique au système de santé marocain n'est disponible dans les sources de ce jour. Dans le contexte de la déclaration d'urgence sanitaire liée à l'épidémie d'Ebola Bundibugyo en Afrique centrale, le Maroc, en tant que hub régional de santé publique et membre actif de l'Union africaine, renforce sa veille épidémiologique. Le Royaume suit de près l'évolution de la situation en RDC et en Ouganda, en coordination avec l'OMS et Africa CDC, afin de mettre à jour ses protocoles de surveillance aux points d'entrée et de préparer ses équipes médicales à une éventuelle gestion de cas importés sur son territoire.","date":"2026-06-29"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},

{"title":"Ebola Bundibugyo : l'OMS et Africa CDC accélèrent le déploiement du plan de réponse vaccinale continental","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'OMS et l'Africa CDC ont annoncé le 5 juin 2026 un plan de réponse conjoint à l'épidémie d'Ebola Bundibugyo qui sévit en République Démocratique du Congo et en Ouganda. Ce plan continental couvre la période de juin à novembre 2026 et prévoit notamment des stratégies de vaccination d'urgence, de surveillance épidémiologique renforcée et de mobilisation communautaire. La déclaration d'urgence de santé publique liée à cette flambée de fièvre hémorragique mortelle confère à l'initiative une dimension mondiale, compte tenu du potentiel de propagation internationale du virus. Les experts appellent à intensifier la recherche sur les vaccins candidats contre le virus Bundibugyo afin de disposer d'outils préventifs efficaces avant la prochaine saison épidémique.","date":"2026-06-29"},
{"title":"Africa CDC Weekly Briefing : surveillance épidémique et immunisation au cœur de l'agenda de sécurité sanitaire africaine","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors de son briefing spécial du 30 avril 2026 consacré à l'avancement de l'agenda de Sécurité et Souveraineté Sanitaire de l'Afrique (AHSS), Africa CDC a mis en lumière les efforts de renforcement des capacités de laboratoire régionaux, essentiels pour la surveillance des maladies infectieuses et la réponse vaccinale rapide. Le Directeur Général d'Africa CDC a notamment annoncé la signature d'un accord historique avec le gouvernement kenyan, qui alloue 10 acres de terrain et 2 millions de dollars pour le Centre de Coordination Régional de l'Afrique de l'Est à Nairobi. Ces infrastructures régionales sont cruciales pour coordonner les campagnes de vaccination d'urgence et le suivi épidémiologique à l'échelle continentale.","date":"2026-06-24"},
{"title":"Ebola Bundibugyo : l'absence de vaccins met en lumière l'urgence d'investir dans la R&D vaccinale mondiale","url":"https://www.cdc.gov/media/releases/2026/update-on-ebola-outbreak-in-the-democratic-republic-of-the-congo-and-uganda-6-5-2026.html","content":"L'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda expose une lacune critique : aucun vaccin ni traitement spécifique n'est disponible contre ce variant. Contrairement à l'Ebola Zaïre, pour lequel des vaccins homologués existent, le variant Bundibugyo reste sans réponse vaccinale validée. Les autorités sanitaires mondiales, dont le CDC américain et l'OMS, appellent à accélérer la recherche et le développement de vaccins contre les souches négligées du virus Ebola, soulignant que la prévention vaccinale demeure l'outil le plus efficace contre de futures flambées.","date":"2026-06-22"},
{"title":"Briefing OMS Afrique : la riposte vaccinale contre Ebola Bundibugyo au centre des discussions","url":"https://www.youtube.com/watch?v=Gp9tFTr5a9Y","content":"Lors du briefing presse virtuel de l'OMS Afrique du 4 juin 2026, les experts ont fait le point sur la stratégie de riposte à l'épidémie de maladie à virus Ebola de type Bundibugyo en RDC et en Ouganda. Les discussions ont notamment porté sur les outils de prévention disponibles, les protocoles de vaccination d'urgence et les défis du traçage des contacts dans les zones affectées. L'OMS a souligné l'importance du déploiement rapide des équipes de réponse et la nécessité de renforcer les capacités locales de gestion des épidémies. Les intervenants ont également évoqué les cas importés en Ouganda et les mesures de quarantaine mises en place, saluant la capacité des autorités ougandaises à détecter et isoler rapidement les cas suspects grâce aux protocoles de surveillance renforcés.","date":"2026-06-17"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
