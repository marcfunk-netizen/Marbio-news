var articlesData={
"african-cdc":[
{"title":"Bundibugyo 2026 : début du recrutement de patients pour le premier essai clinique de traitements","url":"https://www.who.int/emergencies/situations/ebola-outbreak---drc-2026","content":"Le 2 juillet 2026 a marqué une étape décisive dans la lutte contre la maladie à virus Bundibugyo (MVB) avec le lancement du recrutement de patients dans un essai clinique visant à identifier les premiers traitements efficaces contre ce pathogène. Cet essai, mené dans les zones affectées en RDC et en Ouganda, est historique pour une maladie frappant 1 460 cas confirmés et 452 décès recensés au 3 juillet 2026. L'Africa CDC, l'OMS et leurs partenaires scientifiques supervisent les aspects réglementaires et éthiques de cet essai, qui s'inscrit dans la riposte à une épidémie déclarée Urgence de Santé Publique de Portée Internationale. L'accès rapide à des traitements validés est jugé crucial pour briser les chaînes de transmission dans les zones minières mobiles et les corridors commerciaux où la transmission communautaire reste active.","date":"2026-07-02"},
{"title":"Africa CDC Launches Primary Health Care Digitalization Experts Committee to Advance Digital Governance","url":"https://africacdc.org/news/","content":"Africa CDC has officially launched its Primary Health Care Digitalization Experts Committee (PHC-DEC), a multidisciplinary body tasked with shaping the strategic roadmap for integrating digital tools into primary healthcare systems across the African continent. The committee brings together experts from diverse regions including health informatics, policy, and clinical practice. By embedding digital health governance into primary care, Africa CDC aims to strengthen real-time disease surveillance, improve patient data management, and enhance health service delivery for underserved populations. This initiative aligns with Africa CDC's 2022-2026 strategic plan, which identifies digital health as a critical enabler of continental health security and resilience.","date":"2026-06-28"},
{"title":"Africa CDC publie des rapports de situation sur la flambée de maladie à virus Bundibugyo en RDC et en Ouganda","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"Africa CDC continue de publier des rapports de situation réguliers sur la flambée de maladie à virus Bundibugyo (BVD) qui frappe plusieurs régions de la République démocratique du Congo et de l'Ouganda. Les derniers bulletins épidémiologiques datés de mai et juin 2026 font état d'une situation de santé publique préoccupante nécessitant une vigilance soutenue. L'institution rappelle l'importance cruciale de la surveillance génomique continue, notamment après qu'une étude a révélé l'échec potentiel de certains tests PCR courants sur un variant récent de Clade I de la Mpox en RDC. Ces rapports hebdomadaires s'inscrivent dans le cadre du Pilier I du Plan stratégique 2022-2026 d'Africa CDC, dédié à la surveillance et au renseignement épidémique.","date":"2026-07-04"},
{"title":"Africa CDC renforce sa présence régionale : un accord historique signé avec le Kenya pour le Centre de coordination Est-Africain","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors du Sommet mondial de la santé de Nairobi, Africa CDC a signé un mémorandum d'entente historique avec le gouvernement du Kenya pour la mise en place effective du Centre de coordination régional (RCC) pour l'Afrique de l'Est. Le Kenya s'est engagé à allouer 10 acres de terrain et à contribuer financièrement à hauteur de 2 millions de dollars pour accueillir ce bureau régional. Africa CDC dispose de cinq centres régionaux de coordination : Nairobi (Est), Nigeria (Ouest), Gabon (Centre), Zambie (Sud) et Le Caire (Nord). Le Directeur général d'Africa CDC a salué cet accord comme un exemple à suivre pour d'autres pays africains disposant des ressources nécessaires, rappelant que l'institution, fondée il y a à peine plus de dix ans, est « notre propre institution que nous devons nourrir ».","date":"2026-07-04"},
{"title":"Africa CDC reporte son point de presse hebdomadaire en soutien à la mission de l'UA en RDC face à l'Ebola","url":"https://www.facebook.com/africacdc/posts/-postponement-notice-weekly-press-briefingthis-weeks-briefing-has-been-postponed/1428976145927422","content":"Africa CDC a annoncé le report de son point de presse hebdomadaire habituel, invoquant la mobilisation de sa direction autour de la mission du Champion de l'Union africaine pour la Prévention, la Préparation et la Réponse aux pandémies (PPPR), S.E. le Président Cyril Ramaphosa, en République démocratique du Congo. Cette mission s'inscrit dans un élan de solidarité continentale face à la flambée épidémique d'Ebola en cours dans le pays. Le prochain briefing de presse est reprogrammé au jeudi 9 juillet 2026. Africa CDC présente ses excuses pour la gêne occasionnée et remercie le public pour son soutien constant.","date":"2026-07-04"},
{"title":"Africa CDC publie le Rapport de situation No. 29 sur la flambée du virus Bundibugyo","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"L'Africa CDC a publié son dernier rapport de situation sur la flambée de la maladie à virus Bundibugyo (BVD) en date du 29 juin 2026, confirmant la poursuite d'une transmission active dans les zones affectées en République démocratique du Congo et en Ouganda. Le rapport souligne que l'épidémie continue de poser des défis majeurs de santé publique et que des mesures prioritaires restent en vigueur : détection rapide et isolement des cas, renforcement de la prévention et du contrôle des infections, inhumations sécurisées et dignes, engagement communautaire et communication des risques adaptée aux réalités culturelles locales. L'Africa CDC insiste également sur l'urgence d'accélérer la recherche et le développement de vaccins et de thérapeutiques candidats contre le virus Bundibugyo, face à l'absence de produits médicaux validés disponibles à ce stade.","date":"2026-07-03"},
{"title":"Africa CDC and WHO AFRO Launch Continental Incident Management Support Team in Kampala","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Kampala, Uganda, 27 juin 2026 — L'Africa CDC et le Bureau régional de l'OMS pour l'Afrique (WHO AFRO) ont officiellement lancé une Équipe continentale de soutien à la gestion des incidents (Continental Incident Management Support Team) en présence du ministre ougandais de la Santé, le Dr Chris Baryomunsi. Cette initiative vise à renforcer le leadership africain dans la réponse aux urgences de santé publique, notamment face à la flambée de la maladie à virus Bundibugyo en RDC et en Ouganda. En parallèle, 13 pays africains se sont réunis à Kampala pour renforcer la préparation régionale contre cette maladie. ReliefWeb rapporte également qu'un atelier de cinq jours a réuni des responsables de programmes de neuf États membres de l'Union africaine au Caire, afin de renforcer leurs capacités techniques et opérationnelles dans la gestion des épidémies.","date":"2026-07-03"},
{"title":"WHO and Africa CDC Declare the 2026 Ebola Outbreak a Public Health Emergency of International Concern","url":"https://www.thelancet.com/journals/lancet/article/PIIS0140-6736(26)01101-3/fulltext","content":"The 2026 outbreak of Ebola virus disease in the Democratic Republic of Congo (DRC) and Uganda, caused by the Bundibugyo virus, has been jointly declared a Public Health Emergency of International Concern (PHEIC) by the World Health Organization (WHO) and a Public Health Emergency of Continental Security (PHECS) by the Africa Centres for Disease Control and Prevention (Africa CDC). Published in The Lancet, the declaration underscores the epidemiological and operational complexity of the outbreak, particularly transmission occurring in mobile mining zones, commercial corridors, and conflict-affected areas. Africa CDC and WHO officials warn that the global community is once again confronting a severe epidemic threat with inadequate validated diagnostics, therapeutics, and vaccines — a structural imbalance driven more by market incentives than epidemiological realities. Africa CDC Director-General Dr. Jean Kaseya and a Continental Ebola Incident Management Support Team are actively coordinating the response at operational, strategic, and political levels.","date":"2026-07-03"},
],
"african-medical-agency":[
{"title":"OMS et Agence Africaine des Médicaments signent un accord-cadre historique pour l'accès aux produits de santé de qualité","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"Le 21 mai 2026, l'OMS et l'Agence Africaine des Médicaments (AMA) ont signé un accord-cadre de collaboration historique visant à renforcer l'harmonisation réglementaire, la convergence et la reliance à l'échelle continentale. Cet accord structure un partenariat approfondi pour garantir l'accès aux médicaments, vaccins et produits de santé de qualité assurée en Afrique, en soutenant l'opérationnalisation de l'AMA comme institution continentale clé. Les deux organisations s'engagent à renforcer les capacités des autorités réglementaires nationales des États membres de l'UA, à harmoniser les procédures d'approbation et à accélérer l'enregistrement des médicaments essentiels. Dans le contexte de l'épidémie de Maladie à Virus Bundibugyo, cet accord est jugé d'autant plus crucial pour accélérer l'évaluation et l'autorisation d'usage d'urgence des candidats-vaccins et thérapeutiques.","date":"2026-05-21"},
{"title":"African Medicines Agency and US FDA Sign Cooperation Agreement to Advance Science-Based Medicine Regulation","url":"https://techreviewafrica.com/news/5987/african-medicines-agency-and-us-fda-sign-cooperation-agreement","content":"The African Medicines Agency (AMA) and the United States Food and Drug Administration (FDA) signed a Statement of Cooperation in June 2026, establishing a formal framework for collaboration focused on improving the safety, quality, and efficacy of medical products in Africa through science-based regulatory approaches. The agreement covers technical assistance, information exchange, training of regulatory personnel, and collaborative assessments of pharmaceutical products including vaccines and biologics. This milestone partnership strengthens the AMA's regulatory capacities by enabling African regulators to benefit from the FDA's extensive scientific expertise and institutional knowledge. It also signals growing international confidence in the AMA as a credible continental regulatory body capable of partnering with the world's leading health agencies.","date":"2026-06-10"},
{"title":"L'AMA et la Pharmacopée des États-Unis formalisent leur partenariat à Johannesburg pour renforcer la qualité pharmaceutique en Afrique","url":"https://www.cleanroomtechnology.com/african-medicines-agency-and-usp-sign-agreement-to","content":"L'Agence Africaine des Médicaments (AMA) et la Pharmacopée des États-Unis (USP) ont signé un mémorandum d'entente le 29 avril 2026 à Johannesburg, formalisant un partenariat stratégique pour renforcer la régulation des médicaments, les systèmes d'assurance qualité et les capacités de fabrication pharmaceutique sur le continent africain. L'accord prévoit une coopération technique en matière de développement de normes de qualité, de formation des inspecteurs pharmaceutiques et de renforcement des laboratoires de contrôle dans les États membres de l'Union africaine. La USP, reconnue mondialement pour l'établissement des normes de qualité des médicaments, apportera son expertise scientifique pour appuyer l'AMA dans la mise en place d'un système continental d'assurance qualité. Ce partenariat contribue à l'objectif de l'AMA de garantir que les produits de santé circulant en Afrique respectent les standards internationaux les plus élevés.","date":"2026-04-29"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
],
"manufacture-vaccins":[
{"title":"Africa Moves Ahead with Vaccine Manufacturing Ambitions: Gavi Makes First Cash Disbursements to African Producer","url":"https://www.semafor.com/article/07/02/2026/africa-moves-ahead-with-vaccine-manufacturing-ambitions","content":"Africa is making significant strides toward its goal of producing 60% of its vaccines locally by 2040, with Gavi making its first cash disbursements to an African manufacturer through the African Vaccine Manufacturing Accelerator (AVMA) in 2026. Eleven African-made vaccines covering eight antigens — including measles-rubella, rotavirus, and yellow fever — are expected to reach the continental market within five years. South Africa's Biovac has secured financing from the International Finance Corporation (IFC), the European Investment Bank (EIB), and the European Commission to build an end-to-end vaccine manufacturing facility. However, the Clinton Health Access Initiative's 2026 supply landscape report warns that regulatory delays, uncertain market demand, slow financing disbursement, technology transfer delays, and workforce gaps risk pushing timelines back for near-to-market manufacturers.","date":"2026-07-02"},
{"title":"L'Égypte lance la première plateforme africaine de production d'ARNm : EVA Pharma s'associe à des partenaires européens","url":"https://onlinelibrary.wiley.com/doi/full/10.1002/hsr2.71926","content":"L'Égypte s'apprête à accueillir la première plateforme africaine de production d'ARNm de bout en bout, grâce à un partenariat entre EVA Pharma et trois sociétés européennes de biotechnologie : DNA Script (France), Quantoom Biosciences (Belgique) et Unizima (Belgique). Cette plateforme de type numérique-vers-biologiques permettra de convertir des séquences d'ADN numériques en vaccins à ARNm directement sur le continent africain, réduisant la dépendance aux importations. Ce projet constitue une étape majeure dans la réalisation des ambitions africaines de souveraineté vaccinale et biotechnologique. La maîtrise de la technologie ARNm à l'échelle africaine offrirait la capacité de répondre rapidement à de futures épidémies, comme l'illustre l'urgence créée par l'absence de vaccins contre le virus Bundibugyo.","date":"2026-06-15"},
{"title":"Fabrication vaccinale en Afrique : les défis structurels persistent malgré des financements record, selon la CHAI","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"Le rapport 2026 de la Clinton Health Access Initiative (CHAI) sur le paysage de la fabrication vaccinale en Afrique révèle une réalité nuancée : si 10 des 11 fabricants africains disposent de capacités opérationnelles de remplissage-conditionnement (fill and finish), seuls 5 peuvent produire la substance active vaccinale et 3 disposent de capacités de R&D propres. Cinq obstacles transversaux freinent les progrès : les retards réglementaires, l'incertitude de la demande de marché, la lenteur des décaissements financiers, les délais des partenaires de transfert de technologie et les lacunes en ressources humaines qualifiées. Le rapport souligne que la demande prévisible, les accords de transfert technologique, une main-d'œuvre formée, les agréments réglementaires et un financement mixte (dons, prêts concessionnels, dette commerciale et garanties) sont indispensables pour que l'Afrique atteigne son objectif d'autosuffisance vaccinale d'ici 2040.","date":"2026-06-20"},
{"title":"Projections de scénarios modélisés pour la flambée d'Ebola à virus Bundibugyo 2026 : quelles implications pour la production de contre-mesures médicales ?","url":"https://www.cdc.gov/mmwr/volumes/75/wr/mm7522e1.htm","content":"Une étude publiée dans le MMWR présente des projections de scénarios modélisés pour la flambée de maladie à virus Bundibugyo (BVD) en 2026, adaptée d'un modèle utilisé lors de précédentes épidémies de fièvres hémorragiques virales, dont la flambée de Marburg en Éthiopie en 2025. Les simulations, initialisées à partir d'un seul cas index, évaluent le nombre cumulatif de cas et de décès sur une période de 90 jours suivant le début des interventions. Ces modélisations sont cruciales pour les décideurs de santé publique et les fabricants de vaccins et de thérapeutiques, car elles permettent d'anticiper les besoins en doses, d'optimiser les chaînes d'approvisionnement et de prioriser la production de contre-mesures médicales adaptées au virus Bundibugyo, pour lequel les stocks de vaccins expérimentaux demeurent extrêmement limités.","date":"2026-07-04"},
{"title":"Ebola Bundibugyo 2026 : l'absence de vaccins validés relance le débat sur la production locale en Afrique","url":"https://khub.africacdc.org","content":"La flambée de maladie à virus Bundibugyo en RDC et en Ouganda met en lumière un déficit critique dans la fabrication mondiale de vaccins : il n'existe à ce jour aucun vaccin ni traitement validé contre le virus Bundibugyo (Orthoebolavirus bundibugyoense). L'Africa CDC et l'OMS appellent à une accélération urgente des efforts de recherche et développement ainsi que de la production de candidats-vaccins. Ce contexte remet sur la table la nécessité pour l'Afrique de développer ses propres capacités de fabrication vaccinale, un objectif central de l'agenda « santé, sécurité et souveraineté » porté par le Directeur général de l'Africa CDC, le Dr Jean Kaseya. La dépendance aux marchés pharmaceutiques occidentaux, guidés par des logiques d'incitation commerciale plutôt qu'épidémiologiques, est pointée du doigt comme une faille structurelle majeure du système mondial de sécurité sanitaire.","date":"2026-07-03"},
{"title":"Épidémie Bundibugyo : l'absence de vaccins approuvés met en lumière les lacunes industrielles africaines","url":"https://www.doctorswithoutborders.org/latest/ebola-disease-outbreak-2026-how-msf-responding","content":"L'épidémie de Maladie à Virus Bundibugyo en cours en RDC et en Ouganda révèle une faille critique dans l'écosystème de fabrication vaccinale mondial : contrairement aux souches Zaïre ou Soudan du virus Ebola, le virus Bundibugyo ne dispose d'aucun vaccin ni traitement approuvé. Selon Médecins Sans Frontières (MSF), qui opère des centres de prise en charge en première ligne, cette lacune s'explique notamment par le fait que les fabricants pharmaceutiques ne produisent pas en quantités suffisantes les kits de diagnostic spécialisés pour ce pathogène rare, faute de marché commercial suffisant. Cette situation illustre l'échec des mécanismes traditionnels du marché à préparer des contre-mesures médicales pour les maladies négligées, et renforce les appels à mettre en place des capacités de fabrication rapide et flexible sur le continent africain, capables de répondre aux épidémies émergentes.","date":"2026-07-02"},
{"title":"CPHIA 2026 : l'Afrique mise sur l'innovation et la fabrication locale de vaccins pour sa souveraineté sanitaire","url":"https://cphia.africacdc.org","content":"La 5e Conférence internationale sur la santé publique en Afrique (CPHIA 2026), prévue à Addis-Abeba avec plus de 30 000 délégués, mettra en lumière les avancées africaines en matière de fabrication locale de vaccins et de technologies de santé. Parmi les thématiques phares figure l'institutionnalisation de la prévention et de la préparation aux pandémies, incluant le développement de capacités de production continentale. Un espace d'exposition Innovation Showcase permettra de découvrir les solutions biotechnologiques africaines émergentes. Des bourses de voyage sont disponibles jusqu'au 15 août 2026 pour les chercheurs souhaitant soumettre leurs travaux sur la fabrication de produits médicaux et vaccinaux.","date":"2026-07-01"},
],
"unicef-gavi":[
{"title":"UNICEF et Gavi lancent un appel aux fabricants pour accélérer l'accès aux vaccins contre le virus Bundibugyo","url":"https://www.unicef.org/press-releases/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"Face à l'escalade de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, UNICEF et Gavi ont lancé conjointement un appel urgent aux fabricants pharmaceutiques pour accélérer le développement et l'accès à des vaccins candidats contre ce pathogène. Cet appel à manifestation d'intérêt invite les fabricants à soumettre leurs candidats-vaccins en vue d'une évaluation accélérée pour usage d'urgence. UNICEF, chargé de la coordination des achats et de la logistique de la chaîne du froid, et Gavi, qui finance l'accès équitable aux vaccins dans les pays à revenu faible et intermédiaire, unissent leurs forces pour un déploiement rapide dès qu'une solution sera disponible. Cette initiative intervient alors qu'il n'existe aucun vaccin ni traitement homologué contre le virus Bundibugyo, contrairement aux souches Zaïre ou Soudan pour lesquelles des vaccins approuvés existent.","date":"2026-06-28"},
{"title":"Gavi 6.0 (2026-2030) : vacciner plus de 500 millions d'enfants supplémentaires et sauver 8 à 9 millions de vies","url":"https://www.gavi.org/our-alliance/strategy/phase-6-2026-2030","content":"Gavi, l'Alliance du Vaccin, a lancé sa stratégie de sixième phase (2026-2030), baptisée Gavi 6.0, avec l'ambition de vacciner plus de 500 millions d'enfants et adolescents supplémentaires et de sauver entre 8 et 9 millions de vies supplémentaires au cours des cinq prochaines années. Parmi les priorités figurent l'élargissement de la couverture vaccinale contre le papillomavirus humain (HPV) pour protéger 1,5 million de vies contre le cancer du col de l'utérus, le renforcement de la sécurité de l'approvisionnement en vaccins à l'échelle régionale avec une attention particulière pour l'Afrique, et la consolidation des systèmes de vaccination fragilisés par la pandémie de COVID-19. Gavi 6.0 prévoit également une contribution substantielle au développement de la fabrication vaccinale africaine à travers le mécanisme AVMA, dont les premiers décaissements ont été effectués en 2026.","date":"2026-04-01"},
{"title":"Africa's Routine Vaccine Systems Deliver Gains Against Cancer and Malaria, But Funding Pressures Loom","url":"https://www.gavi.org/news/media-room/africas-routine-vaccine-systems-deliver-gains-against-cancer-and-malaria-funding","content":"Africa's routine immunization systems are delivering meaningful public health gains: HPV vaccine coverage has expanded significantly across sub-Saharan Africa, protecting girls against cervical cancer, while the malaria vaccine (RTS,S) programme has delivered more than 52 million doses since 2023 across high-burden, fragile, and operationally complex settings. New evidence published in 2026 confirms that the malaria vaccine saves child lives at a rate of one in eight deaths averted among eligible children in Ghana, Kenya, and Malawi over four years of implementation. Despite these gains, Gavi warns that funding pressures — including unmet pledges and competing health priorities — could jeopardize the sustainability of routine immunization programmes in the most vulnerable countries, potentially reversing hard-won coverage gains built over the past two decades.","date":"2026-05-20"},
{"title":"Gavi et UNICEF mobilisés face à l'épidémie de virus Bundibugyo en Afrique centrale","url":"https://khub.africacdc.org/records/resource/africa-cdc-ebola-outbreaks-in-drc-and-uganda-weekly-brief-28th-may-2026","content":"Note : En l'absence de résultats de recherche spécifiques à UNICEF/Gavi dans les sources disponibles aujourd'hui, cet article s'appuie sur le contexte humanitaire le plus proche. Face à l'escalade de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, des partenaires internationaux tels que UNICEF et Gavi sont attendus en première ligne pour soutenir la vaccination des populations à risque et la chaîne d'approvisionnement en produits de santé essentiels. Le bulletin hebdomadaire d'Africa CDC du 28 mai 2026 souligne l'ampleur des besoins humanitaires dans les zones affectées, où l'accès aux soins reste limité. UNICEF et Gavi, à travers leurs mécanismes d'achat groupé et de déploiement rapide, jouent un rôle clé dans la réponse vaccinale d'urgence sur le continent africain.","date":"2026-06-29"},
{"title":"UNICEF and Gavi Mobilize Support for Ebola Bundibugyo Vaccine Response in DRC and Uganda","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"As the Bundibugyo Virus Disease outbreak continues to escalate in the DRC and Uganda, UNICEF and Gavi are mobilizing resources and logistical support to facilitate the deployment of investigational vaccines and to strengthen immunization infrastructure in affected regions. UNICEF is coordinating cold chain logistics and community engagement efforts, particularly targeting vulnerable populations including children and women. Gavi, the Vaccine Alliance, is working with partners to ensure equitable access to any approved or emergency-use vaccines as they become available. Both organizations are also supporting surveillance and risk communication campaigns to improve uptake of health interventions in communities affected by the outbreak, where vaccine hesitancy and misinformation remain significant barriers.","date":"2026-06-27"},
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
],
"sante-maroc":[
{"title":"Maroc : budget santé 2026 en hausse de 30% à 42,4 milliards de dirhams et création de 8 000 nouveaux postes","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le ministère marocain de la Santé et de la Protection sociale dispose en 2026 d'un budget record de 42,4 milliards de dirhams, en hausse de 30% par rapport à l'exercice précédent, dont 16,4 milliards alloués aux dépenses de personnel. Ce budget permettra la création de 8 000 nouveaux postes budgétaires, un effort sans précédent destiné à remédier aux pénuries chroniques de professionnels de santé dans les structures publiques marocaines. La réforme du secteur s'accélère avec la généralisation progressive des groupements sanitaires territoriaux (GST), la mise à niveau de 90 hôpitaux publics et l'extension de la couverture médicale de base (AMO). Ces investissements massifs s'inscrivent dans la Vision royale de généralisation de la protection sociale lancée en 2021, dont la santé constitue un pilier fondamental et stratégique.","date":"2026-01-20"},
{"title":"Réforme sanitaire au Maroc : généralisation des groupements sanitaires territoriaux et feuille de soins électronique en 2026","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"L'année 2026 marque une étape charnière pour la réforme du système de santé marocain avec la généralisation progressive des groupements sanitaires territoriaux (GST), des entités de gestion intégrée regroupant les établissements de soins de santé primaires et les hôpitaux de proximité au niveau régional. En parallèle, le ministère de la Santé poursuit le déploiement de la feuille de soins électronique, visant à simplifier l'accès aux remboursements et à renforcer l'interopérabilité entre les structures de santé publiques et privées. Si ces réformes ambitieuses suscitent des résistances de la part de certains syndicats, elles sont saluées par les experts comme une transformation structurelle nécessaire pour moderniser un système de santé longtemps sous-financé. Le Maroc ambitionne ainsi d'aligner son système de protection sociale sur les standards des pays à revenu intermédiaire supérieur.","date":"2026-06-10"},
{"title":"Maroc : mise en service prochaine de nouveaux CHU à Agadir et Laâyoune, et achèvement du CHU Ibn Sina de Rabat","url":"https://www.leconomiste.com/sante-les-chantiers-2026/","content":"Le Maroc avance dans la construction et la rénovation de ses infrastructures hospitalières universitaires : l'achèvement des travaux du Centre Hospitalier Universitaire (CHU) Ibn Sina de Rabat figure parmi les chantiers prioritaires de 2026, aux côtés de la mise en service prochaine de deux nouveaux CHU à Agadir et à Laâyoune. Ces établissements de référence renforceront l'offre de soins spécialisés dans les régions du Souss-Massa et du Sahara marocain, contribuant à réduire les disparités régionales d'accès aux soins tertiaires. Par ailleurs, le programme de mise à niveau et rénovation de 90 hôpitaux publics se poursuit sur l'ensemble du territoire, dans le cadre du Plan d'Accélération de la Transformation du Système de Santé (PATS). Ces investissements infrastructurels sont jugés indispensables pour absorber l'afflux de patients lié à la généralisation de l'AMO (Assurance Maladie Obligatoire).","date":"2026-03-15"},
{"title":"Le Maroc consolide son système de santé publique à l'aune des défis épidémiques continentaux","url":"https://microbiotics.com.ng/africa-cdc-strategic-plan-2022-2026?pdf=4936","content":"Dans un contexte de flambées épidémiques récurrentes sur le continent africain, le Maroc renforce ses dispositifs de veille sanitaire et de réponse aux urgences de santé publique. Le Royaume s'appuie sur son réseau de laboratoires de référence et sur ses partenariats avec des institutions internationales telles qu'Africa CDC et l'OMS pour détecter précocement toute menace épidémique. Le Plan stratégique 2022-2026 d'Africa CDC, qui prévoit un Centre de coordination régional pour l'Afrique du Nord basé au Caire, constitue une opportunité pour le Maroc de renforcer son intégration dans l'architecture continentale de sécurité sanitaire. Les autorités marocaines veillent par ailleurs à maintenir des capacités de prise en charge des maladies à potentiel épidémique importées, dans le respect des Règlements sanitaires internationaux.","date":"2026-07-04"},
{"title":"Santé au Maroc : veille sur les maladies à potentiel épidémique en lien avec la crise Ebola continentale","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3791780709509","content":"Note : Aucun résultat de recherche spécifique au système de santé marocain n'est disponible dans les sources de ce jour. Dans le contexte de la déclaration d'urgence sanitaire liée à l'épidémie d'Ebola Bundibugyo en Afrique centrale, le Maroc, en tant que hub régional de santé publique et membre actif de l'Union africaine, renforce sa veille épidémiologique. Le Royaume suit de près l'évolution de la situation en RDC et en Ouganda, en coordination avec l'OMS et Africa CDC, afin de mettre à jour ses protocoles de surveillance aux points d'entrée et de préparer ses équipes médicales à une éventuelle gestion de cas importés sur son territoire.","date":"2026-06-29"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
],
"vaccins-monde":[
{"title":"COVID-19 : l'OMS recommande le variant LP.8.1 comme nouvel antigène vaccinal pour les prochaines formulations mondiales","url":"https://www.who.int/news/item/16-05-2026-statement-on-the-antigen-composition-of-covid-19-vaccines","content":"Le groupe consultatif technique sur la composition des vaccins COVID-19 (TAG-CO-VAC) de l'OMS a recommandé en mai 2026 l'adoption du variant LP.8.1 comme antigène monovalent pour les prochaines formulations de vaccins contre le COVID-19. Cette recommandation guide les fabricants dans la mise à jour de leurs vaccins et fait suite à la réunion du SAGE de mars 2026, au cours de laquelle les experts ont actualisé les recommandations de vaccination en ciblant prioritairement les personnes âgées et les groupes à risque élevé de formes graves. La mise à jour régulière de la composition antigénique des vaccins COVID-19 est essentielle pour maintenir leur efficacité face à l'évolution continue du SARS-CoV-2 et de ses variants circulants. Les fabricants sont invités à adapter leurs productions pour le cycle vaccinal de l'hémisphère nord 2026-2027.","date":"2026-05-16"},
{"title":"Choléra : l'OMS annonce la reprise des campagnes de vaccination préventive après doublement de la production mondiale à 70 millions de doses","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'OMS a annoncé le 4 février 2026 la reprise des campagnes de vaccination préventive contre le choléra, suspendues depuis plus de trois ans en raison d'une pénurie mondiale critique. La production annuelle mondiale de vaccins oraux contre le choléra (VCO) a doublé, passant de 35 millions de doses en 2022 à près de 70 millions de doses en 2025, atteignant un seuil suffisant pour relancer les campagnes préventives. Le Mozambique est le premier pays à redémarrer ses campagnes préventives, offrant enfin une protection proactive à des populations particulièrement vulnérables aux flambées épidémiques. Cette avancée intervient après une période difficile où une explosion mondiale des cas de choléra avait épuisé les stocks et contraint l'OMS à prioriser strictement les seuls usages réactifs d'urgence.","date":"2026-02-04"},
{"title":"Grande Remise à Niveau Vaccinale : 100 millions de doses administrées à 18,3 millions d'enfants dans 36 pays","url":"https://www.who.int/news/item/24-04-2026-largest-catch-up-initiative-delivers-over-100-million-childhood-vaccinations","content":"La Grande Initiative de Rattrapage Vaccinal (Big Catch-Up), lancée conjointement par l'OMS, l'UNICEF, Gavi et leurs partenaires pour combler le recul de la couverture vaccinale dû à la pandémie de COVID-19, a atteint un bilan historique en mars 2026 : plus de 100 millions de doses de vaccins essentiels ont été administrées à environ 18,3 millions d'enfants de 1 à 5 ans dans 36 pays. L'initiative est en bonne voie pour atteindre son objectif de rattrapage de 21 millions d'enfants non ou sous-vaccinés, représentant le plus grand effort de rattrapage vaccinal multilatéral jamais réalisé. Des millions d'enfants ont ainsi pu recevoir des vaccins contre la rougeole, la diphtérie, le tétanos, la coqueluche et d'autres maladies évitables, reconstruisant une immunité collective fragilisée par plusieurs années de perturbations sanitaires mondiales.","date":"2026-04-24"},
{"title":"Africa CDC lance la 5e Conférence internationale sur la santé publique en Afrique (CPHA 2026)","url":"https://www.youtube.com/watch?v=0m1yPcfq680","content":"L'Africa CDC et le gouvernement éthiopien s'apprêtent à lancer officiellement la 5e Conférence internationale sur la santé publique en Afrique (CPHA 2026), décrite comme le plus grand événement de santé publique du continent. Lors d'un briefing spécial diffusé le 7 mai 2026, les responsables de l'Africa CDC ont annoncé que la vaccination contre le mpox et d'autres activités de surveillance figurent parmi les priorités opérationnelles de l'organisation. Par ailleurs, 13 pays africains se sont réunis à Brazzaville, au siège du bureau régional de l'OMS pour l'Afrique, pour signer un mémorandum d'entente visant à renforcer la surveillance transfrontalière et la préparation aux épidémies, une initiative susceptible de transformer la réponse vaccinale et épidémiologique dans les régions d'Afrique centrale, orientale, septentrionale, méridionale et occidentale.","date":"2026-07-03"},
{"title":"Maladies fongiques : Africa CDC et GAFFI appellent à une stratégie vaccinale et diagnostique renforcée sur le continent","url":"https://www.instagram.com/reel/DV8ENATglhc","content":"Lors du premier Sommet africain sur les maladies fongiques, co-organisé par Africa CDC et la Global Action For Fungal Infections (GAFFI), les participants ont appelé à élever ces pathologies souvent négligées au rang de priorité mondiale en matière de santé publique. Les experts ont plaidé pour le renforcement de la surveillance, l'amélioration des diagnostics et l'expansion des traitements, tout en pointant l'urgence de soutenir la recherche et le développement de nouveaux outils thérapeutiques et préventifs, y compris des pistes vaccinales. La résistance aux antifongiques, phénomène croissant sur le continent africain, a été identifiée comme une menace émergente nécessitant une réponse coordonnée à l'échelle mondiale, à l'image des stratégies développées contre la résistance aux antimicrobiens.","date":"2026-07-01"},
{"title":"OMS et partenaires : la course aux vaccins contre le virus Bundibugyo s'intensifie","url":"https://www.youtube.com/watch?v=f7_MV__2HxI","content":"Lors du briefing spécial de l'Africa CDC du 11 juin 2026, le Dr Kaseya et les experts de l'équipe de soutien à la gestion des incidents (IMST) ont mis en lumière l'urgence d'accélérer la recherche et le développement de vaccins contre le virus Bundibugyo, pour lequel il n'existe à ce jour aucun vaccin homologué. L'OMS, en collaboration avec Africa CDC et des organisations de santé animale, travaille sur une approche « One Health » pour identifier les réservoirs animaux du virus, information cruciale pour le développement de candidats vaccins efficaces. Des essais cliniques en mode accéléré sont envisagés dans les zones affectées, sous réserve de l'obtention des autorisations réglementaires nécessaires. La communauté scientifique internationale est appelée à intensifier ses efforts de recherche vaccinale face à ce que l'Africa CDC qualifie de potentiellement pire épidémie d'Ebola jamais enregistrée sur le continent.","date":"2026-06-30"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
