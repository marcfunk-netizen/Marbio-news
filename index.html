var articlesData={
"african-cdc":[
{"title":"Africa CDC et WHO AFRO lancent une équipe continentale unifiée de gestion des incidents face à l'épidémie d'Ebola","url":"https://africacdc.org/news-item/africa-cdc-and-who-afro-launch-continental-incident-management-support-team-to-strengthen-africas-leadership-in-public-health-emergency-response/","content":"Le 27 juin 2026 à Kampala en Ouganda, l'Africa CDC et le Bureau régional de l'OMS pour l'Afrique (WHO AFRO) ont officiellement lancé l'Équipe continentale de Soutien à la Gestion des Incidents (IMST), une plateforme opérationnelle unifiée destinée à renforcer la capacité africaine à coordonner les urgences sanitaires. Organisée autour des principes « une équipe, un plan, un budget », l'IMST rassemble des experts en surveillance épidémiologique, systèmes de laboratoire, gestion des cas, logistique d'urgence et coordination des partenaires pour soutenir la riposte à l'épidémie de maladie à virus Ebola Bundibugyo en RDC et en Ouganda, couvrant également les pays voisins à risque via une assistance technique intégrée et des réseaux de laboratoires transfrontaliers renforcés. Ce lancement marque une étape historique dans le renforcement de la souveraineté sanitaire africaine, permettant au continent de diriger lui-même la réponse aux urgences de santé publique complexes. L'IMST constitue un élément central du plan continental conjoint Africa CDC-OMS de 518 millions de dollars et du dispositif « One Response » mis en place pour contenir l'épidémie.","date":"2026-06-29"},
{"title":"Africa CDC Weekly Brief 8-14 juin 2026 : appel urgent au renforcement du dépistage aux frontières africaines","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-8-14-june-2026/","content":"Dans son bulletin hebdomadaire couvrant la période du 8 au 14 juin 2026, l'Africa CDC dresse un état des lieux de la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda et intensifie ses recommandations aux États membres de l'Union africaine. L'institution appelle tous les pays à renforcer immédiatement le dépistage à la sortie dans les aéroports, ports maritimes et principaux postes frontières terrestres afin de réduire le risque de transmission transfrontalière. Le bulletin détaille également les mesures de coordination intégrée avec les pays voisins à risque, incluant des formations accélérées des personnels de santé frontaliers aux protocoles de détection précoce des fièvres hémorragiques virales. Ces orientations s'inscrivent dans le cadre du plan continental conjoint Africa CDC-OMS de 518 millions de dollars lancé début juin 2026, qui mobilise les États africains dans une approche unifiée de riposte épidémique.","date":"2026-06-14"},
{"title":"Africa CDC exhorte les États membres à renforcer les mesures de santé publique aux points d'entrée face à l'épidémie d'Ebola Bundibugyo","url":"https://www.globalsecurity.org/security/library/news/2026/06/sec-260610-africacdc02.htm","content":"Le 10 juin 2026, l'Africa CDC a lancé un appel urgent à l'ensemble des États membres de l'Union africaine pour renforcer immédiatement les mesures de dépistage aux frontières et les protocoles de santé publique dans les points d'entrée internationaux, face à la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda. L'institution recommande la mise en place de contrôles renforcés dans les aéroports, ports maritimes et postes frontières terrestres, avec des protocoles clairs de détection, d'isolement et de référence pour les voyageurs présentant des symptômes compatibles avec une fièvre hémorragique virale. Cet appel intervient alors que l'épidémie comptait des centaines de cas confirmés et que la transmission communautaire s'intensifiait dans plusieurs provinces de l'est de la RDC. L'Africa CDC insiste sur l'urgence d'un partage d'informations épidémiologiques rapide entre les pays voisins pour anticiper et prévenir tout débordement transfrontalier.","date":"2026-06-10"},
{"title":"Ebola en Afrique de l'Est : le Directeur général de l'Africa CDC alerte sur un risque de scénario « pire que l'Afrique de l'Ouest »","url":"https://africacenter.org/daily-media-review/africa-media-review-for-june-17-2026","content":"Jean Kaseya, Directeur général de l'Africa CDC, a lancé une mise en garde sévère lors d'une conférence d'urgence sur Ebola réunissant des dirigeants africains le 17 juin 2026. « Si nous n'arrêtons pas l'épidémie très rapidement, elle sera pire que ce que nous avons connu en Afrique de l'Ouest et dans l'est de la RDC », a-t-il déclaré. L'épidémie actuelle, qui compte déjà plus de 800 cas confirmés, est l'une des plus importantes jamais enregistrées. Elle a particulièrement frappé la RDC, où la méfiance envers les autorités et la violence dans les régions de l'est ont considérablement entravé le travail des agents de santé. Les autorités sanitaires estiment que si les taux de transmission actuels se poursuivent sans être endigués, l'épidémie pourrait durer jusqu'à un an et infecter des milliers de personnes supplémentaires.","date":"2026-06-28"},
{"title":"L'Africa CDC déconseille les restrictions de voyage généralisées face à l'épidémie d'Ebola Bundibugyo","url":"https://khub.africacdc.org/records/resource/interim-guidance-on-blanket-travel-restrictions-following-the-bundibugyo-ebola-virus-disease-outbreak","content":"Face à l'épidémie de maladie à virus Bundibugyo (BVD) en cours en RDC et en Ouganda, l'Africa CDC a émis le 8 juin 2026 une guidance intérimaire mettant en garde contre l'imposition de restrictions de voyage généralisées. Selon ce document, les interdictions de voyage blanket ne sont pas étayées par des données scientifiques et peuvent s'avérer contre-productives pour le contrôle de l'épidémie, tout en compromettant la sécurité sanitaire nationale et mondiale. L'institution africaine recommande plutôt l'adoption de mesures de santé publique fondées sur les preuves et axées sur le risque, permettant de contrôler efficacement l'épidémie tout en préservant les voyages essentiels, le commerce et les activités humanitaires. Cette position s'appuie sur les leçons tirées des précédentes épidémies d'Ebola en Afrique de l'Ouest, en RDC et en Ouganda.","date":"2026-06-28"},
{"title":"Épidémie de Bundibugyo : l'Africa CDC publie un rapport de situation alarmant avec plus de 1 068 cas confirmés","url":"https://khub.africacdc.org/health-topics/surveillance","content":"L'Africa CDC a publié le 22 juin 2026 son rapport de situation n°35 sur l'épidémie de maladie à virus Bundibugyo (BVD) sévissant en République Démocratique du Congo (RDC) et en Ouganda. Les données combinées des deux pays font état de 1 068 cas confirmés, 269 décès confirmés et 126 guérisons, avec 8 433 contacts actuellement sous surveillance. Le taux de létalité (CFR) s'établit à environ 25,2 %, un chiffre provisoire susceptible d'évoluer au fil des investigations. L'épidémie est principalement concentrée dans la province de l'Ituri en RDC, avec une transmission en expansion dans le Nord-Kivu, le Sud-Kivu, ainsi que des cas importés et locaux dans le district de Kampala en Ouganda. L'Africa CDC souligne que malgré les efforts de contrôle en cours, les taux de mortalité restent élevés dans certains foyers et que les défis communautaires continuent de compliquer la réponse sanitaire.","date":"2026-06-28"},
{"title":"Africa CDC et l'OMS lancent un plan continental conjoint de préparation et de riposte à Ebola pour juin-novembre 2026","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Le 5 juin 2026, les Centres africains de contrôle et de prévention des maladies (Africa CDC) et l'Organisation mondiale de la Santé (OMS) ont officiellement lancé un plan continental conjoint de préparation et de riposte à la maladie à virus Ebola Bundibugyo, couvrant la période de juin à novembre 2026. Ce plan vise à coordonner les interventions à l'échelle du continent africain face à une flambée qui touche déjà la RDC et l'Ouganda. Par ailleurs, Africa CDC a salué l'appui financier d'urgence de 220,6 millions de dollars américains accordé par le Fonds pandémique pour soutenir la réponse à l'épidémie. La réunion présidentielle de haut niveau tenue le 16 juin 2026, sous la présidence du Président du Burundi S.E. Évariste Ndayishimiye, a réuni chefs d'État et partenaires pour renforcer la mobilisation politique et financière face à cette crise sanitaire majeure.","date":"2026-06-27"},
{"title":"Plus de 910 millions de dollars pledgés pour la riposte à Ebola Bundibugyo, mais moins de 90 millions déboursés","url":"https://x.com/AfricaCDC/status/2067940466104926516","content":"Lors du briefing médiatique hebdomadaire du 18 juin 2026, Africa CDC a révélé qu'au cours de la Réunion de Haut Niveau Présidentiel des Chefs d'État et de Gouvernement africains dédiée à la flambée de la maladie à virus Ebola Bundibugyo, plus de 910 millions de dollars américains ont été annoncés en termes de promesses de financement. Cependant, moins de 90 millions de dollars ont été effectivement déboursés à ce jour, soulignant l'urgence d'accélérer le flux de fonds pour soutenir les efforts de réponse sur le terrain en RDC et en Ouganda. Africa CDC appelle les partenaires internationaux à honorer leurs engagements rapidement afin de ne pas compromettre les opérations de riposte en cours.","date":"2026-06-27"},
{"title":"Bundibugyo Virus Disease Outbreak: 332 Confirmed Cases and 49 Deaths as of June 1, 2026","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-june-1-2026","content":"As of June 1, 2026, the Bundibugyo Virus Disease (BVD) outbreak affecting the Democratic Republic of Congo (DRC) and Uganda has resulted in 332 confirmed cases and 49 confirmed deaths, representing a case fatality ratio (CFR) of approximately 14.8%. The outbreak now spans 23 health zones within the DRC and one district in Uganda, with 321 suspected cases including 101 individuals currently in isolation. Africa CDC continues to coordinate multi-sectoral response efforts despite significant challenges including community resistance, logistical constraints, and health system weaknesses. Infection Prevention and Control (IPC) measures include trainings on injection safety, safe and dignified burials, and decontamination of health facilities. Community sensitization campaigns are targeting church congregations, students, and taxi drivers to address misinformation and reluctance to cooperate with health interventions.","date":"2026-06-27"},
],
"african-medical-agency":[
{"title":"L'OMS et l'Agence Africaine des Médicaments signent un accord-cadre historique pour renforcer l'accès aux produits de santé en Afrique","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"Le 21 mai 2026, en marge de la 79e Assemblée mondiale de la Santé (AMS79) à Genève, l'Organisation mondiale de la Santé (OMS) et l'Agence Africaine des Médicaments (AMA) ont signé un accord-cadre de collaboration historique visant à renforcer l'accès à des produits de santé sûrs, efficaces et de qualité garantie à travers l'Afrique. Ce partenariat structuré prévoit de promouvoir l'harmonisation et la convergence réglementaires entre les systèmes nationaux de régulation africains, de renforcer la surveillance post-commercialisation contre les produits sous-standard et falsifiés, et de soutenir l'innovation et la production locale en situation d'urgence sanitaire. L'accord acquiert une dimension particulièrement stratégique dans le contexte de l'épidémie d'Ebola Bundibugyo, pour laquelle l'AMA est appelée à jouer un rôle central dans l'évaluation accélérée des vaccins et traitements candidats. Cet accord marque une étape majeure dans l'opérationnalisation de l'AMA comme institution continentale clé pour la sécurité sanitaire africaine.","date":"2026-05-21"},
{"title":"L'Agence Africaine des Médicaments et l'USP signent un partenariat pour renforcer les standards pharmaceutiques africains","url":"https://www.cleanroomtechnology.com/african-medicines-agency-and-usp-sign-agreement-to","content":"Le 29 avril 2026 à Johannesburg, l'Agence Africaine des Médicaments (AMA) et la Pharmacopée américaine (USP — US Pharmacopeia) ont formalisé un partenariat stratégique via la signature d'un mémorandum d'accord. Ce cadre de coopération porte sur les sciences réglementaires, les normes pharmacopéiques, la surveillance post-commercialisation et le renforcement des capacités techniques du continent africain en matière d'assurance qualité pharmaceutique. Ce partenariat prend une résonance particulière alors que l'épidémie d'Ebola Bundibugyo exerce une pression croissante sur les régulateurs africains pour accélérer l'évaluation et l'approbation de vaccins et traitements candidats dans des délais réduits. La collaboration AMA-USP contribuera à doter l'Afrique d'une expertise réglementaire indépendante pour certifier les produits médicaux sans dépendre exclusivement des agences étrangères, renforçant ainsi la souveraineté sanitaire du continent.","date":"2026-04-29"},
{"title":"L'AMA entre dans sa phase d'Expansion 2026-2030 pour opérationnaliser la régulation continentale des médicaments","url":"https://au-ama.africa/","content":"L'Agence Africaine des Médicaments (AMA) a amorcé en 2026 sa deuxième phase de développement institutionnel, la « Phase d'Expansion » (2026-2030), après la phase de fondation (2024-2025). Cette étape vise à étendre progressivement ses fonctions réglementaires à l'ensemble des États membres de l'Union africaine, en harmonisant les procédures d'évaluation et d'approbation des médicaments, vaccins et dispositifs médicaux selon des standards internationaux. Dans ce cadre, l'AMA renforce ses Comités Techniques en recrutant des experts scientifiques africains indépendants essentiels pour traiter les dossiers d'enregistrement et les demandes d'autorisation d'urgence — notamment face à l'épidémie d'Ebola Bundibugyo, un test majeur pour l'agence. La phase Maturité (2031 et au-delà) verra l'AMA pleinement opérationnelle, réduisant structurellement la dépendance de l'Afrique aux régulateurs extérieurs lors des futures urgences sanitaires.","date":"2026-06-01"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
],
"manufacture-vaccins":[
{"title":"Landmark vaccine deals signal Africa's shift toward local manufacturing with $1.2 billion Gavi investment","url":"https://healthpolicy-watch.news/landmark-vaccine-deals-signal-africas-shift-toward-local-manufacturing/","content":"A series of landmark agreements backed by a US$1.2 billion investment from Gavi through its African Vaccine Manufacturing Accelerator (AVMA) marks a pivotal shift in Africa's vaccine manufacturing ambitions. A key deal involving EVA Pharma (Egypt) and European biotech partners establishes Africa's first end-to-end mRNA vaccine production platform, with annual capacity of up to 100 million doses. Six manufacturers have already built facilities with active technology transfers underway — including Atlantic Lifesciences in Ghana — and eleven African-made vaccines covering eight antigens such as measles-rubella, rotavirus and yellow fever are expected to reach the continental market within five years. The African Union has set the ambitious target of producing more than 60% of vaccine doses required on the continent by 2040, compared to less than 1% manufactured locally today, underscoring the transformative industrial scale this agenda demands.","date":"2026-06-15"},
{"title":"African vaccine manufacturing is advancing but faces five systemic challenges, warns new CHAI report 2026","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"The Clinton Health Access Initiative (CHAI) 2026 African Vaccine Manufacturing Supply Landscape report reveals that despite significant investment and political will, five systemic obstacles have already delayed timelines for near-to-market manufacturers: regulatory bottlenecks, uncertain market demand, slow financing disbursement, delays from technology transfer partners, and critical workforce gaps. Africa currently produces less than 1% of all vaccines consumed on the continent, and while six manufacturers have built facilities with active technology transfers, the path from facility construction to product approval and market delivery is proving longer and more complex than anticipated. The report calls for coordinated multi-stakeholder action — including streamlined regulatory pathways from the African Medicines Agency (AMA), sustained Gavi procurement commitments and accelerated skills development — to deliver on Africa's local manufacturing agenda within the decade. The Ebola Bundibugyo crisis has given fresh urgency to these recommendations by exposing the continent's deep dependency on external vaccine supply chains.","date":"2026-06-10"},
{"title":"Défis et opportunités pour la fabrication de vaccins en Afrique : bilan 2026 selon Health Science Reports","url":"https://onlinelibrary.wiley.com/doi/full/10.1002/hsr2.71926","content":"Une revue narrative publiée dans Health Science Reports en 2026 dresse un panorama complet des contraintes structurelles pesant sur la fabrication de vaccins en Afrique : infrastructure de production limitée, pénurie de personnel qualifié et ressources techniques insuffisantes restent les principaux freins au développement d'une industrie vaccinale continentale souveraine. Les auteurs identifient des opportunités clés dans les plateformes technologiques ARNm, la fabrication fill-and-finish et la production à base de bioréacteurs, appelant à investir massivement dans les parcs scientifiques, les laboratoires de contrôle qualité et la formation en sciences réglementaires. L'étude conclut que l'objectif de l'Union africaine de produire 60% des vaccins nécessaires sur le continent d'ici 2040 requiert une transformation structurelle des écosystèmes de recherche, de régulation et d'industrie pharmaceutique dans plusieurs pays africains. La crise de l'Ebola Bundibugyo illustre de façon dramatique le coût sanitaire de cette dépendance persistante aux chaînes d'approvisionnement mondiales.","date":"2026-06-05"},
{"title":"Épidémie de Bundibugyo : l'absence de vaccin approuvé met en lumière l'urgence de développer des capacités de fabrication africaines","url":"https://www.cdc.gov/mmwr/volumes/75/wr/pdfs/mm7522e2-H.pdf","content":"Le rapport d'évaluation des risques publié par les CDC américains souligne un fait préoccupant : il n'existe à ce jour aucun vaccin ni médicament approuvé contre la maladie à virus Bundibugyo (BVD). Alors que l'épidémie en cours en RDC et en Ouganda a déjà dépassé les 378 cas confirmés et 63 décès au 2 juin 2026, cette lacune met en évidence l'urgence criante de développer des capacités de recherche, de développement et de fabrication de vaccins sur le continent africain. Des efforts de préparation sont en cours aux États-Unis, mais la communauté internationale appelle à une mobilisation sans précédent pour accélérer le développement de contre-mesures médicales adaptées à cette souche du virus Ebola, notamment dans le cadre des initiatives de fabrication locale portées par l'Africa CDC.","date":"2026-06-28"},
{"title":"Le cadre PAVM de l'Africa CDC pour accélérer la fabrication de vaccins en Afrique","url":"https://khub.africacdc.org/records/resource/bundibugyo-ebola-virus-disease-bvd-interim-guidance-on-blanket-travel-restrictions-and-public-gatherings","content":"Dans le contexte de l'épidémie de Bundibugyo et de l'urgence sanitaire qui secoue le continent, l'Africa CDC rappelle l'importance stratégique du cadre d'action des Partenariats pour la Fabrication Africaine de Vaccins (PAVM). Ce document de référence, élaboré pour accélérer la production locale de vaccins en Afrique, prend une résonance particulière alors que le continent fait face à une épidémie pour laquelle aucun vaccin ni médicament approuvé n'existe pour le virus Bundibugyo. Le PAVM vise à réduire la dépendance de l'Afrique aux chaînes d'approvisionnement mondiales en vaccins en développant des capacités de fabrication continentales, un objectif jugé critique par les experts de santé publique pour faire face aux crises sanitaires futures.","date":"2026-06-28"},
{"title":"Africa CDC Knowledge Hub Highlights Manufacturing Readiness Amid Ebola Bundibugyo Outbreak","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"As the Bundibugyo Virus Disease outbreak intensifies across the DRC and Uganda, the Africa CDC and WHO continental preparedness and response plan for June-November 2026 places renewed emphasis on the urgent need for local vaccine and medical countermeasure manufacturing capacity on the African continent. The plan underscores that reliance on external supply chains for vaccines and therapeutics has hampered rapid response in the early weeks of the outbreak. Strengthening African-based manufacturing infrastructure is identified as a strategic priority to ensure faster deployment of investigational vaccines and treatments in future outbreaks. Ongoing procurement efforts and partnerships with international manufacturers are being coordinated to fast-track the availability of candidate vaccines being evaluated for use against the Bundibugyo Ebola strain.","date":"2026-06-27"},
{"title":"Plan de réponse Ebola 2026 : un appel à investir dans la fabrication locale de contre-mesures médicales en Afrique","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"La déclaration de l'épidémie de maladie à virus Ebola Bundibugyo comme urgence de santé publique par l'OMS et l'Africa CDC en 2026 met en exergue les insuffisances persistantes dans la chaîne de fabrication et d'approvisionnement en produits médicaux sur le continent. Avec 332 cas confirmés et un taux de létalité de 14,8 % au début du mois de juin, l'absence de vaccin et la pénurie de traitements spécifiques soulignent l'urgence d'investir dans des capacités de fabrication pharmaceutique locales. Les experts appellent à une mobilisation accrue des industriels africains et internationaux pour développer, produire et distribuer des vaccins candidats contre les souches d'Ebola non couvertes, et pour renforcer les plateformes de biofabrication continentales afin de réduire la dépendance aux importations en période de crise.","date":"2026-06-25"},
{"title":"Urgence Ebola Bundibugyo : l'absence de vaccin homologué relance le débat sur la production vaccinale africaine","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'épidémie de maladie à virus Bundibugyo qui frappe la République Démocratique du Congo et l'Ouganda depuis plusieurs semaines met en lumière une réalité critique : il n'existe à ce jour aucun vaccin homologué contre cette souche spécifique du virus Ebola. Contrairement à la souche Zaïre, pour laquelle des vaccins ont été développés et déployés avec succès, la souche Bundibugyo demeure sans solution vaccinale disponible à grande échelle. Cette situation relance avec acuité le débat sur la nécessité d'accélérer les capacités de recherche, développement et fabrication de vaccins sur le continent africain. Le plan conjoint Africa CDC-OMS, doté de 518 millions de dollars, inclut des volets dédiés au développement de contre-mesures médicales, pressant les fabricants et les bailleurs de fonds à investir dans la production locale de vaccins adaptés aux pathogènes prioritaires africains.","date":"2026-06-25"},
],
"unicef-gavi":[
{"title":"UNICEF and Gavi launch a $40 million Expression of Interest for Bundibugyo Ebolavirus vaccine manufacturers","url":"https://www.unicef.org/press-releases/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"On 24 June 2026, UNICEF and Gavi, the Vaccine Alliance, launched a Request for Expression of Interest (EOI) targeting vaccine developers and manufacturers to accelerate access to a Bundibugyo Ebolavirus vaccine, backed by up to US$40 million in pull financing from Gavi's US$50 million First Response Fund commitment to the ongoing outbreak. With 1,094 confirmed cases and 277 deaths in eastern DRC and 20 confirmed cases in Uganda — all caused by a strain for which no approved vaccine currently exists — the initiative builds on engagement with WHO and CEPI to assess manufacturing readiness, scale-up needs and financing approaches to ensure doses can be produced at scale if candidate vaccines prove successful. Special consideration will be given to proposals based in Africa, aligning with the broader agenda to build continental vaccine manufacturing capacity. The EOI comes amid mounting pressure on global health institutions to accelerate R&D timelines for neglected Ebola strains beyond the Zaire species.","date":"2026-06-24"},
{"title":"Africa's routine vaccine systems deliver gains against cancer and malaria in 2026, but funding pressures loom large","url":"https://www.gavi.org/news/media-room/africas-routine-vaccine-systems-deliver-gains-against-cancer-and-malaria-funding","content":"A new Gavi report highlights that Africa's routine immunization programs achieved significant results in 2025-2026: more than 52 million doses of malaria vaccine have been delivered since 2023 in the world's highest-burden settings, with Burkina Faso recording a 32% decline in reported malaria cases between 2024 and 2025 and near-halved malaria-related child deaths. The HPV vaccination program is also expanding under the Gavi 6.0 strategy (2026-2030), which targets 1.5 million additional lives saved through HPV immunization alone and 8-9 million lives overall by supporting more than 500 million additional children and adolescents with vaccination. However, Gavi warns that reduced donor contributions and the parallel financial demands of the Ebola Bundibugyo emergency response risk undermining progress in routine childhood immunization programs that protect millions of African children from preventable diseases.","date":"2026-06-20"},
{"title":"The world's largest vaccine catch-up initiative surpasses 100 million childhood doses, yet 14 million infants remain unvaccinated globally","url":"https://www.unicef.org/esa/press-releases/largest-catch-initiative-delivers-over-100-million-childhood-vaccinations","content":"UNICEF has announced that the world's largest-ever vaccine catch-up initiative has delivered more than 100 million childhood vaccinations across countries recovering from pandemic-era immunization disruptions caused by COVID-19 lockdowns and healthcare system breakdowns. The initiative, coordinated by UNICEF in partnership with Gavi and national governments, targeted zero-dose and under-vaccinated children in communities that missed routine immunization during the pandemic years — a cohort that represents a significant reservoir of susceptibility to preventable diseases. Despite this milestone, WHO and UNICEF data confirm that over 14 million infants globally remain entirely unvaccinated against basic antigens, with Sub-Saharan Africa and South Asia bearing the highest burden of missed doses. UNICEF emphasizes that sustained investment in primary health care and community outreach is essential to prevent resurgences — particularly as health systems simultaneously manage crises such as the Ebola Bundibugyo outbreak in Central Africa.","date":"2026-06-15"},
{"title":"UNICEF and Gavi Mobilize Support for Ebola Bundibugyo Vaccine Response in DRC and Uganda","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"As the Bundibugyo Virus Disease outbreak continues to escalate in the DRC and Uganda, UNICEF and Gavi are mobilizing resources and logistical support to facilitate the deployment of investigational vaccines and to strengthen immunization infrastructure in affected regions. UNICEF is coordinating cold chain logistics and community engagement efforts, particularly targeting vulnerable populations including children and women. Gavi, the Vaccine Alliance, is working with partners to ensure equitable access to any approved or emergency-use vaccines as they become available. Both organizations are also supporting surveillance and risk communication campaigns to improve uptake of health interventions in communities affected by the outbreak, where vaccine hesitancy and misinformation remain significant barriers.","date":"2026-06-27"},
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
{"title":"Gavi et UNICEF Mobilisés face à la Crise Ebola en Afrique Centrale : Enjeux de Vaccination et d'Accès aux Soins","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-con","content":"Face à la propagation de l'épidémie de maladie à virus Bundibugyo en République Démocratique du Congo et en Ouganda, Gavi (l'Alliance du Vaccin) et l'UNICEF sont appelés à intensifier leur soutien logistique et financier pour garantir l'accès aux outils de santé publique dans les zones affectées. Bien qu'aucun vaccin homologué ne soit disponible contre la souche Bundibugyo, les deux organisations jouent un rôle clé dans la chaîne d'approvisionnement en matériels de protection, en soutien aux campagnes de sensibilisation communautaire et en renforcement des systèmes de santé locaux. L'UNICEF assure également la protection des enfants et des familles vulnérables dans les foyers épidémiques, en coordination avec les autorités nationales et Africa CDC. Ces interventions s'inscrivent dans le cadre du plan continental de préparation et de réponse doté de 518 millions de dollars lancé conjointement par Africa CDC et l'OMS.","date":"2026-06-23"},
],
"sante-maroc":[
{"title":"Le Maroc alloue un budget record de 42,4 milliards de dirhams à la Santé en 2026, en hausse de 30% avec 8 000 nouveaux postes","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Dans le cadre du Projet de Loi de Finances 2026, le Maroc alloue un budget record de 42,4 milliards de dirhams au ministère de la Santé et de la Protection sociale, soit une hausse historique de 30% (+9,8 milliards de dirhams) par rapport à 2025. Ce budget se répartit entre 27,9 milliards de dirhams pour le fonctionnement (dont 16,4 milliards pour le personnel et 11,4 milliards pour les dépenses matérielles) et 14,5 milliards de dirhams pour l'investissement. Le Maroc prévoit 8 000 nouveaux postes budgétaires pour le secteur de la santé — sur les 36 895 créés au total en 2026 — pour réduire les déficits en ressources humaines et rendre le secteur hospitalier plus attractif. Les priorités d'investissement incluent la construction de nouveaux Centres Hospitaliers Universitaires (CHU), la rénovation de 90 hôpitaux, la généralisation des dossiers médicaux électroniques et le déploiement progressif des Groupements Sanitaires Territoriaux (GST).","date":"2026-06-10"},
{"title":"Maroc : les Groupements Sanitaires Territoriaux (GST) généralisés en 2026, pivot de la réforme régionale de santé","url":"https://fnh.ma/article/actualite-financiere-maroc/plf-2026-sante-systeme","content":"Après le lancement du premier Groupement Sanitaire Territorial (GST) pilote dans la région Tanger-Tétouan-Al Hoceima le 1er octobre 2025, le Maroc engage en 2026 la généralisation progressive de ce nouveau modèle de gouvernance sanitaire à l'ensemble des régions du Royaume. Les GST constituent le pivot de la réforme de l'État social voulue par le Roi Mohammed VI, intégrant dans une structure unique la gestion des établissements de soins primaires, des hôpitaux régionaux et des CHU d'une même région pour une meilleure cohérence des parcours de soins. Ce dispositif vise à corriger les profondes inégalités territoriales d'accès aux soins qui persistent entre les régions urbaines et rurales du Maroc, en rapprochant l'offre de santé des citoyens les plus vulnérables. La généralisation des GST est soutenue par une enveloppe d'investissement de 14,5 milliards de dirhams inscrite au PLF 2026, comprenant la réhabilitation de 90 hôpitaux et la construction de nouveaux CHU.","date":"2026-06-05"},
{"title":"Maroc : un budget combiné de 15 milliards de dollars pour la santé et l'éducation en 2026, premières priorités nationales","url":"https://www.agenceecofin.com/actualites/2010-132470-maroc-un-budget-de-15-milliards-annonce-pour-la-sante-et-l-education-en-2026","content":"Le gouvernement marocain a inscrit la santé et l'éducation comme premières priorités budgétaires nationales en 2026, allouant un budget combiné de 15 milliards de dollars américains à ces deux secteurs stratégiques. Cette enveloppe budgétaire historique traduit la vision royale d'un État social fort, s'appuyant sur le déploiement de l'Assurance Maladie Obligatoire (AMO) généralisée depuis 2022, les Groupements Sanitaires Territoriaux (GST) et le recrutement de 8 000 nouvelles ressources humaines en santé. Dans un contexte régional marqué par des menaces épidémiques — notamment l'épidémie d'Ebola Bundibugyo en Afrique subsaharienne — cet investissement massif vise également à renforcer la résilience du système de santé marocain et ses capacités de réponse rapide aux urgences sanitaires. Le Maroc consolide ainsi sa position de hub sanitaire régional en Afrique du Nord, en cohérence avec ses engagements envers l'Africa CDC et l'OMS.","date":"2026-05-20"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},
],
"vaccins-monde":[
{"title":"L'OMS annonce la reprise des campagnes préventives contre le choléra après doublement du stock mondial à 70 millions de doses","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'OMS a annoncé le 4 février 2026 un jalon critique dans la lutte mondiale contre le choléra : le stock mondial annuel de vaccins oraux contre le choléra (OCV) a doublé, passant de 35 millions de doses en 2022 à près de 70 millions de doses en 2025, permettant la reprise des campagnes de vaccination préventive pour la première fois depuis plus de trois ans. Cette avancée met fin à la période de pénurie sévère qui avait contraint les partenaires à réserver les doses exclusivement aux réponses aux épidémies actives, privant des millions de personnes d'une protection préventive dans les zones à risque d'Afrique subsaharienne et d'Asie du Sud. La reprise des campagnes préventives est particulièrement significative dans les contextes de conflits armés et de catastrophes naturelles qui dégradent l'accès à l'eau potable et aggravent la transmission du choléra. L'OMS appelle les partenaires à maintenir et accroître cette capacité de production pour prévenir les futures flambées épidémiques.","date":"2026-02-04"},
{"title":"Couverture vaccinale mondiale stable en 2025, mais 14 millions d'enfants restent entièrement sans vaccins, alertent OMS et UNICEF","url":"https://www.unicef.org/press-releases/global-childhood-vaccination-holds-steady-yet-over-14-million-infants-remain","content":"Selon les données conjointes publiées par l'OMS et l'UNICEF, la couverture vaccinale infantile mondiale se maintient à un niveau stable en 2025, mais plus de 14 millions d'enfants restent totalement non vaccinés contre des maladies évitables, principalement en Afrique subsaharienne et en Asie du Sud. Cette stagnation est préoccupante car elle maintient des poches de vulnérabilité susceptibles d'alimenter des flambées de rougeole, de polio et de coqueluche, notamment dans les zones de conflit et les contextes fragiles. Les experts de l'OMS et de l'UNICEF avertissent que les urgences sanitaires comme l'épidémie d'Ebola Bundibugyo risquent de détourner des ressources humaines et financières des programmes de vaccination de routine, créant un double fardeau sanitaire sur les pays les plus vulnérables. Des efforts ciblés sont nécessaires pour atteindre les enfants « zéro dose » dans les derniers kilomètres de la chaîne de santé publique mondiale.","date":"2026-06-15"},
{"title":"L'Union africaine s'engage à livrer un vaccin contre Ebola Bundibugyo avant fin 2026, mobilisant les acteurs mondiaux de la R&D vaccinale","url":"https://polygonhealthanalytics.com/vaccine-news-may-27-june-03-2026-2026-06-03-13-40-31/","content":"L'agence de santé de l'Union africaine (Africa CDC) a pris l'engagement ambitieux de disposer d'un vaccin contre la souche Ebola Bundibugyo d'ici la fin 2026, en mobilisant l'ensemble des acteurs mondiaux de la recherche et du développement vaccinale. Cette annonce formulée lors de la semaine du 27 mai au 3 juin 2026 s'appuie sur l'identification par l'OMS des traitements et vaccins prioritaires à tester en essais cliniques accélérés face à l'épidémie en cours, qui compte déjà plus de 1 094 cas confirmés et 277 décès en RDC. Des partenariats d'urgence sont actifs avec CEPI, des fabricants pharmaceutiques et des instituts de recherche internationaux, visant à obtenir des données préliminaires de phase I/II avant fin 2026. Cet engagement illustre la montée en puissance du leadership africain dans la gouvernance sanitaire mondiale, avec un Africa CDC assumant désormais un rôle moteur dans les réponses vaccinales aux urgences pandémiques.","date":"2026-06-03"},
{"title":"Africa CDC Weekly Briefing : surveillance épidémique et immunisation au cœur de l'agenda de sécurité sanitaire africaine","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors de son briefing spécial du 30 avril 2026 consacré à l'avancement de l'agenda de Sécurité et Souveraineté Sanitaire de l'Afrique (AHSS), Africa CDC a mis en lumière les efforts de renforcement des capacités de laboratoire régionaux, essentiels pour la surveillance des maladies infectieuses et la réponse vaccinale rapide. Le Directeur Général d'Africa CDC a notamment annoncé la signature d'un accord historique avec le gouvernement kenyan, qui alloue 10 acres de terrain et 2 millions de dollars pour le Centre de Coordination Régional de l'Afrique de l'Est à Nairobi. Ces infrastructures régionales sont cruciales pour coordonner les campagnes de vaccination d'urgence et le suivi épidémiologique à l'échelle continentale.","date":"2026-06-24"},
{"title":"Ebola Bundibugyo : l'absence de vaccins met en lumière l'urgence d'investir dans la R&D vaccinale mondiale","url":"https://www.cdc.gov/media/releases/2026/update-on-ebola-outbreak-in-the-democratic-republic-of-the-congo-and-uganda-6-5-2026.html","content":"L'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda expose une lacune critique : aucun vaccin ni traitement spécifique n'est disponible contre ce variant. Contrairement à l'Ebola Zaïre, pour lequel des vaccins homologués existent, le variant Bundibugyo reste sans réponse vaccinale validée. Les autorités sanitaires mondiales, dont le CDC américain et l'OMS, appellent à accélérer la recherche et le développement de vaccins contre les souches négligées du virus Ebola, soulignant que la prévention vaccinale demeure l'outil le plus efficace contre de futures flambées.","date":"2026-06-22"},
{"title":"Briefing OMS Afrique : la riposte vaccinale contre Ebola Bundibugyo au centre des discussions","url":"https://www.youtube.com/watch?v=Gp9tFTr5a9Y","content":"Lors du briefing presse virtuel de l'OMS Afrique du 4 juin 2026, les experts ont fait le point sur la stratégie de riposte à l'épidémie de maladie à virus Ebola de type Bundibugyo en RDC et en Ouganda. Les discussions ont notamment porté sur les outils de prévention disponibles, les protocoles de vaccination d'urgence et les défis du traçage des contacts dans les zones affectées. L'OMS a souligné l'importance du déploiement rapide des équipes de réponse et la nécessité de renforcer les capacités locales de gestion des épidémies. Les intervenants ont également évoqué les cas importés en Ouganda et les mesures de quarantaine mises en place, saluant la capacité des autorités ougandaises à détecter et isoler rapidement les cas suspects grâce aux protocoles de surveillance renforcés.","date":"2026-06-17"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
