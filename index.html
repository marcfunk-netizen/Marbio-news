<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:linear-gradient(168deg,#F0F6FC 0%,#E8F0FE 35%,#F7F9FC 100%);min-height:100vh;color:#0A1929}

.logo-title{font-family:'Source Serif 4',Georgia,serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.logo-sub{font-size:11.5px;color:rgba(255,255,255,0.5);letter-spacing:1.8px;text-transform:uppercase;font-weight:500;margin-top:2px}
.search-row{display:flex;gap:8px;margin-top:18px}

.main{max-width:820px;margin:0 auto;padding:18px 16px 40px}
.categories{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.cat-btn{padding:14px;border-radius:14px;border:1px solid rgba(0,40,80,0.07);background:#fff;color:#2A3B4E;cursor:pointer;text-align:left;transition:all .25s;box-shadow:0 1px 4px rgba(0,40,80,0.04);font-family:inherit}
.cat-btn:hover{box-shadow:0 4px 12px rgba(0,105,180,0.1);transform:translateY(-1px)}

.toolbar-right{display:flex;align-items:center;gap:10px}

.refresh-btn{padding:7px 16px;border-radius:9px;border:1px solid rgba(0,105,180,0.15);background:#fff;color:#0069B4;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:all .2s}

.article-card:hover{border-color:rgba(0,105,180,0.2);transform:translateY(-1px);box-shadow:0 8px 30px rgba(0,105,180,0.08)}
.article-card.is-new{border-left:4px solid #E8A020;background:linear-gradient(135deg,#FFFDF5,#fff 30%)}
.article-inner{display:flex;gap:14px;align-items:flex-start}
.article-bar{width:6px;min-height:50px;border-radius:3px;opacity:.7;flex-shrink:0;margin-top:2px}

.article-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-tag{padding:3px 10px;border-radius:6px;font-weight:600;font-size:11px}
.date-tag{font-size:11.5px;color:#8A9BB0}
.badge-new{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:6px;background:linear-gradient(135deg,#E8A020,#F0C040);color:#fff;animation:pulse 2s ease-in-out infinite;box-shadow:0 2px 8px rgba(232,160,32,0.3)}
.expand-btn{background:none;border:1px solid rgba(0,105,180,0.15);border-radius:6px;padding:3px 10px;color:#0069B4;font-size:11px;font-weight:600;cursor:pointer;margin-left:auto;font-family:inherit;transition:all .2s}
.expand-btn:hover{background:rgba(0,105,180,0.05)}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;padding:50px 0}
.spinner{width:48px;height:48px;border:3px solid rgba(0,105,180,0.1);border-top-color:#0069B4;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
.spinner-text{color:#5A7A96;font-size:14px;font-weight:500}
.spinner-sub{color:#9AB0C6;font-size:12px;margin-top:6px}
.status-bar{padding:8px 14px;border-radius:10px;background:linear-gradient(135deg,rgba(0,105,180,0.06),rgba(0,105,180,0.02));border:1px solid rgba(0,105,180,0.1);color:#0069B4;font-size:12px;font-weight:500;margin-bottom:14px;display:none;align-items:center;gap:8px}
.status-bar.visible{display:flex}
.status-dot{width:6px;height:6px;border-radius:50%;background:#0069B4;animation:pulse 1.5s infinite}
.error-box{padding:12px 16px;border-radius:12px;background:#FFF8F0;border:1px solid #FFE4C8;color:#8B5E2A;font-size:13px;margin-bottom:14px;display:none;align-items:center;gap:10px}
.last-update{font-size:11px;color:#9AB0C6;background:rgba(0,180,80,0.06);border:1px solid rgba(0,180,80,0.12);padding:4px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px}
.last-update .dot{width:6px;height:6px;border-radius:50%;background:#2ECC71}
.new-count{font-size:11px;color:#E8A020;background:rgba(232,160,32,0.08);border:1px solid rgba(232,160,32,0.2);padding:4px 10px;border-radius:6px;font-weight:600;margin-left:8px}
.footer{margin-top:50px;padding-top:22px;border-top:1px solid rgba(0,40,80,0.06);text-align:center;font-size:11px;color:#9AB0C6;line-height:2}
.footer strong{color:#4A6A84;font-weight:600;font-size:12px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:640px){.categories{grid-template-columns:repeat(2,1fr)}.toolbar{flex-direction:column;align-items:flex-start}.toolbar-right{width:100%;justify-content:space-between}}
</style>

<script>
const CATEGORIES=[
  {id:"african-cdc",label:"Africa CDC",icon:"🌍",desc:"Publications et communiqués"},
  {id:"african-medical-agency",label:"Agence Africaine du Médicament",icon:"💊",desc:"Actualités réglementaires (AMA)"},
  {id:"manufacture-vaccins",label:"Manufacture Vaccins Afrique",icon:"🏭",desc:"Production vaccins et biologiques"},
  {id:"unicef-gavi",label:"UNICEF & GAVI",icon:"💉",desc:"Campagnes d'immunisation"},
  {id:"sante-maroc",label:"Santé Maroc",icon:"🇲🇦",desc:"Système de soins marocain"},
  {id:"vaccins-monde",label:"Vaccins dans le Monde",icon:"🌐",desc:"Actualités mondiales vaccination"},
];

let activeCategory="african-cdc";
let articlesData={
"african-cdc":[
{title:"One Health Summit in Lyon: over $250M secured for Africa's health security",url:"https://www.who.int/news/item/06-04-2026-who-calls-for-action---together-for-health.-stand-with-science.--to-mark-world-health-day",content:"WHO and France's G7 Presidency convened a One Health Summit in Lyon (5–7 April 2026), where over $250 million in new commitments were announced for strengthening health security in Africa. Africa CDC Director-General Dr. Jean Kaseya called for sustained investment in continental surveillance systems and pandemic preparedness. The summit brought together health ministers, scientists and donors from 40+ countries to align on cross-border disease prevention strategies.",date:"2026-04-08"},
{title:"Africa CDC appoints four senior advisors including former VP Osinbajo",url:"https://www.arise.tv/oramah-named-africa-cdc-senior-advisor-on-strategic-financing/",content:"Africa CDC announced four high-level appointments on 6 April: Troy Fitrell (International Cooperation), Pierre Delsaux (Strategic Partnership), Christoph Benn (Debt Swaps), and Benedict Oramah (Strategic Financing). Former Nigerian Vice-President Yemi Osinbajo was also named Senior Strategic Adviser. These appointments aim to accelerate the Africa Health Security and Sovereignty (AHSS) agenda with greater credibility and scale.",date:"2026-04-08"},
{title:"Africa CDC warns of health crisis over costs, disruptions",url:"https://guardian.ng/news/africa-cdc-warns-of-health-crisis-over-costs-disruptions/",content:"Africa CDC has raised the alarm over shortages of essential medical supplies due to freight delays and supply chain disruptions threatening timely delivery of medicines, vaccines and health products. Africa's heavy reliance on imports from China and India increases the continent's vulnerability. The AHSS Agenda promotes stronger leadership, coordinated pandemic preparedness, sustainable domestic health financing, digital transformation, and local manufacturing of health products.",date:"2026-04-03"},
{title:"Africa CDC Weekly Brief | 30 March – 5 April 2026",url:"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/",content:"An estimated 40% of health resources in Africa are lost to inefficiency and poor governance. The latest weekly brief covers the key public health events and priorities across the African Union Member States for the first week of April 2026.",date:"2026-04-05"},
{title:"Africa CDC Rolls Out Continental SPARK-NCDs Programme",url:"https://africacdc.org/news-item/africa-cdc-rolls-out-continental-spark-ncds-programme-as-noncommunicable-diseases-rise-across-africa/",content:"Nearly 2 million Africans die prematurely each year from complications related to hypertension and diabetes alone, and only 10–20% of those living with these conditions receive regular care. Africa CDC has launched SPARK-NCDs, a major continental initiative to strengthen surveillance, improve integrated care, and transform the response to non-communicable diseases across the continent. The programme signals a decisive step toward more resilient, data-driven health systems.",date:"2026-03-30"},
{title:"Member States' Statement on Primary Health Care Digitalization Framework",url:"https://africacdc.org/download/member-states-statement-on-the-primary-health-care-digitalization-framework/",content:"Adopted on 12 March 2026 in Addis Ababa during the Validation Workshop. Member States call upon Africa CDC to institute the PHC Directors Forum and Digital Health Directors Forum as continental coordination platforms. The continental target: 90% digitally enabled PHC systems by 2035. Development partners, RECs and private sector are called to align support with framework priorities.",date:"2026-04-01"},
],
"african-medical-agency":[
{title:"AMA calls on 24 remaining AU states to ratify founding treaty",url:"https://allafrica.com/stories/202602030425.html",content:"At the AU Summit in Addis Ababa, AMA Director-General Dr. Delese Mimi Darko urged the 24 African Union member states that have not yet ratified the AMA treaty to do so urgently. With 31 out of 55 states having ratified, AMA is now operational from its headquarters in Kigali but needs universal ratification to fully establish continental regulatory harmonization. Technical committees for pharmacovigilance, product evaluation, and anti-counterfeiting remain to be set up.",date:"2026-04-08"},
{title:"Frontiers in Medicine: the long road to African pharmaceutical regulation",url:"https://www.nature.com/articles/s41467-025-62839-y",content:"A comprehensive review published in Nature Communications traces the evolution of Africa's regulatory landscape from the AMRH initiative in 2009 through the AMA treaty of 2019 to today's implementation phase. Co-authored by CIRS, AUDA-NEPAD and AMA, the paper concludes that continental regulatory convergence is achievable but requires sustained political will, harmonized GMP standards, and a $200M+ investment in regulatory workforce capacity by 2030.",date:"2026-04-08"},
{title:"AMA Chief of Staff: fully committed to advancing coordinated approach",url:"https://www.nepad.org/news/imagine-africa-without-coordination-what-would-become-of-our-health-systems",content:"On 30 March 2026 in Nairobi, five of Africa's key continental health institutions convened to discuss coordination. Mr. Jean Rico Bien-Aime, Chief of Staff to the Director-General of AMA, stated that AMA as a new institution within the health ecosystem is fully committed to advancing a coordinated approach and ensuring delivery for the benefit of the African people. Discussions focused on joint priorities for 2026–2027 and coordination without unnecessary bureaucracy.",date:"2026-04-02"},
{title:"AU approves creation of African Medicine Prize under Africa CDC/AMA",url:"https://africacdc.org/news-item/right-of-reply-response-to-africa-intelligence-article-30-march-2026/",content:"The AU Assembly approved the establishment of an independent High-Level African Medical Scientific Committee under the auspices of Africa CDC in collaboration with AMA. The Assembly authorized the creation of the 'African Medicine Prize' to be awarded annually. Africa CDC's internally managed grant portfolio grew from USD 52 million in 2022 to USD 462 million in 2025, with budget execution improving from 34% to 95%.",date:"2026-03-30"},
{title:"TMDA Tanzania: Call for Comments on GMP Inspection Guidelines",url:"https://www.tmda.go.tz/pages/african-medicines-agency-ama",content:"Tanzania Medicines and Medical Devices Authority (TMDA) published a call for comments on the Draft Guidelines for Reliance on Good Manufacturing Practices (GMP) Inspection, in line with AMA's continental harmonization efforts. AMA will support local pharmaceutical production under the PMPA and catalyze trade under the AfCFTA. AMA will coordinate joint reviews of clinical trial applications for vaccines and assessment of biosimilar dossiers.",date:"2026-01-07"},
],
"manufacture-vaccins":[
{title:"AU to convene extraordinary summit on vaccine manufacturing — Nairobi, May 2026",url:"https://africacdc.org/news-item/communique-continental-immunization-strategy-adoption/",content:"The African Union announced an extraordinary summit on local vaccine and biologics manufacturing to be held in Nairobi in May 2026. The summit will review progress on the AVMA (Africa Vaccine Manufacturing Accelerator) target of 60% local production by 2040. Key agenda items include the $1.2 billion AVMA fund, workforce expansion plans from 3,000 to 12,500 professionals, and regulatory fast-tracking through AMA for African-manufactured products.",date:"2026-04-08"},
{title:"Sustainable access to African-manufactured vaccines: a PMC systems analysis",url:"https://www.afrobarometer.org/publication/pp101-pressure-points-africas-health-systems-amid-global-aid-contraction/",content:"A new systems analysis highlights that vaccine-production hubs in Senegal (Institut Pasteur de Dakar), South Africa (Biovac), and Egypt (VACSERA/EVA Pharma) are scaling up capacity but face critical bottlenecks in cold chain logistics, quality assurance workforce, and regulatory approval timelines. The study recommends pooled procurement mechanisms and regional distribution networks to make African-manufactured vaccines commercially sustainable beyond donor support.",date:"2026-04-08"},
{title:"ACHIEVE Africa launched: advancing vaccine and biologics sovereignty",url:"https://biousawa.com/news-details/148/",content:"ACHIEVE Africa (Advancing Capacity for Health Innovation, Equity, and Vaccine Ecosystems in Africa) was launched on the margins of the 39th AU General Assembly in Addis Ababa. This African-led initiative signals a decisive shift toward true vaccine and therapeutic sovereignty through strengthened research, GMP-compliant manufacturing, regulatory systems and resilient supply chains. Bio Usawa's COO stated: 'Africa has the scientific talent needed to develop and produce vaccines and biologics.'",date:"2026-03-18"},
{title:"Africa CDC/AVMI Industrial Fellowship Programme 2026–2027 (Funded)",url:"https://opportunitiesforyouth.org/2026/03/26/africa-cdc-avmi-industrial-fellowship-programme-2026-2027-fully-funded-vaccine-manufacturing-training-for-african-graduates/",content:"The fully funded fellowship for 14 fellows runs from July 2026 to September 2027, with placements in Egypt, Senegal or South Africa. Africa will need approximately 12,500 full-time vaccine manufacturing professionals by 2040, but the current workforce ranges between only 2,000 and 3,000. Fellows receive flight tickets, visa fees, stipend and hands-on cGMP training at active vaccine manufacturing facilities.",date:"2026-03-26"},
{title:"Africa commits to producing 60% of health products locally by 2040",url:"https://www.instagram.com/reel/DWjFWR-AtCD/",content:"Africa CDC announced that Africa has committed to producing 60% of the health products it needs locally by 2040. This target is central to the Africa Health Security and Sovereignty (AHSS) Agenda. Local manufacturing capacity is critical for pandemic preparedness, equitable access and reducing vulnerability to global supply chain disruptions.",date:"2026-03-31"},
],
"unicef-gavi":[
{title:"Cholera vaccination resumes after 3-year pause — Mozambique first",url:"https://www.citizen.org/article/letter-urging-gavi-unicef-to-negotiate-fair-price-of-mpox-vaccines",content:"Gavi, UNICEF and WHO announced the resumption of preventive cholera vaccination campaigns after a 3-year hiatus, with Mozambique as the first country to benefit. Global oral cholera vaccine supply has doubled from 35 million to 70 million doses per year. A total of 20 million doses have been allocated: Mozambique (3.6M), DRC (6.1M) and Bangladesh (10.3M). The campaigns are funded by Gavi and delivered through UNICEF.",date:"2026-04-08"},
{title:"Gavi Leap 2026–2030: $9.5B pledged, 500M children targeted",url:"https://theindianpractitioner.com/gavi-and-unicef-unite-for-malaria-vaccine-from-serum-institute",content:"Gavi's new strategic period aims to protect 500 million children and save 8 million lives by 2030. Major pledges include $1.6B from the Gates Foundation and over €2B from Team Europe. However, a shortfall against the $11.9B target forced Gavi to reduce its workforce by 33% and cut support to WHO and UNICEF by 30%. Over a third of funding will be concentrated on the most vulnerable 25% of children worldwide, with $1.1B earmarked for malaria vaccines across 24 African countries.",date:"2026-04-08"},
{title:"Cross-border vaccine supply to conflict-affected Darfur — UNICEF/Gavi",url:"https://www.medrxiv.org/content/10.64898/2026.04.01.26349918v1.full.pdf",content:"A groundbreaking cross-border vaccine supply chain was established to deliver vaccines from N'Djamena (Chad) overland to conflict-affected Darfur (Sudan). UNICEF led operational coordination including procurement, international shipment, customs clearance and cold chain management. Gavi provided financial and strategic support. Multiple shipments in 2025 delivered routine and outbreak response vaccines (MenA, OCV, YF, IPV, Td, HepB, bOPV, DTP-HepB-Hib, BCG, Rota).",date:"2026-04-02"},
{title:"Letter urging Gavi/UNICEF to negotiate fair price of mpox vaccines",url:"https://www.citizen.org/article/letter-urging-gavi-unicef-to-negotiate-fair-price-of-mpox-vaccines",content:"Public Citizen, MSF and partners urge Gavi and UNICEF to negotiate fair prices for mpox vaccines. At $50-75 per dose, Gavi's $500M First Response Fund could only immunize 3.3 million people — far short of Africa CDC's estimate of 5 million people needed. The organizations call for transparent contract negotiations as Gavi finalizes its 2026-2030 strategic plan seeking $9 billion in funding.",date:"2026-04-01"},
{title:"Bangladesh launches emergency measles vaccination after 98 children died",url:"https://www.upi.com/Top_News/US/2026/04/06/bangladesh-vaccine-measles-98-children-dead/6871775479655/",content:"Bangladesh launched an emergency vaccination campaign to protect over a million children from measles after at least 98 children died since March 15. The campaign is led by the health directorate with help from UNICEF, WHO and Gavi, focusing on 18 high-risk districts before going nationwide on May 3. Priority is children aged 6 months to 5 years, particularly in densely populated Dhaka and Cox's Bazaar Rohingya camps.",date:"2026-04-06"},
{title:"Gavi/UNICEF: malaria vaccine from Serum Institute at $2.99 per dose",url:"https://theindianpractitioner.com/gavi-and-unicef-unite-for-malaria-vaccine-from-serum-institute",content:"The malaria vaccine will be offered at US$2.99 per dose, reflecting Gavi and UNICEF's commitment to a sustainable competitive malaria vaccine market. The deal supports the Alliance's goal to fully vaccinate 50 million additional children by 2030. Over 40 million doses delivered, now part of routine immunization in 24 African countries covering 70% of the global malaria burden.",date:"2026-03-15"},
],
"sante-maroc":[

let isLoading=false;
let isCustomSearch=false;

function getSourceColor(d){
  if(d.includes("who.int"))return"#0093D5";
  if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";
  if(d.includes("unicef"))return"#00AEEF";
  if(d.includes("gavi")||d.includes("amref"))return"#E8702A";
  if(d.includes(".ma")||d.includes("maroc")||d.includes("telquel")||d.includes("santemag")||d.includes("4tech")||d.includes("hespress"))return"#C1272D";
  if(d.includes("nature.com"))return"#B5232D";
  if(d.includes("sciencedirect"))return"#F58220";
  if(d.includes("path.org"))return"#6B2D8B";
  if(d.includes("cdc.gov"))return"#075290";
  if(d.includes("pharmaboardroom"))return"#1A6B4F";
  if(d.includes("anrs.fr"))return"#8B1A4A";
  return"#0069B4";
}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch{return""}}
function timeAgo(d){
  if(!d)return"";const date=new Date(d),now=new Date();
  if(isNaN(date))return"";
  const s=Math.floor((now-date)/1000);
  const formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  if(s>=0&&s<86400)return formatted+" · aujourd'hui";
  if(s>=86400&&s<172800)return formatted+" · hier";
  if(s>=172800&&s<604800)return formatted+" · il y a "+Math.floor(s/86400)+"j";
  return formatted;
}
function isToday(d){
  if(!d)return false;
  const date=new Date(d),now=new Date();
  return date.getFullYear()===now.getFullYear()&&date.getMonth()===now.getMonth()&&date.getDate()===now.getDate();
}
function isRecent(d){
  if(!d)return false;
  const date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);
  return diff<=1.5;
}

function renderCategories(){
  const el=document.getElementById("categories");
  el.innerHTML=CATEGORIES.map(c=>{
    const articles=articlesData[c.id]||[];
    const newCount=articles.filter(a=>isRecent(a.date)).length;
    const badge=newCount>0?`<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">${newCount} NEW</span>`:'';
    return`<button class="cat-btn ${activeCategory===c.id&&!isCustomSearch?'active':''}" data-id="${c.id}">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-label">${c.label}${badge}</div>
      <div class="cat-desc">${c.desc}</div>
    </button>`;
  }).join("");
  el.querySelectorAll(".cat-btn").forEach(b=>{
    b.addEventListener("click",()=>{isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles()});
  });
}

function renderArticles(){
  const container=document.getElementById("articles");
  const articles=articlesData[activeCategory]||[];
  const info=document.getElementById("toolbarInfo");
  const newArticles=articles.filter(a=>isRecent(a.date));
  const newCountEl=document.getElementById("newCount");
  
  info.textContent=`${articles.length} articles`;
  if(newArticles.length>0){
    newCountEl.style.display="inline";
    newCountEl.textContent=`✨ ${newArticles.length} nouveau${newArticles.length>1?'x':''}`;
  }else{
    newCountEl.style.display="none";
  }

  if(isLoading){
    container.innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-text">Recherche en cours…</div></div>`;
    return;
  }
  if(!articles.length){
    container.innerHTML=`<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article trouvé</div></div>`;
    return;
  }
  container.innerHTML=articles.map((a,i)=>{
    const domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);
    const isNew=isRecent(a.date);
    return`<div class="article-card${isNew?' is-new':''}" style="animation-delay:${i*.06}s">
      <div class="article-inner">
        <div class="article-bar" style="background:${color}"></div>
        <div class="article-body">
          <a href="${a.url}" target="_blank" rel="noopener" class="article-title">${isNew?'<span class="badge-new">NOUVEAU</span> ':''}${a.title}</a>
          <div class="article-content collapsed" id="c-${i}">${a.content}</div>
          <div class="article-meta">
            <span class="source-tag" style="background:${color}14;color:${color}">${domain}</span>
            ${dateStr?`<span class="date-tag">${dateStr}</span>`:''}
            <button class="expand-btn" data-i="${i}">Lire plus ▼</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
  container.querySelectorAll(".expand-btn").forEach(b=>{
    b.addEventListener("click",()=>{const el=document.getElementById("c-"+b.dataset.i);const c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus ▼":"Réduire ▲"});
  });
}

// Search functionality (local filter)
function doSearch(){
  const val=document.getElementById("searchInput").value.trim().toLowerCase();
  if(!val){isCustomSearch=false;renderCategories();renderArticles();return}
  isCustomSearch=true;
  const allArticles=[];
  Object.values(articlesData).forEach(arr=>arr.forEach(a=>allArticles.push(a)));
  const filtered=allArticles.filter(a=>(a.title+a.content).toLowerCase().includes(val));
  activeCategory="search-custom";
  articlesData["search-custom"]=filtered;
  renderCategories();renderArticles();
}

document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch()});

renderCategories();
renderArticles();
</script>
</body>
