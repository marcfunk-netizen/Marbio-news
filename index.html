}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch{return""}}
function timeAgo(d){if(!d)return"";const date=new Date(d),now=new Date(),s=Math.floor((now-date)/1000);if(isNaN(s)||s<0)return"";if(s<86400)return"aujourd'hui";if(s<604800)return`il y a ${Math.floor(s/86400)}j`;if(s<2592000)return`il y a ${Math.floor(s/604800)} sem.`;return date.toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"})}

function renderCategories(){
  const el=document.getElementById("categories");
  el.innerHTML=CATEGORIES.map(c=>`<button class="cat-btn ${activeCategory===c.id&&!isCustomSearch?'active':''}" data-id="${c.id}"><div class="cat-icon">${c.icon}</div><div class="cat-label">${c.label}</div><div class="cat-desc">${c.desc}</div></button>`).join("");
  el.querySelectorAll(".cat-btn").forEach(b=>{b.addEventListener("click",()=>{isCustomSearch=false;activeCategory=b.dataset.id;document.getElementById("errorBox").style.display="none";renderCategories();renderArticles()})});
}

function renderArticles(){
  const container=document.getElementById("articles"),articles=articlesData[activeCategory]||[];
  document.getElementById("toolbarInfo").textContent=`${articles.length} articles`;
  if(isLoading){container.innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-text">Recherche Tavily en cours…</div><div class="spinner-sub">~3 secondes</div></div>`;return}
  if(!articles.length){container.innerHTML=`<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article trouvé</div><div class="spinner-sub">Cliquez Actualiser pour réessayer</div></div>`;return}
  container.innerHTML=articles.map((a,i)=>{const domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);return`<div class="article-card" style="animation-delay:${i*.06}s"><div class="article-inner"><div class="article-bar" style="background:${color}"></div><div class="article-body"><a href="${a.url}" target="_blank" rel="noopener" class="article-title">${a.title}</a><div class="article-content collapsed" id="c-${i}">${a.content}</div><div class="article-meta"><span class="source-tag" style="background:${color}14;color:${color}">${domain}</span>${dateStr?`<span class="date-tag">${dateStr}</span>`:''}<button class="expand-btn" data-i="${i}">Lire plus ▼</button></div></div></div></div>`}).join("");
  container.querySelectorAll(".expand-btn").forEach(b=>{b.addEventListener("click",()=>{const el=document.getElementById("c-"+b.dataset.i),c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus ▼":"Réduire ▲"})});
}

function setStatus(t){const b=document.getElementById("statusBar"),x=document.getElementById("statusText");if(t){b.classList.add("visible");x.textContent=t}else b.classList.remove("visible")}
function setError(t){const e=document.getElementById("errorBox");if(t){e.style.display="flex";e.innerHTML=`<span>ℹ️</span> ${t}`}else e.style.display="none"}

async function searchTavily(query,catId){
  isLoading=true;setError(null);setStatus("Recherche Tavily…");renderArticles();
  const btn=document.getElementById("refreshBtn");btn.classList.add("loading");btn.disabled=true;
  try{
    const r=await fetch("https://api.tavily.com/search",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({api_key:TAVILY_KEY,query:query,search_depth:"advanced",max_results:8})});
    if(!r.ok)throw new Error("Erreur Tavily: "+r.status);
    const data=await r.json();
    setStatus("Traitement…");
    if(data.results&&data.results.length>0){
      articlesData[catId]=data.results.map(r=>({title:r.title||"Sans titre",url:r.url||"#",content:(r.content||"").slice(0,600),date:r.published_date||null}));
      const upd=document.getElementById("lastUpdate"),txt=document.getElementById("lastUpdateText");
      upd.style.display="inline-flex";txt.textContent="Actualisé: "+new Date().toLocaleString("fr-FR");
    }else{setError("Aucun résultat Tavily. Les données pré-chargées restent affichées.")}
  }catch(e){console.error(e);setError("Erreur: "+e.message+". Les données pré-chargées restent affichées.")}
  finally{isLoading=false;setStatus(null);btn.classList.remove("loading");btn.disabled=false;renderArticles()}
}

document.getElementById("refreshBtn").addEventListener("click",()=>{
  if(isCustomSearch){doSearch();return}
  const cat=CATEGORIES.find(c=>c.id===activeCategory);
  if(cat)searchTavily(cat.query,cat.id);
});

function doSearch(){
  const val=document.getElementById("searchInput").value.trim();if(!val)return;
  isCustomSearch=true;activeCategory="search-custom";renderCategories();
  searchTavily(val,"search-custom");
}

document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch()});

renderCategories();
renderArticles();
</script>
</body>
</html>
