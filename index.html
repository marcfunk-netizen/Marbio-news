var articlesData={
"african-cdc":[
{"title":"Africa CDC appelle à une protection renforcée des agents de santé : 112 soignants infectés par Bundibugyo, dont 35 décès","url":"https://africacdc.org/news-item/africa-cdc-calls-for-stronger-protection-of-responders/","content":"L'Africa CDC a publié le 9 juillet 2026 une déclaration urgente appelant à renforcer la protection des agents de santé qui luttent contre l'épidémie de maladie à virus Bundibugyo en République démocratique du Congo. Depuis le début de l'épidémie, 112 professionnels de santé ont été infectés, dont 35 sont décédés — un bilan parmi les plus élevés enregistrés lors d'une flambée d'Ebolavirus. La situation a été aggravée par l'infection confirmée d'un travailleur humanitaire américain déployé à Bunia, soulignant le risque pour les répondants internationaux. Africa CDC rappelle que la protection des personnels de santé est non seulement une obligation éthique, mais aussi une condition essentielle à l'efficacité de la riposte, et que chaque soignant infecté représente une perte de capacité irremplaçable sur le terrain.","date":"2026-07-12"},
{"title":"Grève des agents anti-Ebola en RDC : Africa CDC presse Kinshasa de régler les arriérés de paiement","url":"https://www.bloomberg.com/news/articles/2026-07-09/africa-cdc-urges-congo-to-pay-striking-ebola-workers","content":"L'Africa Centres for Disease Control and Prevention a exhorté le gouvernement de la RDC à accélérer le règlement des arriérés de paiement dus aux travailleurs qui luttent contre l'épidémie d'Ebola Bundibugyo, dont la grève menace l'ensemble du dispositif de riposte. Les personnels de santé à Bunia et dans la région de Rwampara ont cessé le travail pour réclamer leurs indemnités et la résolution de mauvaises conditions d'exercice. Cette grève intervient dans un contexte déjà critique : l'épidémie comptait 1 792 cas confirmés et 625 décès au 9 juillet 2026, ce qui en fait la troisième plus grande flambée Ebola de l'histoire. Africa CDC avertit que toute interruption des activités de surveillance et de traçage des contacts pourrait provoquer une accélération incontrôlée de la propagation du virus.","date":"2026-07-09"},
{"title":"L'épidémie de Bundibugyo classée 3e plus grande flambée Ebola de l'histoire : 1 792 cas et 625 décès","url":"https://www.cfr.org/articles/africa-has-faced-a-rare-ebola-outbreak-for-months-heres-what-to-know","content":"L'épidémie de maladie à virus Bundibugyo (BVD) en RDC et en Ouganda est désormais classée comme la troisième plus grande flambée Ebola de l'histoire, selon le Council on Foreign Relations et les données de l'Africa CDC au 9 juillet 2026. La RDC recense à elle seule 1 792 cas confirmés et 625 décès, dans un contexte de grèves du personnel de santé, de coupes budgétaires internationales et d'absence de vaccin approuvé contre cette souche. L'épidémie, partie de la province de l'Ituri, a franchi la frontière ougandaise avec 20 cas supplémentaires confirmés. L'OMS et l'Africa CDC ont lancé un plan d'urgence conjoint de 518 millions USD sur six mois, mais les experts s'inquiètent de la soutenabilité des financements face au désengagement de plusieurs bailleurs traditionnels, dont les États-Unis.","date":"2026-07-09"},
{"title":"Africa CDC déploie une stratégie d'engagement des jeunes dans la santé mondiale : la YES!Health 2025-2028","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"L'Africa CDC a publié sa stratégie d'engagement et de participation des jeunes dans la santé mondiale, baptisée YES!Health (Youth Engagement and Participation in Global Health), couvrant la période 2025-2028. Portée par le Dr Chrys Promesse Kaniki, cette initiative reconnaît le rôle crucial des jeunes africains âgés de 15 à 35 ans — qui représentent plus de 65 % de la population du continent — dans la résolution des défis sanitaires persistants. La stratégie vise à intégrer les jeunes comme acteurs à part entière des systèmes de santé publique, en leur offrant des plateformes de participation active dans les politiques de santé, la surveillance épidémique et la réponse aux urgences. Cette démarche s'inscrit dans la vision plus large de l'Africa CDC de bâtir une Afrique résiliente, capable de prendre en charge sa propre sécurité sanitaire, notamment dans un contexte marqué par la recrudescence des maladies à virus Ebola et les séquelles de la pandémie de COVID-19 sur les systèmes de surveillance des maladies non transmissibles.","date":"2026-07-11"},
{"title":"Africa CDC et WHO AFRO lancent une équipe continentale de gestion des incidents pour renforcer la réponse aux urgences de santé publique","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Kampala, Ouganda, 27 juin 2026 — L'Africa CDC et le Bureau régional de l'OMS pour l'Afrique (WHO AFRO) ont officiellement lancé une Équipe continentale de gestion des incidents (IMST), en présence du ministre ougandais de la Santé, le Dr Chris Baryomunsi. Cette initiative vise à renforcer le leadership de l'Afrique dans la gestion des urgences de santé publique, en particulier dans le contexte de l'épidémie de maladie à virus Ebola Bundibugyo qui sévit en RDC et en Ouganda. Par ailleurs, l'Africa CDC a réuni 13 pays à Kampala pour un atelier de préparation régionale face à cette menace épidémique. Lors d'une réunion de haut niveau présidentielle tenue le 16 juin 2026 sous la présidence du Président du Burundi, S.E. Évariste Ndayishimiye, les chefs d'État et de gouvernement africains ont exprimé leur engagement collectif à intensifier la réponse continentale. Le Président de la RDC, Félix Antoine Tshisekedi, a également accueilli le Président ougandais le 2 juillet 2026, soulignant la dimension diplomatique et régionale de cette crise sanitaire sans précédent.","date":"2026-07-11"},
{"title":"Épidémie de maladie à virus Bundibugyo : 1 581 cas confirmés et 508 morts en RDC et en Ouganda","url":"https://khub.africacdc.org/health-topics/surveillance","content":"L'épidémie de maladie à virus Bundibugyo (BVD) en République démocratique du Congo (RDC) et en Ouganda atteint un niveau alarmant en ce début juillet 2026. Selon les dernières données publiées par l'Africa CDC, le cumul des cas confirmés dans les deux pays s'élève à 1 581, avec 508 décès recensés, portant le taux de létalité global à 32,1 %. La province de l'Ituri en RDC demeure l'épicentre de la crise, concentrant plus de 90 % des cas confirmés et près de 84 % des décès. Le Nord-Kivu, autre province affectée, enregistre quant à lui le taux de létalité provincial le plus élevé, atteignant 57,4 %, témoignant de la gravité de la situation clinique et des difficultés de prise en charge sur le terrain. En Ouganda, la situation reste relativement stable avec 20 cas confirmés et 2 décès. L'Africa CDC maintient une surveillance renforcée aux points d'entrée et de sortie, et appelle à une vigilance soutenue face au risque persistant de transmission transfrontalière.","date":"2026-07-11"},
{"title":"Africa CDC publie une guidance intérimaire contre les restrictions de voyage blanket face à l'épidémie de Bundibugyo","url":"https://khub.africacdc.org/records/resource/bundibugyo-ebola-virus-disease-bvd-interim-guidance-on-blanket-travel-restrictions-and-public-gatherings","content":"Face à l'épidémie de maladie à virus Bundibugyo (BVD) qui continue d'évoluer en République démocratique du Congo (DRC) et en Ouganda, l'Africa CDC a publié le 9 juin 2026 une guidance intérimaire sur les restrictions de voyage et les rassemblements publics. Se fondant sur les données épidémiologiques au 8 juin 2026 et sur les enseignements tirés des précédentes épidémies d'Ebola en Afrique de l'Ouest, en RDC et en Ouganda, ce document souligne que l'imposition de restrictions de voyage généralisées n'est pas étayée par les données de santé publique et pourrait compromettre la sécurité sanitaire nationale et mondiale. L'Africa CDC encourage plutôt les pays à adopter des mesures basées sur les risques, permettant de contrôler efficacement l'épidémie tout en préservant les voyages essentiels, le commerce et les activités humanitaires.","date":"2026-07-10"},
{"title":"Africa CDC et OMS lancent un plan continental conjoint de réponse à l'Ebola, visant 518 millions USD","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"L'Africa CDC et l'Organisation mondiale de la Santé (OMS) ont officiellement lancé le 5 juin 2026 un plan continental conjoint de préparation et de réponse à l'épidémie d'Ebola causée par le virus Bundibugyo, qui sévit en République démocratique du Congo et en Ouganda. Ce plan de six mois, couvrant la période de juin à novembre 2026, ambitionne de mobiliser 518 millions de dollars pour soutenir les pays africains dans la détection rapide et la riposte à l'épidémie. Selon le Dr Jean Kaseya, Directeur général de l'Africa CDC : « Ebola se propage vite. L'Afrique doit aller encore plus vite. » Le plan adopte une approche dite 'Une seule réponse', englobant la coordination d'urgence, la surveillance épidémiologique, les tests en laboratoire, la prévention des infections, les soins cliniques, l'engagement communautaire et la logistique.","date":"2026-07-10"},
{"title":"Africa CDC holds Special Briefing on Ebola Outbreak Response in DRC and Uganda","url":"https://www.youtube.com/watch?v=lTHfkdTOBEo","content":"Africa CDC held a special weekly briefing on July 9, 2026, dedicated to the latest developments in the Ebola outbreak response in the Democratic Republic of Congo (DRC) and Uganda. The briefing, aligned with the goals of the Africa Health Security and Sovereignty (AHSS) Agenda, highlighted coordinated actions taken by African Union Member States and partners to strengthen prevention, preparedness, detection, and response systems across the continent. The session brought together stakeholders from across time zones to discuss priority public health issues and advance Africa's collective health security posture.","date":"2026-07-10"},
],
"african-medical-agency":[
{"title":"OMS et AMA signent un accord-cadre historique à l'AMS79 pour renforcer l'accès aux médicaments en Afrique","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"Le 21 mai 2026, en marge de la 79e Assemblée mondiale de la Santé (AMS79) à Genève, l'OMS et l'Agence Africaine des Médicaments (AMA) ont signé un accord-cadre de collaboration historique. Le document, paraphé par la DG de l'AMA Dr Delese Mimi Darko et le DG de l'OMS Dr Tedros Adhanom Ghebreyesus, établit une feuille de route conjointe sur trois à cinq ans pour accélérer l'accès aux produits de santé sûrs en Afrique, harmoniser les standards réglementaires continentaux, renforcer la surveillance des médicaments falsifiés et sous-standard, développer les capacités de la main-d'œuvre réglementaire africaine, et soutenir l'innovation et la production locale. L'accord s'appuie sur le mémorandum d'entente renouvelé entre l'OMS et l'Union africaine de mai 2025 et donne une portée institutionnelle sans précédent à la coopération OMS-AMA.","date":"2026-05-22"},
{"title":"L'AMA fait ses premiers pas au Sommet de l'Union africaine : présence historique en février 2026","url":"https://www.giz.de/en/regions/africa/african-union/news/african-medicines-agency-debuts-african-union-summit","content":"Le 13 février 2026, l'Agence Africaine des Médicaments (AMA) a fait sa première apparition officielle au Sommet de l'Union africaine, marquant un tournant symbolique dans son processus d'institutionnalisation. Cette présence au plus haut niveau de l'architecture panafricaine a permis à l'AMA de plaider pour l'accélération de la ratification du Traité AMA par les États membres de l'UA, de mobiliser des financements durables et d'ancrer l'harmonisation réglementaire dans l'agenda de développement continental. En janvier 2026, l'AMA avait reçu le transfert formel de l'Initiative AMRH depuis l'AUDA-NEPAD, franchissant une étape clé vers sa pleine autorité institutionnelle. L'Agence déploie son plan organisationnel en trois phases : Fondation (2024-2025), Expansion (2026-2030) et Maturité (2031 et au-delà).","date":"2026-02-13"},
{"title":"Frontiers in Medicine publie une analyse historique complète de l'AMA : origines, gouvernance et perspectives","url":"https://www.frontiersin.org/journals/medicine/articles/10.3389/fmed.2026.1763261/full","content":"La revue scientifique internationale Frontiers in Medicine a publié en 2026 une analyse approfondie de l'Agence Africaine des Médicaments (AMA), retraçant son parcours depuis les premières initiatives d'harmonisation pharmaceutique africaine jusqu'à sa mise en opération institutionnelle. L'article décrit l'évolution de l'AMA à travers ses jalons fondateurs — l'Acte constitutif de l'UA (2000), la création de l'AMRH sous NEPAD, l'adoption du Traité AMA — ainsi que sa structure de gouvernance, ses comités techniques et ses relations avec l'EMA et l'OMS. Les auteurs soulignent que l'AMA représente une opportunité historique de rompre avec la fragmentation réglementaire qui ralentit l'accès aux médicaments sur le continent, et appellent à un financement souverain africain pour garantir l'indépendance de l'Agence à long terme.","date":"2026-06-15"},
{"title":"Le lancement de l'Agence Africaine des Médicaments : une révolution pour la régulation pharmaceutique continentale","url":"https://www.nature.com/articles/d44148-025-00350-8","content":"La mise en opération de l'Agence Africaine des Médicaments (AMA) représente une étape décisive pour la régulation pharmaceutique sur le continent africain. L'Agence Européenne des Médicaments (EMA), par la voix de son responsable des affaires internationales Martin Harvey Allchurch, confirme que des financements sont directement orientés vers des projets collaboratifs spécifiques avec l'AMA. Parmi ceux-ci figure un effort conjoint avec l'OMS visant à soutenir le projet pilote de l'AUDA-NEPAD pour la première évaluation et inscription continentale conjointe de médicaments à usage humain — une étape clé dans l'opérationnalisation de l'AMA. Ce mécanisme régional devrait permettre de réduire les délais d'approbation des médicaments en Afrique, d'harmoniser les standards de sécurité et d'ouvrir la voie à un accès plus équitable aux thérapeutiques innovantes pour les populations africaines.","date":"2026-07-05"},
{"title":"EMA renforce sa coopération avec l'AMA : visite de haut niveau à Amsterdam pour consolider le partenariat réglementaire euro-africain","url":"https://techreviewafrica.com/news/6104/african-medicines-agency-enhances-regulatory-cooperation-with-european-medicines-agency","content":"Une délégation de l'Agence Africaine des Médicaments (AMA) a effectué une visite officielle au siège de l'Agence Européenne des Médicaments (EMA) à Amsterdam du 22 au 26 juin 2026 pour approfondir la coopération réglementaire entre les deux institutions. Les échanges ont porté sur le partage de connaissances, l'apprentissage mutuel et les projets pilotes d'évaluation conjointe de médicaments à usage humain menés avec l'AUDA-NEPAD et l'OMS. Cette coopération est d'autant plus stratégique dans le contexte de l'épidémie d'Ebola Bundibugyo, où AMA et EMA ont tenu leur premier engagement scientifique conjoint en juin 2026 pour accélérer l'accès aux contre-mesures médicales. Le partenariat EMA-AMA constitue un modèle de coopération réglementaire Nord-Sud susceptible d'être étendu à d'autres agences du médicament dans le monde.","date":"2026-06-26"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
],
"manufacture-vaccins":[
{"title":"Gavi AVMA : premier décaissement à un fabricant africain attendu en 2026, 13 accords de transfert de technologie signés","url":"https://www.semafor.com/article/07/02/2026/africa-moves-ahead-with-vaccine-manufacturing-ambitions","content":"L'African Vaccine Manufacturing Accelerator (AVMA) de Gavi, lancé en juin 2024 avec une enveloppe maximale de 1,2 milliard USD sur dix ans, devrait réaliser son premier décaissement à un fabricant africain au second semestre 2026 — une étape symbolique pour la souveraineté vaccinale du continent. En dix-huit mois d'existence, l'AVMA a déjà catalysé 13 accords de transfert de technologie entre des fabricants africains et des partenaires mondiaux, entraîné la construction de sites de production à échelle commerciale dans six pays africains, et mobilisé 3 milliards USD de financements additionnels. Si ces jalons sont franchis, les premiers vaccins soutenus par l'AVMA pourraient être déployés dès 2027. Gavi propose également des mesures complémentaires (AVMA+) totalisant 189 millions USD additionnels, à présenter au Conseil de Gavi en juillet 2026.","date":"2026-07-02"},
{"title":"Égypte : EVA Pharma lance la première plateforme mARN 'digital-to-biologics' d'Afrique pour 100 millions de doses par an","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"Le groupe pharmaceutique égyptien EVA Pharma a conclu un partenariat stratégique avec des biotechs européennes pour établir en Égypte la première plateforme de production mARN 'digital-to-biologics' du continent africain, permettant une production intégrée de bout en bout — de la conception numérique des séquences à la fabrication des doses — avec une capacité cible de 100 millions de doses par an. Ce projet s'inscrit dans la dynamique continentale documentée par le rapport 2026 de la Clinton Health Access Initiative (CHAI), qui recense 11 vaccins africains en développement couvrant huit antigènes (rougeole-rubéole, rotavirus, fièvre jaune, entre autres), susceptibles d'atteindre le marché continental dans les cinq prochaines années. L'Afrique produit actuellement moins de 1 % des vaccins qu'elle utilise, et vise 60 % de production locale d'ici 2040.","date":"2026-07-01"},
{"title":"Rapport CHAI 2026 : cinq obstacles systémiques freinent la montée en puissance des fabricants de vaccins africains","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"La Clinton Health Access Initiative (CHAI) a publié en 2026 son rapport annuel sur le paysage de la fabrication vaccinale en Afrique, identifiant cinq obstacles transversaux qui continuent de retarder les fabricants africains les plus avancés : délais réglementaires, incertitude de la demande de marché, lenteur des décaissements financiers, retards des partenaires de transfert de technologie, et pénuries de main-d'œuvre qualifiée. Parmi les acteurs les plus avancés, Atlantic Lifesciences au Ghana a réalisé des progrès significatifs depuis 2024. Le rapport souligne que malgré des signaux encourageants — six fabricants disposant d'installations construites et de transferts actifs —, la route vers l'autonomie vaccinale africaine demeure longue, et appelle les bailleurs et gouvernements à aligner leurs soutiens sur des calendriers réalistes et prévisibles.","date":"2026-07-01"},
{"title":"Surveillance moléculaire de l'influenza en Namibie : un modèle pour orienter la production de vaccins adaptés à l'Afrique","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"Une étude publiée dans le cadre du hub de connaissances sanitaires de l'Africa CDC met en lumière les résultats d'une surveillance moléculaire approfondie des virus de la grippe A et B en Namibie, couvrant la période 2021-2023. Cette recherche, menée à Windhoek, documente les patterns saisonniers de circulation des souches grippales et leurs corrélats cliniques, fournissant des données précieuses pour adapter la composition des vaccins antigrippaux aux réalités épidémiologiques africaines. Les auteurs soulignent que les données de surveillance génomique locale sont indispensables pour permettre aux fabricants de vaccins de produire des formulations mieux adaptées aux souches circulant en Afrique subsaharienne, souvent différentes de celles prédominantes dans l'hémisphère nord. Cette étude plaide pour le renforcement des infrastructures de séquençage génomique et de surveillance virale sur le continent, condition sine qua non pour soutenir une fabrication de vaccins africaine véritablement souveraine et pertinente.","date":"2026-07-11"},
{"title":"Ebola Bundibugyo sans vaccins ni traitements : l'urgence de la fabrication locale de vaccins en Afrique","url":"https://khub.africacdc.org/records/resource/africa-cdc-ebola-outbreaks-in-drc-and-uganda-weekly-brief-28th-may-2026","content":"Le rapport hebdomadaire d'Africa CDC sur l'épidémie Ebola Bundibugyo en RDC et en Ouganda met en lumière une réalité alarmante : aucun vaccin ni traitement approuvé n'est disponible contre cette souche. Un article associé, publié en juillet 2026 sous le titre « Bundibugyo Ebola Without Vaccines or Therapeutics: Why Public Health Fundamentals Matter More Than Border Closures », souligne que l'absence d'outils biomédicaux spécifiques place les équipes de santé publique dans une position de vulnérabilité extrême. Cette situation relance le débat sur la nécessité d'accélérer la fabrication locale de vaccins en Afrique, et d'intégrer les pathogènes prioritaires du continent dans les agendas industriels pharmaceutiques régionaux.","date":"2026-07-09"},
{"title":"Kenya : Africa CDC signe un accord historique pour son centre régional de coordination en Afrique de l'Est","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Africa CDC a signé un accord de partenariat stratégique avec le gouvernement du Kenya, qui met à disposition 10 acres de terrain et une contribution financière de 2 millions USD pour le Centre régional de coordination de l'Afrique de l'Est, basé à Nairobi. Ce centre, l'un des cinq que compte Africa CDC sur le continent, sera doté prochainement d'un laboratoire régional de référence dont le financement est activement recherché. Le Dr Jean Kaseya a appelé les pays africains à suivre l'exemple du Kenya pour soutenir la production et la surveillance sanitaire continentales.","date":"2026-07-08"},
{"title":"CPHIA 2026 : l'Afrique réunit ses leaders de santé publique à Addis-Abeba pour accélérer l'innovation","url":"https://cphia.africacdc.org","content":"La 5e Conférence internationale sur la santé publique en Afrique (CPHIA 2026) se tiendra à Addis-Abeba, avec comme thématiques phares l'innovation en santé, la fabrication locale de produits médicaux et les technologies de santé africaines. Plus de 30 000 délégués sont attendus pour explorer les solutions de fabrication continentale de vaccins et de médicaments, dans le cadre de la souveraineté sanitaire africaine. Les soumissions d'abstracts et de candidatures aux bourses sont ouvertes jusqu'au 15 août 2026.","date":"2026-07-08"},
],
"unicef-gavi":[
{"title":"UNICEF et Gavi lancent un appel urgent à fabricants de vaccins contre l'Ebola Bundibugyo pour accélérer l'accès","url":"https://www.globalsecurity.org/security/library/news/2026/06/sec-260624-unicef01.htm","content":"Le 24 juin 2026, l'UNICEF et Gavi ont conjointement lancé un appel à manifestation d'intérêt auprès des fabricants de vaccins pour accélérer le développement et l'accès à des vaccins contre l'Ebola Bundibugyo, en réponse à l'épidémie en cours en RDC et en Ouganda qui comptait alors plus de 1 500 cas confirmés. Cet appel souligne l'urgence critique : aucun vaccin ni traitement approuvé n'existe à ce jour contre cette souche spécifique, laissant les équipes de santé publique sans outil biomédical efficace. Les deux organisations proposent un mécanisme d'engagement de marché anticipé (AMC) pour garantir l'achat des futurs vaccins homologués, réduisant ainsi le risque commercial pour les fabricants — un modèle inspiré du dispositif COVAX mis en place lors de la pandémie de COVID-19.","date":"2026-06-24"},
{"title":"Gavi engage 50 millions USD pour les vaccins contre l'Ebola Bundibugyo et la réponse à l'épidémie","url":"https://www.gavi.org/news/media-room/gavi-commits-us-50-million-bundibugyo-ebolavirus-vaccines-and-outbreak-response","content":"Gavi, l'Alliance du Vaccin, a annoncé un engagement exceptionnel de 50 millions USD pour soutenir à la fois la réponse opérationnelle à l'épidémie d'Ebola Bundibugyo en RDC et en Ouganda, et l'accélération du développement de vaccins spécifiques contre cette souche. Cette enveloppe finance le soutien logistique aux équipes de riposte, la mobilisation communautaire, le renforcement des chaînes du froid et les mécanismes d'accès anticipé aux futurs vaccins. Gavi souligne que l'absence de vaccin homologué contre le virus Bundibugyo représente une lacune critique que l'Alliance entend combler en mobilisant les industriels pharmaceutiques et en réduisant les risques financiers liés au développement de vaccins pour des marchés historiquement peu rentables.","date":"2026-06-25"},
{"title":"Vaccin antipaludique : 25 pays africains adoptent la vaccination systématique, 52 millions de doses distribuées depuis 2023","url":"https://www.gavi.org/our-work/vaccine-portfolio/malaria","content":"Au 28 janvier 2026, 25 pays africains à haute endémicité palustre ont intégré le vaccin antipaludique dans leurs programmes nationaux de vaccination de routine, grâce au soutien conjoint de Gavi, de l'OMS et de l'UNICEF. Depuis le lancement du programme en 2023, plus de 52 millions de doses ont été administrées dans certains des contextes les plus touchés par le paludisme au monde. Le paludisme reste la première cause de mortalité infantile dans de nombreuses régions d'Afrique subsaharienne. Dans le cadre de Gavi 6.0 (2026-2030), l'Alliance vise à vacciner plus de 500 millions d'enfants et d'adolescents supplémentaires, avec 1,5 million de vies sauvées grâce au vaccin contre le papillomavirus humain (HPV) et des gains mesurables contre le cancer du col de l'utérus et le paludisme.","date":"2026-01-28"},
{"title":"Face à Ebola Bundibugyo, UNICEF et Gavi au cœur de la stratégie de préparation épidémique en Afrique","url":"https://www.facebook.com/africacdc/posts/-postponement-notice-weekly-press-briefingthis-weeks-briefing-has-been-postponed/1428976145927422","content":"Alors que l'Africa CDC reorganise sa réponse à l'épidémie d'Ebola Bundibugyo sous l'impulsion de la mission du Président Cyril Ramaphosa, Champion de l'Union africaine pour la prévention, la préparation et la réponse aux pandémies (PPPR), en RDC, des partenaires clés comme l'UNICEF et Gavi intensifient leur soutien opérationnel sur le terrain. Ces organisations contribuent au renforcement des systèmes de santé communautaires, à la chaîne du froid pour les produits médicaux disponibles, à l'éducation sanitaire des populations et à la coordination logistique des interventions d'urgence. La solidarité internationale, rappelée lors du briefing de l'Africa CDC, demeure essentielle face à une épidémie qui ne dispose pas encore de vaccin approuvé.","date":"2026-07-10"},
{"title":"Gavi et UNICEF mobilisés pour soutenir la riposte à l'épidémie d'Ebola en Afrique centrale","url":"https://www.facebook.com/africacdc/videos/special-briefing-on-ebola-outbreak-response-july-9-2026/1574351157729456","content":"Dans le cadre de la réponse à l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, les partenaires internationaux dont Gavi, l'Alliance pour les vaccins, et l'UNICEF sont étroitement associés aux efforts de coordination continentale. Ces organisations apportent leur expertise logistique, leur soutien financier et leurs capacités de déploiement rapide pour appuyer les gouvernements affectés. Le briefing spécial de l'Africa CDC du 9 juillet 2026 a réaffirmé l'importance de la solidarité internationale et des partenariats solides dans la lutte contre les épidémies, soulignant que la coordination entre l'Union africaine, l'OMS, Gavi et l'UNICEF constitue la pierre angulaire d'une riposte efficace et équitable pour les communautés à risque.","date":"2026-07-10"},
{"title":"Gavi et UNICEF mobilisés face à la crise vaccinale en Afrique : l'épidémie Ebola révèle les lacunes du système","url":"https://www.infectioncontroltoday.com/view/2026-ebola-outbreak-spreads-central-africa-who-warns-growing-crisis-amid-cdc-usaid-cuts","content":"Alors que l'épidémie d'Ebola Bundibugyo continue de se propager en RDC et en Ouganda avec plus de 513 cas et 130 décès suspects, les organisations internationales dont Gavi et l'UNICEF font face à une pression croissante pour combler le vide laissé par les coupes budgétaires américaines. La réduction de 90 % du financement de l'USAID et le retrait des États-Unis de l'OMS ont sévèrement compromis les efforts de réponse. Dans ce contexte, les partenaires onusiens sont appelés à redoubler d'efforts pour maintenir les programmes de vaccination et de préparation aux épidémies sur le continent africain, en particulier dans les zones de conflit et les corridors commerciaux à haut risque.","date":"2026-07-09"},
],
"sante-maroc":[
{"title":"Fusion CNOPS-CNSS actée : une gouvernance unique de l'AMO pour tous les Marocains effective en février 2027","url":"https://medias24.com/2026/04/11/transfert-de-la-cnops-a-la-cnss-le-cese-alerte-sur-une-reforme-insuffisante-et-risquee-pour-lequilibre-du-systeme-1657861/","content":"En décembre 2025, le Parlement marocain a adopté la loi portant fusion de la CNOPS dans la CNSS, réforme qui fera de la CNSS l'unique gestionnaire de l'Assurance maladie obligatoire (AMO) de base au Maroc à partir de février 2027, tous secteurs confondus (privé, public, Tadamon, Achamil, TNS). Parmi les mesures d'accompagnement, l'âge limite des enfants à charge couverts par l'AMO a été étendu de 26 à 30 ans. Cependant, le Conseil économique, social et environnemental (CESE) a exprimé en avril 2026 des réserves sur l'insuffisance des garanties d'équilibre financier et les risques que cette réforme fait peser sur la pérennité du système. Plus de 32 millions de Marocains (88 % de la population) bénéficient désormais d'une couverture AMO, contre seulement 42 % avant la généralisation initiée en 2021.","date":"2026-04-11"},
{"title":"Feuille de soins électronique au Maroc : généralisation nationale en cours après la phase pilote de Kénitra","url":"https://lematin.ma/nation/amo-la-feuille-de-soins-electronique-pour-mars-2026/329430","content":"La feuille de soins électronique, outil central de la réforme de l'AMO au Maroc, a franchi une étape décisive avec le lancement d'une phase pilote dans la région de Kénitra à fin mars 2026, avant une généralisation progressive à l'ensemble du territoire national entre avril et juin 2026. Ce dispositif numérique vise à simplifier les démarches administratives pour les assurés et les prestataires de soins, réduire la fraude, et améliorer la traçabilité des actes médicaux remboursés par la CNSS. Pour les médecins et cliniques, la mesure implique une mise à niveau informatique des cabinets et une connexion au système d'information de la CNSS. L'AMMPS, nouvelle Agence marocaine du médicament et des produits de santé, entre parallèlement en fonction en 2026 pour moderniser la réglementation pharmaceutique nationale.","date":"2026-03-28"},
{"title":"Santé 2026 au Maroc : l'année du test pour la réforme de l'État social selon les experts","url":"https://telquel.ma/2026/03/16/tribune-reforme-de-la-sante-au-maroc-2026-lannee-du-test_1978966","content":"Selon des experts et analystes du secteur, 2026 constitue l'année décisive pour évaluer la réforme du système de santé marocain portée par la Vision royale de l'État social. Les défis sont multiples : opérationnalisation des Groupements sanitaires territoriaux (GST) dans toutes les régions, généralisation de la feuille de soins électronique, démarrage effectif de l'AMMPS, et surtout la résolution de la pénurie structurelle de ressources humaines — particulièrement criante en zones rurales et montagneuses. Le budget 2026 de 42,4 milliards de dirhams (+30 %) et les 8 000 nouveaux postes budgétaires donnent une impulsion forte, mais la réussite de la réforme dépendra de la capacité à mobiliser et fidéliser les professionnels de santé sur tout le territoire, y compris dans les zones les plus éloignées des centres urbains.","date":"2026-03-16"},
{"title":"Le Maroc consolide son système de santé publique à l'aune des défis épidémiques continentaux","url":"https://microbiotics.com.ng/africa-cdc-strategic-plan-2022-2026?pdf=4936","content":"Dans un contexte de flambées épidémiques récurrentes sur le continent africain, le Maroc renforce ses dispositifs de veille sanitaire et de réponse aux urgences de santé publique. Le Royaume s'appuie sur son réseau de laboratoires de référence et sur ses partenariats avec des institutions internationales telles qu'Africa CDC et l'OMS pour détecter précocement toute menace épidémique. Le Plan stratégique 2022-2026 d'Africa CDC, qui prévoit un Centre de coordination régional pour l'Afrique du Nord basé au Caire, constitue une opportunité pour le Maroc de renforcer son intégration dans l'architecture continentale de sécurité sanitaire. Les autorités marocaines veillent par ailleurs à maintenir des capacités de prise en charge des maladies à potentiel épidémique importées, dans le respect des Règlements sanitaires internationaux.","date":"2026-07-04"},
{"title":"Budget santé 2026 au Maroc : 42,4 milliards de dirhams, une hausse de 30 % et 8 000 nouveaux postes budgétaires","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le ministère marocain de la Santé et de la Protection sociale dispose en 2026 d'un budget record de 42,4 milliards de dirhams, en hausse de 30 % par rapport à l'exercice précédent, dans le cadre de la réforme structurelle du système national de santé portée par la Vision royale de l'État social. Sur cette enveloppe, 16,4 milliards de dirhams sont dédiés aux dépenses de personnel, avec la création de 8 000 nouveaux postes budgétaires pour renforcer les ressources humaines à tous les niveaux du système de soins. Les investissements prioritaires de 2026 incluent la construction de nouveaux Centres hospitaliers universitaires (CHU), la mise à niveau de 90 hôpitaux existants et le déploiement progressif des Groupements sanitaires territoriaux (GST). D'ici fin 2027, toutes les régions du Maroc, à l'exception de Dakhla-Oued Eddahab, disposeront de leur propre CHU.","date":"2026-07-03"},
{"title":"Réforme de l'état social au Maroc : la santé change d'échelle avec les Groupements sanitaires territoriaux","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"La réforme du secteur de la santé au Maroc entre en 2026 dans une phase décisive avec l'opérationnalisation progressive des Groupements sanitaires territoriaux (GST), nouvelles entités de gouvernance régionale chargées d'intégrer et de coordonner l'ensemble des établissements de santé d'une même région. Cette restructuration vise à mettre fin à la fragmentation du système de soins, à améliorer l'accès aux soins en milieu rural et semi-urbain, et à renforcer la complémentarité entre les secteurs public et privé. Si l'ambition réformatrice est globalement saluée, des résistances subsistent parmi les professionnels de santé face aux changements organisationnels, notamment concernant la mobilité des personnels et la redistribution des compétences entre niveaux de soins. La généralisation de la feuille de soins électronique constitue un autre chantier prioritaire de 2026, visant à simplifier les démarches administratives et améliorer la traçabilité des soins.","date":"2026-07-01"},
],
"vaccins-monde":[
{"title":"La vaccination préventive anti-choléra reprend dans le monde : stocks mondiaux doublés à près de 70 millions de doses","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'OMS a annoncé le 4 février 2026 la reprise des campagnes de vaccination préventive contre le choléra, après une interruption due à la pénurie mondiale de vaccins oraux. Une première allocation de 20 millions de doses a été déployée : 3,6 millions livrées au Mozambique, 6,1 millions à la RDC et 10,3 millions planifiées pour le Bangladesh. Cette reprise est rendue possible par un doublement de la production mondiale annuelle, passée d'environ 35 millions de doses en 2022 à près de 70 millions en 2025. Le choléra reste une maladie aux conséquences potentiellement fatales, particulièrement dans les contextes humanitaires, et l'OMS souligne que la vaccination préventive est un complément indispensable aux mesures d'eau et d'assainissement pour briser les chaînes de transmission.","date":"2026-02-04"},
{"title":"Mpox : l'OMS publie le 66e rapport de situation, l'épidémie mondiale persiste avec des défis d'accès vaccinal inégal","url":"https://www.who.int/publications/m/item/multi-country-outbreak-of-mpox--external-situation-report--66---31-may-2026","content":"Le 66e rapport de situation de l'OMS sur l'épidémie multicontinentale de mpox, publié le 31 mai 2026, documente l'évolution épidémiologique mondiale avec les données d'avril 2026. L'épidémie, débutée en 2022, a touché des dizaines de pays sur plusieurs continents, avec une transmission maintenue tant dans les pays à revenus élevés qu'en Afrique subsaharienne. L'OMS coordonne la réponse internationale, notamment la distribution des vaccins MVA-BN et LC16, dont l'accès reste inégal selon les régions. La persistance du mpox sur plusieurs années illustre les défis de l'éradication d'un orthopoxvirus en contexte de déclin de l'immunité naturelle lié à l'arrêt de la vaccination antivariolique universelle, et rappelle l'importance de maintenir des programmes de vaccination robustes pour les populations à risque.","date":"2026-05-31"},
{"title":"Dengue : l'OMS recommande le vaccin TAK-003 de Takeda pour les enfants de 6 à 16 ans dans les zones à forte transmission","url":"https://www.who.int/teams/immunization-vaccines-and-biologicals/diseases/dengue","content":"L'Organisation mondiale de la Santé recommande l'utilisation du vaccin tétravalent TAK-003 (Qdenga), développé par Takeda, pour les enfants âgés de 6 à 16 ans vivant dans des zones à forte prévalence de dengue. Ce vaccin, préqualifié par l'OMS en mai 2024, contient des versions atténuées des quatre sérotypes de la dengue et offre une protection significative contre les formes sévères de la maladie. La dengue affecte plus de 100 pays dans le monde et représente un enjeu de santé publique croissant en raison de l'expansion géographique du moustique vecteur Aedes aegypti, amplifiée par les changements climatiques. L'OMS et Gavi examinent les conditions d'un déploiement élargi du vaccin dans les pays à faibles ressources, où la dengue cause les pertes économiques et sanitaires les plus lourdes.","date":"2026-07-05"},
{"title":"Ebola Bundibugyo : l'absence de vaccins approuvés met en alerte la communauté scientifique internationale","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Alors que l'épidémie de maladie à virus Bundibugyo continue de s'étendre en RDC et en Ouganda, les autorités sanitaires mondiales tirent la sonnette d'alarme sur l'absence de vaccins ou de traitements spécifiquement approuvés contre cette souche. Le CDC américain a publié le 1er juillet 2026 des recommandations pour les voyageurs en provenance des zones affectées, incluant une surveillance des symptômes pendant 21 jours et un renforcement des contrôles sanitaires aux points d'entrée. La communauté scientifique internationale appelle à une accélération des essais cliniques et du développement de candidats vaccins contre le virus Bundibugyo, soulignant que les vaccins disponibles actuellement ont été développés pour d'autres souches du genre Ebolavirus et n'offrent pas de protection croisée confirmée.","date":"2026-07-10"},
{"title":"OMS et UNICEF : publication des estimations actualisées de couverture vaccinale nationale WUENIC 2025","url":"https://immunizationdata.who.int/","content":"L'OMS et l'UNICEF publient en juillet 2026 les estimations actualisées de couverture vaccinale nationale (WUENIC 2025), données de référence annuelles sur l'état de l'immunisation dans le monde entier, avec un webinaire de présentation des résultats programmé le 15 juillet 2026. Ces statistiques par pays et par antigène orientent les stratégies d'investissement de Gavi, de l'UNICEF et des gouvernements partenaires pour identifier les populations prioritaires en matière de rattrapage vaccinal. Elles constituent le principal outil de suivi des progrès vers les objectifs mondiaux de vaccination et d'élimination des maladies évitables. Dans un contexte de réduction des financements internationaux, ces données sont plus que jamais cruciales pour cibler les ressources disponibles vers les pays et populations les plus vulnérables.","date":"2026-07-07"},
{"title":"OMS : le Comité PDVAC se réunit le 6 juillet 2026 pour définir les priorités mondiales de développement vaccinal","url":"https://www.who.int/news-room/events/detail/2026/07/06/default-calendar/2026-who-product-development-for-vaccines-advisory-committee-meeting-(pdvac)","content":"Le Comité consultatif pour le développement de produits vaccinaux (PDVAC) de l'OMS tient sa réunion annuelle le 6 juillet 2026 pour examiner les priorités mondiales en matière de R&D vaccinale, notamment les candidats-vaccins contre le virus Bundibugyo, la dengue, le paludisme et d'autres pathogènes prioritaires. Ce comité d'experts indépendants — virologues, immunologistes et spécialistes de santé publique — formule des recommandations sur les technologies vaccinales à prioriser, les essais cliniques à soutenir et les mécanismes d'accès équitable. Dans le contexte de la crise Ebola Bundibugyo, le PDVAC joue un rôle critique pour guider les investissements en R&D et accélérer le développement de contre-mesures médicales adaptées à ce virus pour lequel aucun vaccin homologué n'existe à ce jour. Ses recommandations orienteront les stratégies d'investissement des grandes institutions mondiales de santé pour les années à venir.","date":"2026-07-06"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
