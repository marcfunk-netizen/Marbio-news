var articlesData={
"african-cdc":[
{"title":"Africa CDC renforce le contrôle sanitaire aux points d'entrée face à la propagation du virus Ebola Bundibugyo","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-8-14-june-2026/","content":"Face à la progression de l'épidémie d'Ebola Bundibugyo qui a dépassé 837 cas confirmés en RDC et en Ouganda, le Directeur Général de l'Africa CDC, Dr Jean Kaseya, a adressé une lettre officielle aux ministres de la Santé de tous les États membres de l'Union africaine les exhortant à renforcer immédiatement le contrôle sanitaire aux aéroports, ports maritimes et postes frontières terrestres. Ces directives s'inscrivent dans le cadre du Plan continental conjoint OMS-Africa CDC doté de 518 millions de dollars, qui prévoit des mécanismes de surveillance renforcés dans les 55 États membres de l'UA. La semaine du 8 au 14 juin 2026 a vu le déploiement de nouvelles équipes de réponse rapide dans la province de l'Ituri, épicentre de l'épidémie, ainsi que le renforcement des laboratoires mobiles aux postes frontaliers clés entre la RDC et l'Ouganda. L'Africa CDC insiste sur la nécessité d'une approche fondée sur la science pour détecter précocement les cas suspects tout en maintenant la fluidité des échanges commerciaux et des opérations humanitaires.","date":"2026-06-14"},
{"title":"Africa CDC Weekly Brief 1-7 juin 2026 : mobilisation continentale pour contenir la maladie à virus Bundibugyo","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-1-7-june-2026/","content":"Le bulletin hebdomadaire de l'Africa CDC couvrant la période du 1er au 7 juin 2026 dresse le tableau de la mobilisation continentale face à l'épidémie de maladie à virus Bundibugyo (BVD). L'Africa CDC a intensifié ses opérations de surveillance épidémiologique, de traçage des contacts et de déploiement de personnel dans les zones affectées de la province de l'Ituri en RDC. Le lancement, le 5 juin 2026, du Plan continental conjoint OMS-Africa CDC doté de 518 millions de dollars sur six mois représente l'aboutissement de semaines de coordination pour unifier la réponse sous le principe « Un plan, un budget, une équipe ». Le bulletin fait également état de l'activation des mécanismes d'urgence de l'Union Africaine et de la mobilisation de ressources internationales pour soutenir les ministères de la santé de la RDC et de l'Ouganda dans leur riposte à cette épidémie sans précédent.","date":"2026-06-07"},
{"title":"Rapport de situation du 2 juin 2026 : l'Africa CDC détaille les défis de la riposte à l'épidémie de virus Bundibugyo","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-june-22026","content":"Dans son 16e rapport de situation daté du 2 juin 2026, l'Africa CDC dresse un bilan détaillé de l'épidémie de maladie à virus Bundibugyo (BVD) en cours en RDC et en Ouganda. Le rapport met en lumière plusieurs obstacles majeurs : la résistance des communautés au traçage des contacts, notamment dans les zones de santé de Nizi et Bunia, ainsi que des pénuries de réactifs et un manque de machines de diagnostic qui ralentissent les analyses de laboratoire. Le 1er juin 2026, 76 échantillons ont été testés avec un taux de positivité de 30,3 %. Sur le plan international, l'Africa CDC coordonne la réponse avec l'OMS et d'autres partenaires, en déployant des équipes sur le terrain et en facilitant la distribution de contre-mesures médicales essentielles, notamment un don significatif du gouvernement indien.","date":"2026-06-20"},
{"title":"Flambée épidémique en Afrique centrale : l'Africa CDC face à une crise sans précédent malgré des ressources insuffisantes","url":"https://www.infectioncontroltoday.com/view/2026-ebola-outbreak-spreads-central-africa-who-warns-growing-crisis-amid-cdc-usaid-cuts","content":"L'épidémie d'Ebola de 2026 s'est étendue à deux pays d'Afrique centrale — la République démocratique du Congo et l'Ouganda — poussant l'OMS à déclarer une urgence sanitaire mondiale. L'Africa CDC et l'OMS ont conjointement mobilisé 2,5 millions de dollars pour coordonner la réponse, mais les experts s'accordent à dire que ces fonds restent très insuffisants face à l'ampleur de la crise. La situation est aggravée par la réduction de 90 % des financements de l'USAID américain et le retrait des États-Unis de l'OMS, ce qui fragilise considérablement les capacités de riposte mondiale. Plus de 513 cas et 130 décès suspects liés à la souche Bundibugyo, pour laquelle il n'existe à ce jour ni vaccin ni traitement approuvé, ont été recensés.","date":"2026-06-20"},
{"title":"Africa CDC : l'épidémie d'Ebola en RDC pourrait devenir la pire de l'histoire","url":"https://www.democracynow.org/2026/6/17/headlines/africa_cdc_warns_ebola_outbreak_in_drc_could_become_worst_on_record","content":"L'Africa Centres for Disease Control and Prevention (Africa CDC) tire la sonnette d'alarme : l'épidémie d'Ebola qui sévit en République démocratique du Congo (RDC) pourrait devenir la plus meurtrière jamais enregistrée. Le nombre de cas confirmés a atteint 837, tandis que le bilan officiel des décès avoisine les 200. Face à cette progression alarmante, l'Africa CDC souligne l'urgence de mobiliser davantage de ressources financières pour renforcer le traçage des contacts et endiguer la propagation du virus. L'institution continentale appelle la communauté internationale à une réponse solidaire et immédiate.","date":"2026-06-20"},
{"title":"Rapport situationnel BVD du 9 juin 2026 : 645 cas, taux de létalité de 17,7 % et renforcement des capacités de laboratoire","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-may-9-2026","content":"Le rapport situationnel de l'Africa CDC en date du 9 juin 2026 sur l'épidémie de maladie à virus Bundibugyo (BVD) fait état de 645 cas confirmés et 114 décès, soit un taux de létalité d'environ 17,7 %. La RDC concentre l'essentiel de l'épidémie avec 626 cas et 112 décès, la province de l'Ituri représentant 93 % des cas répartis dans 18 des 36 zones de santé. L'Ouganda rapporte 19 cas confirmés et 2 décès, sans nouveau cas enregistré dans les 24 dernières heures. Sur le plan de la surveillance, 694 alertes ont été reçues, dont 594 vérifiées. Deux laboratoires mobiles opèrent aux points frontaliers de Bwera et Arua, avec un délai de rendu des résultats inférieur à 24 heures. Plus de 956 échantillons ont été testés avec un taux de positivité de 1,9 % en Ouganda.","date":"2026-06-18"},
{"title":"Épidémie BVD : 801 cas confirmés et 183 décès au 13 juin 2026 selon l'Africa CDC","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Selon le dernier bilan publié par l'Africa CDC au 13 juin 2026, l'épidémie de maladie à virus Bundibugyo (BVD) a atteint un total cumulé de 801 cas confirmés et 183 décès parmi les cas confirmés en République démocratique du Congo et en Ouganda. L'épicentre demeure la province de l'Ituri en RDC, avec des foyers actifs également signalés dans le Nord-Kivu. Les équipes de riposte, coordonnées entre l'Africa CDC, les ministères de la santé des pays affectés et les partenaires internationaux, intensifient la surveillance, la gestion des cas, la prévention des infections et l'engagement communautaire pour contenir la propagation de cette fièvre hémorragique virale.","date":"2026-06-18"},
{"title":"Africa CDC & WHO lancent un plan continental de riposte à l'épidémie de maladie à virus Bundibugyo","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"L'Africa CDC et l'Organisation mondiale de la santé (OMS) ont officiellement lancé le 5 juin 2026 un Plan continental de préparation et de riposte à la maladie à virus Bundibugyo (BVD). Ce plan unifié, structuré autour du principe « Un plan, un budget, une équipe », vise à coordonner les efforts des États membres de l'Union africaine face à l'épidémie qui sévit principalement en République démocratique du Congo et en Ouganda. Doté d'un budget de 518 millions de dollars et couvrant la période de juin à novembre 2026, il s'articule autour de six piliers opérationnels : coordination d'urgence, tests de laboratoire, surveillance épidémiologique, prévention des infections, prise en charge clinique et engagement communautaire. Un mécanisme de suivi financier conjoint garantit la transparence de l'utilisation des fonds.","date":"2026-06-18"},
],
"african-medical-agency":[
{"title":"OMS et Agence Africaine des Médicaments signent un cadre de collaboration historique pour l'accès aux produits de santé","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"Le 21 mai 2026, l'OMS et l'Agence Africaine des Médicaments (AMA) ont signé un Accord-cadre de collaboration représentant une avancée historique pour la régulation pharmaceutique africaine. Cet accord établit un partenariat autour de cinq axes : accélération de l'accès aux médicaments sûrs et efficaces, promotion de l'harmonisation réglementaire continentale, renforcement de la pharmacovigilance contre les produits sous-standards et falsifiés, développement des capacités réglementaires humaines, et soutien à l'innovation locale lors des urgences sanitaires. L'AMA, entrée dans sa phase d'expansion 2026-2030, a pour mission de protéger 1,4 milliard d'Africains contre les médicaments de mauvaise qualité. Cet accord survient alors que le continent fait face à l'épidémie d'Ebola Bundibugyo, soulignant l'urgence d'une agence réglementaire africaine pleinement opérationnelle pour accélérer l'accès aux contre-mesures médicales en situation de crise.","date":"2026-05-21"},
{"title":"AMA et US Pharmacopeia signent un accord pour renforcer la réglementation pharmaceutique en Afrique","url":"https://www.cleanroomtechnology.com/african-medicines-agency-and-usp-sign-agreement-to","content":"Le 29 avril 2026 à Johannesburg, l'Agence Africaine des Médicaments (AMA) et l'US Pharmacopeia (USP) ont formalisé un partenariat stratégique par la signature d'un mémorandum d'entente. L'USP, organisation de référence mondiale en matière de normes pharmaceutiques, apportera son expertise pour aider l'AMA à établir des standards harmonisés de qualité des médicaments à l'échelle du continent africain. L'accord vise à renforcer les systèmes de réglementation pharmaceutique, d'assurance qualité et de fabrication dans les 55 États membres de l'Union africaine. Ce partenariat revêt une importance particulière dans le contexte de la crise d'Ebola Bundibugyo, où la disponibilité rapide de contre-mesures médicales certifiées est un enjeu vital, et dans le cadre des discussions que l'AMA conduit avec l'EMA pour accélérer les essais cliniques de candidats-vaccins contre le virus Bundibugyo.","date":"2026-04-29"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
{"title":"L'Agence Africaine du Médicament : un pilier en construction pour la souveraineté sanitaire du continent","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Alors que l'Afrique renforce ses institutions de santé publique face aux épidémies récurrentes, l'Agence Africaine du Médicament (AMA) demeure un chantier stratégique prioritaire de l'Union Africaine. En parallèle des efforts déployés par Africa CDC pour contenir l'épidémie d'Ebola en RDC et en Ouganda, l'AMA travaille à l'harmonisation des cadres réglementaires du médicament à l'échelle continentale. Son rôle est crucial pour garantir l'accès à des médicaments et vaccins de qualité, en particulier lors des situations d'urgence sanitaire. Les experts appellent à une accélération de l'opérationnalisation complète de l'AMA, afin que l'Afrique puisse disposer d'un organe de régulation pharmaceutique indépendant et pleinement fonctionnel avant la prochaine grande crise sanitaire.","date":"2026-06-07"},
],
"manufacture-vaccins":[
{"title":"Landmark vaccine deals: $1.2 billion Gavi AVMA investment signals Africa's shift toward local vaccine manufacturing","url":"https://healthpolicy-watch.news/landmark-vaccine-deals-signal-africas-shift-toward-local-manufacturing/","content":"A series of landmark vaccine manufacturing agreements signed in Cairo, backed by a $1.2 billion investment from Gavi's African Vaccine Manufacturing Accelerator (AVMA), are set to transform Africa's vaccine production landscape toward producing 60% of the continent's vaccines locally by 2040. Currently, less than 1% of vaccines used in Africa are locally manufactured, a dependence that left African nations critically exposed during the COVID-19 pandemic. A key consortium led by Egypt's EVA Pharma and European biotech partners DNA Script (France), Quantoom Biosciences (Belgium), and Unizima (Belgium) will establish Africa's first end-to-end digital mRNA vaccine production platform, a technological leap that could position the continent as a future global supplier of next-generation vaccines. The African Union's 20-year roadmap also requires quadrupling the current vaccine manufacturing workforce from approximately 3,000 to 12,000 professionals by 2040.","date":"2026-06-10"},
{"title":"Moins de 1 % des vaccins utilisés en Afrique y sont fabriqués : état des lieux et perspectives 2026","url":"https://onlinelibrary.wiley.com/doi/full/10.1002/hsr2.71926","content":"Une revue narrative publiée dans Health Science Reports en 2026 dresse un état des lieux alarmant : moins de 1 % des vaccins administrés en Afrique y sont localement produits, exposant les pays africains à une vulnérabilité extrême face aux perturbations des chaînes d'approvisionnement mondiales, comme l'ont illustré les pénuries critiques lors de la pandémie de COVID-19. L'Égypte, l'Afrique du Sud, le Sénégal, l'Éthiopie et l'Algérie sont les cinq pays disposant d'une capacité autonome de fabrication de vaccins. Entre 2025 et 2030, trois fabricants africains doivent produire et obtenir la préqualification OMS pour huit vaccins destinés au marché continental. L'article identifie les obstacles principaux : insuffisance des infrastructures industrielles, pénurie de personnels qualifiés, accès limité aux technologies et difficultés de financement à long terme.","date":"2026-06-01"},
{"title":"Souveraineté sanitaire africaine : l'Africa CDC plaide pour un renforcement de la production locale de vaccins et médicaments","url":"https://www.youtube.com/watch?v=2lJgSGpOWJ0","content":"Lors du briefing spécial du 16 avril 2026 consacré à l'agenda de sécurité et de souveraineté sanitaires de l'Afrique, les responsables de l'Africa CDC ont mis en avant les progrès remarquables réalisés ces dernières années dans le renforcement des capacités continentales. Le portefeuille géré directement par l'Africa CDC est passé de 52 à 463 millions de dollars, et le nombre de pays dotés de capacités de génomique des agents pathogènes est passé de 7 à 46. L'institution a également souligné l'importance du mécanisme de mise en commun des achats pour garantir un accès équitable aux vaccins et aux médicaments essentiels, en particulier dans les situations de crise. Le renforcement de la fabrication locale demeure un pilier central de la nouvelle architecture de santé publique que l'Africa CDC entend bâtir pour l'Afrique.","date":"2026-06-20"},
{"title":"Africa CDC : cap sur 60 % de vaccins fabriqués en Afrique d'ici 2040","url":"https://www.youtube.com/watch?v=FOdB0cd-wQg","content":"Lors d'un briefing spécial tenu le 19 mars 2026, l'Africa CDC a réaffirmé son ambition de faire produire au moins 60 % des vaccins utilisés sur le continent africain localement d'ici 2040. Pour atteindtre cet objectif, l'institution s'appuie sur un réseau de 574 fabricants de produits de santé, dont 25 producteurs de vaccins déjà actifs sur le continent. L'Africa CDC entend également renforcer les mécanismes continentaux de mise en commun des achats pour protéger les États membres contre les ruptures d'approvisionnement, comme l'ont récemment illustré les crises au Botswana et en Namibie. Un sommet extraordinaire devait se tenir à Nairobi pour concrétiser cette feuille de route ambitieuse en matière de fabrication locale.","date":"2026-06-20"},
{"title":"Medical Countermeasures for Bundibugyo Virus Disease: Africa CDC Mobilizes Manufacturing and Diagnostic Capacity","url":"https://khub.africacdc.org/records/sub-theme/medical-countermeasures","content":"As the Bundibugyo Virus Disease (BVD) outbreak intensifies across the Democratic Republic of Congo and Uganda, Africa CDC has highlighted the urgent need to scale up the production and deployment of medical countermeasures. The organization's Medical Countermeasures hub is coordinating the provision of diagnostic tools, therapeutics, and personal protective equipment to affected regions. Mobile laboratories have been deployed at key border crossings including Bwera and Arua, enabling rapid sample testing with turnaround times of under 24 hours. Africa CDC is also working with partners to accelerate the development and manufacturing of potential vaccine candidates against the Bundibugyo Ebola virus strain, drawing lessons from previous Ebola vaccine development cycles. Strengthening local African manufacturing capacity for vaccines and diagnostics remains a core priority in the continent's health security strategy.","date":"2026-06-15"},
{"title":"Face à l'épidémie Ebola Bundibugyo, l'absence de vaccins homologués met en lumière les lacunes de la production africaine","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"Le rapport de situation du 31 mai 2026 sur l'épidémie de maladie à virus Bundibugyo (BVD) en RDC et en Ouganda soulève une problématique cruciale : l'absence de vaccins ou de thérapeutiques homologués contre ce variant d'Ebola. Dans ce contexte, Africa CDC insiste sur l'importance des fondamentaux de santé publique — traçage des contacts, isolement des cas, équipements de protection — en l'absence d'outils biologiques disponibles. Cette situation met en évidence l'urgence d'investir dans la fabrication locale de vaccins sur le continent africain, afin que l'Afrique ne soit plus tributaire de solutions développées en dehors de ses frontières lors de futures crises sanitaires.","date":"2026-06-12"},
{"title":"Production de vaccins contre Ebola : l'Afrique face à l'urgence de renforcer ses capacités manufacturières","url":"https://khub.africacdc.org/events/3","content":"Face à la flambée épidémique de la maladie à virus Ebola de type Bundibugyo en Afrique centrale, l'absence de vaccins et de thérapeutiques spécifiquement homologués contre ce sous-type viral met en lumière les lacunes critiques dans les capacités de fabrication de vaccins sur le continent africain. Africa CDC a publié une correspondance soulignant que, sans vaccins ni traitements disponibles contre le virus Bundibugyo, les mesures fondamentales de santé publique restent le seul rempart disponible. Cette situation renforce l'urgence d'investir dans la production locale de vaccins en Afrique, afin de réduire la dépendance aux chaînes d'approvisionnement mondiales et de garantir une réponse rapide lors des futures épidémies.","date":"2026-06-10"},
],
"unicef-gavi":[
{"title":"Gavi 6.0 (2026-2030) : vacciner 500 millions d'enfants supplémentaires et sauver 8 à 9 millions de vies","url":"https://www.gavi.org/our-alliance/strategy/phase-6-2026-2030","content":"Gavi, l'Alliance du Vaccin, a lancé sa sixième période stratégique 2026-2030, avec l'ambition de vacciner plus de 500 millions d'enfants et adolescents supplémentaires dans les pays les plus pauvres du monde, sauvant ainsi 8 à 9 millions de vies. Pour la première fois, les programmes HPV et antipaludéen seront financés à travers les budgets nationaux des pays bénéficiaires, marquant une transition vers l'autonomie sanitaire. La stratégie prévoit de doubler la couverture vaccinale anti-HPV pour sauver 1,5 million de vies supplémentaires et d'atteindre 50 millions d'enfants avec un schéma complet de vaccin antipaludéen d'ici 2030. Gavi 6.0 intègre aussi un volet renforcé de sécurité d'approvisionnement pour l'Afrique, via l'African Vaccine Manufacturing Accelerator (AVMA) doté de 1,2 milliard de dollars pour soutenir la production locale de vaccins sur le continent.","date":"2026-06-01"},
{"title":"Gavi et UNICEF annoncent un accord de prix équitable pour le vaccin antipaludique : 7 millions d'enfants supplémentaires protégés","url":"https://www.unicef.org/press-releases/gavi-and-unicef-announce-equitable-pricing-deal-malaria-vaccine-protect-7-million","content":"Gavi, l'Alliance du Vaccin, et l'UNICEF ont annoncé la conclusion d'un accord de prix équitable pour le vaccin antipaludéen, permettant de protéger 7 millions d'enfants supplémentaires d'ici la fin de la décennie. Le paludisme tue chaque année plus de 600 000 enfants de moins de 5 ans, principalement en Afrique subsaharienne qui porte 95 % du fardeau mondial de la maladie. La réduction du coût du vaccin permettra aux pays à faibles revenus de l'intégrer dans leurs programmes nationaux de vaccination sans compromettre d'autres interventions essentielles. Cet accord s'inscrit dans Gavi 6.0 qui vise à vacciner 50 millions d'enfants contre le paludisme d'ici 2030, contribuant à réduire significativement la mortalité infantile en Afrique subsaharienne.","date":"2026-05-15"},
{"title":"Gavi et l'UNICEF mobilisent des ressources pour accélérer la vaccination dans les zones affectées par l'épidémie de BVD en Afrique centrale","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"Dans le contexte de l'épidémie de maladie à virus Bundibugyo (BVD) qui frappe la RDC et l'Ouganda, Gavi, l'Alliance du vaccin, et l'UNICEF intensifient leurs efforts pour soutenir les campagnes de vaccination d'urgence et l'acheminement de fournitures médicales dans les zones les plus touchées. Les deux organisations travaillent en étroite coordination avec l'Africa CDC et l'OMS pour garantir l'accès aux contre-mesures médicales, notamment les vaccins expérimentaux contre les fièvres hémorragiques virales, tout en renforçant les systèmes de chaîne du froid dans les régions reculées de l'Ituri. L'UNICEF assure également la sensibilisation des communautés locales pour favoriser l'acceptation des interventions sanitaires.","date":"2026-06-18"},
{"title":"Mental Health Leadership Course in Africa: Africa CDC Opens Applications with Scholarship Support","url":"https://www.instagram.com/p/DShzmNwgpF4","content":"Africa CDC has launched a call for applications for its Mental Health Leadership and Advocacy Course, scheduled for 3-14 August 2026 at the Ibadan Business School in Bodija, Ibadan, Nigeria. Scholarships are available to support participants, reflecting Africa CDC's commitment to building human capital across the continent's health sector. The initiative is part of broader efforts by Africa CDC and its partners, including UNICEF, to strengthen mental health systems and leadership capacity across African Union member states. Applications are open until 26 June 2026.","date":"2026-06-13"},
{"title":"Gavi et UNICEF mobilisés face à l'urgence sanitaire Ebola en Afrique centrale et orientale","url":"https://www.npr.org/2026/06/05/nx-s1-5848082/ebola-virus-cdc-outbreak-democratic-republic-congo-uganda","content":"Alors que l'épidémie d'Ebola Bundibugyo continue de s'étendre en République Démocratique du Congo et en Ouganda, avec plus de 300 cas confirmés et des projections alarmantes pouvant rivaliser avec l'épidémie ouest-africaine de 2014-2016 (20 000 cas, 4 000 morts), Gavi et l'UNICEF intensifient leurs efforts de coordination humanitaire et de soutien logistique. Les deux organisations jouent un rôle clé dans l'approvisionnement en équipements médicaux, le soutien aux systèmes de santé locaux et la mobilisation communautaire pour freiner la progression du virus dans les zones les plus affectées, notamment la province de l'Ituri au Congo.","date":"2026-06-12"},
],
"sante-maroc":[
{"title":"Maroc 2026 : un budget santé record de 42,4 milliards de dirhams (+30 %) pour accélérer la réforme du système de soins","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le Maroc consacre en 2026 un budget sans précédent de 42,4 milliards de dirhams au secteur de la santé, soit une hausse de 30 % par rapport à l'exercice précédent. Cette enveloppe finance la création de 8 000 nouveaux postes dans le secteur public de santé, la construction de nouveaux Centres Hospitaliers Universitaires (CHU), la rénovation de 90 hôpitaux et la généralisation de la feuille de soins électronique. Les dépenses de personnel atteignent 16,4 milliards de dirhams, reflétant la volonté de rendre le secteur hospitalier plus attractif et de réduire l'exode des professionnels de santé marocains vers l'étranger. Ce budget historique s'inscrit dans la réforme globale du système de santé menée sous l'impulsion royale, visant à améliorer l'accès équitable aux soins pour les 37 millions de Marocains.","date":"2026-06-10"},
{"title":"Réforme de la santé au Maroc : les Groupements Sanitaires Territoriaux transforment la gouvernance des soins","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"La réforme du système de santé marocain s'accélère en 2026 avec la mise en oeuvre progressive des Groupements Sanitaires Territoriaux (GST), une structure innovante qui intègre sous une même entité les hôpitaux publics, les établissements de soins primaires et les établissements psychiatriques d'une région donnée. Cette réorganisation vise à décloisonner les soins, améliorer la continuité de la prise en charge et optimiser l'utilisation des ressources hospitalières. Des résistances persistent au sein du corps médical et des syndicats de santé, notamment concernant les conditions de travail et les modalités de gestion des ressources humaines dans ce nouveau cadre. La généralisation de la couverture médicale obligatoire (AMO), en parallèle avec la structuration des GST, constitue le double pilier de la transformation en profondeur du modèle de santé marocain.","date":"2026-06-08"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},
],
"vaccins-monde":[
{"title":"L'OMS relance la vaccination préventive contre le choléra après une pénurie mondiale critique de vaccins","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'Organisation mondiale de la santé (OMS) a annoncé début février 2026 la reprise des campagnes de vaccination préventive contre le choléra, après une période de pénurie mondiale qui avait contraint les autorités à rationner les stocks disponibles et à ne vacciner que les personnes directement exposées lors d'épidémies actives. Cette reprise marque l'atteinte d'un jalon critique dans l'approvisionnement mondial en vaccins anticholériques. Le choléra représente une menace majeure de santé publique avec 4 milliards de personnes vivant dans des zones endémiques et des centaines de milliers de cas déclarés chaque année, principalement dans les pays touchés par des conflits ou des catastrophes naturelles en Afrique et en Asie du Sud. La disponibilité retrouvée des vaccins préventifs permet désormais de protéger des populations vulnérables avant l'apparition de flambées épidémiques.","date":"2026-02-04"},
{"title":"Semaine Mondiale de la Vaccination 2026 : l'OMS, l'UNICEF et Gavi appellent à protéger « chaque génération »","url":"https://www.unicef.org/guineabissau/press-releases/joint-who-gavi-and-unicef-press-release-world-immunization-week","content":"À l'occasion de la Semaine Mondiale de la Vaccination (24-30 avril 2026), l'OMS, l'UNICEF et Gavi ont lancé une campagne commune intitulée « Pour chaque génération, les vaccins fonctionnent » (For every generation, vaccines work), appelant gouvernements et communautés à maintenir et élargir la couverture vaccinale à tous les âges. Les déficits de financement mondiaux, l'instabilité politique croissante et la montée de la désinformation anti-vaccins représentent les principales menaces pour les programmes d'immunisation, risquant d'inverser des décennies de progrès. Le Big Catch-Up, la plus grande initiative mondiale de rattrapage vaccinal, a atteint son objectif en livrant plus de 100 millions de doses à 18,3 millions d'enfants dans 36 pays avant sa clôture en mars 2026. La campagne insiste sur la nécessité d'investissements durables dans la vaccination à tous les stades de la vie pour prévenir des maladies pourtant évitables.","date":"2026-04-24"},
{"title":"14 millions d'enfants zéro-dose dans le monde : la couverture vaccinale infantile stagne selon l'OMS et l'UNICEF","url":"https://www.unicef.org/press-releases/global-childhood-vaccination-holds-steady-yet-over-14-million-infants-remain","content":"Un rapport conjoint de l'OMS et de l'UNICEF révèle que malgré des progrès enregistrés en 2025, plus de 14 millions d'enfants dans le monde restent entièrement non vaccinés (zéro dose reçue), exposés sans protection à des maladies pourtant évitables. Ce chiffre masque des disparités régionales profondes : les zones de conflit, les pays à faibles revenus et les communautés rurales isolées concentrent la majorité des enfants non atteints par les programmes de vaccination, en particulier en Afrique subsaharienne et en Asie du Sud. Des progrès ont été enregistrés pour certains vaccins comme le DTP3, mais des lacunes persistent pour d'autres antigènes essentiels. L'OMS et l'UNICEF appellent à une action urgente pour renforcer les systèmes de santé primaires, améliorer la logistique de la chaîne du froid dans les zones reculées et lutter contre la désinformation qui freine l'acceptation des vaccins.","date":"2026-06-15"},
{"title":"Briefing OMS Afrique : la riposte vaccinale contre Ebola Bundibugyo au centre des discussions","url":"https://www.youtube.com/watch?v=Gp9tFTr5a9Y","content":"Lors du briefing presse virtuel de l'OMS Afrique du 4 juin 2026, les experts ont fait le point sur la stratégie de riposte à l'épidémie de maladie à virus Ebola de type Bundibugyo en RDC et en Ouganda. Les discussions ont notamment porté sur les outils de prévention disponibles, les protocoles de vaccination d'urgence et les défis du traçage des contacts dans les zones affectées. L'OMS a souligné l'importance du déploiement rapide des équipes de réponse et la nécessité de renforcer les capacités locales de gestion des épidémies. Les intervenants ont également évoqué les cas importés en Ouganda et les mesures de quarantaine mises en place, saluant la capacité des autorités ougandaises à détecter et isoler rapidement les cas suspects grâce aux protocoles de surveillance renforcés.","date":"2026-06-17"},
{"title":"Third Reaffirmation of Mpox Emergency: Africa CDC and WHO Call for Accelerated Global Immunization Efforts","url":"https://khub.africacdc.org/records/resource?id=405","content":"Africa CDC and the World Health Organization have jointly issued a third reaffirmation of the mpox public health emergency, underscoring the persistent threat posed by the virus across the African continent and beyond. The declaration highlights a continued increase in mpox cases, including in Cameroon, and points to the emergence of the novel clade Ib strain in Central Africa as a particular cause for global concern. Researchers have conducted comprehensive phylogenetic and mutational analyses of the Monkeypox virus (MPXV) across sub-Saharan Africa between 2022 and 2024, revealing significant genomic diversity. Community health workers have been identified as a key resource in halting outbreaks at the local level. Both organizations are calling on the international community to accelerate vaccine research and deployment, scale up immunization campaigns in high-risk areas, and invest in surveillance infrastructure to monitor the evolving epidemiology of mpox across the continent.","date":"2026-06-15"},
{"title":"Africa CDC lance sa promotion 2026 de Jeunes Champions de la Santé Numérique pour transformer l'avenir sanitaire du continent","url":"https://youth.africacdc.org/2026-cohort-of-young-digital-health-champions-to-transform-africas-health-future-announced","content":"Africa CDC a annoncé sa promotion 2026 de Jeunes Champions de la Santé Numérique (Y-DHC), une initiative visant à identifier et connecter de jeunes leaders qui façonnent activement le paysage de la santé numérique en Afrique. Dans le cadre de la stratégie YES!Health 2025-2028, ces champions joueront un rôle clé dans l'innovation en matière de vaccination et de santé publique numérique, contribuant à accélérer l'adoption des technologies de santé, notamment les registres de vaccination électroniques et les systèmes de suivi immunologique. Des cohortes régionales ont été sélectionnées pour l'Afrique centrale, orientale, septentrionale, australe et occidentale.","date":"2026-06-13"},

function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
</body>
</html>
