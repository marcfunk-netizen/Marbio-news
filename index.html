var articlesData={
"african-cdc":[
{"title":"WHO and Africa CDC Unveil $518 Million Joint Ebola Response Plan","url":"https://www.who.int/news/item/05-06-2026-africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"L'OMS et l'Africa CDC ont dévoilé un plan conjoint de riposte à l'épidémie d'Ebola doté de 518 millions de dollars, visant à unifier la réponse continentale sous une approche « One Response ». Ce plan, lancé le 5 juin 2026, mobilise les gouvernements africains, les partenaires internationaux et les communautés pour renforcer la prévention, la détection et la réponse à l'épidémie de Bundibugyo. L'Afrique n'a toutefois levé que moins d'un cinquième des fonds nécessaires à ce jour, soulevant des inquiétudes sur la capacité de financement global. Le Dr Jean Kaseya, Directeur général de l'Africa CDC, a appelé à une action coordonnée et scientifiquement fondée pour détecter les cas précocement tout en préservant les échanges commerciaux et les opérations humanitaires.","date":"2026-06-23"},
{"title":"Africa CDC Weekly Brief 8-14 June 2026 : alertes sanitaires et mises à jour institutionnelles","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-8-14-june-2026/","content":"Le bulletin hebdomadaire de l'Africa CDC pour la période du 8 au 14 juin 2026 compile les principales alertes sanitaires et mises à jour institutionnelles du continent. Il fait état de l'évolution de l'épidémie de maladie à virus Ebola Bundibugyo en RDC et en Ouganda, des mesures de surveillance aux frontières, et des avancées dans la coordination multi-agences avec l'OMS et l'UNICEF. Le document détaille les activités de formation en cours, les partenariats renforcés et les prochaines étapes de l'Agenda de Sécurité et Souveraineté Sanitaires de l'Afrique (AHSS). Ce rapport hebdomadaire est un outil central de veille pour les professionnels de la santé publique et les décideurs du continent africain.","date":"2026-06-23"},
{"title":"Africa CDC Urges AU Member States to Reinforce Health Screening at All Ports of Entry","url":"https://africacdc.org/news/","content":"Face à l'aggravation de l'épidémie d'Ebola Bundibugyo, l'Africa CDC a lancé un appel urgent à tous les États membres de l'Union Africaine pour renforcer immédiatement le dépistage sanitaire aux aéroports, ports maritimes et postes frontières terrestres. Plus de 26 000 personnes potentiellement exposées au virus n'avaient toujours pas été tracées, compliquant considérablement le contrôle de la chaîne de transmission. Le Dr Jean Kaseya a insisté sur la nécessité d'une action coordonnée fondée sur des données scientifiques pour détecter précocement les cas potentiels tout en maintenant les flux de voyageurs et les opérations humanitaires. Sans financement urgent du plan de 518 millions de dollars, l'épidémie risque de dépasser en ampleur celle de 2014-2016 qui avait fait plus de 11 000 victimes.","date":"2026-06-23"},
{"title":"WHO et Africa CDC déclarent l'épidémie d'Ebola 2026 Urgence de Santé Publique","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"L'OMS et l'Africa CDC ont officiellement déclaré l'épidémie de maladie à virus Ebola 2026 — causée par le virus Bundibugyo — une urgence de santé publique. Le rapport épidémiologique hebdomadaire de l'Africa CDC souligne que l'absence de vaccins ou de thérapeutiques spécifiques contre ce variant impose un retour aux fondamentaux de la santé publique : surveillance, isolement et traçage des contacts. L'institution appelle à une mobilisation continentale urgente et à des protocoles d'accès humanitaire pré-négociés pour accélérer la riposte.","date":"2026-06-22"},
{"title":"Live Briefing : Africa CDC fait le point sur la réponse à l'épidémie d'Ebola en RDC et en Ouganda","url":"https://www.facebook.com/africacdc/videos/live-special-briefing-on-ebola-outbreak-response-june-18-2026/3695380353954222","content":"Le 18 juin 2026, l'Africa CDC a tenu son briefing hebdomadaire en direct pour présenter les dernières mises à jour sur la réponse à l'épidémie d'Ebola qui sévit simultanément en RDC et en Ouganda. Cette séance d'information régulière permet à l'institution de coordonner les efforts des États membres et de maintenir une transparence sur l'évolution de la situation épidémiologique sur le terrain.","date":"2026-06-22"},
{"title":"Africa CDC Warns Ebola Outbreak in DRC Could Become Worst on Record","url":"https://www.democracynow.org/2026/6/17/headlines/africa_cdc_warns_ebola_outbreak_in_drc_could_become_worst_on_record","content":"L'Africa CDC tire la sonnette d'alarme : l'épidémie d'Ebola en République Démocratique du Congo pourrait devenir la plus meurtrière de l'histoire. Le nombre de cas confirmés a grimpé à 837, avec un bilan officiel frôlant les 200 morts. L'institution continentale souligne l'urgence d'un financement accru pour le traçage des contacts et l'endiguement de la propagation du virus.","date":"2026-06-22"},
{"title":"Africa CDC Youth Programme: Forming the Next Generation of Public Health Leaders","url":"https://youth.africacdc.org","content":"Africa CDC's Youth Programme continues to invest in young public health leaders across the African continent. In March 2026, the institution announced its 2026 cohort of Young Digital Health Champions through the Youth Digital Health Network (YiDHN), a strategic initiative of Africa CDC's Youth Division. The programme, guided by the YES! Health Strategy (2025–2028), aims to meaningfully include African youth aged 15–35 — who represent over 65% of the continent's population — in health governance, emergency response, and digital health innovation. Testimonials from participants highlight transformative journeys from academic training to continental impact. Africa CDC reaffirms that empowering youth is central to achieving long-term health security and sovereignty across Africa.","date":"2026-06-21"},
{"title":"Bundibugyo Virus Disease : Africa CDC publie son rapport de situation du 12 juin 2026","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-june-12-2026","content":"Le rapport de situation publié par Africa CDC en date du 12 juin 2026 dresse un tableau préoccupant de l'épidémie de la maladie à virus Bundibugyo (BVD) qui frappe principalement la province de l'Ituri en République Démocratique du Congo, avec des cas confirmés également signalés en Ouganda. La transmission communautaire active persiste et la situation évolue quotidiennement. Africa CDC, en collaboration avec les autorités sanitaires nationales, a activé des mécanismes de réponse multi-niveaux incluant des centres opérationnels d'urgence, des laboratoires mobiles déployés aux points frontaliers clés, ainsi qu'un suivi renforcé des contacts. Plus de 956 échantillons ont été testés, avec un taux de positivité de 1,9 % en Ouganda. Des fermetures temporaires de frontières ont été instaurées pour limiter les voyages non essentiels, tandis que la coordination transfrontalière entre la RDC et l'Ouganda demeure une priorité absolue.","date":"2026-06-21"},
{"title":"Ebola Outbreak: Africa CDC Holds Special Briefing on DRC and Uganda Response","url":"https://www.youtube.com/watch?v=-bq8j4R2NyU","content":"Africa CDC held a special live briefing on June 18, 2026, providing the latest updates on the Ebola (Bundibugyo Virus Disease) outbreak response across the Democratic Republic of Congo and Uganda. During the briefing, officials highlighted key measures including exit and entry screening at border points, with nearly 95% of travelers screened at DRC ports of exit. Africa CDC also announced the launch of a fellowship program targeting around 40 fellows from member states, who will receive hands-on training in public health emergency management embedded within Africa CDC's Emergency Operation Center. The briefing underscored the institution's commitment to the Africa Health Security and Sovereignty (AHSS) Agenda, strengthening prevention, preparedness, detection, and response systems across the continent.","date":"2026-06-21"},
],
"african-medical-agency":[
{"title":"OMS et Agence Africaine du Médicament : accord-cadre historique signé à l'AMS79 en mai 2026","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"Le 21 mai 2026, en marge de la 79e Assemblée mondiale de la Santé (AMS79) à Genève, l'OMS et l'Agence Africaine du Médicament (AMA) ont signé un accord-cadre de collaboration historique pour renforcer les systèmes réglementaires et améliorer l'accès aux produits de santé de qualité sur le continent. Cet accord établit un partenariat structuré couvrant l'harmonisation réglementaire, la convergence et la reliance à travers les États membres de l'UA, le renforcement de la pharmacovigilance, et la lutte contre les produits sous-standard et falsifiés. L'accord soutient également l'opérationnalisation de l'AMA comme institution continentale clé et appuie la production locale lors des urgences sanitaires. Il marque une étape décisive vers la souveraineté pharmaceutique africaine, en particulier dans le contexte de l'épidémie d'Ebola Bundibugyo.","date":"2026-06-23"},
{"title":"L'AMA entre en phase d'expansion 2026-2030 : vers une régulation pharmaceutique africaine pleinement opérationnelle","url":"https://cirsci.org/publications/historical-review-of-the-african-medicines-agency-ama-ismail-2026/","content":"L'Agence Africaine du Médicament (AMA) entame en 2026 sa phase d'expansion (2026-2030), deuxième étape d'un déploiement en trois phases planifiées : Fondation (2024-2025), Expansion (2026-2030) et Maturité (à partir de 2031). Cette phase est cruciale pour l'établissement de capacités réglementaires continentales robustes, notamment l'harmonisation des cadres d'évaluation des médicaments et vaccins à travers les États membres de l'Union Africaine. Une revue historique publiée dans CIRS Review analyse les origines, l'évolution et les perspectives institutionnelles de l'AMA, soulignant son rôle central pour garantir que les médicaments sur les marchés africains répondent aux normes internationales de qualité, sécurité et efficacité. Les experts appellent à un soutien financier accru pour permettre à l'AMA de remplir pleinement son mandat continental d'ici 2030.","date":"2026-06-23"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
{"title":"L'Agence Africaine du Médicament : un pilier en construction pour la souveraineté sanitaire du continent","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Alors que l'Afrique renforce ses institutions de santé publique face aux épidémies récurrentes, l'Agence Africaine du Médicament (AMA) demeure un chantier stratégique prioritaire de l'Union Africaine. En parallèle des efforts déployés par Africa CDC pour contenir l'épidémie d'Ebola en RDC et en Ouganda, l'AMA travaille à l'harmonisation des cadres réglementaires du médicament à l'échelle continentale. Son rôle est crucial pour garantir l'accès à des médicaments et vaccins de qualité, en particulier lors des situations d'urgence sanitaire. Les experts appellent à une accélération de l'opérationnalisation complète de l'AMA, afin que l'Afrique puisse disposer d'un organe de régulation pharmaceutique indépendant et pleinement fonctionnel avant la prochaine grande crise sanitaire.","date":"2026-06-07"},
],
"manufacture-vaccins":[
{"title":"EVA Pharma et partenaires européens lancent la première plateforme mRNA digital-to-biologics d'Afrique","url":"https://healthpolicy-watch.news/landmark-vaccine-deals-signal-africas-shift-toward-local-manufacturing/","content":"EVA Pharma (Égypte) a conclu des accords historiques avec trois biotechs européennes — DNA Script (France), Quantoom Biosciences (Belgique) et Unizima (Belgique) — pour établir la première plateforme africaine de production de vaccins à ARNm de type digital-to-biologics de bout en bout. Ces accords, soutenus par un investissement de 1,2 milliard de dollars de Gavi, l'Alliance du Vaccin, marquent un tournant dans la montée en puissance de la fabrication vaccinale africaine. L'initiative s'inscrit dans l'objectif continental de produire localement 60 % des vaccins utilisés en Afrique d'ici 2040, tout en réduisant la dépendance aux importations qui a fragilisé le continent lors de la pandémie de COVID-19. L'Égypte se positionne ainsi comme hub industriel de premier plan pour la biotechnologie médicale sur le continent africain.","date":"2026-06-23"},
{"title":"Gavi propose l'AVMA+ : 189 millions de dollars pour consolider l'écosystème de fabrication vaccinale africaine","url":"https://www.devex.com/news/inside-gavi-s-189-million-plan-to-boost-africa-s-vaccine-ecosystem-112721","content":"Gavi, l'Alliance du Vaccin, soumet à l'approbation de son conseil d'administration l'AVMA+ (African Vaccines Manufacturing Accelerator Plus), un package de 189 millions de dollars pour renforcer l'écosystème de production vaccinale africaine. Ce dispositif prévoit des garanties pour la vente directe de jusqu'à 70 millions de vaccins fabriqués sur le continent, facilitant l'accès au marché pour les producteurs locaux. L'AVMA original, lancé en 2024, soutient les fabricants africains avec jusqu'à 1 milliard de dollars sur dix ans via des jalons liés à la préqualification OMS ou aux contrats UNICEF ; huit vaccins de Biovac, Aspen Pharmacare (Afrique du Sud) et l'Institut Pasteur de Dakar (Sénégal) sont attendus en préqualification OMS d'ici 2030. Le conseil de Gavi doit se prononcer sur l'AVMA+ en juillet 2026.","date":"2026-06-23"},
{"title":"CHAI 2026 : six fabricants africains de vaccins en transfert de technologie actif, mais cinq obstacles structurels persistent","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"Le rapport 2026 de la Clinton Health Access Initiative (CHAI) sur le paysage de la fabrication vaccinale africaine révèle que six fabricants ont des installations opérationnelles et des transferts de technologie actifs, dont Atlantic Lifesciences au Ghana. Onze vaccins africains couvrant huit antigènes — rougeole-rubéole, rotavirus, fièvre jaune notamment — devraient atteindre le marché continental dans cinq ans. Cependant, cinq obstacles transversaux ont déjà retardé certains fabricants : retards réglementaires, demande de marché incertaine, lenteur des décaissements, délais des partenaires de transfert de technologie et pénuries de personnel qualifié. Le rapport appelle à une coordination renforcée entre Gavi, les gouvernements africains et les bailleurs de fonds pour lever ces blocages et atteindre l'objectif de 60 % de production locale d'ici 2040.","date":"2026-06-23"},
{"title":"Africa CDC mobilise des ressources pour renforcer la fabrication locale de vaccins et de médicaments en Afrique","url":"https://www.devex.com/organizations/centres-for-disease-control-and-prevention-africa-cdc-120577","content":"Dans le cadre de sa stratégie d'approvisionnement groupé, l'Africa CDC poursuit ses efforts pour développer une plateforme continentale de procurement et soutenir la fabrication locale de vaccins et de médicaments essentiels. Un vétéran du Fonds Mondial a été recruté pour piloter cette initiative, qui vise à doter l'Afrique d'une chaîne de production pharmaceutique autonome, réduisant ainsi sa vulnérabilité aux ruptures d'approvisionnement mondiales.","date":"2026-06-22"},
{"title":"Epidemic Intelligence Report: Africa CDC Tracks Medical Countermeasures in the Pipeline","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"Africa CDC's latest Epidemic Intelligence Weekly Report highlights ongoing efforts to track medical countermeasures (MCMs) in the pipeline for the Bundibugyo Virus Disease (BVD) outbreak affecting DRC and Uganda. The report emphasizes the need for visibility over commodities and medical countermeasures expected to arrive at regional warehouses for subsequent distribution to affected areas. Africa CDC is actively backing evidence-based approaches to ensure that MCMs, including potential therapeutic and vaccine candidates, are efficiently sourced, stored, and deployed. The institution also references its broader strategy for pandemic preparedness, drawing lessons from COVID-19 to build African manufacturing and supply chain resilience for future health emergencies.","date":"2026-06-21"},
{"title":"Souveraineté sanitaire africaine : l'Africa CDC plaide pour un renforcement de la production locale de vaccins et médicaments","url":"https://www.youtube.com/watch?v=2lJgSGpOWJ0","content":"Lors du briefing spécial du 16 avril 2026 consacré à l'agenda de sécurité et de souveraineté sanitaires de l'Afrique, les responsables de l'Africa CDC ont mis en avant les progrès remarquables réalisés ces dernières années dans le renforcement des capacités continentales. Le portefeuille géré directement par l'Africa CDC est passé de 52 à 463 millions de dollars, et le nombre de pays dotés de capacités de génomique des agents pathogènes est passé de 7 à 46. L'institution a également souligné l'importance du mécanisme de mise en commun des achats pour garantir un accès équitable aux vaccins et aux médicaments essentiels, en particulier dans les situations de crise. Le renforcement de la fabrication locale demeure un pilier central de la nouvelle architecture de santé publique que l'Africa CDC entend bâtir pour l'Afrique.","date":"2026-06-20"},
{"title":"Africa CDC : cap sur 60 % de vaccins fabriqués en Afrique d'ici 2040","url":"https://www.youtube.com/watch?v=FOdB0cd-wQg","content":"Lors d'un briefing spécial tenu le 19 mars 2026, l'Africa CDC a réaffirmé son ambition de faire produire au moins 60 % des vaccins utilisés sur le continent africain localement d'ici 2040. Pour atteindtre cet objectif, l'institution s'appuie sur un réseau de 574 fabricants de produits de santé, dont 25 producteurs de vaccins déjà actifs sur le continent. L'Africa CDC entend également renforcer les mécanismes continentaux de mise en commun des achats pour protéger les États membres contre les ruptures d'approvisionnement, comme l'ont récemment illustré les crises au Botswana et en Namibie. Un sommet extraordinaire devait se tenir à Nairobi pour concrétiser cette feuille de route ambitieuse en matière de fabrication locale.","date":"2026-06-20"},
],
"unicef-gavi":[
{"title":"Gavi s'engage à hauteur de 50 millions de dollars pour accélérer le développement d'un vaccin contre l'Ebola Bundibugyo","url":"https://www.gavi.org/news/media-room/gavi-commits-us-50-million-bundibugyo-ebolavirus-vaccines-and-outbreak-response","content":"Gavi, l'Alliance du Vaccin, a mobilisé 50 millions de dollars via son Fonds de Première Réponse pour soutenir la riposte à l'épidémie de Bundibugyo Ebolavirus en RDC et en Ouganda. Jusqu'à 40 millions de dollars accéléreront le développement et l'accès à un vaccin contre ce variant — pour lequel aucun vaccin homologué n'existe encore — tandis que 10 millions de dollars financeront les besoins opérationnels d'urgence. Cette annonce fait suite à l'engagement de l'Union Africaine de livrer un vaccin contre l'Ebola Bundibugyo d'ici fin 2026, et représente un signal fort de la communauté internationale pour combler les lacunes en matière de vaccins contre les fièvres hémorragiques virales négligées. Gavi avait déjà engagé 1,2 milliard de dollars pour la plateforme ARNm africaine d'EVA Pharma.","date":"2026-06-23"},
{"title":"Gavi et UNICEF : accord de prix équitable pour le vaccin antipaludique afin de protéger 7 millions d'enfants supplémentaires","url":"https://www.unicef.org/press-releases/gavi-and-unicef-announce-equitable-pricing-deal-malaria-vaccine-protect-7-million","content":"Gavi, l'Alliance du Vaccin, et l'UNICEF ont annoncé un accord de tarification équitable pour le vaccin antipaludique permettant de protéger 7 millions d'enfants supplémentaires d'ici la fin de la décennie. Depuis 2023, plus de 52 millions de doses du vaccin antipaludique ont été administrées dans le cadre du programme soutenu par Gavi, avec des résultats probants : au Burkina Faso, la vaccination a contribué à une baisse de 32 % des cas signalés entre 2024 et 2025, avec des réductions particulièrement marquées chez les enfants de moins de cinq ans. Des données du Kenya, du Malawi, du Ghana et du Cameroun confirment aussi une réduction des formes graves et des hospitalisations. Cet accord illustre la complémentarité stratégique de Gavi, qui finance, et de l'UNICEF, qui achemine les vaccins vers les populations vulnérables.","date":"2026-06-23"},
{"title":"OMS et UNICEF : la plus grande opération de rattrapage vaccinal de l'histoire atteint 100 millions de doses administrées","url":"https://www.unicef.org/esa/press-releases/largest-catch-initiative-delivers-over-100-million-childhood-vaccinations","content":"L'OMS et l'UNICEF ont annoncé le 24 avril 2026 que la plus grande initiative de rattrapage vaccinal jamais lancée avait permis d'administrer plus de 100 millions de doses à des enfants dans le monde. Cette campagne historique vise à combler les écarts de couverture creusés par la pandémie de COVID-19, qui avait laissé plus de 14 millions d'enfants sans vaccination de base. Les vaccins administrés couvrent des maladies évitables comme la rougeole, la polio, la diphtérie, le tétanos et la coqueluche. L'UNICEF a joué un rôle logistique central dans la coordination mondiale de cette initiative, avec un accent particulier sur les pays à faible revenu d'Afrique subsaharienne et d'Asie du Sud où les besoins non satisfaits restent les plus importants.","date":"2026-06-23"},
{"title":"Gavi et UNICEF intensifient leur soutien à la vaccination en zones de conflit face aux crises sanitaires émergentes","url":"https://cphia.africacdc.org","content":"À l'occasion de la 5e Conférence Internationale sur la Santé Publique en Afrique (CPHIA 2026) prévue à Addis-Abeba, Gavi et l'UNICEF figurent parmi les partenaires clés appelés à présenter leurs stratégies de vaccination dans les zones de fragilité. L'événement, qui réunit chefs d'État, ministres et chercheurs, offre une plateforme pour renforcer les synergies entre agences onusiennes et institutions africaines dans la lutte contre les maladies évitables par la vaccination.","date":"2026-06-22"},
{"title":"Gavi and UNICEF: Partners in Vaccine Access Amid the BVD Outbreak Response","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-may-9-2026","content":"As the Bundibugyo Virus Disease outbreak continues to challenge health systems in DRC and Uganda, international partners including UNICEF and Gavi play a critical role in supporting immunization logistics and health commodity supply chains. The situational report of June 9, 2026, underscores the importance of coordinated multilateral efforts in outbreak response, with community engagement, risk communication, and medical countermeasure distribution at the forefront. UNICEF's longstanding presence in both DRC and Uganda positions it as a key actor in ensuring vulnerable populations receive timely health interventions, while Gavi's vaccine financing mechanisms remain essential for sustaining immunization coverage in fragile, outbreak-affected settings.","date":"2026-06-21"},
{"title":"Gavi et l'UNICEF mobilisent des ressources pour accélérer la vaccination dans les zones affectées par l'épidémie de BVD en Afrique centrale","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"Dans le contexte de l'épidémie de maladie à virus Bundibugyo (BVD) qui frappe la RDC et l'Ouganda, Gavi, l'Alliance du vaccin, et l'UNICEF intensifient leurs efforts pour soutenir les campagnes de vaccination d'urgence et l'acheminement de fournitures médicales dans les zones les plus touchées. Les deux organisations travaillent en étroite coordination avec l'Africa CDC et l'OMS pour garantir l'accès aux contre-mesures médicales, notamment les vaccins expérimentaux contre les fièvres hémorragiques virales, tout en renforçant les systèmes de chaîne du froid dans les régions reculées de l'Ituri. L'UNICEF assure également la sensibilisation des communautés locales pour favoriser l'acceptation des interventions sanitaires.","date":"2026-06-18"},
{"title":"Mental Health Leadership Course in Africa: Africa CDC Opens Applications with Scholarship Support","url":"https://www.instagram.com/p/DShzmNwgpF4","content":"Africa CDC has launched a call for applications for its Mental Health Leadership and Advocacy Course, scheduled for 3-14 August 2026 at the Ibadan Business School in Bodija, Ibadan, Nigeria. Scholarships are available to support participants, reflecting Africa CDC's commitment to building human capital across the continent's health sector. The initiative is part of broader efforts by Africa CDC and its partners, including UNICEF, to strengthen mental health systems and leadership capacity across African Union member states. Applications are open until 26 June 2026.","date":"2026-06-13"},
],
"sante-maroc":[
{"title":"Maroc : 42,4 milliards de dirhams pour la santé en 2026, budget en hausse de 30% et 8 000 nouveaux postes","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le budget du ministère marocain de la Santé et de la Protection sociale atteint 42,4 milliards de dirhams en 2026, soit une hausse de 30 % par rapport à l'année précédente. Cette enveloppe record finance la création de 8 000 nouveaux postes budgétaires dans le secteur sanitaire, plaçant ce ministère en seconde position nationale des recrutements après le ministère de l'Intérieur (13 000 postes). L'investissement vise à moderniser les infrastructures hospitalières, renforcer les centres hospitaliers universitaires (CHU) et améliorer la gouvernance territoriale via les Groupements Sanitaires Territoriaux (GST). Cette dynamique budgétaire sans précédent s'inscrit dans la vision royale de réforme de l'État social pour réduire les inégalités d'accès aux soins entre milieux urbains et ruraux à travers le Royaume.","date":"2026-06-23"},
{"title":"Réforme sanitaire 2026 : le Maroc rénove 90 hôpitaux, construit de nouveaux CHU et généralise la feuille de soins électronique","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"L'année 2026 marque une accélération décisive de la réforme du système de santé marocain avec plusieurs chantiers d'envergure nationale. Les priorités incluent la construction de nouveaux centres hospitaliers universitaires (CHU), la rénovation de 90 hôpitaux à travers le territoire national, l'opérationnalisation progressive des Groupements Sanitaires Territoriaux (GST) et la généralisation de la feuille de soins électronique dans tous les établissements. Ces transformations s'accompagnent toutefois de résistances structurelles dans la gestion des ressources humaines et la réorganisation des services. Les experts saluent l'ambition des réformes tout en appelant à une mise en œuvre plus rapide et à un renforcement de l'accompagnement des professionnels de santé pour garantir le succès de cette transition historique.","date":"2026-06-23"},
{"title":"Les Groupements Sanitaires Territoriaux (GST) : nouveau pilier de la gouvernance du système de santé marocain","url":"https://www.leconomiste.com/sante-les-chantiers-2026/","content":"Les Groupements Sanitaires Territoriaux (GST) constituent un pilier central de la réforme du système de santé marocain en 2026. Ces nouvelles entités de gouvernance visent à décloisonner les soins primaires, secondaires et tertiaires dans chaque région, favorisant une prise en charge continue et coordonnée des patients. La réforme entend rapprocher les services de santé des populations, en particulier dans les zones rurales où l'accès aux soins reste insuffisant. Les chantiers 2026 incluent aussi la mise en place de systèmes d'information de santé interopérables pour le suivi électronique des dossiers médicaux. L'opérationnalisation des GST représente un défi organisationnel majeur mais constitue une transformation structurelle nécessaire pour atteindre la couverture sanitaire universelle au Maroc, conformément aux orientations royales et aux engagements de l'État social.","date":"2026-06-23"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},
],
"vaccins-monde":[
{"title":"L'OMS reprend les campagnes préventives contre le choléra après le doublement du stock mondial de vaccins","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"L'OMS a annoncé en février 2026 la reprise des campagnes de vaccination préventive contre le choléra, rendue possible par le doublement de la production mondiale de vaccins oraux contre la maladie. La production annuelle de vaccins anticholériques oraux (OCV) est passée de 35 millions de doses en 2022 à près de 70 millions en 2025, atteignant un seuil critique pour relancer les campagnes préventives, interrompues depuis plus de trois ans. Cette reprise marque un tournant dans la lutte contre le choléra qui menace encore des dizaines de millions de personnes dans les régions touchées par des conflits, des catastrophes naturelles ou des insuffisances en eau et assainissement. L'OMS souligne que la vaccination préventive est complémentaire des interventions WASH (eau, assainissement, hygiène) pour briser durablement les chaînes de transmission.","date":"2026-06-23"},
{"title":"Couverture vaccinale mondiale en stagnation : plus de 14 millions d'enfants toujours non vaccinés selon l'OMS et l'UNICEF","url":"https://www.unicef.org/press-releases/global-childhood-vaccination-holds-steady-yet-over-14-million-infants-remain","content":"Le rapport conjoint OMS-UNICEF sur la couverture vaccinale mondiale révèle que plus de 14 millions d'enfants restent sans aucune vaccination de base, malgré une stabilisation globale de la couverture. La stagnation, combinée à la croissance démographique dans les pays à faible revenu, signifie que le nombre absolu d'enfants non vaccinés ne diminue pas assez vite. Des inégalités profondes persistent entre pays riches et pays pauvres, avec des lacunes particulièrement criantes en Afrique subsaharienne et en Asie du Sud. Les retards de vaccination ont touché près de 100 pays en début 2026, fragilisant les acquis de décennies de lutte contre des maladies évitables comme la rougeole, la poliomyélite et la diphtérie.","date":"2026-06-23"},
{"title":"GACVS : réunion conjointe sur la sécurité vaccinale mondiale à Genève, 23-26 juin 2026","url":"https://www.who.int/publications/i/item/who-wer1019-10-37-42","content":"Le Comité consultatif mondial de la Sécurité vaccinale (GACVS) tient à Genève du 23 au 26 juin 2026 une réunion conjointe avec le Comité consultatif sur la Sécurité des produits médicaux (ACSoMP). Cette réunion, organisée par l'OMS, rassemble des experts mondiaux pour évaluer les données de pharmacovigilance des vaccins en déploiement mondial, notamment les vaccins contre le COVID-19, le paludisme, le VPH et les fièvres hémorragiques virales. Dans le contexte de l'épidémie d'Ebola Bundibugyo, le GACVS examinera également les données émergentes sur les candidats vaccins en développement accéléré. Les conclusions du GACVS orientent les recommandations de l'OMS aux États membres sur l'utilisation sûre des vaccins et contribuent à renforcer la confiance du public dans la vaccination à l'échelle mondiale.","date":"2026-06-23"},
{"title":"Ebola Bundibugyo : l'absence de vaccins met en lumière l'urgence d'investir dans la R&D vaccinale mondiale","url":"https://www.cdc.gov/media/releases/2026/update-on-ebola-outbreak-in-the-democratic-republic-of-the-congo-and-uganda-6-5-2026.html","content":"L'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda expose une lacune critique : aucun vaccin ni traitement spécifique n'est disponible contre ce variant. Contrairement à l'Ebola Zaïre, pour lequel des vaccins homologués existent, le variant Bundibugyo reste sans réponse vaccinale validée. Les autorités sanitaires mondiales, dont le CDC américain et l'OMS, appellent à accélérer la recherche et le développement de vaccins contre les souches négligées du virus Ebola, soulignant que la prévention vaccinale demeure l'outil le plus efficace contre de futures flambées.","date":"2026-06-22"},
{"title":"Briefing OMS Afrique : la riposte vaccinale contre Ebola Bundibugyo au centre des discussions","url":"https://www.youtube.com/watch?v=Gp9tFTr5a9Y","content":"Lors du briefing presse virtuel de l'OMS Afrique du 4 juin 2026, les experts ont fait le point sur la stratégie de riposte à l'épidémie de maladie à virus Ebola de type Bundibugyo en RDC et en Ouganda. Les discussions ont notamment porté sur les outils de prévention disponibles, les protocoles de vaccination d'urgence et les défis du traçage des contacts dans les zones affectées. L'OMS a souligné l'importance du déploiement rapide des équipes de réponse et la nécessité de renforcer les capacités locales de gestion des épidémies. Les intervenants ont également évoqué les cas importés en Ouganda et les mesures de quarantaine mises en place, saluant la capacité des autorités ougandaises à détecter et isoler rapidement les cas suspects grâce aux protocoles de surveillance renforcés.","date":"2026-06-17"},
{"title":"Third Reaffirmation of Mpox Emergency: Africa CDC and WHO Call for Accelerated Global Immunization Efforts","url":"https://khub.africacdc.org/records/resource?id=405","content":"Africa CDC and the World Health Organization have jointly issued a third reaffirmation of the mpox public health emergency, underscoring the persistent threat posed by the virus across the African continent and beyond. The declaration highlights a continued increase in mpox cases, including in Cameroon, and points to the emergence of the novel clade Ib strain in Central Africa as a particular cause for global concern. Researchers have conducted comprehensive phylogenetic and mutational analyses of the Monkeypox virus (MPXV) across sub-Saharan Africa between 2022 and 2024, revealing significant genomic diversity. Community health workers have been identified as a key resource in halting outbreaks at the local level. Both organizations are calling on the international community to accelerate vaccine research and deployment, scale up immunization campaigns in high-risk areas, and invest in surveillance infrastructure to monitor the evolving epidemiology of mpox across the continent.","date":"2026-06-15"},
{"title":"Africa CDC lance sa promotion 2026 de Jeunes Champions de la Santé Numérique pour transformer l'avenir sanitaire du continent","url":"https://youth.africacdc.org/2026-cohort-of-young-digital-health-champions-to-transform-africas-health-future-announced","content":"Africa CDC a annoncé sa promotion 2026 de Jeunes Champions de la Santé Numérique (Y-DHC), une initiative visant à identifier et connecter de jeunes leaders qui façonnent activement le paysage de la santé numérique en Afrique. Dans le cadre de la stratégie YES!Health 2025-2028, ces champions joueront un rôle clé dans l'innovation en matière de vaccination et de santé publique numérique, contribuant à accélérer l'adoption des technologies de santé, notamment les registres de vaccination électroniques et les systèmes de suivi immunologique. Des cohortes régionales ont été sélectionnées pour l'Afrique centrale, orientale, septentrionale, australe et occidentale.","date":"2026-06-13"},
],

function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
</body>
</html>
