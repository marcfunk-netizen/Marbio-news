var articlesData={
"african-cdc":[
{"title":"Maladie à virus Bundibugyo : 1 068 cas confirmés selon le dernier rapport de l'Africa CDC","url":"https://khub.africacdc.org/health-topics/surveillance","content":"Selon le rapport de situation n°35 publié le 22 juin 2026, l'épidémie de Maladie à Virus Bundibugyo (MVB) en RDC et en Ouganda continue de présenter des défis majeurs pour la santé publique africaine. Le bilan combiné s'élève désormais à 1 068 cas confirmés, 269 décès confirmés et 126 guérisons, avec 8 433 contacts actuellement sous suivi. Le taux de létalité provisoire est estimé à 25,2 %. L'Africa CDC souligne la persistance de la transmission communautaire en RDC, notamment dans la province de l'Ituri qui concentre plus de 91 % des cas, tandis que la situation en Ouganda montre des signes de stabilisation relative. Des défis opérationnels et socioculturels — dont la désinformation, les fuites de cas et les pénuries de ressources — continuent d'entraver la réponse.","date":"2026-06-26"},
{"title":"Africa CDC : l'Afrique du Sud engage 2,5 millions USD pour la riposte Ebola en RDC et en Ouganda","url":"https://dirco.gov.za/africa-cdc-strengthens-the-capacity-and-capability-of-africas-public-health-institutions-as-well-as-partnerships-to-detect-and-respond-quickly-and-effectively-to-disease-threats-and-outbreaks","content":"Addis-Abeba, 20 mai 2026 – L'Africa CDC a salué l'engagement du gouvernement sud-africain de contribuer 2,5 millions USD au Fonds africain contre les épidémies (Africa Epidemics Fund), destiné à soutenir la réponse à l'épidémie d'Ebola en cours en RDC et en Ouganda. Cette annonce illustre la volonté de l'institution panafricaine de renforcer les capacités des systèmes de santé publique du continent, notamment en matière de surveillance épidémiologique, de détection précoce et de riposte rapide aux menaces sanitaires. L'Africa CDC réaffirme ainsi son rôle central dans la coordination des interventions basées sur des données probantes pour protéger la santé des populations africaines.","date":"2026-06-26"},
{"title":"Africa CDC : l'épidémie d'Ebola en RDC pourrait devenir la pire de l'histoire","url":"https://www.democracynow.org/2026/6/17/headlines/africa_cdc_warns_ebola_outbreak_in_drc_could_become_worst_on_record","content":"L'Africa Centres for Disease Control and Prevention (Africa CDC) tire la sonnette d'alarme : l'épidémie d'Ebola en République Démocratique du Congo (RDC) pourrait devenir la plus meurtrière jamais enregistrée dans l'histoire. Le nombre de cas confirmés a atteint 837, tandis que le bilan officiel des décès avoisine les 200. Face à cette progression alarmante, l'Africa CDC appelle à une mobilisation financière urgente afin d'intensifier le traçage des contacts et de stopper la propagation du virus. Sans ressources supplémentaires, les autorités sanitaires craignent une extension incontrôlable de l'épidémie au-delà des zones déjà touchées.","date":"2026-06-26"},
{"title":"Rapport de situation BVD du 1er juin 2026 : 332 cas confirmés, 14,8 % de létalité en RDC et Ouganda","url":"https://khub.africacdc.org/records/resource/bundibugyo-virus-disease-outbreak-situational-report-june-1-2026","content":"Au 1er juin 2026, l'épidémie de maladie à virus Bundibugyo (BVD) avait engendré 332 cas confirmés et 49 décès confirmés, soit un taux de létalité de 14,8 %. On dénombrait par ailleurs 321 cas suspects, dont 101 personnes en isolement, et 259 décès parmi les cas suspects. L'épidémie touchait 23 zones de santé en République Démocratique du Congo ainsi qu'un district en Ouganda. Le rapport de l'Africa CDC met en évidence plusieurs défis majeurs : une faible capacité de suivi des contacts, une résistance communautaire sur le terrain, des contraintes logistiques dans le transport des échantillons vers les laboratoires de référence, et le retard dans le déploiement des équipes de réponse rapide multidisciplinaires dans certaines zones à haut risque comme Mongbwalu et Aru.","date":"2026-06-25"},
{"title":"Africa CDC & OMS lancent le Plan Continental de Préparation et de Réponse à Ebola : 518 millions de dollars mobilisés","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"Le 5 juin 2026, l'Africa CDC et l'Organisation mondiale de la Santé (OMS) ont officiellement lancé le Plan Continental de Préparation et de Réponse à la maladie à virus Bundibugyo (BVD). Articulé autour du principe « Un Plan, Un Budget, Une Équipe », ce plan couvre la période de juin à novembre 2026 et est chiffré à 518 millions de dollars, assorti d'un mécanisme conjoint de suivi financier pour garantir la transparence. Ses piliers opérationnels comprennent la coordination des urgences, les tests de laboratoire, la surveillance épidémiologique, la prévention des infections, les soins cliniques et l'engagement communautaire. Le Directeur général de l'Africa CDC a souligné que ce plan offre au continent une feuille de route claire pour agir avec rapidité et unité, protéger les communautés affectées et soutenir les pays voisins.","date":"2026-06-25"},
{"title":"Ebola Bundibugyo : plus de 910 millions de dollars pledgés, mais moins de 90 millions décaissés","url":"https://x.com/AfricaCDC/status/2067940466104926516","content":"Lors de son briefing médiatique hebdomadaire du 18 juin 2026, l'Africa CDC a révélé une réalité alarmante : si plus de 910 millions de dollars ont été annoncés lors de la réunion des chefs d'État et de gouvernement africains consacrée à l'épidémie de maladie à virus Ebola Bundibugyo, moins de 90 millions ont effectivement été décaissés à ce jour. Ce gouffre entre les engagements et les fonds réellement disponibles soulève de vives inquiétudes quant à la capacité des équipes de riposte à maintenir leurs opérations sur le terrain en RDC et en Ouganda. L'Africa CDC appelle à une accélération urgente des transferts financiers pour soutenir la surveillance épidémiologique, la prise en charge clinique et l'engagement communautaire.","date":"2026-06-25"},
],
"african-medical-agency":[
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
{"title":"L'Agence Africaine du Médicament : un pilier en construction pour la souveraineté sanitaire du continent","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Alors que l'Afrique renforce ses institutions de santé publique face aux épidémies récurrentes, l'Agence Africaine du Médicament (AMA) demeure un chantier stratégique prioritaire de l'Union Africaine. En parallèle des efforts déployés par Africa CDC pour contenir l'épidémie d'Ebola en RDC et en Ouganda, l'AMA travaille à l'harmonisation des cadres réglementaires du médicament à l'échelle continentale. Son rôle est crucial pour garantir l'accès à des médicaments et vaccins de qualité, en particulier lors des situations d'urgence sanitaire. Les experts appellent à une accélération de l'opérationnalisation complète de l'AMA, afin que l'Afrique puisse disposer d'un organe de régulation pharmaceutique indépendant et pleinement fonctionnel avant la prochaine grande crise sanitaire.","date":"2026-06-07"},
],
"manufacture-vaccins":[
{"title":"Plan de réponse Ebola 2026 : un appel à investir dans la fabrication locale de contre-mesures médicales en Afrique","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"La déclaration de l'épidémie de maladie à virus Ebola Bundibugyo comme urgence de santé publique par l'OMS et l'Africa CDC en 2026 met en exergue les insuffisances persistantes dans la chaîne de fabrication et d'approvisionnement en produits médicaux sur le continent. Avec 332 cas confirmés et un taux de létalité de 14,8 % au début du mois de juin, l'absence de vaccin et la pénurie de traitements spécifiques soulignent l'urgence d'investir dans des capacités de fabrication pharmaceutique locales. Les experts appellent à une mobilisation accrue des industriels africains et internationaux pour développer, produire et distribuer des vaccins candidats contre les souches d'Ebola non couvertes, et pour renforcer les plateformes de biofabrication continentales afin de réduire la dépendance aux importations en période de crise.","date":"2026-06-25"},
{"title":"Urgence Ebola Bundibugyo : l'absence de vaccin homologué relance le débat sur la production vaccinale africaine","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'épidémie de maladie à virus Bundibugyo qui frappe la République Démocratique du Congo et l'Ouganda depuis plusieurs semaines met en lumière une réalité critique : il n'existe à ce jour aucun vaccin homologué contre cette souche spécifique du virus Ebola. Contrairement à la souche Zaïre, pour laquelle des vaccins ont été développés et déployés avec succès, la souche Bundibugyo demeure sans solution vaccinale disponible à grande échelle. Cette situation relance avec acuité le débat sur la nécessité d'accélérer les capacités de recherche, développement et fabrication de vaccins sur le continent africain. Le plan conjoint Africa CDC-OMS, doté de 518 millions de dollars, inclut des volets dédiés au développement de contre-mesures médicales, pressant les fabricants et les bailleurs de fonds à investir dans la production locale de vaccins adaptés aux pathogènes prioritaires africains.","date":"2026-06-25"},
{"title":"2026 Ebola Outbreak Highlights Urgent Need for Vaccine Manufacturing Against Bundibugyo Strain","url":"https://www.infectioncontroltoday.com/view/2026-ebola-outbreak-spreads-central-africa-who-warns-growing-crisis-amid-cdc-usaid-cuts","content":"The 2026 Ebola outbreak, caused by the Bundibugyo strain currently affecting the Democratic Republic of Congo and Uganda, has exposed a critical gap in the global vaccine manufacturing landscape: there is currently no approved vaccine or treatment specifically targeting this strain. With over 513 cases and more than 130 suspected deaths reported, health experts are urgently calling for accelerated research and manufacturing investment dedicated to Bundibugyo virus disease. The drastic reduction of USAID funding — by 90% — and the US withdrawal from WHO have further hampered the mobilization of resources needed to fast-track vaccine development. Global health stakeholders warn that without dedicated manufacturing pipelines for neglected hemorrhagic fever strains, the world will continue to be caught unprepared when novel or rare Ebola variants emerge.","date":"2026-06-23"},
],
"unicef-gavi":[
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
{"title":"Gavi et UNICEF Mobilisés face à la Crise Ebola en Afrique Centrale : Enjeux de Vaccination et d'Accès aux Soins","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-con","content":"Face à la propagation de l'épidémie de maladie à virus Bundibugyo en République Démocratique du Congo et en Ouganda, Gavi (l'Alliance du Vaccin) et l'UNICEF sont appelés à intensifier leur soutien logistique et financier pour garantir l'accès aux outils de santé publique dans les zones affectées. Bien qu'aucun vaccin homologué ne soit disponible contre la souche Bundibugyo, les deux organisations jouent un rôle clé dans la chaîne d'approvisionnement en matériels de protection, en soutien aux campagnes de sensibilisation communautaire et en renforcement des systèmes de santé locaux. L'UNICEF assure également la protection des enfants et des familles vulnérables dans les foyers épidémiques, en coordination avec les autorités nationales et Africa CDC. Ces interventions s'inscrivent dans le cadre du plan continental de préparation et de réponse doté de 518 millions de dollars lancé conjointement par Africa CDC et l'OMS.","date":"2026-06-23"},
{"title":"Gavi et UNICEF intensifient leur soutien à la vaccination en zones de conflit face aux crises sanitaires émergentes","url":"https://cphia.africacdc.org","content":"À l'occasion de la 5e Conférence Internationale sur la Santé Publique en Afrique (CPHIA 2026) prévue à Addis-Abeba, Gavi et l'UNICEF figurent parmi les partenaires clés appelés à présenter leurs stratégies de vaccination dans les zones de fragilité. L'événement, qui réunit chefs d'État, ministres et chercheurs, offre une plateforme pour renforcer les synergies entre agences onusiennes et institutions africaines dans la lutte contre les maladies évitables par la vaccination.","date":"2026-06-22"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
