var articlesData={
"african-cdc":[
{"title":"Africa CDC et l'OMS lancent un plan de riposte contre Ebola alors que le bilan en Ouganda s'alourdit","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'Africa CDC (Centre africain de contrôle et de prévention des maladies) et l'Organisation mondiale de la Santé ont annoncé le 5 juin 2026 un plan d'action conjoint pour lutter contre l'épidémie d'Ebola qui se propage actuellement en République démocratique du Congo (RDC) et en Ouganda. Ce plan de réponse coordonnée arrive alors que l'Ouganda signale trois nouveaux cas et un décès supplémentaire, portant le total national à 19 cas et 2 morts. En RDC, l'épidémie, déclarée le 15 mai dernier, a déjà infecté au moins 381 personnes et causé 64 décès. Le financement recherché, estimé à 518 millions de dollars, doit permettre de renforcer la surveillance épidémiologique, les soins cliniques et l'engagement communautaire sur les prochains six mois.","date":"2026-06-07"},
{"title":"WHO and Africa CDC Announce Joint $518 Million Ebola Response Plan","url":"https://www.cidrap.umn.edu/ebola/who-africa-cdc-announce-joint-ebola-response-plan","content":"The World Health Organization (WHO) and the Africa Centres for Disease Control and Prevention (Africa CDC) announced on June 5, 2026 a joint six-month plan to respond to the Ebola outbreak currently affecting the Democratic Republic of the Congo (DRC) and Uganda. The plan aims to raise $518 million to strengthen outbreak response measures through November 2026, complementing response strategies already launched by the governments of the DRC and Uganda. The initiative covers emergency coordination, surveillance, testing, infection prevention, clinical care and community engagement. Since the outbreak was first declared in the DRC on May 15, at least 381 people have been infected and 64 deaths recorded, with Uganda reporting 19 cases and two deaths as of June 5.","date":"2026-06-07"},
{"title":"Africa CDC et l'OMS dévoilent un plan continental de préparation à la maladie à virus Bundibugyo","url":"https://www.facebook.com/africacdc/videos/live-africa-cdc-who-press-briefing-bundibugyo-virus-disease-continental-prepared/1255649539979975","content":"Le 5 juin 2026, l'Africa CDC et l'Organisation mondiale de la Santé (OMS) ont tenu une conférence de presse conjointe pour présenter le Plan continental de préparation et de réponse à la maladie à virus Bundibugyo (BVD). Ce cadre stratégique vise à coordonner la préparation, la vigilance et la réponse de tous les États membres de l'Union africaine face à cette fièvre hémorragique mortelle. Le virus Bundibugyo, dont le potentiel de propagation transfrontalière et internationale en fait une préoccupation majeure de sécurité sanitaire mondiale, a conduit les deux institutions à ériger ce plan en priorité absolue. La conférence, diffusée en direct, s'est adressée aux professionnels de santé, aux décideurs politiques, aux journalistes et aux chercheurs du monde entier.","date":"2026-06-07"},
{"title":"L'épidémie d'Ebola pourrait rivaliser avec les pires crises sanitaires enregistrées, selon les projections","url":"https://www.npr.org/2026/06/05/nx-s1-5848082/ebola-virus-cdc-outbreak-democratic-republic-congo-uganda","content":"Selon de nouvelles analyses du Centers for Disease Control and Prevention (CDC) américain, la flambée épidémique d'Ebola qui ravage actuellement l'Afrique pourrait rivaliser avec l'épidémie qui avait frappé l'Afrique de l'Ouest il y a une décennie, entraînant 20 000 cas et au moins 4 000 décès dans les seuls trois prochains mois. Ces projections alarmantes interviennent alors que la RDC et l'Ouganda s'efforcent de contenir cette importante épidémie due à la souche Bundibugyo. L'OMS a déclaré une urgence sanitaire internationale face à la situation. À ce jour, plus de 300 cas confirmés ont été recensés en RDC, avec des centaines de cas suspects supplémentaires. L'Africa CDC et l'OMS ont présenté un plan continental de réponse pour coordonner la riposte à l'échelle du continent africain.","date":"2026-06-07"},
{"title":"WHO and Africa CDC unveil $518m Ebola plan as Uganda death toll rises","url":"https://www.aljazeera.com/news/2026/6/5/who-africa-cdc-unveil-518m-ebola-plan-as-uganda-death-toll-rises","content":"The World Health Organization (WHO) and the African Union's health agency, Africa CDC, have announced a $518 million plan to combat the deadly Ebola outbreak spreading across conflict-ridden Democratic Republic of the Congo (DRC) and neighbouring Uganda. Uganda has reported three additional cases and one new death from the outbreak, which originated in the DRC. The six-month continental preparedness and response plan aims to coordinate efforts across all African Union Member States to contain the Bundibugyo Virus Disease, a deadly haemorrhagic fever with cross-border and international spread potential, making it a global health security concern.","date":"2026-06-07"},
{"title":"Africa CDC et l'OMS lancent un plan à 518 millions de dollars pour combattre Ebola","url":"https://qazinform.com/news/africa-cdc-and-who-launch-518mn-plan-to-fight-ebola-7de77e","content":"L'Africa CDC (Centres africains de contrôle et de prévention des maladies) et l'Organisation mondiale de la Santé (OMS) ont dévoilé conjointement un plan continental de préparation et de réponse à la flambée épidémique d'Ebola qui sévit en Afrique. Cette initiative de six mois, couvrant la période de juin à novembre 2026, vise à mobiliser 518 millions de dollars américains pour aider les pays africains à se préparer, détecter et répondre aux cas d'Ebola causés par le virus Bundibugyo. Le plan représente une coordination sans précédent entre l'Africa CDC et l'OMS face à une menace épidémique majeure qui touche principalement la République Démocratique du Congo et l'Ouganda.","date":"2026-06-07"},
{"title":"Flambée d'Ebola en RDC et Ouganda : Africa CDC déclare une urgence et mobilise une réponse d'urgence","url":"https://www.cdc.gov/han/php/notices/han00530.html","content":"Le 15 mai 2026, le Ministère de la Santé de la République Démocratique du Congo (RDC) a confirmé une flambée de maladie à virus Ebola dans la province d'Ituri, au nord-est du pays. Au 16 mai, 246 cas suspects et 80 décès avaient été recensés. Les analyses de laboratoire ont confirmé le virus Bundibugyo comme agent causal dans 8 des 13 échantillons testés, prélevés dans les zones de santé de Mongbwalu et Rwampara. Le 17 mai, l'OMS a déclaré cette épidémie une urgence de santé publique de portée internationale (USPPI). L'Africa CDC, en coordination étroite avec l'OMS, a immédiatement activé ses mécanismes de réponse d'urgence. Les patients présentaient fièvre, douleurs généralisées, vomissements et, dans certains cas, des saignements. La réponse est rendue difficile par l'insécurité dans les zones touchées.","date":"2026-06-06"},
{"title":"Épidémie Ebola 2026 : l'Africa CDC face à la 17e flambée de la RDC","url":"https://en.wikipedia.org/wiki/2026_Central_Africa_Ebola_epidemic","content":"La flambée épidémique à virus Ebola Bundibugyo confirmée le 15 mai 2026 en province de l'Ituri (RDC) est la 17e épidémie d'Ebola enregistrée dans le pays, survenant seulement cinq mois après la fin de la précédente. Au 16 mai, 246 cas suspects et 80 décès avaient été recensés dans les zones de santé de Bunia, Mongwalu et Rwampara. Des cas importés ont depuis été signalés à Kinshasa et à Kampala (Ouganda). L'OMS a classé l'événement comme urgence de santé publique de portée internationale le 17 mai. L'Africa CDC, en première ligne de la riposte continentale, coordonne avec les gouvernements africains et les partenaires internationaux la mobilisation des ressources humaines, logistiques et financières nécessaires pour contenir cette menace régionale.","date":"2026-06-06"},
],
"african-medical-agency":[
{"title":"Africa CDC and African Medicines Agency strengthen continental regulatory cooperation","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"Africa CDC and the newly operationalised African Medicines Agency (AMA) have reaffirmed deepening collaboration aimed at advancing pharmaceutical regulatory harmonisation across the continent, as highlighted in Africa CDC's weekly briefing of 16-22 February 2026. The partnership is framed as foundational to Africa's ambition to engage as an equal partner in global pharmaceutical markets and to ensure that regulatory frameworks keep pace with scientific and technological innovation. Regulatory harmonisation is seen not merely as an administrative task but as a strategic lever for health sovereignty, reducing dependency on external pharmaceutical supply chains. Sustained political commitment and predictable financing are identified as essential to achieving equitable access and continental pharmaceutical autonomy.","date":"2026-04-11"},
{"title":"Africa CDC and African Medicines Agency deepen regulatory cooperation to advance health sovereignty","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"In the week of February 16-22, 2026, Africa CDC reaffirmed its collaboration with the newly operationalized African Medicines Agency (AMA), marking a significant step in continental regulatory harmonization. The partnership aims to ensure that Africa's regulatory frameworks keep pace with scientific and technological innovation, enabling the continent to engage as an equal partner in global pharmaceutical markets. Africa CDC Director-General H.E. Dr Jean Kaseya emphasized that regulatory harmonization is foundational to Africa's ability to exert influence over global health policy norms. The alliance forms part of a broader AU-backed continental strategy to build resilient, sovereign health systems with predictable financing and harmonized regulatory standards.","date":"2026-04-10"},
{"title":"AMA operationalization marks turning point for Africa's pharmaceutical regulatory landscape","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"The African Medicines Agency, now fully operationalized as of early 2026, represents a historic milestone in Africa's effort to harmonize drug regulation across member states. Its collaboration with Africa CDC is designed to eliminate fragmented national approval processes that have long delayed access to essential medicines and vaccines on the continent. The AMA is expected to streamline market authorization procedures, reduce costs for manufacturers, and ultimately improve equitable access to quality-assured health products for African populations. Sustained political commitment from AU Member States and predictable financing have been identified as critical factors for the agency's long-term success.","date":"2026-04-10"},
{"title":"Africa's regulatory harmonization agenda: building continental pharmaceutical autonomy by 2040","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"Africa's continental strategy to produce 60% of its health products locally by 2040 depends critically on robust regulatory infrastructure, with AMA and Africa CDC at the center of this effort. The ongoing regulatory harmonization push is not merely administrative but is positioned as foundational to Africa's ability to attract investment in local pharmaceutical manufacturing. The Africa CDC 2023-2027 Strategic Plan explicitly links regulatory capacity to innovation, workforce development, and emergency preparedness goals. Partnerships with entities such as FHI 360 and international normative bodies are being leveraged to ensure that Africa-developed regulatory standards achieve global credibility and acceptance.","date":"2026-04-10"},
{"title":"AMA et Africa CDC renforcent la cooperation reglementaire continentale","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"L'Agence africaine des medicaments (AMA), recemment operationnalisee, a intensifie sa collaboration avec Africa CDC dans le cadre d'une strategie continentale visant a harmoniser les cadres reglementaires et a renforcer l'acces equitable aux produits pharmaceutiques. Cette cooperation s'inscrit dans la vision de l'Union africaine de faire de l'Afrique un acteur autonome sur les marches pharmaceutiques mondiaux. L'harmonisation reglementaire est presentee non pas comme un simple exercice administratif, mais comme un fondement essentiel de la souverainete sanitaire africaine. Les deux institutions soulignent que des systemes reglementaires solides sont indispensables pour attirer les investissements industriels et garantir la qualite des medicaments produits localement.","date":"2026-04-09"},
],
"manufacture-vaccins":[
{"title":"ACHIEVE Africa launched to advance vaccine and biologics manufacturing sovereignty","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Africa CDC has launched the ACHIEVE Africa initiative as a cornerstone program under its Health Security and Sovereignty Agenda, targeting the development of indigenous vaccine and biologics manufacturing capacity across the continent. The initiative responds to Africa's near-total dependence on imported vaccines, which was starkly exposed during the COVID-19 pandemic when African nations received doses last. ACHIEVE Africa is designed to catalyze investment in local production infrastructure, workforce training, and technology transfer partnerships with established global manufacturers. The program aligns with the AU's target of producing 60% of Africa's health products locally by 2040.","date":"2026-04-10"},
{"title":"Africa CDC/AVMI Industrial Fellowship Programme 2026-2027 opens to strengthen manufacturing workforce","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Africa CDC and the African Vaccine Manufacturing Initiative (AVMI) have opened applications for the 2026-2027 Industrial Fellowship Programme, aimed at building a new generation of vaccine manufacturing professionals across the continent. The fellowship places selected candidates in established manufacturing facilities to gain hands-on experience in biologics production, quality assurance, and regulatory compliance. This human capital development effort is considered essential to sustaining long-term local production ambitions, as manufacturing expertise has been identified as one of the key bottlenecks to scaling up African vaccine output. The programme is part of a suite of workforce investments under the Health Security and Sovereignty Agenda.","date":"2026-04-10"},
{"title":"Africa commits to producing 60% of its health products locally by 2040 under continental strategy","url":"https://africacdc.org/wp-content/uploads/2025/11/Africa-Health-Security-Sovereignty-Agenda-.pdf","content":"Africa CDC's Health Security and Sovereignty Agenda sets an ambitious continental target of producing 60% of Africa's vaccines, medicines, and health products locally by 2040, up from less than 3% at the time of the COVID-19 pandemic. Achieving this goal requires simultaneous progress on regulatory harmonization, financing mechanisms, infrastructure investment, and technology transfer from global partners. The agenda acknowledges that geopolitical shifts and declining donor funding make self-reliance an urgent strategic necessity rather than a long-term aspiration. Africa CDC will establish a continental scorecard to track progress and hold member states accountable for implementation of commitments under the manufacturing sovereignty framework.","date":"2026-04-10"},
{"title":"ACHIEVE Africa launched: advancing vaccine and biologics sovereignty","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Africa CDC launched the ACHIEVE Africa initiative to accelerate the development of end-to-end vaccine and biologics manufacturing capacity across the continent, targeting full sovereignty over critical biological products. The programme builds on lessons from the COVID-19 pandemic, during which Africa's near-total dependence on imported vaccines left the continent last in line for doses. ACHIEVE Africa is designed to coordinate investments, technology transfers and regulatory support to enable African manufacturers to produce vaccines, sera and other biologics at scale. The initiative complements the continental goal of producing 60% of health products locally by 2040 and aligns with the Africa Health Security and Sovereignty Agenda.","date":"2026-04-09"},
{"title":"Africa CDC/AVMI Industrial Fellowship Programme 2026-2027 opens applications","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Africa CDC and the African Vaccine Manufacturing Initiative (AVMI) have opened applications for the 2026-2027 Industrial Fellowship Programme, designed to embed African scientists and technicians within vaccine manufacturing facilities to build hands-on expertise. The fellowship targets mid-career professionals in fields such as bioprocess engineering, quality assurance and regulatory affairs, and is part of a long-term human capital strategy for the continent's pharmaceutical industry. Participants will gain practical experience at accredited manufacturing sites, with the goal of returning to their home countries to strengthen local production capacity. The programme reflects Africa CDC's recognition that technology transfer alone is insufficient without a skilled local workforce to sustain manufacturing operations.","date":"2026-04-09"},
],
"unicef-gavi":[
{"title":"Gavi and UNICEF secure malaria vaccine supply from Serum Institute at $2.99 per dose","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Gavi and UNICEF have finalized an agreement with the Serum Institute of India to supply the R21/Matrix-M malaria vaccine at $2.99 per dose, a price point hailed as a breakthrough for low-income country access. The deal is expected to significantly expand coverage of malaria vaccination programs across sub-Saharan Africa, where the disease remains one of the leading causes of child mortality. Negotiating an affordable price from a large-scale manufacturer was seen as a critical test of multilateral procurement power in the post-COVID global health funding environment. The agreement is expected to facilitate integration of malaria vaccination into routine immunization schedules in eligible countries supported by Gavi.","date":"2026-04-10"},
{"title":"Letter urges Gavi and UNICEF to negotiate fair price for mpox vaccines amid equity concerns","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"A coalition of global health advocates has written to Gavi and UNICEF urging the organizations to use their collective purchasing leverage to negotiate fair and transparent pricing for mpox vaccines, warning that current price structures risk excluding the most affected African nations. The letter comes as mpox continues to circulate in multiple African countries and as demand for the Bavarian Nordic JYNNEOS vaccine outstrips available supply at accessible price points. Advocates argue that the precedent set by the malaria vaccine deal with Serum Institute should be applied systematically across priority vaccines for Africa. They called for full price transparency and advance market commitment mechanisms to incentivize manufacturers to scale up affordable production.","date":"2026-04-10"},
{"title":"Bangladesh launches emergency measles vaccination campaign after 98 children die in outbreak","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Bangladesh has launched an emergency measles vaccination campaign following an outbreak that has claimed the lives of at least 98 children, according to health authorities. The outbreak exposed significant gaps in routine immunization coverage that had widened during and after the COVID-19 pandemic, when vaccination campaigns were disrupted across the region. UNICEF and WHO are supporting the emergency response by providing vaccines, cold chain equipment, and technical personnel to accelerate coverage in affected districts. The crisis has renewed calls for sustained investment in routine immunization infrastructure to prevent similar outbreaks, particularly in densely populated low-income settings.","date":"2026-04-10"},
{"title":"Gavi and UNICEF secure malaria vaccine from Serum Institute at $2.99 per dose","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Gavi and UNICEF have negotiated a landmark supply agreement with the Serum Institute of India for malaria vaccines at a price of $2.99 per dose, making the vaccine significantly more accessible for low-income countries in sub-Saharan Africa. The agreement is expected to enable millions of additional children to receive protection against malaria, one of the leading causes of child mortality on the continent. The low per-dose price reflects sustained pressure from African health institutions and global advocates for equitable vaccine pricing in line with countries' ability to pay. The deal is seen as a model for future negotiations on other essential vaccines and underscores the role of multilateral procurement mechanisms in levelling the playing field for developing nations.","date":"2026-04-09"},
{"title":"Letter urges Gavi and UNICEF to negotiate fair price for mpox vaccines","url":"https://africacdc.org/wp-content/uploads/2024/08/Explainer-Declaration-of-Public-Health-Emergency-of-Continental-Security-EN.pdf","content":"A coalition of African health institutions and civil society organisations has sent a formal letter to Gavi and UNICEF urging them to use their collective purchasing power to negotiate a fair and affordable price for mpox vaccines, as the outbreak continues to affect more than 20 African countries. The letter argues that current vaccine prices remain out of reach for many national health budgets, creating inequitable access that prolongs outbreaks and undermines Africa's public health sovereignty. Signatories called for transparent pricing negotiations and the application of the same principles used in COVID-19 and malaria vaccine procurement. Africa CDC, which has declared mpox a Public Health Emergency of Continental Security, has supported the call for equitable vaccine access as part of its adaptive outbreak response strategy.","date":"2026-04-09"},
],
"sante-maroc":[
{"title":"Le Maroc acheve la rehabilitation de 1 400 centres de sante pour renforcer l'acces aux soins primaires","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Le gouvernement marocain a annonce l'achevement de la rehabilitation de 1 400 centres de sante primaires a travers le Royaume, dans le cadre du vaste chantier de reforme du systeme de sante national. Cette initiative s'inscrit dans la mise en oeuvre de la loi-cadre 06-22 relative au systeme de sante et vise a garantir une offre de soins de proximite de qualite pour l'ensemble de la population, y compris dans les zones rurales et enclavees. La rehabilitation a porte sur la mise aux normes des infrastructures, l'equipement medical et l'amelioration des conditions d'accueil des patients. Le ministre de la Sante a souligne que ce chantier constitue un jalon essentiel vers la couverture sante universelle au Maroc.","date":"2026-04-10"},
{"title":"Lancement de Tarkhiss: le Maroc se dote d'une plateforme numerique de sante pour les autorisations sanitaires","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Le Maroc a lance Tarkhiss, une nouvelle plateforme numerique destinee a centraliser et simplifier les procedures d'autorisation dans le secteur de la sante, dans le cadre de l'agenda de transformation numerique du Royaume. La plateforme vise a reduire les delais administratifs, a ameliorer la transparence et a renforcer le controle de la qualite des etablissements et des professionnels de sante. Ce lancement s'inscrit dans une dynamique plus large de modernisation de la gouvernance sanitaire marocaine, portee par des investissements publics significatifs depuis la reforme constitutionnelle de la sante. Les operateurs du secteur prive et public pourront desormais soumettre et suivre leurs demandes d'autorisation entierement en ligne.","date":"2026-04-10"},
{"title":"Rapport Afrobarometer 2026: les Marocains denoncent les delais d'attente et les penuries de medicaments","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Le dernier rapport Afrobarometer publie en 2026 revele que de nombreux citoyens marocains continuent de signaler des delais d'attente excessifs et des penuries frequentes de medicaments dans les structures de sante publiques, malgre les efforts de reforme engages par le gouvernement. Les donnees indiquent une insatisfaction persistante vis-a-vis de la qualite des soins dans les etablissements publics, notamment dans les regions peripheriques. Ces resultats viennent nuancer le bilan positif des reformes structurelles, en rappelant que l'amelioration des infrastructures ne suffit pas sans une offre suffisante de ressources humaines et de medicaments essentiels. Le rapport appelle a une acceleration des investissements dans la chaine d'approvisionnement pharmaceutique et dans la formation des personnels de sante.","date":"2026-04-10"},
{"title":"Le Maroc acheve la rehabilitation de 1 400 centres de sante","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"Le gouvernement marocain a annonce l'achevement de la rehabilitation de 1 400 centres de sante a travers le royaume, dans le cadre d'un programme ambitieux de modernisation des infrastructures sanitaires de proximite. Ces travaux visent a ameliorer les conditions d'accueil des patients, a renforcer les equipements medicaux disponibles et a rendre les soins primaires plus accessibles aux populations rurales et periurbaines. La rehabilitation s'inscrit dans la vision royale d'un systeme de sante universel, equitable et de qualite, avec un accent particulier sur la medecine de premier recours. Ce programme constitue l'une des plus grandes operations de mise a niveau des infrastructures de sante menees depuis l'independance du pays.","date":"2026-04-09"},
{"title":"Lancement de Tarkhiss: le Maroc se dote d'une plateforme numerique de sante","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"Le Maroc a lance Tarkhiss, une nouvelle plateforme numerique destinee a simplifier les procedures administratives dans le secteur de la sante, notamment les autorisations d'ouverture d'etablissements de soins et les agrements professionnels. Cette initiative s'inscrit dans la politique nationale de transformation numerique portee par le ministere de la sante et vise a reduire la bureaucratie qui ralentit le developpement de l'offre de soins prives et publics. La plateforme permettra aux professionnels de sante et aux gestionnaires d'etablissements de soumettre et de suivre leurs dossiers en ligne, reduisant les delais de traitement. Tarkhiss est presentee comme un outil cle pour attirer les investissements dans le secteur medical et dynamiser la couverture sanitaire nationale.","date":"2026-04-09"},
],
"vaccins-monde":[
{"title":"IAVI begins Phase 1 first-in-human trial of Marburg virus vaccine","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"The International AIDS Vaccine Initiative (IAVI) has initiated a Phase 1 clinical trial for a novel Marburg virus vaccine candidate, marking the first time this vaccine has been tested in humans. The trial follows a renewed global urgency around Marburg preparedness after outbreaks in East Africa, including Ethiopia's first-ever Marburg event declared over in January 2026. The vaccine candidate uses an established viral vector platform and will be evaluated for safety and immunogenicity in a small cohort of healthy adult volunteers. Results from this Phase 1 trial are expected to inform decisions on accelerated development pathways, particularly given Marburg's high case fatality rate and its status as a priority pathogen for the WHO R&D Blueprint.","date":"2026-04-10"},
{"title":"WHO World Immunization Week 2026 highlights urgent need for global vaccine equity","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"WHO's World Immunization Week 2026 has spotlighted deepening inequities in vaccine access between high-income and low-income countries, calling on governments and global health institutions to redouble efforts to close immunization gaps. The campaign theme emphasizes collective action and scientific solidarity at a time when political headwinds and funding cuts are threatening routine immunization programs in multiple regions. WHO data indicate that millions of children remain unvaccinated or under-vaccinated against preventable diseases including measles, polio, and pneumococcal disease, with coverage stagnating or declining in fragile states. The agency urged donors to maintain funding commitments and called on countries to integrate vaccination into primary health care reform agendas.","date":"2026-04-10"},
{"title":"Gaza launches third catch-up routine vaccination campaign amid ongoing humanitarian crisis","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Gaza has launched its third catch-up routine vaccination campaign in a context of severely disrupted health infrastructure and ongoing conflict, supported by WHO, UNICEF, and partner organizations. The campaign targets children who missed scheduled immunizations due to displacement, facility destruction, and supply chain breakdowns caused by the humanitarian crisis. Health workers conducting the campaign operate under extremely challenging conditions, including restricted movement, fuel shortages, and damage to cold chain facilities. International health agencies have warned that the collapse of routine immunization coverage in conflict zones risks triggering secondary outbreaks of vaccine-preventable diseases, compounding an already catastrophic humanitarian situation.","date":"2026-04-10"},
{"title":"IAVI begins Phase 1 trial of first-in-human Marburg virus vaccine","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"The International AIDS Vaccine Initiative (IAVI) has initiated a Phase 1 first-in-human clinical trial of a candidate vaccine against Marburg virus, a highly lethal hemorrhagic fever pathogen with pandemic potential. The trial, conducted in healthy adult volunteers, aims to assess the safety and immunogenicity of the vaccine candidate, which uses a similar platform to vaccines developed for related filoviruses. The development comes in the wake of a Marburg outbreak in Rwanda that heightened international concern about the virus's potential to spread across borders. If successful, this trial would represent a critical step toward having a licensed Marburg vaccine available for emergency deployment in future outbreaks.","date":"2026-04-09"},
{"title":"WHO: World Immunization Week 2026 highlights global vaccine equity","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"The World Health Organization launched World Immunization Week 2026 with a focus on closing immunisation gaps exacerbated by the COVID-19 pandemic, conflict and misinformation. WHO data indicate that tens of millions of children remain unvaccinated or under-vaccinated globally, with the highest concentrations in sub-Saharan Africa, South Asia and conflict-affected regions. The campaign highlights the life-saving impact of vaccines against measles, polio, HPV and other preventable diseases, calling on governments and partners to close the coverage gap through sustained funding and community outreach. WHO also used the occasion to call for restored confidence in vaccines among populations affected by hesitancy and disinformation.","date":"2026-04-09"},
],
};
function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
</body>
</html>
