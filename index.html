<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marbio News — Veille Vaccins & Santé</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:linear-gradient(168deg,#F0F6FC 0%,#E8F0FE 35%,#F7F9FC 100%);min-height:100vh;color:#0A1929}
.header{background:linear-gradient(135deg,#001F3D 0%,#003366 40%,#00538A 100%);padding:26px 20px 20px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50px;right:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.03)}
.header-inner{max-width:820px;margin:0 auto;position:relative}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:4px}
.logo-icon{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,rgba(255,255,255,0.14),rgba(255,255,255,0.06));display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid rgba(255,255,255,0.12)}
.logo-title{font-family:'Source Serif 4',Georgia,serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.logo-sub{font-size:11.5px;color:rgba(255,255,255,0.5);letter-spacing:1.8px;text-transform:uppercase;font-weight:500;margin-top:2px}
.search-row{display:flex;gap:8px;margin-top:18px}
.search-wrap{flex:1;position:relative}
.search-input{width:100%;padding:12px 16px 12px 42px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.08);color:#fff;font-size:13.5px;outline:none;font-family:inherit;transition:all .2s}
.search-input:focus{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.25)}
.search-input::placeholder{color:#9AB0C6}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.45}
.search-btn{padding:12px 22px;border-radius:12px;border:none;background:#fff;color:#00538A;font-weight:650;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}
.main{max-width:820px;margin:0 auto;padding:18px 16px 40px}
.categories{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.cat-btn{padding:14px;border-radius:14px;border:1px solid rgba(0,40,80,0.07);background:#fff;color:#2A3B4E;cursor:pointer;text-align:left;transition:all .25s;box-shadow:0 1px 4px rgba(0,40,80,0.04);font-family:inherit}
.cat-btn:hover{box-shadow:0 4px 12px rgba(0,105,180,0.1);transform:translateY(-1px)}
.cat-btn.active{border:2px solid #0069B4;background:linear-gradient(135deg,#0069B4,#00538A);color:#fff;box-shadow:0 6px 20px rgba(0,105,180,0.2)}
.cat-icon{font-size:20px;margin-bottom:5px}
.cat-label{font-size:12.5px;font-weight:650;line-height:1.3;margin-bottom:3px}
.cat-desc{font-size:10.5px;line-height:1.4;opacity:.5}
.cat-btn.active .cat-desc{opacity:.8}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.toolbar-info{font-size:12px;color:#7A8A9E}
.toolbar-right{display:flex;align-items:center;gap:10px}
.hint{font-size:11px;color:#9AB0C6;background:rgba(0,105,180,0.05);padding:4px 10px;border-radius:6px}
.refresh-btn{padding:7px 16px;border-radius:9px;border:1px solid rgba(0,105,180,0.15);background:#fff;color:#0069B4;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:all .2s}
.refresh-btn:hover{background:rgba(0,105,180,0.04)}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}
.refresh-btn.loading .icon{animation:spin 1s linear infinite}
.articles{display:flex;flex-direction:column;gap:12px}
.article-card{background:#fff;border-radius:16px;border:1px solid rgba(0,40,80,0.07);padding:20px 22px;transition:all .25s cubic-bezier(.4,0,.2,1);animation:fadeSlideIn .4s ease both}
.article-card:hover{border-color:rgba(0,105,180,0.2);transform:translateY(-1px);box-shadow:0 8px 30px rgba(0,105,180,0.08)}
.article-inner{display:flex;gap:14px;align-items:flex-start}
.article-bar{width:6px;min-height:50px;border-radius:3px;opacity:.7;flex-shrink:0;margin-top:2px}
.article-body{flex:1;min-width:0}
.article-title{font-family:'Source Serif 4',Georgia,serif;font-size:15.5px;font-weight:650;line-height:1.45;color:#0A1929;text-decoration:none;display:block;margin-bottom:10px}
.article-title:hover{color:#0069B4}
.article-content{font-size:13.5px;line-height:1.7;color:#3A4D62;margin-bottom:14px;overflow:hidden}
.article-content.collapsed{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.article-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-tag{padding:3px 10px;border-radius:6px;font-weight:600;font-size:11px}
.date-tag{font-size:11.5px;color:#8A9BB0}
.expand-btn{background:none;border:1px solid rgba(0,105,180,0.15);border-radius:6px;padding:3px 10px;color:#0069B4;font-size:11px;font-weight:600;cursor:pointer;margin-left:auto;font-family:inherit;transition:all .2s}
.expand-btn:hover{background:rgba(0,105,180,0.05)}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;padding:50px 0}
.spinner{width:48px;height:48px;border:3px solid rgba(0,105,180,0.1);border-top-color:#0069B4;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
.spinner-text{color:#5A7A96;font-size:14px;font-weight:500}
.spinner-sub{color:#9AB0C6;font-size:12px;margin-top:6px}
.status-bar{padding:8px 14px;border-radius:10px;background:linear-gradient(135deg,rgba(0,105,180,0.06),rgba(0,105,180,0.02));border:1px solid rgba(0,105,180,0.1);color:#0069B4;font-size:12px;font-weight:500;margin-bottom:14px;display:none;align-items:center;gap:8px}
.status-bar.visible{display:flex}
.status-dot{width:6px;height:6px;border-radius:50%;background:#0069B4;animation:pulse 1.5s infinite}
.error-box{padding:12px 16px;border-radius:12px;background:#FFF8F0;border:1px solid #FFE4C8;color:#8B5E2A;font-size:13px;margin-bottom:14px;display:none;align-items:center;gap:10px}
.last-update{font-size:11px;color:#9AB0C6;background:rgba(0,180,80,0.06);border:1px solid rgba(0,180,80,0.12);padding:4px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px}
.last-update .dot{width:6px;height:6px;border-radius:50%;background:#2ECC71}
.footer{margin-top:50px;padding-top:22px;border-top:1px solid rgba(0,40,80,0.06);text-align:center;font-size:11px;color:#9AB0C6;line-height:2}
.footer strong{color:#4A6A84;font-weight:600;font-size:12px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:640px){.categories{grid-template-columns:repeat(2,1fr)}.toolbar{flex-direction:column;align-items:flex-start}.toolbar-right{width:100%;justify-content:space-between}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo-row">
      <div class="logo-icon">🧬</div>
      <div>
        <div class="logo-title">Marbio News</div>
        <div class="logo-sub">Veille Vaccins · Santé · Afrique · Maroc · Monde</div>
      </div>
    </div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Recherche libre… (ex: paludisme, Aspen Pharmacare, OMS)">
      </div>
      <button class="search-btn" id="searchBtn">Rechercher</button>
    </div>
  </div>
</header>
<main class="main">
  <div class="categories" id="categories"></div>
  <div class="status-bar" id="statusBar"><span class="status-dot"></span><span id="statusText"></span></div>
  <div class="toolbar">
    <div>
      <span class="toolbar-info" id="toolbarInfo"></span>
      <span class="last-update" id="lastUpdate" style="display:none"><span class="dot"></span><span id="lastUpdateText"></span></span>
    </div>
    <div class="toolbar-right">
      <div class="hint">💡 "Lire plus" pour le résumé complet</div>
      <button class="refresh-btn" id="refreshBtn"><span class="icon">↻</span> Actualiser</button>
    </div>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div class="articles" id="articles"></div>
  <footer class="footer">
    <strong>Marbio News</strong><br>
    Veille sanitaire automatique · Africa CDC · AMA · UNICEF · GAVI · Maroc · Monde<br>
    Propulsé par Tavily · Mis à jour automatiquement chaque jour à 7h
  </footer>
</main>
<script>
const CATEGORIES=[
  {id:"african-cdc",label:"Africa CDC",icon:"🌍",desc:"Publications et communiqués"},
  {id:"african-medical-agency",label:"Agence Africaine du Médicament",icon:"💊",desc:"Actualités réglementaires (AMA)"},
  {id:"manufacture-vaccins",label:"Manufacture Vaccins Afrique",icon:"🏭",desc:"Production vaccins et biologiques"},
  {id:"unicef-gavi",label:"UNICEF & GAVI",icon:"💉",desc:"Campagnes d'immunisation"},
  {id:"sante-maroc",label:"Santé Maroc",icon:"🇲🇦",desc:"Système de soins marocain"},
  {id:"vaccins-monde",label:"Vaccins dans le Monde",icon:"🌐",desc:"Actualités mondiales vaccination"},
];

let activeCategory="african-cdc";
let articlesData={};
let lastTimestamp=null;
let isLoading=false;
let isCustomSearch=false;

function getSourceColor(d){
  if(d.includes("who.int"))return"#0093D5";
  if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";
  if(d.includes("unicef"))return"#00AEEF";
  if(d.includes("gavi")||d.includes("amref"))return"#E8702A";
  if(d.includes(".ma")||d.includes("maroc")||d.includes("telquel")||d.includes("santemag")||d.includes("4tech")||d.includes("hespress"))return"#C1272D";
  if(d.includes("nature.com"))return"#B5232D";
  if(d.includes("sciencedirect"))return"#F58220";
  if(d.includes("path.org"))return"#6B2D8B";
  if(d.includes("cdc.gov"))return"#075290";
  if(d.includes("pharmaboardroom"))return"#1A6B4F";
  if(d.includes("anrs.fr"))return"#8B1A4A";
  return"#0069B4";
}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch{return""}}
function timeAgo(d){
  if(!d)return"";const date=new Date(d),now=new Date(),s=Math.floor((now-date)/1000);
  if(isNaN(s)||s<0)return"";if(s<86400)return"aujourd'hui";if(s<604800)return`il y a ${Math.floor(s/86400)}j`;
  if(s<2592000)return`il y a ${Math.floor(s/604800)} sem.`;
  return date.toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});
}

function renderCategories(){
  const el=document.getElementById("categories");
  el.innerHTML=CATEGORIES.map(c=>`
    <button class="cat-btn ${activeCategory===c.id&&!isCustomSearch?'active':''}" data-id="${c.id}">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-label">${c.label}</div>
      <div class="cat-desc">${c.desc}</div>
    </button>`).join("");
  el.querySelectorAll(".cat-btn").forEach(b=>{
    b.addEventListener("click",()=>{isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles()});
  });
}

function renderArticles(){
  const container=document.getElementById("articles");
  const articles=articlesData[activeCategory]||[];
  const info=document.getElementById("toolbarInfo");
  info.textContent=`${articles.length} articles`;

  const upd=document.getElementById("lastUpdate");
  const updTxt=document.getElementById("lastUpdateText");
  if(lastTimestamp){upd.style.display="inline-flex";updTxt.textContent=`Actualisé: ${new Date(lastTimestamp).toLocaleString("fr-FR")}`}

  if(isLoading){
    container.innerHTML=`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-text">Recherche Tavily en cours…</div><div class="spinner-sub">~3 secondes</div></div>`;
    return;
  }
  if(!articles.length){
    container.innerHTML=`<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article trouvé</div><div class="spinner-sub">Cliquez Actualiser pour charger les données</div></div>`;
    return;
  }
  container.innerHTML=articles.map((a,i)=>{
    const domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);
    return`<div class="article-card" style="animation-delay:${i*.06}s">
      <div class="article-inner">
        <div class="article-bar" style="background:${color}"></div>
        <div class="article-body">
          <a href="${a.url}" target="_blank" rel="noopener" class="article-title">${a.title}</a>
          <div class="article-content collapsed" id="c-${i}">${a.content}</div>
          <div class="article-meta">
            <span class="source-tag" style="background:${color}14;color:${color}">${domain}</span>
            ${dateStr?`<span class="date-tag">${dateStr}</span>`:''}
            <button class="expand-btn" data-i="${i}">Lire plus ▼</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
  container.querySelectorAll(".expand-btn").forEach(b=>{
    b.addEventListener("click",()=>{const el=document.getElementById("c-"+b.dataset.i);const c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus ▼":"Réduire ▲"});
  });
}

function setStatus(t){const b=document.getElementById("statusBar"),x=document.getElementById("statusText");if(t){b.classList.add("visible");x.textContent=t}else b.classList.remove("visible")}
function setError(t){const e=document.getElementById("errorBox");if(t){e.style.display="flex";e.innerHTML=`<span>ℹ️</span> ${t}`}else e.style.display="none"}

async function fetchAll(){
  isLoading=true;setError(null);setStatus("Chargement de toutes les catégories…");renderArticles();
  const btn=document.getElementById("refreshBtn");btn.classList.add("loading");btn.disabled=true;
  try{
    const r=await fetch("/api/cron");
    if(!r.ok)throw new Error(`Erreur ${r.status}`);
    const data=await r.json();
    if(data.data){articlesData=data.data;lastTimestamp=data.timestamp;
      // Save to localStorage as cache
      try{localStorage.setItem("marbio-data",JSON.stringify(data))}catch{}
    }
  }catch(e){
    console.error(e);setError("Impossible de joindre l'API. Les données en cache sont affichées.");
  }finally{isLoading=false;setStatus(null);btn.classList.remove("loading");btn.disabled=false;renderArticles()}
}

async function fetchCategory(catId){
  isLoading=true;setError(null);setStatus("Recherche en cours…");renderArticles();
  const btn=document.getElementById("refreshBtn");btn.classList.add("loading");btn.disabled=true;
  try{
    const r=await fetch(`/api/cron?cat=${catId}`);
    if(!r.ok)throw new Error(`Erreur ${r.status}`);
    const data=await r.json();
    if(data.articles){articlesData[catId]=data.articles;lastTimestamp=data.timestamp;
      try{const cached=JSON.parse(localStorage.getItem("marbio-data")||"{}");cached.data=cached.data||{};cached.data[catId]=data.articles;cached.timestamp=data.timestamp;localStorage.setItem("marbio-data",JSON.stringify(cached))}catch{}}
  }catch(e){setError("Erreur de chargement. Données en cache affichées.")}
  finally{isLoading=false;setStatus(null);btn.classList.remove("loading");btn.disabled=false;renderArticles()}
}

async function doSearch(){
  const val=document.getElementById("searchInput").value.trim();if(!val)return;
  isCustomSearch=true;activeCategory="search-custom";
  isLoading=true;setError(null);setStatus(`Recherche : "${val}"…`);renderCategories();renderArticles();
  const btn=document.getElementById("refreshBtn");btn.classList.add("loading");btn.disabled=true;
  try{
    const r=await fetch(`/api/cron?q=${encodeURIComponent(val)}`);
    if(!r.ok)throw new Error(`Erreur ${r.status}`);
    const data=await r.json();
    if(data.articles)articlesData["search-custom"]=data.articles;
  }catch(e){setError("Erreur de recherche.")}
  finally{isLoading=false;setStatus(null);btn.classList.remove("loading");btn.disabled=false;renderArticles()}
}

// Events
document.getElementById("refreshBtn").addEventListener("click",()=>{
  if(isCustomSearch)doSearch();
  else fetchCategory(activeCategory);
});
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch()});

// Init — load from cache first, then fetch fresh
try{
  const cached=JSON.parse(localStorage.getItem("marbio-data")||"{}");
  if(cached.data){articlesData=cached.data;lastTimestamp=cached.timestamp}
}catch{}

renderCategories();
renderArticles();

// Auto-fetch on first visit if no cache
if(!Object.keys(articlesData).length)fetchAll();
</script>
</body>
</html>
