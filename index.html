var articlesData={
"african-cdc":[
{title:"Ebola Bundibugyo : essai clinique de l'anticorps MBP134 et du remdésivir lancé en RDC, bilan dépassant 400 morts",url:"https://english.news.cn/africa/20260703/60a2a996bf764f35b2bdc1c8e62033b9/c.html",content:"Un premier essai clinique a débuté en RDC pour évaluer deux traitements candidats contre l'Ebola causé par le virus Bundibugyo : l'anticorps monoclonal MBP134 et l'antiviral remdésivir, seuls ou en combinaison. Cette avancée survient alors que le bilan de l'épidémie dépasse 400 morts, selon le Dr Jean Kaseya, directeur général de l'Africa CDC, qui a qualifié la situation de très sérieuse. La progression de la souche Bundibugyo s'avère particulièrement rapide comparée aux précédentes flambées d'Ebola en RDC et à l'épidémie ouest-africaine de 2013-2016. L'absence de vaccin homologué contre cette souche constitue une contrainte majeure et renforce l'urgence d'obtenir des résultats probants de cet essai. Les partenaires scientifiques mondiaux suivent de près ce processus qui pourrait déboucher sur une autorisation d'utilisation d'urgence.",date:"2026-07-03"},
{title:"Ouganda : un cas de virus de Marburg détecté chez un enfant de 18 mois lors de la surveillance Ebola",url:"https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON608",content:"Les autorités sanitaires ougandaises ont confirmé un cas isolé de maladie à virus de Marburg dans le district de Kyegegwa, ouest de l'Ouganda, découvert chez un enfant de 18 mois décédé dans le cadre de la surveillance active déployée pour l'épidémie d'Ebola Bundibugyo, selon l'Africa CDC et l'OMS. Aucun contact identifié n'a présenté de symptômes et il n'y a actuellement aucun cas actif de Marburg en Ouganda. Cette détection simultanée de deux fièvres hémorragiques virales illustre la pression épidémiologique exceptionnelle pesant sur l'Afrique de l'Est en 2026. Le virus de Marburg partage avec Ebola une létalité très élevée et une transmission par contact avec les fluides corporels infectés, sans vaccin largement approuvé disponible. Africa CDC et l'OMS ont renforcé la coordination régionale face à ce double défi sanitaire sans précédent.",date:"2026-07-02"},
{title:"Africa CDC vise 90 % de numérisation des soins de santé primaires africains d'ici 2035",url:"https://africacdc.org/news-item/primary-healthcare-digital-transformation-gains-au-and-partner-support/",content:"En avril 2026, les États membres de l'Union africaine, des agences onusiennes et des partenaires techniques ont validé à Addis-Abeba le Cadre de Numérisation des Soins de Santé Primaires de l'Africa CDC, feuille de route pour digitaliser un niveau de contact où se jouent plus de 80 % des interactions sanitaires sur le continent. L'objectif est d'atteindre 90 % de numérisation des SSP d'ici 2035 et de déployer 2 millions d'agents de santé communautaires numériquement équipés d'ici 2030. Le cadre introduit une Architecture Continentale d'Intelligence Sanitaire avec une couche d'IA OKAPI, facilitant des systèmes interopérables incluant identifiants sanitaires uniques, registres numériques et plateformes nationales de données. L'Africa CDC accompagnera chaque État membre dans l'élaboration de feuilles de route nationales financées et de plans de mise en œuvre progressifs adaptés aux contextes locaux. Cette initiative renforce la souveraineté sanitaire numérique de l'Afrique et sa capacité à gouverner sa propre intelligence en santé.",date:"2026-04-30"},
{"title":"Épidémie de Maladie à Virus Bundibugyo : l'Africa CDC intensifie sa surveillance en RDC et en Ouganda","url":"https://khub.africacdc.org/health-topics/surveillance","content":"L'Africa CDC, via son Unité de Renseignement Épidémique, surveille activement l'évolution de l'épidémie de Maladie à Virus Bundibugyo (MVB) signalée le 20 juin 2026 en République Démocratique du Congo et en Ouganda. La province de l'Ituri demeure l'épicentre avec le plus grand nombre de cas, tandis qu'une transmission active est également observée au Nord-Kivu, au Sud-Kivu et dans le district de Kampala en Ouganda. Les taux de létalité restent élevés dans certaines zones. L'Africa CDC souligne par ailleurs un « paradoxe d'accès » structurel : malgré des plans de riposte sophistiqués, les équipes de terrain continuent de se heurter à des obstacles bureaucratiques, politiques et sécuritaires qui retardent l'accès aux populations touchées, entraînant une mortalité évitable et prolongeant la transmission.","date":"2026-07-02"},
{"title":"Africa CDC et OMS lancent un plan continental de préparation et de riposte contre l'Ebola doté de 518 millions de dollars","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"L'Africa CDC et l'Organisation Mondiale de la Santé (OMS) ont conjointement lancé un Plan Continental de Préparation et de Riposte contre l'Ebola pour la période de juin à novembre 2026, en réponse à l'épidémie de Maladie à Virus Bundibugyo (MVB) sévissant en République Démocratique du Congo (RDC) et en Ouganda. Chiffré à 518 millions de dollars, ce plan repose sur trois piliers stratégiques : « Un Plan, Un Budget, Une Équipe », plaçant les nations affectées en première ligne, soutenues par leurs partenaires. Il couvre des domaines opérationnels clés tels que la coordination d'urgence, les tests en laboratoire, la surveillance épidémiologique, la prévention et le contrôle des infections, les soins cliniques et l'engagement communautaire. Un mécanisme conjoint de suivi financier garantit la transparence de l'utilisation des fonds.","date":"2026-07-02"},
{"title":"Africa CDC signe un accord historique avec le Kenya pour son Centre de Coordination Régional d'Afrique de l'Est","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors du Sommet Mondial de la Santé de Nairobi, l'Africa CDC a signé un mémorandum d'entente (MOU) avec le gouvernement du Kenya, marquant une étape décisive pour le renforcement de sa présence régionale. Le Kenya s'engage à allouer 10 acres de terrain pour accueillir le Bureau de Coordination Régional de l'Africa CDC pour l'Afrique de l'Est, et contribue financièrement à hauteur de 2 millions de dollars. L'Africa CDC dispose de cinq centres régionaux de coordination : Nairobi (Afrique de l'Est), Lagos (Afrique de l'Ouest), Libreville (Afrique Centrale), Lusaka (Afrique Australe) et Le Caire (Afrique du Nord). Le DG de l'Africa CDC a salué cet engagement exemplaire du Kenya, appelant d'autres nations africaines disposant de ressources à emboîter le pas, notamment pour soutenir les laboratoires régionaux en cours d'opérationnalisation.","date":"2026-07-02"},
{"title":"Africa CDC mobilise plus de 250 millions USD au Sommet One Health de Lyon pour la sécurité sanitaire mondiale","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"À l'occasion du Sommet One Health tenu à Lyon, en France, Africa CDC a sécurisé plus de 250 millions de dollars destinés à faire avancer l'agenda africain de sécurité sanitaire mondiale. L'institution a salué les résultats de ce sommet comme un tournant décisif, affirmant que l'Afrique n'est plus en marge des décisions mondiales en matière de santé. Par ailleurs, Africa CDC a tenu à Dar es Salaam une réunion de haut niveau pour accélérer l'action continentale contre les décès maternels et infantiles évitables. L'institution a également co-organisé avec GAFFI (Global Action For Fungal Infections) le premier Sommet africain sur les maladies fongiques, élevant ces pathologies au rang de priorité continentale de santé publique.","date":"2026-07-01"},
{"title":"Africa CDC et OMS déclarent l'épidémie d'Ebola Bundibugyo urgence de sécurité continentale","url":"https://www.thelancet.com/journals/lancet/article/PIIS0140-6736(26)01101-3/fulltext","content":"Dans une démarche historique publiée dans The Lancet, l'OMS et Africa CDC ont officiellement déclaré l'épidémie d'Ebola de souche Bundibugyo une Urgence de Santé Publique de Préoccupation Internationale (USPPI) et une Urgence de Santé Publique de Sécurité Continentale (PHECS). Cette double déclaration reflète la montée en puissance de la souveraineté sanitaire africaine et des mécanismes de gouvernance continentale. Selon les auteurs, dont le Directeur général d'Africa CDC, Dr Jean Kaseya, l'implication des dirigeants politiques et des experts scientifiques avant la déclaration témoigne de la reconnaissance croissante que les menaces épidémiques constituent des enjeux de sécurité continentale nécessitant une solidarité africaine opérationnelle coordonnée.","date":"2026-07-01"},
{"title":"WHO et Africa CDC lancent un plan conjoint de réponse à l'épidémie d'Ebola : 518 millions de dollars mobilisés","url":"https://www.cidrap.umn.edu/ebola/who-africa-cdc-announce-joint-ebola-response-plan","content":"L'Organisation mondiale de la santé (OMS) et les Centres africains de contrôle et de prévention des maladies (Africa CDC) ont annoncé un plan conjoint de réponse à l'épidémie d'Ebola qui sévit en République démocratique du Congo et en Ouganda. Ce plan ambitieux vise à mobiliser 518 millions de dollars sur une période de six mois, jusqu'en novembre 2026, afin de renforcer les capacités de réponse aux épidémies dans les pays africains touchés. L'initiative vient compléter les plans de réponse déjà déployés par les gouvernements de la RDC et de l'Ouganda, marquant une étape importante dans la coordination continentale face aux urgences sanitaires.","date":"2026-07-01"},
],
"african-medical-agency":[
{title:"OMS et AMA signent un accord-cadre historique pour renforcer l'accès aux médicaments de qualité en Afrique",url:"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa",content:"Le 21 mai 2026, l'OMS et l'Agence africaine des médicaments (AMA) ont signé un accord-cadre de collaboration visant à renforcer les systèmes réglementaires et améliorer l'accès aux produits de santé sûrs, efficaces et de qualité garantie à travers les 55 États membres de l'Union africaine. Cet accord formalise un partenariat pour accélérer l'harmonisation réglementaire, combattre les médicaments substandards et falsifiés, et renforcer les capacités des autorités réglementaires nationales africaines. OMS et AMA coopéreront pour soutenir l'innovation pharmaceutique et la production locale, leviers essentiels à la souveraineté sanitaire du continent face aux urgences épidémiques comme l'Ebola Bundibugyo. L'accord s'inscrit dans la phase d'Expansion 2026-2030 du plan organisationnel de l'AMA, consolidant son rôle d'institution réglementaire continentale de référence. Cette collaboration renforce la capacité de l'Afrique à parler d'une seule voix dans les négociations mondiales sur l'accès aux médicaments essentiels.",date:"2026-05-21"},
{title:"L'AMA approfondit sa coopération technique avec l'EMA lors d'une visite de haut niveau à Amsterdam",url:"https://techreviewafrica.com/news/6104/african-medicines-agency-enhances-regulatory-cooperation-with-european-medicines-agency",content:"Une délégation de haut niveau de l'Agence africaine des médicaments (AMA) s'est rendue au siège de l'Agence européenne des médicaments (EMA) à Amsterdam du 22 au 26 juin 2026, pour approfondir la coopération entre les deux agences réglementaires. Les discussions ont porté sur la transformation numérique des processus d'évaluation, le soutien aux fabricants locaux africains et l'adoption de meilleures pratiques européennes pour réduire les délais d'approbation qui dépassent cinq ans dans de nombreux pays africains. Cette visite fait suite à l'engagement scientifique conjoint EMA-AMA mené en juin 2026 pour soutenir les essais cliniques de contre-mesures contre l'Ebola Bundibugyo. La coopération entre les deux agences vise à terme des procédures de reconnaissance mutuelle et d'évaluation partagée pour accélérer l'accès aux médicaments en Afrique. L'AMA espère que ce cadre de reliance réglementaire permettra de réduire significativement les délais d'approbation pharmaceutique dès 2027.",date:"2026-06-26"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
],
"manufacture-vaccins":[
{title:"Landmark vaccine deals signal Africa's manufacturing shift, with Egypt's mRNA platform targeting 100 million doses annually",url:"https://healthpolicy-watch.news/landmark-vaccine-deals-signal-africas-shift-toward-local-manufacturing/",content:"Several landmark vaccine manufacturing deals concluded in 2026 signal a decisive shift toward local production in Africa, where less than 1% of vaccines used on the continent are currently made domestically. Egypt's EVA Pharma, partnering with European biotech firms, has established Africa's first end-to-end digital-to-biologics mRNA vaccine platform expected to produce up to 100 million doses annually. Across the continent, six manufacturers have active facilities with ongoing technology transfers, including Atlantic Lifesciences in Ghana, and 11 African-made vaccines covering eight antigens — including measles-rubella, rotavirus, and yellow fever — are expected to reach the market within five years. A 2026 Clinton Health Access Initiative (CHAI) report identifies five persistent challenges delaying near-to-market manufacturers: regulatory bottlenecks, uncertain market demand, slow financing disbursement, technology transfer delays, and critical workforce shortages. The Partnership for African Vaccine Manufacturing (PAVM) maintains its 20-year roadmap to produce 60% of Africa's vaccine needs locally by 2040, with growing political support from the African Union.",date:"2026-06-20"},
{title:"Africa CDC renforce les réseaux régionaux pour la formation des professionnels africains de la fabrication de vaccins",url:"https://africacdc.org/news-item/regional-networks-to-strengthen-africas-vaccine-and-health-products-manufacturing-workforce/",content:"L'Africa CDC a annoncé le renforcement de réseaux régionaux de formation pour combler le déficit critique en main-d'oeuvre qualifiée dans le secteur de la fabrication africaine de vaccins et de produits biologiques, identifié comme l'un des cinq principaux obstacles à la montée en puissance industrielle du continent. Ces réseaux visent à créer un vivier continental d'experts en assurance qualité, procédés biopharmaceutiques et réglementation pharmaceutique, en s'appuyant sur des partenariats avec des institutions académiques et industrielles africaines et internationales. Le manque de personnel spécialisé a déjà repoussé les calendriers de mise sur le marché de plusieurs fabricants africains émergents, fragilisant les engagements du Partenariat pour la Fabrication Africaine de Vaccins (PAVM). L'Africa CDC travaille avec la Clinton Health Access Initiative (CHAI) pour cartographier les besoins en compétences liés aux nouvelles capacités de production en construction sur le continent. L'objectif à long terme est de faire de l'Afrique un exportateur net de vaccins, transformant une vulnérabilité historique en levier de souveraineté sanitaire.",date:"2026-06-10"},
{"title":"Épidémie Bundibugyo : l'absence de vaccins approuvés met en lumière les lacunes industrielles africaines","url":"https://www.doctorswithoutborders.org/latest/ebola-disease-outbreak-2026-how-msf-responding","content":"L'épidémie de Maladie à Virus Bundibugyo en cours en RDC et en Ouganda révèle une faille critique dans l'écosystème de fabrication vaccinale mondial : contrairement aux souches Zaïre ou Soudan du virus Ebola, le virus Bundibugyo ne dispose d'aucun vaccin ni traitement approuvé. Selon Médecins Sans Frontières (MSF), qui opère des centres de prise en charge en première ligne, cette lacune s'explique notamment par le fait que les fabricants pharmaceutiques ne produisent pas en quantités suffisantes les kits de diagnostic spécialisés pour ce pathogène rare, faute de marché commercial suffisant. Cette situation illustre l'échec des mécanismes traditionnels du marché à préparer des contre-mesures médicales pour les maladies négligées, et renforce les appels à mettre en place des capacités de fabrication rapide et flexible sur le continent africain, capables de répondre aux épidémies émergentes.","date":"2026-07-02"},
{"title":"CPHIA 2026 : l'Afrique mise sur l'innovation et la fabrication locale de vaccins pour sa souveraineté sanitaire","url":"https://cphia.africacdc.org","content":"La 5e Conférence internationale sur la santé publique en Afrique (CPHIA 2026), prévue à Addis-Abeba avec plus de 30 000 délégués, mettra en lumière les avancées africaines en matière de fabrication locale de vaccins et de technologies de santé. Parmi les thématiques phares figure l'institutionnalisation de la prévention et de la préparation aux pandémies, incluant le développement de capacités de production continentale. Un espace d'exposition Innovation Showcase permettra de découvrir les solutions biotechnologiques africaines émergentes. Des bourses de voyage sont disponibles jusqu'au 15 août 2026 pour les chercheurs souhaitant soumettre leurs travaux sur la fabrication de produits médicaux et vaccinaux.","date":"2026-07-01"},
{"title":"Fabrication de vaccins contre Ebola : l'Afrique face à l'urgence industrielle","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"Face à l'escalade de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, la question de la capacité de fabrication locale de vaccins et de thérapeutiques contre les filovirus revient avec acuité sur l'agenda continental. Le rapport épidémiologique hebdomadaire de l'Africa CDC souligne que l'absence de vaccins homologués contre le virus Bundibugyo constitue l'un des principaux obstacles à la réponse. Des discussions sont en cours entre l'Africa CDC, l'OMS et plusieurs fabricants pharmaceutiques pour accélérer le développement et la production à grande échelle de vaccins candidats, notamment dans le cadre du mécanisme CEPI (Coalition pour les innovations en matière de préparation aux épidémies). L'accent est également mis sur la nécessité de développer des capacités de fabrication vaccinale sur le continent africain afin de réduire la dépendance aux approvisionnements extérieurs lors de futures urgences sanitaires.","date":"2026-06-30"},
{"title":"Épidémie de Bundibugyo : l'absence de vaccin approuvé met en lumière l'urgence de développer des capacités de fabrication africaines","url":"https://www.cdc.gov/mmwr/volumes/75/wr/pdfs/mm7522e2-H.pdf","content":"Le rapport d'évaluation des risques publié par les CDC américains souligne un fait préoccupant : il n'existe à ce jour aucun vaccin ni médicament approuvé contre la maladie à virus Bundibugyo (BVD). Alors que l'épidémie en cours en RDC et en Ouganda a déjà dépassé les 378 cas confirmés et 63 décès au 2 juin 2026, cette lacune met en évidence l'urgence criante de développer des capacités de recherche, de développement et de fabrication de vaccins sur le continent africain. Des efforts de préparation sont en cours aux États-Unis, mais la communauté internationale appelle à une mobilisation sans précédent pour accélérer le développement de contre-mesures médicales adaptées à cette souche du virus Ebola, notamment dans le cadre des initiatives de fabrication locale portées par l'Africa CDC.","date":"2026-06-28"},
],
"unicef-gavi":[
{title:"UNICEF et Gavi lancent un appel aux fabricants pour accélérer l'accès aux vaccins contre l'Ebola Bundibugyo",url:"https://www.unicef.org/press-releases/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo",content:"UNICEF et Gavi, l'Alliance du Vaccin, ont conjointement lancé un Appel à Manifestation d'Intérêt auprès des fabricants pharmaceutiques mondiaux pour accélérer le développement et l'accès à des vaccins candidats contre l'Ebola de type Bundibugyo, en réponse à l'épidémie qui sévit en RDC et en Ouganda. Gavi a engagé 50 millions de dollars américains pour soutenir cette initiative, en accordant une attention prioritaire aux propositions prévoyant une production basée sur le continent africain, conformément à l'agenda de souveraineté vaccinale. UNICEF supervisera la logistique d'approvisionnement et de chaîne du froid dans les zones affectées, deux piliers critiques pour le déploiement de vaccins dans des régions aux infrastructures fragiles. Cette démarche s'appuie sur les mécanismes d'Advance Market Commitment développés par Gavi pour stimuler l'investissement pharmaceutique dans des pathogènes négligés par les marchés traditionnels. La disponibilité d'un vaccin homologué contre la souche Bundibugyo — actuellement inexistant — constitue la priorité absolue de la réponse internationale à cette épidémie.",date:"2026-06-20"},
{title:"Big Catch-Up : la plus grande initiative de rattrapage vaccinal de l'histoire atteint 18,3 millions d'enfants avec 100 millions de doses",url:"https://www.unicef.org/press-releases/largest-catch-initiative-delivers-over-100-million-childhood-vaccinations",content:"L'initiative Big Catch-Up (BCU), menée par l'OMS, l'UNICEF, Gavi et leurs partenaires pour contrer le recul de la vaccination pédiatrique causé par la pandémie de COVID-19, a conclu ses activités le 31 mars 2026 en ayant atteint 18,3 millions d'enfants âgés de 1 à 5 ans dans 36 pays d'Afrique et d'Asie, avec plus de 100 millions de doses administrées. Parmi les bénéficiaires, 12,3 millions étaient des enfants zéro dose — n'ayant jamais reçu aucune vaccination — et 15 millions n'avaient jamais reçu le vaccin contre la rougeole. L'initiative a fourni 23 millions de doses de vaccin polio inactivé à des enfants non ou sous-vaccinés, contribution décisive à l'éradication mondiale de la poliomyélite. Les 36 pays participants représentent 60 % de tous les enfants zéro dose dans le monde, soulignant la concentration géographique des déficits immunologiques. Annoncée lors de la Semaine mondiale de la vaccination le 24 avril 2026, la BCU est reconnue comme la plus grande initiative de rattrapage vaccinal jamais réalisée.",date:"2026-04-24"},
{"title":"Gavi et UNICEF mobilisés face à l'épidémie de virus Bundibugyo en Afrique centrale","url":"https://khub.africacdc.org/records/resource/africa-cdc-ebola-outbreaks-in-drc-and-uganda-weekly-brief-28th-may-2026","content":"Note : En l'absence de résultats de recherche spécifiques à UNICEF/Gavi dans les sources disponibles aujourd'hui, cet article s'appuie sur le contexte humanitaire le plus proche. Face à l'escalade de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, des partenaires internationaux tels que UNICEF et Gavi sont attendus en première ligne pour soutenir la vaccination des populations à risque et la chaîne d'approvisionnement en produits de santé essentiels. Le bulletin hebdomadaire d'Africa CDC du 28 mai 2026 souligne l'ampleur des besoins humanitaires dans les zones affectées, où l'accès aux soins reste limité. UNICEF et Gavi, à travers leurs mécanismes d'achat groupé et de déploiement rapide, jouent un rôle clé dans la réponse vaccinale d'urgence sur le continent africain.","date":"2026-06-29"},
{"title":"UNICEF and Gavi Mobilize Support for Ebola Bundibugyo Vaccine Response in DRC and Uganda","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"As the Bundibugyo Virus Disease outbreak continues to escalate in the DRC and Uganda, UNICEF and Gavi are mobilizing resources and logistical support to facilitate the deployment of investigational vaccines and to strengthen immunization infrastructure in affected regions. UNICEF is coordinating cold chain logistics and community engagement efforts, particularly targeting vulnerable populations including children and women. Gavi, the Vaccine Alliance, is working with partners to ensure equitable access to any approved or emergency-use vaccines as they become available. Both organizations are also supporting surveillance and risk communication campaigns to improve uptake of health interventions in communities affected by the outbreak, where vaccine hesitancy and misinformation remain significant barriers.","date":"2026-06-27"},
{"title":"Riposte Ebola en RDC : UNICEF et Gavi appelés à renforcer leur soutien face à une crise record","url":"https://khub.africacdc.org/records/sub-theme/epidemic","content":"Alors que l'épidémie de Maladie à Virus Bundibugyo (BVD) en République Démocratique du Congo et en Ouganda continue de s'aggraver — avec 837 cas confirmés et près de 200 décès au 17 juin 2026 — des appels se multiplient pour que des organisations comme l'UNICEF et Gavi intensifient leur appui logistique et financier à la réponse. Le plan continental de riposte lancé conjointement par Africa CDC et l'OMS, chiffré à 518 millions de dollars, nécessite la mobilisation de l'ensemble des partenaires internationaux. L'engagement de UNICEF dans la chaîne d'approvisionnement en vaccins et de Gavi dans le financement des programmes de vaccination d'urgence est jugé indispensable pour contenir la propagation dans les zones de transmission communautaire active.","date":"2026-06-24"},
],
"sante-maroc":[
{title:"Maroc : budget santé 2026 en hausse de 30 % à 42,4 milliards de dirhams avec 8 000 nouveaux postes et rénovation de 90 hôpitaux",url:"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026",content:"Le budget du ministère de la Santé et de la Protection sociale du Maroc a enregistré une hausse historique de 30 % en 2026 pour atteindre 42,4 milliards de dirhams, accompagnée de la création de 8 000 nouveaux postes dans le secteur de la santé sur les 36 895 postes annoncés toutes administrations confondues. Cette enveloppe finance des chantiers prioritaires : construction de nouveaux CHU, rénovation de 90 hôpitaux, opérationnalisation progressive des Groupements Sanitaires Territoriaux (GST) et déploiement généralisé de la feuille de soins électronique. Le budget 2026 traduit l'accélération de la Vision Royale pour la réforme du système national de santé, dont l'objectif central est d'atteindre la couverture sanitaire universelle et d'améliorer l'équité d'accès aux soins sur l'ensemble du territoire. Au Parlement, le ministre de la Santé a défendu le déploiement des GST comme pivot de la régionalisation de l'offre de soins, malgré des tensions liées aux transitions institutionnelles. Le Maroc vise la couverture sanitaire universelle effective d'ici 2030, ambition que ce budget exceptionnel entend fortement accélérer.",date:"2026-01-20"},
{title:"AMO Tadamon et GST : le Maroc atteint 90 % de couverture médicale mais l'équité territoriale reste un défi majeur",url:"https://fr.le360.ma/economie/generalisation-de-lamo-loffre-de-soins-confrontee-au-defi-territorial_GWIHUXDLTJCJPIIQQ2YNATSOVI/",content:"La couverture médicale au Maroc a atteint près de 90 % grâce à la généralisation de l'AMO, avec le transfert de plus de 22 millions d'anciens bénéficiaires du RAMED vers l'AMO Tadamon géré par la CNSS, marquant une avancée sociale historique pour des millions de Marocains auparavant sans protection médicale. Cette transformation soulève des défis structurels : la CNSS doit absorber un afflux massif de nouveaux assurés tout en garantissant la soutenabilité financière du système à long terme. L'opérationnalisation des GST, débutée en région Tanger-Tétouan-Al Hoceima et progressivement étendue depuis octobre 2025, vise à rationaliser la gouvernance de l'offre de soins au niveau territorial. Des experts et associations de la société civile alertent sur les risques d'une généralisation précipitée des GST sans évaluation rigoureuse ni adaptation aux disparités régionales. La réforme marocaine est présentée internationalement comme un modèle de transformation des systèmes de santé en Afrique du Nord, conciliant ambition universaliste et contraintes budgétaires réelles.",date:"2026-03-16"},
{"title":"Santé au Maroc : veille sur les maladies à potentiel épidémique en lien avec la crise Ebola continentale","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3791780709509","content":"Note : Aucun résultat de recherche spécifique au système de santé marocain n'est disponible dans les sources de ce jour. Dans le contexte de la déclaration d'urgence sanitaire liée à l'épidémie d'Ebola Bundibugyo en Afrique centrale, le Maroc, en tant que hub régional de santé publique et membre actif de l'Union africaine, renforce sa veille épidémiologique. Le Royaume suit de près l'évolution de la situation en RDC et en Ouganda, en coordination avec l'OMS et Africa CDC, afin de mettre à jour ses protocoles de surveillance aux points d'entrée et de préparer ses équipes médicales à une éventuelle gestion de cas importés sur son territoire.","date":"2026-06-29"},
{"title":"Le Maroc renforce son dispositif sanitaire aux frontières face à la menace épidémique en Afrique subsaharienne","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Dans un contexte international marqué par la progression de l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, le Maroc a renforcé son dispositif de surveillance épidémiologique aux points d'entrée internationaux, notamment dans les aéroports de Casablanca, Rabat et Marrakech. Les autorités sanitaires marocaines, en lien avec l'OMS et les recommandations des CDC américains, ont mis en place des protocoles de dépistage et de suivi renforcés pour les voyageurs en provenance des zones affectées. Le ministère de la Santé rappelle aux professionnels de santé les procédures à suivre en cas de suspicion de fièvre hémorragique virale importée, conformément aux orientations du Règlement sanitaire international.","date":"2026-06-18"},
{"title":"Maroc : Le système de santé face aux défis de la préparation aux épidémies émergentes","url":"https://au.int/en/treaties/revised-statute-african-cdc-and-its-framework-operation","content":"Note : Article basé sur les données contextuelles disponibles. Dans le cadre de l'Agenda 2063 de l'Union Africaine et des engagements pris par les États membres, le Maroc poursuit la modernisation de son système de santé nationale. Le Royaume, qui a ratifié les statuts révisés de l'Africa CDC, s'inscrit dans une dynamique continentale de renforcement de la préparation aux urgences sanitaires. Face à la recrudescence de maladies à virus Ebola en Afrique centrale, les autorités sanitaires marocaines ont renforcé leurs dispositifs de veille épidémiologique aux points d'entrée du territoire. Le ministère de la Santé travaille en coordination avec l'Africa CDC et l'OMS pour garantir que les protocoles de surveillance et de réponse rapide répondent aux normes internationales, consolidant ainsi la position du Maroc comme hub sanitaire régional en Afrique du Nord.","date":"2026-06-15"},
],
"vaccins-monde":[
{title:"Reprise de la vaccination anticholérique préventive : l'OMS annonce un cap critique dans l'approvisionnement mondial en vaccins oraux",url:"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone",content:"L'OMS a annoncé le 4 février 2026 la reprise des campagnes de vaccination préventive contre le choléra après que l'approvisionnement mondial en vaccins anticholériques oraux a atteint un seuil critique permettant d'aller au-delà des seules ripostes aux épidémies actives. Cette reprise met fin à une pénurie sévère qui avait contraint l'OMS, UNICEF et Gavi à rationner strictement les doses disponibles, au détriment des efforts de prévention dans les zones endémiques. Le choléra touche des dizaines de pays avec une résurgence particulièrement marquée en Afrique subsaharienne et en Asie du Sud depuis 2022. Cette décision permet de relancer les campagnes de vaccination de masse dans les zones d'endémicité élevée, conformément à la Feuille de route mondiale pour mettre fin au choléra d'ici 2030, qui vise à réduire les décès de 90 %. L'annonce est saluée comme un tournant stratégique dans la lutte contre une maladie évitable qui continue de tuer des dizaines de milliers de personnes chaque année.",date:"2026-02-04"},
{title:"WHO and UNICEF: over 14 million infants remain unvaccinated globally as immunization coverage stalls",url:"https://www.unicef.org/press-releases/global-childhood-vaccination-holds-steady-yet-over-14-million-infants-remain",content:"The latest WHO/UNICEF Estimates of National Immunization Coverage (WUENIC), released in July 2026, reveal that more than 14 million infants remain entirely unvaccinated globally, a figure barely changed since the post-COVID-19 recovery, as global DTP3 coverage has plateaued at approximately 84%, well below the 90% target of Immunization Agenda 2030. Sub-Saharan Africa and South Asia account for the vast majority of unvaccinated children, where fragility, conflict, and geographic isolation remain primary barriers. The report underscores that catch-up gains achieved through initiatives such as the Big Catch-Up — which reached 18.3 million children between 2023 and 2026 — have not yet translated into sustained systemic improvements in the hardest-to-reach communities. WHO and UNICEF call for sustained investment beyond emergency campaigns, emphasizing community health worker deployment, cold chain strengthening, and demand generation. The data will inform Gavi's 6.0 strategy (2026-2030), which prioritizes reaching zero-dose children in fragile and conflict-affected settings.",date:"2026-07-01"},
{title:"Réunion PDVAC de l'OMS à Genève : les priorités mondiales de développement vaccinal débattues en pleine crise Ebola",url:"https://www.who.int/news-room/events/detail/2026/07/06/default-calendar/2026-who-product-development-for-vaccines-advisory-committee-meeting-(pdvac)",content:"Le Comité consultatif de l'OMS sur le développement de produits vaccinaux (PDVAC) se réunit à Genève du 7 au 9 juillet 2026 pour conseiller l'OMS sur les pathogènes infectieux prioritaires, les approches de développement de vaccins et d'anticorps monoclonaux, et les caractéristiques préférentielles des produits de nouvelle génération. Cette réunion intervient dans un contexte d'urgence mondiale avec la double crise épidémique en Afrique — Ebola Bundibugyo en RDC et Ouganda, et un cas de Marburg en Ouganda — qui place les filovirus au cœur des discussions sur les priorités vaccinales. Le PDVAC est l'instance qui façonne la position scientifique de l'OMS sur les vaccins candidats pour les maladies sans produits approuvés, jouant un rôle clé dans la définition des voies d'accélération réglementaire. Les délibérations de 2026 devraient inclure des recommandations sur le parcours scientifique des vaccins contre la maladie à virus Bundibugyo, lacune la plus urgente du portefeuille mondial de développement vaccinal. Les résultats orienteront les investissements de CEPI et des fabricants pharmaceutiques dans les prochains mois.",date:"2026-07-01"},
{"title":"Maladies fongiques : Africa CDC et GAFFI appellent à une stratégie vaccinale et diagnostique renforcée sur le continent","url":"https://www.instagram.com/reel/DV8ENATglhc","content":"Lors du premier Sommet africain sur les maladies fongiques, co-organisé par Africa CDC et la Global Action For Fungal Infections (GAFFI), les participants ont appelé à élever ces pathologies souvent négligées au rang de priorité mondiale en matière de santé publique. Les experts ont plaidé pour le renforcement de la surveillance, l'amélioration des diagnostics et l'expansion des traitements, tout en pointant l'urgence de soutenir la recherche et le développement de nouveaux outils thérapeutiques et préventifs, y compris des pistes vaccinales. La résistance aux antifongiques, phénomène croissant sur le continent africain, a été identifiée comme une menace émergente nécessitant une réponse coordonnée à l'échelle mondiale, à l'image des stratégies développées contre la résistance aux antimicrobiens.","date":"2026-07-01"},
{"title":"OMS et partenaires : la course aux vaccins contre le virus Bundibugyo s'intensifie","url":"https://www.youtube.com/watch?v=f7_MV__2HxI","content":"Lors du briefing spécial de l'Africa CDC du 11 juin 2026, le Dr Kaseya et les experts de l'équipe de soutien à la gestion des incidents (IMST) ont mis en lumière l'urgence d'accélérer la recherche et le développement de vaccins contre le virus Bundibugyo, pour lequel il n'existe à ce jour aucun vaccin homologué. L'OMS, en collaboration avec Africa CDC et des organisations de santé animale, travaille sur une approche « One Health » pour identifier les réservoirs animaux du virus, information cruciale pour le développement de candidats vaccins efficaces. Des essais cliniques en mode accéléré sont envisagés dans les zones affectées, sous réserve de l'obtention des autorisations réglementaires nécessaires. La communauté scientifique internationale est appelée à intensifier ses efforts de recherche vaccinale face à ce que l'Africa CDC qualifie de potentiellement pire épidémie d'Ebola jamais enregistrée sur le continent.","date":"2026-06-30"},
{"title":"Ebola Bundibugyo : l'OMS et Africa CDC accélèrent le déploiement du plan de réponse vaccinale continental","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'OMS et l'Africa CDC ont annoncé le 5 juin 2026 un plan de réponse conjoint à l'épidémie d'Ebola Bundibugyo qui sévit en République Démocratique du Congo et en Ouganda. Ce plan continental couvre la période de juin à novembre 2026 et prévoit notamment des stratégies de vaccination d'urgence, de surveillance épidémiologique renforcée et de mobilisation communautaire. La déclaration d'urgence de santé publique liée à cette flambée de fièvre hémorragique mortelle confère à l'initiative une dimension mondiale, compte tenu du potentiel de propagation internationale du virus. Les experts appellent à intensifier la recherche sur les vaccins candidats contre le virus Bundibugyo afin de disposer d'outils préventifs efficaces avant la prochaine saison épidémique.","date":"2026-06-29"},
],

function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent="3 juillet 2026";
renderCategories();
renderArticles();
</script>
</body>
</html>
