var articlesData={
"african-cdc":[
{"title":"Africa CDC et l'OMS annoncent un plan conjoint de réponse à l'épidémie d'Ebola en RDC et en Ouganda","url":"https://www.upi.com/Top_News/World-News/2026/06/05/congo-ebola-outbreak-who-battle-plan/3751780709509","content":"L'Africa Centers for Disease Control and Prevention (Africa CDC) et l'Organisation Mondiale de la Santé (OMS) ont annoncé le 5 juin 2026 un plan conjoint de lutte contre l'épidémie d'Ebola qui se propage actuellement en République Démocratique du Congo et en Ouganda. Ce plan coordonné vise à renforcer la surveillance, la détection des cas, le traçage des contacts et les mesures de prévention et de contrôle des infections aux points d'entrée et de sortie des pays touchés. Les deux institutions mobilisent une équipe de gestion des incidents (IMST) au niveau continental pour coordonner la réponse sur le terrain.","date":"2026-06-13"},
{"title":"Africa CDC et l'OMS publient des orientations contre les restrictions de voyage liées à l'épidémie de virus Ebola Bundibugyo","url":"https://khub.africacdc.org/records/resource/interim-guidance-on-blanket-travel-restrictions-following-the-bundibugyo-ebola-virus-disease-outbreak","content":"Africa CDC a publié le 8 juin 2026 des orientations intérimaires sur les restrictions de voyage dans le contexte de l'épidémie de virus Ebola Bundibugyo sévissant dans certaines provinces de la République Démocratique du Congo et en Ouganda. Le document précise que les interdictions de voyage généralisées ne sont pas soutenues par des preuves scientifiques et pourraient s'avérer contre-productives. Les cas confirmés restent confinés aux provinces d'Ituri, du Sud-Kivu et du Nord-Kivu en RDC, ainsi qu'à Kampala. Africa CDC souligne que la transmission du virus se fait exclusivement par contact direct avec des fluides corporels infectés, et non par voie aérienne, maintenant ainsi le risque de propagation internationale à un niveau faible sous réserve de mesures de surveillance adéquates.","date":"2026-06-13"},
{"title":"Africa CDC Secures Over $250 Million to Advance Africa's Global Health Security at Lyon One Health Summit","url":"https://reliefweb.int/report/world/africa-cdc-secures-over-us250-million-advance-africas-global-health-security-agenda-lyon-one-health-summit-lyon-france","content":"Africa CDC a annoncé avoir sécurisé plus de 250 millions de dollars lors du Sommet One Health de Lyon, en France, marquant un tournant décisif dans la place de l'Afrique au sein de l'architecture mondiale de la santé. L'institution affirme que l'Afrique n'est plus en marge des décisions sanitaires mondiales, mais en est désormais un acteur central. Africa CDC a réaffirmé un principe clair : les partenariats doivent s'aligner sur les priorités, les systèmes et le leadership africains. Ces engagements seront discutés avec les dirigeants africains lors de prochaines réunions de haut niveau, notamment le Comité ministériel africain sur la réforme de l'architecture mondiale de la santé.","date":"2026-06-13"},
{"title":"Africa CDC annonce la promotion 2026 des Jeunes Champions de la Santé Numérique","url":"https://youth.africacdc.org","content":"Addis-Abeba, 23 mars 2026 — Africa CDC a annoncé la nouvelle promotion 2026 de ses Jeunes Champions de la Santé Numérique, dans le cadre du Réseau des Jeunes pour la Santé Numérique (YiDHN), une initiative stratégique de la Division Jeunesse d'Africa CDC. Ce programme vise à investir dans la prochaine génération de leaders en santé publique à travers le continent africain. Les jeunes professionnels sélectionnés bénéficieront de formations, de mentorat et d'opportunités de mise en réseau pour renforcer leur rôle dans la gouvernance de la santé mondiale. Africa CDC réaffirme ainsi son engagement à inclure les jeunes dans les décisions et réponses sanitaires continentales.","date":"2026-06-12"},
{"title":"Africa CDC déploie un outil de surveillance numérique pour renforcer la réponse aux épidémies, avec un focus sur Ebola","url":"https://dhis2.org/events/africa-cdc-toolkit-ebola","content":"Africa CDC, en partenariat avec HISP UiO et les groupes HISP en Afrique, lance un webinaire le 8 juin 2026 pour présenter son Toolkit de surveillance et de réponse aux épidémies basé sur la plateforme DHIS2. Cet outil intégré couvre la notification des cas, l'investigation et le traçage des contacts, avec des configurations initiales pour le Mpox, le choléra et Ebola. Le toolkit comprend un guide d'implémentation, un guide de conception des systèmes, un dictionnaire de données et des outils d'analyse des lacunes. Cette initiative s'inscrit dans le cadre d'un mémorandum d'entente entre Africa CDC et le Royaume de Norvège visant à renforcer la santé publique sur le continent africain.","date":"2026-06-12"},
{"title":"Africa CDC et WHO lancent un plan continental de préparation face à l'épidémie de virus Ebola Bundibugyo","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"Africa CDC et l'Organisation Mondiale de la Santé ont officiellement déclaré l'épidémie de maladie à virus Ebola Bundibugyo (BVD) de 2026 une urgence de santé publique de portée internationale. L'épidémie, qui sévit principalement en République Démocratique du Congo et en Ouganda, continue de poser des défis sanitaires majeurs. Un plan continental de préparation et de réponse, couvrant la période juin-novembre 2026, a été élaboré conjointement par Africa CDC et l'OMS, et présenté lors d'une conférence de presse tenue le 5 juin 2026. Ce plan vise à coordonner la surveillance épidémiologique, la gestion des cas et le déploiement de ressources à travers les pays membres de l'Union Africaine.","date":"2026-06-12"},
],
"african-medical-agency":[
{"title":"EMA et AMA : Premier engagement scientifique conjoint pour soutenir la réponse à l'épidémie d'Ebola","url":"https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/african-medicines-agency-african-union","content":"En juin 2026, l'Agence Européenne des Médicaments (EMA) et l'Agence Africaine des Médicaments (AMA) ont tenu leur premier engagement scientifique conjoint impliquant également d'autres partenaires africains, dans le but de soutenir les essais cliniques et autres contre-mesures médicales face à l'épidémie d'Ebola. Cette collaboration marque une étape importante dans le renforcement des capacités réglementaires africaines et la coopération internationale pour accélérer l'accès aux traitements et vaccins sur le continent africain lors de crises sanitaires.","date":"2026-06-13"},
{"title":"African Medicines Agency: advancing continental drug regulation amid health emergencies","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"As the African continent faces a growing Ebola crisis, the African Medicines Agency (AMA) is under increasing pressure to fast-track regulatory frameworks for the evaluation and approval of candidate vaccines and therapeutics. Three vaccines targeting the Bundibugyo strain are currently under accelerated research and development, and continental regulators will play a pivotal role in enabling clinical trials and emergency use authorisations. The AMA, tasked with harmonising medicine regulation across African Union member states, is expected to coordinate with Africa CDC and WHO to streamline the regulatory pathway for these experimental vaccines. This development underscores the strategic importance of a functional and empowered AMA in ensuring that Africa can respond rapidly and sovereignly to future health emergencies without depending solely on external regulatory authorities.","date":"2026-06-11"},
{"title":"L'Agence Africaine du Médicament : un pilier en construction pour la souveraineté sanitaire du continent","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Alors que l'Afrique renforce ses institutions de santé publique face aux épidémies récurrentes, l'Agence Africaine du Médicament (AMA) demeure un chantier stratégique prioritaire de l'Union Africaine. En parallèle des efforts déployés par Africa CDC pour contenir l'épidémie d'Ebola en RDC et en Ouganda, l'AMA travaille à l'harmonisation des cadres réglementaires du médicament à l'échelle continentale. Son rôle est crucial pour garantir l'accès à des médicaments et vaccins de qualité, en particulier lors des situations d'urgence sanitaire. Les experts appellent à une accélération de l'opérationnalisation complète de l'AMA, afin que l'Afrique puisse disposer d'un organe de régulation pharmaceutique indépendant et pleinement fonctionnel avant la prochaine grande crise sanitaire.","date":"2026-06-07"},
{"title":"Africa CDC and African Medicines Agency strengthen continental regulatory cooperation","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"Africa CDC and the newly operationalised African Medicines Agency (AMA) have reaffirmed deepening collaboration aimed at advancing pharmaceutical regulatory harmonisation across the continent, as highlighted in Africa CDC's weekly briefing of 16-22 February 2026. The partnership is framed as foundational to Africa's ambition to engage as an equal partner in global pharmaceutical markets and to ensure that regulatory frameworks keep pace with scientific and technological innovation. Regulatory harmonisation is seen not merely as an administrative task but as a strategic lever for health sovereignty, reducing dependency on external pharmaceutical supply chains. Sustained political commitment and predictable financing are identified as essential to achieving equitable access and continental pharmaceutical autonomy.","date":"2026-04-11"},
],
"manufacture-vaccins":[
{"title":"Face à l'épidémie Ebola Bundibugyo, l'absence de vaccins homologués met en lumière les lacunes de la production africaine","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"Le rapport de situation du 31 mai 2026 sur l'épidémie de maladie à virus Bundibugyo (BVD) en RDC et en Ouganda soulève une problématique cruciale : l'absence de vaccins ou de thérapeutiques homologués contre ce variant d'Ebola. Dans ce contexte, Africa CDC insiste sur l'importance des fondamentaux de santé publique — traçage des contacts, isolement des cas, équipements de protection — en l'absence d'outils biologiques disponibles. Cette situation met en évidence l'urgence d'investir dans la fabrication locale de vaccins sur le continent africain, afin que l'Afrique ne soit plus tributaire de solutions développées en dehors de ses frontières lors de futures crises sanitaires.","date":"2026-06-12"},
{"title":"Production de vaccins contre Ebola : l'Afrique face à l'urgence de renforcer ses capacités manufacturières","url":"https://khub.africacdc.org/events/3","content":"Face à la flambée épidémique de la maladie à virus Ebola de type Bundibugyo en Afrique centrale, l'absence de vaccins et de thérapeutiques spécifiquement homologués contre ce sous-type viral met en lumière les lacunes critiques dans les capacités de fabrication de vaccins sur le continent africain. Africa CDC a publié une correspondance soulignant que, sans vaccins ni traitements disponibles contre le virus Bundibugyo, les mesures fondamentales de santé publique restent le seul rempart disponible. Cette situation renforce l'urgence d'investir dans la production locale de vaccins en Afrique, afin de réduire la dépendance aux chaînes d'approvisionnement mondiales et de garantir une réponse rapide lors des futures épidémies.","date":"2026-06-10"},
{"title":"No approved vaccine for Bundibugyo Ebola strain highlights urgency of African vaccine manufacturing capacity","url":"https://www.wuot.org/2026-06-05/cdc-report-ebola-outbreak-could-rival-the-worst-on-record-unless-world-acts","content":"The rapid spread of the Bundibugyo species of the Ebola virus across the Democratic Republic of Congo and Uganda has cast a stark spotlight on a critical gap in global vaccine manufacturing: there is currently no approved vaccine for this strain. While vaccines exist for the more common Zaire strain of Ebola, the Bundibugyo variant has largely been neglected in vaccine research and production pipelines. Health experts are now calling for urgent investment in the development and local manufacturing of vaccines targeting this strain. The crisis reinforces broader calls for Africa to accelerate domestic vaccine production capacity so the continent is not dependent on external supply chains during emergencies. The joint Africa CDC-WHO response plan, which seeks $518 million in funding, includes provisions for research and development support that could help bridge this manufacturing gap.","date":"2026-06-09"},
],
"unicef-gavi":[
{"title":"Mental Health Leadership Course in Africa: Africa CDC Opens Applications with Scholarship Support","url":"https://www.instagram.com/p/DShzmNwgpF4","content":"Africa CDC has launched a call for applications for its Mental Health Leadership and Advocacy Course, scheduled for 3-14 August 2026 at the Ibadan Business School in Bodija, Ibadan, Nigeria. Scholarships are available to support participants, reflecting Africa CDC's commitment to building human capital across the continent's health sector. The initiative is part of broader efforts by Africa CDC and its partners, including UNICEF, to strengthen mental health systems and leadership capacity across African Union member states. Applications are open until 26 June 2026.","date":"2026-06-13"},
{"title":"Gavi et UNICEF mobilisés face à l'urgence sanitaire Ebola en Afrique centrale et orientale","url":"https://www.npr.org/2026/06/05/nx-s1-5848082/ebola-virus-cdc-outbreak-democratic-republic-congo-uganda","content":"Alors que l'épidémie d'Ebola Bundibugyo continue de s'étendre en République Démocratique du Congo et en Ouganda, avec plus de 300 cas confirmés et des projections alarmantes pouvant rivaliser avec l'épidémie ouest-africaine de 2014-2016 (20 000 cas, 4 000 morts), Gavi et l'UNICEF intensifient leurs efforts de coordination humanitaire et de soutien logistique. Les deux organisations jouent un rôle clé dans l'approvisionnement en équipements médicaux, le soutien aux systèmes de santé locaux et la mobilisation communautaire pour freiner la progression du virus dans les zones les plus affectées, notamment la province de l'Ituri au Congo.","date":"2026-06-12"},
{"title":"UNICEF and Gavi mobilize support as Ebola emergency threatens to overwhelm East and Central Africa","url":"https://www.facebook.com/NewsContent.CCTVPLUS/videos/africa-cdc-who-launch-response-plan-to-contain-ebolathe-africa-centers-for-disea/1758110012018147","content":"As the Ebola outbreak in the Democratic Republic of Congo and Uganda continues to escalate, international partners including UNICEF and Gavi, the Vaccine Alliance, are being called upon to scale up their support. The continental preparedness and response plan launched on June 5, 2026 by Africa CDC and WHO requires $518 million in international backing, with multilateral agencies expected to play a key role in logistics, supply chain management, and immunization support. UNICEF, which maintains one of the world's largest humanitarian supply chains, is positioned to assist in the delivery of medical equipment, personal protective equipment, and community engagement campaigns. Gavi, meanwhile, is exploring options to support the expedited development and potential emergency use authorization of candidate vaccines targeting the Bundibugyo Ebola strain, in line with its mandate to expand vaccine access in low-income countries.","date":"2026-06-09"},
{"title":"Gavi and UNICEF secure malaria vaccine supply from Serum Institute at $2.99 per dose","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Gavi and UNICEF have finalized an agreement with the Serum Institute of India to supply the R21/Matrix-M malaria vaccine at $2.99 per dose, a price point hailed as a breakthrough for low-income country access. The deal is expected to significantly expand coverage of malaria vaccination programs across sub-Saharan Africa, where the disease remains one of the leading causes of child mortality. Negotiating an affordable price from a large-scale manufacturer was seen as a critical test of multilateral procurement power in the post-COVID global health funding environment. The agreement is expected to facilitate integration of malaria vaccination into routine immunization schedules in eligible countries supported by Gavi.","date":"2026-04-10"},
],
"sante-maroc":[
{"title":"Le Maroc renforce sa veille sanitaire face à la résurgence des fièvres hémorragiques en Afrique","url":"https://www.cdc.gov/ebola/situation-summary/index.html","content":"Dans le contexte de l'épidémie de virus Ebola Bundibugyo qui frappe la République démocratique du Congo et l'Ouganda, le système de santé marocain a activé ses dispositifs de surveillance aux points d'entrée du territoire, notamment dans les aéroports et aux postes frontières. Le Maroc, dont les liens économiques et humains avec l'Afrique subsaharienne sont en constante croissance, a mis en alerte ses équipes de contrôle sanitaire aux frontières. Le ministère de la Santé suit de près l'évolution de la situation épidémiologique internationale et a rappelé les protocoles de prise en charge des cas suspects de fièvres hémorragiques virales. Cette vigilance s'inscrit dans la stratégie nationale de sécurité sanitaire du Royaume, qui vise à anticiper et à contenir toute menace épidémique avant qu'elle n'atteigne le territoire national.","date":"2026-06-11"},
{"title":"Le Maroc renforce sa veille sanitaire face à la propagation de l'épidémie d'Ebola en Afrique centrale","url":"https://www.ecdc.europa.eu/sites/default/files/documents/Communicable-disease-threa","content":"Alors que l'épidémie d'Ebola continue de s'étendre en République démocratique du Congo et en Ouganda, le Royaume du Maroc a activé ses mécanismes de surveillance épidémiologique renforcée aux points d'entrée du territoire, notamment dans les aéroports internationaux de Casablanca, Rabat et Marrakech. Le ministère de la Santé et de la Protection sociale suit de près l'évolution de la situation en coordination avec l'Organisation mondiale de la Santé et Africa CDC. Le Maroc, dont le système de santé a été considérablement renforcé depuis la pandémie de Covid-19, dispose de protocoles de détection et d'isolement adaptés aux fièvres hémorragiques virales. Les autorités sanitaires rappellent qu'aucun cas n'a été détecté sur le territoire national à ce jour, tout en appelant à la vigilance, notamment parmi les voyageurs en provenance des zones affectées.","date":"2026-06-09"},
{"title":"Le Maroc renforce sa coopération en matière de santé publique dans le contexte des épidémies africaines","url":"https://www.facebook.com/africacdc/posts/-press-briefing-update-friday-5-june-2026-time-1600-eat-gmt3-1500-sast-gmt2-1400/1404687231689647","content":"Dans le contexte de l'épidémie d'Ebola qui sévit en Afrique centrale et orientale, le Royaume du Maroc suit de près l'évolution de la situation sanitaire continentale. Les autorités sanitaires marocaines maintiennent une veille épidémiologique active, en lien avec les mécanismes de surveillance de l'Africa CDC et de l'OMS. Le Maroc, qui participe activement aux instances de l'Union africaine, est partie prenante des dispositifs continentaux de préparation aux urgences sanitaires, et ses équipes de santé publique participent aux briefings hebdomadaires de l'Africa CDC sur l'état de l'épidémie d'Ebola en RDC et en Ouganda.","date":"2026-06-08"},
],
"vaccins-monde":[
{"title":"Africa CDC lance sa promotion 2026 de Jeunes Champions de la Santé Numérique pour transformer l'avenir sanitaire du continent","url":"https://youth.africacdc.org/2026-cohort-of-young-digital-health-champions-to-transform-africas-health-future-announced","content":"Africa CDC a annoncé sa promotion 2026 de Jeunes Champions de la Santé Numérique (Y-DHC), une initiative visant à identifier et connecter de jeunes leaders qui façonnent activement le paysage de la santé numérique en Afrique. Dans le cadre de la stratégie YES!Health 2025-2028, ces champions joueront un rôle clé dans l'innovation en matière de vaccination et de santé publique numérique, contribuant à accélérer l'adoption des technologies de santé, notamment les registres de vaccination électroniques et les systèmes de suivi immunologique. Des cohortes régionales ont été sélectionnées pour l'Afrique centrale, orientale, septentrionale, australe et occidentale.","date":"2026-06-13"},
{"title":"L'OMS déclare l'urgence sanitaire internationale : la riposte mondiale à Ebola Bundibugyo s'organise","url":"https://www.instagram.com/reel/DZSK8Doilyr","content":"L'Organisation Mondiale de la Santé, conjointement avec Africa CDC, a lancé le 5 juin 2026 un plan continental de préparation et de réponse à l'épidémie de maladie à virus Ebola Bundibugyo, couvrant la période juin-novembre 2026. Ce plan, présenté lors d'une conférence de presse conjointe, mobilise des ressources internationales pour soutenir la surveillance épidémiologique, la vaccination expérimentale et la recherche clinique en contexte d'urgence. La campagne mondiale de riposte vise à contenir la progression du virus dans les pays affectés — principalement la RDC et l'Ouganda — tout en alertant la communauté internationale sur la nécessité d'investir dans des vaccins efficaces contre les variants d'Ebola moins connus.","date":"2026-06-12"},
{"title":"WHO leads global push for Ebola Bundibugyo vaccine as outbreak reaches unprecedented scale","url":"https://www.thelancet.com/journals/lancet/article/PIIS0140-6736(26)01101-3/fulltext","content":"The WHO and Africa CDC have formally declared the 2026 Ebola virus disease outbreak in DRC and Uganda a major public health emergency, driven by the Bundibugyo virus (Orthoebolavirus bundibugyoense). Writing in The Lancet, experts describe the 2026 outbreak as one of the most significant since the catastrophic 2014–2016 West Africa epidemic. With no approved vaccine currently available for this specific Ebola strain, WHO has placed the development and expedited evaluation of three candidate vaccines at the heart of its global immunisation strategy for the outbreak. International research consortia have been mobilised, and fast-track regulatory procedures are being coordinated with national and regional health authorities. The Lancet commentary stresses the urgency of international R&D collaboration and sustained funding to achieve an effective immunisation tool before the outbreak spirals further out of control.","date":"2026-06-11"},
{"title":"Ebola Bundibugyo : l'OMS et Africa CDC appellent à une mobilisation mondiale pour combler le vide vaccinal","url":"https://www.facebook.com/africacdc/videos/live-africa-cdc-who-press-briefing-bundibugyo-virus-disease-continental-prepared/1255649539979975","content":"Le 5 juin 2026, l'OMS et Africa CDC ont tenu une conférence de presse conjointe pour présenter le Plan Continental de Préparation et de Réponse à la Maladie à Virus Bundibugyo (BVD). Ce cadre de référence, destiné à coordonner la préparation et la réponse à travers tous les États membres de l'Union Africaine, met en lumière un défi majeur pour la communauté scientifique mondiale : l'absence de vaccins homologués contre le virus Ebola de type Bundibugyo. Contrairement aux souches Zaïre et Soudan, pour lesquelles des vaccins existent, le variant Bundibugyo ne dispose d'aucun vaccin approuvé, ce qui impose de concentrer la recherche et le développement vaccinaux sur ce pathogène. L'OMS appelle les fabricants pharmaceutiques et les institutions de recherche à accélérer les essais cliniques pour combler ce vide dans l'arsenal mondial de vaccination contre les fièvres hémorragiques.","date":"2026-06-10"},
],

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
