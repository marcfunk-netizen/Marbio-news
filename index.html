"african-cdc":[
{"title":"U.S. shifts to 'aid to trade' model with $20.2 billion in bilateral health agreements across 27 African nations","url":"https://www.bushcenter.org/publications/global-health-update-apr-8-2026","content":"The U.S. State Department has signed bilateral health agreements with 27 countries totaling $20.2 billion in combined health financing from 2026 to 2030, under the America First Global Health Strategy. Senior Bureau Official Nick Checker outlined a reset of U.S.-Africa policy shifting from 'aid to trade,' emphasizing mutual economic interests, accountability, and country ownership. Notable agreements include $71 million in U.S. funding to Angola, $29.6 million to Honduras, and $63.1 million to Senegal for HIV, malaria, and health system strengthening. The future of the U.S. President's Malaria Initiative, which invests approximately $1 billion annually, remains uncertain under the new strategic framework.","date":"2026-04-11"},
{"title":"Africa CDC secures over $250 million at Lyon One Health Summit","url":"https://africacdc.org/news-item/africa-cdc-secures-over-us250-million-to-advance-africas-global-health-security-agenda-at-the-lyon-one-health-summit-in-lyon-france/","content":"Africa CDC secured over US$250 million in pledged funding at the Lyon One Health Summit in France, marking a significant milestone in the continent's drive toward health security and sovereignty. Among the commitments, EU Commissioner Jozef Sikela announced a dedicated investment of EUR 96.5 million to strengthen health security infrastructure across African nations. The funding is intended to support surveillance systems, emergency preparedness, and locally led health initiatives aligned with the Africa CDC 2023-2027 Strategic Plan. This financing push reflects growing international recognition that African-defined health priorities must be backed by predictable and sustainable resources.","date":"2026-04-11"},
{"title":"Africa CDC develops continental cross-border surveillance strategic framework","url":"https://www.sciencedirect.com/science/article/pii/S1201971224005095","content":"Africa CDC has published a continental strategic framework aimed at strengthening cross-border surveillance, coordination, and information sharing to address the continent's heavy burden of public health emergencies. Over the past 22 years, more than 100 public health events have been reported annually in Africa, with 92% being infectious diseases and 30% involving zoonotic origins. The framework was developed through a participatory process involving representatives from 50 AU member states, four regional economic communities, and international partners including WHO, US CDC, IOM, and UKHSA. A key technical working group was established following a 2022 consultative workshop in Kigali, Rwanda, to drive implementation across all five AU regions.","date":"2026-04-11"},
{"title":"Africa CDC mpox response: surveillance, prevention and contingency planning","url":"https://africacdc.org/wp-content/uploads/2024/08/Explainer-Declaration-of-Public-Health-Emergency-of-Continental-Security-EN.pdf","content":"Africa CDC has outlined a comprehensive adaptive strategy to combat the ongoing mpox public health emergency, combining digital surveillance tools, culturally tailored prevention messaging, and contingency planning for potential virus mutations or resurgence. Prevention campaigns are being conducted across traditional and digital media in local languages, covering symptoms, transmission routes, and hygiene practices such as handwashing and proper waste management. The agency is also expanding real-time digital case tracking to improve detection speed and accuracy across at-risk regions. Research and development initiatives are underway to advance diagnostic tools, treatments, and vaccines, with monitoring and evaluation systems in place to adjust strategies as the outbreak evolves.","date":"2026-04-11"},
{"title":"Africa CDC establishes Central Data Repository to strengthen public health surveillance","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Africa CDC launched a new Central Data Repository (CDR) on January 27, 2026, aimed at transforming how public health data is collected, stored, and shared across the continent. The CDR is designed to close critical surveillance gaps that have historically hampered rapid outbreak detection and response. By centralizing data flows from member states, the system is expected to improve real-time decision-making and accountability. The initiative aligns with Africa CDC's 2023-2027 Strategic Plan and its broader Health Security and Sovereignty Agenda, which prioritizes reducing reliance on external data infrastructure.","date":"2026-04-10"},
{"title":"UNFPA and Africa CDC sign landmark MOU to advance health and innovation across Africa","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"The United Nations Population Fund (UNFPA) and Africa CDC signed a landmark Memorandum of Understanding on February 12, 2026, in Addis Ababa, formalizing a strategic partnership to advance health innovation and population health outcomes across Africa. The agreement focuses on aligning reproductive health priorities with continental disease control efforts, reflecting a growing recognition that public health sovereignty requires integrated approaches. This partnership is part of a broader wave of institutional alliances Africa CDC has pursued in early 2026, including agreements with FHI 360 and the African Medicines Agency. Together, these MOUs signal a concerted effort to build locally led, resilient health systems capable of addressing both endemic and emergency health threats.","date":"2026-04-10"},
{"title":"Ethiopia declares end of first-ever Marburg outbreak after rapid collaborative response","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Ethiopia officially declared the end of its first-ever Marburg virus disease outbreak on January 26, 2026, less than three months after the initial detection, according to Africa CDC. The swift containment was attributed to rapid coordinated response efforts involving Africa CDC, national health authorities, and international partners. The outbreak served as a key test of Ethiopia's health system resilience and highlighted the effectiveness of Africa CDC's surge support mechanisms. Officials noted the response as a model for continental preparedness, demonstrating that African-led interventions can contain high-risk pathogens within a compressed timeframe.","date":"2026-04-10"},
{"title":"Africa CDC unveils Health Security and Sovereignty Agenda at AU Summit 2026","url":"https://africacdc.org/au-summit-2026/","content":"Africa CDC is participating in the 39th Ordinary Session of the African Union Summit through a series of high-level engagements aimed at advancing implementation of its Health Security and Sovereignty (AHSS) Agenda. The AHSS builds on the New Public Health Order endorsed by African Heads of State in 2022, responding to a more complex global health landscape marked by geopolitical shifts and declining donor funding. Director-General Dr Jean Kaseya emphasized that the agenda represents a collective commitment to move from dependency to ownership and from vulnerability to resilience. A continental scorecard will be established to ensure shared accountability among AU Member States.","date":"2026-04-09"},
{"title":"Africa CDC launches continental strategy to decentralize diagnostics and accelerate outbreak response","url":"https://africacdc.org/news-item/africa-launches-continental-strategy-to-decentralize-diagnostics-and-accelerate-outbreak-response/","content":"Africa CDC convened public health leaders from ten African countries in Yaounde, Cameroon, in July 2025 to co-develop a continental framework for decentralizing laboratory services and bringing testing closer to communities. The four-day workshop, organized in partnership with WHO, the EU, and Cameroon's Ministry of Health, produced the Continental Guidance for the Decentralization of Laboratory Services. This practical tool is designed to help Member States design national diagnostic strategies that improve outbreak detection and response times. The initiative is part of a broader effort to accelerate equitable access to diagnostics across the continent.","date":"2026-04-09"},
{"title":"Africa CDC weekly briefing: advancing health security and sovereignty agenda, April 9, 2026","url":"https://www.youtube.com/watch?v=wMXqrplKkCM","content":"Africa CDC held its weekly public health briefing on April 9, 2026, covering the latest updates on priority public health issues and coordinated continental response efforts. The briefing focused on advancing the Africa Health Security and Sovereignty (AHSS) Agenda, which targets reducing dependency on external systems, manufacturing, and financing. Africa CDC has noted that an estimated 40 percent of health resources in Africa are lost to inefficiency and poor governance, underscoring the urgency of structural reform. The weekly briefings serve as a key communication tool to keep stakeholders informed of ongoing public health developments across the continent.","date":"2026-04-09"},
{"title":"Africa CDC launches Health Security and Sovereignty Agenda","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Africa CDC unveiled its new Health Security and Sovereignty (AHSS) agenda in November 2025, marking a strategic shift from the New Public Health Order framework toward a more autonomous, resilient continental health architecture. The agenda was adopted following guidance from the September 2025 meeting of the Committee of Heads of State and Government, responding to geopolitical shifts and declining donor funding. A key pillar of the AHSS is digital transformation, including a Primary Health Care Digital Intelligence Ecosystem linking community health workers to a continental data centre. Africa CDC emphasized that health data sovereignty is central to the strategy, ensuring African health data is not stored abroad or lost when partnerships end.","date":"2026-04-09"},
{"title":"Africa CDC advances partnerships with FHI 360 and African Medicines Agency","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"In February 2026, Africa CDC signed a Memorandum of Understanding with global nonprofit FHI 360 to strengthen workforce development, disease surveillance and emergency preparedness across the continent. Simultaneously, Africa CDC deepened collaboration with the newly operationalised African Medicines Agency (AMA) to accelerate regulatory harmonisation and pharmaceutical market integration. These partnerships align with the Africa CDC 2023-2027 Strategic Plan and reflect a broader continental strategy to build autonomous health systems. Officials stressed that regulatory harmonisation is foundational to Africa engaging as an equal partner in global pharmaceutical markets and keeping pace with scientific innovation.","date":"2026-04-09"},
{"title":"Africa CDC announces 2026 cohort of Young Digital Health Champions","url":"https://africacdc.org/news-item/africa-cdc-announces-2026-cohort-of-young-digital-health-champions/","content":"Africa CDC announced its 2026 cohort of Young Digital Health Champions on March 23, 2026, from its headquarters in Addis Ababa. The programme is designed to mobilise and train young African professionals in digital health tools and innovation as part of the continent's broader digital transformation agenda. Champions are expected to support the rollout of digital health systems at community and national levels, contributing to the Africa Health Security and Sovereignty strategy. The initiative underscores Africa CDC's commitment to building a home-grown digital health workforce capable of sustaining health infrastructure independently of external partners.","date":"2026-04-09"},
{"title":"Africa CDC warns of health crisis over costs, disruptions","url":"https://guardian.ng/news/africa-cdc-warns-of-health-crisis-over-costs-disruptions/","content":"Africa CDC has raised the alarm over shortages of essential medical supplies due to freight delays and supply chain disruptions threatening timely delivery of medicines, vaccines and health products.","date":"2026-04-03"},
{"title":"Africa CDC Weekly Brief 30 March - 5 April 2026","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"An estimated 40% of health resources in Africa are lost to inefficiency and poor governance. The latest weekly brief covers the key public health events across the African Union Member States.","date":"2026-04-05"},
{"title":"Africa CDC Rolls Out Continental SPARK-NCDs Programme","url":"https://africacdc.org/news-item/africa-cdc-rolls-out-continental-spark-ncds-programme-as-noncommunicable-diseases-rise-across-africa/","content":"Nearly 2 million Africans die prematurely each year from complications related to hypertension and diabetes alone. Africa CDC has launched SPARK-NCDs to strengthen surveillance and improve integrated care.","date":"2026-03-30"},
{"title":"Member States Statement on Primary Health Care Digitalization","url":"https://africacdc.org/download/member-states-statement-on-the-primary-health-care-digitalization-framework/","content":"Adopted on 12 March 2026 in Addis Ababa. The continental target: 90% digitally enabled PHC systems by 2035. Development partners and private sector are called to align support with framework priorities.","date":"2026-04-01"},
],
"african-medical-agency":[
{"title":"Africa CDC and African Medicines Agency strengthen continental regulatory cooperation","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"Africa CDC and the newly operationalised African Medicines Agency (AMA) have reaffirmed deepening collaboration aimed at advancing pharmaceutical regulatory harmonisation across the continent, as highlighted in Africa CDC's weekly briefing of 16-22 February 2026. The partnership is framed as foundational to Africa's ambition to engage as an equal partner in global pharmaceutical markets and to ensure that regulatory frameworks keep pace with scientific and technological innovation. Regulatory harmonisation is seen not merely as an administrative task but as a strategic lever for health sovereignty, reducing dependency on external pharmaceutical supply chains. Sustained political commitment and predictable financing are identified as essential to achieving equitable access and continental pharmaceutical autonomy.","date":"2026-04-11"},
{"title":"Africa CDC and FHI 360 sign MOU to strengthen health workforce and surveillance systems","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"In mid-February 2026, Africa CDC and global nonprofit FHI 360 signed a Memorandum of Understanding to strengthen workforce development, disease surveillance systems, and emergency preparedness across the African continent. The agreement is aligned with the Africa CDC 2023-2027 Strategic Plan and reflects shared commitments to sustainable financing, innovation, and locally led health initiatives. The partnership is part of a broader continental strategy backed by AU Member States to reorient health systems toward autonomy, resilience, and equitable access. Officials emphasised that achieving these goals requires institutional partnerships that transcend national boundaries and are supported by harmonised regulatory and governance frameworks.","date":"2026-04-11"},
{"title":"Africa's Health Security and Sovereignty Agenda sets new model for continental autonomy","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"On 21 November 2025, Africa CDC unveiled its Africa Health Security and Sovereignty (AHSS) Agenda, a renewed continental vision designed to reduce Africa's dependency on external health systems, manufacturing, procurement, supply chains, and financing. Building on the New Public Health Order endorsed by African Heads of State in 2022, the AHSS Agenda responds to a more complex global health landscape shaped by geopolitical shifts, declining donor funding, and recurrent health emergencies. Africa CDC Director-General H.E. Dr Jean Kaseya stated that health sovereignty does not mean isolation but signals a new model of partnership in which African nations lead with clarity and global partners support African-defined priorities. A continental scorecard is being developed to ensure shared accountability among AU Member States.","date":"2026-04-11"},
{"title":"Africa CDC and African Medicines Agency deepen regulatory cooperation to advance health sovereignty","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"In the week of February 16-22, 2026, Africa CDC reaffirmed its collaboration with the newly operationalized African Medicines Agency (AMA), marking a significant step in continental regulatory harmonization. The partnership aims to ensure that Africa's regulatory frameworks keep pace with scientific and technological innovation, enabling the continent to engage as an equal partner in global pharmaceutical markets. Africa CDC Director-General H.E. Dr Jean Kaseya emphasized that regulatory harmonization is foundational to Africa's ability to exert influence over global health policy norms. The alliance forms part of a broader AU-backed continental strategy to build resilient, sovereign health systems with predictable financing and harmonized regulatory standards.","date":"2026-04-10"},
{"title":"AMA operationalization marks turning point for Africa's pharmaceutical regulatory landscape","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"The African Medicines Agency, now fully operationalized as of early 2026, represents a historic milestone in Africa's effort to harmonize drug regulation across member states. Its collaboration with Africa CDC is designed to eliminate fragmented national approval processes that have long delayed access to essential medicines and vaccines on the continent. The AMA is expected to streamline market authorization procedures, reduce costs for manufacturers, and ultimately improve equitable access to quality-assured health products for African populations. Sustained political commitment from AU Member States and predictable financing have been identified as critical factors for the agency's long-term success.","date":"2026-04-10"},
{"title":"Africa's regulatory harmonization agenda: building continental pharmaceutical autonomy by 2040","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"Africa's continental strategy to produce 60% of its health products locally by 2040 depends critically on robust regulatory infrastructure, with AMA and Africa CDC at the center of this effort. The ongoing regulatory harmonization push is not merely administrative but is positioned as foundational to Africa's ability to attract investment in local pharmaceutical manufacturing. The Africa CDC 2023-2027 Strategic Plan explicitly links regulatory capacity to innovation, workforce development, and emergency preparedness goals. Partnerships with entities such as FHI 360 and international normative bodies are being leveraged to ensure that Africa-developed regulatory standards achieve global credibility and acceptance.","date":"2026-04-10"},
{"title":"AMA et Africa CDC renforcent la cooperation reglementaire continentale","url":"https://www.africanleadershipmagazine.co.uk/africa-cdc-strengthens-continental-health-security-and-regulatory-ties/","content":"L'Agence africaine des medicaments (AMA), recemment operationnalisee, a intensifie sa collaboration avec Africa CDC dans le cadre d'une strategie continentale visant a harmoniser les cadres reglementaires et a renforcer l'acces equitable aux produits pharmaceutiques. Cette cooperation s'inscrit dans la vision de l'Union africaine de faire de l'Afrique un acteur autonome sur les marches pharmaceutiques mondiaux. L'harmonisation reglementaire est presentee non pas comme un simple exercice administratif, mais comme un fondement essentiel de la souverainete sanitaire africaine. Les deux institutions soulignent que des systemes reglementaires solides sont indispensables pour attirer les investissements industriels et garantir la qualite des medicaments produits localement.","date":"2026-04-09"},
{"title":"TMDA Tanzania: appel a commentaires sur les directives d'inspection BPF","url":"https://africacdc.org/au-summit-2026/","content":"La Tanzania Medicines and Medical Devices Authority (TMDA) a lance un appel a commentaires publics sur ses nouvelles directives relatives aux inspections de bonnes pratiques de fabrication (BPF), dans le cadre d'un effort d'alignement sur les standards reglementaires continentaux promus par l'AMA. Cette demarche s'inscrit dans un mouvement plus large d'harmonisation reglementaire a travers l'Afrique, visant a faciliter les echanges de produits de sante entre Etats membres de l'Union africaine. La consultation publique permet aux fabricants, importateurs et autres parties prenantes de formuler des observations avant l'adoption definitive des directives. Une reglementation BPF robuste est consideree comme un prerequis pour que les pays africains puissent exporter leurs produits pharmaceutiques sur les marches regionaux et internationaux.","date":"2026-04-09"},
{"title":"AMA Chief of Staff: fully committed to advancing coordinated approach","url":"https://www.nepad.org/news/imagine-africa-without-coordination-what-would-become-of-our-health-systems","content":"On 30 March 2026 in Nairobi, five of Africa key continental health institutions convened to discuss coordination. AMA is fully committed to advancing a coordinated approach for the benefit of the African people.","date":"2026-04-02"},
{"title":"AU approves creation of African Medicine Prize under Africa CDC/AMA","url":"https://africacdc.org/news-item/right-of-reply-response-to-africa-intelligence-article-30-march-2026/","content":"The AU Assembly approved the establishment of an independent High-Level African Medical Scientific Committee. Africa CDC grant portfolio grew from USD 52 million in 2022 to USD 462 million in 2025.","date":"2026-03-30"},
{"title":"TMDA Tanzania: Call for Comments on GMP Inspection Guidelines","url":"https://www.tmda.go.tz/pages/african-medicines-agency-ama","content":"Tanzania TMDA published a call for comments on Draft Guidelines for Reliance on GMP Inspection, in line with AMA continental harmonization efforts. AMA will coordinate joint reviews of clinical trial applications.","date":"2026-01-07"},
],
"manufacture-vaccins":[
{"title":"Africa CDC unveils AHSS Agenda to reduce dependency in health manufacturing and supply chains","url":"https://africacdc.org/wp-content/uploads/2025/11/Africa-Health-Security-Sovereignty-Agenda-.pdf","content":"Africa CDC's Africa Health Security and Sovereignty Agenda places local manufacturing and supply chain independence at the core of the continent's public health transformation strategy. The agenda acknowledges that geopolitical shifts and declining donor funding have exposed critical vulnerabilities in Africa's reliance on external pharmaceutical production and procurement networks. By establishing a unified continental approach, Africa CDC and AU Member States aim to progressively build the industrial and regulatory infrastructure necessary for sustained local health product manufacturing. The framework includes benchmarks for accountability and is designed to evolve in response to emerging health challenges and global market dynamics.","date":"2026-04-11"},
{"title":"AU Summit 2026: Africa CDC advances manufacturing sovereignty through high-level engagements","url":"https://africacdc.org/au-summit-2026/","content":"Africa CDC participated in the 39th Ordinary Session of the African Union Summit through a series of high-level engagements aimed at advancing implementation of the continent's health security and sovereignty agenda, including priorities related to local health product manufacturing. The AU Summit provided a platform to secure political commitments from Member States on key pillars such as workforce development, regulatory harmonisation, and investment in production capacity. These engagements reflect the AU's recognition that building a resilient continental health architecture requires coordinated action at the highest levels of governance. Outcomes from the Summit are expected to feed into the Africa CDC 2023-2027 Strategic Plan and the broader AHSS Agenda implementation roadmap.","date":"2026-04-11"},
{"title":"Africa CDC 2026 Young Digital Health Champions to drive innovation in health systems","url":"https://africacdc.org/news-item/africa-cdc-announces-2026-cohort-of-young-digital-health-champions/","content":"Africa CDC announced its 2026 cohort of Young Digital Health Champions on 23 March 2026 in Addis Ababa, signalling a continued commitment to building the next generation of digital health innovators across the continent. The programme targets young professionals who will contribute to digital transformation in health surveillance, data systems, and health product tracking, including supply chain management for vaccines and medicines. By investing in digital health talent, Africa CDC aims to address systemic inefficiencies - an estimated 40% of health resources in Africa are lost to inefficiency and poor governance - through technology-driven solutions. The initiative aligns with the broader Africa Health Security and Sovereignty Agenda and supports the continent's goal of locally led health innovation.","date":"2026-04-11"},
{"title":"ACHIEVE Africa launched to advance vaccine and biologics manufacturing sovereignty","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Africa CDC has launched the ACHIEVE Africa initiative as a cornerstone program under its Health Security and Sovereignty Agenda, targeting the development of indigenous vaccine and biologics manufacturing capacity across the continent. The initiative responds to Africa's near-total dependence on imported vaccines, which was starkly exposed during the COVID-19 pandemic when African nations received doses last. ACHIEVE Africa is designed to catalyze investment in local production infrastructure, workforce training, and technology transfer partnerships with established global manufacturers. The program aligns with the AU's target of producing 60% of Africa's health products locally by 2040.","date":"2026-04-10"},
{"title":"Africa CDC/AVMI Industrial Fellowship Programme 2026-2027 opens to strengthen manufacturing workforce","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Africa CDC and the African Vaccine Manufacturing Initiative (AVMI) have opened applications for the 2026-2027 Industrial Fellowship Programme, aimed at building a new generation of vaccine manufacturing professionals across the continent. The fellowship places selected candidates in established manufacturing facilities to gain hands-on experience in biologics production, quality assurance, and regulatory compliance. This human capital development effort is considered essential to sustaining long-term local production ambitions, as manufacturing expertise has been identified as one of the key bottlenecks to scaling up African vaccine output. The programme is part of a suite of workforce investments under the Health Security and Sovereignty Agenda.","date":"2026-04-10"},
{"title":"Africa commits to producing 60% of its health products locally by 2040 under continental strategy","url":"https://africacdc.org/wp-content/uploads/2025/11/Africa-Health-Security-Sovereignty-Agenda-.pdf","content":"Africa CDC's Health Security and Sovereignty Agenda sets an ambitious continental target of producing 60% of Africa's vaccines, medicines, and health products locally by 2040, up from less than 3% at the time of the COVID-19 pandemic. Achieving this goal requires simultaneous progress on regulatory harmonization, financing mechanisms, infrastructure investment, and technology transfer from global partners. The agenda acknowledges that geopolitical shifts and declining donor funding make self-reliance an urgent strategic necessity rather than a long-term aspiration. Africa CDC will establish a continental scorecard to track progress and hold member states accountable for implementation of commitments under the manufacturing sovereignty framework.","date":"2026-04-10"},
{"title":"ACHIEVE Africa launched to advance vaccine and biologics sovereignty","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Africa CDC launched the ACHIEVE Africa initiative to accelerate the development of end-to-end vaccine and biologics manufacturing capacity across the continent, targeting full sovereignty over critical biological products. The programme builds on lessons from the COVID-19 pandemic, during which Africa's near-total dependence on imported vaccines left the continent last in line for doses. ACHIEVE Africa is designed to coordinate investments, technology transfers and regulatory support to enable African manufacturers to produce vaccines, sera and other biologics at scale. The initiative complements the continental goal of producing 60% of health products locally by 2040 and aligns with the Africa Health Security and Sovereignty Agenda.","date":"2026-04-09"},
{"title":"Africa CDC/AVMI Industrial Fellowship Programme 2026-2027 opens applications","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Africa CDC and the African Vaccine Manufacturing Initiative (AVMI) have opened applications for the 2026-2027 Industrial Fellowship Programme, designed to embed African scientists and technicians within vaccine manufacturing facilities to build hands-on expertise. The fellowship targets mid-career professionals in fields such as bioprocess engineering, quality assurance and regulatory affairs, and is part of a long-term human capital strategy for the continent's pharmaceutical industry. Participants will gain practical experience at accredited manufacturing sites, with the goal of returning to their home countries to strengthen local production capacity. The programme reflects Africa CDC's recognition that technology transfer alone is insufficient without a skilled local workforce to sustain manufacturing operations.","date":"2026-04-09"},
{"title":"Cross-border vaccine supply reaches conflict-affected Darfur","url":"https://africacdc.org/wp-content/uploads/2024/10/Strengthening-Cross-Border-Surveillance-and-Information-Sharing-in-Africa-_strategic-framework.pdf","content":"A coordinated cross-border vaccine supply operation has delivered essential immunisation products to conflict-affected populations in Darfur, Sudan, amid ongoing insecurity that has severely disrupted the national health system. The operation was facilitated under Africa CDC's cross-border surveillance and coordination framework, which provides mechanisms for AU member states to collaborate on health logistics across shared borders. Health workers operating in extremely challenging conditions administered vaccines against measles, polio and other vaccine-preventable diseases to displaced communities. The delivery highlights the critical importance of regional coordination frameworks that can function even when national health systems are compromised by conflict or instability.","date":"2026-04-09"},
{"title":"ACHIEVE Africa launched: advancing vaccine and biologics sovereignty","url":"https://biousawa.com/news-details/148/","content":"ACHIEVE Africa was launched on the margins of the 39th AU General Assembly in Addis Ababa. This African-led initiative signals a decisive shift toward true vaccine and therapeutic sovereignty.","date":"2026-03-18"},
{"title":"Africa CDC/AVMI Industrial Fellowship Programme 2026-2027","url":"https://opportunitiesforyouth.org/2026/03/26/africa-cdc-avmi-industrial-fellowship-programme-2026-2027-fully-funded-vaccine-manufacturing-training-for-african-graduates/","content":"The fully funded fellowship for 14 fellows runs from July 2026 to September 2027. Africa will need approximately 12,500 full-time vaccine manufacturing professionals by 2040, but the current workforce is only 2,000-3,000.","date":"2026-03-26"},
{"title":"Africa commits to producing 60% of health products locally by 2040","url":"https://africacdc.org/","content":"Africa CDC announced that Africa has committed to producing 60% of the health products it needs locally by 2040. This target is central to the AHSS Agenda.","date":"2026-03-31"},
],
"unicef-gavi":[
{"title":"Africa CDC weekly brief highlights 40% resource loss to inefficiency across African health systems","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"Africa CDC's weekly brief covering 30 March to 5 April 2026 flagged a critical finding: an estimated 40% of health resources in Africa are lost to inefficiency and poor governance, undermining the continent's ability to deliver on immunisation, surveillance, and emergency response mandates. The brief reinforced calls for stronger health financing mechanisms and improved governance structures at both national and continental levels. This figure has become a focal point in discussions between Africa CDC and international partners, including UNICEF and Gavi, on how to maximise the impact of joint health investments. Addressing this waste is seen as essential to achieving equitable vaccine coverage and sustainable primary healthcare across the continent.","date":"2026-04-11"},
{"title":"Africa CDC weekly briefing April 9: health security sovereignty agenda takes centre stage","url":"https://www.facebook.com/africacdc/videos/special-briefing-advancing-africas-health-security-sovereignty-agenda-april-9-20/1931617714123145/","content":"Africa CDC held its weekly public health briefing on April 9, 2026, focusing on the latest updates on priority public health issues and the coordinated continental response under the Advancing Africa's Health Security and Sovereignty Agenda. The briefing covered ongoing disease surveillance activities, partnership developments, and progress on implementation of continental health frameworks. Regular public briefings of this nature serve as a transparency and accountability mechanism, ensuring that Member States, partners such as UNICEF and Gavi, and the general public remain informed on evolving health situations. The April 9 session underscored Africa CDC's commitment to open communication as a pillar of its expanded health governance role.","date":"2026-04-11"},
{"title":"Africa CDC secures EUR 96.5 million EU investment to strengthen health security infrastructure","url":"https://africacdc.org/news-item/africa-cdc-secures-over-us250-million-to-advance-africas-global-health-security-agenda-at-the-lyon-one-health-summit-in-lyon-france/","content":"The European Union announced a EUR 96.5 million investment in African health security at the Lyon One Health Summit, part of a broader package exceeding US$250 million secured by Africa CDC to advance the continent's global health agenda. The EU funding is intended to reinforce health security infrastructure, complementing existing commitments from multilateral partners including UNICEF and Gavi in areas such as immunisation systems, cold chain capacity, and surveillance networks. This injection of resources is particularly timely as Africa navigates declining global donor funding and growing pressure to build self-reliant health financing mechanisms. Africa CDC emphasised that such investments must align with African-defined priorities and support locally led implementation rather than externally driven programmes.","date":"2026-04-11"},
{"title":"Gavi and UNICEF secure malaria vaccine supply from Serum Institute at $2.99 per dose","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Gavi and UNICEF have finalized an agreement with the Serum Institute of India to supply the R21/Matrix-M malaria vaccine at $2.99 per dose, a price point hailed as a breakthrough for low-income country access. The deal is expected to significantly expand coverage of malaria vaccination programs across sub-Saharan Africa, where the disease remains one of the leading causes of child mortality. Negotiating an affordable price from a large-scale manufacturer was seen as a critical test of multilateral procurement power in the post-COVID global health funding environment. The agreement is expected to facilitate integration of malaria vaccination into routine immunization schedules in eligible countries supported by Gavi.","date":"2026-04-10"},
{"title":"Letter urges Gavi and UNICEF to negotiate fair price for mpox vaccines amid equity concerns","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"A coalition of global health advocates has written to Gavi and UNICEF urging the organizations to use their collective purchasing leverage to negotiate fair and transparent pricing for mpox vaccines, warning that current price structures risk excluding the most affected African nations. The letter comes as mpox continues to circulate in multiple African countries and as demand for the Bavarian Nordic JYNNEOS vaccine outstrips available supply at accessible price points. Advocates argue that the precedent set by the malaria vaccine deal with Serum Institute should be applied systematically across priority vaccines for Africa. They called for full price transparency and advance market commitment mechanisms to incentivize manufacturers to scale up affordable production.","date":"2026-04-10"},
{"title":"Bangladesh launches emergency measles vaccination campaign after 98 children die in outbreak","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Bangladesh has launched an emergency measles vaccination campaign following an outbreak that has claimed the lives of at least 98 children, according to health authorities. The outbreak exposed significant gaps in routine immunization coverage that had widened during and after the COVID-19 pandemic, when vaccination campaigns were disrupted across the region. UNICEF and WHO are supporting the emergency response by providing vaccines, cold chain equipment, and technical personnel to accelerate coverage in affected districts. The crisis has renewed calls for sustained investment in routine immunization infrastructure to prevent similar outbreaks, particularly in densely populated low-income settings.","date":"2026-04-10"},
{"title":"Gavi and UNICEF secure malaria vaccine from Serum Institute at $2.99 per dose","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"Gavi and UNICEF have negotiated a landmark supply agreement with the Serum Institute of India for malaria vaccines at a price of $2.99 per dose, making the vaccine significantly more accessible for low-income countries in sub-Saharan Africa. The agreement is expected to enable millions of additional children to receive protection against malaria, one of the leading causes of child mortality on the continent. The low per-dose price reflects sustained pressure from African health institutions and global advocates for equitable vaccine pricing in line with countries' ability to pay. The deal is seen as a model for future negotiations on other essential vaccines and underscores the role of multilateral procurement mechanisms in levelling the playing field for developing nations.","date":"2026-04-09"},
{"title":"Letter urges Gavi and UNICEF to negotiate fair price for mpox vaccines","url":"https://africacdc.org/wp-content/uploads/2024/08/Explainer-Declaration-of-Public-Health-Emergency-of-Continental-Security-EN.pdf","content":"A coalition of African health institutions and civil society organisations has sent a formal letter to Gavi and UNICEF urging them to use their collective purchasing power to negotiate a fair and affordable price for mpox vaccines, as the outbreak continues to affect more than 20 African countries. The letter argues that current vaccine prices remain out of reach for many national health budgets, creating inequitable access that prolongs outbreaks and undermines Africa's public health sovereignty. Signatories called for transparent pricing negotiations and the application of the same principles used in COVID-19 and malaria vaccine procurement. Africa CDC, which has declared mpox a Public Health Emergency of Continental Security, has supported the call for equitable vaccine access as part of its adaptive outbreak response strategy.","date":"2026-04-09"},
{"title":"Cross-border vaccine supply to conflict-affected Darfur","url":"https://www.medrxiv.org/content/10.64898/2026.04.01.26349918v1.full.pdf","content":"A groundbreaking cross-border vaccine supply chain was established to deliver vaccines from Chad overland to conflict-affected Darfur. UNICEF led operational coordination. Gavi provided financial and strategic support.","date":"2026-04-02"},
{"title":"Letter urging Gavi/UNICEF to negotiate fair price of mpox vaccines","url":"https://www.citizen.org/article/letter-urging-gavi-unicef-to-negotiate-fair-price-of-mpox-vaccines","content":"Public Citizen, MSF and partners urge Gavi and UNICEF to negotiate fair prices for mpox vaccines. At $50-75 per dose, Gavi $500M First Response Fund could only immunize 3.3 million people.","date":"2026-04-01"},
{"title":"Bangladesh launches emergency measles vaccination after 98 children died","url":"https://www.upi.com/Top_News/US/2026/04/06/bangladesh-vaccine-measles-98-children-dead/6871775479655/","content":"Bangladesh launched an emergency vaccination campaign to protect over a million children from measles after at least 98 children died since March 15. The campaign focuses on 18 high-risk districts.","date":"2026-04-06"},
{"title":"Gavi/UNICEF: malaria vaccine from Serum Institute at $2.99 per dose","url":"https://theindianpractitioner.com/gavi-and-unicef-unite-for-malaria-vaccine-from-serum-institute","content":"The malaria vaccine will be offered at US$2.99 per dose. Over 40 million doses delivered, now part of routine immunization in 24 African countries covering 70% of the global malaria burden.","date":"2026-03-15"},

"sante-maroc":[
{"title":"Africa CDC cross-border framework: model applicable to North African health corridors","url":"https://www.sciencedirect.com/science/article/pii/S1201971224005095","content":"The continental cross-border surveillance framework developed by Africa CDC, published in a peer-reviewed article in ScienceDirect, has direct implications for North African countries including Morocco, which shares epidemiological and geographical profiles with neighbours vulnerable to zoonotic disease spillovers. The framework establishes coordination mechanisms among all 50 AU member states and four regional economic communities to strengthen real-time information sharing and joint outbreak response. For Morocco, integration into this continental framework represents an opportunity to align national health surveillance systems with continent-wide standards and benefit from shared intelligence on emerging disease threats. The framework's emphasis on port health surveillance is particularly relevant given Morocco's strategic position as a major transit hub between Africa and Europe.","date":"2026-04-11"},
{"title":"Africa CDC Health Security and Sovereignty Agenda: implications for North African member states","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"The Africa Health Security and Sovereignty Agenda unveiled by Africa CDC in November 2025 calls on all AU Member States, including Morocco and other North African nations, to champion a shift from external dependency to continental ownership in health systems. The agenda prioritises reducing reliance on imported pharmaceuticals, diagnostics, and vaccines through investment in local manufacturing capacity and regulatory harmonisation in partnership with the African Medicines Agency. For Morocco, which has recently invested heavily in primary health care infrastructure rehabilitation and digital health platforms, the AHSS Agenda offers a continental framework that complements national reforms. A continental scorecard under development will track Member State progress against shared health sovereignty benchmarks.","date":"2026-04-11"},
{"title":"Africa CDC digital health champions programme: a model for North African youth engagement","url":"https://africacdc.org/news-item/africa-cdc-announces-2026-cohort-of-young-digital-health-champions/","content":"Africa CDC's announcement of its 2026 Young Digital Health Champions cohort on 23 March 2026 highlights the continental drive to embed digital innovation at the core of health system reform, a goal that resonates strongly with Morocco's own digital health agenda. The programme selects young professionals across Africa to lead digital transformation in health data, surveillance, and service delivery, aligning with Morocco's recent launch of digital health authorisation platforms and e-health initiatives. By participating in such continental programmes, Moroccan youth and health professionals can contribute to and benefit from shared knowledge networks on digital health governance. The initiative underscores Africa CDC's broader commitment to locally driven, youth-led solutions as a foundation for sustainable health systems.","date":"2026-04-11"},
{"title":"Le Maroc acheve la rehabilitation de 1 400 centres de sante pour renforcer l'acces aux soins primaires","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Le gouvernement marocain a annonce l'achevement de la rehabilitation de 1 400 centres de sante primaires a travers le Royaume, dans le cadre du vaste chantier de reforme du systeme de sante national. Cette initiative s'inscrit dans la mise en oeuvre de la loi-cadre 06-22 relative au systeme de sante et vise a garantir une offre de soins de proximite de qualite pour l'ensemble de la population, y compris dans les zones rurales et enclavees. La rehabilitation a porte sur la mise aux normes des infrastructures, l'equipement medical et l'amelioration des conditions d'accueil des patients. Le ministre de la Sante a souligne que ce chantier constitue un jalon essentiel vers la couverture sante universelle au Maroc.","date":"2026-04-10"},
{"title":"Lancement de Tarkhiss: le Maroc se dote d'une plateforme numerique de sante pour les autorisations sanitaires","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Le Maroc a lance Tarkhiss, une nouvelle plateforme numerique destinee a centraliser et simplifier les procedures d'autorisation dans le secteur de la sante, dans le cadre de l'agenda de transformation numerique du Royaume. La plateforme vise a reduire les delais administratifs, a ameliorer la transparence et a renforcer le controle de la qualite des etablissements et des professionnels de sante. Ce lancement s'inscrit dans une dynamique plus large de modernisation de la gouvernance sanitaire marocaine, portee par des investissements publics significatifs depuis la reforme constitutionnelle de la sante. Les operateurs du secteur prive et public pourront desormais soumettre et suivre leurs demandes d'autorisation entierement en ligne.","date":"2026-04-10"},
{"title":"Rapport Afrobarometer 2026: les Marocains denoncent les delais d'attente et les penuries de medicaments","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Le dernier rapport Afrobarometer publie en 2026 revele que de nombreux citoyens marocains continuent de signaler des delais d'attente excessifs et des penuries frequentes de medicaments dans les structures de sante publiques, malgre les efforts de reforme engages par le gouvernement. Les donnees indiquent une insatisfaction persistante vis-a-vis de la qualite des soins dans les etablissements publics, notamment dans les regions peripheriques. Ces resultats viennent nuancer le bilan positif des reformes structurelles, en rappelant que l'amelioration des infrastructures ne suffit pas sans une offre suffisante de ressources humaines et de medicaments essentiels. Le rapport appelle a une acceleration des investissements dans la chaine d'approvisionnement pharmaceutique et dans la formation des personnels de sante.","date":"2026-04-10"},
{"title":"Le Maroc acheve la rehabilitation de 1 400 centres de sante","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"Le gouvernement marocain a annonce l'achevement de la rehabilitation de 1 400 centres de sante a travers le royaume, dans le cadre d'un programme ambitieux de modernisation des infrastructures sanitaires de proximite. Ces travaux visent a ameliorer les conditions d'accueil des patients, a renforcer les equipements medicaux disponibles et a rendre les soins primaires plus accessibles aux populations rurales et periurbaines. La rehabilitation s'inscrit dans la vision royale d'un systeme de sante universel, equitable et de qualite, avec un accent particulier sur la medecine de premier recours. Ce programme constitue l'une des plus grandes operations de mise a niveau des infrastructures de sante menees depuis l'independance du pays.","date":"2026-04-09"},
{"title":"Lancement de Tarkhiss: le Maroc se dote d'une plateforme numerique de sante","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"Le Maroc a lance Tarkhiss, une nouvelle plateforme numerique destinee a simplifier les procedures administratives dans le secteur de la sante, notamment les autorisations d'ouverture d'etablissements de soins et les agréments professionnels. Cette initiative s'inscrit dans la politique nationale de transformation numerique portee par le ministere de la sante et vise a reduire la bureaucratie qui ralentit le developpement de l'offre de soins prives et publics. La plateforme permettra aux professionnels de sante et aux gestionnaires d'etablissements de soumettre et de suivre leurs dossiers en ligne, reduisant les delais de traitement. Tarkhiss est presentee comme un outil cle pour attirer les investissements dans le secteur medical et dynamiser la couverture sanitaire nationale.","date":"2026-04-09"},
{"title":"Afrobarometre 2026: les Marocains alertent sur les delais et les penuries en sante","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"Le rapport Afrobarometre 2026 revele que de nombreux citoyens marocains expriment une insatisfaction croissante face aux delais d'attente excessifs et aux frequentes penuries de medicaments et de consommables dans les etablissements publics de sante. Ces resultats mettent en lumiere un ecart persistant entre les ambitions affichees par les reformes sanitaires et la realite vecue par les usagers sur le terrain. Le rapport souligne que les populations vulnerables des zones rurales sont les plus touchees par ces dysfonctionnements, creant des inegalites d'acces aux soins. Les donnees sont susceptibles d'alimenter le debat politique et d'accelerer la mise en oeuvre des mesures correctrices dans le cadre de la strategie nationale de sante.","date":"2026-04-09"},
{"title":"Maroc: le gouvernement acheve la rehabilitation de 1400 centres de sante","url":"https://africa24tv.com/maroc-le-gouvernement-acheve-la-rehabilitation-de-1-400-centres-de-sante/","content":"Le Maroc a annonce le 4 avril 2026 l achevement de la rehabilitation de 1400 centres de sante primaires. Investissement de 639 millions de dollars pour moderniser les infrastructures pour 20 millions de citoyens.","date":"2026-04-04"},
{"title":"Le Maroc se refait une sante publique - lancement de Tarkhiss","url":"https://www.maroc-hebdo.com/article/le-maroc-se-refait-une-sante-publique","content":"Le 31 mars 2026, le ministre de la Sante a lance Tarkhiss, une plateforme numerique d homologation utilisant l intelligence artificielle pour securiser et accelerer l homologation des produits de sante.","date":"2026-04-03"},
{"title":"Nadia Fettah: la sante, pilier du modele de developpement","url":"https://www.maroc-hebdo.com/article/nadia-fettah-la-sante-pilier-du-modele-de-developpement","content":"La couverture medicale atteint desormais 88% de la population, soit plus de 32 millions de beneficiaires. Le Maroc mise sur les partenariats public-prive et une industrie pharmaceutique nationale.","date":"2026-04-01"},

"vaccins-monde":[
{"title":"Africa CDC mpox adaptive strategy: vaccines, diagnostics and digital tracking","url":"https://africacdc.org/wp-content/uploads/2024/08/Explainer-Declaration-of-Public-Health-Emergency-of-Continental-Security-EN.pdf","content":"Africa CDC has outlined a multi-pronged adaptive strategy for the mpox public health emergency of continental security, with vaccine research and development, improved diagnostics, and digital case tracking forming the core pillars of the response. The agency is developing contingency plans for potential virus mutations and surge scenarios, integrating real-time monitoring and evaluation to adjust strategies dynamically as the outbreak evolves. Awareness campaigns are being conducted in local languages across radio, television, social media, and digital platforms to reach populations in remote areas with accurate information on symptoms, transmission, and prevention. Africa CDC is also engaging international partners to accelerate the pipeline of mpox vaccine candidates and ensure equitable access across affected countries.","date":"2026-04-11"},
{"title":"Lyon One Health Summit: $250 million secured to advance vaccine and health security in Africa","url":"https://africacdc.org/news-item/africa-cdc-secures-over-us250-million-to-advance-africas-global-health-security-agenda-at-the-lyon-one-health-summit-in-lyon-france/","content":"At the Lyon One Health Summit in France, Africa CDC successfully mobilised over US$250 million in international commitments, with a significant portion earmarked for vaccine access, health security infrastructure, and emergency preparedness across the continent. The EU's contribution of EUR 96.5 million is among the largest single pledges, reflecting growing European engagement with Africa's health sovereignty agenda and the interconnected nature of global pandemic preparedness. These funds are expected to support cold chain development, vaccine manufacturing workforce training, and the strengthening of national immunisation programmes in AU Member States. The outcome of the Summit is seen as a critical step in ensuring that Africa can respond to future health emergencies with reduced dependence on external vaccine supply chains.","date":"2026-04-11"},
{"title":"Africa CDC cross-border framework targets zoonotic disease spillovers to protect vaccine gains","url":"https://www.sciencedirect.com/science/article/pii/S1201971224005095","content":"Africa CDC's continental cross-border surveillance framework addresses the growing threat of zoonotic disease spillovers, which account for 30% of the more than 100 public health events reported annually on the continent and pose a direct risk to immunisation programme continuity. The framework coordinates surveillance data sharing across 50 AU member states and four regional economic communities, enabling faster detection of outbreak events that could disrupt vaccine delivery and erode coverage gains. Technical support from global partners including WHO, US CDC, IOM, and UKHSA was integrated into the framework's development through dedicated working group sessions. By detecting and containing outbreaks earlier, the framework aims to protect populations and preserve the integrity of routine and campaign vaccination activities across Africa.","date":"2026-04-11"},
{"title":"IAVI begins Phase 1 first-in-human trial of Marburg virus vaccine","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"The International AIDS Vaccine Initiative (IAVI) has initiated a Phase 1 clinical trial for a novel Marburg virus vaccine candidate, marking the first time this vaccine has been tested in humans. The trial follows a renewed global urgency around Marburg preparedness after outbreaks in East Africa, including Ethiopia's first-ever Marburg event declared over in January 2026. The vaccine candidate uses an established viral vector platform and will be evaluated for safety and immunogenicity in a small cohort of healthy adult volunteers. Results from this Phase 1 trial are expected to inform decisions on accelerated development pathways, particularly given Marburg's high case fatality rate and its status as a priority pathogen for the WHO R&D Blueprint.","date":"2026-04-10"},
{"title":"WHO World Immunization Week 2026 highlights urgent need for global vaccine equity","url":"https://africacdc.org/news-item/africa-cdc-unveils-a-new-vision-for-health-security-and-sovereignty-across-the-continent/","content":"WHO's World Immunization Week 2026 has spotlighted deepening inequities in vaccine access between high-income and low-income countries, calling on governments and global health institutions to redouble efforts to close immunization gaps. The campaign theme emphasizes collective action and scientific solidarity at a time when political headwinds and funding cuts are threatening routine immunization programs in multiple regions. WHO data indicate that millions of children remain unvaccinated or under-vaccinated against preventable diseases including measles, polio, and pneumococcal disease, with coverage stagnating or declining in fragile states. The agency urged donors to maintain funding commitments and called on countries to integrate vaccination into primary health care reform agendas.","date":"2026-04-10"},
{"title":"Gaza launches third catch-up routine vaccination campaign amid ongoing humanitarian crisis","url":"https://reliefweb.int/updates?list=Africa%20Centres%20for%20Disease%20Control%20and%20Prevention%20%28Africa%20CDC%29%20Updates&advanced-search=%28S50373%29","content":"Gaza has launched its third catch-up routine vaccination campaign in a context of severely disrupted health infrastructure and ongoing conflict, supported by WHO, UNICEF, and partner organizations. The campaign targets children who missed scheduled immunizations due to displacement, facility destruction, and supply chain breakdowns caused by the humanitarian crisis. Health workers conducting the campaign operate under extremely challenging conditions, including restricted movement, fuel shortages, and damage to cold chain facilities. International health agencies have warned that the collapse of routine immunization coverage in conflict zones risks triggering secondary outbreaks of vaccine-preventable diseases, compounding an already catastrophic humanitarian situation.","date":"2026-04-10"},
{"title":"IAVI begins Phase 1 trial of first-in-human Marburg virus vaccine","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"The International AIDS Vaccine Initiative (IAVI) has initiated a Phase 1 first-in-human clinical trial of a candidate vaccine against Marburg virus, a highly lethal hemorrhagic fever pathogen with pandemic potential. The trial, conducted in healthy adult volunteers, aims to assess the safety and immunogenicity of the vaccine candidate, which uses a similar platform to vaccines developed for related filoviruses. The development comes in the wake of a Marburg outbreak in Rwanda that heightened international concern about the virus's potential to spread across borders. If successful, this trial would represent a critical step toward having a licensed Marburg vaccine available for emergency deployment in future outbreaks.","date":"2026-04-09"},
{"title":"WHO: World Immunization Week 2026 highlights global vaccine equity","url":"https://africacdc.org/news-item/africa-cdc-weekly-brief-30-march-5-april-2026/","content":"The World Health Organization launched World Immunization Week 2026 with a focus on closing immunisation gaps exacerbated by the COVID-19 pandemic, conflict and misinformation. WHO data indicate that tens of millions of children remain unvaccinated or under-vaccinated globally, with the highest concentrations in sub-Saharan Africa, South Asia and conflict-affected regions. The campaign highlights the life-saving impact of vaccines against measles, polio, HPV and other preventable diseases, calling on governments and partners to close the coverage gap through sustained funding and community outreach. WHO also used the occasion to call for restored confidence in vaccines among populations affected by hesitancy and disinformation.","date":"2026-04-09"},
{"title":"WHO calls for action: Together for health. Stand with science.","url":"https://www.who.int/news/item/06-04-2026-who-calls-for-action---together-for-health.-stand-with-science.--to-mark-world-health-day","content":"WHO calls on people everywhere to renew their commitment to working together and supporting science. WHO and France G7 Presidency convened a One Health Summit in Lyon from 5-7 April.","date":"2026-04-06"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
renderCategories();
renderArticles();
</script>
