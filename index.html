var articlesData={
"african-cdc":[
{"title":"Africa CDC publie une guidance intérimaire contre les restrictions de voyage blanket face à l'épidémie de Bundibugyo","url":"https://khub.africacdc.org/records/resource/bundibugyo-ebola-virus-disease-bvd-interim-guidance-on-blanket-travel-restrictions-and-public-gatherings","content":"Face à l'épidémie de maladie à virus Bundibugyo (BVD) qui continue d'évoluer en République démocratique du Congo (DRC) et en Ouganda, l'Africa CDC a publié le 9 juin 2026 une guidance intérimaire sur les restrictions de voyage et les rassemblements publics. Se fondant sur les données épidémiologiques au 8 juin 2026 et sur les enseignements tirés des précédentes épidémies d'Ebola en Afrique de l'Ouest, en RDC et en Ouganda, ce document souligne que l'imposition de restrictions de voyage généralisées n'est pas étayée par les données de santé publique et pourrait compromettre la sécurité sanitaire nationale et mondiale. L'Africa CDC encourage plutôt les pays à adopter des mesures basées sur les risques, permettant de contrôler efficacement l'épidémie tout en préservant les voyages essentiels, le commerce et les activités humanitaires.","date":"2026-07-10"},
{"title":"Africa CDC et OMS lancent un plan continental conjoint de réponse à l'Ebola, visant 518 millions USD","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"L'Africa CDC et l'Organisation mondiale de la Santé (OMS) ont officiellement lancé le 5 juin 2026 un plan continental conjoint de préparation et de réponse à l'épidémie d'Ebola causée par le virus Bundibugyo, qui sévit en République démocratique du Congo et en Ouganda. Ce plan de six mois, couvrant la période de juin à novembre 2026, ambitionne de mobiliser 518 millions de dollars pour soutenir les pays africains dans la détection rapide et la riposte à l'épidémie. Selon le Dr Jean Kaseya, Directeur général de l'Africa CDC : « Ebola se propage vite. L'Afrique doit aller encore plus vite. » Le plan adopte une approche dite 'Une seule réponse', englobant la coordination d'urgence, la surveillance épidémiologique, les tests en laboratoire, la prévention des infections, les soins cliniques, l'engagement communautaire et la logistique.","date":"2026-07-10"},
{"title":"Africa CDC holds Special Briefing on Ebola Outbreak Response in DRC and Uganda","url":"https://www.youtube.com/watch?v=lTHfkdTOBEo","content":"Africa CDC held a special weekly briefing on July 9, 2026, dedicated to the latest developments in the Ebola outbreak response in the Democratic Republic of Congo (DRC) and Uganda. The briefing, aligned with the goals of the Africa Health Security and Sovereignty (AHSS) Agenda, highlighted coordinated actions taken by African Union Member States and partners to strengthen prevention, preparedness, detection, and response systems across the continent. The session brought together stakeholders from across time zones to discuss priority public health issues and advance Africa's collective health security posture.","date":"2026-07-10"},
{"title":"Ebola Bundibugyo : le bilan dépasse 600 morts et 1 779 cas confirmés, pire épidémie de l'histoire du continent","url":"https://english.news.cn/20260710/f78f8ac8bc744193bc9945bcca7f11b3/c.html","content":"L'épidémie de maladie à virus Ebola Bundibugyo sévissant en RDC et en Ouganda a franchi le seuil de 600 décès, avec un bilan cumulé de 1 779 cas confirmés et 602 morts, soit un taux de létalité d'environ 34 %. Africa CDC alerte : « Nous continuons à faire face à l'épidémie d'Ebola à la croissance la plus rapide jamais enregistrée sur le continent. » La seule semaine du 3 au 10 juillet 2026 a vu 353 nouveaux cas confirmés en RDC, soit une hausse de 25 % de la charge épidémique du pays en une semaine. Au total, 11 pays africains supplémentaires ont été désignés à haut risque, parmi lesquels le Soudan du Sud, le Rwanda, le Kenya, la Zambie, l'Éthiopie et la Somalie, reflétant la menace d'une propagation régionale imminente.","date":"2026-07-10"},
{"title":"Africa CDC presse la RDC de régler les arriérés de paiement des soignants en grève sur la ligne de front Ebola","url":"https://www.bloomberg.com/news/articles/2026-07-09/africa-cdc-urges-congo-to-pay-striking-ebola-workers","content":"Africa CDC a demandé instamment aux autorités congolaises d'accélérer le paiement des primes dues aux personnels de santé mobilisés contre l'épidémie d'Ebola Bundibugyo, après des grèves déclenchées à Bunia et dans les zones de santé voisines en raison d'indemnités et de salaires impayés. Ces arrêts de travail fragilisent directement la réponse à une épidémie déjà qualifiée d'urgence sanitaire internationale, en réduisant les capacités de surveillance, d'isolement et de traitement des cas dans les zones les plus affectées. Africa CDC souligne que les conditions de travail précaires constituent un frein majeur à la mobilisation et à la rétention des professionnels de santé essentiels dans les zones à haut risque épidémique. Cette crise sociale révèle les tensions structurelles entre les exigences de la réponse épidémique et les contraintes budgétaires des systèmes de santé africains.","date":"2026-07-09"},
{"title":"Africa CDC et WHO AFRO lancent une équipe continentale de soutien à la gestion des incidents de santé publique","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"À Kampala, le 27 juin 2026, Africa CDC et le Bureau régional de l'OMS pour l'Afrique (WHO AFRO) ont officiellement lancé une Équipe continentale de soutien à la gestion des incidents (IMST), en présence du ministre ougandais de la Santé, le Dr Chris Baryomunsi. Cette initiative vise à renforcer le leadership africain dans la réponse aux urgences de santé publique, notamment face à la crise Ebola en cours. Parallèlement, Africa CDC a réuni 13 pays à Kampala pour renforcer la préparation régionale contre le virus Bundibugyo, dans un effort collectif de coordination et de mobilisation des capacités nationales de riposte.","date":"2026-07-09"},
],
"african-medical-agency":[
{"title":"Le lancement de l'Agence Africaine des Médicaments : une révolution pour la régulation pharmaceutique continentale","url":"https://www.nature.com/articles/d44148-025-00350-8","content":"La mise en opération de l'Agence Africaine des Médicaments (AMA) représente une étape décisive pour la régulation pharmaceutique sur le continent africain. L'Agence Européenne des Médicaments (EMA), par la voix de son responsable des affaires internationales Martin Harvey Allchurch, confirme que des financements sont directement orientés vers des projets collaboratifs spécifiques avec l'AMA. Parmi ceux-ci figure un effort conjoint avec l'OMS visant à soutenir le projet pilote de l'AUDA-NEPAD pour la première évaluation et inscription continentale conjointe de médicaments à usage humain — une étape clé dans l'opérationnalisation de l'AMA. Ce mécanisme régional devrait permettre de réduire les délais d'approbation des médicaments en Afrique, d'harmoniser les standards de sécurité et d'ouvrir la voie à un accès plus équitable aux thérapeutiques innovantes pour les populations africaines.","date":"2026-07-05"},
{"title":"EMA renforce sa coopération avec l'AMA : visite de haut niveau à Amsterdam pour consolider le partenariat réglementaire euro-africain","url":"https://techreviewafrica.com/news/6104/african-medicines-agency-enhances-regulatory-cooperation-with-european-medicines-agency","content":"Une délégation de l'Agence Africaine des Médicaments (AMA) a effectué une visite officielle au siège de l'Agence Européenne des Médicaments (EMA) à Amsterdam du 22 au 26 juin 2026 pour approfondir la coopération réglementaire entre les deux institutions. Les échanges ont porté sur le partage de connaissances, l'apprentissage mutuel et les projets pilotes d'évaluation conjointe de médicaments à usage humain menés avec l'AUDA-NEPAD et l'OMS. Cette coopération est d'autant plus stratégique dans le contexte de l'épidémie d'Ebola Bundibugyo, où AMA et EMA ont tenu leur premier engagement scientifique conjoint en juin 2026 pour accélérer l'accès aux contre-mesures médicales. Le partenariat EMA-AMA constitue un modèle de coopération réglementaire Nord-Sud susceptible d'être étendu à d'autres agences du médicament dans le monde.","date":"2026-06-26"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
],
"manufacture-vaccins":[
{"title":"Ebola Bundibugyo sans vaccins ni traitements : l'urgence de la fabrication locale de vaccins en Afrique","url":"https://khub.africacdc.org/records/resource/africa-cdc-ebola-outbreaks-in-drc-and-uganda-weekly-brief-28th-may-2026","content":"Le rapport hebdomadaire d'Africa CDC sur l'épidémie Ebola Bundibugyo en RDC et en Ouganda met en lumière une réalité alarmante : aucun vaccin ni traitement approuvé n'est disponible contre cette souche. Un article associé, publié en juillet 2026 sous le titre « Bundibugyo Ebola Without Vaccines or Therapeutics: Why Public Health Fundamentals Matter More Than Border Closures », souligne que l'absence d'outils biomédicaux spécifiques place les équipes de santé publique dans une position de vulnérabilité extrême. Cette situation relance le débat sur la nécessité d'accélérer la fabrication locale de vaccins en Afrique, et d'intégrer les pathogènes prioritaires du continent dans les agendas industriels pharmaceutiques régionaux.","date":"2026-07-09"},
{"title":"Kenya : Africa CDC signe un accord historique pour son centre régional de coordination en Afrique de l'Est","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Africa CDC a signé un accord de partenariat stratégique avec le gouvernement du Kenya, qui met à disposition 10 acres de terrain et une contribution financière de 2 millions USD pour le Centre régional de coordination de l'Afrique de l'Est, basé à Nairobi. Ce centre, l'un des cinq que compte Africa CDC sur le continent, sera doté prochainement d'un laboratoire régional de référence dont le financement est activement recherché. Le Dr Jean Kaseya a appelé les pays africains à suivre l'exemple du Kenya pour soutenir la production et la surveillance sanitaire continentales.","date":"2026-07-08"},
{"title":"CPHIA 2026 : l'Afrique réunit ses leaders de santé publique à Addis-Abeba pour accélérer l'innovation","url":"https://cphia.africacdc.org","content":"La 5e Conférence internationale sur la santé publique en Afrique (CPHIA 2026) se tiendra à Addis-Abeba, avec comme thématiques phares l'innovation en santé, la fabrication locale de produits médicaux et les technologies de santé africaines. Plus de 30 000 délégués sont attendus pour explorer les solutions de fabrication continentale de vaccins et de médicaments, dans le cadre de la souveraineté sanitaire africaine. Les soumissions d'abstracts et de candidatures aux bourses sont ouvertes jusqu'au 15 août 2026.","date":"2026-07-08"},
],
"unicef-gavi":[
{"title":"Face à Ebola Bundibugyo, UNICEF et Gavi au cœur de la stratégie de préparation épidémique en Afrique","url":"https://www.facebook.com/africacdc/posts/-postponement-notice-weekly-press-briefingthis-weeks-briefing-has-been-postponed/1428976145927422","content":"Alors que l'Africa CDC reorganise sa réponse à l'épidémie d'Ebola Bundibugyo sous l'impulsion de la mission du Président Cyril Ramaphosa, Champion de l'Union africaine pour la prévention, la préparation et la réponse aux pandémies (PPPR), en RDC, des partenaires clés comme l'UNICEF et Gavi intensifient leur soutien opérationnel sur le terrain. Ces organisations contribuent au renforcement des systèmes de santé communautaires, à la chaîne du froid pour les produits médicaux disponibles, à l'éducation sanitaire des populations et à la coordination logistique des interventions d'urgence. La solidarité internationale, rappelée lors du briefing de l'Africa CDC, demeure essentielle face à une épidémie qui ne dispose pas encore de vaccin approuvé.","date":"2026-07-10"},
{"title":"Gavi et UNICEF mobilisés pour soutenir la riposte à l'épidémie d'Ebola en Afrique centrale","url":"https://www.facebook.com/africacdc/videos/special-briefing-on-ebola-outbreak-response-july-9-2026/1574351157729456","content":"Dans le cadre de la réponse à l'épidémie de maladie à virus Bundibugyo en RDC et en Ouganda, les partenaires internationaux dont Gavi, l'Alliance pour les vaccins, et l'UNICEF sont étroitement associés aux efforts de coordination continentale. Ces organisations apportent leur expertise logistique, leur soutien financier et leurs capacités de déploiement rapide pour appuyer les gouvernements affectés. Le briefing spécial de l'Africa CDC du 9 juillet 2026 a réaffirmé l'importance de la solidarité internationale et des partenariats solides dans la lutte contre les épidémies, soulignant que la coordination entre l'Union africaine, l'OMS, Gavi et l'UNICEF constitue la pierre angulaire d'une riposte efficace et équitable pour les communautés à risque.","date":"2026-07-10"},
{"title":"Gavi et UNICEF mobilisés face à la crise vaccinale en Afrique : l'épidémie Ebola révèle les lacunes du système","url":"https://www.infectioncontroltoday.com/view/2026-ebola-outbreak-spreads-central-africa-who-warns-growing-crisis-amid-cdc-usaid-cuts","content":"Alors que l'épidémie d'Ebola Bundibugyo continue de se propager en RDC et en Ouganda avec plus de 513 cas et 130 décès suspects, les organisations internationales dont Gavi et l'UNICEF font face à une pression croissante pour combler le vide laissé par les coupes budgétaires américaines. La réduction de 90 % du financement de l'USAID et le retrait des États-Unis de l'OMS ont sévèrement compromis les efforts de réponse. Dans ce contexte, les partenaires onusiens sont appelés à redoubler d'efforts pour maintenir les programmes de vaccination et de préparation aux épidémies sur le continent africain, en particulier dans les zones de conflit et les corridors commerciaux à haut risque.","date":"2026-07-09"},
{"title":"Mpox en Afrique de l'Est : UNICEF et partenaires intensifient la réponse vaccinale régionale","url":"https://pmc.ncbi.nlm.nih.gov/articles/PMC12887430","content":"Alors que l'épidémie de mpox continue de toucher plusieurs pays d'Afrique de l'Est, dont la RDC et le Rwanda, UNICEF et ses partenaires renforcent leurs interventions pour soutenir la vaccination et la surveillance épidémiologique. Au Rwanda, les premiers cas liés à des voyages en provenance de la RDC ont été détectés dès juillet 2024, avec identification du clade Ib MPXV. Le Centre biomédical du Rwanda (RBC) coordonne la réponse nationale, en lien avec les agences onusiennes pour l'approvisionnement en vaccins et la prise en charge communautaire.","date":"2026-07-08"},
{"title":"Gavi et UNICEF face à l'épidémie Ebola Bundibugyo : mobilisation pour accélérer l'accès aux contre-mesures médicales","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"Dans le contexte de l'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda, Gavi et l'UNICEF sont activement sollicités pour soutenir les efforts de réponse continentale coordonnés par Africa CDC et l'OMS. Le rapport hebdomadaire de renseignement épidémiologique d'Africa CDC (juin 2026) souligne l'urgence d'une mobilisation des partenaires internationaux, dont Gavi et l'UNICEF, pour faciliter l'accès aux produits de santé essentiels, financer la surveillance et renforcer l'engagement communautaire dans les zones touchées. Ces organisations jouent un rôle clé dans la coordination logistique et le financement des interventions vaccinales d'urgence en Afrique subsaharienne.","date":"2026-07-06"},
],
"sante-maroc":[
{"title":"Le Maroc consolide son système de santé publique à l'aune des défis épidémiques continentaux","url":"https://microbiotics.com.ng/africa-cdc-strategic-plan-2022-2026?pdf=4936","content":"Dans un contexte de flambées épidémiques récurrentes sur le continent africain, le Maroc renforce ses dispositifs de veille sanitaire et de réponse aux urgences de santé publique. Le Royaume s'appuie sur son réseau de laboratoires de référence et sur ses partenariats avec des institutions internationales telles qu'Africa CDC et l'OMS pour détecter précocement toute menace épidémique. Le Plan stratégique 2022-2026 d'Africa CDC, qui prévoit un Centre de coordination régional pour l'Afrique du Nord basé au Caire, constitue une opportunité pour le Maroc de renforcer son intégration dans l'architecture continentale de sécurité sanitaire. Les autorités marocaines veillent par ailleurs à maintenir des capacités de prise en charge des maladies à potentiel épidémique importées, dans le respect des Règlements sanitaires internationaux.","date":"2026-07-04"},
{"title":"Budget santé 2026 au Maroc : 42,4 milliards de dirhams, une hausse de 30 % et 8 000 nouveaux postes budgétaires","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le ministère marocain de la Santé et de la Protection sociale dispose en 2026 d'un budget record de 42,4 milliards de dirhams, en hausse de 30 % par rapport à l'exercice précédent, dans le cadre de la réforme structurelle du système national de santé portée par la Vision royale de l'État social. Sur cette enveloppe, 16,4 milliards de dirhams sont dédiés aux dépenses de personnel, avec la création de 8 000 nouveaux postes budgétaires pour renforcer les ressources humaines à tous les niveaux du système de soins. Les investissements prioritaires de 2026 incluent la construction de nouveaux Centres hospitaliers universitaires (CHU), la mise à niveau de 90 hôpitaux existants et le déploiement progressif des Groupements sanitaires territoriaux (GST). D'ici fin 2027, toutes les régions du Maroc, à l'exception de Dakhla-Oued Eddahab, disposeront de leur propre CHU.","date":"2026-07-03"},
{"title":"Réforme de l'état social au Maroc : la santé change d'échelle avec les Groupements sanitaires territoriaux","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"La réforme du secteur de la santé au Maroc entre en 2026 dans une phase décisive avec l'opérationnalisation progressive des Groupements sanitaires territoriaux (GST), nouvelles entités de gouvernance régionale chargées d'intégrer et de coordonner l'ensemble des établissements de santé d'une même région. Cette restructuration vise à mettre fin à la fragmentation du système de soins, à améliorer l'accès aux soins en milieu rural et semi-urbain, et à renforcer la complémentarité entre les secteurs public et privé. Si l'ambition réformatrice est globalement saluée, des résistances subsistent parmi les professionnels de santé face aux changements organisationnels, notamment concernant la mobilité des personnels et la redistribution des compétences entre niveaux de soins. La généralisation de la feuille de soins électronique constitue un autre chantier prioritaire de 2026, visant à simplifier les démarches administratives et améliorer la traçabilité des soins.","date":"2026-07-01"},
],
"vaccins-monde":[
{"title":"Ebola Bundibugyo : l'absence de vaccins approuvés met en alerte la communauté scientifique internationale","url":"https://www.cdc.gov/ebola/situation-summary/returning-travelers.html","content":"Alors que l'épidémie de maladie à virus Bundibugyo continue de s'étendre en RDC et en Ouganda, les autorités sanitaires mondiales tirent la sonnette d'alarme sur l'absence de vaccins ou de traitements spécifiquement approuvés contre cette souche. Le CDC américain a publié le 1er juillet 2026 des recommandations pour les voyageurs en provenance des zones affectées, incluant une surveillance des symptômes pendant 21 jours et un renforcement des contrôles sanitaires aux points d'entrée. La communauté scientifique internationale appelle à une accélération des essais cliniques et du développement de candidats vaccins contre le virus Bundibugyo, soulignant que les vaccins disponibles actuellement ont été développés pour d'autres souches du genre Ebolavirus et n'offrent pas de protection croisée confirmée.","date":"2026-07-10"},
{"title":"OMS et UNICEF : publication des estimations actualisées de couverture vaccinale nationale WUENIC 2025","url":"https://immunizationdata.who.int/","content":"L'OMS et l'UNICEF publient en juillet 2026 les estimations actualisées de couverture vaccinale nationale (WUENIC 2025), données de référence annuelles sur l'état de l'immunisation dans le monde entier, avec un webinaire de présentation des résultats programmé le 15 juillet 2026. Ces statistiques par pays et par antigène orientent les stratégies d'investissement de Gavi, de l'UNICEF et des gouvernements partenaires pour identifier les populations prioritaires en matière de rattrapage vaccinal. Elles constituent le principal outil de suivi des progrès vers les objectifs mondiaux de vaccination et d'élimination des maladies évitables. Dans un contexte de réduction des financements internationaux, ces données sont plus que jamais cruciales pour cibler les ressources disponibles vers les pays et populations les plus vulnérables.","date":"2026-07-07"},
{"title":"OMS : le Comité PDVAC se réunit le 6 juillet 2026 pour définir les priorités mondiales de développement vaccinal","url":"https://www.who.int/news-room/events/detail/2026/07/06/default-calendar/2026-who-product-development-for-vaccines-advisory-committee-meeting-(pdvac)","content":"Le Comité consultatif pour le développement de produits vaccinaux (PDVAC) de l'OMS tient sa réunion annuelle le 6 juillet 2026 pour examiner les priorités mondiales en matière de R&D vaccinale, notamment les candidats-vaccins contre le virus Bundibugyo, la dengue, le paludisme et d'autres pathogènes prioritaires. Ce comité d'experts indépendants — virologues, immunologistes et spécialistes de santé publique — formule des recommandations sur les technologies vaccinales à prioriser, les essais cliniques à soutenir et les mécanismes d'accès équitable. Dans le contexte de la crise Ebola Bundibugyo, le PDVAC joue un rôle critique pour guider les investissements en R&D et accélérer le développement de contre-mesures médicales adaptées à ce virus pour lequel aucun vaccin homologué n'existe à ce jour. Ses recommandations orienteront les stratégies d'investissement des grandes institutions mondiales de santé pour les années à venir.","date":"2026-07-06"},
{"title":"Africa CDC lance la 5e Conférence internationale sur la santé publique en Afrique (CPHA 2026)","url":"https://www.youtube.com/watch?v=0m1yPcfq680","content":"L'Africa CDC et le gouvernement éthiopien s'apprêtent à lancer officiellement la 5e Conférence internationale sur la santé publique en Afrique (CPHA 2026), décrite comme le plus grand événement de santé publique du continent. Lors d'un briefing spécial diffusé le 7 mai 2026, les responsables de l'Africa CDC ont annoncé que la vaccination contre le mpox et d'autres activités de surveillance figurent parmi les priorités opérationnelles de l'organisation. Par ailleurs, 13 pays africains se sont réunis à Brazzaville, au siège du bureau régional de l'OMS pour l'Afrique, pour signer un mémorandum d'entente visant à renforcer la surveillance transfrontalière et la préparation aux épidémies, une initiative susceptible de transformer la réponse vaccinale et épidémiologique dans les régions d'Afrique centrale, orientale, septentrionale, méridionale et occidentale.","date":"2026-07-03"},
],
};
function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
