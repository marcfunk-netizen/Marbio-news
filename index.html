var articlesData={
"african-cdc":[
{"title":"Essai clinique PARTNERS : premier test de traitements contre l'Ebola Bundibugyo avec MBP134 et remdésivir en RDC","url":"https://www.who.int/news/item/02-07-2026-patient-enrolment-begins-in-a-scientific-trial-to-identify-the-first-effective-treatments-for-bundibugyo-virus-disease","content":"Le 2 juillet 2026, l'OMS a annoncé l'ouverture des inscriptions pour l'essai clinique PARTNERS (Platform Adaptive Randomised Trial for New and Repurposed Filovirus Treatments) en République Démocratique du Congo, premier essai jamais réalisé pour identifier des traitements efficaces contre la maladie à virus Bundibugyo (BVD). Deux antiviraux sont évalués en monothérapie ou en combinaison : l'anticorps monoclonal MBP134 et le remdésivir, comparés aux soins de soutien optimisés seuls. L'essai, susceptible de recruter jusqu'à 1 200 patients, survient alors que l'épidémie totalise 1 561 cas confirmés et 506 décès en RDC au 5 juillet 2026 — la flambée la plus importante jamais causée par ce sérotype viral. Aucun traitement homologué n'existe pour le virus Bundibugyo, contrairement aux outils thérapeutiques disponibles contre le virus Ebola Zaïre. Africa CDC et l'OMS saluent ce lancement comme une étape décisive vers la maîtrise biomédicale de la crise.","date":"2026-07-02"},
{"title":"Point épidémique Ebola Bundibugyo au 5 juillet 2026 : 1 561 cas confirmés et 506 décès en RDC, stabilisation en Ouganda","url":"https://www.who.int/emergencies/situations/ebola-outbreak---drc-2026","content":"Au 5 juillet 2026, la République Démocratique du Congo enregistre 1 561 cas confirmés et 506 décès dus à la maladie à virus Ebola Bundibugyo, selon le bulletin conjoint d'Africa CDC et de l'OMS. Le 4 juillet, 33 nouveaux cas confirmés dont 6 décès ont été rapportés en une seule journée dans les provinces d'Ituri et du Nord-Kivu, confirmant la dynamique active de la transmission. En Ouganda, la situation est plus favorable : 20 cas confirmés et 2 décès au total, sans nouveau cas signalé depuis le 21 juin 2026. L'épidémie, déclarée Urgence de Santé Publique de Portée Internationale (USPPI) par l'OMS et Urgence de Sécurité Sanitaire Continentale (PHECS) par Africa CDC, mobilise un plan de réponse conjoint de 518 millions USD pour juin-novembre 2026. La province de l'Ituri reste l'épicentre principal, avec des taux de létalité variables selon les zones de santé.","date":"2026-07-05"},
{"title":"Africa CDC avance sur la gouvernance numérique en santé : harmonisation des standards de données pour 55 États membres","url":"https://www.facebook.com/africacdc/videos/africa-cdc-advances-digital-health-governance-in-africa-last-week-africa-cdc-con/1177631030931657/","content":"Africa CDC a franchi une nouvelle étape dans la transformation numérique de la santé publique africaine en lançant une initiative continentale de gouvernance du numérique en santé, réunissant des représentants de haut niveau des États membres, d'organisations régionales et de partenaires technologiques. Les travaux ont porté sur l'harmonisation des standards de données de santé, le renforcement de l'interopérabilité des systèmes d'information sanitaires et l'accélération du déploiement de plateformes de surveillance épidémiologique en temps réel. Cette démarche s'inscrit dans la vision stratégique du Dr Jean Kaseya visant à faire de l'Afrique un acteur souverain dans la gestion de ses propres données de santé publique, réduisant la dépendance aux infrastructures numériques extérieures. La digitalisation de la surveillance est identifiée comme un outil clé pour détecter plus rapidement les émergences infectieuses, à l'image de la flambée à virus Bundibugyo où des retards de signalement ont compliqué la réponse initiale. La feuille de route numérique d'Africa CDC vise à interconnecter les systèmes de surveillance des 55 États membres d'ici 2028.","date":"2026-07-04"},
{"title":"Africa CDC renforce son ancrage régional : accord historique avec le Kenya pour le Centre de coordination Est-africain","url":"https://www.youtube.com/watch?v=WY-lk_JZOig","content":"Lors d'un briefing spécial tenu le 30 avril 2026, Africa CDC a annoncé la signature d'un mémorandum d'entente (MOU) majeur avec le gouvernement du Kenya en marge du Sommet mondial de la santé de Nairobi. Le gouvernement kenyan s'engage à allouer 10 acres de terrain pour accueillir le Centre de Coordination Régional (RCC) d'Africa CDC pour l'Afrique de l'Est, et à contribuer financièrement à hauteur de 2 millions de dollars. Africa CDC opère désormais à travers cinq centres régionaux : Nairobi (Afrique de l'Est), Lagos/Nigeria (Afrique de l'Ouest), Libreville/Gabon (Afrique Centrale), Lusaka/Zambie (Afrique Australe) et Le Caire/Égypte (Afrique du Nord). Le DG Dr Kaseya a salué l'initiative kenyane comme un modèle de soutien souverain que d'autres nations africaines sont encouragées à suivre pour renforcer l'autonomie sanitaire du continent.","date":"2026-07-06"},
{"title":"Africa CDC et l'OMS lancent un plan continental conjoint de réponse à l'Ebola, doté de 518 millions USD","url":"https://www.emjreviews.com/microbiology-infectious-diseases/news/africa-cdc-and-who-launch-joint-continental-ebola-response-plan","content":"Le 5 juin 2026, Africa CDC et l'Organisation Mondiale de la Santé ont officiellement lancé un plan continental conjoint de préparation et de riposte face à l'épidémie d'Ebola causée par le virus Bundibugyo, qui sévit en République Démocratique du Congo et en Ouganda. Ce plan de six mois, couvrant la période de juin à novembre 2026, adopte une approche 'Une seule réponse' (One Response) et vise à mobiliser 518 millions de dollars USD. Il rassemble gouvernements, partenaires et communautés autour de piliers essentiels : coordination d'urgence, surveillance épidémiologique, tests de laboratoire, prévention des infections, soins cliniques, engagement communautaire et logistique. Le Directeur Général d'Africa CDC, Dr Jean Kaseya, a déclaré : « Ebola se propage vite. L'Afrique doit agir encore plus vite. Ce plan conjoint offre au continent une voie claire pour agir avec rapidité et unité. »","date":"2026-07-06"},
{"title":"Africa CDC postpones weekly press briefing for DRC Ebola solidarity mission","url":"https://www.facebook.com/africacdc/posts/-postponement-notice-weekly-press-briefingthis-weeks-briefing-has-been-postponed/1428976145927422","content":"Africa CDC a annoncé le report de son point de presse hebdomadaire habituel, en raison de l'organisation d'une mission de solidarité en République Démocratique du Congo. Le Champion de l'Union Africaine pour la Prévention, la Préparation et la Réponse aux Pandémies (PPPR), S.E. le Président Cyril Ramaphosa, se rend en RDC pour soutenir la réponse à la flambée épidémique d'Ebola en cours. Le briefing de presse reprendra le jeudi 9 juillet 2026. Cette mobilisation au plus haut niveau illustre l'engagement renouvelé des institutions africaines face à une crise sanitaire qui continue de menacer la région.","date":"2026-07-06"},
{"title":"CPHIA 2026 : Addis-Abeba accueillera la 5e Conférence Internationale sur la Santé Publique en Afrique","url":"https://cphia.africacdc.org","content":"La 5e édition de la Conférence Internationale sur la Santé Publique en Afrique (CPHIA 2026) se tiendra à Addis-Abeba, capitale diplomatique du continent africain et siège de l'Union Africaine. L'événement réunira plus de 30 000 délégués, chefs d'État, ministres, chercheurs et innovateurs du monde entier. Le Directeur Général de l'Africa CDC, le Dr Jean Kaseya, figurera parmi les orateurs principaux. Les thématiques centrales incluront le leadership africain dans l'architecture mondiale de la santé, l'institutionnalisation de la prévention et préparation aux pandémies, ainsi que la résilience climatique et la sécurité sanitaire. Les appels à résumés, événements parallèles et expositions sont ouverts jusqu'au 15 août 2026. Des bourses de voyage sont également disponibles pour les chercheurs souhaitant présenter leurs travaux.","date":"2026-07-05"},
{"title":"Africa CDC réunit 13 pays à Kampala pour renforcer la préparation régionale contre le virus Bundibugyo","url":"https://reliefweb.int/updates?list=Africa+Centres+for+Disease+Control+and+Prevention+%28Africa+CDC%29+Updates&advanced-search=%28S50373%29","content":"Kampala, Ouganda – L'Africa CDC a rassemblé représentants de 13 pays lors d'une réunion stratégique à Kampala afin de renforcer la préparation régionale face à la flambée de maladie à virus Bundibugyo. En parallèle, l'Africa CDC et l'OMS AFRO ont lancé conjointement une Équipe Continentale de Soutien à la Gestion des Incidents, destinée à consolider le leadership africain dans la réponse aux urgences de santé publique. Un atelier de cinq jours réunissant des gestionnaires de programmes issus de neuf États membres de l'Union Africaine a également permis de renforcer les capacités techniques et opérationnelles pour faire face à l'épidémie. Ces initiatives s'inscrivent dans une stratégie continentale coordonnée couvrant la période juin-novembre 2026, dotée d'un budget de 518 millions de dollars.","date":"2026-07-05"},
{"title":"OMS et Africa CDC déclarent l'épidémie d'Ebola Bundibugyo urgence sanitaire mondiale et continentale","url":"https://khub.africacdc.org/records/resource/who-and-africa-cdc-declare-the-2026-ebola-disease-outbreak-a-public-health-emergency","content":"L'épidémie de maladie à virus Ebola Bundibugyo (Orthoebolavirus bundibugyoense) sévissant en République Démocratique du Congo et en Ouganda a été déclarée Urgence de Santé Publique de Portée Internationale (USPPI) par l'OMS, et Urgence de Santé Publique de Sécurité Continentale (PHECS) par l'Africa CDC. Cette double déclaration marque un tournant historique vers la souveraineté sanitaire africaine et une gouvernance continentale renforcée. L'Africa CDC a déployé une Équipe de Soutien à la Gestion des Incidents (IMST) pour unifier gouvernements, agences techniques, bailleurs, ONG et acteurs humanitaires sous un cadre coordonné : « Une équipe, un plan, un budget, un cadre de suivi-évaluation ». Les priorités de réponse incluent la détection rapide, la prévention des infections, l'engagement communautaire et l'accélération de la recherche sur les vaccins et thérapeutiques contre le virus Bundibugyo.","date":"2026-07-05"},
],
"african-medical-agency":[
{"title":"WHO and African Medicines Agency sign landmark Framework Agreement to strengthen access to quality-assured health products in Africa","url":"https://www.who.int/news/item/21-05-2026-who-and-african-medicines-agency-launch-landmark-framework-to-strengthen-access-to-quality-assured-health-products-in-africa","content":"On 21 May 2026, the World Health Organization (WHO) and the African Medicines Agency (AMA) signed a landmark Framework Agreement for Collaboration, establishing a historic partnership to strengthen regulatory systems and improve access to safe, effective and quality-assured health products across Africa. The agreement covers joint priorities including accelerating health product access, promoting regulatory harmonization across the continent, strengthening pharmacovigilance and response to substandard and falsified products, building regulatory workforce capacity, and supporting local production during public health emergencies. A key pillar of the collaboration is a pilot project for the first joint continental assessment and registration of medicines for human use, co-developed with AUDA-NEPAD — a process that could reduce approval timelines from years to months for African manufacturers. The framework is particularly critical in the context of the Ebola Bundibugyo outbreak, where rapid regulatory pathways for diagnostics and therapeutics are urgently needed. WHO Regional Director for Africa Dr Matshidiso Moeti described the agreement as a transformative step toward Africa-led regulatory sovereignty.","date":"2026-05-21"},
{"title":"African Medicines Agency and US Pharmacopeia sign MOU to strengthen medicines quality and regulation across Africa","url":"https://www.cleanroomtechnology.com/african-medicines-agency-and-usp-sign-agreement-to","content":"The African Medicines Agency (AMA) and the US Pharmacopeia (USP) formalized a strategic Memorandum of Understanding in Johannesburg on 29 April 2026, committing both organizations to strengthen medicines regulation, quality assurance and pharmaceutical manufacturing systems across the continent. The partnership aims to advance the availability of pharmaceutical reference standards and technical resources needed for quality testing of medicines produced or imported into African markets — a critical step in combating substandard and falsified products estimated to claim 122,000 lives per year among under-5 children in sub-Saharan Africa. USP will provide technical support to AMA regulatory harmonization processes and capacity-building programmes for national medicines regulatory authorities across the 55 African Union member states. This collaboration reinforces Africa regulatory infrastructure at a critical time: as more manufacturers establish local production capacity, robust quality assurance frameworks are essential to ensure patient safety and market confidence. The MOU builds on AMA Foundation Phase achievements (2024-2025) and positions both institutions strategically for the Expansion Phase (2026-2030).","date":"2026-04-29"},
{"title":"L'Agence Africaine des Médicaments : perspective historique et prospects futurs — analyse publiée dans Frontiers in Medicine","url":"https://www.frontiersin.org/journals/medicine/articles/10.3389/fmed.2026.1763261/full","content":"Une analyse de référence publiée dans Frontiers in Medicine en 2026 retrace les origines historiques, l'évolution institutionnelle et les perspectives futures de l'Agence Africaine des Médicaments (AMA), fournissant l'évaluation académique la plus exhaustive à ce jour de cet organe réglementaire continental majeur. L'étude trace le parcours de l'AMA depuis la Déclaration d'Abuja de 2001 et le Traité de 2019, à travers sa Phase Fondatrice (2024-2025), et projette la feuille de route pour la Phase d'Expansion (2026-2030) et la Phase de Maturité (2031 et au-delà). Les défis clés identifiés incluent le financement pérenne, le recrutement de scientifiques réglementaires qualifiés, et l'harmonisation de cadres réglementaires divergents entre 55 États membres de l'Union Africaine. Les auteurs concluent que l'AMA représente l'effort africain le plus ambitieux de souveraineté réglementaire, avec le potentiel de transformer le continent d'un consommateur passif de médicaments mondiaux en architecte actif de son propre écosystème de produits de santé.","date":"2026-06-15"},
{"title":"Le lancement de l'Agence Africaine des Médicaments : une révolution pour la régulation pharmaceutique continentale","url":"https://www.nature.com/articles/d44148-025-00350-8","content":"La mise en opération de l'Agence Africaine des Médicaments (AMA) représente une étape décisive pour la régulation pharmaceutique sur le continent africain. L'Agence Européenne des Médicaments (EMA), par la voix de son responsable des affaires internationales Martin Harvey Allchurch, confirme que des financements sont directement orientés vers des projets collaboratifs spécifiques avec l'AMA. Parmi ceux-ci figure un effort conjoint avec l'OMS visant à soutenir le projet pilote de l'AUDA-NEPAD pour la première évaluation et inscription continentale conjointe de médicaments à usage humain — une étape clé dans l'opérationnalisation de l'AMA. Ce mécanisme régional devrait permettre de réduire les délais d'approbation des médicaments en Afrique, d'harmoniser les standards de sécurité et d'ouvrir la voie à un accès plus équitable aux thérapeutiques innovantes pour les populations africaines.","date":"2026-07-05"},
{"title":"EMA renforce sa coopération avec l'AMA : visite de haut niveau à Amsterdam pour consolider le partenariat réglementaire euro-africain","url":"https://techreviewafrica.com/news/6104/african-medicines-agency-enhances-regulatory-cooperation-with-european-medicines-agency","content":"Une délégation de l'Agence Africaine des Médicaments (AMA) a effectué une visite officielle au siège de l'Agence Européenne des Médicaments (EMA) à Amsterdam du 22 au 26 juin 2026 pour approfondir la coopération réglementaire entre les deux institutions. Les échanges ont porté sur le partage de connaissances, l'apprentissage mutuel et les projets pilotes d'évaluation conjointe de médicaments à usage humain menés avec l'AUDA-NEPAD et l'OMS. Cette coopération est d'autant plus stratégique dans le contexte de l'épidémie d'Ebola Bundibugyo, où AMA et EMA ont tenu leur premier engagement scientifique conjoint en juin 2026 pour accélérer l'accès aux contre-mesures médicales. Le partenariat EMA-AMA constitue un modèle de coopération réglementaire Nord-Sud susceptible d'être étendu à d'autres agences du médicament dans le monde.","date":"2026-06-26"},
{"title":"L'AMA lance un appel à experts pour rejoindre ses Comités Techniques : candidatures closes le 18 juin 2026","url":"https://www.nepad.org/tenders/expression-of-interest-africa-medicine-agency-ama-technical-committees","content":"L'Agence Africaine des Médicaments (AMA) a publié le 11 mai 2026 un appel ouvert à manifestation d'intérêt destiné à recruter des experts pour siéger au sein de ses Comités Techniques. La date limite de soumission des candidatures était fixée au 18 juin 2026. Les experts sélectionnés sont appelés à servir en qualité d'experts indépendants, dans l'intérêt de l'Union africaine et de la santé publique du continent. Les candidatures devaient être transmises électroniquement à l'adresse officielle de l'AMA. Seuls les candidats présélectionnés seront contactés. Cette initiative s'inscrit dans le cadre des efforts de l'AMA pour structurer ses organes scientifiques et renforcer la régulation des médicaments à l'échelle continentale.","date":"2026-06-26"},
],
"manufacture-vaccins":[
{"title":"Africa moves ahead with vaccine manufacturing ambitions: Gavi set to make first cash disbursements through AVMA to an African producer","url":"https://www.semafor.com/article/07/02/2026/africa-moves-ahead-with-vaccine-manufacturing-ambitions","content":"In a landmark development reported by Semafor on 2 July 2026, Gavi, the Vaccine Alliance, is making its first-ever cash disbursements to an African vaccine manufacturer through the African Vaccine Manufacturing Accelerator (AVMA), marking a turning point in the continent drive toward local production. Africa currently produces less than 1% of all vaccines consumed on the continent, against an African Union target of 60% local production by 2040. South Africa Biovac has secured backing from the International Finance Corporation, the European Investment Bank, and the European Commission to support end-to-end vaccine manufacturing — one of the most significant financing packages for an African vaccine producer to date. A Clinton Health Access Initiative (CHAI) 2026 landscape report documents five persistent challenges slowing near-to-market manufacturers: regulatory bottlenecks, uncertain market demand, slow financing disbursement, technology transfer delays, and skilled workforce gaps. Eleven African-made vaccines covering eight antigens, including measles-rubella, rotavirus, and yellow fever, are expected to reach the continental market within five years.","date":"2026-07-02"},
{"title":"EVA Pharma (Egypte) établit la première plateforme africaine de production de vaccins ARNm de bout en bout","url":"https://onlinelibrary.wiley.com/doi/full/10.1002/hsr2.71926","content":"EVA Pharma en Égypte, en partenariat avec des biotechs européennes, a établi la première plateforme africaine de production de vaccins ARNm de type digital-to-biologics de bout en bout, une avancée technologique majeure pour la souveraineté vaccinale du continent. La plateforme intégrée, documentée dans une revue narrative publiée dans Health Science Reports (Wiley, 2026), couvre l'intégralité de la chaîne de fabrication — de la conception in silico des séquences au produit biologique final — permettant une adaptation rapide à de nouvelles cibles pathogènes et réduisant la dépendance aux chaînes d'approvisionnement étrangères. L'Égypte et l'Afrique du Sud représentent actuellement les principaux producteurs de substance active médicamenteuse (DS) autonomes sur le continent, aux côtés de l'Éthiopie, de l'Algérie et du Sénégal. Ce développement est particulièrement stratégique dans le contexte de l'épidémie Ebola Bundibugyo, où l'absence de vaccins ou thérapeutiques localement produits expose la vulnérabilité structurelle de l'Afrique face aux pathogènes émergents. Cet atout technologique pourrait constituer l'infrastructure centrale de la préparation africaine aux pandémies futures.","date":"2026-06-20"},
{"title":"Rapport CHAI 2026 sur le paysage de fabrication africaine de vaccins : avancées documentées face à des défis systémiques persistants","url":"https://www.clintonhealthaccess.org/report/african-vaccine-manufacturing-supply-landscape-2026/","content":"La Clinton Health Access Initiative (CHAI) a publié son rapport de référence 2026 sur le Paysage d'Approvisionnement en Vaccins Fabriqués en Afrique, fournissant la cartographie la plus actualisée des capacités de production vaccinale à l'échelle du continent. L'Éthiopie, l'Algérie, l'Égypte, l'Afrique du Sud et le Sénégal sont identifiés comme les pays disposant de capacités autonomes de fabrication de substance active, tandis que moins de 1% de l'ensemble des vaccins consommés en Afrique sont actuellement produits localement. Cinq défis transversaux majeurs ont déjà repoussé les calendriers des fabricants proches du marché : goulots d'étranglement réglementaires, signaux de demande incertains des programmes nationaux de vaccination, lenteur des décaissements financiers, retards des partenaires de transfert technologique, et lacunes persistantes en main-d'oeuvre qualifiée. Le rapport recommande des engagements de marché renforcés de l'Union Africaine, des voies réglementaires accélérées via l'AMA, et un investissement accru dans les formations en biofabrication pour atteindre l'objectif de 60% de production locale d'ici 2040.","date":"2026-07-01"},
{"title":"Fabrication de vaccins contre l'Ebola Bundibugyo : un défi urgent pour l'industrie pharmaceutique africaine","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report","content":"L'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda met en lumière un vide industriel criant : il n'existe à ce jour aucun vaccin ni traitement thérapeutique homologué spécifiquement contre ce sérotype viral. Africa CDC souligne dans ses rapports de situation que l'absence de contre-mesures médicales oblige les équipes de terrain à s'appuyer exclusivement sur les fondamentaux de la santé publique — surveillance, isolement, traçage des contacts et prévention des infections — plutôt que sur des outils biomédicaux. Cette situation relance le débat sur la nécessité d'accélérer les investissements en R&D et en capacités de fabrication locales pour des vaccins contre les filovirus négligés. Des appels ont été lancés auprès des partenaires industriels et des gouvernements africains pour financer le développement et la production à l'échelle continentale.","date":"2026-07-06"},
{"title":"Africa CDC publie une feuille de route pour l'autosuffisance africaine en matière de fabrication de vaccins","url":"https://khub.africacdc.org/records/resource/africa-cdc-who-launch-of-the-continental-preparedness-and-response-plan-for-ebola","content":"Dans le cadre de sa réponse à la crise sanitaire provoquée par le virus Bundibugyo, l'Africa CDC a mis en avant l'urgence de développer des capacités locales de fabrication vaccinale sur le continent. Un document stratégique récemment publié, intitulé « Operationalizing African self-reliance in vaccine manufacturing », souligne la nécessité pour l'Afrique de réduire sa dépendance vis-à-vis des producteurs extérieurs, en particulier face aux nouvelles menaces épidémiques comme la maladie à virus Ebola Bundibugyo. Parmi les leviers identifiés figurent l'accélération des transferts de technologie, le renforcement des infrastructures de production locale, et le soutien institutionnel aux fabricants africains émergents. Cette ambition s'inscrit dans le plan continental de réponse à l'épidémie, doté de 518 millions de dollars, qui intègre explicitement la recherche et le développement de vaccins candidats comme priorité opérationnelle.","date":"2026-07-05"},
{"title":"Projections de scénarios modélisés pour la flambée d'Ebola à virus Bundibugyo 2026 : quelles implications pour la production de contre-mesures médicales ?","url":"https://www.cdc.gov/mmwr/volumes/75/wr/mm7522e1.htm","content":"Une étude publiée dans le MMWR présente des projections de scénarios modélisés pour la flambée de maladie à virus Bundibugyo (BVD) en 2026, adaptée d'un modèle utilisé lors de précédentes épidémies de fièvres hémorragiques virales, dont la flambée de Marburg en Éthiopie en 2025. Les simulations, initialisées à partir d'un seul cas index, évaluent le nombre cumulatif de cas et de décès sur une période de 90 jours suivant le début des interventions. Ces modélisations sont cruciales pour les décideurs de santé publique et les fabricants de vaccins et de thérapeutiques, car elles permettent d'anticiper les besoins en doses, d'optimiser les chaînes d'approvisionnement et de prioriser la production de contre-mesures médicales adaptées au virus Bundibugyo, pour lequel les stocks de vaccins expérimentaux demeurent extrêmement limités.","date":"2026-07-04"},
{"title":"Ebola Bundibugyo 2026 : l'absence de vaccins validés relance le débat sur la production locale en Afrique","url":"https://khub.africacdc.org","content":"La flambée de maladie à virus Bundibugyo en RDC et en Ouganda met en lumière un déficit critique dans la fabrication mondiale de vaccins : il n'existe à ce jour aucun vaccin ni traitement validé contre le virus Bundibugyo (Orthoebolavirus bundibugyoense). L'Africa CDC et l'OMS appellent à une accélération urgente des efforts de recherche et développement ainsi que de la production de candidats-vaccins. Ce contexte remet sur la table la nécessité pour l'Afrique de développer ses propres capacités de fabrication vaccinale, un objectif central de l'agenda « santé, sécurité et souveraineté » porté par le Directeur général de l'Africa CDC, le Dr Jean Kaseya. La dépendance aux marchés pharmaceutiques occidentaux, guidés par des logiques d'incitation commerciale plutôt qu'épidémiologiques, est pointée du doigt comme une faille structurelle majeure du système mondial de sécurité sanitaire.","date":"2026-07-03"},
],
"unicef-gavi":[
{"title":"Gavi et UNICEF annoncent un accord de prix équitable pour le vaccin antipaludique afin de protéger 7 millions d'enfants supplémentaires","url":"https://www.unicef.org/press-releases/gavi-and-unicef-announce-equitable-pricing-deal-malaria-vaccine-protect-7-million","content":"Gavi et l'UNICEF ont annoncé un accord de prix équitable pour le vaccin antipaludique permettant à 7 millions d'enfants supplémentaires de bénéficier d'une protection complète contre l'un des principaux fléaux du continent africain d'ici la fin de la décennie. Cet accord fait suite au succès extraordinaire du programme de vaccination antipaludique, qui a délivré plus de 52 millions de doses depuis 2023 dans les contextes les plus vulnérables, contribuant à une réduction de 32% des cas de paludisme entre 2024 et 2025 et à une quasi-division par deux des décès liés au paludisme chez les enfants de moins de cinq ans. Le mécanisme de prix équitable s'appuie sur l'expertise d'approvisionnement de l'UNICEF et les financements de Gavi pour garantir que les pays à plus faibles revenus puissent accéder à la vaccination complète sans compromettre leurs autres priorités d'immunisation nationale. La stratégie Phase 6 de Gavi (2026-2030) cible la vaccination de plus de 500 millions d'enfants supplémentaires tout en intensifiant l'AVMA pour sécuriser l'approvisionnement régional en vaccins antipaludiques. L'OMS, l'UNICEF et Gavi confirment que la vaccination antipaludique est désormais un pilier central de la stratégie africaine de santé infantile.","date":"2026-07-04"},
{"title":"La couverture vaccinale mondiale stagne : plus de 14 millions de nourrissons restent sans aucun vaccin selon les estimations OMS-UNICEF 2026","url":"https://www.unicef.org/press-releases/global-childhood-vaccination-holds-steady-yet-over-14-million-infants-remain","content":"Les estimations annuelles 2026 de la couverture vaccinale de l'OMS et de l'UNICEF révèlent une image mondiale contrastée : la couverture infantile s'est globalement stabilisée après les disruptions liées à la COVID-19, mais plus de 14 millions de nourrissons dans le monde ne reçoivent toujours aucune dose vaccinale, la majorité se concentrant en Afrique subsaharienne et en Asie du Sud. Ces données soulignent l'urgence de la stratégie Phase 6 de Gavi (2026-2030) ciblant 500 millions d'enfants supplémentaires, et des initiatives de rattrapage massif de l'UNICEF : la Grande Initiative de Rattrapage (BCU), clôturée en mars 2026, avait déjà atteint 18,3 millions d'enfants non vaccinés avec plus de 100 millions de doses dans 36 pays. Trois facteurs structurels alimentent les lacunes persistantes d'immunisation : les conflits et la fragilité des systèmes de santé, les déficits de financement aux niveaux national et des bailleurs, et les faiblesses des systèmes de santé dans la vaccination du dernier kilomètre. L'OMS et l'UNICEF appellent tous les acteurs à maintenir et amplifier leurs investissements en immunisation, avertissant que chaque enfant non vacciné représente un décès évitable et un risque de résurgence des maladies.","date":"2026-07-05"},
{"title":"Gavi et UNICEF face à l'épidémie Ebola Bundibugyo : mobilisation pour accélérer l'accès aux contre-mesures médicales","url":"https://khub.africacdc.org/records/resource/epidemic-intelligence-weekly-report-6","content":"Dans le contexte de l'épidémie d'Ebola causée par le virus Bundibugyo en RDC et en Ouganda, Gavi et l'UNICEF sont activement sollicités pour soutenir les efforts de réponse continentale coordonnés par Africa CDC et l'OMS. Le rapport hebdomadaire de renseignement épidémiologique d'Africa CDC (juin 2026) souligne l'urgence d'une mobilisation des partenaires internationaux, dont Gavi et l'UNICEF, pour faciliter l'accès aux produits de santé essentiels, financer la surveillance et renforcer l'engagement communautaire dans les zones touchées. Ces organisations jouent un rôle clé dans la coordination logistique et le financement des interventions vaccinales d'urgence en Afrique subsaharienne.","date":"2026-07-06"},
{"title":"Ebola Bundibugyo : UNICEF et Gavi mobilisés pour soutenir la réponse vaccinale en RDC et en Ouganda","url":"https://khub.africacdc.org/health-topics/surveillance","content":"Face à la progression de l'épidémie de maladie à virus Ebola Bundibugyo en République Démocratique du Congo et en Ouganda, les partenaires internationaux dont l'UNICEF et Gavi sont appelés à jouer un rôle crucial dans la chaîne d'approvisionnement en vaccins candidats et dans le soutien logistique aux systèmes de santé affectés. Les rapports situationnels de l'Africa CDC font état de défis persistants en matière de surveillance, de gestion des cas et de prévention des infections, notamment dans la province de l'Ituri, épicentre de l'épidémie. La mobilisation de ressources pour la vaccination de riposte, la formation des agents de santé communautaire et la communication sur les risques constituent des axes prioritaires d'intervention pour ces organisations, dans un contexte où les taux de létalité varient significativement selon les provinces et zones de santé touchées.","date":"2026-07-05"},
{"title":"UNICEF et Gavi lancent un appel aux fabricants pour accélérer l'accès aux vaccins contre l'Ebola Bundibugyo","url":"https://www.unicef.org/press-releases/unicef-and-gavi-launch-call-manufacturers-support-accelerated-access-bundibugyo","content":"UNICEF et Gavi, l'Alliance du vaccin, ont lancé conjointement un appel urgent aux fabricants pharmaceutiques mondiaux pour accélérer l'accès à des vaccins contre le virus Bundibugyo Ebolavirus, en réponse à l'épidémie dévastatrice qui frappe la RDC et l'Ouganda depuis mai 2026. Cet appel vise à identifier des candidats-vaccins en développement susceptibles de bénéficier d'un financement accéléré et d'un soutien réglementaire pour atteindre rapidement les populations à risque. UNICEF assurera la coordination logistique et la chaîne du froid pour le déploiement des vaccins candidats, tandis que Gavi mobilisera les financements nécessaires à l'acquisition et à la distribution équitable. Cette initiative illustre le rôle central des deux organisations dans la préparation et la réponse aux épidémies émergentes en Afrique.","date":"2026-07-01"},
{"title":"Gavi Phase 6 (2026-2030) : vacciner plus de 500 millions d'enfants et sauver 8 à 9 millions de vies","url":"https://www.gavi.org/our-alliance/strategy/phase-6-2026-2030","content":"Gavi, l'Alliance du vaccin, a lancé sa 6e phase stratégique (2026-2030), la plus ambitieuse de son histoire : vacciner plus de 500 millions d'enfants et adolescents supplémentaires dans les pays les plus pauvres du monde, avec l'objectif de sauver 8 à 9 millions de vies, dont 1,5 million grâce au seul déploiement du vaccin contre le papillomavirus humain (HPV). Depuis 2023, plus de 52 millions de doses de vaccin anti-paludéen ont été administrées, contribuant à une baisse de 32 % des cas de paludisme entre 2024 et 2025 et à une quasi-réduction de moitié des décès liés au paludisme chez les enfants de moins de cinq ans. Gavi 6.0 inclut une contribution substantielle au renforcement de la sécurité d'approvisionnement régionale en vaccins, avec un accent particulier sur le continent africain. La Grande Initiative de Rattrapage (BCU), clôturée en mars 2026, a rattrapé 18,3 millions d'enfants avec plus de 100 millions de doses dans 36 pays.","date":"2026-07-01"},
],
"sante-maroc":[
{"title":"Maroc 2026 : 88% de la population couverte par l'AMO, plus de 35 millions de bénéficiaires — modèle africain de couverture santé universelle","url":"https://humantal.ma/blog/amo-assurance-maladie-obligatoire-guide","content":"En 2026, le Maroc affiche un taux de couverture médicale de 88% de sa population, avec plus de 35 millions de personnes bénéficiant de l'Assurance Maladie Obligatoire (AMO), faisant du Royaume une référence africaine en matière de couverture santé universelle. L'AMO, créée en 2005 et généralisée depuis 2022 dans le cadre de la réforme royale de l'État social, garantit l'accès aux soins et le remboursement partiel ou total des dépenses médicales liées aux maladies, à la maternité et aux accidents du travail. Le dispositif est géré par la CNSS pour les salariés du secteur privé, la CNOPS pour les fonctionnaires, et le RAMED pour les populations en situation de vulnérabilité économique. La généralisation de l'AMO représente une avancée majeure vers l'objectif royal de couverture santé universelle de l'ensemble des résidents au Maroc, distinguant le pays de nombreux pairs régionaux africains encore largement en deçà de 50% de couverture. Le ministère de la Santé projette d'atteindre 95% de couverture d'ici 2028 grâce à l'intégration progressive des travailleurs du secteur informel dans le dispositif.","date":"2026-07-03"},
{"title":"Programme national d'immunisation du Maroc 2026 : couverture vaccinale supérieure à 95% pour les principaux antigènes infantiles","url":"https://sahha.ma/en/articles/vaccination-enfant-calendrier-maroc-2026","content":"Le Programme national d'immunisation (PNI) du Maroc affiche en 2026 une couverture vaccinale supérieure à 95% pour les principaux antigènes infantiles, positionnant le Royaume parmi les systèmes de vaccination les plus performants du continent africain. Le calendrier vaccinal officiel 2026 couvre onze maladies évitables pendant les deux premières années de vie, avec des injections programmées dès la naissance (BCG et première dose hépatite B), puis aux 2ème, 3ème, 4ème, 9ème, 12ème et 18ème mois. L'ensemble des vaccins obligatoires du PNI est mis à disposition gratuitement par le ministère de la Santé dans tous les centres de santé publics et dispensaires du pays, garantissant un accès universel indépendant du statut socio-économique. La CNSS et la CNOPS remboursent partiellement certains vaccins complémentaires sur prescription pédiatrique au tarif de référence ANAM, avec un reste à charge familial généralement compris entre 60% et 80% pour les vaccins hors calendrier public. Le Maroc prévoit d'élargir le PNI 2026-2028 avec l'introduction de nouveaux vaccins, notamment contre les infections à pneumocoque et le rotavirus, dans les exercices budgétaires à venir.","date":"2026-07-02"},
{"title":"PLF 2026 au Maroc : nouvelle impulsion financière pour un accès aux soins plus équitable entre zones urbaines et rurales","url":"https://fnh.ma/article/actualite-financiere-maroc/plf-2026-sante-systeme","content":"Le Projet de Loi de Finances 2026 du Maroc marque une inflexion majeure dans la politique nationale de santé, complétant le budget record de 42,4 milliards de dirhams par des mécanismes de financement innovants visant à réduire les inégalités d'accès aux soins entre zones urbaines, périurbaines et rurales. Des enveloppes spécifiques ont été allouées pour accélérer la généralisation de l'AMO, déployer les Groupements sanitaires territoriaux (GST) dans les douze régions du Royaume, et améliorer l'accès aux médicaments essentiels dans les provinces éloignées où les taux de recours aux soins restent nettement inférieurs à la moyenne nationale. Parmi les priorités sanitaires du PLF 2026 figurent la réduction de la mortalité maternelle et infantile, encore en deçà des standards régionaux dans certaines zones montagneuses et sahariennes, ainsi que le renforcement de la santé primaire pour désengorger les hôpitaux. Des crédits spécifiques sont réservés pour le développement de la santé mentale et des soins palliatifs, deux domaines longtemps sous-financés dans les lois de finances précédentes. Ce PLF est qualifié par les experts de budget de concrétisation du chantier royal de l'État social, à mi-parcours de sa mise en oeuvre.","date":"2026-06-28"},
{"title":"Le Maroc consolide son système de santé publique à l'aune des défis épidémiques continentaux","url":"https://microbiotics.com.ng/africa-cdc-strategic-plan-2022-2026?pdf=4936","content":"Dans un contexte de flambées épidémiques récurrentes sur le continent africain, le Maroc renforce ses dispositifs de veille sanitaire et de réponse aux urgences de santé publique. Le Royaume s'appuie sur son réseau de laboratoires de référence et sur ses partenariats avec des institutions internationales telles qu'Africa CDC et l'OMS pour détecter précocement toute menace épidémique. Le Plan stratégique 2022-2026 d'Africa CDC, qui prévoit un Centre de coordination régional pour l'Afrique du Nord basé au Caire, constitue une opportunité pour le Maroc de renforcer son intégration dans l'architecture continentale de sécurité sanitaire. Les autorités marocaines veillent par ailleurs à maintenir des capacités de prise en charge des maladies à potentiel épidémique importées, dans le respect des Règlements sanitaires internationaux.","date":"2026-07-04"},
{"title":"Budget santé 2026 au Maroc : 42,4 milliards de dirhams, une hausse de 30 % et 8 000 nouveaux postes budgétaires","url":"https://aujourdhui.ma/actualite/un-budget-en-hausse-de-30-et-8-000-nouveaux-postes-424-milliards-de-dirhams-pour-la-sante-en-2026","content":"Le ministère marocain de la Santé et de la Protection sociale dispose en 2026 d'un budget record de 42,4 milliards de dirhams, en hausse de 30 % par rapport à l'exercice précédent, dans le cadre de la réforme structurelle du système national de santé portée par la Vision royale de l'État social. Sur cette enveloppe, 16,4 milliards de dirhams sont dédiés aux dépenses de personnel, avec la création de 8 000 nouveaux postes budgétaires pour renforcer les ressources humaines à tous les niveaux du système de soins. Les investissements prioritaires de 2026 incluent la construction de nouveaux Centres hospitaliers universitaires (CHU), la mise à niveau de 90 hôpitaux existants et le déploiement progressif des Groupements sanitaires territoriaux (GST). D'ici fin 2027, toutes les régions du Maroc, à l'exception de Dakhla-Oued Eddahab, disposeront de leur propre CHU.","date":"2026-07-03"},
{"title":"Réforme de l'état social au Maroc : la santé change d'échelle avec les Groupements sanitaires territoriaux","url":"https://leseco.ma/maroc/reforme-de-letat-social-la-sante-change-dechelle-non-sans-resistances.html","content":"La réforme du secteur de la santé au Maroc entre en 2026 dans une phase décisive avec l'opérationnalisation progressive des Groupements sanitaires territoriaux (GST), nouvelles entités de gouvernance régionale chargées d'intégrer et de coordonner l'ensemble des établissements de santé d'une même région. Cette restructuration vise à mettre fin à la fragmentation du système de soins, à améliorer l'accès aux soins en milieu rural et semi-urbain, et à renforcer la complémentarité entre les secteurs public et privé. Si l'ambition réformatrice est globalement saluée, des résistances subsistent parmi les professionnels de santé face aux changements organisationnels, notamment concernant la mobilité des personnels et la redistribution des compétences entre niveaux de soins. La généralisation de la feuille de soins électronique constitue un autre chantier prioritaire de 2026, visant à simplifier les démarches administratives et améliorer la traçabilité des soins.","date":"2026-07-01"},

"vaccins-monde":[
{"title":"La vaccination préventive contre le choléra reprend dans le monde après trois ans de pénurie : l'OMS annonce une étape critique dans l'approvisionnement mondial en vaccins oraux","url":"https://www.who.int/news/item/04-02-2026-preventive-cholera-vaccination-resumes-as-global-supply-reaches-critical-milestone","content":"Le 4 février 2026, l'OMS a annoncé que les campagnes de vaccination préventive contre le choléra peuvent reprendre à l'échelle mondiale, après une pénurie d'approvisionnement en vaccins oraux anti-cholérique (VOC) qui avait duré plus de trois ans et contraint les autorités sanitaires mondiales à ne prioriser que la réponse aux flambées actives. La production mondiale de VOC a atteint des niveaux suffisants pour soutenir à la fois les campagnes préventives à grande échelle et le contrôle réactif des épidémies, grâce à l'expansion des capacités de fabrication par les principaux producteurs. La crise d'approvisionnement avait particulièrement affecté l'Afrique subsaharienne et l'Asie du Sud — régions à choléra endémique et au fardeau épidémique le plus lourd — où les campagnes préventives avaient été suspendues depuis fin 2022. La reprise de la vaccination préventive devrait réduire significativement la morbidité et la mortalité : le VOC offre environ 65% de protection sur cinq ans et est central dans la Feuille de Route mondiale de l'OMS pour Mettre Fin au Choléra d'ici 2030, qui cible 90% de réduction des décès. L'OMS appelle les pays, bailleurs et Gavi à capitaliser sur cette reprise pour intensifier rapidement les campagnes dans les communautés à risque.","date":"2026-02-04"},
{"title":"Le SAGE de l'OMS actualise les recommandations sur la vaccination COVID-19 en mars 2026 : accent sur les groupes à risque, document de position attendu","url":"https://pmc.ncbi.nlm.nih.gov/articles/PMC13091268/","content":"En mars 2026, le Groupe Consultatif Stratégique d'Experts de l'OMS sur la Vaccination (SAGE) a revu et actualisé ses recommandations sur la vaccination COVID-19, intégrant les données les plus récentes sur l'efficacité vaccinale contre les variants dominants en circulation, la dynamique de la diminution de l'immunité, et les niveaux de séroprévalence mondiales. Le SAGE a maintenu le cadre de priorisation centré sur les groupes à plus haut risque — personnes âgées, immunodéprimées et professionnels de santé de première ligne — tout en réévaluant les arguments pour un rappel vaccinal étendu à l'ensemble de la population en phase endémique à faible mortalité. Un document de position consolidé de l'OMS sur les vaccins COVID-19, intégrant ces recommandations actualisées, est prévu pour publication en 2026, fournissant aux programmes nationaux d'immunisation le cadre le plus récent pour intégrer la vaccination COVID-19 dans les plateformes de vaccination de routine. La mise à jour est particulièrement pertinente pour les pays africains à revenu faible ou intermédiaire, où la couverture en rappels COVID-19 reste faible et où les systèmes de santé doivent arbitrer entre doses COVID et priorités d'immunisation concurrentes.","date":"2026-03-15"},
{"title":"Les grandes avancées vaccinales de 2026 selon six experts : RSV, dengue, paludisme et plateformes ARNm de nouvelle génération en tête","url":"https://www.gavi.org/vaccineswork/what-are-biggest-vaccine-breakthroughs-coming-2026-we-asked-six-experts","content":"Dans une analyse de référence publiée par la plateforme éditoriale VaccinesWork de Gavi, six grands scientifiques et experts de santé publique ont identifié les avancées vaccinales les plus significatives de 2026. Les vaccins contre le VRS (Virus Respiratoire Syncytial) pour adultes âgés et pour l'immunisation maternelle protégeant les nouveau-nés sont désormais déployés à l'échelle mondiale après des résultats pivots de phase 3, tandis que les programmes de vaccination contre la dengue s'étendent en Amérique latine et Asie du Sud-Est avec des produits préqualifiés par l'OMS. Les vaccins antipaludiques, soutenus par le déploiement multi-pays de Gavi, atteignent des jalons historiques de couverture. Le panel a unanimement désigné les plateformes ARNm de nouvelle génération — en cours d'adaptation pour la tuberculose, le VIH et la préparation aux pandémies — comme l'horizon technologique le plus transformateur de la décennie. Avec l'Afrique qui développe sa propre capacité de fabrication ARNm et l'AVMA de Gavi mobilisant des financements pour les producteurs locaux, les experts décrivent 2026 comme une année charnière où innovation vaccinale et équité mondiale commencent à converger concrètement.","date":"2026-06-15"},
{"title":"OMS : le Comité PDVAC se réunit le 6 juillet 2026 pour définir les priorités mondiales de développement vaccinal","url":"https://www.who.int/news-room/events/detail/2026/07/06/default-calendar/2026-who-product-development-for-vaccines-advisory-committee-meeting-(pdvac)","content":"Le Comité consultatif pour le développement de produits vaccinaux (PDVAC) de l'OMS tient sa réunion annuelle le 6 juillet 2026 pour examiner les priorités mondiales en matière de R&D vaccinale, notamment les candidats-vaccins contre le virus Bundibugyo, la dengue, le paludisme et d'autres pathogènes prioritaires. Ce comité d'experts indépendants — virologues, immunologistes et spécialistes de santé publique — formule des recommandations sur les technologies vaccinales à prioriser, les essais cliniques à soutenir et les mécanismes d'accès équitable. Dans le contexte de la crise Ebola Bundibugyo, le PDVAC joue un rôle critique pour guider les investissements en R&D et accélérer le développement de contre-mesures médicales adaptées à ce virus pour lequel aucun vaccin homologué n'existe à ce jour. Ses recommandations orienteront les stratégies d'investissement des grandes institutions mondiales de santé pour les années à venir.","date":"2026-07-06"},
{"title":"Africa CDC lance la 5e Conférence internationale sur la santé publique en Afrique (CPHA 2026)","url":"https://www.youtube.com/watch?v=0m1yPcfq680","content":"L'Africa CDC et le gouvernement éthiopien s'apprêtent à lancer officiellement la 5e Conférence internationale sur la santé publique en Afrique (CPHA 2026), décrite comme le plus grand événement de santé publique du continent. Lors d'un briefing spécial diffusé le 7 mai 2026, les responsables de l'Africa CDC ont annoncé que la vaccination contre le mpox et d'autres activités de surveillance figurent parmi les priorités opérationnelles de l'organisation. Par ailleurs, 13 pays africains se sont réunis à Brazzaville, au siège du bureau régional de l'OMS pour l'Afrique, pour signer un mémorandum d'entente visant à renforcer la surveillance transfrontalière et la préparation aux épidémies, une initiative susceptible de transformer la réponse vaccinale et épidémiologique dans les régions d'Afrique centrale, orientale, septentrionale, méridionale et occidentale.","date":"2026-07-03"},
{"title":"Maladies fongiques : Africa CDC et GAFFI appellent à une stratégie vaccinale et diagnostique renforcée sur le continent","url":"https://www.instagram.com/reel/DV8ENATglhc","content":"Lors du premier Sommet africain sur les maladies fongiques, co-organisé par Africa CDC et la Global Action For Fungal Infections (GAFFI), les participants ont appelé à élever ces pathologies souvent négligées au rang de priorité mondiale en matière de santé publique. Les experts ont plaidé pour le renforcement de la surveillance, l'amélioration des diagnostics et l'expansion des traitements, tout en pointant l'urgence de soutenir la recherche et le développement de nouveaux outils thérapeutiques et préventifs, y compris des pistes vaccinales. La résistance aux antifongiques, phénomène croissant sur le continent africain, a été identifiée comme une menace émergente nécessitant une réponse coordonnée à l'échelle mondiale, à l'image des stratégies développées contre la résistance aux antimicrobiens.","date":"2026-07-01"},

function getSourceColor(d){if(d.includes("who.int"))return"#0093D5";if(d.includes("africacdc")||d.includes("au.int"))return"#1B8C3A";if(d.includes("unicef"))return"#00AEEF";if(d.includes("gavi"))return"#E8702A";if(d.includes(".ma")||d.includes("maroc")||d.includes("santemag")||d.includes("hespress"))return"#C1272D";if(d.includes("nature.com"))return"#B5232D";if(d.includes("path.org"))return"#6B2D8B";if(d.includes("cdc.gov"))return"#075290";return"#0069B4";}
function extractDomain(u){try{return new URL(u).hostname.replace("www.","")}catch(e){return""}}
function timeAgo(d){if(!d)return"";var date=new Date(d),now=new Date();if(isNaN(date))return"";var s=Math.floor((now-date)/1000);var formatted=date.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});if(s>=0&&s<86400)return formatted+" - aujourd hui";if(s>=86400&&s<172800)return formatted+" - hier";if(s>=172800&&s<604800)return formatted+" - il y a "+Math.floor(s/86400)+"j";return formatted;}
function isRecent(d){if(!d)return false;var date=new Date(d),now=new Date(),diff=(now-date)/(1000*60*60*24);return diff<=1.5;}
function renderCategories(){var el=document.getElementById("categories");el.innerHTML=CATEGORIES.map(function(c){var articles=articlesData[c.id]||[];var newCount=articles.filter(function(a){return isRecent(a.date)}).length;var badge=newCount>0?'<span style="font-size:9px;background:#E8A020;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:800">'+newCount+' NEW</span>':"";return'<button class="cat-btn '+(activeCategory===c.id&&!isCustomSearch?"active":"")+'" data-id="'+c.id+'"><div class="cat-icon">'+c.icon+'</div><div class="cat-label">'+c.label+badge+'</div><div class="cat-desc">'+c.desc+'</div></button>';}).join("");el.querySelectorAll(".cat-btn").forEach(function(b){b.addEventListener("click",function(){isCustomSearch=false;activeCategory=b.dataset.id;renderCategories();renderArticles();});});}
function renderArticles(){var container=document.getElementById("articles");var articles=articlesData[activeCategory]||[];var info=document.getElementById("toolbarInfo");var newArticles=articles.filter(function(a){return isRecent(a.date)});var newCountEl=document.getElementById("newCount");info.textContent=articles.length+" articles";if(newArticles.length>0){newCountEl.style.display="inline";newCountEl.textContent="NEW "+newArticles.length+" nouveau"+(newArticles.length>1?"x":"");}else{newCountEl.style.display="none";}if(!articles.length){container.innerHTML='<div class="spinner-wrap" style="padding:40px 0"><div style="font-size:52px;opacity:.3;margin-bottom:14px">📰</div><div class="spinner-text">Aucun article</div></div>';return;}container.innerHTML=articles.map(function(a,i){var domain=extractDomain(a.url),color=getSourceColor(domain),dateStr=timeAgo(a.date);var isNew=isRecent(a.date);return'<div class="article-card'+(isNew?" is-new":"")+'" style="animation-delay:'+i*.06+'s"><div class="article-inner"><div class="article-bar" style="background:'+color+'"></div><div class="article-body"><a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+(isNew?'<span class="badge-new">NOUVEAU</span> ':'')+a.title+'</a><div class="article-content collapsed" id="c-'+i+'">'+a.content+'</div><div class="article-meta"><span class="source-tag" style="background:'+color+'14;color:'+color+'">'+domain+'</span>'+(dateStr?'<span class="date-tag">'+dateStr+'</span>':'')+'<button class="expand-btn" data-i="'+i+'">Lire plus</button></div></div></div></div>';}).join("");container.querySelectorAll(".expand-btn").forEach(function(b){b.addEventListener("click",function(){var el=document.getElementById("c-"+b.dataset.i);var c=el.classList.toggle("collapsed");b.textContent=c?"Lire plus":"Reduire";});});}
function doSearch(){var val=document.getElementById("searchInput").value.trim().toLowerCase();if(!val){isCustomSearch=false;renderCategories();renderArticles();return;}isCustomSearch=true;var allArticles=[];Object.values(articlesData).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(a){allArticles.push(a)})});var filtered=allArticles.filter(function(a){return(a.title+a.content).toLowerCase().includes(val)});activeCategory="search-custom";articlesData["search-custom"]=filtered;renderCategories();renderArticles();}
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch()});
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
renderCategories();
renderArticles();
</script>
