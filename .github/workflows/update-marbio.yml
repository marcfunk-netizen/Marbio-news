yaml
name: Marbio News Daily Update
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  update-marbio:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests anthropic
      
      - name: Clean misclassified articles (one-time)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -f clean_once.py ]; then
            python clean_once.py
          fi
      
      - name: Run Marbio updater
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_marbio.py
      
      - name: Commit and push
        run: |
          git config user.name "Marbio Bot"
          git config user.email "marbio-bot@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || (git commit -m "📰 Marbio News — $(date +'%d %B %Y' | sed 's/January/janvier/;s/February/février/;s/March/mars/;s/April/avril/;s/May/mai/;s/June/juin/;s/July/juillet/;s/August/août/;s/September/septembre/;s/October/octobre/;s/November/novembre/;s/December/décembre/')" && git push)
Clique Commit changes
La ligne if [ -f clean_once.py ] fait que le nettoyage ne tourne que si le fichier existe — donc après le premier run réussi, tu pourras simplement supprimer clean_once.py du repo et le workflow continuera normalement sans cette étape.

Ensuite relance le workflow dans Actions → Run workflow.


