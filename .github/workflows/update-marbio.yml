"""
ONE-TIME CLEANUP: Run this once to remove Africa CDC articles 
that were incorrectly placed in other categories.
After running, delete this file from the repo.
"""
import re, json
 
REMOVE = {
    "sante-maroc": [
        "Africa CDC cross-border framework: model applicable to North African health corridors",
        "Africa CDC Health Security and Sovereignty Agenda: implications for North African member states",
        "Africa CDC digital health champions programme: a model for North African youth engagement",
    ],
    "vaccins-monde": [
        "Africa CDC mpox adaptive strategy: vaccines, diagnostics and digital tracking",
        "Lyon One Health Summit: $250 million secured to advance vaccine and health security in Africa",
        "Africa CDC cross-border framework targets zoonotic disease spillovers to protect vaccine gains",
    ],
    "unicef-gavi": [
        "Africa CDC weekly brief highlights 40% resource loss to inefficiency across African health systems",
        "Africa CDC weekly briefing April 9: health security sovereignty agenda takes centre stage",
        "Africa CDC secures EUR 96.5 million EU investment to strengthen health security infrastructure",
    ],
    "manufacture-vaccins": [
        "Africa CDC unveils AHSS Agenda to reduce dependency in health manufacturing and supply chains",
        "AU Summit 2026: Africa CDC advances manufacturing sovereignty through high-level engagements",
        "Africa CDC 2026 Young Digital Health Champions to drive innovation in health systems",
    ],
    "african-medical-agency": [
        "Africa's Health Security and Sovereignty Agenda sets new model for continental autonomy",
        "Africa CDC and FHI 360 sign MOU to strengthen health workforce and surveillance systems",
    ],
}
 
with open("index.html", "r", encoding="utf-8") as f:
    html = f.read()
 
m = re.search(r'var articlesData=(\{.*?\});', html, re.DOTALL)
if not m:
    print("ERROR: articlesData not found")
    exit(1)
 
js = m.group(1)
js = re.sub(r'(?<=[{,])\s*(\w+)\s*:', r' "\1":', js)
js = re.sub(r',\s*([}\]])', r'\1', js)
data = json.loads(js)
 
total = 0
for cat, titles in REMOVE.items():
    if cat not in data:
        continue
    before = len(data[cat])
    data[cat] = [a for a in data[cat] if a.get("title", "") not in titles]
    removed = before - len(data[cat])
    total += removed
    print(f"  {cat}: removed {removed} articles ({before} -> {len(data[cat])})")
 
print(f"\nTotal removed: {total}")
 
lines = ["var articlesData={"]
for cat in data:
    lines.append('"' + cat + '":[')
    for a in data[cat]:
        t = a.get("title","").replace('\\','\\\\').replace('"','\\"').replace('\n',' ').replace('\r','')
        u = a.get("url","").replace('"','\\"')
        c = a.get("content","").replace('\\','\\\\').replace('"','\\"').replace('\n',' ').replace('\r','').replace('\t',' ')
        d = a.get("date","")
        lines.append('{"title":"'+t+'","url":"'+u+'","content":"'+c+'","date":"'+d+'"},')
    lines.append("],")
lines.append("};")
new_js = "\n".join(lines)
 
new_html = html[:m.start()] + new_js + html[m.end():]
with open("index.html", "w", encoding="utf-8") as f:
    f.write(new_html)
 
print("index.html cleaned!")
 
